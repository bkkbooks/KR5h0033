front:
  text: 弘道録卷之七經七
  hash: sha256:8bd59d059b6f93c760d128eee54ba85891d4a19d567fda3287c0417a0b6e2b4c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_007-001a, image: hfl/1068/1068-134.png}
body:
  text: 仁夫婦之仁孟子曰舜之為天子也被衫衣鼓琴二女果若固有之録曰愚觀大舜雍雍在宫其氣象有如此當時好事者創為二嫂使治朕棲之言何其悖哉故不必辨其不然而直以不如無書之為愈也又曰詩有云琴瑟在御莫不靜好蓋不但天子為然雖區夫匹婦閨門之內亦莫不然至漢亦有房中詞樂高祖唐山夫人所作其後武帝以李延年為協律都尉而李夫人之輩相去天淵何怪其不古若耶又曰昔者太王好色愛厥妃詩云古公亶父來朝走馬率西水滸至于岐下爰及薑女聿來胥宇當是時也內無怨女外無曠夫王如好色與百姓同之于王何有録曰天之好色不當如是耶男子生而願為之有室女子生而願為之有家聖人未嘗斷色也內無怨女外無曠夫色亦未嘗禍人也此乃所謂性而非所謂疾人惟昧此往往艷色冶容驕妬淫逸徒見其禍未見其德遂使天然之性反為人欲之叢以至傾國傾城其禍慘矣非先王好色之意也詩大明將言文王之聖而推本言之曰摯仲氏任自彼殷商來嫁于周曰嬪于京録曰傳云國家將興必有禎祥國家將亡必有妖孽夫災見于天變生于地雖有妖未為孽也惟夫人之妖乃不可逭是時殷之適嗣方主天位未見危亡之形乃一妲己生乎其間罰不得不重刑不得不淫而天立厥配周薑太任太姒邑薑聚于一門天之所興未有若斯之盛也然則太王王季文王武王又豈敢必哉亦惟曰明明在下而已周之文王生有聖德又得聖女姒氏以為之配官中之人於其始至見其有幽間貞靜之德作詩曰關關睢鳩在河之洲窈窕淑女君子好逑參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鍾鼓樂之匡衡曰妃匹之際生民之始萬福之原婚姻之禮正然後品物遂而天命全孔子論詩以關睢為始言太上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜自上世以來三代興廢未有不由此者也録曰孔子曰關睢樂而不淫哀而不傷又曰師摯之始關睢之亂洋洋乎盈耳哉又曰人而不為周南召南其猶正墻面面立也與吾天子於關睢之詩何若是耶誠以聖賢之道篤于近帝王之治本諸身其盡善全美內外咸備未有若文王太姒者也是故堯二女聖矣不告而娶則雖有輾轉反側之情無由而見禹𡍼山賢矣辛壬癸甲至三過其門而不入則雖有琴瑟鼓鍾之樂何自而伸以至測成帝納趙飛燕宫中之人于其始至謂之禍水曰滅火必矣則雖有憂思之迫切之意將無所用其情焉匡衡之説有自來矣而吾夫子大聖之阻亦有出妾之憾焉寧不重感于伯魚也夫重感于伯魚也夫后妃能逮不而無嫉妬之心故衆妾樂其德而柝願之曰南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂尺君子福履將之南有樛木葛藟縈之樂只君子福履成之録曰愚觀葛藟之詠而有得于作者之不費話也夫葛之覃兮后九之事也以后妃之所事而為衆妾之所稱豈待思而後得耶瓜木栗薪周公之所不廢則樛木葛藟官人安得而忘之哉于此可見古人之學非待如求雖婦人女子與大聖大賢同一軌也豈非自得者歟文王之化自家而國男女以正婚姻以時故詩人因所見以起興曰桃之夭夭灼灼其華之子于歸宜其室家桃之夭夭有蕡其實之子于歸宜其家室桃之夭夭其葉蓁蓁之子于歸宜其家人録曰孟子之稱太王曰內無怨女外無曠天詩人之詠之王曰之子于歸宜其家人豈非以王者之道造端乎夫婦耶夫及時而美盛者莫如桃夭其新而孔嘉者莫如男女于此可以見對時之懋焉可以見牧育之情焉可以見萬民之恩焉可以見和氣之充焉欲盡詩之善矣者於此可以觀矣化行俗美家室和平婦人無事相與如此芣苡而賦其事以相樂曰采采芣苡薄言采之采采芣苡薄言有之采采芣苡薄言掇之采采芣苡薄言將之采采芣苡薄言桔之采采芣苡薄言之録曰婦人安所而無事乎遵彼汝墳勤王事也魴魚頳尾事亂邦也厭浥行露防𢬶陵也雀角鼠牙懼強暴也頃匡塈之時不可失也使尨也吠户不可警言然川化行俗美家謹和平不于采采芣苡見之乎大雅韓侯之妻蹶父之子也詩云蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訂魴鱮甫甫麂鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽録曰韓侯之事無可考然觀君子偕老副笄六珈可以為燕矣而中算之言不可以為譽大夫夙退無使君勞可以為慶矣而終夙且暴未足以為令此慶既令居韓姞燕譽君子以是歸德焉左傳懿氏卜妻敬仲其妻占之曰吉是謂鳳凰于飛和鳴鏘鏘有媯之後將育于薑五世其昌並于正卿八世之後莫之與京録曰咸恆之彖曰咸者感也恆者久也夫婦之道惟感而後有恆此即和順鏘鏘五世其昌者乎若乃婆娑鼓舞無春無夏以至于株林夏南極矣所謂不恆其德或承之羞此陳國之所以亡而故仲之所由貝與蓋不恃懿氏之占而後可知也趙成子居晉時娶文公女曰趙姬生原同屏括摟嬰及從文公在狄狄人伐牆咎如獲其二女叔隗季隗而納諸文公文公取季隗而以叔隗妻成子生盾文公反國趙姬請盾與母成子辭姬曰得寵而忘舊何以使人必通之固請許之來以盾為才固請于公以為適子而使其三子下之以叔隗為內子而已下之録曰趙姬賢于人數等矣有容人之度有下人之德有知人之明妬則不容驕則不下愛則不明婦人之常情也况以公女之貴狄妻之賤嫡子之衆庶孽之微乎其曰得寵忘舊何以使人真能知糟粳之誼不但葑菲之求而已也又以盾為才固請為嫡真能割肌膚之愛不但涇渭之辨而已也卒之繼成秉政美公族孰謂婦人而能不避親乎噫嘻可謂仁矣列女傳衛宗二順者衛靈王之夫人及其傅妾也靈王死夫人無子謂傅妾曰孺子養我甚謹子奉祀而妾事我我不聊也且吾聞主君之母不妾事人今我無子于禮斥絀之人也而得留以盡其節是我幸也今又煩孺子我甚慙願出居外以陸柏見甚便之傅妾泣曰夫人欲使靈氏受三不祥耶事君不終一不祥也夫人無子而婢妻有子二不祥也夫人欲出居外使婢子反居內三不祥也妾聞忠臣事君無懈孝子養親患無日也妾豈敢以少貴之故變妾之節哉退而謂其子曰吾聞君子處順奉上下之儀修先古之禮此順道也今夫人難我將欲居外使我居內此並道也處逆而生豈若守順而死遂欲自殺天人聞之懼許留終養欲君子曰二女可謂行成于內而名立于後世矣録曰夫人無子而傅妾有子固無害于其嫡也而何有于分别又何有于內外乎若是則子固不可無而嫡或可損乎秦俗尊華陽廢芉后若敝草管豈其時固然耶抑孝成廢許后立飛燕班姬求外共養長信宫向故為此諷言耶不然祗恣後世奪嫡立愛之厲階雖不傳可也録以存疑義云西漢書陳平少時家貧好讀書為人長大美色及長可取婦富人莫與者貧者乎亦愧之久之户牖富人張負有女孫謂其子仲曰吾欲以子陳平仲曰平貧不事事一縣中盡笑其所為獨奈何豫之負曰固有美如陳平當貧者乎卒與女為平貧負乃假貸幣帛為聘豫酒肉之資使以內婦仍戒其孫曰毋以貧故事人不敬事兄伯如事乃父事嫂如事乃母平既取張氏女而後資用益饒遊道日廣録曰以澆俗偷薄之餘而有富人張負之見可以驗易代之萌矣夫以一鉏耰而尚吝何况有女如玉平一箕帚而尚誇何况有幣如泉乎大漢隆興既有吕公之女童美于前必有張負之孫揚聲于後且能不以富盛驕人卒之婦道益修夫德益進所謂中饋貞吉者矣不可以為仁乎宣帝初為皇曾孫遭巫蠱事養于掖庭許廣漢書曰皇嗇天因與同寺居時掖處命張賀本衛太子奏皇右舊息甚厚廣漢有女平君年十四五卜當大貴賀請適曾皇孫一歲生元帝後即皇帝位立許氏為婕妤當立后霍將軍有小女與皇太后親在廷公卿議者皆心擬霍將軍女亦未敢有言上乃詔求微時故劍大臣知指白立許婕好為皇后録曰霍氏之禍其諸萌于此歟夫機之所動甚微而所關甚大矧人皆心擬而霍氏不竊擬歟光不之知而帝或友知之歟帝之指有定然矣及乎少夫之進帝將思之已熟其不言指非不言也向之指可露今之指難明也光弗署衍帝可恕光乎史氏不察以為萌于驂乘縱然薄乎爾矣東漢書永平三年有司奏立長秋宫皇太后曰馬貴人德冠後宫遂立為后后能誦易好讀春秋楚辭尤善周官董仲舒書既正位愈自謙肅常衣大練裙不加緣帝幸苑囿離宫后輒以風邪靈霧為戒辭意欸備多見詳擇是以遊娛之事希嘗從焉時楚獄連年不斷因相證引坐繫者甚衆后慮其濫乘間言之意甚惻然帝感悟夜起倣徨為思所納卒多降宥及肅宗即位尊為皇太后常與帝旦夕言道政事及教授諸王論議經書述敘平生雍如終日曰吾少壯時但慕竹帛志不顧命今雖已老而復戒之在得故日夜惕勵思自降損居不求安食不念飽冀乘此道以不負先帝録曰后之諡為明德也不亦宜哉夫女陰之體也柔之質也故多尚侈務得好樂喜施厭肥飽梁安居宴逸此其常也而况貴為母后富有四海乃益務勤儉如衣大練親蠶織却遊娛諫楚獄絶外恩拒禱祀皆非虛名貌飾而真德實意流市于二十三年之間不可覃述推緣其故后蓋不以陰體自居柔質自纍而所慕在于竹帛所志在于聖賢斯言也其張本歟謂之德貫後官信乎兩漢之間無能及矣宋弘為大司空時湖陽公主新寡光武與共論朝臣微觀其意主曰宋公威容德器群臣莫及帝曰方且圖之後弘被引見帝令主坐屏風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之交不可忘糟粳之妻不下堂帝顧謂主曰事不諧矣録曰此郭后將廢之漸也夫仕宦當作執金吾娶妻當得陰麗華帝之初志所謂貴易交富易妻也弘父尚以不附董賢抵罪其聞于家庭有素矣况能止繁聲却好色著于朝廷者帝獨不聞乎何為其發之謬也雖然帝不足論為湖陽者竟忍聞于鄰國乎竟忍聞于鄰國乎唐書文德皇后長孫氏性仁孝儉素好讀書嘗與帝從容商量古事因而獻替禆益弘多及疾篤與上訣時房玄齡以譴歸第后言于上曰玄齡事陛下久小心愼密苟無大故願勿棄之仍願陛下親君子遠小人納忠諫屏讒慝省徭役止逰畋妾雖沒于九泉誠無所限嘗采自古婦事得失為女則三十卷上覽之示近臣曰皇后此書足以垂範百世今崩朕非不知天命而為無益之悲但入宫不聞規諫之言失一良佐故不能忘懷耳及葬昭陵上念后不已乃于苑中作層觀以望昭陵録曰九人治外邑薑治內陰教之益誠非細也惜唐之太宗非武王之比豈其巢刺王妃未立曹王子明未封惟恐𧠺諫之言不聞故昭陵之望恆切乎至才人武氏入宫之後將不如是之矣太宗又謂尉遲敬德曰朕欲以女妻卿何如敬德叩頭謝曰臣妻雖鄙陋相與共貧賤久矣臣誠不學聞古人不以富貴而易其妻此臣願也上善之乃止録曰敬德慓悍之將也豈其于風人之旨有所聞乎縞衣綦巾似非奪稍之快而幅笄六珈益表委質之親矧若杜荷房遺愛薛萬徹柴令武紛紛尚主安所不可而反郤之郤之何意也知足不辱知止不殆非但思患預防而已此加于房杜數等卒以晚節益循優遊自得獨全思禮君臣之間善始令終無一毫之猜忌豈不美哉嗚呼閨門之際可謂仁矣臨安志吳越恭懿太夫人吳氏名漢月錢塘人性婉淑慈惠奉文穆王元瓘而性俶居常節儉惟衣布練每聞決重刑常顰蹙以仁恕為言諸吳有遷授者皆峻阻之入見多加訓勵有過失必面責之故終夫人之世無驕恣者忠懿王妃孫氏名太真亦錢塘人性端重聰慧每延接姻親洎諸宗屬皆盡思禮好學讀書通毛詩魯論義尚儉約非受參謁宴會未嘗盛飭俶之征毗陵也孫居國城遣內侍撫問諸將及從征將帥之家中外凛畏如奉王焉録曰史稱錢氏之始終非有德澤施于一方百年之際虐用其人而其子孫繁衍迄今綿綿不絶較之五代之君何止霄壤必有闔門伉儷之賢為之張本也録之宋史仁宗慈聖光獻曹皇后明道二年聘入宫景祐元年册為皇后熙寧元年尊為太皇太后性慈愛天至每神宗退朝稍晚必自至屏扆候間親持飲以食帝帝嘗有意于燕薊已與大臣定議乃詣慶壽宫白其事后曰儲蓄賜豫備乎鎧伏士卒精乎帝曰固已辨之后曰事體至大吉凶悔吝生乎動得之不過南面受賀而已萬一不諧則生靈所繫未易以言苟可取之太祖太宗收復久矣何待今日帝曰敢不受教蘇軾以詩得罪下獄人以為必死后違豫中聞之謂帝曰嘗憶仁宗以制科得軾兄弟喜曰吾為子孫得兩宰相今聞軾以作詩繫獄得非仇人中傷之乎捃至于詩其過微矣吾疾勢已篤不可以冤濫致傷中和宜熟察之帝涕泣軾由此得免録曰后之諡為光獻也不亦宜哉其明逹國體真帝王之度而燕薊之論尤可以為萬世法厥後王韶熙河之役种諤夏國之議紛紛兵革塗毒生靈王安石李憲之罪上通于天而慈聖長老仙逝于地卒不免如所慮此可見大有關于天下國家治亂安危者至于憐才一事猶不能不為之于邑浩嘆軾也何其幸哉他日哭之不覺告聲亦為晚矣英宗宣仁聖烈高皇后父遵甫母曹氏光獻太后姊也故少往來內禁英宗時育宫中與后年同仁宗謂光獻異日必以為配既長逐昏濮邸生神宗皇帝治平二年册為皇后神宗尊為皇太后哲宗立尊為太皇太后臨朝聽政首先驛召司馬光吕公著尚未至並命為相使同心輔政一時知名士彙進于廷凡熙寧以來政事弗便者次第罷之于是以常十舊式改青苗以嘉佑差役參募侵除市易之法逭茶鹽之禁舉邊寨不毛之地以賜西戎而宇內復安契丹戒其邊吏勿復生事曰南朝盡行仁宗之改矣及廷試舉人有司請揗天聖故事帝后皆御殿后止之又請受册寶於文德殿后曰毋后當陽非國家美事况天子正衙豈所當御就崇政足矣又以官冗當汰詔損外氏恩四之一以為官掖先臨政九年朝廷清明華夏綏定力行故事抑絶內降並外家私恩文思院奉上之物無問巨細終其世不取朝野尊你以為女中堯舜録曰堯舜聖人之至可以加之女后乎蓋堯舜之道中而已矣以當時之君太過者刻于精勵不及者靡于紹述孰不以堯舜自期然而未敢許也以一母后實能惠養元元仁而不失之柔力行故事斷而不過乎剛至于新法之罷閭閻小民若去𡍼炭而就衽席群小之黜朝廷舊臣若披雲霧而露青天設使繼體之君世世由之則堯舜之澤垂于無窮宋之元氣為不衰矣惜乎社飯未終國事全改群凶得志而堯舜亦無如之向矣豈非世不常有者耶神宗欽聖憲肅向皇后治平三年歸于頴邸頴王即皇帝位立為皇后哲宗立尊為皇太后宣仁命葺慶壽故宫以居后辭曰安有姑居西而婦處東瀆上下之分族黨有援例以恩换閣職及為選人求京秩者后曰吾族未省用此例何庸以私撓公一不與及哲宗倉卒晏駕獨決大策異議不能沮徽宗立請權聽政后以長君辭帝泣拜移時乃許凡紹聖元符以還𢞏所斥逐賢士大夫稍稍收用之故事有如御正殿避家諱立誕節之類皆不用至聞賔召故老寬徭息兵愛民崇儉之舉則喜見于色才六月即還政録曰宋之一代而有四后媲美增光簡册觀其懿德之最莫不以賔召故老褒録賢士為首務而抑奪私恩損己愛民為常法迄今鮮有其儷嗚呼可謂仁矣哲宗昭慈聖獻孟皇后宣仁大后選入宫位以為后後宣仁崩章惇誣謗宣仁與后又陰附劉賢妃請更立為后遂與郝隨構獄歷崇寧靖康金人陷京城時六宫有位號者皆北遷后以廢獨存張邦昌尊為宋太后迎居延福宫受百官朝垂簾聽政及聞康王在濟后遣尚書左右丞馮澥李回及兄子忠厚持書奉迎命都指揮郭仲荀將所部扈衛又命御營前軍統制張俊逆于道王至南京復遣宗室士及內侍邵而車賫圭寶乘輿服御奉康王即皇帝位遵受為元祐太后迎歸行在終老而崩初后受之日宣仁嘆曰斯人賢淑惜福厚耳異日國有事變必此人當之後皆如所云録曰愚觀光獻宣仁欽聖之為后也若春風和氣優遊于不識不知順帝之則而昭慈孟后有如秋霜露日濯而復光晦而復明然皆不失坤慈之則陰教之禮固可以見祖宗積德之慶然亦豈非群后率德之宜也乎孫明復隱居泰山之陽年已四十獨室而居故相李迪守兖見之歎曰先生獨居無偶誰事左右不幸風雨侵尋旦暮飲食疾病不時奈何吾弟之女可以奉箕帚明復固辭石介與諸弟子請曰公卿不下士久矣今丞相不以先生貧賤欲托以子宜因以成丞相之賢遂娶之李氏亦甘淡薄事其夫曲盡當時士大夫莫不賢之録曰愚觀孫明復之事而嘆李文定之不可及也夫相之事業雖不可知至于觀化一方亢當以士行為最習俗為先其妻復也不但以貴下賤成一人之美而實懲人無後崇大化之源且以正薄俗之澆漓全處士之高蹈厥後明復出而用世不負所舉李氏安貧富禮無忝所天皆可為後世法也劉庭式未第時議取鄉人之女及登進士女以病喪明或勸納其幼女庭式笑曰吾心已許之豈可負初心哉卒娶之生數子後妻死庭式通判密州逾年不復娶時蘇軾為守問曰哀生于愛愛生于色今君愛何從生哀何從出乎庭式曰吾知喪吾妻而已若緣色而生愛緣愛而生哀色衰愛弛吾哀亦亡則凡揚㭈倚市目挑而心招者皆可以為妻耶軾深善其言録曰夫妻者齊也孔子曰戒之在色又曰吾未見好德如好色聖人之意正恐緣色生愛流于淫僻將以防禍亂節逸欲也詩不云乎雖則如雲匪我思存縞衣綦巾聊樂我員若庭式者可謂能好德而不為物欲所移矣進于孔門乃所深許又豈但軾之深善而已哉周行已字恭叔早年登科未三十見伊川持身嚴苦塊然一室未嘗窺牖幼議母黨之女登科後其女雙瞽遂娶焉愛過常人伊川曰頤非三十時亦做不得此事録曰伊川之嘆美恭叔有反己自克之意與人為善之以若眉山者未免徇乎情矣此洛蜀之所由分又豈但哭則不歌歌則不哭而已哉吕蕡舉進士聘里中女未行既中第婦家言曰吾女故無疾既聘而後盲蕡曰君不為欺又何辭焉遂娶之生六子其五登科一人即丞相大防也蕡官至此部郎中録曰愚觀七出之條無所謂盲者則固無害枚可妻也至論惡疾無子亦有所不忍焉何也蓋閨門之中恩勝于義其人故無疾一宣有之雖聖莫能保矣其情為伉儷孤而棄之雖愚莫能間矣先王之權制豈誠不思哉竊意如今之牝牡不成諺所謂實女者其為惡疾無子斷然必去無疑矣皇明頒行列傳太祖高皇帝文德馬皇后自少貞靜端一聰明出人意表既嬪傎戚大歉嘗忍肌懷糗餌脯修供帝未嘗乏絶帝嘗謂侍臣曰昔光武勞馮異曰厚意久不報朕念皇后起布衣同甘苦嘗從倉卒忍飢食朕比之豆粥麥飯其困尤甚昔唐太宗長孫后當隱太子搆隙之際內能盡孝謹承諸妃消釋嫌朕數為郭氏所疑徑情不恤將士或以服用為獻后先獻郭氏慰悅其意及欲危朕后輒為彌縫卒免于患又難于長孫后者家之良妻猶國之良相豈忍忘之能朝因以語后后曰妾聞夫婦相保易君臣相保難陛下既不忍忘妾于貧賤願無忘君群百姓于艱難且妾定敢比長孫后賢但願陛下以堯舜為法耳及疾亟帝問之后曰陛下當求賢納諫明政教以致雍熙教育諸子使進德業帝曰吾已知之但老身何以為懷后復曰死生命也願陛下愼終如始使子孫皆賢臣民得所妾雖死如生也遂崩帝慟哭終身不復立后録曰三代之後有漢唐宋之後有明其應運也相類而漢高皇后與孝慈昭憲皇后其輔運也亦略相同及其未也乃若氷炭之相反漢之高后何敢望明之高后之萬一哉及我太祖以義斷息終身不復立后又與戚姬之事相天淵矣此其統天大孝及承天順聖皆可為萬世法也弘道録卷七終
