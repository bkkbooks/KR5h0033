  text: 弘道録卷之三十六相五
  hash: sha256:b89e9b51813ac727753f4d69c2b08affc9d87a363655f2beffeccf6552ae1852
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_029-001a, image: hfl/1076/1076-004.png}
body:
  text: 禮朋友之禮東漢書明帝永平二年上幸辟雍初行飬老禮以李躬為三老桓榮為五更三老服都紵大袍冠進賢冠扶玉杖乘輿到辟雍禮殿御座東廂遺使者安車迎三老五更於太學講堂天子迎於門屏交禮道自阼階三老升自賓階至階天子揖如禮三老升東面三公設几九卿正履天子親袒割牲執醬而饋執爵而酳祝哽在前祝饐在後五更南面三公進供禮亦如之禮畢引桓榮及弟子升堂上自為説諸儒執經問難於前冠帶搢紳之人圜橋門而觀聼者蓋億萬計録曰光武建立辟雍未及臨饗至是明帝親幸始行其禮今觀威儀文物之盛登降揖遜之周三代以後鮮見其倫嗚呼可謂善繼人之志善述人之事者矣惜乎特備於王公貴人公卿外戚而鮮及於天下是以詔令未申庠序未設期門羽林之士橋門冠帶之人不過觀聼之美所謂人倫孝弟無所關預而教化亦止於如斯而已上自為太子受尚書於桓榮及即帝位猶尊以師禮嘗幸太堂府令榮坐東面設几杖會百官及門生數百人上親自執業諸生或避位發難上謙曰太師在是既罷悉以大官供具賜太常家榮每疾病帝輒遣使者存問大官太醫相望於道及篤帝幸其家問起居入街下車擁經而前撫榮垂涕賜以床茵帷帳刀劍衣被良久乃去自是諸侯將軍大夫問疾者不敢復乘車到門皆拜床下榮卒帝親自變服臨喪送葬賜冢塋于首山之陽録曰夫邪正不並立儒釋不同行有天地然後有儒佛乃何為者哉帝知崇儒養老而又事佛乎何也曰此葉公之通患也夫儒之貴不在於章句猶龍之靈不在於爪牙以二帝三王之所務而求之三老五更之所稽猶以神靈變化之設施而望於蛇蜓蜓蜴之蠢動也雖然豈惟儒哉佛以空虛寂滅即心見性自然惠覺安在其四十二章之傳乎然則沙門之所精亦桓榮之所稽者而儒與佛胥失之矣崔駰博學有偉才盡通古今訓詁百家之言少善屬文遊太學與班固傅毅齊名常以典籍為業未遑仕進元和中肅宗始修古禮巡狩方嶽駰上四巡頌以稱漢德辭甚典美帝雅好文章自見駰頌後嗟嘆之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣説之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之駰由此候憲憲屣履迎門笑謂駰曰亭伯吾愛詔交公公何得薄哉遂揖入為上客録曰愚觀肅宗之論二子蓋不但言語文字之間而其終身之得失利害已較然判矣駰前奏記數十指切長短至憲不能容而能潔身遠引所謂即鹿無虞幾不如舍者其能免禍宜矣固不教諸子多不遵法至吏人厭苦畏不敢發所謂婦子嘻嘻失家節者其終安得而不亡哉重雷義少同郡相友善俱學魯詩顏氏春秋太守張雲舉重孝廉重以讓義及義舉茂才亦讓於重太守不聼義遂陽狂後同舉孝廉俱拜尚書郎義代同時人受罪因遂見黜重見義去亦以病免故鄉里為之語曰膠漆目謂堅不如雷與陳録曰愚觀陳雷之事本末未詳史特其大較耳遐哉邈乎設使人人讓德比屋相推濟濟之俗不興於其時乎若乃王吉貢禹彈冠相慶庶幾近之至於朱博蕭育弗能及矣任延年十二學於長安明詩易春秋顯名太學號為聖童更始元年以為會稽都尉時年十九到任靜泊無為唯先遣饋禮祠延陵季子時天下新定道路未通避亂江南者皆未還中土會稽頗稱多士延到皆聘請高行如董子儀嚴子陵等敬待之以師友之禮吳有龍丘萇者隱居太末志不降辱王莽時連辟不到椽吏白請召之延曰龍丘先生躬德履義有原憲伯夷之節都尉灑掃其門猶懼辱焉召之不可遣功曹奉謁修書記致醫藥吏使相望於道積一歲萇乃乘輦詣府願得先備採録遂署議曹祭酒萇尋病卒延自臨殯不朝三日是以郡中賢士大夫爭往焉録曰史稱子陵披羊裘變姓名而逃觀諸任延所禮則固未嘗遁也時大蹇朋來延方以弱冠之年而能傾心下賢可謂不失中正之節者也卒能使龍丘感動願得備録孔子曰朋友死無所歸曰於我殯其斯長孫之謂乎北海管寧少與華歆邴原相友遊學於異國並敬善陳仲弓時天下大亂聞公孫度令行海外遂與原及王烈等避於遼東度虛館以候既往與語唯於經典不及世事乃因山為廬鑿坯為室越海避難者多就之旬月而成邑遂相與講詩書陳俎豆飭威儀明禮讓非學者無見也由是度安其賢民化其德所居屯落會井汲者男女雜爭寧患之乃多買器分置井傍汲以相待而不使知來者怪之問知寧所為乃各相責讓不復爭擾鄰有牛暴田為牽著涼處自為飲食子主大慙若犯嚴刑禮讓移於海表黃初四年詔舉獨行君子司徒華歆薦寧詔以為大中大夫固辭不受明帝即位歆為太尉遜位讓寧亦辭疾自越海及歸常坐一木榻積五十餘年未嘗箕股其榻上當膝處皆穿行年八十志無衰倦偃息窮巷飯鬻糊口吟咏詩書不改其樂困而能通遭難必濟經危蹈險不易其節金聲玉色久而彌彰揆其終始殆天所祚録曰孔子曰言忠信行篤敬雖蠻貊之邦行矣寧澡身浴德遭亂弗迷臨治弗屈可謂邦有道不變塞焉邦無道至死不變者也其與華歆始焉不肯同席而坐終焉不可同日而語矣三國志劉備見徐庶於新野回謂備曰此間有諸葛孔明其人卧龍也將軍豈願見之乎備始曰君與俱來庶曰此人可就見不可屈致將軍欲見宜枉駕顧之備曰諾由是親往詣亮於隆中凡三顧乃得見録曰蹇之上六曰往蹇來碩吉利見大人時權御已移漢祚將傾險難之極也玄德冒險而起厄塞窮蹇又無倚賴茍非剛明之才碩大之輔佐之以濟險資之以紓難豈能出於蹇乎故其象為大善之吉其占為利見大人三顧之禮有由然哉然則所以勸備者雖由於庶而所以扶劉者先定於初矣豈偶然之故哉文中子王通父隆傳先王之業教授門人千餘嘗歌伐木而召通曰爾來自天子至於庶人未有不資友以成者也通於是有四方之志蓋授書於東海李育學詩於會𥟵夏琠問禮於河東關朗正樂於北平霍汲考易於族父仲華慨然有濟蒼生之心西遊長安見隋文帝上太平十二策遵王道推霸略上不能用遂歸教授於河汾之間乃續詩書正禮樂修六經贊易道九年大就門人自遠而至河南董常太山姚義京兆杜淹趙郡李靖南陽程元扶風竇威河東薛收中山賈瓊清河房玄齡巨鹿魏徴太原溫太雅頴川陳叔通等咸北面焉從父王圭曰積亂之後當生大賢世習禮樂莫若吾族振斯文者非子誰歟及卒門人議曰吾師其至人乎自仲尼以來未之有也易曰黃裳元吉文在中也請縊曰文中子緦麻設位哀以送之録曰按東臯子王績與尚書陳叔逹書曰貞觀初王凝為監察御史彈侯君集事連長孫太尉由是獲罪時杜淹為御史大夫密奏凝直言非辜於是無忌與淹有隙而王氏兄弟皆抑不用矣及叔達撰隋史淹時所撰文中子世家逹之陳公亦避太尉之權藏而未出後魏徵適奏事見太尉曰君集之事果虛耶御史當反其坐果實耶太尉何疑焉於是意稍解其後君集果誅然則通之不幸非有大故也而史實遺之無足怪矣至樵作通志顧亦之循其舊不為立傳果何為哉然則何貴於君子述作之功而為千古斯文之幸乎録之唐書儒學傳貞觀六年詔定孔子為先聖顔子為先師盡召天下惇師老德以為學官數臨幸觀釋萊命祭酒博士講論經義賜以粟帛生能通一經得署吏廣學舍千二百區諸生員至三千二百四方秀乂挾策負素坌集京師文治蝟焉勃興糾侈袂曳方履誾誾秩秩雖三代之盛所未聞也録曰自古民生於三事之如一太宗可謂無負君師之責矣然豈知君子之道費而隱者也外而高昌百濟新羅吐蕃遣子入學內而閨門之內蕭墻之間不能無慚德焉此天地之大人猶有憾焉者而挾策負素固不若鳶飛魚躍之妙矣唐之所以不如三代也十七年定太子見三師儀迎於殿門外先拜三師答拜每門讓於三師三師坐太子乃坐其與三師書禮皆前後稱名惶恐録曰太宗之尊三師可謂至矣以王圭為魏王師則先拜以玄齡為太子師則又先拜至是著為定式俾其子孫世守之奈何不旋踵而忽亡其故何歟彼三師之設肇自周公內有元聖之德外抗伯禽之法則師道立矣彼李績者帝以朝四暮三畜之彼亦以朝三暮四應之則凡拜揖進退之間坐立疾徐之際祇如登場之戲術耳何足貴哉蓋不但旋踵之間可以廷辱師傅而五王之禍亦且不遠矣此録之意也高士廉都督益州為文會命儒生講論經史勉勵後進學校粲然復興有朱桃椎者隱居不仕沉浮人間竇軌鎮益聞而召見遺以衣眼逼為鄉正桃椎口竟無言棄衣於地逃入山中夏則裸形冬則樹皮自覆贈遺一無所受每為苦履置於路側見之者曰居士履也為鬻米置本處桃椎至夕而取之終不與見議者以為焦光之流士廉下車以禮致之及至降階與語每令官僚存問以近代以來多輕隱逸士至是獨加褒禮蜀中以為美談録曰蜀有蠻夷之風不但文翁一人君平一事可以相屬而欲廉頑立懦茍非加意於至賤不能揚其波非挹損子至貴不能顯其化此褒禮下士不得不為美談也會昌中白樂天居洛與胡吉劉鄭盧張等六人皆多年壽於東都履道坊合尚齒之會又有二老李元爽及僧如滿亦與斯會皆圖名賡唱并寫其形貌以為勝事至宋杜祁公衍與太原王涣河東畢世長沛國朱貫始平馮平咸以耆年挂冠優遊暇日為睢陽五老會賦詩酬和恰然相得形於繪事以紀其盛元豐中潞公文彥博雖窮貴極富而平居接物謙下尊德樂善如恐不及邵雍程皓程頤皆以道自重賓接之如布衣交時富韓公以司徒致仕乃集洛中公卿大夫年德高者為耆英會尚齒不尚官就資聖院建大厦曰耆英堂繪像其中宣徽使王拱宸留守北京貽書潞公願預其會獨溫公年未七十潞公素重其人請入會凡十三人洛陽多名園古剎有水竹林亭之勝諸老鬚眉皓白衣冠甚偉每宴集都人隨觀之潞公又為同甲會司馬郎中旦程大中珦席司徒汝言皆丙午人也亦繪像資聖院溫公又為真率會皆洛陽太平盛事也士庶又生祠潞公於資聖院取神宗送公判河南詩𨽻於榜曰佇膽堂塑像其中冠劍偉然都人事之甚肅録曰洛陽天下之中鳧鷖既醉之風不知幾及見矣數老者國家之元氣太平之楷範也伯夷太公不得專美於前矣録之宋名臣録楊時聞程皓兄弟講孔孟絶學於河洛調官不赴以師禮見皓於頴昌相得甚歡其歸也皓目送之曰吾道南矣及皓卒又師事程頤於洛蓋年四十矣一日頤偶暝坐時與遊酢侍立不去頤既覺則門外雪深一尺矣録曰孟子曰以德服人者中心悅而誠服也如七十子之服孔子也此程門之立雪千古以為美談也歟列傳陳師道年十六以文謁曾南峯一見奇之許以文著願留受業熙寧中王氏經學盛行師道心非其説遂絶意進取性復高介有節安貧樂道初遊京師未嘗及貴人之門傅堯俞欲識之以問秦觀觀曰是人非持刺字俯顔色伺候公卿之門者殆難致也堯俞曰非所望也吾將見之懼其不吾見子能為我紹介乎又深知其貧懷金欲餽比至聽其論議益敬畏不敢出章惇將荐於朝亦屬觀延至師道答曰辰諭以章公降屈年德以禮見招不佞何以得此豈侯嘗欺之耶公卿不下士尚矣乃特見於今而親於其身幸孰大焉豫雖不足以齒士猶常從侯之後然以先生之制士不傳贄為臣則不見於王公俾為士者世守焉師道於公前有貴賤之嫌後無平生之舊公雖可見禮可去乎且公之見招蓋以能守區區之禮也若昧冒法義聞命走門則失其所以見招又何取焉雖然幸公之他日成功謝事幅巾東歸師道當御欵假乘下澤候公於東門外尚未晚也終不往録曰萬章問曰不見諸侯何義孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人庶人不傳贄為臣不敢見於諸侯禮也又曰往役義也往見不義也又曰且君之欲見之也何為也哉為其多聞也為其賢也則天子不召師而况諸侯乎此禮不明久矣以曾南峰而史稱其為人行義不如政事政事不如文章况其他者乎此所以一見許以文著未敢以節稱也而師道乃能深致禮焉賦詩如一瓣香之敬不盡年之悲篤信守義罕見其儔嗚呼若人者可謂青出於藍者矣明王直撰李時勉贈行序云正統十二年祭酒李先生乞骸致仕六館諸生倀然若無所依先是諸生服先生之教而蒙其德五六年敬愛如父母至是無可奈何乃言於上取其平日行事為十題良工繪圖諸在廷各識以言及行太學師生送者凡二千餘人諸教坊樂工槌大鼓雜以金石絲竹之音宣然前導遠近觀者塞路一時道傍行旅至不得往來商賈亦為之罷巿莫不嘖嘖稱美以為榮至有為之泣下者以為自國朝七八十年以來未見其比俾後世傳之足以見今日尚賢之美是所以為邦家之光也録曰宋臣有言隆之以虛禮不若推之以至誠子觀祭酒李先生之去衣冠禮樂填街塞市何其盛也至明年己巳之變兵甲壯士彌山滿谷又何其憊也誠使正人者珍重信任留之闕廷將姧人可杜邪謀可塞奈何首木方除乞骸遂篤至諸生無可奈何嗚呼觀此一詞刖伏闕呌閽所由以起而訖於權姧不得不為虛禮之文以光先生也故當時贈者以為尚賢之美而識者實懷憂國之歎焉此又不可不知明臣録尚書吳文定公寬生有異質未冠入郡庠流輩方務舉業獨博覽群籍為古文詞下筆輒有老成風格然屢試不第將絶意仕進不復應舉值天台陳選董學南畿知非凡舄命有司以禮敦遺至京闈遂中第三會試第一入試大廷狀元及弟先是由貢入太學東海張汝弼見之曰天下有如此貢士也哉江陰卞華伯亦有低頭拜東野之句徐武功性高邁少許可折節與交曰館閣器也及入翰林凡有作即傳播中外位益高望益重學者稱為匏庵先生録曰夫禮也者起也起者作興之謂也時文定久需於次一旦得有道者資以敦遣於尋常者蓋萬萬也故勃然而頭角崢聳焉而際會異然則禮之於士其可少哉其可少哉布衣陳真晟漳州龍溪人本出海濱骨格高聳神氣肅清望之非塵埃中人年十七八即能自拔流俗專心致志以儒為業業成期薦有司至福州閩有司防察過嚴無待士禮乃辭歸自是不復以科舉為事務為聖賢踐履之學至江西張元鎮扣其學大加稱許曰禎敢僣謂所也為程朱以來惟先生得其真吳許二子亦未是遂歸鎮海莆人雖多儒家自布衣而學術始淳與鄉人李文舉諸前輩講行文公家禮而風俗始正至今猶傳之云録曰李文毅之贈送弟子所以崇其師也吳文定之敦遣師所以隆其弟子也若夫陳剩夫之從好非師非弟所以自待也三者皆朋友之禮之不可缺者也故終焉弘道録卷之三十六
