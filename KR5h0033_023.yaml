  text: 弘道録卷之三十將七
  hash: sha256:e1fb45114e6c0984b3bad7859b48b354b9c285d8d1fe25ac8d970cd39ccf19f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_023-001a, image: hfl/1074/1074-084.png}
body:
  text: 禮君臣之禮宋記太祖皇帝常讀二典嘆曰堯舜之時四凶之罪止於投竄何近代法網之密耶於是立法鞭朴不行於殿陛罵辱不及於公卿故自開寶以來犯大辟非法埋深害多得貸死惟臧吏棄市未嘗容貰録曰此宋朝家法過漢唐後世鮮能及也夫禮義廉耻人主所以鼓動維持舉末世於三代之隆者縉紳之所以異於閭閻人類之所以異於禽獸君子之所以别於凡民所繫蓋不細也至於臧吏尤為至切一有所犯率至不宥所以終宋之世雖臣下有罪苟非臧犯法當竄逐人君自請與一善地未聞有受杖而斃受戮而辜者豈非祖宗用心之厚子孫守法之善乎太宗嘗召翰林學士竇儀草制儀至苑門見上岸幘跣足而坐因却立不肯進太祖遽索冠帶而後召入儀遂言曰陛下創業垂統宜以禮示天下恐豪傑聞而解體也太祖斂容謝之由是對近臣未嘗不束帶録曰帝之窒欲非古人之多欲者其岸幘跣足一時之偶耳索冠斂容出于本心非有所矯揉而為之也儀本以厚重見推豈肯陷其君於無禮哉其郤立不進庶幾自重之義嗚呼君臣之間兩得之矣太宗太平興國八年親試禮部貢士於講武殿始分三甲錫宴于瓊林苑寵之以詩遂為定制録曰鹿鳴之宴賓興之盛與也瓊林之宴俊造之殊恩也我朝名恩榮宴特異於是又制百官朝服稱賀致詞曰天開文運賢俊登庸禮當稱賀則又非常禮之可比也言行録仁宗天聖四年侍講胡瑗當召對例須先就閣門習儀瑗曰吾平生所讀書即事君之禮也何以習為閣門奏准令就舟次習之上亦不之强人皆謂山野之人必失儀及登對乃大稱㫖上謂左右曰胡瑗進退周旋舉合古禮録曰今時朝見之禮俱赴鴻臚寺習儀正恐草莽不知此乃定例著於典章若瑗之破例又可以見人主聖德優容無所不至而盛時氣象亦略可占矣録之列傳神宗熙寧元年富弼入覲許有輿至殿門帝御內東門小殿令其子掖以進且令毋拜坐語從容訪以治道弼知帝果於有為對曰人主好惡不可令人窺測苟可測則姦人得以傅會當如天之監人善惡皆所自取然也禍福隨之則功罪無不得其實矣又問邉事對曰陛下臨御未久當布德行惠願二十年口不言兵帝默然至日昃乃退録曰當仁宗之相弼也嘗有言曰隆之以虗禮不若推之以至誠今觀肩輿至殿坐語毋拜所謂禮也諫則必行言則必聼所謂誠也以帝之初政如日方升而弼之者成如蓍方决誠哉對病之藥立效之砭乎奈何其不然也轉沛然之勢而為默然之應虛禮雖隆推誠未至觀於二帝之間而其得失之判若霄壤矣哲宗元祐元年詔太師文彥博平章軍國政事時年八十一矣彥博逮事四朝任將相五十年名聞四夷契丹使耶律永昌來聘望見其人於殿門外却立改容曰此潞公也間其年日何壯也蘇軾曰使者見其容未聞其語其綜理庶務雖精練少年有不如其貫穿古今雖專門名家有不逮使者拱手曰天下異人也西有名馬請於邉吏願以餽詔許之其為外國所敬如此至是司馬光言其宿德元老宜起以自輔宣仁太后乃有是命特隆其禮令班宰相上六日一朝兩月一赴經筵古今罕以為比時公對上泰甚進士唱名侍立終日上屢却曰太師少休公頓首謝立至去及程正叔為侍講以師道自居每侍上色甚莊繼以諷諫上畏之或謂正叔曰君視潞公何如正叔曰潞公三朝大臣事幼主不得不恭吾以布衣為上師傅其敢不自重此吾所以不同也録曰孟子曰曾子師也父無也子思臣也微也曾子子思易地則皆然故以潞公而當正叔之任必不肯廢坐講之禮以正叔而居潞公之位又豈能易敬愼之常乎蘇軾為翰林學士每經筵進讀至治亂興衰邪正得失之際未嘗不反覆開導覬有所啓悟嘗銷宿禁中召見便殿太皇太后問曰卿今為何官對曰待罪翰林曰何以至此對曰遭遇太皇太后皇帝陛下曰非也豈大臣論薦乎曰亦非也軾驚曰臣雖無狀不敢自他途以進曰此先帝意也先帝每誦卿文章必嘆曰奇才奇才但未及進用卿耳軾不覺哭失聲太皇太后與帝亦泣左右皆感涕已而命坐賜茶徹御前金蓮燭送歸院程頤請就崇政延和殿講讀上疏曰臣近言邇英漸熱只乞就崇政延和殿聞給事中顧臨以延和講讀為不可臣料臨之意不過謂講官不可生於殿上以尊君為說爾臣不暇遠引只以本朝故事言之太祖皇帝召王昭素講易真宗令崔頤正講尚書邢昺講春秋皆在殿上當時仍是坐講立講之儀尺始於明肅太后之意此又祖宗尊儒重道之盛矣豈獨子孫所當為法萬世帝王所當法也今世俗之人能為尊君之言而不知尊君之道人君惟道德益高則益尊若勢位則崇高極矣尊嚴至矣不可復加也録曰程頥之議坐講也凛乎其正蘇軾之見便殿也歡乎其遇一則宋朝家法遠過漢唐一則太后慈仁有同堯舜百世之下令人起敬起慕之不置也豈不美哉禮志太祖即位之明年太常博士聶從義上三禮圖詔集儒學之士詳定之開寶中命中丞劉溫叟舍人李昉知制誥盧多遜補闕賈黃中員外郎和峴等撰開寶通禮二百卷本唐開元禮而損益之既又定通禮義纂一百卷太宗尚儒雅修明典章大抵曠廢舉矣真宗承重熙之後契丹通好天下無事於是封泰山祀汾陰蓋一時彌文之制也先是天禧中陳寬編次禮院所承新舊詔勑不就仁宗天聖初太常博士王皡始取國初至乾興所下詔勑删去重復類以五禮之目為禮閣新編六十卷景祐四年賈昌朝撰太常新禮及祀儀皇祐初文彥博又撰大饗明堂記二十卷至嘉祐中歐陽修纂習散失命官設局主通禮而記其變及新禮以類相從為百卷賜名太常因革禮異於舊者蓋十三四焉録曰愚觀史之微意雖未露而為仁宗致惜不既多乎何也太祖承五代之亂雖以襌受而王未能身任制作之實太宗當興國之運昆從多致慙阻何有盡善盡美之圖真宗彌文之制不滿者多矣至於仁宗當積德百年之餘正制禮作樂之日且帝之所禀者以仁存心以禮存心其所施者以莫不愛以莫不敬而溥天率土恆敬恆愛又非他君可以倣佛其萬一也茍有如周公者輔而相之建中和之極兼總條貫金聲而玉振之何至率吏文之舊無著述之體如史之所惜哉且仁宗篤於好學嘗因王洙講周禮命畫車服冠冕籩豆簠簋之制而不能詳其制作之本以自企於三代之隆况其他者乎或曰使魯兩生遭逢其時果能制作乎曰不能也夫至禮與天地同序至樂與天地同和茍非天下之至誠盡己性以盡人之性盡物之性而贊天地之化育不能及也兩生雖能守魯之禮義然豈能致中和如子思所迷者哉而况於宋興人主之學惟務博覽如太平廣記册府元龜可以同曰語哉然則仁宗之所好亦不過器數之末而已無怪乎不能副所望也朱熹乞修三禮云臣聞之六經之道同歸而禮樂之用為急遭秦滅學禮樂先壞漢晋以來諸儒補葺竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特性冠義等篇乃其義疏耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以誦習而知其說自熙寧以來王安石變亂舊制廢罷儀禮獨存禮記之科棄經任傳遺本宗未其失己甚而博士諸生不過誦其虗文以供應舉至於其間亦有因儀法度數之實而立文者則咸幽冥而莫知其源一有大議率用耳學臆斷而已臣頃在山林嘗與一二學者考訂其說欲以儀禮為經而取禮記及諸經史雜書所載有及於禮者皆以附於本經之下具列注疏諸儒之說略有端緒而私家無書檢閲無人抄寫久之未成會蒙除用學徒分散遂不能就欲望聖明特詔有司許臣就祕書省關借禮樂之書自行招致舊日學徒十餘人踏逐空間官屋數間與之居處令其編類雖有官人亦不繫銜請俸但乞逐月量支錢米以紿飲食紙札油燭之費其抄寫人下臨安府差撥貼書二十餘名侯結局日量支犒設别無推恩則於公家無甚費用而可以興起廢墜垂之永久使士知實學異時可為聖朝制作之𦔳則斯文幸甚録曰以宋子之疏終焉者宋自中葉濂洛關閩諸賢輩出周子曰陰陽理而後和故禮先而樂後曰優柔中平德之盛也天下化中治之至也是謂道配天地古之極也程子曰禮所以立身也安禮而和樂斯為盛德矣曰禮之所尊尊其義也失其義存其數祝史之事也張子曰禮所以持性禮本出于性持性反本也曰禮非止著見於外亦有無體之禮除了禮天下更無道矣朱子曰禮是天理之當然缺他一毫不得添他一毫不得惟是聖人之心與天合一故行出這禮無一不與天合嗚呼斯數言者豈非制作之本歟苟使群哲得其位行其道宋之一代禮樂必有以參於先代者奈何徒自修之于下未見逹之在上而王吕章蔡秦韓賈史之徒相繼居師相之位擅制作之權致使學士大儒無書檢閲無人抄寫之苦雖然尚有學徒可集及門可托較以今之勢利併與學徒及門無聞焉而甘心毛頴自相對局其為蜜落又何雪什伯乎皇眀詔令洪武五年詔曰朕聞三皇立極五帝遵教蓋未備之時宜君人示其所以三代循之民用和眭自周至於漢唐宋增減益周國乃用昌民受時宜家和永康朕蒙皇天后土之恩命統天下祖宗之靈百神祐護得正帝位朕本草芥之士失習聖經况推强撫順二十餘年常無寧居一槩粗踈故道理未臻民不見化鄉市閭里尚染元俗天下大定禮儀風俗可不正乎兹有所示諭爾臣民詔書到後敢有不遵者問擬如律録曰聖祖此詔其賢于馬上之習乎夫啇君棄禮義捐廉耻流禍穢於千古漢自三章之約曾無片言及之陸賈時時稱說則謝曰安事賈生痛哭流涕則謙曰不遑未見以禮義風俗措一言發一令者此所以終漢之世襲秦雜霸無由變革豈若大明麗天頽俗沒地斯民丕變天下大同者哉臣幸躬逢其盛録之聖政記國初時御臣以禮常賜參政陶安門帖曰國朝謀略無雙士翰苑文章第一家召集江南宿儒議禮命為總裁又賜學士宋濓飲親賦辭一章曰俾後世知朕君臣同樂若此也及濓致仕贈以衣三襲因問卿今年幾何曰六十有八上曰藏此綺俟三十二年作百歲衣也初濓請歲一來朝是年九月入朝上佇想久及至大喜遣儀曹奉醪膳諸物抵寓館以賜遂日侍上遊歷觀闕盤旋禁禦詢咨備至便殿侍食曰晏始退嘆曰純臣哉及甘露降上召公賜坐躬執金杓煉湯於鼎以甘露投之手注於巵曰此和氣所凝能愈疾延年故與卿共之耳録曰此又賢於溺冠慢儒者夫東園綺里漢不能致而浙之四儒明祖首招致之矧當塗之陶其所造濂洛關閩之學與四先生當亦不殊此所以光有四海無復腥膻污穢之氣象正由禮貌名儒遠追皇王聖帝之遺風也嗚呼盛哉永樂中吏部尚書蹇義歷少師九載户部尚書夏原吉陟少保亦經三考皆賜勑嘉奬有淳良篤實如古名臣之諭既賜宴禮部又親宴之别殿各賜銀章一顆其文曰繩愆䋅繆且諭之曰朕有過舉卿但具奏來以此識之朕不難於從善明年扈從巡邊既還上念二臣皆春秋高欲優逸之賜勑嘉勞命輟職務而仍其祿朝夕侍上備顧問謀議而恩禮益厚録曰自示我周行之後孰不以燕私為親怩為優禮為特恩敦有繩愆糾繆者哉唐太宗之丹霄殿玄武門不足多矣夫以二公之結知聖皇任以心膂信如蓍龜勢利不能奪讒間不能媒所謂淑人君子心如結兮者觀其不以私惠歸德務相引翼果於從善又可見上下交而為泰之時矣録之名臣録南京吏部尚書魏驥壽九十八既已進階榮祿大夫復因御史梁昉之請憲宗皇帝親諭禮部曰尚書魏驥壽及百齡兼有德望朕深嘉悅其勑遣行人存問賜羊酒有司月給米三石贍之先是公由松江訓導以禮自居薦為太常博士宣德中升考功員外郎轉太常少卿正統三年遷吏部左侍郎復升是職前後歷任有聲雖權右王振亦禮重之呼為先生贄禮惟帕一方亦不較景泰改元至京時閣老陳循公主試時所取士也請曰先生雖位冢宰未嘗立朝願少待事在吾輩而已公不從退謂人曰渠將朝廷事為一已事安能善終録曰愚觀文靖起自校職卒登台鼎其始也勤於教育造就人才而已未聞有補天浴日之才華也其終也清愼有聲端重簡默而已亦未有旋乾轉坤之功業也蓋由祖宗列聖愛惜人才得以長久自效一時雖無赫赫之名久後常懷不盡之意故能使巨璫致敬內閣懇留若斯人者豈一朝一夕而致然哉卒之百年上壽元宰上卿孟子曰朝廷莫如爵鄉黨莫如齒輔世長民莫如德其諸文靖公之謂夫弘治乙丑武宗嗣位恭上兩宫尊號爰下優老之讓覃恩天下時太子太保吏部尚書王恕致政于家年及九十特隆璽書遣行人備繒帛酒餼加賜存問于時儀文繁縟寵靈焕赫蓋異數也公生永樂全盛時聞祖宗遺風餘烈歷宣德正統間沾富教之澤歷內寺外郡以至方嶽天順勵精暨於成化力自振奮彈壓權貴劾邪佞而置之法一咈意則浩然引去身退而名益高弘治初特起為執法秉政復為讒邪所間竟不失其正以去殆今敦龐碩大著書玩易閲天下義理不少休且餘啖動履强健宛如五六十歲人諸公凋謝之餘國家更化之後而獨巍然以存信乎天下之大老也録曰儲柴墟之壽三原曰惟魏文靖公與公名位德誼相上下至於論功與言則文靖似不及愚謂人惟名德相高而已魏有門生如陳閣老勸之少留毅然不變非惟不為所染其所料鑿鑿無爽當今之世而有若人乎哉然則功與言當在第二義也嘉靖初勑諭致仕大學士謝遷朕惟人臣立朝得行其志建功立業固難而退處其鄉壽考康寧完名全節足以繫天下之望尤為不易卿性資端方器識宏遠粵自蚤年潜心正學遂以文章大魁天下蜚聲翰苑譽望彌隆逮我孝皇簡注有素爰自宫端擢居內閣朝夕獻替不激不隨愼守彝章護惜善類延訪于便殿顧問于平臺危言讜論禆益弘多當時政化清美實惟二三大臣佐埋之功暨聞末命付託諄切益感知遇誓謁誠悃武皇之初協心匡弼其殿然不可回之氣往往形于詞色直道難容告老而歸高風大節播在天下中遭權姦橫加讒抑旋復昭明人咸欽仰之不置乃今年躋七秋體履安康子姓蕃茂全德盛名求之前代不多見焉朕嗣承天序圖新治理惟卿纍朝耆舊實軫朕懷矧夫公論明揚可以見卿之賢於人遠矣特遣行人賫敕存問用表異數卿其體朕至意頤養天和茂膺壽祉用表儀於天下則非特卿一卿一邑之光而己録曰今上嗣位之初不遑他務首遣行人賫勑存問洛陽劉公洪洞韓公餘姚謝公一時元老蓋三焉録止謝公者以親手捧綸音躬行大禮目擊其盛非口耳傳聞之比故備録之以終百代君臣之禮之式弘道録卷之三十
