body:
  text: 信君臣之信漢書楚懷王與諸將約先入定關中者王之當是時秦兵強常乘勝逐北諸將莫利先入關獨項羽怨秦之殺項梁奮身願與沛公西入關懷王諸老將皆曰項羽為人慓悍猾賊嘗攻襄城襄城無遺類諸所過無不殘滅不如更遣長者扶義而西告諭秦父兄秦父兄苦其主久矣今誠得長者往無侵暴宜可下羽不可遣獨沛公素寬大長者可遣懷王乃不許羽而遣沛公西略地録曰楚懷王豈比于漢更始乎懷王優沛公而否項羽觀其遣將之言庶幾南面之庶然而卒陷強暴之辱所謂過涉滅頂不可咎者也更始忌劉稷而並執演觀其愧怍之態真乃庸劣之流然而自取賊劉之辜所謂何校滅耳聰不明者也夫是而有異也沛公既定關中乃悉召諸縣父老豪傑謂曰父老苦秦苛法久矣誹謗者族偶語者棄市吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法諸吏民皆按堵如故凡吾所以來為吾父老除害非有所侵暴無恐且吾所以還軍霸上待諸侯至而定約束耳乃使人與秦吏行縣鄉邑告諭之秦民大喜爭持牛羊酒食獻軍士沛公又讓不受曰食粟多非乏不欲費民民又益喜唯恐沛公不為秦王録曰西漢二百年之業所以卒定于關中者約法之肇也孟子曰地利不如人和賈生之論亦曰仁義不施而攻守之勢異今觀漢庭之論紛紛不一婁敬田肯之徒不足深究至于張良之智宜乎有見顧亦蹈奉春之緒餘而不切根本之實意殊不知三章之約賢于百二之形按堵之情便于建瓴之勢雖欲勿用山川其舍諸然則金城之固寧比于父老之心沃野之饒孰愈于壼漿之薄羽雖能違一時之約獨能拔百世之鼎乎文帝初封代王諸吕既誅大臣相與謀議迎立代王群臣張武等皆曰漢大臣故高帝時將帥習兵多謀實不可信願稱疾無往以觀其變中尉宋昌曰不然秦失其政豪傑並起人人自謂得之然卒踐天子位者劉氏也以吕太后之嚴擅權專制然而太尉以一節入北軍一呼士皆左袒為劉氏卒滅諸吕此乃天授非人力也大王賢聖仁孝聞于天下故大臣因天下之心而迎立大王大王勿疑也代王至長安太尉勃請間宋昌曰所言公公言之所言私王者無私太尉乃跪上天子璽符夜拜宋昌為衛將軍領南北軍以張武為郎中令行殿中録曰文帝二十三年之天下決信于宋昌之片詞張武等固不逮也其却太尉之請詞意確然益足以見其存心之篤矣孰謂區區代邸而有斯人哉有斯人哉帝之侯昌良有以也而張武等官不過九卿又足以表王者之無私矣豈其獨惜朱虛之寸土不以全大臣之信而安興居之心乎然則公言終有負而請間者不可以責矣文帝賜南越王他書曰朕高皇帝側室之子也棄外奉北藩于代道里遼逺壅蔽朴愚未嘗致書高皇帝棄群臣孝惠皇帝即世高后自臨事不幸有疾諸吕為變賴功臣之力誅之已畢朕以王侯吏不釋之故不得不立今即位乃者聞王遺將軍隆慮侯書求親昆第誚罷長沙兩將軍朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問修治先人冢前日聞王發兵于邉為寇災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰高皇帝所以介長沙士也朕不得擅變焉今得王之地不足以為大得王之財不足以為富服領以南王自治之雖然王之號為帝兩帝並立亡一乘之使以通其道是爭也爭而不讓仁者不為也願與王分棄前惡終今以來通使如故陸賈至南越南越王頓首謝罪願奉明詔長為藩臣奉貢職録曰孔子告子張曰言忠信行篤敬雖蠻貊之邦行矣夫南越尉他逋誅之一物耳雖微堂堂萬乘亦孰不諱側室之言乎借使不諱敦不矜誇中國之盛兵甲之強乎而不知天以完德命于帝帝以完名恣于己其出言本于吾心非有所勉強真可以貫金石而及豚魚矧夷狄蠻貊猶夫人者耶其中心悅而誠服亦不啻出於自然而豈由于勉強哉子張徒能書諸紳而不能見諸行帝之天資吻合雖無參前倚衡之功而實有明效大驗之著可見聖人立言于天地間若化工之顯於物無伺耳耳而提面面而命之矣又遺胸奴單于書曰皇帝敬問胸奴大單于無恙頃遺朕書願寖兵休士除前事復故約以安邉民世世平樂朕甚嘉之此古聖王之志也漢與胸奴約為兄弟所以遺單于甚厚其背約離兄弟之親者常在胸奴然右賢王事已在赦前勿深誅單于若稱書義明告諸吏使無負約有信敬如單于書録曰愚觀帝之與胸奴約豈如春秋要質鬼神刑牲歃血者哉其誠信出於本心如書中所言譬則天地之無不持載無不覆幬真得帝王制御夷狄之道也不徒有以信之而又有以待之胡越一家華夷一體百世之後見此一日也豈不盛哉上嘗行出中渭橋有一人從橋走乘輿馬驚使騎捕之時張釋之為廷尉奏以此人犯當罰金上怒曰此人親驚吾馬馬賴和柔令他馬固不傷敗我乎而廷尉乃當之罰金釋之曰法者天下公共也今法如是更重之是法不信於民也其後有人盜高廟座前玉環得亦下廷尉治釋之奏當棄市上大怒曰此人無道盜先帝器吾欲致之族而君以法奏之非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也今盜宗廟器而族之假令愚民取長陵一柸士陛下且何以加其法乎上乃許之録曰人知釋之守法而不知帝之能用法也夫天下不患法之不公而惟人主不能用法之過臯陶曰在辟帝亦曰在辟臯陶曰在宥帝亦曰在宥者能用法也言足以拒諌智足以飾非以為天下皆出于己之下者不能用法也是故墨鼻不已至于炮烙炮烙不已至于刳剔者豈皆無法哉漢自三章之後至文帝除肉刑除收拏相坐除誹謗妖言其心于愛民之本者矣犯蹕盜環一時之怒私也罰金棄市三尺之法公也惟不欲以私害公故不終以情撓法帝可謂天地日月矣過此若張社郅寧之流專以人主之意指為獄則當時之為君者從可知矣嗚呼長陵柸土臣子所不忍聞也人匪言之不能如此畏忌何哉故曰知釋之之守法而不知帝之能用法不知法者也倪寬武帝時為中大夫遷左內史既治民事乃觀農桑緩刑罰理獄訟畢體下士務在得人心擇用仁厚士推情與下不求名聲吏民大信愛之至收租稅時裁闊狹與民相假貸以故租多不入後有軍發竟以負租課殿當免民聞惟恐失之大家牛車小家負儋輸租不絶課更以最後積官至御史大夫録曰寬本儒生其治民謂之儒則可謂之法則未也何也當今直指之官以假貸為防一書殿最輒不可易况以軍興從事乎漢之罔疏禁闊尚猶及見此等風俗此等風俗賢于季世逺矣非其人之溫良守之介特安能若是耶不然狙檜之尤狡滑之雄何處無之而能大家牛車小家擔負果孰使之哉乃知信愛孚于刑辟儒官優于俗吏不可以不録也宣帝時張安世杜延年並列九卿二人忠信自著謹愼周密外內無間每定大政已輒移病出自朝廷大臣莫知其與議也嘗有所薦其人來謝即大恨以為舉賢逹能豈有私謝耶有郎功高不調自言安世應曰君之功高明主所知人臣執事何長短而自言乎幕府長史遷辭去之官問以過失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名迹逺權勢如此故天子甚尊憚大將軍然內親安世心密于光焉延年亦安和偹于諸事久典朝政上信任之出即奉駕入給事中是時四夷和海內平大將軍滅後獨能保固終始天下稱之録曰自夫子犁牛騂角之踰往往論人者不當係於世類大賢且然矧安世延年乎而論者必曰天道好還蓋淺之也天豈屑屑于其間哉已為不善則天下後世曰不善之人也已為善則天下後世皆曰善人也豈不益可信哉不覩已然而逆其未然吾未見其能觀人也若二臣之忠信謹厚正吾夫子所謂雖欲勿用山川其舍諸者然則聖人之論大旨高此又可見韓延壽為頴川太守郡多豪強難治先是趙廣漢患其俗多朋黨故搆會吏民令相告許延壽欲更之恐百姓不從乃歷召郡中長老為鄉里所信向者設酒食親與相對問以謡俗因與議定嫁娶喪祭儀品略依古禮不得過法及收租賦先明布告其日以期會為大事其始若煩後吏無追捕之苦民無箠楚之憂皆便安之接待下吏恩施甚厚而約誓明或有欺負之者輒自刻責豈其負之何以至此百姓遵信其教數年頴川大治後入為左馮翊行縣至高陵民有昆弟訟田延壽大傷之曰幸得備位表率不能宣明教化至令民有骨肉爭訟既傷風化咎在馮翊因入卧傳舍閉閣思過令丞嗇夫亦皆自繫待罪于是訟者傳相責讓皆自髠肉祖謝願以田相移絡死不敢復爭延壽大喜乃起聽事郡中翕然莫不轉相飭厲不敢犯于是恩信周遍二十四縣莫復以詞訟自言者録曰愚觀延壽似有意于移風易俗使吏民回心而向善者然而卒不能善其終何耶先儒有言凡三代以下人物皆血氣用事不若三代以上純任德性嗚呼斯言也不但延壽為然趙蓋與楊莫不然也漢廷至此元氣已索然矣而卒蹈好信不好學之戒未免傷害於物故有望之之許不知正吾夫子之所惡也嗚呼惜哉趙克國時先零諸羌叛宣帝使丙吉問誰可將者克國自言無踰老臣復問將軍度羌虜何如對曰兵難遙度願至金城圖上方略略大發兵詣金城常以逺斥堠為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰虜雖數挑不肯輕動欲以威信招降罕开及劫略者伺虜謀解散徼其疲劇乃擊之酒泉太守辛武賢奏以七月出兵擊罕开克國以為先零首為畔送先誅先零則罕开之屬不煩兵而服璽書報從克國計焉罕开竟不煩兵而下録曰愚觀古人立功悉由在上信任之專在己自信之篤往往以威信服人不肯輕試者為是故也夫有宣帝之明丙魏之忠一時也武賢奏七月出兵此一時也使無確然之見定於胸中詔進則進詔止則止所謂弟子輿尸者也為君相者不信為將之方略而以人言參乎其中有利不知有益不恤所謂師或輿尸者也上下俱凶彼此不信其能成功鮮矣後世所當深戒也東漢書初宛人李通事劉歆好星曆讖記云劉氏復興李氏為輔私常懷之及班彪避難天水隗囂問曰往者周亡戰國並爭天下分裂數世後定意者縱橫之事復起于今乎將承運迭興在于一人也對曰周之廢興與漢殊異昔周爵五等諸侯從政本根既微枝葉強大故其末流有縱橫之事勢數然也漢承秦制改立郡縣主有專己之威臣無百年之柄至於成帝假借外家哀平短祚國嗣三絶故王氏擅朝因竊號位危自上起傷不及下是以即真之後天下莫不引領而嘆十餘年間中外搔擾逺近俱發假號雲合咸稱劉氏不謀同辭方今雄桀帶州域者皆無七國世業之資而百姓謳吟思仰漢德已可知矣囂曰生言周漢之勢可也至于但見愚人習識劉氏姓號之故而謂漢復興踈矣昔秦失其衆劉季逐而羈之時人復知漢乎彪乃著王命論以為漢德承堯有靈命之符王者興祚非詐力所到欲以感之及諸將勸帝即位同舍生強華自關中奉赤伏符曰劉秀發兵捕不道四夷雲集龍鬥野四七之際火為主群臣因復奏曰受命之符人應為大萬里合信不議同情周之白魚曷足比焉今上無天子海內淆亂符瑞之應昭然著聞宜答天神以塞群望光武於是命有司設壇場六月己未即皇帝位録曰讖記之説先儒疑之是矣若歆之迎合好名通之附會好事非堂堂之議敦篤之諭也盍不觀彪之著論乎闡道談命察理識時其言鑿鑿可信確乎不拔東漢受命於此焉判當不必強華之言建武為有光矣惜乎諸將之不能也雖然今進有尤來大搶赤眉五校等未服退有隗囂公孫述竇融之徒未附茍非依附天命何以效順人心帝之崇信將以濟一時之權也及天下既定則當如武王之敬受丹書箕子之敷陳洪範孰不曰萬世帝王之大計乎乃亦徇區區已往之説至以決定武功剖斷祀典則惑矣此所以來鄭興之譏也郭伋少有志行哀平間辟大司空府三遷漁陽都尉世祖即位轉為漁陽太守時既罹王莽之亂重以彭寵之敗民多猾惡寇賊克斥伋到示以信賞紏戮渠帥盜賊銷散在職五歲户口增加後頴川盜賊群起徴拜頴川太守到郡招懷叛亡趙寵召吳等數百人其黨與聞伋威信逺自江南或從幽冀不期俱降駱驛不絶調伋為并州牧伋前在并州素結恩德及後入界所到縣邑老幼相攜逢迎道路始至行部到河西美稷有童兒數百各騎竹馬于道路迎拜伋問兒曹何自逺來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋計日告之行部既還先期一日伋為違信於諸兒遂止于野亭須期乃人録曰郭細侯諸兒之約何如魏文侯虞人之期乎夫虞人之期逰畋之樂耳雨不雨往不往不足論也天下初平盜名竊據者不可勝計仗吾之恩信有以懷狹之耳有如言出而隨食焉事異而輒更焉小事且然况于大事何以示信于人哉易曰無妄往吉其諸細侯所以得志也乎張綱以高第為御史明帝朝置八使巡行天下受命之部而綱獨埋其車輪于洛陽都亭曰豺狼當道安問狐狸遂效奏大將軍梁冀河南尹疑條其無君之心十有五事書奏冀大怒欲事以法時廣陵賊張嬰衆數萬殺刺史二千石言報操操義之及羽殺顏良拜書告辭而奔劉備於袁軍左右欲追之操曰彼各為其主勿追也録曰羽之刺顔良其張良之擊始皇乎惜乎無以借著之説告之者夫良之不欲立六國後即操之禽羽而破玄德也良之為韓報仇即羽之從備以興復漢室也而英雄無用武之地雖誓與共死其徒死乎果能以己之信義致操之感動與之共力滅袁而降表以迎劉備不其有庸乎以是報效曹劉庶幾兩得之也而區區刺一顔良抑末矣及曹操南擊劉表表卒子琮嗣遂舉州降操時劉備屯樊城或勸攻琮荆州可得備曰劉荆州托我以孤遺背信自濟吾所不為去過襄陽州人多歸比到當陽衆十餘萬至不得行日才十餘里或謂宜速行保江陵備曰夫濟大事必以人為本今人歸吾何忍棄去操以江陵有軍實恐備據之乃將精兵一日夜行三百餘里追及于當陽之長坂備棄妻子走及法正為劉璋軍議校尉與别駕張松忖璋不足有為陰説備取益州備疑未決以問龎統曰益州土沃財富可資大業備曰今指與吾為水火者曹操也操以急吾以寬操以暴吾以仁操以譎吾以忠每與操反事乃可成今以小利而失信義於天下奈何統曰逆取順守古人所貴若事定之後封以大國何負于信失今不取終為人利耳備始以為然留亮及關羽守荆州而自將步卒入益州録曰照烈之取荆益先儒論之多矣果何所折衷乎孔子曰君子貞而不諒孟子曰嫂溺授之以手者權也釋之者曰貞正而固也諒小信也嫂溺大故也手援小嫌也以正律小可以知義以小較大可以知權自兩漢之興不階尺土然未有若昭烈之困者也群雄並爭盜據攘竊亦未有若昭烈之時者也何也蓋立國必有分土若沛公已為漢王劉秀已為蕭王此公土也既而得隴尚猶望蜀備何如哉今年奔徐州明年敗下邳無尺寸之益圖王者顧如是乎至于表之據荆焉之據益非分土也不過乘時攘竊之耳矧又皆不祿然豈終為么孽之資姦雄之糜乎若乃臨亡之托乃區區小信非識時務俊傑之言也故孔明一則曰天以資將軍將軍豈有意乎又曰益州險塞天府之國如是尚未喻耶徒以授受之小嫌而忘天下之大故借使聲其違父棄命亡國降虜不孝之罪莫此為大當時何得而辭後世何得而議必不懷劉璋資給之恩而養虎遺患抗吭拊背之説俱可免矣一時失于見幾後終不能不取故朱子曰經權俱失此之謂也弘道録終弘道録俠二信君臣之信晉書羊祐之鎮襄陽緩懷逺近甚得江漢心與吳人開布大信其降者後欲去皆聽之在軍嘗輕裘緩帶身不被甲鈴閣之下侍衛不過十數人專務以德信懷吳每交兵刻日方戰不為掩襲之計將帥有欲進譎計者輒飮以醇酒使不得言軍或出行吳境刈穀為糧皆計所侵送絹償之每會衆江沔遊獵若禽獸先為吳人所傷而晉兵得之者皆送還之於是邊人悅服與吳鎮軍大將軍陸抗對境使命常通抗遺祜酒祜飲之不疑抗疾求藥於祜祜以成藥與之抗即服之人多諫抗抗曰豈有鴆人羊叔子哉每告其邉戍曰彼專為德我專為暴是不戰而自服也咨保分界而已無求細利録曰召伯之布政甘棠與羊祐之墮淚峴山同乎異乎蓋微君子必不能幽以燭之也夫晉自滅蜀之後未嘗一日而忘于吳張悌所謂彼之得志我之憂也而可為其所愚耶逺則陳氏之厚施近則吕蒙之示信可以為殷鑒矣為吳人者自宜卧薪嘗膽寖甲枕戈以保祖宗之基業尚猶不暇乃曰彼專為德我專為暴則是由于其術中而不自知也嗚呼暴不可也德豈誠哉醇酒之醉未醒伐吳之計屢上其曰吳人更立賢主則難圖也吁是果德耶信耶不過謀臣之略以亂敵之所為而已雖然視彼徒木立信所過無不殘滅者因為有間向非祐則預之功不立祜其人傑也哉唐書刑法志太宗親録繫囚見應死者閔之縱使歸家期以來秋就死仍敕天下死囚皆縱還至期來詣京師至次年九月去歲所縱天下死囚凡三百九十人皆無人督帥如期自詣朝堂無有一人亡匿者上乃皆赦之録曰易無妄曰無妄之藥不可試也聖人之意蓋謂人君之治天下當以大公至正處之至誠極信御之若其虛心妄意譎道詐術以徼幸于萬一矯揉于一時者不可暫試其可遂用哉唐之太宗脅父起兵推刃同氣所殺無辜甚衆而盧祖尚張藴古之冤尤為可憫乃縱囚而赦之縱且不可而况于赦乎此以民命為兒戲律令為狙玩祇以資千古之一笑而已夫死人之所至難而甚畏也茍可以求生何所而不至又安知其自詣者非其贋代之者耶帝勇于好名而力于自是朝堂之間更有如藴古者哉以贋而為真以偽而為誠以戲而為法以死而為生雖百縱之無益也魏徴上疏以為文子曰同言而信信在言前同令而行誠在令外自王道休明十有餘年然而德化未洽者由待下之情未盡誠信故也今立政致治必委之君子事有得失或訪之小人其待君子也敬而踈遇小人也輕而狎狎則言無不盡踈則情不上通夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠未免有敗况懷姦究其禍豈不深乎夫雖君子不能無小過而不害于正道斯可略矣既謂之君子而復疑其不信何異直木而疑其影之曲乎陛下誠愼選君子以禮信用之何憂不治不然危亡之期未可保也上賜手詔褒美曰昔晉武干吳之後志意驕怠何曾位極合司不能直諫乃私語子孫自矜明智此不忠之大者得公之諫朕知過矣當置之几案以比韋弦録曰帝以徵疏比韋弦善矣然不知韋之平弦之直者其體自正乎抑矯揉之而後能乎則徵之疏有所未盡何也蓋表端而影自正源潔而流自清苟人主之心一于誠信則不言而化不令而行又何患待下之情未能盡實耶苟為不然今日雖以為君子他日未必不為小人此太宗之世未能純于三代君子小人紛紜反覆皆由君心未盡誠信故也徴知顧影而不求直木與自比韋弦而不切平直之義夫何殊哉上謂王圭曰卿識鑒精通復善談論玄齡以下鄉宜悉加品藻且自謂與數子何如對曰孜孜奉國知無不為臣不如房玄齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如溫彥博處煩治劇衆務畢舉臣不如戴胄耻君不及堯舜以諫爭為己任臣不如魏徴至於激濁揚清嫉惡好善臣于數子亦有微長上深以為然衆亦服其確論録曰明主之世人皆服義故論定可試庸暗之朝是非混淆故浮議沸騰是時君臣相得正猶手足腹心必待之以持行資之以舉動以是施于耳目焉有不得其真者乎然則王圭之論雖欲不確烏得而不確天后信重狄梁公群臣莫能及嘗謂之國老而不名仁傑好面引廷爭后每屈意從之嘗問欲得一佳士用之誰可者對曰文學醖籍則蘇味道李嶠固其選矣必欲取卓犖奇材則有荆州長史張柬之其人雖老宰相材也太后擢之為洛州司馬數日又問對曰前薦柬之尚未用也后曰已遷矣對曰臣所薦者宰相非司馬也乃遷秋官侍郎卒用為相又嘗薦夏官侍郎姚元崇監察御史桓彥範代州刺吏敬暉等數十人率為名臣或謂之曰天下桃李悉在公門矣仁傑曰薦賢為國非為私也録曰狄門之桃李萬物之光輝也後世之桃李春風之爛熳也觀其所薦則其篤棐之功信可尚矣張九齡以姚元之有重望為上所信任奏記勸其逺諂躁進純厚元之嘉納其言一日請序進郎吏上仰視殿屋再三言終不應元之懼趨出及罷朝高力士諫曰陛下新總萬機宰相奏事當面加可否奈何一不省察上曰朕任元之以庶政大事當奏聞郎吏卑秩乃一一以煩朕耶會力士宣事至省中為道上語元之乃喜聞者皆服上識人君之體録曰此林甫國忠之漸也夫君子之心美歸于上惟恐權出于己小人之心欺肆于衆惟恐權攬于君郎吏雖卑不云上應列宿乎以是為煩于元之則可于他人則否矣且元之三瀆不告力士一言如響至使朝廷之公言反為省中之私語欲人不弄權其可得哉一語默之間可以知其必無終矣為人上者不可不察也張守圭使安祿山討奚契丹祿山恃勇輕進為虜所敗守圭奏請斬之祿山臨刑呼曰大夫不欲滅奚契丹耶奈何殺祿山守圭亦惜其驍勇欲活之乃更執送京師張九齡批曰昔穰苴誅莊賈孫武斬宫嬪守圭軍令若行祿山不宜免死上惜其才敕令免官以白衣將領九齡固爭曰祿山失律喪師于法不可不誅且臣觀其貌有反相不殺必為後患上曰卿勿以王夷甫識石勒枉害忠良竟赦之録曰帝之言所未解也以為王衍果知石勒歟則九齡之言無足怪也以王衍不知石勒歟則祿山之枉猶可疑也夫既識石勒矣而又曰枉害忠良何耶是時乾坤已變屯難將作天故奪其聰明瞽其心志如所謂不仁而可與言則何亡國敗家之有不然豈既不識祿山又不知思明乎縱使昏暗而然不應如是之顚倒也肅宗至德二載上皇思張九齡先見為之流涕遣中使至曲江祭之厚恤其家録曰九齡前後之言判若筮龜帝不惟不信而反疑之然則李腹之劍非其自弄帝弄之也口蜜之甜非其自嘗帝嘗之也雖然為小人之所愚在於目前而君子之取信多于身後目前者如腥膻污穢當時掩鼻已多身後者如藥石針砭萬世擊節不置此不徒下蜀中之淚而至今高曲江之風也歟代宗永泰元年回紇吐蕃兵圍涇陽時僕固懷恩死二虜爭長不相睦分營而居回紇在城西郭子儀使牙將李元瓉往説之欲與共擊吐蕃回紇不信曰郭公何在汝給我耳若果在此可得見乎光瓉還報子儀曰今衆寡不敵難以力勝不若挺身往説可不戰而下也遂與數騎開門而出使人傳呼曰令公來回紇大驚大帥藥葛羅可汗弟也執弓貫矢立於陳前子儀免胄釋甲投鎗而進諸酋長相顧曰是也皆下馬羅拜子儀亦下馬前執葛羅手讓之曰汝回紇有大功于唐唐之報汝亦不薄奈何負約深入吾地棄前功結怨仇何其愚也且懷恩叛君棄母于汝國何有今吾挺身而來聽汝殺我我之將士必致死與汝戰矣葛羅曰懷恩欺我言天可汗已晏駕令公亦損館中國無主我是以敢與之來今知天可汗在上都令公復總兵懷恩又為天所殺我曹豈肯與令公戰乎子儀乃説之曰吐蕃無道乘我國有亂不顧舅甥之親吞噬我邉鄙焚蕩我畿甸其所掠之財不可勝戴此天以賜汝葛羅曰吾為懷恩所誤負公誠深今為公盡力擊吐蕃以謝過回紇觀者稍前子儀麾下亦進復揮手却之因取酒與共飲遺之絹三千匹竟與定約而還吐蕃聞之夜引兵遁去葛羅帥衆追之子儀使白元光帥精騎與之共戰于靈臺西源大破之録曰愚觀子儀是舉非特誠信使然可以見其氣吞華夷量包中外者歟與區區免胄見虜者異矣韓愈為潮州刺史詢民疾苦皆曰郡湫水有鱷魚其長數丈食民畜産將盡居數日愈往視之炮一豚一羊投之并為文以告約其盡三日南徒于海三日不能至五日五日不能至七日七日不能是終不肯徒刺史則選材伎壯夫操徑弩毒矢與鱷魚從事是夕有暴風雷起湫中數日淵水盡涸徒于舊湫之西六十里自是潮無鱷魚之患轉兵部侍郎鎮州亂殺田弘正而立王延湊詔愈宣撫既行衆皆危之愈至延湊嚴兵迓之愈大聲曰天子以公為將帥故賜以節豈意同賊反耶語未終士前奮曰先太師為國擊朱滔血衣猶在此軍何負乃以為賊乎愈曰以為爾不記先太師也若猶記之固善天寶以來安祿山史思明李希烈等有子若孫在乎亦有居官者乎衆曰無愈曰田公以魏博六州歸朝廷官中書令父子受旗節劉悟李祐皆大鎮此爾軍所共聞也衆曰弘正刻故此軍不安愈曰然爾曹亦害田公又殘其家矣復何道衆歡曰善廷湊因曰今欲廷湊何所為愈曰神策六軍將如牛元翼者為不之但朝廷顧大體不可棄之公久圍之何也廷湊曰即出之愈曰若爾則無事矣會元冀亦潰圍出廷湊不追愈歸奏其語帝大悅録曰易中孚曰信及豚魚又曰利涉大川乃化邦也夫魚宴然罔覺之物也孚信能感于魚則何事不可濟何物不可化哉雖以蹈水火可也雖以臨不測亦可也故曰利涉大川也當是時廷湊雖矯悍不道不過亦若人爾以愈之忠信能服其心故歡然聽命非有他道故又曰乃化邦也人可不自勉乎抑蘇子有言公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鎛李逢吉之謗能信南海之民廟食百世而不能一日安于朝廷之上蓋公之可能者天也其不可能者人也其言益備故併録之宋史太祖謂趙普曰天下自五季以來數十年間帝王凡八姓十二君僣竊相踵鬥戰不息生民塗地其故何也吾欲息天下之兵建國家長久之計其道何如對曰陛下之言及此天地人神之福也此無他方鎮太重君弱臣強而已今欲治之宜稍奪其權制其錢穀收其精兵則天下自安矣時石守信王審琦等皆上故人有功典禁衛兵一曰晚朝畢因與飲酒酣太祖屏左右曰朕非卿等不及此然天子亦大艱難殊不若節度使之樂朕終夕未嘗安枕居此位者誰不欲之守信等頓首曰陛下何為出此言今天命已定誰敢有異心祖曰固然其如麾下欲富貴何守信等泣曰臣等愚不及陛下哀矜指示可生之途祖曰人生如白駒過隙所以好富貴者不過欲多積金錢厚自娛樂使子孫無貧乏耳卿等何不釋去兵權出守大藩擇便好田宅市之為子孫立永逺不可動之業多買歌兒舞女日夕飮酒相歡以終其天年朕與卿等約為婚姻君臣之間兩無猜疑不亦善乎守信等皆謝曰陛下念臣至此所謂生死而骨肉也明日皆稱疾乞罷典兵録曰陳橋之事變起于倉卒五代相襲之舊也兵權之釋患銷于未然大宋不拔之基也易曰夬揚于王庭孚號有厲彖曰揚于王庭柔乘五剛也孚號有厲其危乃光也夫小人之亂極矣循環損益天故篤生大有作為之君又得出乎其類之臣剛明果決乾道盛備陰柔消滅故能顯行于朝廷使人明知去就之義進退之幾其至誠孚信既非挾詐任術而渙汗大號亦非陰謀譎計此所以異于躡足拊耳誅醢夷滅而宋之家法光于漢唐非此之謂乎趙普為相以天下為己任太祖倚任之事無大小悉咨決焉嘗薦人為官不許明日復奏亦不許又以其人奏太祖怒裂碎奏牘擲地普顏色不變跪而拾之他日補綴舊牘復奏如初上乃悟卒用其人又有小臣當遷官以素惡其人不與晉堅以為請上怒曰朕固為不遷卿若之何普曰刑以懲惡賞以酬功古今通道也且刑賞天下之刑賞陛下豈得以喜怒專之由是怒甚起入宫亦復隨之久之不去竟得俞允其剛毅篤信類如此録曰補綴舊牘盛時之事也普可謂無負于薦賢矣何獨于榻前之署而忍裂斷之乎是時藝祖當乾普方以社稷自任其私心未動利害未萌故能盡忠所事及再相之後私心已動利害已萌由是不能不以得喪為愛惡也雖然若以他人觀之惟存好惡罔敢異同豈有再三之瀆補綴之章乎若普者善非能悟帝乃帝能悟普也吳越王俶聞唐亡而懼乃與妻孫氏子惟濬孫承祐來朝太祖賜禮賢宅以居親幸宴之信任不疑留兩月遣還賜以黃祔封識甚固戒曰途中宜密觀及啓之則皆群臣乞留俶章疏也俶益感懼既歸視事命徒坐于東偏曰西北者神京在焉主上信我而我敢不敬乎每修貢必列于庭焚香而後遣之録曰帝之歸俶其懲于鉉之論煜歟他人之鼾睡既不能容在己之獨覺又不可信徒徇君臣之惑而無明炳之逺圖一旦如有鉉者則帝之辭屈矣以此示信至于異日尚留而弗遣則二帝量之淺深德之厚薄又可見矣王文正公為相上益親信言無不從凡大臣奏請必問王旦以為何如然後施行旦愼守祖宗法度無所變更每詢訪四方利病或使疏其言而獻之觀才所長密籍其名不復與見遇有差除必先疏三人姓名以請所用者帝以筆點之同列不知故惟旦奏無不俞允焉録曰真宗之信王旦豈誠心與直道歟始也媚之以固結其心終也信之以成就其志向使旦不能任帝之詐帝亦豈能信旦之言乎以為近密則可以為愼守則未也蓋愼者當官之義自始至終不容一毫茍且而可貽臨殁之悔耶觀者當默識之名臣録張忠定公前後治蜀皆以恩信民鼓舞相慶如赤子久失父母而復來也既至易嚴以寬凡令下人情慰愜蜀郡大治上曰得詠在蜀朕不復有西顧之憂其見信任如此嘗問李畋曰百姓果信我否對曰侍郎威惠及民民安得不信公曰前一任則未也此一任應稍稍耳只此一箇信字五年方得成又曰子異日為政信及于民然後教之言及于義然後勸之動而有禮然後化之靜而無私然後民安而樂業矣仃斯四者在先率其身王沂公嘗言人之操履無若誠實夷險可以一致其再蒞大名治政益信於人民居軍伍咸畫像以事之時虜使往來入境皆云此府王公在焉必沐浴潔服而入杜祁公平生直諒忠信取重天下嘗曰衍歷年多任事久上為君上所知次為朝野所信故凡事得以伸其志又曰自在幕府至於監司人尚不信及為三司副使纍於上前執奏不移人始信之復至公待物樂與人善既知其人則無復毫釐疑間始琦為樞副論難一二事公不樂久之相亮每事門曰諫議曾看否看便將來押字琦益為之盡心不敢忽以此見其自信信人不易得有如此録曰三公者國之蓍蔡時之柱石也而自信信民上而君長次而同列不易得如此然則君子可不益自勉哉益自勉哉弘道碌終弘道録俠三信君臣之信仁宗信任大臣擇報聘契丹者吕夷簡薦富弼時帝以平治責成輔相而命弼主北事仲淹主西事弼至入對曰主憂臣辱臣不敢愛其死帝為動容進樞密直學士弼固辭曰國家有急不可憚勞何至以官爵賂焉遂往録曰史稱帝剛斷不足豈其然哉以平治責輔相以北事責富弼以西事責仲淹帝之斷有餘矣有道之世大抵如是及其衰也猜忌生焉嫌疑作焉推原其故正以懷祿者多徇國者寡賢不肖混清以致君心之不固也然則弼之辭官豈無謂哉富弼至契丹見其主曰兩朝繼好垂四十年一旦求割地何也主曰南朝違約塞鴈門增塘水治城隍籍民兵將以何為弼曰塞鴈門者備元昊也塘水始于何承矩事在通好前城隍皆修舊民兵亦補闕非違約也遂進説曰北朝忘章聖皇帝大德乎澶淵之役苟從諸將言北兵無得脫者且通好則人主專其利若用兵則利歸臣下而人主任其禍故勸用兵者皆為身謀爾主驚曰何謂也弼曰昔晉高祖欺天叛君末帝昏亂上下離叛故契丹師勝然壯士健馬物故太半今中國兵精馬壯法令修明上下一心果欲用兵能保必勝乎就使其勝所亡士馬群臣當之歟抑人主當之歟若通好不絶歲幣盡歸人主群臣何利焉主大悟首肯者久之曰微卿言吾不知其詳録曰始契丹之報聘也擇無敢遂行者雖鄭公毅然請往而歐陽公上章留之豈非天下之至難乎及鄭公之既至也虜未見可畏者雖反覆數百言未嘗有以難之又安見其至難哉蓋不難於夷狄而難於信義中國之所倚仗惟信與義可以攝服夷狄之心舍此而論強弱較勝負非君子之所敢知也然則今之韃鞋豈皆無一毫之人心乎抑無信義以結之乎若茍開誠布公啖以利害曉以榮辱雖未能盡如吾意亦不至如斯之背戾也然則為國者何憚而不為乎富弼復如契丹特和親增幣二儀及誓書往至不復議婚專欲增幣曰南朝既增我歲幣其辭當曰獻弼曰南朝為兄豈有兄獻于弟乎然則為納字弼亦不可曰南朝既以厚幣遺我是懼我矣則于二字何有弼曰本朝兼愛南北故不憚更成何名為懼或不得已至于用兵則當以曲直為勝負非使臣之所知也契丹主曰古有之弼曰自古唯唐高祖借兵于突厥當時或稱獻納其後頡利為太宗所擒豈復有此哉聲色俱厲主知不可奪乃曰吾當自遣人議之録曰景德之誓書一慶曆之誓書二景德之和好近慶曆之和好逺以仁宗之世略不如漢謀不如唐強不如秦富不如隋惟恃一弼之誠信以爭二字之獻納華夷之際亦可觀矣雖然有帝之謙光而爭納字不為過有帝之節儉而增歲幣不為侈有帝之天性仁愛而弭患息兵不為虛文不然口受之詞與臨發之言尚有異同何况異日之史筆乎此又不可不知時西邉用兵守備不足種世衡建議延安東有故寬州廢壘請城之以當寇衝右可固延安之勢左可致河東之粟北可圖銀夏之舊朝廷從之及成賜名青澗城蕃部有牛家族奴訛者素屈疆未嘗出謁郡守間世衡名郊迎世衡與約明日當至其帳往勞部落是夕雪深三尺左右曰地險不可往世衡曰吾方結諸羌以信不可失期遂緣險而進奴訛方卧帳中謂世衡必不能至世衡蹴而起奴訛大驚曰前此未嘗有官至吾部者公乃不疑我耶率其族羅拜聽命世衡在青澗城元昊未臣其貴人野利兄弟親信用事欲謀間之有僧王光信者趫勇習知審部道路奏以為三班借職乃為間書使遺其貴人喻以早歸之意元昊信之果疑野利兄弟卒以誅死使其臣李文貴報言許以通和願賜一言世衡以白仲淹諭以朝廷開納德意縱使還報自是元昊請降遂稱臣如舊録曰愚觀种氏本出放後初無聞于時也而其後世遂為名將要其立功青澗奴訛為始野利剛浪為終其始也臨不測之淵冒不虞之險其終也以前日之信立後日之謀今之為邊帥者可不知所務乎或曰世衡之時有仁宗在上仲淹在下故能成功若君非寬仁大度將非公正明信則雖欲決策于一時且不能况望馳聲于後代乎此又不可不察司馬光為人忠信正直自少至老語未嘗妄自言吾無過人者但平生所為未嘗有不可對大言者耳誠心自然天下敬信陜洛間皆化其德有不善必曰君實得無知乎及居政府凡新法為民害者剗革略盡或曰熙豐舊臣多憸巧他日有以父子義間上則禍作矣光正色曰天若祚宋必無此事于是天下咸信之曰此先帝本意也録曰人何以不可對人言乎蓋人者對己之稱己非可以自欺而可欺人乎哉今之欲欺人者雖百計言銛然其本心之明有終不得而昧者是必支離湎涊欲言而趦趄也大學傳曰所謂誠其意者毋自欺也又曰人之視己如見其肺肝然人豈有不自信而能信于人者乎其所以釐革宿斃勇罷新法皆其自信中來也雖天下祚宋亦未如之何也已唐介拜參知政事自以進由直道感慨知遇益致所以事君之義純誠盡公多所獻替用人明言其才否不立恩不避怨與同列論政事反覆再三未嘗阿屈于祖宗法度有所更變近臣有所進退尤極其愼雖在帝前必究切辨折要是非之歸未嘗反顧帝于是益敬信之而天下翕然想望其風采録曰愚觀唐子方何其幸哉始也直聲滿天下終也直道滿朝廷士之生斯世為斯民雖微賤亦思自副矧貴重乎雖一命必思自效矧相業乎其所以益感知遇敬信不疑上下之間同是無負而已常安民主信為治至人不忍欺與安惇同俺惇深姦常毁素所善者安民曰若人不厚于君乎何詆之深耶惇曰吾心實惡之姑面交耳安民曰君所謂匿怨而友其人乃李林甫也惇笑曰直道還君當貴輸我故安民常曰處厚苦貴天下事可知我當歸謝寧復校是非邪第恐纍陰德耳後惇子坐誅果如其言時元豐用事之臣雖去朝廷然其黨分布中外起私説以搖時政尤竊憂之貽書吕公若曰善觀天下之勢猶良醫之視疾方安寧無事之時語人曰其後必將有大憂則衆必駭笑惟識見幾微之士然後能逆知其漸故不憂于可憂而憂之于無足憂者至憂也夫去小人不難而勝小人為難陳竇五王皆前世已然之禍今雖登進忠良而不能搜致海內之英使皆萃於朝以勝小人恐端人正士未得安枕而卧故以十人而制一虎則人勝以一人而制兩虎則虎勝奈何以數十人而制千虎乎其言歷歷皆驗又言吕惠卿賤性深險今過闕必稱先帝而泣以感動陛下希望留京後請對果然帝正色不答時論快之又嘗極論章惇蔡確曾布時蔡京之惡未著人多未信安民獨言京姦足以惑衆辨足以飾非巧足以移奪人主之視聽力足以顚倒天下之是非章前後至數十百上皆確論也録曰夫筮龜藥石世並珍異者蓋藥石能治已然之疾而筮龜能決將來之禍無筮龜則藥石無所措其手無藥石則筮龜不能信其用要在夫人之決計何如耳宋之天下譬則人之一身始焉不信平和之劑妄投藥餌率意不顧以致內而腹心外而四肢莫不尫然病也中焉力施救治之方百計愛護思欲挽回是以上而眉宇歡而顔色莫不蛩然喜也終焉藥不瞑眩厥疾不瘳於是病加於小愈患生於怠惰而膏之上育之下然不可解矣此安民之言信若筮黽然而不能用者國之元氣關於運之盛衰人之死生係於命之修短有如宣仁者天若祚之以眉壽終之以至公永無社飯之虞何至調戲之患則雖有百狼千虎將見天高日升不能恣其咆哮也惜乎元祐淪亡紹聖繼作中朝列為荆棘人類化為鴟梟詩不云乎內奰于中國覃及鬼方其言不可信而尤可痛也楊邦又神色明秀長身山立見者信愛居無事時與物無忤及遇事勇決萬夫不能奪也其德行修於家稱於鄉信於友至以身殉國立天下萬世之大節非一時適然也初攝溧陽號令明信會叛卒周德據府城殺官吏邦乂立獄囚趙明於庭以誠信結而遣之翌日明果悉里中豪健擒賊討平之時通判建康金兵渡江杜克下令城守邦乂信之明日克遁金陵空無兵知府陳邦光出城迎虜克先降惟邦乂不屈大呼我豈降虜者耶邦光啓兀术言邦又素有疾遣親厚者説之曰公故貧有兄垂老仰分祿寡嫂狐姪逺來就養五子尚幼一女未嫁寧不念比邦又曰兹人之常清吾獨無情乎家國不兩立吾信無疑矣兀术置酒召降者飮邦乂及階以首觸柱礎曰我豈與犬豕同醉飽乎明日邦光復諭之曰事無可奈何願少回意徒為死無益也邦又瞋目曰爾以從臣守藩臨難不能死甘心屈膝使人人效爾朝廷何賴時有劉團練取幅紙示之曰無多言為趙氏即書死字為我即書活字於是取筆書死字劉猶未信又刺血書衣襟曰寧作趙氏鬼不為他邦臣又明日復咨問邦又大罵裂襟以示虜始信遂過害相與剖腹取其心而視之録曰愚觀宗澤之憤杜克之暴邦光之降邦乂之剖皆汪黃用事君德不剛之所到也而金陵王氣所萃非江浙一隅可比帝已失之東隅庶幾收之桑榆而縮手無策坐待啖亡然猶延數世之脈者孔子曰自古皆有死民無信不立故城可破而幅紙不可破將可虜而血書不可虜向使忠襄不作胥于夷狄矣而能立誠示信凌天貫日庶幾猶生尚賴不沒嶽飛受命討楊公而張浚都督會朝廷詔還防秋浚召飛欲候來年議之飛曰已有定晝都督能少留不八日可破賊浚曰何言之易耶飛曰王四廂以王師攻水寇則難飛以水寇攻水寇則易水戰我短彼長以所短攻所長所以難若因敵將攻敵兵奪其手足之助離其腹心之託使孤立解散而後以王師乘之八日之內當俘諸酋浚許之飛遂如鼎州先是所部皆西北人不習水戰飛曰兵何常顧用之何如爾乃遣使招諭其黨黃佐既至祔佐背曰子知逆順立功封侯豈足道哉至是佐招楊欽來降飛喜曰楊欽驍悍既降賊腹心潰矣遣歸湖中欽又説全琮劉詵來降公負固不服浮舟湖中以輪激水其行如飛帝置撞竿官舟迎之輒碎預伐君山木為巨筏塞諸港又以腐木亂草浮上流而下擇水淺處遣善罵者挑之且行且罵賊怒來追則草木壅積舟輪礙不能行乃急擊之賊奔港中復為筏所拒官軍乘筏張牛革以蔽矢石舉巨木撞其舟盡壞么遂赴水死飛入賊壘餘酋驚曰何神也俱請降果八日而捷書至浚歡曰嶽侯神算也初么恃其險曰欲犯我者除是飛來至是人以為讖而信之録曰人皆謂嶽侯神算愚竊以為飛之自信也其言曰智信仁勇嚴缺一不可今觀以水寇攻水寇是其智果八日而捷是其信招之能來推之能去俾其心服是其仁欲犯我者除是飛來是其勇無俟來年别議必欲都督少留是其嚴智故不困信故不爽仁故不殺勇故不懼嚴故不惑回視富平之役符離之師真兒戲爾以親服神算之人他日督府之議竟致面違心否况其他乎是可以為浚惜而不足為飛病也吁可嘆哉楊存中為人忠謹高宗為康王開大元帥府即親信之時帥府草創存中晝夜扈衛寢幄不令頃刻去側及南渡江駐蹕江浙存中以勝捷軍從張俊守吳門苗劉之變從俊赴難擢為御前統軍進神武中軍統制俊復欲留置軍中上曰宿衛乏帥朕所選為不可易也在殿巖凡二十五載金主亮有南侵意存中上備敵十策步帥趙密謀奪其權因指為喜功生事竟代之未幾邉聲日急帝如建康詔為御營宿衛復使扈蹕因語宰相曰楊存中唯命東西忠無與二朕之郭子儀也又曰朕假借諸將眷存中尤深撫綏之過于子弟曩于趙密之代不安寢者三夕于是出入四十餘年至孝宗尤信重之呼為郡王而不名録曰愚觀中興諸將嶽最危楊最密危者如波濤洶湧雷霆奮迅始終不失其正故天下後世重之密者如指之在臂臂之在身東西惟命所使故當時人主悅之觀秦檜殺嶽飛佯為不聞而趙密代存中乃為不寢帝之存心厚薄于此分矣非與國人交止于信也皇明名臣録李文達公賢為人忠信嚴密處俺友恆惇信義言有不合終不失和氣得時行志自三楊後莫能及之英廟獨承寵遇憲廟繼統信任日篤初薦布政陸瑜為刑部尚書石亨以私譖之久不召對人為公危及瑜至當擬旨到任同事者且謂擬侍郎公曰吾以尚書薦而改擬侍郎則自歉不信竟擬尚書從之後瑜頗稱旨乃復召對如舊又舉耿九疇為都御史軒輗為尚書禾成耿為石亨所排軒亦以權貴侵官托疾去公屢言于上而還之年富亦為石彪所誣反亨敗力言富可大用起為户部尚書會缺禮部侍郎有近習求薦陛上問何如封曰不知其人臣所知惟學士李紹可因言邇者士風不立多寅緣求進如用經請面召吏部諭之庶幾士類知警時冢宰王翺以老成可馬馬昴以儀表皆為上所眷凡有所薦必先諭意文則委王武則委馬至御前疇咨既已必曰臣所知如此還須召某等再審二人卒如公言以是上不致疑下皆信服録曰愚觀英廟之時讒邪接踵幸而天心厭亂曹石之徒上實不堪乃返其所美之威福而與吾柄執之公亦深戒甘露之變懲黨禁之禍不為徼幸長亂之事以是讒言不行信任益篤終能成輔相太平之功後世既不能鑒于已然又不能戒于將然徒恃激切之行冀成回天之功非惟不信而反害之蓋以此也讀者不可不察都御史韓雍為人洞達凱爽有信義敢于有為篤于自任成化乙酉兩廣弗靖與都督趙公輔受命往征二人相推相信深謀密議宛然若兄弟朋友之相告語者初議欲分江西兵由廋嶺入廣東大軍則從湖廣入廣西以賊在廣東宜逐之在廣西宜困之公曰不然古者仗越臨戎專制閫外謂可安國家利社稷專之可也夫兵有聚而為正亦有分而為奇今兩廣已無完郡而大藤峽賊之巢穴不圖而趨其末未見其能濟茍全師至彼南可以攻大藤東可以應南韶西可以取柳慶北可以斷陽洞諸路舉無不克何須于逐乎又欲誘修仁荔浦猺狫出而殺之則餘黨可不勞自平公謂奉詞致討貴乎名正誘而殺之信義虧矣乃分遺左右為二十五哨而公與太監總兵及廣西總兵歐信等領中峭尅日進討彌月而修仁荔浦平乃移師潯州乘勝而進諭以朝廷威福之重示以賊勢可滅之機衆遂歡呼卒以尅滅蓋公以應變決策為之主信賞必罰為之輔一惟至公無私宜其成功甚速而至大也録曰傳有云天之所助者順也人之所助者信也履信達乎順斯乃所以成功也然則如韓公者其一時之人傑也歟録之弘道録終弘道録俠四信父子之信孟子曰天下大悅而將歸己視天下悅而歸己猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子録曰此舜之心斷斷乎以親為必可信而無一毫之疑者也彼賊于父子之恩者皆由其始之不信是故玄宗疑睿宗之害己而後王琚之言易入肅宗疑明皇之得衆而後輔國之譖始行了翁復申之曰彼臣弒其君子弒其父常始于見其有不是處耳嗚呼始之所見即中之所疑也商頌天命玄鳥降而生商宅殷土茫茫古帝命武湯正域彼四方大雅厥初生民時維薑嫄生民如何克禋克祀以弗無子履帝武敏欣攸介攸止載震載夙載生載育時維后稷録曰此商周之鼻祖史記於詩乎據果可信乎曰非然也詩者以意逆志而已矣夫有匹配之賢而后有嗣續之賢此天地之常經生民之至理也古者高辛氏之王天下也普施利物不于其身仁而威惠而信帝乃四妃元妃有邰氏女曰薑嫄生稷次陳鋒氏女曰慶都生堯又次有娥氏女曰簡狄生契又次娵訾氏女曰常儀生摯夫以聖德如高辛而四妃為之配其生聖子乃理之必然而玄鳥之祥履武之異適然有之非謂全無人道一旦卵其卵迹其迹而遂生子也彼作詩者在於措詞之善乃加天命二字及曲為形容名棄之意而有隘卷寒氷牛羊腓字之説此作詩之常事不可以文害義也豈可從而附會之舍聖德之高辛以為之父而孜孜以神怪不經之論加于萬世之聖人其失在于不達詩之本旨故也夫儒者以窮理為務誦詩三百且猶不達何怪乎佛老荒唐之説乎若佛氏洞脅而生馨香滿室伊尹生于空桑老子生而頭白之類茲録以傳信故不可無辨春秋魯桓公六年九月下卯子同生録曰自小辨之怨作而父子之道乖夫子之作春秋蓋傷之也然則雖以魯事而實非為魯也以為感隱桓之禍故以喜書誠哉末乎左傳雖然吾夫子别嫌明疑之意斯吳至矣夫夫婦别而後父子親桓之昏惑與文薑之敗度千古所未聞也史書九月丁卯昭其實也詩稱展我甥兮著其微也以是為防他口公尚曰同非吾子齊侯之子然則非所以明與子之法防奪正之事胡傳將以正魯桓身後之惡定千古不決之疑其為世教慮方始切矣魯僖公五年夏公及齊侯宋公陳侯衛侯陳伯許男曹伯會王世子于首止秋八月諸侯盟于首止録曰夫周室何以東遷幽王何以見弒而春秋何以作歟皆世子之莫定也本一搖而其禍至於丘墟其社禾黍其宫夷戮其身尚猶未悟一再傳而有子克之難至于子頺之禍又惠王之身鑒也反國未幾復有叔帶之萌吾不知惠王獨何心歟推原其故皆以昧于大學之道所謂好樂不是其正之其所親愛而辟焉者也身之不修而家不可齊國不可治天下不可平雖以明信在人至其卒也尚不敢發喪告哀失父子之親戎伐王城𧇊兄弟之義天王出居于鄭蔑君臣之禮皆惠王有以啓之也向微恆公管仲惠之不為幽幾希矣周將何遷乎吾夫子特書許之蓋為天下萬世之大計非區區一人之位是關也左傳頴考叔頴谷封人也有獻于公公賜之食舍肉公問之對曰小人有母皆嘗小人之食矣而未嘗君之羹請以遺之公曰爾有母遺繄我獨無考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融薑出而賦大隧之外其樂也泄泄遂為母子如初君子曰頴考叔純孝也愛其母施及莊公詩曰孝子不匱永錫爾類其是之謂乎録曰愚觀頴考叔之能昭于大信也夫匹夫之誓示之諒也君子之要約之義也故一言而開莊公之惑或曰悔者信與疑之間也不悔則不能因其所明而導之季友之母出自陳桓公魯桓公絶幸愛之季友將生公使人卜之曰男也其名曰友在公之右間于兩社為公室輔季氏亡則魯不昌又筮之遇大有之乾曰周復于父敬如君所及生有文在其手曰友遂以名之號為成季録曰愚觀季友之生天實厭亂非以為桓也夫桓莊之不君文哀之不婦般閔之屢弒二叔之長亂魯已無魯不但岌岌也使無賢者生於其間周公之祀不其墜乎其有文在手者指其掌也天意若曰友者昌弗友者亡繼般與閔友之道也不然季亦淫人之裔何德于天乎其立僖以定魯乃以弭禍而存桃也卜筮之意深哉成風聞成季之繇而事之而屬僖公焉故成季立之録曰僖公之立果人乎抑天乎曰天也夫彭生之禍文薑致之也絶于天一矣哀薑之入宗廟厭之也絶于天二矣以至孟任之奔而即有圉人犖之釁天絶之三矣子開之立而又有卜齮田之奪天絶之四矣風氏之繼薑以有後猶薄氏之繼吕而代立也豈非天實為之歟奚齊卓子者驪姬之子也荀息傳焉獻公將薨謂息曰士何如則可謂之信對曰使死者反生生者不愧乎其言則可謂信矣及薨奚齊立里克謂息曰君殺正而立不正如之何願與子慮之息曰君嘗訊臣矣臣對曰使死者反生生者不愧乎其言則可謂信矣于是里克知其不可與謀退弒奚齊息又立卓子克復弒卓子荀息死之君子曰荀息可謂不食其言矣録曰尾生信矣而與女子私則非正也然則君子何以與荀息哉與荀息所以甚里克也夫克之傳申生名正言順非若息之傳奚齊也優施一言而中立與死者復生而不愧相去何懸絶哉向使克能守正不惑以免申生于難此其上也若守死無二以與太子共斃亦其次也既甘心矣復靦其面而徒朝弒一君焉暮弒一君焉若克者吾不知為何惠公不能明正其罪尚以廢興為辭然則晉之刑政又何如也故夫子復纍惠公纍惠公亦以其里克歟鄭文公有賤妾曰燕姞夢天使與己蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎公曰諾生穆公名之曰蘭録曰孟子曰天子能薦人于天不能使天與之天下諸侯能薦人于天子不能使天子與之諸侯子華立為太子則既受命于天為質于諸侯而鄭之君位確乎有定子蘭之生方且將信將疑矧又群公子之多乎乃以姦鄭見殺遂致紛紛竄逐而子臧之出奔子士之鴆毒子瑕子愈之早卒無愛然後石癸之説行而孔將三人之計定大宫之立盟而靈襄數世之大興矣豈非天之所啓乎後世蒼龍據腹之祥雖不同侔嗚呼蘭也其馨龍也其天矣乎楚共王無冢適有寵子五人將立莫知所從乃大有事于群望而祈曰詣神擇于五人者使主社稷乃遍以璧見於群望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧于大室之庭使五人齋而入拜康王跨之靈王肘加焉子干子晢皆逺之平王弱抱而入再拜皆壓紐鬥韋龜屬成然焉録曰愚觀共王之事末嘗不嘆父背子違不信己而信神不擇人而擇鬼不為明顯暴白之事而徇幽隱難知之謀也文堯舜之天受之者以行與事示之也未聞當璧而壓之紐也彼巴姬何為者哉其愛惡之情未必不寓于埋璧之際而或當或否豈非教之以篡乎上有篡者下必有翼之者矣此楚之所以為楚而五子者始終以弒立果孰為神之所擇乎衛襄公夫人薑氏無子嬖人婤始生孟縶孔成子夢康叔謂已立元余使羈之孫圉與史苟相之史朝亦夢相協晉韓康子聘于諸侯之歲婤始生子名之曰元孟縶之足不良弱行孔成子筮之曰元尚饗衛國主其社稷以示史朝曰元饗又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人將不列于宗不可謂長且其繇曰利建侯筮襲于夢武王所用也弱足者居侯主社稷臨祭祀奉民人事鬼神從會朝各以所利不亦可乎故孔成子立靈公録曰愚觀福善禍淫天道未嘗爽也以宣薑之亂孟縶之疾天蓋奪其嗣矣然而康叔之祀不可廢也姬德之傳不可泯也雖無蒸鉏之夢史朝之筮能已于子元之立耶雖然無徴不信不信民弗從衛之諸臣可謂從善者矣卒以公孟安于居不以長而為嫌靈公利于侯不以庶而見奪夫子于衛襄公書卒書葬其以此歟不然紛紛禍亂將不但傳之所陳而已也子曰孝哉閔子騫人不間于其父母昆弟之言録曰稱騫之孝而必本于父母昆弟者蓋騫之母猶夫舜之母也騫之弟猶夫舜之弟也父慈而母否則人間于其母兄愛而弟否則人間于其弟此舜母不免于嚚象弟不免于敖也騫以至恩篤之以戚言動之于是父回其遣母之心母返其單于之念三子各依其親而騫始無間于人人矣此孔門之實行不可以莫之辨也漢書高祖姓劉氏父曰太公母曰劉媪其先劉媪嘗息大澤之陂夢與神遇是時雷電晦冥太公往視則見交龍于其上已而有娠遂産高祖高祖為人隆凖而龍顔美須願左股有七十二黑子寬仁愛人意豁如也高祖常繇咸陽縱觀秦皇帝喟然嘆息曰大丈夫當如此矣録曰一陰一陽之謂道道不可極極則反也三代之盛至于定𣇄洛邑宅中圖大陽道極矣所謂亢龍有悔者也故東遷之變生焉五霸之興至于三家分晉六國合縱陰道極矣所謂龍戰于野者也故秦并之禍作焉陰陽俱困天地之道臲卼殆甚故雀而生馬而生角皆以賤易貴以小易大之徵也天地之意與其擇體于貴人孰若擇體于匹夫蓋匹夫之托體太公劉媪猶可言也貴人之托體不韋春申不可言也則其夢與神遇而雷電晦冥者不猶巨人之迹玄鳥之祥乎漢之受命于斯信矣薄姬文帝母也始姬少時與管夫人趙子兒相愛約曰先貴毋相忘已而管夫人趙子兒先幸漢王漢王四年坐河南城臯靈臺此兩美人侍相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨暮夢蒼龍據妾胸上曰是貴徴也吾為汝成之遂幸有身歲中生文帝録曰媪之所夢應天啓運之兆也姬之所夢輔世長民之符也秦與漢二代之興廢也媪與姬一朝之始末也故各有天命之徴焉詩所謂明明在下赫赫在上天難忱斯者以此不然已以為類而天下蔭之我以為愛而人實憎之幾何不為隱之血彘之肉乎雋不疑之為京兆尹也有男子乘黃犢車建黃旐衣黃襜褕著黃帽詣北闕自謂衛太子公車以聞詔使公卿將軍中二千石雜識視長安中吏民聚觀者數萬人丞相御史中二千石至者莫敢發言不疑曰諸君何患於衛太子乎昔蒯聵違命出奔輒距而不納衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄廷尉驗治竟得姦詐本夏陽人姓成名方遂居湖以卜筮為事有故太子舍嘗從方遂卜謂曰子狀貌似衛太子方遂心利其言幾以得富貴即詐稱之自不疑之後趙廣漢亦為京兆嘗言禁姦止邪于我庶幾至于決朝廷事不及不疑逺矣録曰唐德宗時有詐稱帝母沈氏者與此皆坐誣罔惟宋高宗時詐為永福公主帝受而不疑寵莫加焉後雖為韋太后所發亦縱其自竄而不求治則帝之悔也甚矣此成方逺之獄不可無隻不疑之見也于定國之父于公自為縣史決獄平羅文法者未嘗有所恨焉東海有孝婦養姑甚謹姑憐其少寡無子欲嫁之終不肯姑以為纍反自縊死姑女告吏驗治孝婦自誣服獄具上府于公爭之不能得竟論殺孝婦郡中枯旱三年後太守至者卜筮其故于公曰其勿卜筮咎在此也于是太守殺牛自祭婦冢因表其墓天乃立大兩郡中以此敬信于公為立生祠定國少學法于父亦為獄史以林高遷及為廷尉甚見信用決疑平法務在哀矜鰥寡罪疑從輕加審愼之心朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉民自以不冤始于公閭門壞里中父老欲共治之公曰必令高大可容駟馬高蓋我昔治獄多陰德子孫必有興者至定國為丞相子永復為御史大夫封侯傳世至今人以其言為可信云録曰張釋之之無冤民文帝之仁也于定國之民不寃宣帝之明也其曰陰德有關子孫當興者亦君相造命使然也觀者當信諸此後漢書廬江毛義少苦節以孝行稱南陽張奉聞其名往候之坐定而府檄適至以義守安陽令義奉檄而入喜動顔色奉者志尚士也心竊鄙之自恨其來固辭而去及義母死去官行服公府徴聘俱不至奉乃嘆曰賢者固不可則往日之喜為親屈也汝南薛包好學篤行母死以至孝聞及父娶後妻僧包分出之包日夜號泣不能去至被歐杖不得已廬于舍外旦入而灑掃父怒又逐之乃廬于里門昏晨不廢積歲餘父母信而還之録曰史稱若二子者推至誠以為行行信于心而後能感於人遂以成名於後世受祿致禮於當時斯可謂能顯親也録之陸績為掾其母治家有法適楚王英謀反事連績詣洛陽詔獄嚴其母自吳逺顧無緣相見但作食以饋績績對食悲泣不自勝使者訐其故微聞母逺來不得見故悲耳因問何以知之績曰母截肉未嘗不方斷蔥以寸為度今所餉羹非母莫能調和是以知之察順少孤養母以孝聞順嘗出求薪有客率至母望順不還乃噬其指順即心痛馳歸跪問其故母曰有急客來吾噬指以悟汝耳録曰愚觀陸母之餉美與蔡母之噬指可以驗天性之至信也夫中饋家之所尚膚體子之所同惟所尚故無終食之間敢違其親惟所同故一舉足之際不敢忘乎母非若他人必待孚而後信者比也弘道録終弘道録俠五信父子之信唐書太宗文武大聖皇帝諱世民高祖第二子母曰太穆皇后竇氏隋開皇十八年十二月戍午生于武功之别館年始四歲有書生謁高祖曰公貴人也見太宗曰龍鳳之姿天日之表年將二十必能濟世安民矣高祖因採其言命之名曰世民云録曰孟子曰五百年必有王者興其間必有名世者自漢高至唐五百餘年矣中更晉宋齊梁陳篡弒者六七作朝廷無百年之運四海有瓜分之擾至隋甫能一之然亦以篡始必以篡終皇矣之鑒欲致者屢矣此濟世安民之言確然可信不必徵諸異人而實本于理數也貞觀十七年詎長孫無忌房玄齡李績與褚遂良定策立晉王治為皇太子時有飛雉十數集宫中太宗問是何祥也遂良曰昔晉文公時有侲子化為雉雌鳴陳倉雄鳴南陽侲子曰得雄者王得雌者霸文公遂雄諸侯始為寶雞祠漢光武得其雄起南陽有四海陛下本封秦故雌雄並見以告明德帝悅曰人之立身不可以無學遂良所謂多識君子哉授太子賓客録曰良豈不知晉王之小字哉飛雉之集太子之瑞也晉王名治小字雉奴顧謂告秦明德迂矣哉此天與之信不待諄諄然命之也天后時睿宗為皇嗣公卿希復得見太常工人安金藏給使得進俄有誣皇嗣異謀者后詔來俊臣問狀左右畏慘楚欲引服金藏大呼曰公不信我言請剖心以明皇嗣不反也引佩刀自刺腹中腸出被地眩而仆后聞大驚輿致禁中命醫內腸褫桑楮紩之閲夕而蘇乃臨視嘆曰吾有子不能自明不如爾之忠也即詔停獄睿宗乃安當是時朝廷士大夫翕然稱之以為弗及也景雲時玄宗屬其事于史官詎鑱其名于太華二山碑以為榮卒配饗睿宗廟庭録曰安金藏雷海清皆工人也或能伸父子之大信於酷焰炎灼之時或能抱君臣之至痛于凶虐滔天之日視死如歸乃其素耳顧乃絶而復蘇裂而復續至名鐫秦華勞配闕廷古今以來罕所聞也宋史太祖姓趙氏名匡胤父名弘殷周檢校司徒嶽州防禦使母杜氏生祖于洛陽夾馬營赤光滿室營中異香經宿不散人謂之香孩兒營太祖之生自後唐明宗登極之年每夕于宫中焚香祝天曰某胡人因亂為衆所推願天早生聖人為生民主明年丁亥實始應期而生及長容貌雄偉器度豁如識者知其非常人録曰按五代史云世道衰人倫壞而親踈之理反其常干戈起於骨肉異類合為父子開平顯德五十年間天下五代而實八姓其三出於丐養嗚呼至此極矣天故篤生宋祖以定萬世父子君臣之分而其降生之異受命之符蓋不期然而然者豈不較然為可信哉先是周世宗嘗於文書囊中得木長三尺餘題云檢點作天子及陳橋之變遣楚昭輔汴慰安家人報曰檢點已作天子杜太后聞之曰吾兒素有大志今果然矣録曰人因太后此言遂病太祖陰蓄不臣之志豈其然哉蓋點檢之言中外聞之已久后至是始信其然耳非若唐太宗之時太祖不得已而曰今日破家亡軀由汝化家為國亦由汝是故觀杜后之言有據而喜詳唐祖之意有挾而懼及太后疾亟問太祖曰汝知所以得天下乎太祖嗚噎不能對太后固問之曰臣所以得天下皆祖考及太后之積慶也太后曰不然正由周世宗使幼兒主天下故汝得至此汝百歲後當傳位汝弟光義光美以至德昭國有長君社稷之福也太祖頓首曰敢不如教就命於榻前為約誓書之藏於金匱命謹密宫人掌之録曰后之一言遂貽兩世太平之福茍唐之初年而有此誓何至喋血禁庭乎惜乎鄙夫以其患得怠失之心而害萬世大公至正之論遂使光美德昭之言不注于信史而叢於小説故録亦削趙普以謂君子之所為衆人固不識也英宗初即位皇太后同聽政兩宫有違言傳堯愈頗間內侍任守忠等共為讒間乃上疏曰天下之可信者莫大於以天下與人亦莫大於受天下於人朝廷今日無他惟誅竄讒人則慈孝之聲並隆於天下矣於是遂逐守忠等而太后還政懼然母子如初録曰韓之言危當時人皆知之傳之言密一時或不知之蓋以違言出於讒間讒間由於猜疑猜疑遂生不信始於較毫釐之小節終於棄莫大之至恩其或不然亦往往能碎千金之璧不能釋破釜之疑苟非金玉之君子其能言而必信乎觀者詳之孫傳為人篤信守法嘗對上言祖宗法惠民熙寧法惠國崇觀以來法惠姦時為確論後欽宗詣金營以侍輔太子留守仍兼少傳金人復索太子傳留不遣密謀匿之民間别以狀類太子者殺之以其首併送虜營曰宦者欲竊太子投軍前都人爭而殺之誤傷太子因以兵討定其亂者以獻苟尚不已繼之以死越五日無肯承其事者傅拊膺太慟曰吾太子傅義當同死虜雖不吾索吾當與之俱行時方寓皇城司其子來省叱之曰使汝勿來吾已分死國以全吾信汝來何益揮使亟去子亦泣曰大人信以徇國兒復何言遂以留守付王時雍而去録曰下宫之難死者衆矣而卒能存孤者膺代之也幸而康王猶在茍天不愸遺宋其不祀乎然而無肯承其事者天厭姦邪已極若使除舊布新以啓藝祖之傳祚而後紹述之蹤始滅紹述之蹤滅而惠姦之政亦熄矣高宗母韋氏位賢妃從上皇北遷建炎初遙尊為宣和皇后後加尊為皇太后帝嘗泣諭輔臣曰太后春秋高朕思之不遑寧處朕有天下而養不及親宜立誓信明言歸我太后朕不耻和不然朕不憚用兵適金遣蕭毅來議和帝又語之曰太后果還自當謹守誓約如其未也雖有誓約徒為虛文及命何鑄曹勛報謝復召至內殿諭之曰朕北望庭闈無淚可揮卿見金主當曰慈親之在上國一老人耳在本國則所繫甚重以至誠説之庶彼有所感動鑄等至金國再三懇請金主始允録曰帝之本心於是畢露矣乃責之以迎還二聖恢復中原千言萬語不過一長説耳何者愛博一也得失二也利害三也是三者根於其心人莫得而移之也人但見父兮生我而莫知三十一人之衆則與一子一母者孰親且以貌類將種失其煦煦之恩則與膚體相連者孰切茍父兄如在不過一王爵而已其與父天母地握乾履坤臣妾億兆指揮萬乘者孰得京師已復不過一南面而已其與笑傲湖山忘情險阻南人自南北人自北者孰利雖至親如敵體不以為念何者毋一而已人皆后也此帝之本心如鑑之明故其信誓如日之皎夫安得而奪之哉是以君子貴於擴充四端莫使其一有所蔽而繼之曰苟能充之足以保四海茍不充之不足以保妻子斯言直似為帝而設乃知聖賢預已定之於前豈後人千言萬語所能倣佛哉隆祐太后生辰置酒宫中后泣謂高宗曰吾老矣切有所懷為官家言之吾逮事宣仁聖烈皇后聰明母儀古今未有其比昔者姦臣肆為謗誣建炎初雖嘗下詔明辨而國史尚未刪定豈足傳信吾意先后在天之靈不無望於帝也高宗悚然乃詔重修録曰宜仁之知隆祐如歲寒松柏遇變而莫能改也隆祐之便宣仁如大冬嚴雪見晛而莫能留也有如是之婦而不負如是之姑此天所愸遺一老俾守我王者也嗚呼生稱女中堯舜沒為被謗宣仁京與惇之罪可勝誅哉朱墨之史惜乎晚矣范氏自鎮至祖禹比三世居禁林士論榮慕元祐中祖禹修神宗實録大書王安石之過安石壻蔡卞惡之坐謫死嶺表至是高宗亟詔重修神哲兩朝實録乃召祖禹之子沖為宗正少卿兼直史館上謂之曰兩朝大典皆為姦臣所壞故以屬卿沖為考異一書明示去取書文以墨書刪去者以黃書新修者以朱書世號朱墨史又為哲宗辨誣録由是二史皆得其正而姦臣情狀益著矣先是宣仁太后崩中外洶洶人懷顧望莫改發祖禹上疏曰陛下方攬庶政延見群臣此國家隆替之本社稷安危之機生民休戚之端君子小人進退消長之際天命人心去就離合之時也可不畏哉先后有大功于宗社有大德于生靈九年之間始終如一然群小怨恨亦不為少必將以改先帝之政逐先帝之臣為言以事離間不可不察也先后因天下人心變而更化此輩上負先帝下負萬民天下之所讎疾而欲去之者也后豈有憎惡於其間哉惟辨折是非深拒邪説有以姦言惑聽者付之典刑痛懲一人以警群慝則怡然無事矣又曰先后以大公至正為心罷安石惠卿所造新法而行祖宗舊政故社稷危而復安人心離而復合乃至遼主亦戒其臣勿生事外夷之情如此中國之心可知先后日夜苦心勞力為陛下立太平之基願陛下恭己以臨之虛心以處之則群臣邪正萬事是非了然于聖心矣章纍上不報至是始信其言云録曰愚觀朱墨之史不獨宣仁之幸抑亦范氏之幸也其父以實録詆誣連貶而死其子乃辨正所詆别白而書使一時之事如日之閉于重陰而復光也一家之中猶稿之噓于煨燼而復褻也此可見天理人心至足憑信而是非邪正真莫能移未定者一時昭著者萬世人豈可甘心一時而忽棄萬世乎陳瓘為左司員外郎兼權給事中曾布使客諭以將即真瓘語其子正彙曰吾與丞相議事不合今若此是欲以官爵相餌也若受其薦進復有異同則公議私恩兩愧矣吾有一書論其過將投之以決去就但郊恩不逺彼不相容則澤不及汝矣能不介于心乎正彙願得書省布布大怒遂除名竄袁州正彙在杭復告蔡京有動搖東宫迹乃執送京師下開封獄併逮瓘尹李孝稱逼使證其妄瓘曰正彙聞京將不利社稷傳于道路瓘豈得預知以所不知忘父子之恩而指其為妄則情有所不忍挾私情以符合其説又義所不為京之姦邪必為國禍瓘固嘗論之于諫省亦不待今曰語言間也內侍黃經臣蒞鞠聞其辭謂曰主上正欲得實但如言以對可也又嘗著尊堯集謂紹聖史官專據王安石日録改修神宗史變亂是非不可傳信深明誣妄以正君臣之義至是宰相命凶人石悈執瓘至庭大陳獄具將脅以死瓘揣知其意大呼曰今日之事豈被制旨邪悈始告曰朝廷令尊堯集爾瓘曰然則何用如許使君知尊堯所以立名乎蓋以神教為堯主上為舜尊堯何得為罪時相學術淺短為人所愚君所得幾何乃亦不畏公議耶悈始慚退録曰充之所修南與北異代也瓘之所著京與卞同時也然則國史可改而人心不可改廟堂可略而草野不可略一時之凶威可畏而萬世之公論難泯君子之所可信者惟此而已若乃父信其子令投書以決其去子信其父願得書以正其姦寧舍郊恩而不忍違其父寧坐誣罔而不忍誣其子斯固人情之至而實邦家之光也如是而紀人無愧也已趙𣇄自潮徙置吉陽軍子汾力已侍行公不許曰紹聖初吕大防謫嶺南惟一子景山愛之不令同行而景山堅欲從既至虔將過嶺吕顧其子泣曰吾老矣死何足恤汝幼何罪欲俱死瘴鄉耶我不若先死令汝護喪歸則吾猶有後也遂縱飲而死吾不令汝侍行亦吕之意及至潛居深處門人故吏皆不敢通會降旨本軍月具存亡申省至是乃復呼其子至曰檜必欲死我不爾禍及一家自書墓志並除拜年月仍題云身騎箕尾歸天上氣作山河壯本朝遂不食而死汾護喪歸守臣章傑知平時中外士大夫與公簡牘往來今適會葬必携酒釀可為奇貨亟遣下縣兵以搜私釀為名馳往掩取縣尉翁蒙之書片紙走僕自後垣出密以告汾盡焚篋中書及方刀之屬比官兵至無所得檜之憾猶未已諷御史徐嘉論汾與宗室知泉州令襟飮别厚贐必有姦謀詔送大理獄使汾自誣與張浚李光胡寅胡銓等五十三人謀大逆獄成而檜病不能書獲釋𣇄與子之言無不信云録曰愚觀趙忠簡臨末之言果可信乎孟子曰其為氣也至大至剛以直養而無害則塞乎天地之間天地尚可塞山河獨不可壯乎惜乎不能順受其正也死人之大命也縲絏桎梏與夫巖墻溝瀆顧吾審處之何如耳茍得其正則雖縲絏不為罪桎梏不為辱不得其正則與巖墻溝瀆相等胡為乎而以不食死也家外物易得也身在己難得也與其顧吾之一家寧惜吾之一身檜雖凶焰可畏而吾身在有餘安知不如章傑之捕今襟之獄乎抑微仲與𣇄顧息其子曾不若田畫之責鄒浩豈其老而戒得乎不然縱飲之與不汙非嶺海之外能生死人也御製文集洪武十一年命江陰侯吳良督工新造皇堂時太祖皇帝以皇陵碑記皆儒臣粉飭之文恐不足以傳信特自述艱難明昌運俾世代見之庶無疑惑其辭曰昔我父皇寓居是方晨業艱辛朝夕倣徨俄爾天災流行眷屬罹殃皇考終于六十有四皇妣五十有九而亡悠悠而無有志落魄而佒佯身如蓬逐風而不止心滚滾乎沸湯一浮雲乎三載年方二十而強時乃長準盜起民生攘攘已而仍復業於皇任方三載而雄者跳梁初起汝頴次及鳳陽之南廂豫脫旅隊馭馬控韁出遊南土氣舒而光倡農夫以入伍事業是匡不逾月而衆集赤幟蔽野而盈岡率渡清流戌守滁陽思親舊終日慷慨群雄並驅飲食不遑暫戍和州東渡大江首撫姑熟禮儀是尚遂定建業四守關防礪兵秣馬靜看頡頏親征荆楚將平湖湘三苗盡服廣海入強命大將軍東平乎吳越齊魯耀乎旌幢西有乎伊洛崤亟地險河湟入胡都而市不易肆虎臣露鋒刃而燦若星鋩已而長驅乎井徑河山之內外民庶咸仰關中即定市巷笙簧玄菟樂浪以歸版籍南藩十有三國而來王倚金陵而定鼎託虎踞而儀鳳凰天暫星高而月輝滄海鐘山鎮嶽而巒接乎銀潢欲厚陵之微葬卜者乃曰不可而地且藏于是祀事之禮已定每精潔乎蒸嘗惟劬勞罔極之恩難報勒石銘于皇堂世世承運而務德願時時而來饗録曰臣伏讀聖祖皇陵之詞非但直述艱難明昌運乃有深意存于其間不可以不察也夫皇堂之秀非擇而取之不得已也今且貴為天子富有四海雖極其改作何所不可哉而不知智者明于將然不若驗于已然地道雖悠逺而難知人事則易見也親體雖幽微而難測事業則可知也皇堂未葬之先江北一布衣而已故睿筆所書不啻其如彼也皇堂已葬之後淮泗一真龍也故神功所就不啻其若此也可不求其故哉夫謀而後獲必求而可得此人也非天也莫之為而為莫之致而致此天也非人也太王之遷岐三世而有天下君子尚以為王迹所由矧於身殁之後耶且地道以靜為本親體以安為大龍氣之潛藏不在乎小與太也福德之聚會不在乎逺與近也使于此而距人之謀違天之道固知人君雖有造命之本地道終鮮安靜之福子心雖極尊崇之意親體不免震動之虞以此而方彼孰得而孰失哉此聖祖言雖直筆意實悠逺萬世聖子神孫所當崇信而勿失也名臣録倪尚書嶽歷官兩京四部至太子少保又文僖公謙亦官南京禮部尚書母夫人姚氏初文僖公奉命代祀北嶽姚夫人夜夢緋袍神人入室寤而生公以為嶽神所感也因名曰嶽及長體貌豐碩目光炯炯望之真若神人父子並為學士諡為文所著青溪藁與文僖集並行于世世所難得後有疾猶手書薦藁既殆強索筆書平生公正無偏私數語竟不及家事此其人存殁信乎非群生旅喪者比也韓尚書文上世出相州宋朝魏公之裔至公生時母夫人夢紫衣人語之曰吾送文潞公與爾因以文名後歷官至太子太保嘉靖初賜勑褒問有曰比因權姦之竊柄痛惟朝政之紛更乃能守正不阿以忠自誓倡危言而叩闕屹乎山嶽之難搖甘奇禍以忘家凛爾氷霜之不變天下仰其風采神明相其壽康起文彥博于九喪之餘人心攸屬繼韓魏公于百代之後家慶彌彰時人莫不以為可信云録曰二公之事理之所有乃天生一代偉人不偶然者録之弘道録卷弘道録俠六信夫婦之信堯典曰我其試哉女于時觀厥刑于二女録曰愚觀堯之試舜不獨于其所勉而於其所忽勉焉者朝著之上也忽焉者衽席之間也是故二女同居而志不同行者衆人之常也刑于寡妻至于兄弟以迓於家邦者聖人之獨也然必如之何而後謂之刑哉必相敬如賓而禮義生也必尊卑有序而上下和也必剛柔不紊而妬忌逺也必動靜不違而內外洽也此玄德升聞即莫見莫顯之實而溫恭允塞乃戒謹恐懼之微孰謂重華之治不自愼獨中來耶不然何以曰舜可襌乎吾兹試矣詩南國彼文王之化女子有能以貞信自守而不為強暴所汙者自述己志作詩以絶其人曰厭浥行露豈不夙夜畏行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從録曰女子何乃是擢乎曰歸妹愆期遲歸有時孔子曰沽之哉沽之哉我待價者也夫美如桃夭而不冶貞如堅石而不移貞女之自守必待嬿婉之求也奈之何知德者希強暴者衆乎惟士亦然氣如白虹而不劌精神見于山川而不華君子之抱道必待明良之會也奈之何治日常少亂日常多乎夫是而有此懼又有此訴也觀之傳説之胥摩管仲之請囚叔向之縲絏王魏之反讎何期不照至于獄乎此人材困頓之憂女子強暴之歡萬古所同然也莊薑美而無子以陳女戴媯之子完為己子莊公卒完即位嬖人之子州吁弒之故戴媯大歸于陳而莊薑作詩送之曰仲氏任只其心塞淵終溫且惠淑愼其身先君之思以朂寡人録曰易之歸妹曰眇能視以夫人之賢而遇莊公之暴自明者觀之幾欲抉目而去其翳也而乃有先君之思暴與否安在哉又曰利幽人之貞以莊薑之無寵而遭州吁之篡逆人之去之不啻覆几而纖其豚也而乃終小君之位逆與否又安在哉是知貞可以格天順可以得人易有信及豚魚詩有我心匪石昭貞順也衛世子共伯蚤死其妻共薑守義父母欲奪而嫁之故共薑作詩以自誓曰泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只録曰貞與天通人而不由也則可以知其人信與鬼合父而不達也則可以知其父蓋膚體血肉之可同者人也人則易見聲響志氣之所感者天也天則難知宜乎父母欲奪而嫁之也列女傳貞薑者楚昭王夫人王出逰留夫人漸臺之上及江水大至王聞使使者迎夫人而忘持其符使者至夫人曰王與宫人約令召必以符今不持符妾不敢從使者曰今水方大至還而取符則恐後矣夫人曰妾聞之貞女之義不敢犯約守一而已于是使者往取符則水大至臺崩夫人流而死録曰婦人從一而終一者非必一人也凡一端一節一約一信皆是王既約以符矣符不至薑之命索盡乎何為其不諒我之心也然則其死與不死存乎忘與不忘之間此君子所以篤信好學守死善道設若可存可亡可召可棄則豈君子之謂哉漢書吕后父吕公者善相人見高祖狀貌敬信之曰相人多矣無如季者願季自愛臣有息女托為箕帚妾吕媪怒曰公始奇此女云與貴人沛令善公求之不與何妄許季乎公曰此非兒女子所知卒與季是為吕后生惠帝魯元公主嘗與兩子居田中有老父過請飲后因餔之老父相后曰夫人天下貴人也見惠帝曰夫人所以貢者乃此男也老父已去高祖適從旁舍來后具言狀乃追及老父老父復曰卿者夫人兒子皆以君君相貴不可言高祖謝曰誠如父言不敢忘德後漢和熹鄧皇后太傅禹之孫父訓母陰氏光烈皇后從女弟也后嘗夢捫天蕩蕩正青若有鍾乳狀仰嗽飲之以訊諸占夢吉不可言后叔父陔常言聞活千人者子孫有封兄訓為謁者修石曰河歲活數千人天道可信家必興先太傅禹亦嘆吾將百萬之衆未嘗妄殺一人後世必蒙福至是后選入宫為貴人及陰后漸疏見后容寵日盛遂造巫蠱欲以為害屬帝寖疾陰后密言我得意不令鄧氏復有遺類后聞乃對左右流涕言曰我盡誠心以事皇后竟不為所祐我甘心誓死即欲飲藥宫人趙玉者固止之詒言上疾已愈后信之明日帝果廖後陰后以巫蠱事廢帝屬意語有司曰鄧貴人德𠜍後宫宜立之是為皇后録曰帝王之興必有天數矧二后敵體至尊又皆君臨稱制故於天意亟有徵驗非區區掖庭之寵可比也卒以內助之竒中益堅沛公之素心而外道之邪謀適啓鄧氏之隆盛天道益可信矣録之陳孝婦者年十六而嫁未有子其夫當行戍囑孝婦曰我生死未可知幸有老母無他兄弟備養吾不還汝肯養吾母乎婦應曰諾夫果死不還婦養姑不衰其父母哀其年少無子將取而嫁之孝婦曰妾聞信者人之幹也義者行之節也棄託不信背死不義不可也與其載于地而生寧載于義而死且以養人老母而不能卒許人以諾而不能信將何以自立于世因欲自殺其父母懼遂使卒養其姑姑死葬之終奉祭祀淮陽太守以聞文帝高其義貴其信使使者賜之黃金四十斤復之終身録曰自古皆有死民無信不立孝婦一戍妻耳自漢至今傳之幾千百年向無信義豈不與草木同腐哉一時之榮枯甚微萬世之大寶實重嗚呼以是坊民猶有食君之言負己之諾背人之約如詩所刺聼言則對誦言如醉者沛郡劉長卿妻同郡桓鸞之女也生一男五歲而長卿卒妻防逺嫌疑不肯歸寧兒年十五文夫妻慮不免乃豫刑其耳以誓信宗婦相與愍之曰若家殊無他意假令有之猶可因姑姊妹以表其誠何至輕身之甚哉對曰昔我先君五更學為儒宗尊為帝師歷代不替男以忠顯女以貞稱詩云無念爾祖聿修厥德沛相王吉上其奏朝廷旌之號曰行義桓𡟋南陽陰瑜妻頴川荀爽之女也名采産一女而瑜卒采時尚豐少後同郡郭奕喪妻爽以采許之爽詐稱病篤采不得已而歸懷刃自誓爽令傳婢執奪其刃勑衛甚嚴遂之郭氏采偽為歡悅之色謂左右曰我本立志與陰同穴而不免逼迫以至于此素清不信奈何乃命建四燈盛裝飾請奕入見相對共談言辭不輟奕敬憚之遂不敢逼至曙而出采因令左右辨浴既入室而掩户以粉書扉上曰尸還陰氏遂以衣帶自縊録曰二女皆出名家表儀斯世爽乃不信其女自貽伊戚吁可惜哉采之不改初誓真有謂余不信有如皎日之風雖然與其相共談笑偽為歡悅之色寧若豫刑其耳以彰信於未然乎觀者詳之魏書曹爽從弟文叔妻譙郡夏侯文寧之女名令女文叔蚤死自以年少無子恐家必嫁已乃斷髮為信居止常依爽及爽被誅令女叔父上書與曹氏絶昏強迎令女歸時文寧為梁相憐其少又曹氏無遺類冀其意阻乃微使人諷之令女嘆且泣入寖室以刀斷鼻蒙被而卧其母呼與語不應發被視之血流滿床席舉家驚惶或謂之曰人生世間如輕塵棲弱草耳何辛苦乃爾令女曰聞仁者不以盛衰改節義者不以存亡易心曹氏前盛之時尚欲保絡况今衰亡何忍棄之禽獸之行吾豈為乎録曰義理之在人心達人巨公與婦人女子宜乎有間而反相戾何也道上之汙梁指者甘之沸𣇄之羹垂涎者饜之若乃山下之泉其清自若也太羹之味其質猶存也匹夫匹婦之心可以動天地貫金石而百官朝著之間曾不若辨髦上梗然此君子所以深嘆也録之不能已也晉書虞忠妻孫氏權族孫女也忠亡誓不改節撫孤潭童幼訓以忠義永嘉末潭為南康太守值杜韜叛率衆討之孫勉以必死之義傾其資産以餽戰士潭遂尅捷及蘇峻亂潭守吳興假節征峻孫戒之曰吾聞忠臣出於孝子之門汝當捨生取義勿以吾老為慮仍盡發其家童助戰貿其所服環佩以為軍資遂拜武昌侯太夫人加金章紫綬潭立養堂於家王導以下皆就拜謁卒年九十五帝遣使吊祭賜諡曰定録曰婦之有諡古未之聞也以孫之純行不爽諡之曰定誠無負矣蓋惟其效夫也誠故其教子也篤守節之也堅故其亨壽之也久孔子不云歲寒然後知松柏之後凋其定夫人之謂歟唐書太穆順聖皇后竇氏京兆平陵人父毅在周為上柱國尚武帝姊襄陽公主入隋為定州總管神武公后生髮垂過頸三歲與身等武帝愛之養宫中異他甥嘗謂主曰此女有奇相且識不凡何可妄與人因畫二孔雀屏間婚者請射二矢陰約中目則許之射者閲數十皆不合高祖最後射中各一目遂歸於帝録曰匹配之道非惟夫擇婦婦亦擇夫及其至也莫不有一定之分詩所謂天作之合者也晉隋之際巧藝如堵畫屏之雀比之貫虱特易易耳而卒中雙目乃神堯之主固知天所一定非人力所強求也其後長孫后之圖婚因以知太穆之奇子二帝二后媲美同德追視連交二捷豈偶然哉豈偶然哉太宗密問太史令李淳風祕記所云信有之乎對曰臣仰稽天象俯察曆數其人已在陛下宫中為親屬自今不過三十年當王天下殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違且王者不死徒多殺無辜但自今已往尚三十年其人已老庶幾頗有慈心為禍或淺今借使得而殺之天或生壯者肆其怨毒陛下子孫無遺類矣上乃止録曰假令沛公死天下其無沛公此權謀之言也今借使得而殺之天或生壯者此術數之言也若夫君子之心當安求哉夫行一不義殺一不辜而得天下有所不為二代之所以本支百世用此道也帝所為不義之事不辜之戮何啻其多天所以報之者一間耳以帝之英明剛斷料事于未然特一宫中親屬不可推而得之耶假令復生壯者寧免于聚塵之耻乎君子與其計利害之大小不若論義理之得失東都仁和里裴尚書寬子孫衆盛實為名閥天后時宰相魏玄同選尚書之先為壻未成婚而魏陷羅熾獄家徒表及北還女已踰笄其家議無以為衣食資願下髮為尼有一尼自外至曰女福厚豐必有令配子孫將遍天下宜北歸家人遂不敢議及荆門則裴齎裝以迎矣後生八子皆擢明經任臺省刺史及寬為潤州參軍刺史韋詵有女擇所宜歸會詵休日登樓見人于後圃有所瘞藏訪諸吏曰裴參軍居也詵問狀答曰寬義不以苞直汙家適有以應肉為餉致而去不敢自欺故瘞之詵嗟異許妻以女歸語妻曰常求佳壻合得之矣明日會其族使觀之寬時衣碧瘠而長既入族人皆笑呼為碧鸛雀詵曰愛其女必以為賢公卿妻也何可以貌求人卒妻公柳玭嘗曰今勢利之徒拾信誓如反掌則斐之蕃衍乃天之報施也録曰恆之為卦也聖人久于其道先之以誠腆繼之以直信終則有始是以其道大亨也咸之為卦也君子以虛受人得其正而相感量其女而求配有感必通是以其道亦亨也方魏民之罹變也豈暇計女福之豐哉然而長女長男之情未嘗易也一旦剛柔皆應而子姓蕃衍夫不待求而得之矣及韋氏之擇壻也亦豈論族人之哂哉然而篤實誠慤之義真有見也一旦安説而應而為賢公卿妻又豈伺卜而知之哉可以見古人動必以誠事必以信而天之施報亦不可誣矣豈區區勢利之所可及乎宋史周渭妻莫荃賢婦人也渭字得臣昭州恭城人劉鋹據五嶺昭州乃其地也政繁賦重民不聊生渭率鄉人踰嶺將避地零陵未至中途賊起斷道絶糧復還恭城則廬舍煨燼復脫身北上建隆初至京師為薛居正所禮上書言時務召試賜進士出身太平興國二年渭為廣南諸州轉運副使初渭北走時不暇與荃别二子孩幼荃尚少父母欲嫁之荃泣誓曰渭非久困者今違難逺適必能自奮益親蠶織躬碓春以給朝夕開寶其羊南漢平詔昭州訪求賜錢米存恤之及是凡二十有六年而渭始還故里與荃相見時人嗟異之二子皆畢婚娶朱昂著其事傳以為信録曰愚觀莫荃之事而嘆秦漢間之俗之悖也夫蘇秦之婦一炊尚難買臣之妻信宿不待矧於二十六年之久二子孩幼之别乎宋德方興嶺表夷風丕變亦不至如位高金多前驅擁彗而闢人以治道者嗚呼可謂賢矣理宗謝皇后父渠伯祖深甫后生而黧黑醫一目渠伯早卒家産益破嘗躬親汲飪初深甫為相有援立楊太后功太后德之理宗即位議擇中宫太后命選謝氏諸女后獨在室諸父擇伯不可曰即奉詔當厚奉資裝會元夕有鵲來巢燈山衆以為祥乃應詔后旋病疹良已膚蛻瑩白如玉又藥去目醫時賈涉女有殊色同在選中及入宫理宗欲立賈氏太后曰謝女端重有福宜正中宫左右亦皆竊語曰不立真皇后乃立假皇后耶帝不能奪遂定録曰詩有云艷妻煽方處甚矣女寵之為禍本也彼宋朝家法所以逺過漢唐者豈非外戚不預政而然哉自賈涉女有殊色雖奪于衆議未能正位中宫而袵席之愛敦能奪之乎于是似道由司倉小吏赴對大廷旋即軍中拜為右相蓋由鴆毒之害生于其心而虎狼之威害于其政卒致趙社丘墟謝后俘虜而帝之顱骨亦不能保其名固賈其禍實真左右竊語之言與攑伯辭婚之意鑿鑿乎為可信矣言行録黃龜年未弟時家貧自處湛如及應鄉舉有考官李朝旌職本縣尉見龜年大奇之私自語曰安得此郎出我門下既而果與薦尉喜甚願妻以女後龜年登第歸尉已捐館妻孥輿襯相遇于道龜年哭之使人道意請遂初約尉妻辭曰往事尚忍言哉無祿縣尉淸貧死無私積吾携百指扶護西歸衣裝斥賣殆盡懼不能逹那可議先輩婚先輩第黃甲當結好𣇄族吾且行矣善為我辭龜年垂淚曰吾許以諾死而負之何以自立夫人不念死者言乃作世俗夷虜語若遂吾志秋毫自齎不敢聞命遂定婚邂逅間分携慟哭而别録曰劉廷式黃龜年皆不以登第負其初心者彼富易交貴易妻已先喪矣何以責人乎檜之四疏誠非忘自責也彼常同詹大方者希檜之意以為趣操不正附麗匪人則時事可知矣陳讓邵武府志黃氏名淑字致柔建寧縣三溪人幼通經史能詩文詞翰俱美適同邑進士王防防為泗州户曹卒黃潔其柩回哀毁骨立服除親戚問議改適黃聞之曰何面目見王司户乎不從竟憂鬱以死臨終囑其妾曰吾所為詩不忍棄其以殉妾乃以藁置柩中其父拾其餘尚百篇內有詠竹者云徑直忠臣節孤高烈女心四時同一色霜雪不能侵録曰自愚觀周南詩南有喬木一篇凡云不可蓋八木嘗不嘆貞女之自信而人亦敬信之也彼後世蔡文姬李易庵失貞淑寧有此乎此詩黃氏所自作苟殉人請將安信乎然則為士者雖有作或未能盡信也嗚呼可不愼哉嘉禾志含香晚翠者明芳洲張黃門寧之二妾也少婉娩相信愛皆以良家子事公公殁主母以年皆妙將遣之結誓共守各剪髮以見志遂不敢言自是寒幌孤樓窮年兀兀公復四海空囊身後家益落茹荼食糵不知老之將至家人鮮得見其面又公女恆淸為指揮姚麟妻早寡亦以誓守扚是君子曰詩有云言笑晏晏信誓旦旦此之謂與嘉靖中詎旌表雙節云録曰愚觀君臣夫婦之際皆以義合二妾所以信公以公嘗信于君也公平生謇諤自將致英廟益信任而為權姦側目時宰擠排自後愍愍終身不復求售然則二妾者安忍事主而不盡其年哉録之弘道録卷弘道録俠七信昆弟之信史記成王與其弟叔虞戲削桐葉為圭曰吾以此封若史佚命擇日王曰吾與之戲爾史佚曰天子無戲言言則史書之禮成之樂歌之遂封叔虞于堯之故墟號曰唐侯録曰柳子曰王之弟當封耶周公宜以時言于王不待戲而賀以成之也不當封耶周公乃成其不中之戲以地以人與弱小者為之主其得為聖乎愚意不然夫古之聖賢所以善事其君而引于當道者必因其善端發見之微而成其誘掖奬勸之美孟子之論觳觫有以也而况幼沖之君乎蒙之九二曰包蒙吉六四曰困蒙吝夫以幼沖之君其心譬則始萌之物柔弱未固以順正之則直而逹以拂逆之則遏而邪故當治蒙之任者必大其含容廣其施溥將順輔導之不置則能成治蒙之功而無往不吉苟其一言之所出未至於惡也而遽沸戾之一事之所行未至于背也而遽遏抑之則蒙者之心愈見其不通束縛拘執殆有不勝其困者而吾之所行亦無往而不吝矣聖人之所深戒也古之善養蒙者莫如孟母孟子幼時問東家殺者可為曰將以啖汝既而悔之乃買豬肉以食之剪桐之事即此意也夫成王雖有一言之戲乃施于手足之親使為周公者遽然正其顔色嚴其詞命以為不當封又不當戲則成王一言之間未見其不可而惟畏吾之拘迫切吾之嚴憚其心必轉而向之于他矣故曰成之乃所以將順之且使其戲言之失泯然不見其迹然後吾之言油然入人之深矣豈不君臣俱美耶後世乃有不能就其君一念之微而擴充之專務困蒙以自取悔吝者其于周公又何有焉左傳僖公二十二年宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗秋諸侯會宋公于孟子魚曰禍其在此乎君欲已甚其何以堪之于是楚執宋公以伐宋冬會于薄以釋之子魚曰禍猶未也未足以懲君二十二年宋公伐鄭子魚曰所謂禍在此矣冬十一月已已朔宋公及楚人戰于泓宋師敗續二十三年春齊侯伐宋圍緍夏五月宋襄公卒傷于泓故也録曰夫筮龜無當而子魚有智鑿鑿乎其言之可信也夫伯雖以力然亦有道焉曰愛衆睦親之仁曰排難息爭之義曰聲盛致志之勇曰度德量力之智襄公乍會而虐二國之君不仁甚矣始盟而肆圍城之慘不義甚矣創伯而被執伐之辱無勇甚矣屢敗而無反己之心不智甚矣無是數者吾不知襄公何以求長於諸侯耶今有市井不逞之徒其囂囂武斷四鄰若無人也或今日訟一人明日又訟一人幸勝則欣然自滿不勝不反諸己乃隔别而求勝焉然而縲絏矣刑罰矣身無完膚矣猶未足以為懲也必至于大戮而後已焉朱襄之禍何異是哉以是為鑒筮龜不足憑矣衛宣公蒸於夷薑生急子為之娶于齊而美公自取之生壽及朔是為宣薑宣薑與公子朔構急子公命往諸齊使盜待于莘而殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌先往盜殺之急子至曰我之求也此何罪請殺我乎又殺之國人哀之為之賦曰二子乘舟泛泛其景願言思子中心養養二子乘舟泛泛其逝願言思子不遐有害録曰古人於處死之際必擇一善以為成名之地後世則胥亡而已耳漢之衛太子史皇孫唐之建成元吉宋之光美德昭均之一死也人人得而議之衛之伇壽晉之申生民到于今稱之豈非能擇死乎或曰君子貞而不諒二子之爭諒而不貞言必信行必果硜硜然小人哉雖然不諒不果紾兄而奪之食其去數子能幾何哉能幾何哉檀兮石祁子之父駘仲卒無適子有庶子六人卜所以為後者人謂之曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也録曰孝弟順德也故通于神明信於卦兆所謂官占惟先蔽志昆命于元龜是也彼五人者信卜而不信已謀人而不謀神何俟啓籥見書而後知三龜之不從哉漢書高后欲立諸吕昆弟為王問右丞相陵陵曰高弟刑白馬盟非劉氏而王天下共擊之今王吕氏非約也太后不悅問左丞相平太尉勃對曰高帝定天下王子弟今太后稱制王諸吕無所不可太后喜罷朝陵讓平勃曰始與高帝嚏血盟諸君不在耶今高帝崩太后欲王吕氏諸君縱欲阿意何面目見高帝于地下乎平勃曰于今面折廷爭臣不如君全社稷定劉氏後君亦不如臣陵無以應録曰剪桐之信與嚏血之盟何以異乎叔虞手足之親分封者制也故周公當有以成之諸吕邪妃之私欲王者悖也故王陵當有以止之此人臣之義當以王陵為正平勃蓋不足言也文帝竇后兄長君弟廣國字少君年四五歲時家貧為人所略賣其家不知處傳十餘家至宜陽為其主人入山作炭暮卧岸下岸崩盡壓殺卧者百餘人少君獨脫不死從其家之長安自卜數日當為侯時皇后新立家在觀津姓竇氏廣國去時雖少識其縣名及姓又嘗與其姊采桑墮用為符信上書自陳皇后言帝召見問之具言其故果是復問其所識曰姊去我西時與我決傳舍中旬沐我已飯我乃去于是竇后持之而泣加以厚賜仍賜弟長安絳侯灌將軍等曰吾不死命乃且懸此兩人此兩人所出微不可不為擇師傳又復于吕氏大事也于是乃選長者之有節行者與居二人由此為退讓君子不敢以富貴驕人録曰愚觀漢世大學不明舍天子之元子衆子而不教乃獨教此二人真可謂不知類也已彼絳灌者何所而不為己謀哉始也懼禍之及終也畏命之亡况此所出古今罕聞一旦得志惕懾若此何况寖寖奕世之權寵耶莾所由來之患非一朝一夕之故也宋史王安石執政王安禮上疏曰人事失于下則變象見于上陛下有仁民愛物之心而澤不下究意者左右大臣不均不直謂忠者為不忠不賢者為賢乘權射利者用力殫于溝癢取利究于園夫足以干陰陽而召星變案察親近之行杜邪枉之門至于祈攘小數言不足以應天變神宗覽疏嘉歎諭之曰王圭欲使卿條具朕謂不應阻格人言以自壅障今以一指蔽目雖泰華在前不之見與近習蔽其君何以異此卿當益自信神宗又語宰輔曰富弼有章疏來章惇曰弼所言何事帝曰言朕左右多小人惇曰可令分析孰為小人帝曰弼三朝老臣豈可令分析左丞王安禮曰弼之言是也罷朝惇責安禮曰左丞對上之言失矣安禮曰吾輩今日曰誠如上論明日曰聖學非臣所及安得不謂之以對録曰自古乖戾之臣或能期於其君而不能欺於其家能欺天下而不能欺同氣茍其兄曰天變不足畏人言不足恤而其弟曰人事失于下則變象見于上其君既曰一指蔽目雖太華不之見其大臣又曰左右近習多小人壅閉其君豈不曉然明白然而卒不能移此理殆不可信豈天奪其本心如所謂大車無輗小車無軏者哉不然以老待弼非惟無以副之而以弟叛兄反謂益當自信縱使迷惑何至顚到之若是耶有宋元豐八年河南程皓伯淳卒文彥博題其墓曰明道先生其弟頤序之曰周公沒聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則貿貿焉莫之所之人欲肆而天理滅矣先生生于千四百年之後得不傳之學於遺經以興起斯文為已任辨異端闕邪説使聖人之道煥然復明於世蓋自孟子以後一人而已然學者於道不知所向則孰知斯人之為功不知所至則孰知斯名之稱情也哉録曰行實之所狀陟降進退作止語默人不間於其父母昆弟之言也明道之所序聖賢傳統師友淵源所不係於其因心之論也然則潞公能題之顧不能序之何歟二夫子之在當時媲美同德譬則圭璋瑚璉肆無二價而玉人異其品題世將反不信矣回視安禮之訟安石可以同日語哉王庠弟序纍世同居號曰義門父夢易嘗攝興州改四川茶運置茶鋪免役民部刺史恨其不出已以他事中之鎸三秩罷歸而卒母向氏欽肅皇后姑也哀毁憤切庠謂序曰父以直道見擠母撫柩誓言期我兄弟成立贈復父官方許歸葬相與勉之遂閉户窮經史尋師千里究其旨歸蚤歲上宰相書持中立不倚之論吕陶蘇轍皆器重之又以經説寄蘇軾曰二帝三王之時士志於道德惟其自得之難故守之至堅自孔孟作六經斯道有一定之論士之所養反不逮古乃知後世見六經之易忽之而不行也軾復曰誠哉是言元祐中吕陶薦之應制科遂論時政得失謂中外壅蔽將生寇戎之患下弟竟歸大觀中行舍法復以庠應詔辭曰昔以母中年求侍養今母老乃奉詔豈本心乎乃以序升朝贈父官始克葬至母卒終喪復舉八行大司成考定天下第一詔旌其門太后嘗欲官庠輒以遜序後庠卒孝宗諡曰賢節録曰甚矣晚節之難也以庠之篤信好學不輕仕進悅親信友不干榮祿或議其暮年隱操少衰士可不愼乎哉或又曰庠乃貴戚之巨擘始之淬勵遍交名賢願以顯親之名卒之浮沉無所建立遂以成己之志其居第之華縟恩命之輝煌蓋亦不得已非可以偉元之行仲車之節責之也觀者不可不知理宗幼名與莒弟與苪潛龍時日者嘗言二子極貴人未之信也時史彌逺在相位久皇子竑惡之丞相念欲有所置會沂靖王宫無後欲借是陰以為備有相府館客余天錫性謹願不預外事彌逺器重之至是告歸鄉試謂之曰今沂王無後宗子賢厚者幸具以來天錫渡江抵越之西門天大雨門左有全保長因過避兩保長具雞忝甚肅須臾引二子待立天錫異而門之全曰此吾外孫也天錫憶丞相所屬且其班行良是就以告彌逺遂命二子來保長大喜鬻田治衣冠集姻黨送行天錫引見彌逺善相大奇之計恐事泄不便遽使復歸保長大慙踰年彌逺忽謂天錫曰二子可復來乎保長謝不遺彌逺密諭曰二子長最貴宜撫於家未幾召嗣沂王迄即帝位即理宗也録曰愚觀余天錫鄭清之皆以學究而致位台𣇄趙與莒趙與芮本以齊民而升聞至尊是時八柄之重九五之貴在於呼吸掌握轉移進退之間朝廷不預聞也母后不預知也宋之天下至此徒寄空名於其上爾如此好據安得不深信計安得不密權寵安得不尊而師相又安敢復制儲極又安敢復恃乎易有不密害成詩有耳屬于垣蓋言權也通志明嘉魚李承芳字茂卿號東嶠弟承箕字世卿號大崖二人清修苦節好古力行鬱鬱抱奇氣不能與世俯仰學皆不治章句必欲直探孔孟遺旨少時其父指鄉人孔御史愛誦衣紫腰金拜彩堂今信矣兒能如是乎對曰富貴不淫貧賤樂兒愛此耳及長為庠生厭科舉之業所司迫蹙就試遂同占鄉書嘗閲先儒注腳以為破裂聖經曰詩書者吾道之迹而已近代以來害天下之人心者莫甚于學宫害天下之士習者莫甚于科舉率天下士類而無忌憚者莫甚于今之師帥必將一切盡廢去之求老師宿儒如一鄉之善士則師其一鄉一國之善士則師其一國然後為得也拜大理評事憮然曰權不能救人之死生才不能識時之變正身不能應世之俯仰負此官矣遂謝病歸世卿嘗一赴會試歸而不逺千里從陳白沙遊與之登臨吊古賦詩染翰終不及為學之方久之躍然曰箕得之矣凡學以言傳非真傳也其有目繫而道存者乎遂歸絶意進取日端坐一室洗滌身心不陡階級徑造本真伯仲之間自相師友及銘白沙之墓曰虛以立本動而能神疑而涵之天飛淵淪君子以為其所自見也録曰王文恪公云理有憤于習之所同而發于一人之獨見蓋天下之所共是吾獨得不是天下之所共非吾獨得不非其所不是不非者吾心之所安也吾心之所安何也謂理也義也若二公者非所謂卓然自信而不為外物之所搖奪者耶弘道録弘道録俠八信朋友之信皇王大紀舜年二十孝友聞于人有友七人焉雄陶方回續牙伯陽東不訾秦不虛靈甫當此之時口不設言乎不指麾執玄德于心而化馳若神使苟無信雖口辨而户説之不能化一人録曰七人皆不可考若以三墳五典人所不見而言所不知尚多矣録之大學傳曰與國人交止于信録曰文王之國所與之交者何人也有伯夷太公為之表帥有大顚閎夭散宜生南宫括為之左右有疏附先後奔走禦侮為之服從茍根秪不立則一言一行無非佞僥茍且貪戾罔極之事而以服事殷亦虛文矣故不曰朋而曰國人蓋以三分天下有其二言也論語孔子曰朋友信之録曰五常之信猶五行之土所賴以踐履篤實成始成終者苟為不然則性與天道不過口耳之傳躬行君子未為允蹈之學而以我為異以我為隱以我為有知以我為多學紛紛然矣惟信也故無言如天無輗如地兩端不以為竭四教不以為煩語而難顯默而難藏果而確而已矣厥後以萬世為士其崇德報功亦惟在是然則豈非聖志之所立乎又論弟子之職曰謹而信泛愛衆而親仁論君子之學曰主忠信無友不如己者録曰弟子之職未志于學者也若夫君子之學則皆大人之事然一則曰謹而信一則曰主忠信無相别何也蓋學與時習悅與朋來皆夫人性分中事由初學以至入聖一也人惟不察乎此或于初學之士間以謹信為務至大人之事便以信為末節友為戲弄不知治國平天下之要道不外乎忠信以得之驕泰以失之然則君子豈可不務忠信以為之本乎曾子曰與朋友交而不信乎子夏曰與朋友交言而有信有子曰信近于義言可復也録曰從古有言信萬事之根柢也何獨惓惓于朋友歟蓋父子天性兄弟懿親君臣義合夫婦形交皆有截然之定分心志不容于不同言行不容于不顧至于朋友東西南北之人一旦聚首無骨肉之親無天定之分其中之所底意之所從未可必然茍非信以存乎其間其勢未有如君臣之不可逃夫婦之不可反父子兄弟之不可離者衷之不恤握手何知言之不顧拍肩徒若又不啻如谷風之所怨鬼蜮之所譏矣然而至要至要者莫如約信而合其冝茍不合于冝則固有所謂死黨者有所謂市交者有所謂尾生白公之行者三子在於聖門守約莫如參篤信莫如商務本莫如若信道立矣有朋之樂亶其如此學者其可忽諸其可忽諸子使漆雕開仕對曰吾斯之未能信子説録曰孔子曰古之學者為己今之學者為人為己者欲得之于己吾斯之未能信也為人者欲見知于人有民人焉有社稷焉何必讀書然後為學也嗚呼知子羔之賊則知夫子之説矣告樊須曰上好信則民莫不敢用情夫如是四方之民襁負其子而至矣焉用嫁録曰他人有心豫忖度之聖人未常廢情也無情者不得其辭亦未嘗任情也然此豈須之所可及哉雖然賢者識其大者不賢者識其小者伊尹躬耕周公明農迹也推其心則樂堯舜之道與兼三王之事是故匹夫匹婦有不被堯舜之澤者若已推而納諸溝中何嘗不用情乎天無烈風迅雨海不揚波已三年矣意者中國有聖人何嘗不好信乎吾儒所以配天享地不與區區四民同者正惟在此以是為訓猶有陳良之徒陳相盡棄其學而學許行者左傳季札使過徐徐君好札劍弗敢言札心知之為使上國未獻還至徐徐君已死乃解其劍繫徐君家樹而去從者曰徐君已死尚誰與乎禮曰不然始吾心已許之豈以死而倍吾心哉録曰徐君欲劍之意未露也札以心而知之即壽夢立札之意亦未露也禮亦以心而知之其繫非劍也將以明己之信也是故心不可倍則國之不可受斷然明矣韓宣子有環其一在鄭商既成賈矣商人曰必告君大夫韓子請諸子産曰日起請夫環執政弗義弗敢復也今買諸商人商人曰必以聞敢以為請子産對曰昔我先君桓公與商人皆出自周庸次比耦以艾殺比地斬之蓬蒿藜藋而共處之世有盟誓以相信也曰爾無我叛我無強賈母或自奪爾有利市寶賄我勿與知恃此質誓故能相保以至于今今吾子以好來辱而謂敝邑強奪商人是教敝邑昔盟誓也毋乃不可乎吾子得玉而失諸侯必不為也敢私布之韓子辭玉私覲于子産且以拜賜録曰此與國人交止于信也可以見古人雖一物之微一事之小不肯背信負約而後世或以為無害也不旋踵害亦隨之然則得玉而失諸侯春秋之時則已然矣而能如韓子之不吝改過果何人歟録之鄭人遊于鄉校以論執政然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而遊焉以議執政之善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨不聞作威以防怨豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道吾聞而藥之也然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之録曰韓愈氏嘗作頌曰在周之興憲老乞言及其已衰謗者使監維是子産執政之式維其不遇化止一國蓋以惜之乎既往也又曰誠率是道相天下君交暢旁逹施及無垠于乎四海所以不理有君無臣蓋又惜之乎方來也然以君子之自處觀之邦有道危言危行者鄭人之逰于鄉校也邦無道危行言遜者周王之德于衛巫也故以僑之時而論執政則可以厲之時而議監謗則不可不思其可不可而獨計其毁不毁則亦徒然而已此又不可不知海鳥曰爰居止于魯東門之外二日臧文仲使國人祭之展禽曰越哉臧孫之為政也夫祀國之大節也聖王之制祀也法施于民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典凡禘郊宗祖報五者國之典祀也加之以社稷山川皆有功烈于民及天之三辰民所膽仰地之五行所以生殖九州名山大川所以出財用也今海鳥至已不知而不問又無功而祀之以為國典難以為仁且智矣今兹海其有災乎夫廣川之鳥獸恆知而避其災也是歲也海多大風冬暖文仲聞柳下季之言曰信吾過也季子言不可不法也使書以為三策録曰柳下惠和者也何其言之鑿鑿不為雷同耶夫海鳥不知其失者小不知而不問其失者大矧堂堂執政國之瞻望民之從違係焉將必至于遂非文過終于不聞有之矣可以見古之從政者虛襟樂善心平氣和無一毫穿鑿自用之私或以為非仁且知而不知能受盡言知過必改其為智也夫其為信也夫程嬰公孫杵臼者趙朔客也下宫之難杵臼謂程嬰胡不死嬰曰朔之妻有遺腹若幸而男吾奉之即女吾徐死耳無何免而生男屠岸賈聞而索之朔妻置兒袴中祝曰趙宗滅乎若號即不滅若無聲及索兒竟無聲已脫嬰謂杵臼曰今一索丕得後且復之奈何杵臼曰立孤與死孰難嬰曰立孤難杵臼曰趙氏先君遇子厚子強為其難者吾為其易者二人謀取他嬰兒負以文褓匿山中詣以告發師攻之杵臼曰小人哉程嬰既不能死與我謀匿孤今又賣之抱而呼請活之不許并殺杵臼諸將以為喜然真孤兒乃在嬰與俱匿後十五年景公病卜之曰大業之後不遂者為崇公問韓厥厥知趙孤存乃曰大業之後絶祀者其趙氏乎且以實告乃召見之諸將入問疾景公因韓厥之衆以脅諸將而見趙孤兒厥曰昔者之難屠岸賈為之微君之病群臣固將請立趙後今君有命群臣願之于是召趙武遍拜諸將攻屠岸賈滅其族復與趙氏田邑于是嬰乃辭武曰昔我不死以立趙氏後今子既立我將下報趙孟與公孫杵臼武號泣固請曰願苦筋骨以報于至死而子忍棄我乎嬰曰不可彼以為能成事故先我死今我不下報之是以我事為不成也遂自殺録曰愚觀程嬰杵臼之立信不愈于里克荀息之事君乎夫信匪徒不愧其言之難而能始終允濟之尚申生未斃之前荀息尊為大臣里克親為太傅非若二子為之客也使二臣者黽勉同心圖惟其所難分任其所易躬奉太子以出如嬰之存孤可也申生之不亡里克不為之所此克之大罪也身親待命于朝如臼之自誣亦可也既不能然以奚齊卓子者更出迭入為變易之計此正嬰之所謂難者其幾在于一索有不俟于再弒亦明矣嗚呼呱呱者一孤也堂堂者君子也信其難則斷者復續信其易則生者復死觀于四子可見矣若乃下報之説大抵春秋之士不足深論晉囚叔向樂王鮒見叔向曰吾為子請叔向弗應出不拜其人皆咎叔向向曰必祁大夫室老聞之曰樂王鮒言于君無不行求赦吾子吾子不許祁大夫所不能也而曰必由之何也叔向曰樂王鮒從君者也何能行祁大夫外舉不棄讎內舉不失親其獨遺我于是祁奚老矣聞之乘驛而見宣子曰詩云惠我無強子孫保之書云聖有謨勳徴定保夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎鯀殛而禹興管蔡為戮周公右王若之何其以虎也而棄社稷宣子説與之乘以言諸公而免之不見叔向而歸叔向亦不告免焉而朝録曰愚觀叔向之事而嘆如登之難如崩之易也夫十世宥之者勸賢之道也子孫保之者垂統之事也以羊舌氏之族一叔向文之而不足一叔虎敗之而有餘可畏不可恃明矣雖以祁奚之言暫逭一身之辱而伯石復殞其宗安在其十世宥乎是以君子兢兢業業已雖有善亦不足恃而况淫慆之裔寵利之宗乎今觀二子之釁皆起于中冓之言史雖不明其波及茍欲善其宗者舍淫慝無人以鑒于殷也叔向適鄭鬷蔑惡欲觀之從收器者而往立于堂下一言而善叔向聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不揚子若無言吾幾失子矣言之不可以已也如是遂如故知録曰思觀古人之好善真若不及而嘆今人之自棄而不務也孟子曰西子蒙不潔則人皆掩鼻而過之雖有惡人齋戒沐浴則可以事上帝貌之不足恃也尚矣且然明之欲見叔向何為也哉為其多聞也為其賢也而竟以善觀見稱知人見取想其下堂之頃執手之間其樂為何如哉周詩曰既見君子錫我百朋所獲何啻一雉耶有妻如是亦足樂矣楚伍參與蔡太師子朝友其子伍舉與聲子相善也伍舉娶于王子年子年為申公而亡楚人曰伍舉實送之舉奔鄭將遂奔晉聲子將如晉遇之于鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戍將平晉楚聲子通使于晉還如楚令尹子木問晉大夫與楚孰賢對曰晉𡖖不如楚其大夫皆𡖖材也如犯梓皮革自楚往也雖楚有材晉實用之子木曰夫獨無族姻乎對曰雖有而用楚材實多今又有甚于使椒舉娶于申公申公亡謂舉實遺之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔句彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之聲子使椒鳴逆之録曰聲子之論楚才與李斯之諌逐客詞意正相同也夫我有材我當憐之我之不憐他人攘之其往事可懼也懲往事所以戒將來乎盡能復今日之伍舉而平不能愛他日之伍奢一旦子胥出奔闔閭謀楚吳人所用之材即歸生所諷之旨晉復轉而移之于他矣始知班荆道故雖友義之不廢而惜材愛物尤為國之當先庶幾非面交心否之徒而實鑒聼讒近色之禍矣伍員與申包胥友其亡也謂包胥曰我必復楚國包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆場之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子始就館將圖而告對曰寡君越在草莽未獲所仗下臣何敢即安立依於庭墻而哭日夜不絶聲勺飮不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出録曰愚觀昔人之立志一何鋭也今人之操心一何憊也夫一亡一興若彼其不侔也爾亡之我心興之曷如不亡乎時之不可人意事之不得如已彼此籌之熟矣自今觀之無忌之譖不可回矣伍奢之死不可藥矣舉族喪亡懿親為戮孝子慈孫之心何其迫切哉使包胥而處之同此心也則同此復也及乎郢已入矣仇已反矣楚之宗社不可改也王之草莽不可常也忠臣義士之心又何其篤至哉使子胥而處之同此心也則同此興也此其信誓之照昭建立之表表存諸中者已先定矣乃若含胡雷同因人成事此碌碌庸人之所為而謂子胥申包為之歟史記蘇武李陵俱為侍中朝相又善陵後降胸奴武被拘留不屈徒北海廩食不繼至握野鼠食之卧起操持節旄盡落單于與之約曰羝羊乃得歸陵感此約誓乃置酒謂曰人生如朝露何自苦如此謝曰武父子無功德位列將帥封侯常願肝腦𡍼地今得自效誠甘樂之請勿復言遂相與樂飲數日又曰自分已死王必欲降請畢今日之歡效死於前陵其其誠信喟然嘆曰嗟乎陵與衛律之罪上通于天因泣下沾襟與武決去作詩曰弩力崇明德皓首以為期武答曰生當復歸來死當長相思録曰愚觀李陵蘇武其始不相逺也其終一為名臣一為降虜為名臣圖形麟臺為降虜甘心草莾然則今之樂敦愈後之樂乎故節操者天地之大間富貴者人生之朝露爾雖然陵自取也馬遷之傳寧不愧於心歟遷之薄忠義有由然矣嗚呼羝可乳也腐不可生也不遷之痛而武之説陵益不足與言者矣後漢書山陽范式巨𡖖少遊太學與汝南張邵元伯為友並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共尅期日及期將至元伯具以白母請設饌以候之母曰二年之别千里結言何相信之審邪對曰巨卿信士必不乖違母曰若然當為爾醖酒至其日巨𡖖果到升堂拜飲盡歡而别後仕郡為功曹元伯忽遘疾而卒式夢見元伯曰巨𡖖吾以某日死當以某日葬子未我忘豈能相及哉式恍然覺寤馳往赴之未及到而喪已發引既至壙將窆而柩不肯進其母撫之曰元伯豈有望邪遂停柩移時乃見素車白馬號哭而來其母望之曰是必范巨𡖖也巨𡖖既至叩喪言曰行矣元伯死生路異永從此辭因執紼而引柩于是乃前録曰元伯殁之所感其巨𡖖存之所期乎夫存殁有二道誠神無異理是故視之而弗見聽之而弗聞誠也體物而不可遺神也惟誠故神惟神故應巫視亦然凡鬼之效靈神之尅應皆吾一氣之精英一身之原衛振攝運動乎其間彼感此應不期然而然耳向使巨𡖖千里之約一旦有違則元伯冥冥之中必相睽異范母雞忝之設戾乎其子則臨窆撫棺之言絶乎其望矣傳曰無徵不信中孚曰初九虞吉其金鄉汝南之謂乎朱暉父岑少與光武俱學長安有舊及為帝求問岑已卒乃召暉拜為郎遷臨淮太守暉好節槩拔用厲行士吏民畏愛為之歌曰強直自遂南陽朱季吏畏其威民懷其惠同縣張堪素有名稱嘗于太學見暉甚重之接以友道挹暉擘曰欲以妻子相託暉以堪先逹舉手未敢對自後不復相見堪卒暉聞其妻子貧甚乃自往候視厚賑贍之暉少子頡怪而問曰大人不與堪友平生未曾相聞竊怪之暉曰堪嘗有知己之言吾以信于心也又同郡陳揖早卒有遺腹子友暉因交善哀之甫司徒桓虞為南陽太守召暉子駢為吏暉辭駢而薦友虞嘆息召之其信義若此録曰自光武嚴光奮乎其上而山陽汝南興于其下岑與暉亦聞風而起者也過此則絶交之論作矣君子可觀世變哉蔡雍作正交論以廣朱穆之志其略曰正人無淫朋其義敦以正其誓信以固逮夫周德始衰谷風棄豫之怨作其所由來政之缺也自此以降彌以陵遲或闕其始終或強其比周疾淺薄而隻二者有之惡朋黨而絶交者有之是以君子愼人所以交已審己所以交人故原其所以來則知其所以去見其所以始則睹其所以終後貞士者貧賤不待夫富貴富貴不驕乎貧賤故可貴也蓋朋友之道有義則合無義則離善則久要不忘平生之言惡則忠告而善道之故君子不為可棄之行不患人之違己也信有可歸之德不病人之逺己也不幸或然則躬自厚而薄責于人逺其怨矣昔子夏性寬故夫子告以拒人子張性𥚹故訓之以容衆至于仲尼之正教則泛愛衆而親仁穀梁子曰心志不通名譽不聞友之罪也今將患其流而塞其源固未若擇其正而黜其邪信其善而併其惡也録曰朱公叔絶交之論以矯時之偷薄不得已而有言也蔡伯喈嘆卓之言以感人之遇己得已而亦言之乎然則黜邪併之義將忘之耶故又曰刺薄者博而洽斷交者貞而孤孤有羔羊之節與其不獲已走將從夫孤斯言益以信然魏書遼東公翟黑子有寵于太武奉使并州受布千匹事覺謀于著作郎高允曰主上問我當以實告為當諱之允曰公帷幄寵臣有罪首實庶或見原不可重為欺罔也中書侍郎崔鑒公孫質曰若首實罪不可測不如諱之黑子怨允曰君奈何誘人就死地入見帝不以實對帝怒殺之帝使允授太子經乃崔浩以史事被收允將與同罪太子謂允曰入見至尊吾自導𡖖脫至尊有問但依吾語太子見帝言允小心愼密且微賤制由崔浩請赦其死帝召允問曰國書皆浩所為乎對曰臣與浩其為之太子懼曰天威嚴重允小臣迷亂失次耳臣嚮問皆云浩所為帝問允信如東宫所言乎對曰臣罪當滅族不敢虛妄殿下以臣侍講日久哀臣欲丐其生耳實不問臣臣亦無此言帝顧謂太子曰直哉此人臨死不易辭信也為臣不欺君貞也遂赦之他日太子讓允曰吾欲為𡖖脫死而𡖖不從何也允曰臣與崔浩實同史事死生榮辱義無獨誅誠荷殿下再造之慈違心苟免非臣所願也太子動容稱嘆允退謂人曰我不奉東宫指導者恐負翟黑子故也録曰高伯恭之不負翟黑子信也而不知信以近義為尚因以可依為宗翟之黷貨辜恩背義辱命戮之首也罪之魁也是故首實死不首亦死何乃不能括囊而間寸於崔鑒公孫質耶浩之私欲汶公愛憎蔽直人之禍也天之刑也是故刊布死不刊亦死又胡不能見幾而祇異于閔湛郗檦耶蓋允雅信佛道而不得孔子為之依歸未免所信或非其正設有不幸景穆之請不行太武之暴不息吾見其殄瘁而已故宗欽曰允也其聖余曰允也其愚唐書吳兢張説同領史職相蓋監修則天實録兢直書魏元忠為相面奏先帝以來蒙被恩渥今承乏宰相不能盡忠使小人在側臣之罪也太后不悅諸張深怒之乃譖元忠云后老矣不若狹太子為久長太后怒下之獄將廷辨之昌宗密引鳳閣舍人張説賂以美官使證元忠説許之明日詔太子相王及宰臣參對往復不決昌宗曰張聞元忠言召説將入宋璟謂曰名義至重鬼神難欺不可黨邪陷正以求苟免苦獲罪流竄其榮多矣若事有不測璟當叩閣力爭與子同死弩力為之萬代膽仰在此舉也左史劉知幾曰無汙青史為子孫纍遂入太后問之説未對昌宗從旁迫趣説曰陛下視之在廷猶如是况在外乎臣實不聞有是言但昌宗逼臣使誣證之爾他日更引對如前元忠遂得免死至是時史見之説陰祈改竄數字兢終不許曰若循公請則此史不為直筆何以取信於後録曰愚觀古人立信至以數字相凂尚堅意不從矧非禮之請託乎是故君子之處世必期無愧于心無愧于心而後無求于人説既生負宋璟之慚死兼姚崇之纍具仰有所愧俯有所怍多矣縱能祈一兢之陰改其能逃萬世之陽責乎嗚呼由前而言則為勢由後而言則為利勢與利其能確然不惑者鮮矣豈獨一説乎哉李華篤信元德秀蕭頴士劉迅之為人作三賢論曰德秀志當以道紀天下迅當以六經諧人心頴士當以中古易今世德秀欲齊愚智迅感一物不得其正頴士呼吸折節而獲重祿不易一刻之安使德秀據師保之位膽形容乃見其仁迅被卿佐服居賓友謀治亂根源參乎元精乃見其妙頴士若百鍊之剛使當廢興去就一生一死間乃見其節德秀以王者作樂崇德天人之極致而辭章不稱是無樂也于是作破陳樂辭以訂商周迅世史官述禮易書詩春秋為古五説條貫源流備古今之變頴士罪子長不編年而為列傳後世因之非典訓也然各有病元病酒劉病賞物蕭病貶惡太亟將能太重若取其節皆可為人師也世謂篤論録曰愚觀古人尚友之道至人各為品後世則靡曼而已夫以朋友之道上彌𠫵贊中理經綸下兼述作非區區藝能詞章之間而已以紫芝之獨行直欲大道之行天下為公揖其氣象三代以前之人物也茂挺之徑節夷狄猶欲師之矧中國乎捷𡖖之家學皇王之道盡矣况後世乎華之篤信良有以也弘道録終弘道録俠九信朋友之信宋史劉安世與司馬光同年友善登弟後辭歸洛光問之對曰吾斯之未能信光悅因與從逰一日避席問盡心行己之要可以終身行之者光曰其誠乎又問行之何先曰自不妄語始自是拳拳勿失終身行之後調治州司法參軍司户以貪聞運使吳守禮將按之問于安世安世云無之守禮為止然心不自安曰司户實貪而吾不以誠對其違司馬公教乎後讀揚雄法言君子避礙則通諸理意乃釋家居未嘗有惰容久坐身不傾倚作字不草書不好聲色貨利皆則象司馬光既歎群賢凋喪猶歸然獨存而名望益重梁師成服其賢使小文吳默持書來啖以大用默因勸為子孫計安世笑曰吾若為子孫計不至是矣吾欲為元祐全人見司馬光于地下還其書不答録曰元城之從溫公可謂屢躓屢踣矣而卒不能變至死猶欲見之于地下何也無妄六二曰不耕獲不災畲則利有攸往茍非誠信相為始終確然不易未有不為利祿所動權勢所移者也厥後李光以師禮安世舉所聞于溫公者曰學當自無妄中入正此意也故曰不誠無物人豈有不自信而能信於人者哉不信于人而能信于地下者哉嗚呼可謂無負聖門之訓者矣陳襄自少與其鄉之士陳烈周希孟鄭穆為友皆氣古行高磨礲鐫切相期以天下之重時學者方溺于雕篆之文所謂知天盡性之説一切指為迂闊四人者相與以斯道嗚于海隅聞者始皆笑之竟不為變而守之益堅自躬行于其家以達于州閭人卒信之于是父尤皆飾其子弟請從之遊閩中士人宗之者謂之四先生雖有誕突盜傲不可率者不敢失禮于其門也録曰是時閩學未聞四先生以其躬行實踐倡率鄉人始也至難終也大化乃天啓斯文之運四海不約而同者也謝良佐切己篤信見二程受學一日明道謂之曰諸君在此相從只是學其言語故心口不相應盍若躬措諸行後與伊川别一年往見之伊川曰相别已久做得甚工夫對曰只去得箇矜字伊川曰何故曰仔細點撿得來病痛全在這裏若按伏得這箇罪過方有向進處胡文定問矜字罪過何故恁地大謝曰今人做事只要誇耀别人耳目渾不關自家受用事伊川喜曰是子可謂力學切問近思者矣又曰命雖淺近也要信得將來就上面做工夫萬事真實有命人力計較不得吾平生未嘗干人在書局亦不謁執政或勸之余對曰他安能陶鑄我自有命在若信不及風吹草動便生恐懼憂喜枉却工夫氣力信得命便養得氣不挫折録曰矜之罪過何以見其大乎禹大聖人也曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功顔大賢人也曰願無伐善無施勞人惟自淺也故以片言自足以寸長自許惟自肆也故不知自己不足祇見自己有餘此學者大病終不可入于堯舜之道矣嗚呼上蔡之學所以高明剛正人所難及者正惟在此學者可不省哉可不勉哉朱光庭初授學于胡安定告以為學之本在于主忠信遂終身行之後師二程衆方驚異光庭獨信不疑篤學矢志不渝金石行可質于神明在邦在家臨民臨事造次動靜一由至誠上論古人豈易其比蹇蹇王臣之節稟凛循史之風熙寧元祐靖國間事變屢更其時固有名蓋天下致位廟堂得行所學者然夷考其事猶有憾焉如公掞者可謂惓惓服膺而弗失之者矣劉絢自髫齓時師事二程明道嘗謂人曰他人之學敏則有矣未易保也斯人之志吾無疑焉伊川亦曰遊吾門者衆矣而信之篤得之多行之果守之固若子者幾希蓋所受有本未所知造淵微孜孜焉不知其他也天性樂善而不為異端所惑故其履也安內日加重而無交戰之病故其行也果與李籲志向如一自二程倡明道學世方驚疑能使學者視效而信從二子有力焉吕太鈎為人質厚剛正以聖門事業為己任所知信而力可及則身遂行之不復疑畏故識者方之季路從張載學能守其師説而踐履之尤喜講明井田兵制謂治道必自此如悉次為圖籍令可見用雖皆本于載而能自信力行載每嘆以為不可及伊川又云和叔及相見則不復有認既相别則不能無疑然亦未知果能絡不疑否不知他既已不疑而絡亦復有疑否也明道遂云何不問他疑甚又云和叔至誠相信心直故篤信也録曰自孔門教人之後至是學者方知聖人之道而心嚮往之苟非篤信力行即所謂口耳之學無益於身心安保其不遽變尚能終身行之乎此在道學之門至為切要而孔曾商若惓惓于論語者復得見矣録之楊萬里初見張忠獻勉以正心誠意之學服其教終身至名讀書之室曰誠齋淳熙十二年地震上書曰臣聞言有事于無事之時不害其為忠言無事于有事之時其為姦也大矣天下之事有本根有枝葉臣前所陳枝葉而已所謂本根則人主不可以自用人主自用則人臣不任責今日之事將無類此聖學高明願益思其所謂本原者遷東宫侍讀隨事規警太子深敬之會高宗崩孝宗欲行三年喪創議事堂命皇太子參決庶務萬里上疏力諫高宗未葬翰林學士洪邁不俟集議配饗獨以吕熙浩等姓名上萬里上疏詆之至有無異指鹿為馬之言孝宗不悅曰萬里視朕為何如主出知筠州韓托胄用事欲罔羅四方名士嘗築南園屬為之記許以掖垣解曰官可棄記不可作托胄僣權益甚至憂憤成疾家人知其故凡邸報皆不以告忽族子自外至遽言用兵啓釁事萬里慟哭失聲亟呼紙書姦臣無上動兵殘民謀危社稷吾頭顱如許報國無路惟有孤憤又書十四言别妻子筆落而逝光宗嘗為書誠齋二字學者稱誠齋先生録曰張忠獻之于誠齋猶范文正之于橫渠也古人成就後學每母如此向使揭之于齋而不能信之于己將不徒然矣乎今觀應詔所陳懇懇乎凡事豫則立不豫則廢之旨監國之疏切切乎天無二日民無二王之言至于權墟之凂已邪伎之誤國雖至于死尚甘心焉豈非斃而後已者乎誠齋之名端不負矣何基篤信黃幹以父伯為臨川縣丞時𠏉適知絲事伯美見其子而師事焉𠏉告以必有真實心地刻苦工夫而後可基悚惕受命于是隨事誘掖得淵源之懿微辭奧義研精覃思平心易氣以俟其通未嘗參以己意立異以為高徇人而少變也凡所讀必加標點義顯意明有不待論説而自見者嘗謂為學立志貴堅規模貴大充踐服行死而後已讀詩須掃蕩胸次然後吟哦上下諷詠從容使人感發方為有功讀易當盡去其膠固支離之見以潔淨其心玩精微之理沉潛𣶬泳得其根源乃可漸觀爻象其確守師訓精義造約如比及王柏為弟子高明徑識弘論英辨質問疑難或一事至十往基終不變以待其定嘗曰治經當謹守精玩不必多起疑論有欲為後學言者謹之又謹可也録曰孔子曰篤信好學釋之者曰不篤信則不能好學然篤信而不好學則所信或非其正此何王金許四先生之傳所以不失其本也嗚呼西河之旨親得大聖之宗者也而其徒駸駸失之矧經偽學之厲禁乎哉此其所以謹之又謹十往不變以待其定也王相大父師愈從楊時受易論語既又從朱熹張栻吕祖謙遊文瀚兄弟皆及其門柏少慕諸葛為人號長嘯二崳三十始知家學之源惕然嘆曰長嘯非聖門特敬之道更以魯齋或語何基得熹之傳往從之授以立志居敬之旨中心信向質實堅苦有疑必從基質之柏之言曰伏義則河圖以晝八卦文王推八卦以合河圖者先天後天之宗祖也河圖是逐位奇偶之文後天是統體奇偶之文惟四生數不動以四成數而上下之上偶下奇莫匪自然又曰大禹得洛書而列九疇箕子得九疇而傳洪範範圍之數不期暗合洪範者經傳之宗祖乎初一曰五行以下六十五字為洪範五皇極以下六十四字為皇極經此帝王相傳之大訓非箕子之言也又曰今詩三百篇豈盡定於夫子之手所刪詩容或有存漢儒取以補亡乃定二南各十退何彼穠矣甘棠歸之王風削去野有死麝黜鄭衛淫奔之詩又作春秋發揮又曰大學致知格物章夫嘗亡還知止章于聼訟之上謂中庸古有二篇誠明可為綱不可為目定中庸誠明各十一章其卓識獨見多此類也録曰王會之之反身徇理可謂學也確矣而卒以章明卓識稱者豈非愚必明柔必強乎其著書特多問辨特富非無所本也是以學者貴于知要知要則能守約守約則足以該博矣雖然長嘯亦主靜徒也不主靜則不能致逺而研精理性與立志居敬一而二也夫元史金履祥自幼信向濓洛之學事同郡王柏嘗問為學之方柏告以莫先立志志立乎事物之表敬行乎事物之內此為學之大方也時宋事已不可為遂絶意進取屏居金華山中追逐雲月寄情嘯咏視世故泊如也平居獨處終日儼然所謂居敬以持其志立志以其本者信乎自在至與物接則盎然和懌訓迪後學諄切無倦嘗謂劉恕外紀不本于經而信百家之説是非繆于聖人不足以傳信自堯以前不經夫子所定固野而難質春秋非玉帛之使則魯史不書聖人筆削無得而加也乃用邵氏皇極經世曆胡氏皇王大紀之例損益折哀一以尚書為主下及詩禮春秋旁採舊史諸子表年繫事斷自唐堯以下接于通鑑之前勒為一書名曰通鑑前編凡所引輒加訓釋以裁其義多儒先所未發既成以授得人許謙曰二帝三王之盛其微言懿行宜後王所當法戰國申商之術其苛法亂政亦後王所當戒則是編不可以不著也當時議者以為基之清介純實似尹和靖柏之高明剛正似謝上蔡履祥親得之二氏而並充于己者也録曰仁山之論道原其愚之論小司馬乎太史公明言尚書獨載堯以來而百家言黃帝其文不雅馴薦紳先生難言之貞奈何復補之乎由是天皇氏地皇氏人皇氏女媧氏燧人氏盤古氏紛紜不一皆貞之作俑也至胡五峰雙峯號為儒者復舛錯繆戾何怪秦博士梁武帝耶至少微家孰並載盤古等六氏于前伏義等八氏于後總一十四氏不知孰為三皇敦為五帝今當一切削去以前編為定可也許謙受業金履祥之門語之曰士之為學若五味之在和醢醬既加則酸醎頓異子今來見而猶夫人豈吾之學無以感發子耶謙聞之惕然居數年盡得其所傳之奧于書無不讀有不可通則不敢強或有未安亦不苟同也謂學者曰學以聖人為準的然得聖人之心而後可學聖人之事其讀詩有名物鈔正其音釋考其名物度數以補先儒之未備仍存其逸義旁采逺援而以己意終之其觀史有治忽幾微倣史家年經國緯之法起太皥氏迄宋元祐司馬光卒蓋以為光卒則中國之治不可復興誠理亂之幾也又有自省編晝之所為夜必書之其不可書者則不為也開門講學逺而幽冀齊魯近而荆揚吳越皆不憚來受其教人也至誠諄悉內外殫盡嘗曰己有知使人亦知豈不快哉或有所問難而詞不能達則為之言其所欲言而解其所惑討論講貫終日不惓攝其粗踈入于密微聞者方傾耳聽受而其出愈真切惰者作之鋭者抑之拘者開之放者約之隨其材分咸有所得然獨不以科舉之文授人曰此義利所由分也篤於孝友有絶人之行處世不膠于古不流于俗大德中熒惑入南斗謙以為災在吳楚竊深憂之是歲大侵貌瘠加損或問曰豈食不足乎謙曰今公私匱竭道殣相望吾能獨飽邪其處心蓋如此録曰愚觀許白雲之所憂竊與今同夫是而不膠于古不流于俗蓋膠于古則熒惑之變不但大侵而已流于俗則吳楚之災未必切身而已而不知儒者之心視天地萬物中國四夷未之有間而天道人事皆吾學問中之所當究初非應舉之文科目之士所能知也其傷中國距夷狄默與于治忽幾微之間而所以扶世道振元綱又切于洞究釋老之旨此所以足任正學之重而身之安否為斯道之隆替也皇明初趙考古撝謙系出宋秦王六世孫公恆入元纍世不仕先生逺宗洙泗近取關間信道敦篤洪武初聘至京師歸而築考古臺作聲音文字通一百卷大闡六經百氏自謂有精義人神之妙時人未之許也惟宋景濓命子仲珩受其學與江西宋季子天合林公輔同郡唐愚士信以為然吏部侍郎侯庸事以師禮復起至京廷臣咸謂海外聖學未聞宜用真儒往教遂授瓊州府學教授既至作瓊臺布學範傳授造化經綸圖説集補前聖成書隨物書之以興起斯文為己任雖蠻夷荷戈執戟之徒向風慕義而逺方從遊之士不以梯山航海為憚若三山鄭尚賓合肥王仲迪莆田朱伯紹鳳陽孫仲嶽瓊臺吳文祥皆宗之丘文莊公濬信之尤篤蓋瓊州自考古之後始知聖學文莊始以朱子微言散見于傳注語録學者猝未易求乃采其精切者彙為二十篇作學的又綱目以正統為主如秦隋之未有不可遽奪漢唐之初有不可遽豫者作世史正綱家禮雖得崇本孰實之意而儀節闕略作家禮儀節大學衍義尚缺治國平天下乃采經傳子史附以己意作衍義補四書之著乃其大者在太學一遵李忠文公遺矩而綜理微密人謂忠文莫及在大位務以寬大啓上心忠厚變士習凡人才進退政事廢舉一惟祖宗舊典是循預修英廟實録奮然以于謙被誣之事為言衆始信之方得從實書其功最吏部考察以多黜為公黜者况不敢訴公深知其弊言於上曰唐虞三載考績三考黜陟今有居官未及半載徒信人言未必皆實上深然之會吏部上當黜者幾二千人勑凡未及三載及雖經三考非為貪暴實迹者俱勿黜蓋信公言也録曰愚觀趙考古以先朝系屬自祕入元不仕其所著書自以為精義入神之妙人亦未之許也苟非大明當空崇重真儒闡揚道學安能盡信之乎自是薄海內外咸與同文不旋踵間有文莊者出深悟篤信推而驗之身心措之事業以禆我皇明之治正以見勝國不得與于斯文而薄海內外藹然文明氣象豈無自歟
