body:
  text: 禮君臣之禮史記韓信始歸漢因數與丞相蕭何語何奇之爲言之王以爲大將至是欲召拜之何曰王素慢無禮今拜大將如呼小兒此乃信所以去也王必欲拜信擇良日齋戒設壇場具禮乃可耳漢王許之諸將皆喜人人各自以爲得大將至拜受命乃韓信也一軍皆驚録曰高祖不脩文學而性明逹類如此夫以溺冠毁儒輕士善罵不知其幾向使薄蕭何之說甘兒戲之事則人人未必改觀諸將未必皆服而王亦未以爲得信晩也孰與爭夭下哉此將將之術祗在於一時轉移之間雖未純乎三代之禮母亦當時之所罕也録之漢王既爲天子乃悉去秦苛儀法爲簡易群臣飮酒爭功醉或妄呼㧞劎擊柱帝益厭之叔孫通進說曰儒者難與進取可與守成願徴魯諸生與臣弟子共起朝儀帝曰得無難乎通曰五帝異樂三王不同禮二者因時世人情爲之節文者也臣願采古禮與秦儀雜就之帝曰可試爲之令易知度吾所能行爲之魯有兩生不肯行曰今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起積德百年而後可興也吾不忍爲公所爲公徃矣叔孫笑曰鄙儒不知時變遂與所徴三十人西及上左右爲學者與其子弟百餘人爲綿蕞野外習之録曰愚觀秦滅漢興之際乃有魯之兩生孰謂鳳翹麟角不見於秉禮之國乎夫儒者之標凖莫先於周孔孔子曰如有王者必世而後仁成周一代禮樂待周公而始定固所謂積德百年而後興者也矧炎漢之典不階尺土與筆基王跡者全殊溺冠慢儒與積功累仁者迥别寬仁大度有矣淪肌浹髓則未也除殘去暴有矣燕及皇天則未也雖以文帝爲之子無惑乎其不遑世祖爲之孫烏在乎其有具漢家之禮樂兩生已付之浩嘆矣論者徒以賈生之請太息於綘灌而文學之議不逮於魯邸殊不知所招者非公孫弘則倪寬主父偃非公孫卿則壺遂司馬遷設以數公副二帝之選創一代之制亦不過叔孫之濫觴耳安能建禮樂之本乎然則兩生者非但魯之表表其漢之麟鳳不可再見者歟長樂宫成諸侯群臣朝用叔孫新儀平明謁者治禮引以次入殿廷陳車騎戍卒衛官設兵張旗志功臣列侯以次陳西方東向文官丞相以下陳東方西向廣行設九賓臚句傳於是皇帝輦出房百官執戟傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏復置法酒侍坐殿上皆伏抑首以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去盡朝置酒無敢讙譁失禮者高帝喜曰吾乃今日知爲皇帝之尊也録曰帝縱觀秦皇帝曰大丈夫當如是稱善叔孫通曰吾今日乃知皇帝之貴觀其氣象則便無放勳重華之底至亦豈如皇王烝哉之齊信者乎高后八年九月己酉丞相臣平太尉臣勃大將軍臣武御史大夫臣倉宗正臣郢朱虗侯臣章東牟侯臣興居典客臣揭再拜言子弘等皆非孝惠皇帝子不當奉宗廟臣謹請陰安侯頃正后琅琊王列侯吏二千石議大王高皇帝子宜爲嗣願大王即天子位代王曰奉高帝宗廟重事也寡人不佞不足以稱願請楚王計宜者寡人勿敢當群臣皆伏固請代王西鄉讓者三南向讓者再丞相平等皆曰臣伏計之大王奉高祖宗廟最宜稱雖天下諸侯萬民皆以爲宜臣等爲宗廟社稷計不敢忽願大王幸聼臣等諸奉天子璽符再拜上代王曰宗室將相王列侯以爲其宜寡人寡人不敢辭遂即天子位録曰愚觀迎代之禮而知大漢之氣象猶爲可觀乎夫迎帝者勃也讓帝者文也故知君之不可以强也居中者弘也居外者代也故知子之不可以徒也即夕入木央宫遺坐前殿故知始之不可以不正也奉高帝宗廟諸侯萬民皆以爲宜故知統之不可以不大也此春秋之義也至霍光之時遣宗正迎曾孫就齋宗正府明日入未央宫封爲武陽侯後即帝位則雖有東向之讓三南向之讓再將安施乎此其文愈多而禮愈窒氣象尤不侔矣帝既即位值絳侯朝罷趨出上禮之恭常目送之郞中安陵袁盎諫曰諸吕悖逆大臣相與共誅之是時丞相爲太尉本兵柄適會其成功今丞相如有驕主色陛下謙讓臣主失禮竊爲陛下弗取也後朝上益莊丞相益畏録曰此賢君必恭儉禮下與霍光驂乘而宣帝苦刺在背者異矣惜其臣袁盎不能充廣允恭克讓之㫖反以驕主爲言俾其君眞有堯舜之資而未勝韓彭之俗終不免於逮繫戮辱未必不自袁盎之言啓之也嗟夫以帝之至誠馭下勃之重厚久聞始之莊敬如此終之自殘如彼尚何後世君臣欲其終始無負不亦遠乎上聞河南守吴公治平爲天下第一召以爲廷尉吴公薦洛陽人賈誼帝召以爲愽士是時賈生年二十餘帝愛其辭愽一歲中超遷至大中大夫賈生請改正朔易服色定官名興禮樂以立漢制更秦法帝謙讓未遑也録曰小畜之卦也以乾之剛徤而爲柔巽所畜聖人係之辭曰密雲不雨自我西郊夫陰陽和而後雨澤降猶上下交而後事功成也以帝操制作之柄而安於謙讓未遑生秉有爲之資而惑於年少生事豈非天未欲平治天下歟然君子以懿文德者盖道德經綸之業非一朝一夕之故孔子不云乎不患無位患所以立不患莫己知求爲可知也苟生安於此義益務沉晦潜韜之行以期於厚積遠施則豈無大畜尚賢之君以武去帝殆不多也奈何以二十方餘之年多爲痛哭自傷之狀懷沙鵩鳥之賦無乃太促乎此生之所短非人之所疾也誼治安策日人主之尊如堂群臣如陛衆庶如地故陛九級上廉遠地則堂高陛無級廉近地則堂卑高者難攀卑者易陵理勢然也故古者聖王制爲等列内有公卿士大夫外有公侯伯子男然後有官師小吏延及庶人等級分明而天子加焉故其尊不可及也里諺曰欲投鼠而忌器此善諭也鼠近於噐尚憚不投况於貴臣之近主乎臣聞之履雖鮮不加於枕冠雖敝不以苴履夫已嘗在貴寵之位天子改容而禮貌之矣使民嘗俯伏以敬畏之矣今而有過廢之可也退之可也賜之死可也㓕之可也若夫束縛之繫緤之輸之司㓂編之徒官小吏詈罵而榜笞之殆非所以令庶衆見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以尊尊貴貴之化也古者大臣有坐不廉而廢者不曰不廉曰簠簋不飾坐污穢淫亂男女無别者不曰污穢曰帷薄不脩坐罷軟不勝任者不曰罷軟曰下官不職上設廉耻禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定爲人臣者皆顧行而忘利守節而仗義可以托不御之權可以寄六尺之孤此厲廉耻行禮義之所致也此之不爲而顧彼之久行故曰可爲長太息者此也誼以絳侯前逮繫獄卒無事實故以此譏上上深納其言養臣下有節是後大臣有罪皆不受刑録曰誼之言至是有驗帝亦深納之矣盍不曰吴公治行天下第一歟茍以前之所陳責之吴公不効則罪其所舉漢廷之禮未必若是之草創也時去古未遠周禮之作用必有能述之者厥後正朔或更服色差辯而官名禮樂不可復見於後世豈非千古之至恨而絳灌不可逭之大罪歟甲屠嘉爲相時鄧通方愛賞賜累鉅萬寵幸無與比嘉嘗入朝鄧通居上旁有怠慢之禮嘉奏曰陛下愛幸群臣則富貴之至於朝廷之禮不可以不肅罷朝嘉坐府中爲檄召通詣丞相府不來且斬通恐言上上曰汝第徃通詣丞相府免冠徒跣頓首謝嘉坐自如弗爲禮責曰夫朝廷者高帝之朝廷也通小臣戲殿上大不敬當斬吏合行斬之通頓首出血不解上度丞相已困通使使持節召通而謝丞相曰此吾弄臣君釋之通既至爲上泣曰丞相幾殺臣録曰愚觀申屠嘉之事而嘆漢廷之禮猶可言也夫弄臣者人主權寵之所歸也請託岀於其門關節在於其口大臣苟有不振望風俯首者多矣矧於蹶張之夫非咸有一德之輔而能正朝廷之禮遏不臣之心帝豈終於未遑者哉至董賢冐三公之位絶炎統之傳上下爲之甘心安能持節召乎此時學校雖興辟雍雖作不可與言禮矣武帝時大將軍青貴幸有時侍中上踞厠而視之丞相弘燕見上或時不冠至如汲黯見上不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此録曰此可見帝之良心即所謂不學而知不慮而能者非有所勉强安排也推此心而充之可以事上帝矣惜乎不能凡事致曲而弘之忌湯之嫉帝之心隨喪矣此漢唐以下之通患所謂允恭克讓者安得不寥寥無聞也歟元朔五年詔曰蓋聞導民以禮風之以樂今禮壞樂崩朕甚憫焉其令禮官觀樂興禮以爲天下先於是丞相弘等奏請爲愽士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補愽士弟子詣太常受業能通一藝以上補文學掌故即有秀才異等輙以名聞上從之自此公卿大夫吏彬彬多文學之士矣録曰武帝之初嘗舉趙綰王臧矣以太后不悅儒術而罷也又嘗招選天下文學才智之士矣以相如辭賦臯朔詼諧而止也至是欲導民以禮爲天下先此正申公力行之時也弘奈何復置愽士弟子文學掌故雖多亦奚以爲乎使當是時賈誼尚存以其移風易俗使天下回心鄉道之言道之則必有不凡之建非但太初之制作而已惜乎長沙不返曲學斯興徒使公孫卿壷遂之徒得行其議而造端託始之論顧爲長說也嗟夫禮書曰武帝即位招致儒術之士令共定儀十餘年不就或言古者太平萬民和喜瑞應辯至乃采風俗定制作上聞之制詔御史曰盖受命而王各有所由興殊路而同歸謂因民而作追俗爲制也議者咸稱太古百姓何望漢亦一家之事典法不傳如子孫何化隆者閎愽冶淺者褊狹可不勉與乃以太初之元改正朔易服色封太山定宗廟百官之儀以爲典常垂之於後録曰愚觀武帝之世儒術之言何其謬哉漢興至是已及百年黎民醇厚幾至刑措雖兩生復起可與有爲之時也尚何人各爲說耶是時徐樂倪寬亦可謂知言矣樂之言曰賢主獨觀萬化之原寬之言曰夭子建中和之極兼總條貫金聲而王振之帝惟多慾之故以是咨趄不就歷十餘年而夏時之正秦俗之繆翻然改革亦可見雄材大畧其與紛紛制作不可同年語也宣帝時諫大夫王吉上䟽曰陛下惟思世務將興太平詔書每下民欣然若更生臣伏思之可謂至恩未可謂本務也欲治之主不世出公卿幸得遭遇其時言聽諫從然未有建萬世之長策舉明主於三代之隆者也其務在於斯會薄書斷獄聼訟而已此非太平之基也臣聞安上治民莫善於禮故王者未治禮之時引先王禮宜於今者而用之願陛下述舊禮明王制敺一世之民躋之仁壽之域則俗何以不若成康壽何以不若高宗上以其言爲迂闊吉遂謝病歸録曰以吉之䟽終焉者天下將治則禮樂爲實用天下將衰則禮樂爲虗文以帝之褒王成賞黃霸綜劾名實何有於還舊禮明王制哉而顧謝之曰迂至成帝之時乃建雖辟設庠序陳揖讓衣冠則何益哉以是知日不暇給規模宏遠者願治之本體而禮文騷屑元氣不存者漸衰之末務綱目建武五年初起太學帝還視之稽式古典脩明禮樂焕然文物可觀也録曰平帝元始四年嘗起辟雍矣不録此何以録光武有志於興復古禮内建學校外徵䖏士皆西京未暇爲者且于干戈倥偬之際寇盗縱橫之時則固可嘉矣抑帝少與嚴光同學及物色而至必非常人人亦敬信服之何不以教太學乎一君一師媲美同德宜無不可留矣而廼拜爲諫議吾不知一代師表何若人歟以愚視之蓋無有出於光之右者矣肅宗章和元年正月召曹褒詣嘉德門令持班固所上叔孫通漢儀十二篇勑褒曰此制散畧多不合經今宜依禮條正使可施行於南宫東觀盡心集作褒既受命乃次序禮事依準舊典雜以五經䜟記之文撰次天子至於庶人冠婚吉㓙終始制度以爲百五十奏上和帝即位褒乃爲作章句帝遂以新禮一篇冠録曰漢叔孫之制禮君子不能無遺憾也褒復慕之晝夜研精寢則懐筆札行則習文書及其措之制作又雜以五經䜟記之文然則非叔孫之文乃時王之制也夫禮之大原出于天貝于人心聖人一言蔽之曰毋不敬褒既沉吟專思當其念至忘所之適其毋不敬乎儼若思乎安定詞乎䜟乎䜟乎不可以爲典矣唐書禮樂志曰由三代而上治出于一而禮樂達于天下三代而下治出于二而禮樂爲虛名古者宫室車輿以爲居衣裳冕弁以爲服尊爵爼豆以爲器金石絲竹以爲樂以適郊廟以臨朝廷以事神而治民其歲時聚會以爲朝覲聘問歡欣交接以爲鄉射食饗合衆興事以爲師田學校下至里間田畆吉凶哀樂凡民之事莫不出於禮由之以教其民爲孝慈友弟忠信仁義者常不出於居䖏動作衣服飲食之間蓋其朝夕從事者無非此也此所謂治出于一而禮樂逹于天下使天下安習而行之不知所以遷善遠罪而成俗也及三代已亡遭秦變古後之有天下者自天子百官名號位序國家制度宫車服器一切用秦其間雖有欲治之主思所改作不能超然遠復三代之上而牽其時俗稍即以損益大抵安於苟簡而已其朝夕從事則以簿書獄訟兵食爲急曰此爲政也所以治民至於三代禮樂具其名物而藏於有司時出而用之郊廟朝廷曰此爲禮也所以教民此所謂治出於二而禮樂爲虛名録曰愚觀歐陽子之論萬古之至言也夫先王制禮以其所躬行實踐措之以辨上下定民志又以其會極歸極發之以事天地和萬民本於身心性情之間以立節文體用之則安得不出子一而何有於不逹也自秦以下無天德以爲之本王道以爲之用其於節文遺則罔知攸措甚者登降之不知尊卑之無序其愈趨者君臣父子兄弟夫婦之間慚德多矣又安能建中和之極而使禮樂刑政不出於二哉此古今判涣之原禮樂盛衰之始爲人上者不可以不察也通鑑貞觀元年春正月上宴群臣奏奏王破陳樂太宗曰朕昔委專征民間遂有此曲雖非文德之雍容然功業所由不敢忘也封德彝曰陛下以神武平海内文德豈足比乎上曰戡亂以武守成以文文武之用各隨其時卿謂文不及武斯言過矣録曰夫子嘗謂武盡羙矣未盡善也夫以武之應天順人又得周公制禮作樂尚有木盡善之歎帝雖能除隋之亂尚多慚德改治之美僅可小康封德彝從而諂諛至于禮樂不及政刑武功優於文德是何心歟德彝失言折而貽笑於千古之下矣六年秋七月宴近臣於丹宵殿長孫無忌曰王珪魏徴昔之仇讐不謂今日得同此宴太宗曰徴珪盡心所事故我用之然徴每諫不從我與之言輙不應何也徴對曰臣以事爲不可故諫若陛下不從而臣應之則事遂施行故不敢應上曰應而復諫何傷對曰昔舜戒群臣爾無面從退有後言臣心知其非而口應陛下乃面從也豈稷契事舜之意耶上大笑曰人言魏徴舉止踈慢我視之更覺嫵媚正爲此耳徴起拜謝曰陛下開臣使言故臣得盡其愚若陛下拒而不受臣何敢數犯顔色乎録曰愚讀易之中孚而觀王魏之出䖏未嘗不喟然嘆也夫隱非負荷之噐而徵珪事之所謂翰音登于天何可長也一旦幡然改圖明以投明斷以資斷所謂鶴鳴在陰其子和之我有好爵吾與爾糜之安得不盡心所事乎向使不遇英主不過俘虜之賤而已所謂得敵或皷或罷或泣或歌徵盖不能不恣其嫵媚也豈非君子之幸乎哉七年春正月宴玄武門奏七德九功舞本名秦王破陳樂更名曰七德舞是也太常卿蕭瑀以爲形容未盡請并寫劉武周薛仁杲竇建德王世充擒獲之狀太宗曰彼皆一時英雄朝臣或嘗北面事之使覩其故主能不傷乎瑀謝不及時魏徴欲上偃武脩文故每侍宴見七德舞輙俛首不視見九功舞則諦觀之録曰孟子曰獨樂樂與人樂樂孰樂曰不若與人與少樂樂與衆樂樂孰樂曰不若與衆太宗庶幾與人與衆者矣徵不推明其意而輙俛首不觀乎孟子之導齊王者歟十二年帝還宫宴五品以上於東宫上曰貞觀之前從朕經營天下玄齡之功也貞觀以來繩愆糾繆魏徴之功也皆賜之佩刀又曰朕政事何如徃年徵曰徃以未治爲憂故德義日新今以既治爲安故不逮貞觀之初恐人不諫常導之使言悅而從之今則不然雖勉從之猶有難色所以異也上曰可得聞歟曰陛下昔欲殺元律師孫伏伽以爲法不當死陛下賜以蘭陵公主園或曰太厚曰朕即位以來未有諫者故賞之此導之使言也司户柳雄妄訴陛下欲誅之納戴冑之諫而止是悅而從之也近皇甫德諫脩洛陽宫陛下恚之雖以臣言而罷勉從之也上曰非公不能及此人苦不自知耳録曰觀易之吉凶消長可以知諌詳之進退得失也漢屈群策高祖以大度臨之其所用於漢者即其所棄於楚者也易曰東鄰之殺牛不如西鄰之禴祀實受其福其漢祖之謂乎唐懲隋亂大宗以重賞徼之其盡忠於唐者即其諛佞於者也易曰不遇其祖遇其妣不父其君遇其臣其太宗之謂乎然重賜之間不可以繼惟以至公䖏之無我臨之庶幾無始勤終怠之弊矣抑太宗之世君臣宴會不以盤樂怠傲自安惟以用諌脩文相厲可謂能知自强者矣此貞觀之治所以焕然可觀也録之玄宗開元十七年八月癸亥上以生日宴百官於花萼樓下左丞相源乾曜右丞相張說帥百官上表請以每歲八月五曰爲中秋節布於天下咸令宴樂録曰以生日陪勞者人子愛慕之情也因生日致頌濤者臣子忠愛之願也唐之此禮未爲過舉但說與乾曜未嘗發於本心之誠特因上之宴賜故效此以容悅耳非若天寳祝君之懇至也及明年二月復令百官選勝行樂又近於流連荒亡者矣當今禮以義起尊爲萬壽聖節而特罷選勝行樂得其中矣肅宗即位靈武文武官不滿三十人披草萊立朝廷制度草創武人驕悍大將管崇嗣在朝堂背闕而坐言笑自若監察御史李勉奏彈之繫於有司上將原之嘆曰吾有李勉朝廷始尊録曰目金鑑之後唐之宗社板蕩矣勉以宗尚文聖勉爲氣象當與人殊其尊朝廷特時月言之間非有範圍周旋之可使帝因是而知承運之不可苟幾㣲之不可忽加勉以大任時舉而抨彈之奮其乾斷以折武夫悍將之氣不使褊裨得凌主帥節度廢立得由軍士異日藩鎮之禍不知是也徒務姑息爲恩不知漸不可長獨一李勉如唐室何故觀上之特原而知唐之不振矣惜哉舊唐書德宗尊郭子儀爲不師號尚父詔曰天地以四時成物元首以股肱作輔合兵之任鼎定相承上以調三光下以蒙五岳允庶纘鎮撫四夷體元和之氣根貞一之德功至大而不伐身䖏高而更安尚父比吕望之名爲師增周公之位具官汾陽郡王天降人傑生知王佐訓師如子料敵若神扶翼肅宗載造區夏於國有難勞其戡定於邊有㓂藉其驅除安社稷何有於絳侯定羗戎無踰於充國絳臺綏四散之衆涇陽降十萬之虜勳高今古名讋夷狄忠貞懸於日月寵遇冠於人臣尊其元老加以崇號録曰夫有謙光之德而後有至顯之號尚父者周所以尊太公也由漢歷唐惟子儀當之而無愧若王行瑜劉守光逆虜之魁耳錢鏐雖有保障吴越之功加于一方則可加于天下則未也綱目肅宗寳應元年秋七月郭子儀入朝以程元振忌遂留京師代宗大曆二年二月郭子儀入朝囚子郭曖待罪十二月郭子儀入朝以魚朝恩素惡子儀發其父塚不較四年春正月郭子儀入朝以元載告魚朝恩謀不利不聼九年春二月郭子儀入朝增朔方卒十年春郭子儀入朝奏除州縣官一人不報十三年冬十二月郭子儀入朝至是凡七書法曰此子儀所以爲純臣也光弼愧之多矣録曰春秋二百四十二年之間夫子書朝子王所者二如京師者一而肅代二十餘年之間朱子書子儀入朝凡七且目不絶書人不絶談莫非讓德之羙反己之實此所以功蓋天下而主不疑位極人臣而衆不嫉者歟易曰勞謙君子有終吉夫子繫之曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也其令公之謂夫弘道録卷之二十九
