body:
  text: 義父子之義宋史太祖母昭憲杜太后治家嚴毅有法生五子長太祖次匡濟光義光美匡贊太祖即位尊為皇太后拜於堂上衆皆稱賀后獨愀然不樂左右曰臣聞母以子貴今子為天子胡為不樂太后曰吾聞為君難天子置身億庶之上若治得其道則此位可尊苟或失馭求為匹夫不可得是吾所以憂也太祖再拜曰謹受教録曰后常目擊五代之亂至室家母子不能相保故有是諭雖然大禹陳謨首以克艱為言后蓋不惟知母道而又知君道也以是為訓宋之一代所以外無吕王武韋之禍而內有高曹向孟之賢皆后之壺範有以啓之於前也然則史稱昭憲垂裕之功其可少哉太宗不豫宣政使王繼恩忌太子英明陰與參知政事李昌齡殿前都指揮李繼勳知制誥胡旦等謀立故太子楚王元佐宰相吕端問疾禁中見太子不在旁疑有變乃以笏書大漸字令親密吏趣太子入侍及帝崩皇后令繼恩召端議所立端知有變即紿繼恩使入書閣遂鎖之而使人防守亟趨入宫后問端曰宫車已晏駕立嗣以長順也將如何端曰先帝立太子正為今日今始棄天下豈可遽違命有異議耶后默然乃奉太子至福寧殿即位太子既立垂簾引見羣臣端平立殿下不拜請捲簾升殿審視然後降階率羣臣拜焉録曰自金匱背盟之後甫傳真宗即有繼恩之變賴吕端而免再傳仁宗復有允恭之奸賴王曾而免其變者國家危疑之運也其免者立國忠厚之功也是時宋德昌隆君子道長故大臣得以行其志而小人無所容其謀苟為不然繼恩豈不能排闥而出而肯甘心就鎖乎若乃平立不拜誠非獲已既不能如周書顧命則不免於捲簾審視矣初王安石當國變亂舊章光獻太后乘間語神宗謂祖宗法度不宜輕改吾聞民間甚苦青苗𦔳役宜罷之神宗崩哲宗立宣仁高太后臨朝聽政於是散遺修京役夫减皇城覘卒止禁庭工技罷導洛司出近侍尤無狀者十三人戒中外無苛斂𡩖民問保户馬罷造軍器工匠罷成都府利都買馬罷京東西泗州物貨場罷市易抵當汴河堤岸司地課放市易常平免役息錢罷任他出限罰錢罷免行錢罷提舉保甲錢罷錢糧提舉保甲官罷方田罷鄜延團將罷增置鑄錢十四監事由中㫖王圭等弗預知也録曰愚觀光獻宣仁之際其婦姑之間可謂善繼善述者也夫光獻有欲為之志而未為至宣仁而成就之光獻有已為之事而可法至宣仁而遵述之設使紹熙崇寧之君皆能若是何害於紹述乎惜乎名則是而實則非也苟有人心將何面目見二后於地下及太后崩哲宗改元紹聖楊畏上言神宗更法以垂萬世乞早講求以成紹述之道帝即詢以故臣孰可召用畏即疏章惇吕惠卿鄧溫伯李清臣帝深納之以章惇為尚書左僕射專以紹述為國是遂引其黨蔡卞林希黃履來之邵張啇英等居要地任言責協謀朋姧報復怨仇矣録曰王安石之流禍慘矣論者徒知歸罪於變法之端而不知實禍於紹述之政夫紹述美政也文武周公豈惟八百年之福祚抑且千萬世之顯稱人皆曰善繼人之志善述人之事者也然謂之善繼善述則其一字之間而有無窮之深意不可以不察也夫仁者之祚垂於無窮而戾者之氣未必隨泯設使仁考有後而神宗嗣孤夷狄之禍未必然也今以一宣仁救之而不足一章惇壞之而有餘則以哲宗為之子也崔鶠陳瓘千言而不入鄧洵武一言而快意則又以徽宗為之子也嗚呼周家傳位季歷以及昌而天命之永固神宗傳位哲宗以至佶而國事之日非豈非繼志述事之相同而創業垂統之不善歟竇禹鈞五子儀儼侃稱僖皆相繼登科號為五龍馮道贈詩曰燕山竇十郎教子有義方靈椿一株老丹桂五枝芳逮宋建隆元年太祖謂宰相曰深嚴之地當以宿儒處之竇儀清介重厚非斯人不可即日拜為學士後屢稱儀有執守欲相之趙普忌其剛直及卒閔然曰天何奪我竇儀之速蓋惜其未大用也儼尤為才俊善步星曆與盧多遜揚徽之同任諫官嘗謂之曰丁卯歲五星聚奎自此天下太平卒如其言太祖謂侍臣曰近朝卿士竇儼質重嚴整有家法閨門敦睦人無讕語諸弟不能及僖亦中人材爾稱有操尚可嘉也録曰愚觀竇氏之在宋初其變面事讐則有可責其義方訓子則有可稱雖然有五星聚奎而後一代之人物可齊無五代亂離而後五子之出處可必人情世道大抵而然君子未可以厚非之也陳省華與妻馮氏性嚴毅治家有法子堯叟堯佐堯咨居常孝謹怡聲侍側不敢以貴自處景德中堯叟掌樞機堯佐直史館堯咨知制誥與省華同在北省比客至兄弟常立侍父側客不自安多引去堯叟偉姿貌强力奏對明辨多智數久典機密軍馬之籍悉能周記堯佐少好學父授諸子經其兄未卒業堯佐竊聼已成誦及貴讀書不輟初從種放於終南山陳搏謂省華曰君三子皆當將相惟中子貴且壽一如搏言及卒自志其墓曰壽八十二不為天官一品不為賤使相納祿不為辱三者粗可𡚖於父母棲神之域矣堯咨以氣節自任君子謂省華聲聞由諸子而益著有宋以來言家法者不能及云録曰愚觀陳氏一時不惟可稱而中子貴壽尤有可驗雖然以自驗而黽勉則可以自負而夸毗則不可蓋貴與壽是人之所欲也亦有不可必者如顏子短命曾參寡祿冉閔無階而萬世之下莫不尊之以其德耳故太上立德其次立功以是𡚖息於棲神之域庶幾無忝於夙興夜寐之心矣吕公著二子希哲希純少從憔千之孫復石介胡瑗學德器成就大異衆人及長復從二程張載遊聞見益廣遂絶意進取不事科舉學以僥幸利祿王安石將置其子雱於講官以希哲有賢名欲先用之希哲辭曰辱公相知久萬一從仕將不免異同則疇昔相與之意盡矣安石乃止及申公作相二弟公綽公弼已官省寺希哲獨滯管庫申公嘆曰當世善士吾收拾略盡爾獨以吾故置不試命也其母聞之笑曰是亦未知其子矣范祖禹其妹壻也言於哲宗曰希哲經術操行宜備講讀乃除崇政殿說書其勸導人主以修身為本正心誠意為主若身不能修左右之人且不能諭况天下乎與希純世濟其美樂易簡儉終年名益重遠近皆師尊之録曰史稱吕申公知子之賢而不能薦有愧於從祖愚特以為無忝於正獻何也文穆之時大道為公不當以遠嫌為辭申公之時大道既隱人當以亦黨自懼以是為防他日林希尚言吕大防由公著援引故進希哲以酬私恩而公著之惡則希哲導成之嗚呼孟子不云仰不愧於天俯不怍於人希哲以之回視雱與嬉輩真腐鼠之不若歟洪皓三子適遵邁適幼敏悟日誦三千言皓使朔方年甫十三能任家事以皓出使恩補修職郎紹興十二年與弟遵同中博學宏詞科高宗嘆曰父在遠方子能自立天之報也宜加升擢遂除適敕令所删定官遵祕書正宇後三年邁亦中是選由是三洪文名滿天下及皓𡚖忤秦檜三子皆外補皓謫英州適往來嶺南省侍者九載檜死適自兩制一月入政府又四日擢居相位遵為資政殿學士邁為端明殿學士邁之文學尤高其立朝議論最多所謂忠義之報詎不信哉録曰洪忠宣豈比於蘇長孺哉武之時中國全盛胸奴恃其桀敖而已皓之時華夷倒置必死無生若非天之所報又安能有其家乎特以檜之惡甚於犬羊其毒逋於醜虜虜能容忍於異域檜不能得侍於同朝帝能加擢於一時顧不能保全於異日惟天不可為卒之有子以顯其世有文以華其國雖不得秉政於生前亦登相位於身後觀於史臣亦曰忠義之報有由然夫胡安國三子寅宏寧安國疆學力行以聖人為標的志於康濟見中原淪沒黎民涂炭常若痛切於身雖數以罪去其愛君憂國之心遠而彌篤每有君命即置家事不問然風度凝遠蕭然塵表視天下萬物無足以嬰其心自正安右廢春秋不列於學官安國謂先聖手所筆削之書乃使人主不得聞講說學士不得相傳習亂倫滅理用夏變夷殆由乎此故潜心是書二十餘年以為天下事物無不備於此每嘆曰此傳心要典也寅號致堂本弟猶子少桀黠難制父閉之空閣其上有雜木寅盡刻為人形安國曰當有以移其心别置書數千卷於其上年餘寅悉成誦不遺一卷志節豪邁新州謫命下即日就道宏號五峰傳其父之學優游𢖍山下餘二十年玩心神明不舍晝夜張栻師事之安國之傳春秋也寧修纂檢討盡出其手著春秋通㫖以羽翼其書云録曰人稱康侯如大冬嚴霜其子豈歲寒能凋者乎所上之章凛凛如出一轍蓋由其家學一以春秋為凖的也父職總裁子備檢討家庭之間宛然史局若溫公與康侯者蓋不多見雖不仕猶仕也至於父子並列儒宗豈不美哉蔡元定二子淵沈皆躬耕不仕始元定謫道州跋涉數千里道楚粵窮僻處父子相對惟以道理自相怡悅沈年三十屛去舉子業以聖賢為師自洪範之數學者久失其傳元定獨心得之然未及論著常曰成吾書者沈也沈受父師之說沉潜反覆者數十年然後成書以謂體天地之撰者易之象紀天地之撰者範之數數始於一奇象成於二偶奇者數之所以行偶者象之所以立故二而四四而八八者八卦之象也一而三三而九九者九疇之數也由是重之而六十四六十四而四千九十六而象備矣九而八十一八十一而六千五百六十一而數周矣易更四聖而象己著範錫神禹而數不傳後之作者昧象數之原窒變通之妙或即象而為數或反數而擬象洞極用書潜虛用圖牽合傳會自然之數蝕焉先君子曰洛書者數之原也余讀洪範而有感焉上稽天文下察地理中𠫵人物古今之變窮義理之精微究興亡之徴兆彜倫所敘秩然有天地萬物各得其所之妙故西山賈氏以為與三聖之易同功者是也録曰愚觀數公之子惟九峰之傳獨得其宗其所著洪範皇極蓋以天地之所以肇者數也人物之所以生者數也萬物之所以得失者亦數也數之體著於形數之用妙乎理非窮神知化獨立物表者曷足以與此哉其作書集傳也曰二帝三王之治本於道二帝三王之道本於心禮樂教化心之發也典章文物心之著也家齊國治天下平心之推也心之德其盛矣乎聖人之心見於書猶化工之妙著於物非精深不能識也此所以卓冠群倫而從祀夫子廟庭不亦宜乎李舜臣三子心傳道傳性傳舜臣傳學力行多所著述父子各秉史才遷宗正寺簿重修裕陵玉牒當曾布吕惠卿初用事必謹書之或謂非執政除免格不應書舜臣曰治忽所關可拘常法他所筆削多類此心傳為修撰專修高孝光寧四朝實録端平三年上書言致旱之由曰和糴增多而民怨曰籍資不以罪而民怨凡此皆起於大兵之後而勢未有以消之故愈積而愈極也道傳明於河洛之學嘗訪求從學朱熹之門者與之講習盡得其遺書而讀之篤於踐履卧榻間大書唤起截斷四宇其用功愼獨如此於經史未有論著曰學未至不敢於詩文未嘗苟作曰學未至不暇性傳嘗進對有崇尚道學未遇其實之言帝曰實者何對曰在格物致知以為出治之本又言東周以後諸侯卿大夫皆以既葬除服秦漢之際尤為淺促孝文定為三十六日之制則視孝惠以前已有加矣東漢以後又損之為二十七日謂之以日易月則薄之至也録曰愚觀李氏一門三子造諸略同宋史列於儒林可無愧也而乃分為四處心傳道傳總𡚖一卷亦可也而乃殊於二門若此者可以見十羊九牧前後不倫欲無繁冗不可得矣而元定之子沉從祀廟庭不為列傳子抗反為之然則祇為官爵而已故曰余豈好辨哉余不得已也唐璘拜監察御史臺史曰至惶駭趍避其母曰人言此官好汝何憂乎璘曰此官須為朝廷爭是非一咈上意或忤權貴恐重為大人憂母曰第盡言吾有而兄在璘拜謝就職首疏天變而至於怒民怨而幾於離海宇將傾天下將覆陛下謂此何時尚縱欲纍德文過飾非疏遠正人押昵戚竪宰相用時文之才為經世之具不顧民命輕挑民端不度事宜頓空國帑季政厥子內交商人賄𡍼大開小雅盡廢瑣瑣姻婭敢預邪謀視國事如徘優以神器為奇貨都人側目朝士痛心盍正無將之誅以著不忠之罪蓋指賈似道也再疏鄭清之妄庸誤國其子士昌招權納賄拔庸將為統帥起贓吏為守臣璘立臺僅百日世謂唐子方再見皆母指教之也元史姚天福拜監察御史母戒之曰古稱公爾忘私委質為臣當罄所衷以塞其職勿以未亡人為恤俾吾追踪陵母則死之日猶生之年也天福亦請於憲府曰御史責當言路有犯無隱苟獲譴乞不為親纍或以聞世祖嘆曰天福母子雖生今世其義烈之言當於古人中求之録曰宋唐璘與元天福其母教戒同也而其功業則異璘立臺僅百日雖曰切劘上躬盡言無隱宋至是已無可為矣縱使子方復出誰能救之乎天福當世祖之際諌行言聼不惟整攝臺綱無一蛇二首之患且能復立按察有摺服豪右之功然則璘非駭也大厦將傾有不勝其任之憂福非烈也元運方隆無自貽伊戚之患母之一喜一懼而世道一污一隆從可知矣拜住安童孫也五歲而孤母𨚫烈氏有賢操教養之稍長宏遠端亮有祖風嘗奏人之仕宦隨所職司事皆可習至於學問有本施於事業此儒者之事宰相之資也陛下委臣以大任臣有所畏者三畏辱祖宗畏天下事大識見有所未盡畏年少不克負荷無以上報聖恩常直內庭知無不言及入相振立紀綱修舉廢墜裁不急之務杜僥幸之門加惠兵民輕徭薄斂英宗倚之相與勵精圖治時天下晏然國富民足遠夷有古未通者皆朝貢請吏初為禮儀院使年方二十吏就第請署適後圃閲戲母厲聲呵之曰官事不治若爾所為豈大人事耶遂深自克責一日侍宴英宗强以數巵既𡚖母戒曰天子强汝飲當益戒懼無酣於酒每事督訓故人謂拜住之賢母之教也録曰木華黎元之四傑也四世而有安童又再世而得拜住乃有所畏者三祖孫奕世無忝敦謂夷運而能若是哉揆厥所由其母間之維則收其放心無寧沉湎之所致也自是而後不能及矣皇明名臣録景泰中禮部郎中章綸給事中林聰御史鍾同大理卿廖莊困災異陳言是時太上皇别居南宫憲皇帝易儲為王兩宫踈隔嫌隙滋萌災異荐臻人心危懼廷臣無敢言者綸特陳修德彌災十四事內惇孝義謂太上皇帝君臨天下十有四年陛下向嘗親受其册封恭為臣子是天下之父也每月朔望及歲旦宜率群臣朝見以極尊崇之道又欲復舊皇后於中宫以正天下之母儀復舊皇儲於東宫以定天下之大本知此則倫誼篤而和氣充天意自回災異自彌矣忤㫖錮禁先是景泰三年朝廷初請易儲事下廷議舉朝大小臣工持疑未敢發聰獨首言皇太子無過不可易憤激不肯署名與鍾同廖莊前後諫議相同雖不能阻止而人服數臣之義天命卒無改云録曰臣觀諸臣之義凛凛乎春秋大㫖當今萬世之攸賴者也夫蒯聵出奔輒未嘗廢隱公攝位桓乃嗣立英廟初還之時憲皇方𣇄盛也何以易為哉矧景皇帝儲嗣况瘁后亦荐更當是時也正宜納鍾同章綸之說直林聰廖莊之論加禮於太上復儲於東宫則名正言順異日奪門之變未可知也曾未踰時應天順人英廟既晦而復光憲皇既廢而反正傳至我皇上億萬載無疆之休當時諸臣之議寧不明白正大矣乎乃知我明大統之傳建天地揭日月未可斯須違越者也燕對録弘治十八年五月上不豫司禮監宣內閣李東陽劉健謝遷同入乾清宫至御榻上著便服坐健等叩頭上令近前於是直叩榻下上曰朕承祖宗大統在位十八年今年三十六歲乃得此疾殆不能興上玉色發赤火聲盛氣健等曰陛下萬壽無疆偶爾違和暫須調攝安得遽為此言上曰朕自知之亦有天命不可强也朕為祖宗守法度不敢怠荒蒙皇考厚恩選張氏為皇后成化二十三年成婚至弘治四年九月二十四日生東宫今十五歲矣尚未選婚社稷事重可亟令禮部舉行皆應曰若上又曰東宫𦖟明但年幼好逸樂先生每勤請他出來讀些書輔導他做箇好人健等皆叩頭仰奏曰臣等敢不盡力録曰臣觀孝皇垂絶之命其從容委曲始終詳盡比之周書顧命異世同揆至若曰朕為祖宗守法不敢怠荒尤萬世臣子深思痛念至今在於人心所不能忘也但以好逸之言真如末命所諭而後劉瑾朱寧江彬之徒紛紜瞽惑尚賴在天之靈旋起旋滅無能久禍其貽謀不亦遠乎祭酒宋公訥禀性純誠動以矩彠不妄言笑會建大學成中外貢入學徒日夥教泥不行於是擢為祭酒所以提契鏟磢不遺餘力橫經發難擊蔀廓塞學者如客得歸居常寢食恆在厢房不宿於家一日有疾上遺中使問諭召其子麟還京侍養至是麟等懇請還家厲聲曰是何風雲氣少兒女情多耶及病革乃𡚖上親為文祭之官其次子復祖為司業録曰惟日孳孳斃而後已聖人所以勉學者未聞不宿於家也以為風雲氣少兒女情多然則必須鐵石心腸而後可耶雖然以若人而在師保之位不患人君一日之間接賢士大夫之時少與宦官宫妾之時多此所以道能信主忠可身行闕子復為司業豈尋常兒女子者可比耶尹直瑣綴録尚書何文肅公喬新父太子太保吏部尚書何文淵昔任溫州知府不受遺金人為立郤金館至今猶存及文肅公初第進士使淮西巢令閻徽以嘗師其先公贈以白金文綺公郤之徽曰吾以壽吾師非贈君也答曰子以壽吾父因他人致之則可因吾致之則不可在閩時市舶內臣死鎮守分其餘資遺三司公獨力辭不獲則受而輸於公帑及長汴臬都指揮武成德嘗因薦己贐以犀帶銀器笑曰我知君君不知我武慙而退及致仕楊宣慰遺使致金幣為壽並獻文梓可為壽具者一無所納或勸之曰戒之在得正在今曰其廉蓋素性然也録曰昔人有言臣之清不如臣之父者今亦有言何之清不如何之子者愚則以清白士大夫美德至父子奕世相傳雖出黽勉亦所當向若徒以為過情嬌激則世無全人矣録之天順初太監曹吉祥忠國公石亨怙寵擅權監察御史楊暄劾之既而彗孛疊見二勢益張公約十三道連名極論有私於亨者亨乃與祥合謀上譛下錦衣獄文致其死會京城大風雨雹拔木壞屋走下馬牌於正陽郊外始得末減謫戍遼東遇赦還職時二凶尚在或謂宜詣謝方可無事公不肯復戍廣西及二凶誅方始復官子源弘治間任欽天監五官監候正德初逆瑾當權源上疏言占候得大角及心宿中星動搖天璇天機天權星不明因勸先皇安居深宫遠絶遊幸節賞賜止工役親元老大臣講讀詩書復疏十月二十六日占候得連日霧霧交作為衆邪之氣陰冒于陽臣欺于君小人擅權為下叛上引譬甚力又言自正德二年以來一向占候得火星入太微垣帝座之前或東或西往來不一勸上宜思豫防意在瑾也於是瑾怒唤源面斥矯詔杖責遣戍肅州録曰愚觀謫戍之命一之已甚未聞再而無悔者也不韙之言父巳罹辜未聞子復蹈之者也惟有父子鐵石之心而後有前後筮龜之論楊氏可謂不沒矣此其大風雨雹亦可以見天心仁愛之至也弘道録卷之二十
