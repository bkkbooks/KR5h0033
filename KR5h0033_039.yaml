front:
  text: 弘道録卷之四十六路七
  hash: sha256:2f4c569a159ee8999920a1946087d29f519c3b14d7dd0c4e195008b600c978d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_039-001a, image: hfl/1078/1078-070.png}
body:
  text: 智朋友之智論語子謂子貢曰女與回也熟愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與汝弗如也録曰聖人之門大抵不憤不啓不悱不發蓋方人未足為病而以我不欲人之加諸我自任以博施于民而能濟衆為仁其與顔子相去不啻天淵若其英鋭之資未必真以能近取譬非爾所及之言為信故以與回敦愈啓之而賜也誠能反躬自詣從事於仰鑽瞻忽欲罷不能之間顔何人哉希之則是顧以其資禀所造就而言夫苟造就而已矣孔門之回奚待智者而後知哉故天子再言弗如也若終於賜而已矣子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣録曰此聞一知十之本也夫有所弗擇擇則無過弗及矣有所弗得得則弗膺弗失矣積而至於無所於擇無乎弗得此聞一知十有不期然學者未至於是但能黽免於擇善服膺之間則顔子之地位斯可及矣子曰回也其庶乎屢空賜不受命而貨殖焉億則屢中録曰孔子嘗以回賜並言蓋二子資相近也習相逺也回之近道在於能擇而無所不說非但天資之故乃其學之至也賜不受命而不能擇然億則屢中乃天資之合非其明之至也此命非貧富貴賤之命即天命謂性之命而屢空貨殖皆其餘事耳子曰賜也汝以豫為多學而識之者歟對曰然非歟曰非也豫一以貫之録曰此方信而忽疑非其積學功至乃擇焉不精之故也夫堯舜禹湯文武周公孔子顔淵同道一以貫之也是故禮樂文物古今事變可以多學而識之而惟精惟一允執厥中不可以多學識之也於此而擇之於初則無此疑矣夫子告子貢一貫與曾子同而先之以多學與曾子異蓋曾子務守約子貢務施博約故不言而解博故方信忽疑子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曾子曰夫子之道忠恕而已矣録曰愚觀子貢之智不但何敢望回而又何敢望參乎夫顏惟一善服膺至於知十則裕如矣曾惟忠恕自勉至於一貫則洞然矣曾子非借學者以明道也乃本諸心而無慊也錯諸躬而有據也措諸詞而不跲也夫忠與恕無二道猶一與貫無二物也而一之貫萬何從而致之亦何由而得之善學者必有肆力之地矣惟盡已可勉惟及人可能而一則不可勉矣貫則不可能矣及其至也人已混為一途天人合為一道不期於一而一者吾心也不期於貫而貫者萬事也此不惟善學夫子而又善教門人不惟善教門人而又善教萬世若茍徒事高逺未知其方雖與之千言而不足豈一言而有餘哉左傳吳公子札聘於魯請觀周樂使工為之歌周南召南曰美哉始基之國猶未也然勤而不怨矣為之歌𨚍鄘衛曰美哉淵乎憂而不困者也吾聞衛康公武公之德如是是其衛風乎為之歌王曰美哉恩而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東淮者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大夫之至也其周之舊乎為之歌魏曰美哉風風乎大而婉除而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後其能若是為之歌陳曰國無主其能久乎自以下無譏焉為之歌小雅曰美哉恩而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不携遷而不淫復而不厭哀而不愁樂而不荒周而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之弘也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不懤也如地之無不載也雖甚盛德其蔑以加於此矣録曰洪範曰思曰睿周子曰無思本也思通用也不思則不能通微不睿則不能無不通季子棄室而耕所養素定而太伯在天之靈陰有以通其微故其未聞樂之先如嶰谷未改葭莩未動希聲既鮮知音實希及其既聞樂之後如九倚既通百川時至條理脉絡豁然貫通知其若興若亡若美若盛若勤若憂若大若細若深而廣若底而至以極於如天之覆如地之載而後已焉豈其句句而歌之字字而辨之乎蓋以無不通生於通微通微生於思夫子不云乎不圖為樂之至於斯其平日誦說向往欣慕愛樂何啻汲汲一旦聞之自有不覺其心融之妙而嘆息之深也嗚呼今之誦詩三百尚不若工歌一言則以不思而不能通之故也夫子嘆雖多亦奚以為然則雖觀亦奚以為哉季札在魯見叔孫穆子說之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不愼舉何以堪之禍必及子遂聘於齊說晏平仲謂之曰子邑與政無邑無政乃免於難齊國之政將有所𡚖未獲所𡚖難未歇也故晏子因陳桓子以納政與邑是以免於欒高之難聘於鄭見子唁如舊相識與之縞席子産獻紵衣焉謂之曰鄭之執政侈難將至矣政必及子子為政愼之以禮不然鄭國將敗適衛說蘧瑗史狗史鰌公子荆公叔發公子朝曰衛多君子未有患也自衛如晋將宿於威聞鍾聲焉曰異哉吾聞之也辨而不德必加於戮遂去之文子聞之終身不聼琴瑟適晋說越父子韓宣子魏獻子曰晋國其萃於三家乎說叔向將行謂曰吾子勉之君侈而多良大夫皆富政將在家吾子好直必思自免於難録曰夫所謂博雅君子者非但能知已往之故也將來之事亦莫不知以其靜虛財明明則通動直則公公則溥其要皆自無欲中來也自今觀之若齊之晏嬰鄭之子産衛之伯玉晋之叔向皆當代殊絶人物而豹也武與起與舒也鰌與荆與朝也又皆從政之表表者吳雖逺於中國季實邇於仁賢所謂天下之善士斯友天下之善士兹非其人耶使其濫於一國之名寵淫於當時之富貴不得英賢而友之何以令名傳於今乎雖然尚有聖如夫子嘗聆謦咳而言游在魯曾無為札一介則所以卒於一國之士也通鑑田單將攻狄往見魯仲連仲連曰將軍攻狄不能下也田單曰臣以即墨破亡餘卒破萬乘之燕復齊之墟今攻狄而不下何也上車弗謝而去遂攻狄三月不克於是懼復見魯仲連曰先生謂單不能下狄請聞其說仲連曰將軍之在即墨坐朋織簣立則仗鍾為士卒倡曰無可往矣宗廟亡矣今日尚矣𡚖於何黨矣當此之時將軍有死之心士卒無生之氣間君言莫不揮泣奮臂而欲戰此所以破燕也今將軍東有夜邑之奉西有淄上之娛黃金橫帶而騁乎淄澠之間有生之樂無死之心所以不勝也田單曰單之有心先生志之矣明日乃厲氣循城立於矢石之所援枹鼓之狄人乃下録曰燭哉魯仲連乎何其切中夫人之心也以樂毅之賢而怠於莒與即墨矧其他者乎是故古之聖賢憂勤惕厲之意所以常存天之理而不敢死已之心亦惟恐堅敵之志而懈己之防也其是故歟田單克聊城歸言魯仲連於齊王齊王欲爵之仲連逃之海上曰吾與富貴而寧貧賤而輕世肆志焉録曰魯連之肆志不已泰乎肆非賢者所願也彼君君臣臣父父子子以至於夫婦長幼朋友無不得焉則世烏可輕志烏可肆哉奈之何當連之世以諸侯帝秦忘君臣之義以燕會讓國背父子之仁以君王后自嫁汙夫婦之禮以惠文立少于亂長幼之序以孫龐蘇張之徒紛紜友復失朋友之信連之欲蹈東海凡以此耳蓋不待天下士而中人之資已知其不可為矣子順者孔子六世孫也魏王聞其賢遺使秦黃金束帛聘之子順曰若王能信用吾道吾道固為治世也雖蔬食飮水吾猶為之若徒欲制服吾身委以重祿吾猶一夫耳魏王奚少於一夫使者固請子順乃之魏九九月陳大計輒不用乃以病退其友謂之曰子其行乎答曰行將何之當今山東之國敝而不振三晋割地以求安二周折而入秦燕齊楚已屈服矣以此觀之不出二十年天下其盡為秦乎録曰愚觀子順之猷為智識其諸異乎人者歟夫邦有道則仕邦無道卷而懷之此孔氏之家法也秦之暴不啻爇火而燎之原也不可撲遏矧可逝濯乎六國之君不啻燕雀而處之堂也不可瞬息矧可久安乎其料天下不出草年盡為秦者非數也理也非子順則不可與言也齊封田嬰於薛號曰靖郭君靖郭君欲城薛客謂靖郭君曰君不聞東海大魚乎網不能上鈎不能牽蕩而失水則蠖蟻制焉今夫齊乃君之水也使長有齊奚以薛為苟為失齊雖隆薛之城至齊於天庸足恃乎乃不果城録曰客之諌嬰賢於戊之諫文逺矣彼雞鳴狗盜之流何足齒録孰憶有如客者史亦竟失其名哉後世若眉塢金埒之徒非惟君子之所耻客茍有知寧不揶揄於地下耶漢書曹參微時與蕭何友善後為將相有隙及聞何薨參告舍人趣治行吾將入相居無何使者果至何且死所推賢唯參參代為相舉事無所變更一遵何約束擇郡國吏訥於文辭重厚長者即召除為丞相史吏之言文刻深欲務聲名者輒斥去之見人有細過專掩匿覆蓋之府中無事帝怪相國不治事參曰陛下自察聖武孰與高帝上曰朕安敢望先帝又曰陛下觀臣孰與蕭何賢上曰君似不及也參曰陛下言之是也高帝與何定天下法令既明陛下垂拱臣等守職遵而勿失不亦可乎帝曰善為相三年百姓歌之曰蕭何為法較若晝一曹參代之守而勿失載其清淨民以寧一録曰愚觀漢功臣之際其智與否乃吉凶所由殊也夫以蕭曹而視韓彭猶韓彭而視絳灌也史稱曹相國攻城野戰之功所以能多以與淮陰侯俱又曰韓信已破趙為相國參以右丞相屬韓信攻破齊歷下軍已而從韓信擊龍且軍於高密夫參與帝同起豐沛若此其故也又與信俱為相國若彼其尊也而曰屬則屬曰從則從曾無芥蒂信一且失王顧鬱鬱不得志至羞與絳灌等列然則參之心不但天下已平始務寧靜畫一雖干戈惶惚亦能不忮不求是以何用而不藏也又曰使參若在吕氏可以無王劉氏得以不危乎曰黃石之說曰陰計外泄者敗是時惠帝儒弱而吕氏方徢陰盛陽微大易所謂澤滅木者也使參不戒棟撓之凶而蹈過涉之咎其能有濟乎然則非不知醇酒之廢事天下之有憂也與其泄而敗孰若遁而吉乎厥後突因賈壽之語遂成滅吕之功參笞之之力也史更班馬録參而舍突豈非缺乎吕太后時諸吕擅權欲劫少主危劉氏丞相陳平患之力不能爭常燕居深念陸賈造之不請直入曰何念之深也平曰生揣我何念賈曰足下位上相食萬户可謂極富貴無欲矣然有憂念不過患諸吕少主耳曰然為之奈何賈曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變權不分權不分為社稷計在兩君掌握耳君何不交歡太尉深與相結平用其計以五百金為絳侯壽厚具樂飲太尉太尉亦報如之兩人深相結吕氏謀益壞録曰陳平六出奇計自負己智而猶出陸賈之下何也是時慮禍及己當局而迷故不若傍觀者之親切也雖然此說自生發之而南宋之書生一反之曰自古未有權臣在內而大將能立功於外者其智識正相似孰意二生先後一律耶而其意則如陰陽晝夜薰猶氷炭之不相及故其效亦有安危利鈍吉凶存亡之所攸分為天下者可不念經朱邑以治行第一入為大司農為人惇厚篤於故舊然性公正不可交以私天子器之朝廷敬焉時張敞為膠東相與邑書曰明主游心太古廣延茂士此誠忠臣竭思之時也直敞逺守劇郡馭於紀墨胸臆約結故無奇也雖有亦安所施足下以清明之德掌周稷之業昔陳平雖賢須魏倩而後進韓信雖奇賴蕭公而後信故事各達其時之英俊若必伊尹吕望而後薦之則此人不因足下而進矣邑感敞言貢薦賢士大夫多得其助者録曰周禮大司徒以鄉三物教萬民而賓興之即大農之職也敞之於邑可謂知當務之為急而且不失人亦不大言矣録之須寶以明經為郡吏御史大夫張忠辟為屬欲令授子經更為除舍設儲須寶自劾去忠固還之心內不平後署主簿寶徙入舍祭竈請比鄰忠陰察怪之使所親問前大夫為君設除大舍子曰劾去者欲為高節也今兩府高士俗不為主薄子既為之徒舍甚說何前後不相副也寶曰高士不為主簿而大夫君以寶為可一府莫言非士安得獨自高前曰君男欲學文而移寶自近禮有來學義無往教道不可誳身誦何傷且不遭者可無不為况主簿乎忠聞之甚慙上書為寶經明質直宜備近臣遂為議郎遷諫大夫録曰時寶尚為吏而終身之智端肇於此矣何也夫豺狼尚矣而城狐之戒不可忽也謂不兢杜稚季事黎藿採矣而猛獸之冤不可沒也謂寸書救鄭崇下獄事卒能自保其身且及其孫豈非明智之士乎弘道録卷之四十六
