  text: 弘道録卷之四十路一
  hash: sha256:9b46f3e13cbd29dbf9562645279f3ffd4b0d01e62b72bf7409d8d175e56cc818
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_033-001a, image: hfl/1077/1077-004.png}
body:
  text: 智君臣之智晏殊七歲能文景德初張知白安撫江南以神童薦之真宗召入與進士並試殊神色不攝援筆成文帝嘉賞之每訪以政事率用方紙小書已答并藁封上帝重其愼密有智擢知應天府延范仲淹以教生徒生平善能知人故當世知名之士如仲淹道輔皆出其門而富弼楊察亦其壻也及為相益務進賢後仲淹與韓琦富弼皆得並用至於臺閣亦多一時之選帝奮然有意欲因羣材以興治道至康定慶曆之間朝廷號稱得人皆殊之力也録曰孟子曰智者無不知也當務之為急宰相之職可不務知人乎始以神童薦終以知人顯非不能三年而緦小功之察者矣其卒為名臣不亦宜乎范仲淹知延州先是各邉分兵詔總管領萬人軨轄領五千人都監領三千人寇至禦之則官卑者先出至是仲淹曰將不擇人以官為序取敗之道也因大閲州兵得萬八千人分六將領之將三千人日夜訓練量賊衆寡使更出禦賊敵人聞之相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也録曰愚觀范仲淹其起也一書生耳而腹中數萬甲兵何自來哉嗚呼此張詠所謂大小之事皆須用智者也而更出番入非其變通使然哉故人能用智則方寸化而不窮不能用智則一籌莫之能展是皆在我而已非有大小老少之别也觀者不可不知狄青愼密寡言深沉有智略計事必審中機會而後發行師先正部伍明賞罰與士卒同飢寒勞苦敵淬犯之無一士敢後先者初起行伍為三班差使寶元初趙元昊反時士卒畏怯青每臨陳被髮帶銅面具出入敵中無不披靡以是數立奇功尹洙善之薦曰此良將材也仲淹授以左氏春秋曰將不知古今匹夫勇耳由是折節讀書悉通秦漢以來兵法及儂智高叛帝以為憂青時為樞副上表請行遂進宣撫至廣南初鈐轄陳曙失律兵潰青曰令之不齊兵所以敗乃斬曙於是諸將股栗莫敢仰視因按兵止營令軍士休十日賊覘者以為未即進明日整兵馳一晝夜絶崑崙關出歸仁鋪大敗賊師按尸有金龍衣者衆謂智高已死欲以上聞青曰安知其非詐耶不敢誣朝廷以貪功也青雖貴重面涅猶存嘗勑令除之自指其面曰陛下以功擢臣不問門地臣所以有今日由此涅爾願留以勸軍中不敢奉詔後在樞府人有持狄梁公告身詣獻之以為其逺祖謝曰一時遭際安敢自附梁公贈其人而遣之録曰人言智高今不高乎智者發幾貴速轉移貴捷變無常形施無常露至於不貪僥幸不忘戮辱不冒無妄又皆逹者之事有將如此不易得矣而尚不免卒之疑慮向使數者或犯一焉終於不免矣君子觀人不可不於其所忽也神宗熙寧元年冬十一月有事於南郊時執政以河朔旱傷國用不足乞南郊勿賜金帛詔學士議司馬光曰救災節用當自貴近始可聼也王安石曰常衮辭堂饌時以為衮自知不能當辭職不能辭祿國用所以不足者以未得善理財者故也光曰善理財者不過頭會箕斂爾安石曰不然善理財者不加賦而用足光曰天下安有此理天之所生財貨百物止有此數不在民則在官彼設法奪民其害乃甚於加賦此蓋桑弘羊欺武帝之言司馬遷書之以議武帝之不明耳爭議不已帝曰朕意與光同姑以不允答之會安石草詔引常衮事責兩府遂不復辭録曰昔者畢仲遊受知於光貽書曰安石以興作之説動先帝而患財之不足故凡政之可以得民財者無不用蓋散青苗置市易者事也而欲興作患不足者情也苟未能杜其情而徒欲禁其事是以百説而百不行智哉斯言乎且以宋之中葉太平全盛天下無事加以仁宗之恭儉英宗之繼體初未嘗有所損也而國用不足至郊思未敷以初立好勝之君豈不動心乎帝之不允乃所以深允之也是以古之聖君淡然無欲不求足然後能無不足不求盈然後能無不盈彼以豐盈為慮求足為心者雖百計爭之我之説益逺彼之論益親然則安石非能投於帝帝自投於安石也其與光之意同乎何有秉義郎嶽飛犯法將刑宗澤一見奇之曰此將材也會金人攻汜水澤以五百騎授飛使立功贖罪飛遂大敗金人而還升飛為統制而謂之曰爾智勇材藝古良將不能過然好野戰非萬全計因授飛陳圖飛曰陳而後戰兵法之常運用之妙存乎一心澤是其言飛由此知名嶽飛上書言勤王之師日集宜乘敵怠而擊之黃潛善汪伯彥輩不能承聖意恢復奉車駕日益南恐不足繫中原之望願陛下乘敵穴未固親帥六軍北渡則將士作氣中原可復坐越職言事奪官歸詣張所所以飛克中軍統領問之曰爾能敵幾何飛曰勇不足恃用兵在先定謀欒技曳柴以敗荆莫敖采樵以致絞皆謀定也所矍然曰君殆非行伍中人補武經郎録曰愚觀宗統制張招撫之識嶽武穆也所以靖康中以蠟書冒圍募河北兵民得書喜曰朝廷棄我猶有一張察院能拔而用之應募者凡十七萬澤留守東京欲乘暑月自滑州渡河取懷衛濬相等州分路並進山寨忠義之民相應者不啻百萬而黃潛善汪伯彥日置根本於度外然則飛之越職正二公之奉職也苟有如高光者納蕭何之説攬鄧禹之謀將不得為元功乎徒負智勇之量卒同暗投之比君子祇當咎諸公之幸與不幸不必責帝與諸臣之明與不明也趙鼎與張浚並為尚書左右僕射兼知樞密院事都督諸路軍馬是時鼎浚相得甚歡及命下史館校勘喻樗門之曰二人且宜同在樞府他日趙退則以張繼之立事任人未甚相逺則氣脈長若同處相位萬有一不合或當去位則必更張是賢者自相背戾矣後果如樗言録曰愚觀喻子村之料事可謂多中矣夫蕭薨而曹顯丙先而魏後房謀而杜斷崇變而景法雖曰協心同德而實繼美踵芳是以道義流於無窮功業著於悠久此後世之所瞻仰也鼎與浚雖曰操心蹇蹇矢志在公觀其以飛之一言遂致乖忤因檜之厚貌輟加深信則未必忘己之義無我之心而自相背戾豈能保乎卒以他人之小嫌而成爾汝之不協子材之言不為無徴矣録之韓世忠懲嶽飛之事遂以所積軍儲錢百萬貫米九十萬石酒庫十五歸於國上表乞骸自此杜門謝客口不言兵時跨驢携酒從一二奚童縱遊湖山以自樂平時將佐罕能見其面初得疾勑尚醫視療世忠曰吾以布衣間關百戰致位王公賴天之靈得保首領諸君尚哀其死耶嘗戒家人曰吾名世忠汝曹毋諱忠字諱而不言是忘忠也特以抵排和議觸檜尤多或勸止之曰今畏禍易同他日瞑目豈可受鐵杖於太祖地下時大將多曲徇檜以圖苟全世忠與檜同在政地一揖外未嘗與談所規畫器仗精絶過人知人善奬部曲繼秉節旄卧家十年淡然自如若未嘗有權位者録曰湖山之樂在世忠則以為智在君子獨以為非何耶夫自越王勾踐之卧薪嘗膽也而後吳始亡自先朝京勔之恣意陳南也而後宋始滅皆其所耳聞目擊者也奈之何為君者不以雪耻除凶為心為相者反以讐功忌能為事遂使英雄之將翻為脂韋之臣竊圖苟全豈得已哉雖以抵排和議悉皆空言無施然則列聖在天之靈果知乎哉不知乎哉劉鎬順昌之戰募曹成等二人遺作間事遇敵佯令墜馬果被執兀术問錡何如人對曰太平邉帥喜聲妓朝廷以兩國講好使守東京圖逸樂耳兀术喜曰此易破也翌日至城下責諸將喪師皆曰南朝用兵非昔之比兀术不信錡遂進軍衆請先擊韓常軍錡曰擊韓雖退兀术精兵尚在不可當也法當先擊兀术俟其一動則餘無能為矣時兀术披白袍棄甲馬以牙兵三千督戰皆重鎧甲戴鐵兜牟號鐵浮圖錡以槍標去其兜牟大斧斷其臂又有拐子馬號長勝軍至是亦為所破是役也錡兵不盈二萬出戰僅五千人特以智計先定不為諸將所惑屢勝所驕而能以寡禦衆以逸待勞故能成功洪皓自金密奏順昌之捷金人震恐意欲捐燕以南棄之謂是時諸將協心分路追討則兀术可擒汴京可復而王師亟還自失機會良可惜也録曰兵法曰為將者智信仁勇嚴缺一不可而智為之首此劉錡所以有順昌之捷而祿者猶為之踴躍也此時和議已成譬則落場之文略有可觀外此皆歡合之境矣復何機會之有汪立信自為沿江招討大使在江陵即上疏請益安陸府兵凡邉戍不宜抽減曰為今之計有三宜盡出內郡之兵以實外禦見兵可七十餘萬人老弱柔脆七分汰二為選兵五十餘萬而沿江之守不過七千里若距百里而屯屯有守將十屯為府府有總督其尤要害處參倍其兵無事則泛舟長準往來遊徼有事則東西齊奮戰守並用刀斗相聞餽餉不絶互相應援以為聯絡之勢選宗室親王忠良有幹用大臣立為統制分東西二府以蒞任率然之勢此上策也久拘聘使無益於我徒使敵得以為辭請禮而歸之許輸歲幣以緩師期不二三年邉境稍休藩垣稍固生兵日增可戰可守此中策也似道得書抵之於地曰瞎賊狂言敢爾乃中以危法廢之及似道喪師還又召為招討使俾就建康募兵以授江上諸郡即日上道與似道遇於蕪湖撫立信背曰不信公言以至於此既至建康守兵悉潰而四面皆元兵立信知事不成歎曰吾生為宋臣死為宋鬼或有以立信二策告於伯顏嘆息曰宋有是人使果用之我安得至此録曰孟子曰無是非之必非人也時沿江之策已為下計譬之焦頭爛額不可斯須緩者此而為狂無乃真喪其心乎雖然似道非喪心者特以迷於鴆毒稔於貫盈至是已非人矣天將假鄭虎臣之手以彰賣國之惡故不得不至此也皇明名臣録誠意伯劉基慷慨多智攻於天文時寓杭適遊西湖有異雲起西北光映水中同遊者以為慶雲分韻賦詩公獨縱飮曰此天子氣也應在金陵十年後有王者起我當輔之太祖下金華定括蒼公又指乾象謂所親曰此天命也豈人力能之耶果遣使來聘遂由間道詣金陵陳時務十八策會陳氏入寇或謀以城降或以鐘山有王氣欲奔據之公獨曰如臣之計莫若傾府庫開至誠以固士心且天道後舉者勝宜伏兵伺隙擊之取威制敵以成王業在此時也上遂用公策乘東風發伏擊之斬獲無算中書省設御座將奉小明王公怒罵曰彼牧竪奉之何為不拜陳天命所在上感悟乃定征伐之計洪都守將胡均美使其子約降上初有難色公自後踢所坐胡床上意悟許之均美遂以城降及後屢欲用以為相辭曰宰相國之重任譬如易柱必得大才然後可若束小木為之將速顚覆如臣非不自知但疾惡太深又不耐繁劇為之且孤大恩上由是益重公稱為老先生而不名又曰吾之子房也嘗著書恐不及見以貽天下後世詎意身親用之故公之事業具於書此元之所以亡也公之書見於事業此皇明之所以興也一人之用舍有關於天下國家之重如此録曰楊文懿公有言子房之策不見詞章玄齡之文僅辨符檄未見擅開國之勳業而兼傳世之文章公可謂千古之人豪矣世或疑其仕元或獨稱其觀象者是猶訾伊尹之五就知周公止於才藝而已愚獨以公之辭宰相不居鑿鑿乎則哲之智世以為無踰於公而公自視歉然其過人逺矣非挾智任術者比也永樂宣德間名臣稱三楊文貞西楊文敏東楊文定南楊東楊天資明敏有果斷之才每朝廷事使中官來閣下議必曰東楊先生在否或知不在即回然凡議事未嘗不遜西楊或執以不可行者已而卒斷於東楊灼然可行而無礙也每秋勑文武大臣審録重囚自英國而下俱遜避候二楊先生決之西楊訊之未嘗決至不可了東楊一問即決衆皆嘆服時主上英武羣臣奏對少能稱旨惟愛東陽之才未嘗一日離左右几密謨至計必𠫵與焉或大臣謀事未決文廟不樂至發怒東楊一至輒霽威事亦隨決東楊嘗語夏太常仲昭曰吾見人臣以抗直受禍者每深惜之大凡事君自有體進諫亦有方譬若上讀千文云天地玄紅未可便言安知不以嘗我又安知主意云何俟其至再或有所詢則應之曰臣幼讀千文云天地玄黃未知是否其智大率類此及李時勉又曰西楊先生未仕時與楚府教授吳由翁草逆交由翁為余言先生博學有智端敏寬厚識達事體不矜己傲物及居禁近參掌機務公平廣大寬和有則其心專在於國家未嘗一毫私己至於臨大政決大疑衆皆爭論紛紜獨無一言久之徐為一言衆莫不懾服有輿論不一須上聞者既以聞卒從先生言其在上前遇事盡言不計利害每辨論人才賢否解翻人過失一出於公不以恩讐為輕重取舍至於獻可替否有旋乾轉坤之力然未嘗與人言大臣宰相之專於此見之録曰愚觀三楊之遭際無異前代以今目録之所書有房社推讓之風水東之所記有平勃自牖之勢文集之所序有韓范居身之本其所以出幽就明建功立業智哉若人也已録之平江伯陳瑄周旋有智略靖難師至江北瑄知天命有歸率舟師迎濟封平江伯時北京軍儲不充命公歲董運百萬石道海給之建百萬倉於直沽尹兒灣城天津衛籍兵萬人戍守漕洲所經海島夷人畏憚悉避匿公下令俾出為市而遣官監臨平其直無敢譁人兩便之既建北京罷海運公建議造淺艖二千艘初歲運二百萬石後增至五百萬石疏清江浦引水由管家湖入鴨陳口達淮以免外河風濤之險就管家湖築堤亘十里以便引舟開儀真瓜州二壩潮港之湮鑿吕梁徐州二洪巨石以平水勢築沛縣刁陽湖濟寧南旺湖長堤開泰州白塔河通大江築高郵湖堤隄內鑿渠亘四十里以通舟南北造梁以便行自淮至臨清相水勢高下建閘四十有七以時啓閉皆舟楫通行永逺之利又沿河置舍五百六十八所舍置導淺夫沿堤鑿井樹木以便行凡慮為之周而事為之果録曰愚觀是時南北未通天乃篤生異人於大江之滸雖欲勿用山川其舍諸嗚呼始以平江封終以濟川顯書曰若濟大川用汝作舟楫斯言當不誣矣而廟祀至會血食不廢其亦以此也夫周文襄公忱初登進士選庶吉士曾棨等二十八人公自陳願進學其間太宗喜曰是真有志者命增入後歷官工部侍郎巡撫南畿凡二十二年沉敏多智為人謙恭言苦不出口而謀慮深長善采衆論凡所猷為必咨之細民父老及守令而後決之於已尤善記憶有姦民以斷理數事嘗公者曰汝於某事某處吾已決之何為復言吏於稅糧有所欺隱必曰某年撥其處若干某年存留若干以籍驗之果然吏驚服以為神初蘇州稅糧負欠七百九十餘萬常松亦然屢遣官催迫未能就緒公至詢父老皆云蘇松民俗大户不出加耗以致小户連纍納欠乃使大小户一例加耗奏行南京鑄送鐵斛於是出入均平舊例不許團局收糧公曰此負欠之由也遂令各縣於水次推一人總之名曰總收定與加耗各有定則除撥運外自羡存積在倉號曰餘米至次年各照加減徴收依前撥運外猶有附餘令各縣造倉一所名曰濟農將剩米運入以備賑濟或農民缺食及運夫遭風被盜者聼給借納秋成抵斗還官凡官府織造供應軍需之類盡出於所積餘米蓋民賦歲一石五斗之外漠然不見化役之及而官府無復科索之擾諸縣學校先賢祠各郡橋梁河道多所修葺濬治一切取諸餘米人爭為立生祠沒因以祀之其後户部言濟農餘米失於稽考奏遣曹屬盡數歸之官於是徴需雜然逋負自若人益思公焉録曰王文恪公論都御史何鑑曰夫財生於地成於天而理之存乎人理之有法則以不足為有餘理之無法則以有餘為不足其張弛嬴縮一視其人若文襄者真其人哉故每每舉之以為巡撫之法昔者江南諸郡數苦大小公私懸罄比歲豐稔相仍粒米狼戾亦嘗究其故乎此人事非天時也及當何公巡撫之時江南大飢上救荒十二策得兊軍留州祿米軍儲諸費八十餘萬於是江南諸府在在充牣時議濬吳松白茅港方以費無所出乃請以充軍諸費充焉用米至二十八萬而不為費此役成而東南無水患矣則歲之豐凶率歸之天時可乎所謂以不足為有餘者非是之謂與此文襄之智至今猶思之也知蘇州府况鍾初由小吏事尚書吕震震薦其才授禮部儀制司主事進郎中時仁廟初政令在京五品以上各舉所知鍾乃舉左春坊張宗璉仁廟召問楊士奇曰人皆薦外郡下僚鍾何乃舉朕宫官士奇曰臣與王直方欲擬薦不意遽為所先耳仁廟大喜曰鐘知宗璉亦可謂賢矣蓋已有嚮用意宣廟即位大臣奏蘇州大郡繁劇難治擢為知府至即黜屬官貪暴五人庸懦十餘人遂與周巡檢講究收糧之法由永樂間轉輸北京餉道遼逺糧以一徴三府二百七十萬石加徴至八百一十萬石除正供及僦舟船之費羡餘皆為糧長所匿乃議别立糧頭以分其勢除免舊徴三分之一以其二之一為轉輸費餘米皆入濟農倉以為來年經費之本由是年馬草米數十萬石夏稅折布絲數十萬斤絹數十萬匹小麥數十萬石皆以餘米代納而凡雜出供費亦以此買辨上不失征科之期下無毫髮於民遇災旱輒發賑之每活輒數十萬人其惠利及於貧困者無窮至九載滿去闔郡民扣閽乞留至八萬餘人遂遣再任後以疾卒民競立祠祀之録曰前此蘇松民俗大户不出加耗者其此類歟時上有仁廟之君又有文襄之臣鍾之智惠若鴻毛之遇順風耳不然以一小吏而干朝廷薦舉之大宰相方且後之以一守而厪八萬扣閽之人朝議方且從之難乎免於今之世矣録之弘道録卷之四十
