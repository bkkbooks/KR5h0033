  text: 弘道録卷之二十四將一
  hash: sha256:b6f04961ed788a907fff7455666539c130e8fb5a5c3f21956e60568c5384f0b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_017-001a, image: hfl/1073/1073-004.png}
body:
  text: 義昆弟之義唐書虞世南與兄世基同受學于吳顧野王餘十年精思不懈至纍旬不盥櫛文章婉縟慕僕射徐陵陵自以為類已由是有名陳天嘉中文帝知二子博學遣使至其家護視世基辭章清徑過世南而贍博不及議者方晉二陸大業中纍官祕書郎煬帝時世基得君貴盛妻妾服御擬王者而世南躬貧約不改其操宇文化及殺世基世南抱持號訴請代不能得自是哀毁入唐為弘文館學士時已老屢乞骸不聽太宗重之以其貌儒謹外若不勝衣而中抗烈論議持正嘗曰朕與世南商略古今有一言之失未嘗不悵恨其懇誠乃如此又稱其有五絶一德行二忠直三博學四文詞五書翰卒年八十一録曰愚觀二虞氏一顯於隋一奮于唐顯于隋者若春花吐艷焜耀一時故時方二陸非不具美也奮於唐者若晚菊含葩馨香四逹故世稱五絶莫之與京也夫人際遇不同而本末迥異有如此者然則人豈可以窮通蚤莫二其心哉崔邠宇處仁兄弟六人酆郾郇鄯鄲同時至三品凡為禮部五吏部再唐興無有也父無四世緦麻同爨當時治家者咸推其法邠以鯁亮知名憲宗器之為太常卿始視事大閲四部樂都人縱觀邠自弟親導母輿公卿見者皆避道都人榮之郾子廣略姿儀偉秀人望而慕之下不敢欺每擬吏親挾科格褒黜必當寒遠時無留才素不藏資有輒周給親舊居家怡然子弟化之鄯左金吾衛大將軍卒干家不與李訓之亂人以為積善報也鄲以檢校尚書右僕射同平章事節度淮南所居光德里搆便齋宣宗聞而嘆曰鄲一門孝友可為士族法因題曰德星堂後京兆即其里為德星社云録曰柳氏嘗有言曰行道之人德行文學為根株正直剛毅為柯葉有根無葉或可俟時有葉無根膏雨所不能活也至於孝慈友悌忠信篤行乃食之醯醬何可一日無哉觀於崔氏而可見矣人可忽於範世自負聯翩顯盛從而淫逞於富貴哉德星之文將不曜矣小學河東節度使柳公綽在公卿間最名有家法中門東有小齋自非朝謁之日每平旦輒出至小齋諸子仲郢皆束帶晨省于中門之北公綽決私事接賓客與弟公權及群從弟再會食自旦至暮不離小齋燭至則命子弟執經史躬讀一過訖乃講議居官治家之法或論文或聼琴至人定鍾然後歸寢諸子復昏定於中門之北凡二十餘年未嘗一日變易其遇飢歲則諸子皆蔬食曰昔吾兄弟侍先君為丹州刺史以學業未成不聼食肉吾不敢忘也及公綽卒仲郢一遵其法事公權如事公綽非甚病見公權未嘗不束帶為京兆尹鹽鐵使出遇公權於通衢必下馬端笏立候公權過乃上馬公權暮歸必束帶迎候于馬首公權屢以為言仲郢終不以官達有小改公綽妻韓氏相國休之曾孫家法嚴肅儉約為縉紳家楷範歸柳氏三年無少長未嘗見其啓齒常衣絹素不用綾羅錦繡每歸覲不乘金碧輿秪乘竹兜子二青衣步屣以隨常命粉苦參黃連熊膽和為丸賜諸子每永夜習學含之以資勤苦録曰史稱公綽仁而有勇仲郢方嚴簡素父子更九鎮五為京兆再為河南皆不奏祥瑞不度僧道不貸贓吏法凡理藩府急於濟貧恤孤有水旱必先期假貸廪軍食必精豐逋租必貰免館傳必增飾宴賓犒軍必華盛而交代之際食儲帑藏必盈溢於始至此居官之法也而修身正家之法史不具備録之柳玼嘗著書戒其子弟曰壞名災己辱先喪家其夫尤大者五宣深志之其一自求安逸靡甘淡薄苟利於己不恤人言其二不知儒術不悅古道懵前經而不耻論當世而解頤身既寡知惡人有學其三勝己者厭之佞已者悅之唯樂戲談莫思古道聞人之善嫉之聞人之惡揚之浸漬頗僻銷刻德義簮裾徒在厮養何殊其四崇好優遊耽嗜麯糵以銜杯為高致以勤事為俗流習之易荒覺已難悔其五急於名宦匿近權要一資半級雖或得之衆怒群清鮮有存者余見名門右族莫不由祖先忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛言之痛心爾宜刻骨録曰柳氏世有規範若此篇者不論長幼無間窮達宜寫一通置之坐側未可以為小學莫之省也宋史太祖幸洛張齊賢以布衣獻䇿條陳十事內四説稱旨及還語太宗曰我幸西都惟得一張齊賢耳我不欲官之他日可使輔汝為相也及太宗登祚策試進士齊賢乃在選中有司失于掄擇置諸下第帝不悅故一榜書賜及第特與京官通判録曰宋祖以齊賢留相太宗乃真德實意當時太宗私意未起因心尚存故一榜盡賜及第可謂載錫之光矣及其私意一萌齊賢乃在所略趙普再薦始得大用觀其曰陛下若進齊賢他日感恩更過于此上遂大悅然則奏王之謀齊賢與聞亦可見矣嗚呼齊賢其負藝祖哉矧如王溥依違前代取容本朝而欲望其盡忠匡救胡可得乎江州陳氏宗族七百口自陳崇以來數世未嘗分異為家法戒子孫擇群從掌其事建書堂以教誨之詔旌為義門免其徭役崇子衮衮子昉同居不畜婢妾人無間言每食必群坐廣堂未成人者别為一席建書樓以延四方之士鄉里率化昉弟子鴻鴻弟競競之世子姓益衆嘗苦乏食淳化中太宗詔本州每歲貸粟二千石其後競死從弟旭止受貸粟之半云省嗇而食可以及秋成屬歲歉粟貴或勸旭全受而糶可邀若價旭曰朝廷以旭家衆軫其乏食貸以公廩豈可見利忘義耶帝聞深嘉嘆奬録曰競之與旭猶帝之與美也昉之於鴻猶美之於昭也一家之中崇為之長昉為之繼昉弟子鴻鴻弟競競弟旭數世一心未嘗自異奈之何國法反不如家法之善遺命反不若遺謀之遠乎究而論之其本在於不競粟利始也夫自一芥至於萬鍾一室至於天下古一聖賢所以競競業業不敢肆然者正以預養是心無致見利而忘義也是故區區一江州而有長幼七百口之陳堂堂大天下而無一弟二姪之宋帝之嘉嘆一人而甘於負謗萬世其不知類也已葛宫弟密奕世儒學以道義聞真宗時上太平雅頌十篇又獻寶符閣頌為楊億所稱知南充以惠政聞擢南劒州並溪山多産銅銀吏挾姦罔利謂歲不登宫變其法歲羡餘六百萬三司使聞於朝論當賞宫曰天地所産敢為功乎卒不言徙知秀州秀介江湖間吏為關涇瀆上以征往來間有婚喪趨期者多不克宫命悉除之卒官太子賓客性敦厚恤録宗黨撫孤婺賴以存者甚衆密為光州推官豪李新殺人嫁禍於邑民葛華密得其清出之亦當賞密白州使勿言仕至太常博士天性恬靖年五十上章致仕姻黨交止之笑曰俟罪疾老死不已而休官者安得有餘裕哉子書思調建德主簿時密已老欲迎之官難之書思曰曾子不肯一日去親側豈以五斗移素志哉遂投劾歸飬及父喪哀毁骨立盛暑不釋苴麻終禫不忍去家舍纍年乃出仕兄書元為望江令同𨽻淮南監司有捨兄而薦己者移書乞改薦兄不許則封檄還之其篤義類此仕至朝奉郎亦告老父子皆不待年人咸高之卒諡曰清孝子勝仲儒林有傳孫立方曾孫邲五世登科三世掌辭命邲遂相光寧二宗嘗曰十二時中莫欺自己其實踐有如此録曰愚觀葛氏一門父祖子孫及于昆弟何其澤之遠哉或仕而舍要投間或權而正己守法或父子簮紱相高或兄弟薦引相尚至于清孝之諡儒林之稱皆前古所未有而五世科第三世絲綸亦近代所罕何蓋不但王氏之三槐而已宋庠與弟祁同舉進士禮部奏祁第一庠第二章獻太后不欲以弟先兄乃擢庠第一而實祁第十人呼曰二宋以大小别之兄弟皆優文學名擅天下寶元中庠以右諫議大夫參知政事為相儒雅練習故事遇事輒辨别是非與吕夷簡論數不同乃出知楊州范仲淹去任帝問章得象誰可代得象薦祁帝雅意在庠復召為參知政事為人天資忠厚嘗曰挾詐恃明殘人矜才吾不為也卒諡元獻仁宗篆其墓碑曰忠規德範之碑祁諡景元尤能文善議論所至治事明峻好作條教咸平天聖間兄弟文雅節操友愛著聞于時自宋以來不多見也蘇軾與弟轍同登進士又同策制舉仁宗讀策退而喜曰朕今日南子孫得兩宰相矣神宗尤愛其文宫中讀之膳進忘食稱為天下奇才幼師父洵為又既而得之于天戰嘗自謂作文如行窟流水初無定質但常行于所當行止于所不可不止雖嬉笑怒罵之辭皆可書而誦之其體渾涵光芒雄視百代有文章以來蓋亦鮮矣初好賈誼陸贄書既而讀莊子嘆曰吾昔有見于中口未能言今見此書得吾心矣嘗謂轍曰吾視今世學者獨子可與我上下矣自為舉子至出入侍從必以愛君為本忠規讜論挺挺大節群臣無出其右故論者謂其器識之閎偉議論之卓犖文章之雄雋政事之精明四者皆能以特立之志為其主而以邁往之氣輔之故意之所向言足以逹其有猷行足以遂其有為至于禍患之來節義足以固其有守皆志與氣所為也轍論事精確修辭簡嚴王安石初議青苗數語柅之自是不復及若非王廣兼傅會則此議息矣皆其寡言鮮欲素有以服其心故也元祐秉政力斥章蔡不主調停及議回河顧役與文彥博司馬光異同而西邉之謀又與吕大防劉摯不合君子不黨于此見之二人進退出處無不相同患難之中友愛彌篤無少怨尤近古尤罕見云録曰愚觀大宋以大科取士一舉而得二宋又一舉而得二蘇何其盛歟自預以異日為相之望非區區一資半級可以見宋朝待士之厚須材之篤過于漢唐諸君遠甚而數子者寧誳己私而不敢背公彗寧忤權臣而不敢欺朝廷上不負天子下不負所學可謂得以道殉身之義矣雖或相或否而其體段已具無害乎其所謂大臣也至于成敗利鋭又何足較哉王安國任西京國子教授秩滿至京帝以安石之故特詔問曰漢文帝何如主安國對曰三代以後未之有也帝曰但恨其才不能立法更制耳曰文帝自代來入未央宫定變故俄頃呼吸間恐無才者不能至用賈誼言待群臣有節專務以德化民海內興于禮樂幾致刑措則文帝加有才一等矣帝曰王猛佐符堅以蕞爾之國而令必行今朕以天下之大不能使人何也曰猛教堅以峻法殺人致秦祚不傳今刻薄小人必有以是誤陛下者願專以堯舜三代為法則下豈有不從者乎帝又問卿兄秉政外論謂何對曰恨知人不明聚斂太急爾帝不悅由是止授崇文院校書屢以新法之弊力諫安石又嘗以佞人目惠卿故惠卿銜之録曰帝之問安國即所以問安石也安石探帝之情兼于二秦故假權寵以濟其私安國鑒兄之失蔽于群佞故𩛙正詞以明其惑不然王氏幾無人矣以雱之疾戾欲梟韓琦富弼之首而卒奪其魄天之降鑒亦孔昭乎雖不能見悅于帝而實不自絶于天後世不以安石病安國則較然矣曾鞏少弧弟布與肇皆受學于鞏為文章本原六經斟酌于司馬遷韓愈一時工作文詞者鮮能過也肇幼自力學博覽經傳為文溫潤有法更十一州類多善政及布得政自熙寧以來四十年邪正相軋黨論屢起肇身更其間與兄不合布因韓忠彥並相日夕傾危之肇既居外移書告之曰兄方得君當引用善人翊正道以杜惇卞復起之萌而數月以來所謂端人吉士繼迹去朝所進以為輔佐侍從臺諫往往皆前日事惇卞者一旦勢異今曰必首引之以為固位計思之可為慟哭比來主意已移小人道長進必論元祐人于帝前退則盡排之于要路異時惇卞縱未至一蔡京足以兼之不可不深慮布不能從未幾京果得政布與肇俱不免録曰自二宋二蘇有名當時若金陵之王南豐之曾文學行能略不相遠君子未可以差殊觀也一心術之偏寵祿之奪遂致一邪一正若隔天淵一薰一蕕若分二器其遺臭直至于今豈非以其誣陷正人排斥忠義專務引用凶邪以為固位取寵之計哉抑王氏昆弟之于新政始終區别之將凂焉徽宗既相蔡京旋復相布肇實為草制曰東西分臺左右建輔嗚呼盍不于是時明其是非以為去就乎既以居外乃始移書或已晚矣宜乎布之不能從也吕祖儉祖泰祖謙之弟也受業祖謙祖謙卒祖儉監明州倉部法半年不上為違限祖儉必欲終期喪朝廷從之詔以一年為限自祖儉始寧宗即位除大府丞時韓胄誣趙汝愚祖儉上封事曰陛下初政清明曾未踰時朱熹老儒彭龜年舊學悉許之去至于李祥老誠篤實衆聼所孚者今又斥逐臣恐天下視以為戒今能言之士其所難非在于得罪君父而在于忤意權勢姑以臣所知者言之莫難于論災異然而不諱者以其事不關于權勢也若乃御筆之降廟堂不敢重違臺諫不敢深論給舍不敢固執蓋以其事關貴幸深慮乘間激發而重得罪也比者左右御於黜陟廢置之際間得聞者車馬輻湊其門如市恃權怙寵搖憾外庭臣恐事勢浸淫政歸幸門不在公室凡所薦進皆其所私凡所傾陷皆其所惡豈但側目憚畏莫敢指言而阿比順從內外表裏之患必將形見臣豈矯激自取罪戾實以士氣頽靡私憂過計深慮陛下之勢孤而相與維持宗社者䆮寡也有旨安置韶州朱熹與書曰熹以官則高于子以恩禮則深于子然坐視群少之為不能言以報效乃令子約獨舒憤悶觸群小而蹈禍機其愧嘆深矣祖儉報書曰在朝行聞時事如在水火中不可一朝居使處鄉閭理亂不知又何以多言為哉嘗言因世變有所推折失其素履者固不足言因世變而意氣有所加者亦私心也祖泰性疏達尚氣誼學問該博遍遊江湖交當世知名士祖儉安置遠州祖泰徒步往省之留月餘語其友王深厚曰自吾兄之貶諸人箝口我雖無位義必以言報國當少須之未敢以纍吾兄也及祖儉沒貶所祖泰乃上言論胄有無君之心道學者自古所恃以為國也立偽學之禁逐汝愚之黨是將空天下而陛下不知悟邪陳自強特童孺之師躐致宰輔蘇師旦平江吏胥以潛邸而得節鉞周均韓氏厮役以皇后親屬得大官不識陛下在潛邸時果識師旦乎椒房之親果有均乎凡胄之徒自尊大而卑朝廷一至于此也願亟誅胄及師旦而罷逐自強之徒獨周必大可用宜以代之書出中外大駭有旨挾私狂妄杖之百發配欽州録曰真文公嘗稱大愚有成公之風然猶一大府丞也至泰然韋布之末耳無官守無言責而甘履危機何歟宋轍既南明離不復姦邪疊興然未有若胄之時者也自偽學之説興公然以放僻邪侈為人之真情廉潔好修乃偽情耳自生民以來未有此説是殆甚于指鹿為馬之姦慘于焚書坑儒之禍人人得而誅之况世得中原文獻之傳者乎抑吕許公韓魏公之在仁宗朝皆居相位有盛名至其子孫邪正之分不啻若此吕雖屢竄屢逐馨香百倍而韓之元凶極醜遺臭萬年君子不能不為之長太息也陸九齡兄弟六人父賀纍世義居推一人最長者為家長一家之事聼命焉子弟分任家事凡田疇租稅出內庖爨賓客之事各有主者九齡繼其父志益修禮學治家有法闔門百口男女以班各供其職閨門之內嚴若朝廷而忠敬和樂鄉人化之皆遜弟焉與弟九淵相為師友和而不同學者號為二陸有來問學者九齡從容啓告人人自得或未可與語則不發嘗曰人之惑有難以口舌爭者言之激適以固其意少需之未必不自悟也廣漢張敬夫與九齡不相識晚歲以書講學期以世道之重吕祖謙常稱之曰所志者大所據者實有肯綮之阻雖積九仞之功不敢遂有毫釐之偏雖立萬夫之表不敢安公聼並觀却立四顧弗造于至平至粹之地弗措也弟九韶學亦淵粹隱居山中晝之言行夜必書之以訓戒之辭為韻語晨興家長率衆子弟謁先祠畢擊鼓誦其詞使列聼之録曰愚觀陸氏家規之切閨範之嚴後世鑿鑿可以遵而行之張公藝忍之一字昔見其有所未盡此則道學之益不可徒以纍世義居目之也史彌鞏彌遠從弟也入太學升上舍時彌遠柄國寄埋未仕避謙謂之寄理不獲試淹抑十載嘉定十年始登進士端平初入監都進奏院嘗應詔上書曰天倫之變世孰無之陛下友愛之心亦每發見洪咨夔所以蒙陛下殊知者謂霅川之變非濟邸本心濟邸之死亦非陛下本心其言深有以契聖心耳矧以先帝之子陛下之兄乃使不能安其體魄于地下豈不干和氣召災異乎時有鄧若水者亦上言曰行大義然後可以弭大謗收大權然後可以固大位除大姦然後可以息大難寧宗皇帝晏駕濟王當繼大位也廢黜不聞於先帝過失不聞于臣民彌遠不利其立矯先帝之命棄逐濟王并弒皇孫曾未半年竟殞于湖揆以春秋之法非弒乎非篡乎天下皆歸罪彌遠而不敢歸過于陛下者何也倉卒之間非陛下所得知亦諒陛下必無是心也今已踰年矣而乾剛不決威斷不行無以大慰天下之望昔之信陛下者今或疑其有昔之謂不知者今或疑其知陛下何忍以青天白日而受此污辱乎此臣所謂行大義以弭大謗者也録曰濟王之冤若水訟之可也彌鞏以弟而訟兄可乎有宋盛時吕端至銷繼恩而立真宗當是時也豈不忌太子英明如史新恩之慮乎然而卒不能易者金匱之盟未寒玉葉之分匪遠人不得以遠間親新間舊也理宗之世有五國城之釁于前有十世孫之嫌于後天下之事譬之傳舍寓處者不以為恩居停者翻以為福祇為權姦靡漫而已而公義直道未可謂秦無人然而卒不能有所救藥者彼方以攘臂為得援立為恩何暇徐行後長而為泰伯季子之事乎則亦無怪乎其然也已矣曹友聞友諒武惠王十二世孫也兄弟俱有大志尋師取友不遠千里登寶慶二年進士辟天水軍教授天水被圍友聞與守臣張維䋅民厲戰兵退制置使旌之自是弟友諒及萬各以武略知名檄守仙人關又捍七方關元兵入大安統制何進敗死友聞與萬各率所部間道斬其將檄知天水軍復與友諒往來督戰有功换武翼大夫御前都統制時趙彥呐進屯青野原元人圍之友聞曰青野為蜀咽喉不可緩遺萬領兵夜半截戰遂解其圍授武德大夫驍騎大將軍萬四川制置司帳前總管明年元太子闊端合蕃漢軍五十餘萬將至友聞曰國家安危在此一舉衆寡不敵豈容浪戰唯當乘高據險出奇設伏以待之制置使趙彥呐檄友聞控制大安以保蜀口友聞以為不可彥呐不從乃遣萬友諒引兵上雞冠隘多張旗幟示敵堅守友聞選精鋭密往流溪設伏約曰敵至以鳴鼓舉火為應元兵果至萬出逆戰友聞遣統制楊大全擊後隊總管夏用擊中隊吕嗣德擊前隊友聞親帥精兵三千疾馳至隘下會大風雨西軍素以綿代鐵甲經雨濡濕不能舉元兵益以鐵騎四面圍繞友聞嘆曰此殆天乎吾有死而已於是極口詬罵殺所乘馬以示必死血戰愈厲與弟並全軍盡沒元兵遂長驅入蜀秦鞏人汪世顯素服友聞威望常以名馬遺之師還過戰地嘆曰蜀將軍真男兒漢也録曰宋事至此雖有智者莫能為矣向也自似道之開邉釁也元人固嘗躪階成而擾興沔穿金房以𣊟襄樊矣尚賴仙源有以議後而蜀道得以安全當是之時猶未以航海為意也及乎友聞既死全蜀長驅長江之險虜得其勝順流直搗何所恃哉是故不至于天涯海角不已也惟不能見幾于始故無以自善於終然則人君豈可不以姦邪誤國為戒乎此曹氏兄弟上不愧武惠下無忝所生死有重于泰山關于宗社不可以常戰目之也元王元伯與兄宣伯四世不異釁家人百餘口無間言宣伯卒家事付姪軌軌辭曰叔父行也宜主元伯曰姪宗子也相讓既久卒以付軌縉紳之家自謂不如諸婦亦各聚一室為女工畢斂貯一庫室無私藏至幼稚亦相與共乳一婦值歸寧留其子衆婦不問孰為己兒兒亦不知孰為己母也録曰吏書江州陳氏有犬百餘共一牢食一犬不至諸犬亦不食此未必然今故削之然則幼稚啼泣諸母見者即為抱哺自是實事也録之闕里志孔誴宇崇伯宣聖五十七代孫父希鳳母王氏生六子誴其長也次評𧪚論謹診諒撫愛之尤篤平居一飯必共案出入必聯轡弗至則停筋立馬以俟無倦容親朋至者命酌呼諸弟以次酬勸講論典墳賡唱詩句亹亹數百言可聼可愛諸弟薰而良善者多族長屢以朂其族人曰若等能如崇伯昆弟者亦足矣鄒魯士大夫之談者咸以為孔氏良子弟及卒相與為位哭之私諡曰敦友録曰孔子曰朋友切切愢愢兄弟怡怡義之所裁各有攸宜若敦友者可謂能念爾祖者矣此録之終也弘道録卷之二十四
