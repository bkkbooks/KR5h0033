body:
  text: 禮父子之禮晋史文帝崩國内服三日武帝亦遵漢魏之典既葬除喪然猶深衣素冠降席撒膳太宰司馬孚等奏曰臣聞禮典軌度豐殺隨時虞夏商周咸不相襲大晋紹承漢魏有革有因期於足以興化而已故未得皆返太素同規上古也陛下既已俯遵漢魏降喪之典以濟時務而躬踴大孝情過乎哀雖武丁行之於殷世曾閔履之於布衣未足以踰方今荆蠻未夷庶政未入萬機事殷動勞神慮臣等以爲陛下宜勑御府易服内者改造大官復膳如舊制詔曰每感念幽冥而不得終苴絰於草土以存此痛况當食稻衣錦誠詭然激切其心非所以相解也朕本諸虛家傳禮來久何止一旦便易此情於所天相從已多可試省孔子答宰我之言無事紛紶也言及悲殺奈何奈何孚等重奏今者干戈未戢武事未偃萬機至重天下至衆陛下以萬乘之尊履布衣之禮服麄席稾水飮蔬食殷憂内盈毁悴外表然而躬勤萬機坐以待旦降心接下反不遑食所以勞力者如斯之甚是以臣等悚息不寧誠懼神氣用損以疚大事惟陛下察納愚欵以慰皇太后之心又詔曰重覽奏議益以悲剥不能自勝三年之喪自古逹禮誠聖人稱情立哀明恕而行也神靈日遠無所訊告雖薄於情食㫖服美所不堪也不宜反覆重傷其心言用斷絶帝遂以此禮終三年録曰按文帝之喪國内服三日者未襌代之典也武帝亦遵漢魏既塟除喪者已襌代之制也然而不過深衣素冠降席撤膳則帝所存者亦如心喪耳初未嘗斬哀三年也而孚等何惓惓若是乎蓋方是時清議不行縱酒昏酣輕蔑禮法親死不悲一旦有如帝者悲哀之情痛戚之意雖未純乎古禮已足以傾駭國之觀瞻矣又曰孔子抑宰子之問盖禮莫大於朝廷莫重於襌代晋之喪雖未除魏之襌則已受其玄衮赤舄之輝煌聲名文物之布置鐘皷玉帛之交錯雖欲弗用誰其舍之必欲如晋武者恪共臣節誓死無二然後避居倚廬麄衣藁食敦曾閔之風薄宰子之行夫誰得而奪之不然以承運嗣興之初詭乏食稻衣錦之事吾誰欺欺天乎中軍將軍羊祜謂傅玄曰三年之喪雖貴遂服禮也今主上至孝雖奪其服實行喪禮若因此復先王之法不亦善乎玄曰以日易月已數百年一旦復古難行也祜曰不能使天下如禮且使主上遂服不猶乎愈玄曰主上不除而天下除之此爲但有父子無復君臣也乃止録曰中領軍之言其千載之一機乎時魏已革故晋方鼎新稽康阮籍之風不可聞於末季而况於新國乎使以是議聞於武帝將必聼從著爲定制列於禮官通於天下雖未能盡復先王之舊必不至於流俗之獘也惜乎傅玄之慮無以及此遂至王何錮俗江左承流非惟不能行三年之喪且以期功不廢絲竹此則諸臣不得以辭其責也泰治四年三月晋太后王氏殂晋主居喪一遵古禮既塟有司請除衰服詔曰受終身之愛而無數年之報清所不忍也有司固請詔曰患在不能篤孝勿以毁傷爲憂前代禮典質文不同何必限以近制使逹喪闕然乎群臣請不已乃許之然猶素服以終三年録曰后王肅之女也誦詩論語尤善喪禮故武帝云朕本諸生家傳禮來久何止一旦則帝之所習聞遠矣與竇后景帝崇尚黃老而薄儒行者可以同日語乎魏史太和十四年九月太后馮氏殂魏主勺飲不入口者五日哀毁過禮中部曹華陰楊椿諫曰聖人之禮毁不滅性縱陛下欲自賢於萬代其若宗廟何帝感其言爲之進一粥録曰帝之哀毀實天性使然非有勉强矯𩛙於其間也以爲欲自賢於萬代者非是於是王公表請時定兆域詔曰奉侍梓宫猶希髣髴山陵遷厝所未忍聞十月王公固請乃塟永固陵録曰諸侯五月而葬既塟居倚廬於中門之外魏文之言雖未達禮之通㫖而已暗合禮之遺意也迫於累表惜哉太尉丕等進曰臣等老朽歷奉累聖國家舊事頗所知聞願抑至清奉行舊典魏主曰祖宗精專武略未脩文教朕今仰稟聖訓庶習古道論時比事又與先世不同録曰此即夫有所受之之意國家舉措動輙不能如意者專以此等議論也苟非豪傑之主孰能不惑哉魏主又曰朕惟中代所以不遂三年之喪蓋由君上違世繼主初立君德未流臣意不淪故身襲衮冕行即位之禮朕誠不德在位過紀足令億兆知有君矣於此之日而不遂哀慕之心使情禮俱失豈不深可恨耶朕所以眷戀衰絰不從所請者實情不能忍豈徒苟免唾嫌而已録曰此尤可見逹於人情明於大體非草草率意競情者比雖古之英君何以過之群臣又言春秋烝嘗事難廢闕魏主曰先朝恒以有司行事朕蒙慈訓始親致敬今昊天降罰人神喪恃想宗廟之靈亦輟歆祀脫行薦饗恐乖冥㫖且平時公卿每稱四海晏安禮樂日新可以參美唐虞今乃欲苦奪朕志使不踰於魏晋何耶録曰三年之喪人子大閑不可追而悔也四時之禮國家常事可以補而及也帝可謂不惑於緩急者矣祕書丞李彪又曰今雖治安然江南未賓漠北不臣臣等猶懷不虞之累耳魏主曰魯公帶絰從戎晋侯墨衰敗敵固聖賢所許如有不虞雖越紼無嫌而况衰麻乎豈可以晏安之辰豫念軍旅之事以廢喪紀哉録曰後世以金革之例行於無事之時雖儒者不能免豈非魏文之罪人歟太尉丕等又口魏家改事尤諱之後三月必迎神於西禳惡於北具行吉禮魏主曰若能以道事神不迎自至苟失仁義雖迎不來此乃平日所不當行况居喪乎録曰此帝所以斷然能用夏變夷也諸臣得無愧哉得無愧哉又問尚書游明根高閭等曰聖人制卒哭之禮授服之變皆奪清以漸今旬日之間言及即吉能無傷乎對曰踰月而葬葬而即吉此金册遺㫖也主曰金册之㫖群公之請所以然者慮廢政事故耳朕今不敢闇默不言以荒庶政惟欲衰麻廢吉禮朔望盡哀若不許朕則當除衰拱黙委政冢宰二事之中唯公卿所擇明根曰淵默不言則大政將曠傾順聖心請從衰服録曰魏之金册即漢之遺詔也册稱月而葬葬而即吉即詔以日易月之文也然而或行或否者特以至性不同故事事各異耳魏文幼承洪緒早著叡聖之風不由明師之傅賢傅之習而能慕人倫之高跡行曠古之遺行觀其屢問屢答之詞足以盡破群臣百官之惑如此則何喪禮之不可行哉惜乎馮后威非一朝之積殃有由來之漸有孫如此其忍負之而反鴆其父耶愚竊怪帝之英達明敏不能燭父之奸蓋魏方懲崔浩之禍專以隱覆爲容既無董狐之書終鮮耳提之命至通鑑始考天象㣲露其詞綱目直書其事嗟乎已無及矣是以有國有家者不患隱而患不知不患㣲而患不眀其不恤顧忌幽艱畢逹蓋爲是也遂使恩非所恩厚非所厚上下數千百年祗此一時一事而遭遇若此豈非達禮之至恨至恨者哉太和十五年九月魏主祥祭于廟有司上言卜日詔曰筮日求吉既乖敬事之志又違永慕之心今直用晦前一日夜宿于廟帥群臣哭己易服縞冠革帶黑履侍臣易服黑介幘白絹單衣革帶鳥履遂哭盡一夜明日易祭服縞冠素紕白布深衣繩履侍臣去幘易幍既祭出廟立哭久之乃還十一月禫祭始服衮冕冬至祀圜丘遂祀明堂臨太華殿服通天冠絳紗袍以饗群臣樂縣而不作帥百官奉神主遷于新廟録曰按十四年庚午九月魏太后馮氏殂十五年辛未九月魏主祥祭于廟十一月魏主禫祭遂服衮冕遷新主于廟然則凡十五月而已非古禮中月而禫二十七月之制也後周高祖建德三年三月周太后叱奴氏殂周主居倚廬朝夕進一溢米衞玉直譛齊王憲言其飲酒食肉周主曰吾與齊王異生俱非正嫡特以吾故同袒括髮汝當愧之汝親太后子特承慈愛但當自勉無論他人及塟周主跣行至陵所詔曰三年之喪逹於天子但軍國務重須自聼朝衰麻之節苦廬之禮率遵前典以申罔極百僚宜依遺令既塟而除公卿固請依權制不許卒申三年之制五服之内亦令依禮録曰胡氏曰周高祖衰麻苦塊卒三年之制最爲賢行然推明通喪止於五服之内不及群臣非所以告天下著於天下之義也愚意不然夫所以紛紛不一議論聚訟者正以欲率天下之人共爲三年之喪也夫人心不同親踈各異子生三年然後免於父母之懷與天無二日民無二王其義自不同也必欲溥天率土奔走悲號如喪考妣非上古堯舜若漢文帝宋仁宗未有如此者矧於母后之私親乎此周高祖不廢詞不責備求以自盡其哀而已君子未可以輕議之也若乃遊幸興師之事愚無取焉唐史貞觀四年突厥頡利可汗至長安太宗御順天樓盛陳文物引見館於太僕厚廩食之上皇聞擒頡利嘆曰高祖圍白登不能報今我子能滅突厥吾付託得人復何憂哉乃召上與貴臣十餘人及諸王妃主置酒凌煙閣酒酣上皇自彈琵琶上起舞公卿迭起爲壽逮夜而罷録曰上皇以能滅突厥爲付託得人何其無人心哉孔子曰以直報怨以德報德是故突厥士馬嘗資其力其始也盖腹心之托指臂之援也一旦恃中國之强空漠南之地君臣父子之間自以爲永無外患而不知蕭墻之内其患反深於戎狄也使上皇念其舊恩諭帝以興滅繼絶盍亦還其故土反其旄倪如孟子置君而後去之則夷夏之冠履既分大唐之恩威懋著天之祚唐當不如是也不知此義一旋踵間子孫亦頗凶殘若將報施之間耳然則上皇今日之喜能不爲君子異日之嘆乎七年十二月帝從上皇置酒故未央宫上皇命突厥頡利可汁起舞又命南蠻酋長馮智戴詠詩既而笑曰胡越一家自古未有也帝奉觴上壽曰今四夷入臣皆陛下教誨非臣智力所及昔漢高祖亦從太上皇置酒此宫妄自矜大臣所不取也上皇大悅殿上皆呼萬歲録曰太宗以漢祖爲妄自矜大其然乎夫突厥上皇嘗服事之其分懸絶者矣今而胡越一家蓋不但反臣其所事帝之矜大又何如哉帝嘗以子路負米不及爲恨何至假胡越以爲樂乎詩有之儐爾籩豆飲酒之孺必如是而後可盡天倫之樂否則皆矜大之事也宋史仁宗天聖七年章獻太后將以冬至受朝天子率百官上壽范仲淹爲祕閣校理上䟽切諫曰奉親于内自有家人禮顧與百官同列南面而朝之不可爲後世法及宸妃李氏薨吕夷簡爲首相奏禮宜從厚臣待罪宰相事無内外皆當預聞請發哀成服備宫仗葬之有詔鑿宫城垣以出長夷簡言鑿垣非禮喪宜自西華門出宸妃誕育聖躬而喪不成禮異日必有受其罪者莫謂夷簡今曰不言也後太后崩荆王元儼爲帝言陛下宸妃所生妃死以非命帝始知爲宸妃子因號慟累日下詔自責追謚曰莊懿幸洪福寺祭告易梓宫親啓視之妃歛以水銀故玉色如生冠服如皇后帝歎曰人言其可信哉待劉氏加厚録曰先正有言自章獻臨朝十餘年間天下晏然夷簡之力爲多又曰仲淹論上壽之儀雖晏殊有所不曉其故何也盖保護之功人所難言而掬育之恩昊天罔極故夷簡極言禮宜隆重所以默定其始也若方仲兮請立七廟謁太廟欲被衮冕漸不可長故仲淹極諌禮宜從殺所以預謹其終也設使二公如在英宗之時必有任濮廟之議者而聚訟之事或可免矣以爲其力居多其論難曉者或在于此英宗治平二年詔議崇奉濮安懿王典禮知諫院司馬光以帝必將追隆所生嘗因奏事言漢宣帝爲孝昭後終不追尊衛太子史皇孫光武上繼元帝亦不追尊距鹿南頓君此萬世法也既而韓琦等奏請下詔禮官與待制以上議翰林學士王珪等莫敢先發司馬光奮筆曰爲人後者爲之子不得顧私親王宜準封贈期親尊屬故事稱爲皇伯高官大國極其尊榮衆以爲然珪即命吏具以光手藁爲案而上奏曰先王制禮尊無二上若恭愛之心分於彼則不得專於此是以秦漢以來帝王有自旁支入承大統者或推尊其父母以爲帝后者皆見非當時取譏後世臣等不敢引以爲聖朝法凡前代入繼者多宫車晏駕之後援立之策或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重祗承天地之意於宗室衆多之中簡推聖明授以大業陛下親爲先帝之子然後繼統承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕富有四海子子孫孫萬世相承皆先帝德也臣等竊以濮王宜凖先朝封贈期親尊屬以高官大國譙國襄國仙逰並封太夫人放之古今爲宜稱奏王珪等所議未見詳定濮王當稱何親名與不濮王於仁宗爲兄於皇帝宜稱皇伯而不名參知政事歐陽脩引喪服大記以爲爲人後者爲其父母服降三年爲期而不没父母之名以見服可降而名不可没也若本生之親改稱皇伯歷敬前世皆無典據進封大國則又禮無加爵之道請下尚書集三省御史臺議奏既而太后手詔尊濮王禮爲濮安懿皇稱親譙國夫人王氏襄國夫人韓氏仙遊縣君任氏並稱后録曰孟懿子嘗問孝孔子告以無違於禮滕文公問喪孟子告以自盡其哀聖賢之言本之人心而易見原之天理而易明不爲分别太著之詞不立矯世異俗之論故聼之者不見其忿戾而難從由之者不覺其阻忤而難入此其所以著之簡册萬世而無弊也若宋之濮議所以聚訟於當時貽禍於後世者誠以諸賢著論太分矯枉過正不能如聖賢含弘光大渾厚而不露也自今觀之司馬光王珪之言正矣然喪服大紀之云不爲無㩀不没父母之名不爲無與而改稱皇伯之號無徵不信不信難遽從也歐陽脩韓琦之言得矣然萬代帝王之統誠不可忽本宗百世之傳誠不可貳而爲人後者不得顧私親灼然可信可信難遽改也甲是乙非彼可此不故其要在於自盡其心而已茍使英宗上思藝祖萬世不㧞之基直接堯舜以來相傳之統昨所守者一人一事今所主者萬國九州是知天子者莫大之尊雖欲顧其私親不可得也次思仁宗㧞之衆庶之中置之億兆之上昔所從者温清定省今所事者郊廟社稷是知一身者萬幾之本雖欲切切懷其顧復亦不可得也今帝之本心未明所言窒礙爾以爲光有天下先帝之德彼以爲倫序當立應得之分爾以爲高官大爵極其尊榮彼以爲親以子貴宜從極典是故天性之親顧復之恩無俟人言而援立之策繼統之義感而懷之則有餘爭而論之則不足及其終也愈爭而愈窮愈改而愈失誠千古不决之義未定之疑由不能師法大聖大賢以正人心故也而今豈可及哉孝宗即位尊高宗爲太上皇帝后爲太上皇后同居德壽宫至日孝宗服袍履步出祥羲門冒雨掖輦以行及官門弗止太上皇麾謝再三仍令左右扶掖以還既而顧侍臣謂曰今付託得人吾無憾矣録曰夫所謂付託得人者盖上而宗廟社稷下而土地人民不但繼志述事而已唐之太宗曰雪耻酬百王除㓙報千古斯義也其當時負託之重乎孝宗果能銳意恢復倚張浚如長城料敵勢非秦檜奮然以金爲無禮和爲非計信乎得其人矣惜乎卧薪徒切嘗膽難終符離之敗奪於前思退之奸沮於後雖有發强之心而無興復之效君子所以嘆成功之難得也隆興元年春正月壬辰朔帝受朝於文德殿遂朝太上皇及太上皇后於德壽宫自是歲以爲常乾道七年太上皇壽七十上二聖尊號曰光堯壽聖憲天體道太上皇帝壽聖明慈太上皇后淳熙十二年太上皇壽增八十加上二聖尊號曰光堯壽聖憲天體道性仁誠德經武緯文太上皇帝壽聖齊明廣慈太上皇后行大慶禮大赦其餘每歳從幸聚景園玉津國四聖觀不一而足極其崇奉焉永新劉氏曰孝宗之奉高宗考諸史册其文與情兼至始與終無惓可謂子道無虧矣或謂孝宗以旁支入繼大統於其所後者貽己以不資之業而傳之無窮感當奚如焉感所以能孝也慮其所後者以我爲不親而勉以承之焉勉所以能孝也前者英宗之爲人後未盡其道君子病之令豈無懲焉懲所以能孝也非其心出於自然也噫是何言歟君子之取人也取其歸於善而已如以其善爲有所感而不爲之尚也則將取其無所感而不爲善者乎如以其善爲有所勉而不爲之尚也則將取其無所勉而不爲善者乎如以其善爲有所懲而不爲之尚也則將取其無所懲而不爲善者乎率天下之人而群然於不善者必此之言矣録曰愚觀高孝二朝天倫之樂達於終始盖自隆與乾道以至於淳熙中間二十有五年不但尊尊親親父父子子一人承順而已而且得萬國之歡心想其與章文物之盛揖讓進退之儀爲何如也亦不但身爲太上子爲天子至尊無對而已而且獲八十之上壽想其駝顔鶴髮之隆鍾黃耈台背之鄭重又何如也自堯舜禹揖遜之後果見有若人否乎意者高宗之襌受出於至公無我之心故天之報利極其壽考福禄之盛孝宗之盛德出於尋常萬萬之上故禮之降重非比常人窺測之心以爲感而能孝勉而能孝懲而能孝者非迂即忌嗚呼此紛紛禍亂後世莫能免夫太上皇帝崩帝號慟擗踊踰二日不進膳謂王淮等曰昔晋孝武魏孝文實行三年喪何妨聽政淮對曰晋武雖有此意後來宫中止用深衣練冠帝曰當時群臣不能將順耳自我作古何害淮曰御殿之時人主衰絰群臣吉服可乎帝曰自有降等乃出内批曰大行太上皇帝奄棄至養朕當衰服三年群臣自遵易月之令百官五上表請帝還内聼政不許二月辛丑禫祭百官釋服群臣三上表請御殿聼政不許十一月戊戍朔帝詣德壽宫自是朔望皆如之帝始以素服視事于延和殿詣德壽宫則衰絰而杖如初十五年春正月丁酉朔帝詣德壽宫几筵行禮夏四月附高宗主于太廟詔曰朕比下令欲衰絰三年群臣屢請御殿易服故以布素視事内殿雖詔俟過祔廟勉從所請然稽諸典禮心實未安行之終制乃爲近古宜體至意勿得有請宰臣留正曰三年之喪天下通喪漢文始變古道景帝不師典禮後世遵之喪紀遂廢晋武欲申私慕竟奪於斐秀傅玄之說元魏孝文能依古制猶未盡合於亮陰遏密之禮其餘無足議也以日易月之論發於應劭陋儒習之其後遂斷爲二十七日之制先王之禮既己大壞雖有明智之君賢哲之輔憚於更張因循相襲良可嘆已壽皇慕親之孝根於天性事亡之敬發於至誠雖聖躬以不毁之年群臣屢致易服之請而睿志先定繼然不疑山陵已事退奉几筵衰絰三年以終喪制千載以來一人而已録曰此孝宗篤於大統之誼蓋不以一毫私親間易其心故史臣賛之以爲帝之所謂孝其無愧焉愚嘗考之紹興十三年秀王常喪矣命觧官行服此未即位之先也乾道三年秀王夫人張氏又喪矣成服于後苑此已即位之後也然則未嘗更易其名而以爲伯至於理宗追尊其本生父希瓐以爲榮王妻全氏爲國夫人以其子與芮襲封奉祀此又未嘗加以尊號而爲帝者彼濮議者本朝尚不依以爲定况後世乎徒以群英聚訟人各自賢固不若道學大明人心反正之爲上也觀者不可不知元史廉希憲至元初官中書平章政事丁母憂率親族行古喪禮勺水不入口者三日慟則嘔血不能起寢卧草土廬于墓傍宰執以憂制未定欲極力起之相與詣所廬之地聞號痛聲不絶竟不忍言録曰元乃夷之風也金革之例不當爲然矧喪制尚未定乎而能悉心古禮一意終喪盖情可奪而夷不可以不變也夫孝可通于神明有不能感於僚友乎哉若乃未學軍旅之事而甘心金革之例此又希憲之罪人也國朝胡居仁自幼至孝父病劇爲嘗糞苦甜時喪禮久廢獨毅然行之初則水漿不入口哭踊每絶方蘇久則柴毁骨立非杖不能起三年不入寢室襄事之儀并祠堂月朔之薦四時之祭悉遵古禮識者知其特立獨行而不識者每非笑之然縉紳間知先生實自兹始推其意雖在屋漏之中夫妻相對如賓一楎椸篋笥區别精嚴没齒不相淆亂事兄盡友外歸每迓於門有疾躬調藥篤宗族訓子姪無倦應接賓客深衣巾履終日儼然而性度寬和談論亹亹人亦徃徃樂從之録曰曾子曰誠于中形于外故君子必愼其獨有如胡之主敬而不篤于親親者乎以爲知先生必自兹始蓋亦惟知其粗者也弘道録卷之三十二
