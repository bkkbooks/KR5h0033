body:
  text: 義夫婦之義萬章問曰詩云娶妻如之何必告父母信斯言也宜莫如舜舜之不告而娶何也孟子曰告則不得娶男女居室人之大倫也如告則廢人之大倫以懟父母是以不告也萬章曰舜之不告而娶則吾既得聞命矣帝之妻舜而不告何也曰帝亦知告焉則不得妻也録曰魯莊公即位二十有二年壽三十六也而始聘於齊豈非告則不得娶乎苟有明王在上誅文薑之不慈正莊公之不孝則既免於任之樓犖之牽亦不至如般之弱閔之幼而子牙慶父之姧可以無作矣奈之何桓方𩛙伯血盟未載不思無後之為大顧憧憧於達難之間其視妻而不告者又何如哉必合而觀然後知二聖不告之為義而孟子行權之為太禮記夫昏禮萬世之始也娶於異姓所以附遠厚别也幣必誠辭無不腆告之以直信信事人也信婦德也一與之齊終身不改故夫死不嫁録曰以記禮次之者大聖權也大禮經也未合禮而正經猶今能立而言權於是有娶於同姓而謂之吳孟子者有悖於直信而涕出女吳者有忽於辭腆而鼠牙是競者有背於偕老而鶉鵲不若者皆萬世之罪人也詩后妃以君子不在而思念之曰采采卷耳不盈頃筐嗟我懷人置彼周行陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷陟彼高岡我馬玄黃我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣録曰或以此為羑里拘幽之日而作其知道者乎夫以紂之政誠酷烈矣然臣罪當誅之心文王未之改也后妃內切憂懼之意外共服事之德不置彼於周行乎其托言於酒非真解憂也豈其崇侯之譛方盛而閎夭之謀未行歟卒之無可奈何而付之於浩嘆則后妃者獨不可謂之至德耶南國被文王之化諸侯大夫行役於外其妻獨居感時物之變而思其君子曰喓喓草蟲躍躍阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則説陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷録曰注以此詩若周南之卷耳者蓋紂在上西伯在下諸侯雖有被化之私而實從公家之役其憂固不能自已也况夫逋逃之藪刑人如不克者乎及夫既見而悅則公私之情上下之分兩得之矣此所以為召南之化也若徒以執手之愛契闊之情其憂其樂所關微矣衛之婦人以其君子行役於外而思念之曰雄雉於飛泄泄其羽我之懷矣自詒伊阻雄雉於飛下上其音展矣君子實勞我心瞻彼日月悠悠我思道之云遠曷云能來百爾君子不知德行不忮不求何用不臧録曰是詩之義雖在聖門仲由以下而能知之者鮮矣夫爾我相形而後忮心生焉有無相判而後求心生焉及其至也子之於親以婦見誅忮莫甚矣婦之於翁以美見納貪莫甚矣衛之為國不啻其淪喪也然而猶存康叔之祀者徒以匹夫匹婦尚知禮義此可見天理民彝途人堯舜均稟一致而先王陳詩之道夫子刪述之功豈小補歟婦人為夫所棄作詩曰習習谷風以陰以雨黽勉同心不宜有怒采葑采菲無以下體德音莫違及爾同死行道遲遲中心有違不遠伊邇薄送我畿誰謂茶苦其甘如薺宴爾新昏如兄如弟涇以渭濁湜湜其址宴爾新昏不我屑以母逝我梁母發我笥我躬不閲遑恤我後就其深矣方之舟之就其淺矣泳之遊之何有何亡黽勉求之凡民有喪匍匐救之不我能慉反以我為讎既阻我德賈用不售昔育恐育鞠及爾顚覆既生既育比豫於毒我有旨蓄亦以御冬宴爾新昏以我御窮有洸有潰既詒我肄不念昔者伊余來塈録曰愚觀棄婦之詞古人以比忠臣孝子其款誠之委曲措詞之從容非真有是事也何也蓋闈門之中恩常掩義自非負販轉徙之徒孰有輕棄其妻者乎且以七出有條三不去有律庶人無停娶之理亦不容宴樂其新昏也矧於被棄之時心志悖戾言語不倫既乏代筆之工終鮮學問之益谷風婦人何自而能是哉豈以衛之賢者處亂國事暗君其曰黽勉莫違者腹心之誼也曰匍匐恐鞠者手足之情也曰葑菲蓍蓄者器使之恩也曰涇濁渭清者反己之德也然而新進者方效用矣則不得不禮薄如不遠伊邇也不得不刑戮如有洸有潰也若乃君子之心則豈處其薄乎亦惟曰我躬不閲遑恤我後而已是詩也有悠然不迫之風有奮然感動之意有怨而不怒之則有去而復顧之情孰謂一婦人而能若是哉凡孤臣孽子讀是不廢詩而嘆者幾希矣鄭風述賢夫婦相警戒之詞曰女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳧與鴈弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好録曰士與女一家之存亡也琴與瑟一人之理亂也一家之存亡係於雞嗚昧旦夫苟淫蕩放逸則生不殖生不殖家必難矣一人之理亂係於執手偕老夫荀二三其德則室不宜室不宜愛且離矣此安靜和好所關甚大而有洸有潰家道之所以無成歟知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之録曰夫投我以桃報之以李者報施之常也投我以木瓜報之以瓊瑶者篤厚之至也故曰匪報也永以為好也然則知子之來而雜佩以問者其於報施又何如哉鄭以淫蕩忘返若靜女溱洧諸篇所樂者城之隅洧之外耳所贈者彤之管芍之藥耳固不可責其親賢友善而門內之職併已亡之矣此雖錚錚之金靡靡之雅而緇衣之感亦安可誣哉齊賢妃御於君所至於將旦之時必告君曰雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲東方明矣朝既昌矣匪東方則明月出之光蟲飛薨薨甘與子同夢會且歸矣無庶豫子憎録曰愚觀是詩義明詞順蓋古者宫壼之中不但閨門淑女如傅姆師氏莫不有警戒之道諷誦之詞焉故其詩曰雞既明矣會朝之人既已盈矣欲令君早超而視朝也而君方以為匪雞則嗚乃蒼蠅之聲乎又曰東方明矣會朝之人既已昌矣欲令君早超而視朝也而君方以為匪東方則明月出之光至於蟲飛薨薨旦以分矣尚未見其超而視朝也則我豈不欲與子同寢而夢哉但羣臣之會於朝者候君不出將散而歸矣無乃以我之故而併與子為憎乎此於上下措詞文順理直故常存之以備參考尚書大傳古者后夫人將侍君前息燭後舉燭至於房中釋朝服襲燕服然後入御於君雞鳴太師奏雞鳴於陛下然後夫人鳴佩玉於房中告去也然後應門擊柝告辟也然後少師奏質明於陛下然後夫人入庭立君出朝録曰如是則必無匪雞則嗚之愆亦遠於脫簪待罪之責矣録之外記周宣王嘗晏起薑后脫簪珥待罪於永巷使其傅母通言於王曰王樂色而忘德失禮而宴起亂之興自婢子始敢請罪王曰寡人不德實自生過非夫人之罪也自是勤於政事早朝晏罷卒成中興之名録曰夫齊薑姓周之世姻也故邑薑薑后皆出於齊而雞嗚之詩亦係於齊以其時考之蓋不相遠而義實相近豈即薑后之所陳故時稱賢妃傅母之所誦故别於大雅歟不然何庶子子憎方以為懼而顚倒裳衣顧以為常歟然不可考也春秋魯莊公元年冬十月王姬歸於齊二年秋七月齊王姬卒録曰此王姬也歸於齊則為夫人矣而曰卒王姬卒何也蓋是時天王之不君甚矣齊侯之淫德極矣文薑之忌憚蔑矣魯莊之掃耻盡矣夫鳥獸不可與同羣也哀哉乎王姬而與之敵體乎天王自同於鳥獸也而豈知匹婦之不可奪志哉甫於歸而即謝世僅及數月之期豈其屯難邅回不勝忸怩之心而薑氏乘剛淫逼矧當自竄之日有人心者不若是恝遂奄然而長逝耶易曰屯如邅如乘馬斑如女子貞不字王姬有焉然則鳥中之凰玞中之璧不得以齊襄之醜惡纍之也吾夫子表而出之所以遏淫欲存貞行以愧當時勸後世之意切與如但以我主而録之服而卒之抑末矣莊公四年三月紀伯姬卒六月乙五齊侯葬紀伯姬十有二年春王三月紀叔姬歸於酅二十有九年冬十有二月紀叔姬卒三十年八月癸亥葬紀叔姬胡傳曰莊公四年紀侯去國叔姬至此始歸於酅者紀侯方卒故叔姬至此然後歸爾歸者順詞以宗廟在酅歸奉其祀也魯為宗國婦人有來歸之義紀既亡矣不歸於魯所謂全節守義不以亡故而𧇊婦道者也魯人高其節恩禮有加焉是故其歸其卒其葬史册悉書夫子存而弗削為後世勸録曰理與勢天下之至敵也而亦至不敵也理之勝萬世而不移勢之勝一時而有間何也蓋心主理權主勢一國之權在人匹婦之志在己故以齊之勢紀可滅而姬之志不可滅君可虜而婦之殯不可虜聖人著之於經以見伏節守義之美而齊襄魯桓之惡不攻自見矣傳以為葬而示之恩其然豈其然乎傳齊侯弒魯君滅其婚姻之國而葬其文是猶加忍於人以手撫之也其説非是左傳魯桓公未昏於齊也齊侯欲以文薑妻鄭太子忽忽辭人問其故太子曰人各有耦齊大非吾耦也詩曰自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師香也民其謂我何遂辭諸鄭伯録曰愚觀鄭忽之事未嘗不嘆世衰道微霸者未作君不能保其臣而執劫於鄰國也父不能保其子而倚仗於強援也夫五霸之命無易樹子則何待於已親無以妾為妻則何必於更室若俱以辭婚而失國是又不待貴易交富易妻也奈之何紛紛以為病也然則忽者奈何孟子曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也所謂自求多福者如此忽處鄭莊之世三綱絶矣縱能自強於善猶懼其亡何况甘於交質狃於狄勝徒以婚齊為輕重哉或曰忽嘗先配後祖而今乃能辭婚何也蓋忽沾沾自喜之人也朱子譏其柔懦踈闊是已夫沾沾自喜者未必通無所見惟其怠情而不能操慮迂闊而不近事情是以甘為人下而不辭也詩人譏之曰狂童之狂也且豈其過歟列女傳衛宣夫人者齊侯之女也嫁於衛至城門而衛君死保母曰可以還矣女不聼遂入持三年之喪喪服畢其弟立請曰衛小國也不容二庖請願同庖夫人不許衛君使人訴於齊兄弟皆欲與君使人告女女終不聼録曰考諸禮曾子問有親迎女在途而父母死之文無至城門而君死之文君子謂未成婦疑無服也而持三年之喪不已過於厚乎若乃未成婦之女而請願同庖豈禮也歟君之弟禽獸之行也齊之俗淫靡之風也宜乎女之終不聼也魯寡陶嬰者魯門之女也少寡養幼孤無強昆弟紡績為産魯人或聞其義將求焉嬰聞之恐不得免作歌曰悲夫黃鵠之早寡兮七年不雙宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼哀哉兮死者不可忘飛鳥尚然兮况於貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得已遂不敢復求録曰愚觀黃鵠之歌其旨切其情哀有風人之義而無怨怒之詞是真能守禮義之俗雖使異類聞之寧不為之感動而况於人乎此妾婦之中正禮道之範圍而割鼻斷臂截髮割耳有所不得其正矣楚姬楚莊王夫人也莊王好獵姬諌不止乃不食禽獸之肉王改過勤於政事嘗聽朝罷晏姬曰何晏也得無飢倦乎王曰與賢者語不知飢倦也姬曰王之所謂賢者何也曰虞丘子也姬掩口而笑王曰姬笑何也對曰妾執巾櫛十餘年遣人求美人進於王今賢於妾者二人同列者七人妾豈不欲擅王之寵哉不能以私蔽公欲王多知人也今虞丘子相楚十餘年所薦非子弟則族昆未聞進賢退不肖是蔽君而羞賢路妾之所笑不亦可乎明日以告虞丘子避席不知所對於是避舍使人迎孫叔敖以為令尹治楚三年而莊王以霸樊姬之力也録曰姬之不食禽獸肉也可謂以身諫矣而藉以進賢則吾不知也夫叔敖之賢固非虞丘子之所知而樊姬之名則知者多矣豈因諌獵之事而遂以傅會哉然不可考矣高行者梁之寡婦也為人榮於色而美於行夫死不嫁梁貴人爭欲娶之不能梁王王聞之使相聘焉曰妾聞婦人之義一往而不改以全貞安可不顧名節自甘身而羞賤棄義而從利無以為人乃持刀自引以割其鼻曰妾己刑矣所以不死者不忍幼弱之重孤也於是相以報王王大其義高其行為復其身尊其號曰高行録曰古禮諸侯一娶九女二國媵之凡君無再娶之義恐其棄德嗜色故一娶而止尚可近失節之婦哉梁王驕姿不道固不足責而梁女書之於册觀者不責漢之無制相之無術而徒美婦之高行嗚呼婦行何高則王行何卑乎漢書班婕好者左曹越騎班况之女也賢才通辨成帝遊後宫嘗欲與同輦辭曰觀古圖畫賢聖之君皆有名臣左側三代之末主乃有女嬖今欲同輦得無似之乎上善其言而止太后聞而喜曰古有樊姬今有婕好每誦詩及窈窕淑女女師之篇必三復之進見容止輒依古禮其後趙飛燕有寵嬌妬譛訴云挾邪詛祝上考問婕好曰妾聞死生有命富貴在天修正尚未蒙福為邪欲以何望且使鬼神有知不受不臣之訴如其無知訴之何益故弗為也上善其對而憐憫之婕好恐久見危求供養皇太后於長信宫上許焉帝崩充奉園陵薨因葬園中録曰愚觀婕好之執義而嘆孟堅之寡識也夫妬寵怙勢婦人之常也明哲保身君子之獨也姦禍之與幸權譬如烈火故詩云燎之方楊又云誰能熱熱不可止遏引可親炙乎是故寧幽清靚密托長信之末流無寧薰耳塗目效永巷之罪首使固稍知此義枕經藉書紆體衡門上無所蒂下無所根豈非達者之高致哲士之盛節哉顧乃貪會合之計運朝夕之䇿戀戀於權勢之門濡體於危險之途此賓戲所陳之詞與班姬團扇之旨不可同日語也以固之博通古今為世良史人物之臧否出處之大節籌之何許而乃不如一女子哉然則不免於質之勝文君子不能不為之深惜也平帝王皇后者莽之女也婉淑有節行平帝即位莽秉政以女配帝歲餘帝崩後莽篡后年十八常稱疾不朝莽敬憚哀傷意欲嫁之令立國將軍成新公孫建世子襐飾將醫往問疾后大怒鞭笞旁侍御因發病不肯起莽遂不敢強也及漢兵誅莽燔燒未央宫后曰何面目以見漢家自投火而死録曰平后之拒父豈比於元后之責莽乎夫令妻壽母古今稱頌豈知亦有不然者歟漢之元后壽踰八十歷元成哀平四世為天下母饗國六十餘載群弟世權更持國柄是以釀醖保護以成其亂及至篡國滅劉代漢而後握璽以拒之噫抑晚矣固不若年少執節之為愈也東漢書光武中元元年甲申使司空告祠高廟曰高皇帝為群臣約非劉氏不王吕太后賊害趙王專主吕氏賴社稷之靈祿産伏誅天命幾墜危朝更安吕太后不宜配食高廟同祧至尊薄太后母德慈仁孝文皇帝賢明臨國子孫賴福延祚至今其上薄太后尊號曰高皇后配食地祗遷吕太后廟主於園四時上祭録曰愚觀吕薄之際而感理之吉凶消長係於時之進退存亡未嘗有毫忽之差也蓋后與帝俱起側微方其問關百戰求帝於藪澤之中彼一時也及帝擁戚姬親如意據臲𡰈之勢此亦一時也至於偃然稱制南面以臨天下此又一時也極其至也乃有人彘之怍焉有梟鴆之毒焉有滅宗之禍焉有易姓之謀焉槩以春秋之義所謂自絶於天不可得而禱也當時漢廷大臣未能堅守嚏血之盟矧責以春秋之義哉此義不明是以不傳之吕而篡之新宜乎帝之進薄而退吕也王霸少厲高節其妻亦美志行值玉莽篡棄絶交宦建武中徴至京不屈初與同郡令弧子伯為友後子伯至楚相子為郡功曹令之奉書於霸車馬服從雍容如也霸有子方耕於野聞賓至釋耒而歸見令狐子沮怍不能仰視父目之有愧容客去久卧不起妻怪而問故霸曰吾與子伯素不相若向見其子容服甚光舉措有適而我兒蓬髮歷齒未知禮則父子恩深不覺自失耳妻曰君修清節不顧榮祿今子伯之貴孰與君之高奈何忘宿志而慚兒女子乎霸崛起而笑曰有是哉遂共隱遁終身録曰觀人何以不於所勉而於所忽乎蓋貧賤之交人所難忘而彼此相形間亦難釋於此而小芥焉糟粳之義微矣甚矣霸妻之高識也無我無人無物情而况於世態乎必若而人自靳下堂初不在山之深林之密也鮑宣妻桓氏宇少君宣嘗就少君父學父奇其清苦故以女妻之裝送資賄甚盛宣不悅謂妻曰少君生富驕習美飾而吾實貧賤不敢當禮妻曰大人以先生修德守約故使賤妾侍執巾櫛既奉承君子惟命是從宣笑曰能如是是吾志也妻乃釋歸侍御併服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮纍提甕出汲修行婦道鄉邦稱之録曰柔曼之傾意非獨損志蓋亦有增過者焉相如才美琴心是務馬融儒者綘帳為樂吾見其貧賤而移富貴而淫也又焉能威武不屈乎故必有少君之行而後有子都之節安定皇甫規妻者善屬文能書規卒年盛而色美董卓聞其名娉以軿輜百乘馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳請辭甚酸愴卓使傅奴侍者悉拔刀圍之曰孤之威教欲令四海風靡何有不行於婦人乎妻乃立罵卓曰君羌胡之種毒害天下猶未之耶妾之先人清德奕世皇甫氏文武上才為漢忠臣君親非其趣使走吏乎敢欲行非禮於爾君夫人耶卓大怒乃引車庭中以其頭懸軌上鞭馳四交遂死車下後人稱頌圖畫其像號曰禮宗云録曰規與妻何如琰與雍乎規之耻不與黨妻之奮不失身媲美同義可無愧矣而雍顧懷董卓之恩終被收戮琰亦於曹操之坐叩首酸哀此其一全與否一生與死不可同年語也獻穆曹皇后操之中女也建女十九年進為夫人伏后弒立為皇后魏受禪遣使求璽綬后怒不與如此者數輩后乃呼使者入親數讓之以璽綬抵軒下因涕泣橫流曰天不祚爾左右莫能仰視魏景初元年薨合葬禪陵車服禮儀皆依漢制録曰春秋之時雍姬謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也然則父之所為如莽與操者尚可重父而輕夫耶觀於平獻二后之事則雍姬殺夫之罪仲母詒女之愆皆不可逭矣弘道録卷之二十一
