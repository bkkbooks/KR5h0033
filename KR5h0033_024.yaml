  text: 弘道録卷之三十一將八
  hash: sha256:4cf635856058c8f5a3d616a37f0aeb8f47eaea2859f922002e57bc3a1666b7d6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_024-001a, image: hfl/1074/1074-118.png}
body:
  text: 禮父子之禮虞書曰祗載見瞽瞍夔夔齋栗瞽瞍亦允若録曰漢高帝之時嘗賞家令矣以太公之迎擁篲也人皆曰父不得而子也又嘗幸新豐矣以太公之樂箕踞也人皆曰君不得而臣也而不知乃咸丘蒙之説也夫父子之分本於天地自然之敘先天地而立者也君臣之禮由於系屬維持之故後天地而生者也是故父子之分可該乎君臣之禮君臣之禮不可易乎父子之分彼以擁帚為敬者曾知所謂祗載見者乎以箕踞為樂者曾見所謂夔夔齊栗者乎所謂父不得而子者片言之間毫釐千里不可以不明辨也孟子曰孝子之至莫大乎尊親尊親之至莫大乎以天下養為天子父尊之至也以天下養養之至也録曰孟子曰孝子之至莫大乎尊親舜既為天子矣何不尊瞽瞍而以為帝也又曰為天子父尊之至也舜雖不尊瞽瞍為帝亦未聞稱堯而以為父也斯二者何居曰追王之禮至周始備似未可依舜以為據而皇伯之號自宋始有尤不當準濮以為法要之天敘天秩不可改也繼統承祧不可後也其所以不可後者立天下之大本也所以不可改者行天下之逹道也二者並立並行而自不相害不相悖也苟徒以尊親為重而不以統緒為尊是不知舜繼堯之大也徒以所後為重而奪其私親之恩是不知尊瞽瞍之至也其失在於不善觀為君者有父道之言遂以為真父而不可易而不知其不必真也亦不善觀為人後者為之子之言遂以為真子而不可改而不知其不必改也故皆有所不達也中庸曰舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之録曰或問曰舜未嘗尊瞽瞍也何以曰宗廟饗之也亦未嘗傳子也何以曰子孫保之也曰此大聖人之心人所不能窺度者也夫瞽瞍無與於帝之統者也尊之則未必能饗矣啇均未及於薦之天者也傳之則未必能保矣尊瞽瞍為天子之父尊之至也饗瞽瞍以天子之禮饗之至也故曰宗廟饗之也虞斯封於虞胡公封於陳大聖人之後封之至也故曰子孫保之也祭法曰夏后氏褅黃帝而郊鯀録曰劉氏注曰五帝官天下自虞以上祖功宗德當如鄭注之説三王家天下則鯀當為祖亦不當郊耳曰此愚所謂並立並行不害不悖者也夫有虞氏禘黃帝而郊嚳祖顓頊而宗堯此純乎統承之義蓋以官天下言也而為天子父瞽瞍之尊固自若也初未嘗併廢其所親也至於夏之郊鯀者禹立功本於孝而地平天成萬世永賴殷薦之上帝故不得不以鯀配蓋以家天下言也矧鯀之治水多歷年所有鯀而後有禹則今之東漸西被豈敢忘所自哉然而鯀之名亦自若也初未嘗推尊以為帝也此二帝三王之禮萬世施行而無弊者也高宗彤日越有雊雉祖已訓于王曰惟先格王正厥事惟天監下民典厥義鳴呼王司敬民罔非天胤典禮無豐于昵録曰按高宗以上祖丁傳南庚南庚傳陽甲乃祖丁之子自是歷盤更小辛小乙三傳皆祖丁之子兄終弟及惟高宗乃小乙之子繼立則祖己之訓有自也彤者繹而祭之名也向祭於宗而又祭於禰乃小乙也於是而有雊雉之異天所警於武丁至矣其曰罔非天胤即為人後者為之子之義也曰典禮無豐于昵即不得顧私親之義也夫高宗親承嫡嗣有父服惟陽甲盤更小辛在上一豐于昵即有變徵矧於後世可不思哉可不思哉禮文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問內堅之御者曰今日安否何如內堅曰安文王乃喜及日中又至亦如之及暮又至亦如之其有不安節則內堅以告文王文王色憂行不能正履王季復膳然後亦復初食上必在視寒暖之節食下問所膳命膳宰曰末有原應曰諾然後退武王帥而行之不敢有加焉録曰此常行之事而曰不敢有加焉者蓋人子之心無窮或至於太過則反不能及矣宋孝宗之事高宗父子處於一室既同寢聯榻復截竹為筒空其間置金彈一丸時復往來以通安否則近於兒女子之態文武之所不敢加焉者也淮南子曰周公之事文王也行無專制事無由己身若不勝衣言若不出口有奉持於文王洞洞屬屬然如弗勝如恐失之可能謂子矣録曰以公之擅制作而曰行無專制事無由己何也蓋禮樂者朝廷之事也己可得而專也志行者存殁之規也非己之可專也人惟三年無改而後萬世不易凡有一日之專則非終身之慕矣此家與國之異同人子所當知也孝經云昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭詩云我將我饗維羊維牛維天其祐之儀式刑文王之典日靖四方伊嘏文王既右饗之我其夙夜畏天之威于時保之程子曰萬物本乎天人本乎祖故冬至祭天而以祖配之以冬至氣之始也萬物成形於帝而人成形於父故季秋饗帝而以父配之以季秋成物之時也陳氏曰天即帝也郊而曰天所以尊之也故以后稷配焉后稷遠矣配稷于郊亦以尊稷也明堂而曰帝所以親之也以文王配焉文王親也配文王於明堂亦以親文王也尊尊而親親周道備矣然則郊者古禮而明堂者周制也周公以義起之也録曰愚觀明堂之饗不但崇以虛禮而必曰儀式刑文王之典此嚴父配天之實也天者尊而不可尚故曰庶其饗之不敢加一詞焉於文王則所以法之不一而足天不待贊法文王所以法天也末言畏天之威而不及文王者統於尊也畏天所以畏文王也天與文王一也後世明堂郊祀間亦能行而紛紛聚訟治效不古此則崇之以虛禮不若隆之以實事之為愈也又云敢問聖人之德又何以加于孝乎故親生之膝下以養父母曰嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也父子之道天性也君臣之義也父母生之續莫大焉君親臨之厚莫重焉故不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善而皆在於凶德雖得之君子不貴也君子則不然言思可道行思可樂德義可尊作事可法客止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德教而行其政令詩云淑人君子其儀不忒録曰此教敬教愛萬世人子之規範也夫嚴父配天莫大之典未易稱也文王在上於昭於天未易法也而不知生之膝下一體而分其分至嚴而未之或違也其道至高而莫之與間也能循循於言行政事容止進退之間而所以儀式刑者不外是矣詩不云乎紹庭上下陟降厥家有事於尊祖配夭者當以此為法顧命乙丑王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗丁卯命作册度越七日癸酉伯相命士須材狄設黻扆綴衣牖間南向敷重篾席黻純華玉仍几西序東嚮重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席玄紛純漆仍几越玉五重陳寶赤刀大訓弘璧琬琰在西序大玉夷玉天球河圖在東序㣧之舞衣大貝鼖鼓在西房兌之戈和之弓垂之竹矢在東房大輅在賓階面綴輅在阼階面先輅在左孰之前次輅在右孰之前二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階王麻冕黻裳由賓階隮卿士邦君麻冕蟻裳入即位太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賓階隮御王册命曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三吒上宗曰饗太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受同祭嚌宅授宗人同拜王答拜太保降收諸侯出朝門俟録曰此天王之即位天下萬世敦乎其禮夫子法之以作春秋也夫天王承天受命與諸侯何萬萬也而體元居正大一統正五始則諸侯至於天子一也故春秋書元年公即位其成康周召之遣法歟後世若漢武帝唐太宗知有顧命而不知虎賁于戈迎自南門示以臨君大寶之禮周勃狄仁傑知迎太子而不知作册度陳寶玉命以率循大卞之法至於宋太祖之崩宫人私侍皆不得聞而啓千萬古之疑又豈所以燮和天下之人也哉若乃納君拒父兄攝子逐往往稱于比戈納賂招賄較之斯禮何啻徑庭耶冠義凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而後禮義備以正君臣親父子和長幼君臣正父子親長幼和而後禮義立故冠而後服備服備而后容體正顏色齊辭令順故曰冠者禮之始也是故古者聖王重冠冠禮筮日筮賓所以敬冠事敬冠事所以重禮重禮所以為國本也故適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而宇之敬其名也是故古者重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事所以自卑而尊先祖也録曰子之於親日必三朝服必三年而親之於子冠必三加所以禮其子也故冠雖有異代士與諸侯同一阼也季武子請及兄弟之國而假備乃冠于衛成公之廟則非禮也以為敬大國之命則可以為嘉魯襄之成則不可也國語趙文子冠見欒武子武子曰美哉昔吾逮事莊主華則榮矣實之不知請務實乎見中行宣子曰美哉惜也吾老矣見范文子文子曰而今可以戒矣夫賢者寵至而益戒不足者為寵驕故興王賞諫臣逸王罰之見郤駒伯駒伯曰美哉然而壯不若老者多矣見韓獻子獻子曰戒之此謂成人成人在始與善始與善善進不善蔑由至矣始與不善不善進善亦蔑由至矣如草木之産也各以其物人之有冠猶宫室之有墻屋也糞除而已又何加焉見知武子武子曰吾子勉之夫成子道前志以佐先君道法而率以政可不謂文乎夫宣子盡諫於襄靈以諫取惡不憚死進也可不謂忠乎吾子勉之有宣子之忠而納之以成子之文事君不濟見若成叔子叔子曰抑年少而執官者衆吾安容子見溫季子季子曰誰之不如可以求之見張老而語之張老曰善矣從欒伯之言可以滋范叔之教可以大韓子之戒可以成物備矣志在子若無三卻亡人之言也何稱述焉知子之道善矣是先主覆露子也録曰愚觀晉諸大夫之言乃知當時之尚禮也夫冠者禮之始也矧文子幼而無父弱而未立所以責其為人子為人弟為人臣為人少者之禮尤與其他不同而驕侈縱泆勢所必至諸君子既能為之請以復其爵邑可謂協恭之義矣苟責善之言不聞忠順之行未備何以美於先子哉有欒范獻子黽勉於前有成季張老申重於後佳哉禮之範乎文子之有立非偶然矣春秋閔公二年夏五月乙酉吉褅于莊公僖公八年秋七月褅于太廟用致夫人録曰此春秋第一義也夫三代之治同歸而禮樂之用為急禮非自天造也非自地出也緣乎人情而已禘者從乎帝者也吉禘于莊公其義何居用致夫人其禮安在所謂奚取於三家之堂夫子之所貶深矣哀薑僣亂從諛以尊祀其夫然後僖公背義徇情以崇致其母君臣不以為非舉國莫知其是故夫子他日又曰是可忍也孰不可忍也斯言所由以發寧獨為季氏之八佾哉讀者必合而觀然後知聖心所存之深意而胡傳以致生者為義蓋不察于此也儀禮經傳孔子侍坐於哀公公曰寡人願有言孔子曰昔三代明王必敬妻子蓋有道焉妻也者親之主也敢不敬與子也者親之後也敢不敬與是故君子無不敬也敬身為大身也者親之枝也敢不敬與不敬其身是傷其親傷其親是傷其本傷其本枝從而亡身以及身子以及子妃以及妃君修此三者則大化愾乎天下矣録曰此一節言父敬其子之禮以下子敬其父之禮公曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不命而敬恭若是則可謂能敬其身能敬其身則能成其親矣公曰敢問何謂成親孔子對曰君子者人之成名也百姓歸之名謂之君子之子則是成其親為君子也是為成其親之名也已公曰敢問何謂成身孔子對曰夫其行已不過乎物謂之成身不過乎物合天道也公曰君子何貴乎天道也孔子對曰貴其不已也如日月東西相從而不已也是天道也不閉而能人是天道也無為而物成是天道也已成而明之是天道也公曰寡人蠢愚冥煩子志之心也孔子蹴然辟席而對曰仁人不過乎物孝子不過乎物是故仁人之事親也如事天事天如事親此謂孝子成身公曰寡人既聞此言也無如後罪何孔子對曰君之及此言是臣之福也録曰此極言其禮之至也夫雞初鳴咸盥漱者凡民之行也成身成名者君子之事也推而至於天道不已至誠無息蓋父子之道天道也天以至善加於父而後及於其子是父子之性即天性也君子盡性與天地參則盡父之道盡父之道天道不外是矣是真能事親如事天事天如事親二者一而二二而一也故既曰孝子又曰仁人如是而後為父子之禮之至而逼履著綦應唯敬對非所論矣又曰中庸論天道不已文王純於天道亦不已又曰不見而章不動而變無為而成其説皆本孔子對哀公之言而然此聖神功化之極至德淵微之妙宜乎哀公愚冥而自失聞言而勿罪也可嘆哉孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮録曰愚觀成周之制而有以窺見無違之旨也夫文王之為世子朝于王季日三武王率而行之不敢有加此生事之禮也父為大夫子為士葬以大夫祭以士此死葬之禮也父為士子為大夫葬以士祭以大夫此祭之禮也及其衰也大夫用禮樂陪臣執國命而生事不以禮矣視桓楹而設撥歌雍詩以徹饌而葬祭不以禮矣然豈下而遷之故其言如此又曰其令天下吏民今到出臨三日皆釋服自當給喪事服臨者皆無跣經帶毋過三寸毋布車及兵器毋發哭臨宫殿中嗚呼此久以薄為其道之説而不知父母之喪自始至終哀傷慘恆出於自然非有所矯撏造作而為之者帝既深明於彼未見於此加以景帝天資近薄而竇后亦好黃老言由上至下由君至臣皆以其説為至當不易之道萬世難變之法于是斷然行之人帷不審其故徒歸罪於景帝不知當時景帝於心無所不安設有孟子者出於其時與之深論性善之本原而後及於三年之喪自天子達於庶人三代共之之論則雖有遣詔在上景帝亦必有所不安於心萬一或能改之嗚呼是安可及哉故愚備録之以見聖賢之與異端關乎世道之切漢河間惠王獻王之曾孫也兩京藩臣多驕放其名德者唯獻王而惠王能修獻王之行母薨喪服盡禮哀帝下詔書褒揚之曰河間王良喪大后服終三年以為宗室儀表增封萬户録曰惠王景帝之元孫也漢至此以日易月凡四世矣惠王獨能行之終漢之世所僅見也録之
