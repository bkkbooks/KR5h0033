body:
  text: 智父子之智唐書貞觀二十三年夏四月太宗有疾謂太子曰李世勣才智有餘然汝與之無恩但不能懷服我今黜之若其即行俟我死汝於後用爲僕射親任之若徘徊顧望當殺之耳遂以同中書門下三品爲疊州都督世勣受詔不至家而去録曰唐太宗之不能庇其子若孫也宜哉托孤之命未行托勣之言先入是所以教其謟一蓋帝本挾數任術長於任人而不閑於觀物故夫今日之心膂即他日之仇讐今日之智計即他日之禍本自以爲得而不知勣也者旣不難於事帝安在其不背密乎其始也徒以一鬚之剪爲社稷之計不知鷹犬之量更思其餘物乎其終也乃以去鞅之故智欲遺安劉之逺圖悖亦甚矣斯大有関於唐之宗廟社稷不可以不録也睿宗元年上將立太子以宋王成噐嫡長而平王隆基有大功疑不能决成器辭曰國家安則先嫡長國家危則先有功茍違其宜四海失望臣死不敢居平王之上涕泣固辭者累日大臣亦多言平王功太宜立劉幽求曰臣聞除天下之禍者當饗天下之福乎王拯社稷之危救君親之難論功莫大語德最賢無可疑者上從之立平王隆基爲太子録曰人皆曰廬陵王之復辟唐之天下一再造也而不知造於平王隆基之爲太子也夫震長子也若乃建成與承乾及陳王忠皆庸劣無似所謂震索索視矍矍者也終亦必亡而已矣至於中宗昏愚尤甚始則其心受辱而不顧俛首廢棄而不耻終則生於憂怠而不知制於妻孥而不恤所謂震逐泥未光者也以及於玄宗赫然奮怒震驚羣枉之心發攄襀陰之氣神堯故物不失其舊所謂震驚百里不喪喪鬯出可以守宗廟社稷以爲祭主者也觀於出乃見權臯者唐相德輿父也以才名表署安禄山從事陰察安有異志然畏其清虐欲潜去又慮禍及老母適禄山使獻俘京師回過福昌尉仲謨臯從妹壻也密以計約之比至河陽詐稱疾亟召謩謩至假爲哀哭手自殯襲既逸而葬其棺人無知者從吏以詔書還其母初不知聞之慟哭禄山遂不疑許其母𡚖乃㣲服匿跡候其母於淇門奉之晝夜南去及渡江禄山已反由是名聞天下採訪使高適表爲判官屬永王璘亂多刼士大夫臯又變名以免玄宗在蜀聞而嘉之士君子如李華柳識皆仰臯之德以爲分天下善惡一人而已德輿四歲能詩七歲以孝聞十五爲文數百篇名聲日大韓洄辟從事試秘書省後爲禮部尚書平章事自貞元至元和三十年羽儀朝行性直亮寛恕動作語言一無外餙醖籍風流爲時稱嚮於述作特盛六經百氏游詠漸漬其文雅正而弘博時人以爲宗匠焉録曰愚觀權臯之䧟虜窟可謂無策矣而能卒保其身以奉其親蓋不寧完節全名抑且慶鍾後裔韓洄王定常評臯可爲宰輔師保卒非空言父子貞文孝德羽儀朝行豈非明哲之君子乎符令奇子璘初爲盧龍神將會幽州亂奔昭義田悅拒命奇密語璘曰吾閱世事多矣自安史干紀無噍類吾觀田氏覆亡無日汝能委質朝廷爲唐忠臣吾亦名揚後世璘泣曰悅忍人也近禍可畏奇曰今王師四合吾屬俎中醢兒不行吾死壘尸逆地云何璘與父嚙臂别時朝廷遣馬璲討悅璘降璲悅怒切責罵以忘義背主旦夕且死令奇曰吾教子以順殺身庸何悔遂遇害燧署璘爲軍副詔拜特進封義陽郡王復表父冤加左散騎常侍户部尚書録曰此事與權臯等矧令奇眞死臯尚假耳而史不列卓行豈以其子不在相位耶録之宋史曹璨曹瑋皆彬之子也璨沉毅多智彬以爲類己特鍾愛焉授河陽節度使同平章事瑋沉勇有謀喜讀書通春秋三傳於左傳尤深李繼遷叛諸將數出無功太宗問誰可將者彬曰臣少子瑋可任即召見以本官同知渭州時年十九及彬疾眞宗臨視明以後事對曰臣無事可言臣二子材器可取臣若内舉皆堪爲將上問其优劣對曰璨不如瑋後瑋有功與彬同配饗廟廷彬太祖瑋仁宗知子莫如父云録曰彬之右瑋也豈預期其不附丁謂歟是故寧爲寇黨無爲謂黨㓂黨雖罪猶榮以其無忝所生也謂黨雖貴猶戮以其有靦面目也蓋不惟國之禎𠏉其邦之司直已乎瑋常覘趙元昊知其必叛謂樞密王鬷曰在陜西日聞趙德明常使人以馬博易怒其息㣲欲殺之莫可諫止時元昊方十餘歲諫曰我戎人從事鞍馬而以資鄰國易不急之物已非得策又從而殺之邊人誰肯爲我用者德明從之瑋因私念曰此子欲用其人矣是必有異志聞其嘗往來牙市中瑋欲識之屢使人誘致之不可得乃使善晝者圖其貌而觀之眞英物也他日必爲邉患計其時正在公秉政之日公甚勉之鬷時未以爲然後始嘆其明識録曰此不但璨之不如瑋鬷亦未爲得也彬可謂始終不負所舉矣向敏中父瑀躬親教督不假顏色曰大吾門者此兒也及長姿表瓌碩豈弟多智曉民政善理繁劇居大任三十年人以重德目之爲人主所優禮故雖罹變故終不得謝嘗進右僕射兼門下侍郞眞宗謂學士李宗諤曰朕自即位未嘗除僕射今命敏中此殊命也敏中應大喜賀客必多卿試往觀之勿言朕意也宗諤既至門闌寂然竟入賀曰今日聞降麻士大夫莫不懽慰敏中但唯唯又曰自上即位未嘗除端揆非勳望隆重眷倚殊越何以至此敏中復唯唯又歷陳前世爲僕射勳德禮命敏中亦唯唯卒無一言其智略愼重類如此子五人傳正傳式傳亮傳師傳範傳亮子經女即欽聖憲肅皇后也後累贈敏中燕王傳亮周王經吴王餘孫並顯録曰宋之后族或以仁或以智或以勇仁而不濫智而不徼勇而不亂是故彬之清介無伐是不濫也敏中豈弟多智是不徼也瓊有子十四人皆教以讀書是不亂也不知尚此而惟色之求幾何望其伉儷之益嗣續之賢哉吕夷簡與子公著俱拜司空平章事宋興以三公平章事者四人而吕氏居其二士艶其榮夷簡父蒙亨即蒙正弟也祥符間眞宗封太山幸其第謂蒙正曰卿諸子孰可用對曰諸子皆不足用有姪夷簡宰相才也由是知名公著自少即以治心養性爲本於聲利紛華泊然無所好暑不揮扇寒不親火簡重淸靜蓋天禀然其智識深敏遇事善决苟利於國不以利害動其心見士大夫以人物爲意者必問其所知與其所聞參互考實以逹於上毎議政事博取衆善以爲善神宗嘗言其於人材不欺如權衡之稱物尤能避逺聲跡不以知人自處司馬光亦曰毎聞晦叔言便覺己語爲煩其爲人所重如此録曰愚觀吕許公不惟文穆知之王文正亦知之觀其一言之决雖筮龜不如正所謂拔茅連茹以其彙征吉者也至止獻公雖曰人才不欺如權衡稱物然未能燭計見效猶所謂包承包羞者此人事關於天道而興衰得失判然見矣蘇洵名二子說曰輪輻蓋軫皆有職子車而軾獨若無所爲者雖然去軾吾未見其爲完車也軾乎吾懼汝之不外餙也天下之車莫不由轍而言車之功轍不與焉雖然車仆馬斃而患不及轍是轍者禍福之間也轍乎吾知免矣又木假山記曰予家有三峯予每思之則疑其有數存乎其間且其孽而不傷拱而不夭任爲棟梁而不伐風㧞水漂而不破拆不傷不腐不破拆而不爲人所材以及於斧斤出於湍沙之間而不爲樵夫野人之所薪而後得至乎此則其理似不偶然也然予之愛之而又有感焉予見中峯魁岸踞肆意氣端重若有以服其旁之二峯二峯者莊栗刻峭凛乎不可犯雖其勢服於中峯而岌然若無阿附意吁其可敬也夫其可以有所感也夫録曰史謂軾稍自韜戢雖不獲柄用亦當免禍斯言豈其然哉觀老泉之所以逆料其子終身不差毫末而三峰之說比喻親切千古之下可想見一門之内父子之間智識非尋常可比豈草草知其子者同日語哉歐陽脩幼喪父母韓國夫人鄭氏親誨讀書家貧無資以荻畫地教其書字謂之曰汝父爲吏嘗夜燭治官書屢廢而嘆吾問之則曰死獄也吾求其生不得尔吾曰生可求乎曰求其生而不得則死者與我皆無恨也矧求而有得耶以其有得則知不求而死者有限也夫常求其生猶失之死而世常求其死也此語脩服之終身凡斷死罪非殺人者多所平反平居教他子弟亦以此語之録曰歐陽氏之父非有所求也盡己之心焉耳其母亦非有所爲也明父之志焉耳此其人所不知而己獨知之冥冥之中所謂陰德莫過於此故不必明其報應而但服之終身尤可爲知者道也劉安世母有賢名及安世除諫官尚未拜命入白其母曰朝廷不以安世不肖使在言路倘居其官須明目張膽以身任責脫有觸忤禍譴立至主上方以孝治若以老母辭當可免母曰不然吾聞諫官爲天子諍臣汝父平生欲爲之而不可得汝幸居此地當捐身以報國恩正得罪流放無問逺近吾當從汝所之於是受命在職正色立朝面折廷爭人目之以爲殿上虎録曰愚觀安世之事而嘆死生有命君子不可以不安也以敦卞之威權而濟之以凶虐人爲之甘心者衆矣不惟嶺表不能死人而指教數四或將到而先斃或數驛而赦原後世聞之祇增一咲若有使之然者向使母預憂禍患則直道不顯直道不顯母子之賢無由而彰此其蓄縮退汗固不若明目張膽之得以無怍也尹焞母陳氏焞常應舉發策有誅元祐諸臣乞一郡自效而上惟恐其去弗許也仁宗嘗對左右曰儒者皆用矣惟虞伯生未顯擢爾英宗即位拜住爲相乃言於上遣使求之集以憂還中丞趙世安乘間爲請曰伯生久居京師甚貧又病目幸假外任以便醫帝怒曰一虞伯生汝輩不容耶帝方嚮用文學集弘才博識無施不宜故重聼其去有如此録曰愚觀女士讀書通大義則有之矣至左傳歐蘇文今向學之徒尚猶難之矧女子乎史傳文仲守衡汲夫婦從以未有子爲禱於南嶽故集生而文仲異之嗚呼生子者本其氣也以汲之知人素本儒流而楊之睿德無忝士行有匹配之賢而後有嗣續之賢不待智者可以占知其成就矣又奚待夢卜之或然歟御製文集西平侯沐英誥曰功懋懋官帝王之定制思親戀舊人事之常情曩者朕於擾攘之時年已二十有五尚未生兒女爾沐英因兵受厄八歳逢難罔知存活朕憐其孤幼撫育如兒夜卧同相數番鼾睡於朕懷後因有子爾亦長成以人情天理度之不晦爾名使從爾姓祀爾祖宗今也不忘爾孩童之狀以吾無異於爾父特封爲西平侯爾當思幸逢之初會休忘釋難之洪恩知報不窮究心利濟永爲多福吉哉録曰愚觀西平侯與漢之劉肥等耳肥不旋踵而亡沐至今猶存何也蓋不鑒於齊無以知漢法之弊不觀於宗又何以見明祖之善哉始焉提携撫育無以異於繼體之愛終焉大公至正卒不隱其疇昔之情且使得以自復其姓自禰其祖不惟逺於稱王稱伯之僣而曉然功懋懋官之典眞帝王之大智天理之大公存之萬世而無弊又安得下與天同其久與國同其休哉則雖有謀臣辯士無須措一詞而天章綸渙不可以不録也陳沂畜德録解學士縉應制題虎顧衆彪圖曰虎爲百獸尊誰敢觸其怒惟有父子清一步一回顧文皇素不喜仁宗感此詩甚思時仁宗留守南京頗懷憂虞因命所親夏原吉即日往迎之録曰愚觀此詩賢於張良之計逺矣夫父子天性之親與敵國謀臣之見不同敵國互分彼此叅於物而有功父子本出因心切於情而難遏漢祖狃於謀臣之見莫能迯其範圖明宗得乎天性之仁故能察夫幾諌千古之下斯可以觀乞一郡自效而上惟恐其去弗許也仁宗嘗對左右曰儒者皆用矣惟虞伯生未顯擢爾英宗即位拜住爲相乃言於上遣使求之集以憂還中丞趙世安乘間爲請曰伯生久居京師甚貧又病目幸假外任以便醫帝怒曰一虞伯生汝輩不容耶帝方嚮用文學集弘才愽識無施不宜故重聼其去有如此録曰愚觀女士讀書通大義則有之矣至左傳歐蘇文今向學之徒尚猶難之矧女子乎史傳文仲守衡汲夫婦從以未有子爲禱於南嶽故集生而文仲異之嗚呼生子者本其氣也以汲之知人素本儒流而楊之睿德無忝士行有匹配之賢而後有嗣續之賢不待智者可以占知其成就矣又奚待夢卜之或然歟御製文集西平侯沐英誥曰功懋懋官帝王之定制思親戀舊人事之常情曩者朕於擾攘之時年已二十有五尚未生兒女爾沐英因兵受厄八歳逢難罔知存活朕憐其孤幼撫育如兒夜卧同相數番鼾睡於朕懷後因有子爾亦長成以人情天理度之不晦爾名使從爾姓祀爾祖宗今也不忘爾孩童之狀以吾無異於爾父特封爲西平侯爾當思幸逢之初會休忘釋難之洪恩知報不窮究心利濟永爲多福吉哉録曰愚觀西平侯與漢之劉肥等耳肥不旋踵而亡沐至今猶存何也盖不鑒於齊無以知漢法之弊不觀於宗又何以見明祖之善哉始焉提携撫育無以異於繼體之愛終焉大公至正卒不隱其疇昔之情且使得以自復其姓自禰其祖不惟逺於稱王稱伯之僣而曉然功懋懋官之典眞帝王之大智天理之大公存之萬世而無弊又安得下與天同其久與國同其休哉則雖有謀臣辯士無須措一詞而天章綸渙不可以不録也陳沂畜德録解學士縉應制題虎顧衆彪圖曰虎爲百獸尊誰敢觸其怒惟有父子情一步一回顧文皇素不喜仁宗感此詩甚思時仁宗留守南京頗懷憂虞因命所親夏原吉即日往迎之録曰愚觀此詩賢於張良之計逺矣夫父子天性之親與敵國謀臣之見不同敵國互分彼此叅於物而有功父子本出因心切於情而難遏漢祖狃於謀臣之見莫能逃其範圖明宗得乎天性之仁故能察夫幾諌千古之下斯可以觀自賦兵得自募凡百悉聼所爲有功亦不遽徙就秩增異如此則有材者爭自奮勵緩急得其死力時朝議出師汝談反覆言不可輕動既而三京收復金兵新破三閫增秩又蹙額言邊面無可倚仗乞超越拘攣簡㧞俊傑如吴用周瑜魯肅晋任祖逖陶侃故事使之各分方面連城數十推轂授權盡𡚖賜履巴蜀一人荆襄一人兩淮各一人一切便宜行事庶幾伸縮由己機出於心朝廷不能用後二十年河南果爲金守沿邉諸郡權勢大削兵事無肯任責者未幾洛師亦敗朝論始服其先見云録曰愚觀二人當光寧危險之朝韓史用事之日更歷黨禍閉門著述自少至老未嘗去書嘗論韓非李斯皆有荀卿之才以其富貴利惠之心重故世得而賤之惟卿獨守其身不苟希合士可不自重哉又曰外之得以窒吾聼雜吾目擾吾天君者以未得貞一而靜之理也苟得之導以聲色而不能入投以寳貨而不能中扇以功名而不能動凝然湛然孰得而干之哉由是觀之豈不爲一代明哲之士惜乎無及于用也録之遼史義宗倍阿保機長子幼𦖟敏好學外寛内摯神册元年立爲太子及太祖崩倍知皇太后欲安德光與羣臣請於太后而讓位焉曰大元帥功德高大中外攸屬宜主社稷於是大元帥即皇帝位是爲太宗太宗既立以東平爲南京徙倍居之命王繼逺選建南京碑倍復起書樓於西宫作樂田園詩唐明宗聞之遣人跨海持書密召倍倍乃自忖曰我以天下讓主上今反見疑不如適他國以成吴大伯之名載書浮海而去唐以天子儀衛迎倍坐船殿衆官陪列上壽至汴明宗賜姓東丹名曰慕華改瑞州爲懷化軍拜節度使端愼等州觀察使移鎭滑州倍雖在異國常思其親陶安之使不絶録曰遼太子倍可謂能知自好矣惜乎慕泰伯之名而不求其志竊季子之跡而不得其意小山之詩幾於怨懟領鎭之意切於近名東丹之姓忽於忘本被明宗者父叛子逆安在其慕華而懷化乎亦不過行乎夷狄而已弘道録卷之四十二
