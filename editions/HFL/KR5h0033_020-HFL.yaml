front:
  text: 弘道録卷之二十七将四
  hash: sha256:41e162dd0bd78bc645a1f2cacbce22f61d936475a9f6060b4f839fd898ccebd1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_020-001a, image: hfl/1073/1073-132.png}
body:
  text: 義朋友之義東萊先生吕祖謙夷簡六世孫也本之家庭有中原文獻之傳長益從林之奇汪應辰胡憲游既又友張栻朱熹講索益精嘗讀陸九淵文喜之而未識其人適主禮部試偶得一卷曰此必江西小陸之文也揭示果然人皆服其精鑑先是書肆有書曰聖宋文海學士周必大言其去取差謬恐難傳後盍委館職銓檡以成一代之書孝宗以命祖謙遂斷自中興以前崇雅黜浮類爲百五十卷上之賜名皇朝文鑑蓋其學以關洛爲宗而旁稽載籍不見涯涘心平氣和不立厓異一時英偉草犖之士皆歸心焉自少卞急一日誦論語躬自厚而薄責於人忽覺乎時忿懥之心涣然氷釋故晦翁嘗言學如伯恭方是能變化氣質其所講畫將以開物成務既卧病而任重道遠之意不衰居家之政皆可爲後世法晚年會友之地曰麗澤書院在金華城中既殁郡人即而祠之録曰愚觀濂洛關閩之學各有攸起吾浙自宋南渡後吕成公得中原文獻之傳倡於其始而後何玉金許諸儒輩出奮於其間以至本朝青田劉基浦江宋濂麗水葉琛龍泉章溢太祖嘗稱四先生而不名彬彬乎郁郁乎而婺實吕公倡道之邦不可以不著也録之西山先生蔡元定生而頴悟父發授以程氏語録並經世正蒙諸書曰此孔孟正脉也遂深涵其義既長辯折益精登西山絶頂啖虀讀書聞朱熹名徃師之熹扣其學大驚曰此吾老友不當在弟子列遂與對榻講論諸經奥義俾四方來學者先從質正焉時韓胃設僞學之禁以空善類臺諫承風排擊沈繼祖劉三傑連䟽詆熹併及元定謫道州聞命不辭求即徃就道熹與從游者餞别蕭寺中坐客興嘆有泣下者熹㣲視元定不異平時因喟然曰友朋相愛之情季通不挫之志可謂兩得矣衆謂宜緩行元定曰獲罪於天天可迯乎杖屨同其子沈行三千里脚爲流血無幾㣲見言面至春陵遠近來學日衆士子莫不樞趨聼講有名士雖挾才簡傲亦瑞服謁拜執禮甚恭於書無所不讀於事無所不究義理洞見本原下至圖書禮樂制度無不精妙古書奇辭奥義人所不能曉者一過目輙觧喜釋四書及爲易經傳通鑑綱目皆與徃復參訂啓蒙一書則屬之起藁曰造化㣲妙惟深於理者能識之及喪以文誄之曰精詣之識卓絶之才不可屈之志不可窮之辯不可復得而見矣録曰孟子曰以德服人者中心悅而誠服也如七十子之服孔子也是故陳蔡不能移匡人不能奪叔孫武叔不能毁司馬桓魋不能害而况一時之浮議諸人之私論哉雖然竊以比之今時大不同也何也宋季人心尚在士風尤存其排抵承望者有限也是以士子尚知摳衣趨席心服謁拜今之人心澆極士氣薄甚其揶榆非笑者無窮也尚安徃而非困境涸轍可憎可畏之途哉觀者又當辯矣陳同父亮才氣超邁議論風尤存丈皆一時豪俊志存經濟隆興初上中下五論不報退居永康力學著書淳熙中詣開極言時事孝宗赫然震動欲牓朝堂以勵群臣用神放故事召令上殿將擢用之曾覿聞而欲見焉亮咀之踰垣而避覿不悅大臣亦惡其直交沮之亮笑曰吾欲爲社稷開數百年之基寧用以愽一官乎復渡江而歸所學益愽自孟子後惟推王通氏嘗自謂曰研窮義理之精㣲辯析古今之同異原心於抄忽較體於分寸以積累爲工以涵養爲正睟面盎背則於諸儒誠有愧焉至於堂堂之陣正正之旗風雨雲雷交發而並至龍蛇虎豹變現而出没推倒一世之智勇開拓萬古之胸襟自謂差有一日之長盖指朱熹吕祖謙也録曰愚觀天下之理勢枉不極則伸不大宋自光寧以來議切道學幾於無所容矣以爲正心誠意之學上所厭聞而戒謹恐懼之說祗爲欺世若陳賈林栗京鏜胡統沈繼祖劉三傑何澹劉德秀之徒駕言醜抵攘臂肆志至投竄迫逐殆無虗日吾道至此可謂枉之極矣然豈知堂堂之陣正正之旗掲然特立不旋踵間理宗者出崇尚道學旌奬儒風不獨周程張朱之表揚而且蔡吕諸賢之作氣然後知雲雷交發而日月倍明蛇虎爲妖而鳳麟益顯眞有以推倒二世之狂軌開拓萬古之人心如同父者豈但一日之長而已哉元史草廬先生吴澄自幼頴悟及長知用力聖賢之學著孝經章句校定易書詩春秋儀禮及大小戴記時詔求賢御史程鉅夫舉至京師請置所著書於國子監以資學者行省元明善文學自負嘗問澄易詩書春秋奧義嘆曰與先生言如探淵海遂執子弟禮終眞身左丞董士選延之於家親執饋食亦曰先生天下士也至大元年召爲監丞先是許文正爲祭酒始以朱子小學等書授弟子久之漸失其舊澄至命諸生以次受業晨起燃燭堂王日昃退燕居之至執經問難者接踵而至各因其材質反覆訓誘之直至夜分雖寒暑不易爲教法四條一經學二行實三文藝四治事爲人身若不勝衣正坐拱手氣融神邁答問亹亹使人涣然氷釋嘗著說曰道之大原出於天神聖繼之堯舜而上道之元也以下其亨也朱泗鄒魯其利也濓洛關閩其貞也分而言之上古則羲黃其元堯舜其亨禹湯其利文武周公其貞乎中古之統仲尼其元顔曾其亨子思其利孟子其貞乎近古之統周子其元程張其亨朱子其利孰爲今日之貞乎其以斯文自任如此録曰愚觀元之立國未聞投戈講藝息馬論道徒以魯齋草廬二公上以帝王之道聞于其君下以儒先之說淑諸其人僅能延百年之命脉而已非有繼徃聖開來學之大制作大氣運也其著悅以元亨利貞喻今古道統愚意邵子皇極經世之論更爲切近以草廬言之其時其事殆天之冬乎未可以爲天地交也皇明名臣録潜溪先生宋濓幼從游鄉先生翰林待制柳公貫侍講學士黄公溍洪武初由布衣召入授太子經奉書勉以孝友恭敬勤敏讀書進德脩業以副天下之望太祖覽書喜悅賜書寵答曰曩者先生教吾子以嚴相訓是爲不佞也以聖人文法變俗未之是爲䟽通也所守者忠貞所用者節儉是爲得體也時在朝若凡郊社宗廟山川百神之典朝饗宴慶禮樂律曆衣冠之制四夷朝貢賞賚之儀及勳臣名卿焯德耀功之文悉皆論次紀述至上欲俾叅大政固辭曰臣少無他長惟文墨是攻不願居職任也與人交和易任眞接引後學惟恐弗及遠方來者授館而飮食之雖久不衰内誠外恕一出於正常曰古者重德教非惟子弟之求師而爲師者得一英才而訓𩛙之未嘗不喜動顔色此無他天埋民彜之不能自己也予晩得天台方生其爲人凝重而不遷於物頴銳有以燭諸理間發爲文如水湧而山出喧啾百鳥中見此孤鳳凰也録曰宋潜溪之堅辭大政也有以哉夫明與行未能兼得也以教太子淑人心立國制闡遺文沛然而有餘以叅大政歉然而不足時不同也而遜志之相處若陰爲他日綱常倫理計者想其平居之議論門墻之講習决非抽黃對白縭詞繪句而凡朝政之得失國運之否泰儲貳之負荷憂患之隱伏所不能見之行者必昭晰不遺以是而後能卓然無負於聖祖之義則當時執政者所未能及也正學先生方孝孺受學於潜溪之門凡理學淵源之統人物絶續之紀盛衰幾㣲之載名物度數之詳靡不研究離祈於一絲而會歸於大通及長徧交名士如蘇伯衡胡翰輩劘切研究鈎深致遠淹貫經史自脩身刑家以至於國動可師表謂道之於事無乎不在故列所當勉之目爲二十箴又作雜誡三十八章以爲警戒謂化民必自正家如故又作宗範九篇以告宗人謂今之學者習前聞之弊竊成說爲文辭雜者佛爲該愽志氣污下議論卑淺齪齪然無復有大人君子之態故嘗奮然而超曰不以伊周之心事君賊其君者也不以孔孟之學爲學賊其身者也天下有志之士莫不高其言論將盡棄其所學而從之其所自視直欲上接夷齊下揖于逢殺身取義至死而不顧焉録曰伊周之所以事君何也曰予不狎於不順放太甲於桐太甲賢又反之管蔡流言曰周公將不利於孺子故周公誅之非周公誅之天下之所當誅也孔孟之所以爲學何也曰志士仁人無求生以害仁有殺身以成仁曰生我所欲也義亦我所欲也所欲有甚於生故不爲茍避也先輩之講如與今時何以異哉而能身體力行之者鮮矣是可遺而弗録乎王忠文公禕與宋潜溪同游柳文肅黄文獻之門一時交友賛之者若胡教授翰曰勃平山出水湧與黄如出一律清江胡御史行簡曰源委雖出黄公其深造自得過之潜溪則曰幼時所爲幅程廣而運化宏光焰燁燁起諸公間譬之搆厦屋者掄材甚多而基緒亦以廣矣及踰弱齡則波浪湧而魚龍張風霆流而雨雹集五采競明而十日並照譬之臺閣已建程礎駢列觚稜高騫而氣象益以沈雄及乎年踰四十其文渾然天成而條理弗爽使人挹而愈深味之而弗竭譬之堂戺嚴邃左爼豆而右琴瑟鴻儒鉅公冠冕佩玉雍容揖遜於其間而間巷韋布之士欲望其餘光而不可得也故公之謀畧運于帷幄功業顯于治民文章用于垂憲道學見於格君忠義著于死事噫是可以論公矣比以厄於胡孽一事論之公之全不專是云録曰愚觀明朝亦起淮右所用多彬彬文學之士與販繒屠狗者異然皆吾浙之英而不狥鄉土與南陽近親亦不相眸其間乃有如華川之死節正學之狥義視彼隨何周昌之徒何萬萬也推原其故盖以當道學大明之後所興起於婺儒文獻之徵與漢初𦷥於秦習者大相懸絶然則雖國勢搶攘之初而師友講習之𦔳學問淵源之益端不可無也録之齋先生吴與弼弱冠見侯洛淵源録心慕道之及覩明道亦嘗有獵心乃知聖賢之必可學遂棄舉業謝絶人事日玩經書收歛身心沉潜義理視世之所尚舉不足爲其志直欲造乎聖賢之域居郷動必以禮四方朱學者却其束脩不受善于啓迪聼其言者莫不踴躍思奮恒勵學者四人須以聖爲志學湏以道爲至進脩不可躐等必先從事於小學然後進乎大學讀論語竟造愽文約禮孟子則求放心充四端中庸謹乎存養省察之功以馴至致中和之極明太極以知性之原究西銘以識仁之體易宗先程而鄙後學新奇之說書則古文義埋精深固不得而去取之也嘗嘆諸書箋註之繁無能直截上逹故不輕於著述天順初忠國公石亨薦于朝命行人齎勑書束帛造其廬既至授春坊諭德固辭不拜引見文華殿懇辭以老英宗皇帝顧謂大學士李賢曰此老非迂闊者務令就職與弼終不就録曰愚觀康齋之出處盖有不得已者焉夫孔子歷聘孟子傳食至聞大道之行與三代之英喟然嘆息夫豈不欲如伊如吕俾大君有忘勢之美在我遂三聘之樂乎不得已也享何人也以職則掌兵非求賢之任以勢則柄權非安意之誠以時則亢龍非沉晦之日以德則耄老非和衷之任茍斯須不斷禍不旋踵今觀勑諭之言始之誠意終之恩禮輝耀浹洽光明俊偉弼愈有榮其視官職眞猶弊蹤君臣朋友之間可謂兩全矣白沙先生陳獻章從吴康齋學康齋教人多舉伊洛成語白沙未有得也歸築一臺名曰陽春日端默其中以涵養本原人罕見其面初志勇銳用功或過幾致心病後悟其非所謂戒謹與恐懼斯言未云偏後儒不省事差失毫釐間蓋驗其弊而發也又累年始有所得曰吾自此以後此心乃如馬之有衘勤隨動靜應事接物叅前倚衡照檢而無不在矣其論治道必曰天下非誠不動非才不治必才與誠合而後冶化可興其教人必先靜坐以養其善端曰人所以學者欲聞道也求之書籍而不得則求之吾心可也惡累於外哉此事定要覷破若覷不破雖日從事於學亦爲人耳斯埋識時爲已者信之詩文輩末習著達等路頭一齊塞斷一齊掃去毋令半㸃芥蒂於胷中然後善端可養可能也始終一意氣象將日佳造詣將日深所謂自近而神百姓日用而不知者自此迸出面目來也又語門人林光曰終日乾乾只是收拾此而己此理于涉至大無有内外無有先後無一處不到無一息不運得此𢺞柄入手更有何事徃古來今四方上下都一齊穿紐一齊收合隨時隨處無不是這充塞舞雩三三兩兩正在勿忘勿助之間曾㸃些見活計被孟子一口打併出來便都是鳶飛魚躍若無孟予工夫驟而語之以曾㸃見趣一似說夢敬齋先生胡居仁從康齋得心學之正退而益加充廣慨然以古人自期斯道自任記誦詞章爲不足事專心於内以主忠信爲本求放心爲要以聖學成始成終在於敬因以敬名齋端莊凝重履繩蹈矩與人交隱㣲幽獨之際愈嚴愈密其詩曰謹獨切深切防㣲意最玄爭交眞在此要不愧皇天四方及門者衆築書屋曰禮吾曰南國監後講學嘗曰第一怕見不得眞第二伯工夫間斷多有質羙者好高入於禪騁詞失於於不知操存省察爲何事安能造道德之域乎與上饒婁一齋永豐羅一峯南昌張東白麗澤相會于弋陽之龜峯餘干之應天寺所著有居業録敬齋集取易脩詞立其誠所以居業之義也録曰陳胡亦公之從康齋也一則以舉伊洛成語爲未以得一則從事於敬以得心學之正然愚觀楊月湖答林緝熙書中云白沙好作隱語所云康齋多舉成語教人白沙惟求自得夫伊洛成語亦伊洛所自得者後之人必欲以自得教人恐又生出一弊又曰白沙晚聞道聊以拙自脩者然則今之學者欲求自得以何爲主曰以敬爲主以何爲事曰居業爲事見之眞求之篤不患不居之安資之深既能免憚學之累亦不致末流之失茍取之左右逢其源而又何待曰一入商量便作疑耶學者不可不知一峯先生羅倫目不視惡色耳不聼惡聲不耻惡衣惡食與人子言依於孝與人臣言依于忠與居官者言言民所疾苦見一善人愛之如麟鳳惡人見之如蛇蝎見一饑寒凍餒則傾所有以賑之大率義之所在毅然必爲人之毁譽欣戚事之成敗利鈍己之死生禍福皆所不顧也初爲翰林脩撰會大學士李賢之喪朝廷援例起復臺諫皆不敢言倫私告以不可復上䟽歷陳古今起復之非必欲聖朝準富弼珙故李終喪反覆數千言一本於天理人心之不可已者䟽奏遂落職由是天下之士爭自刮磨向之不言以養忠厚者爲之一變而終倫之世臺省未嘗有起復者矣退居金牛山開門授徒日以註經爲業名重天下所至人必相率而觀之雖武臣俗吏亦知敬仰所交皆當世豪傑之士其語及先生之爲人也必曰青天白日云録曰倫之必爲君子而不爲小人有由然哉國家元氣自列聖培養以至於成化盛矣是故乾德開寳在前而有不在温飽之王曾慶曆元祐在後而有獨不戴花之君實惟不在温飽也而後正色立朝隨之惟獨不戴花也而後孤忠自許隨之倫豈易得者哉狀元魁選何代無之屈指之間曾不多見而文逹一䟽尤見愛人以德今世以姑息豈非今古之一暢耶此其高官顯爵固不若青天白日之尤所難及也山先生章懋自少識趣高遠讀書學問與人交恂恂如也時在朝羅一峯莊孔暘黃仲昭賀克恭陸克深謝元吉鄭克脩咸好古慕義自羅倡章和咸相激勵直欲致君於唐虞之盛一時氣衆頓覺一新未幾因元夕張燈公與莊黄同上章大要以培養聖德爲本忤㫖斥外聲望赫然京師稱三君子與羅通號翰林四諫公蓄德深厚喜怒不形於色恩怨不槩於心務伐不出諸口驕泰不措諸身於書無所不讀於天下事無不理會究極義理精㣲身體力行惓惓斯世不爲矯𩛙嘗曰人形天地之氣性天地之埋須與天地之體同其廣大天地之用同其周流方可謂之人論學者須大其心胷蓋心大則百物皆通必有窮理功夫心纔會夫又須心小必有涵有工夫心纔會小不至狂妄矣録曰自康齋力辭儲弼之任於是白沙不以檢職爲榮一峯不以元魁爲愛而翰林四諌三君子之名昭著於天下矣至於賀吉士亦聞風而起抗䟽觧官此何等時也上有仁明之君下多眞諒之臣然果何爲而得之哉正由平日窮理涵養之功故立心廣大不以外物爲意操存精密亦不以自足爲心然則所謂狂妄者不能黽勉以副之耳豈人能待之以薄乎録者詳之張元禎撰陳選先生墓表曰國家承平日久士大夫多奄奄無氣節間有之而檢身之功或歉焉故其發之也不耀而其持之也不恒如公則何可議哉其立志以古聖賢自期潜脩默識不求人知其學以克己求仁爲要因自號克齋讀書不資于文詞遇格言即手録于册以爲力行之助平生言若不出口視所當爲者勇於爲之操履恪然一出于誠居此官即欲盡此職行此事即欲盡此心視去就升沉甚輕一在於生靈國家餘不恤也故謂公有天下不可奪之大節有足以濟天下之大才有不可遏於天下之大勇宦轍所至無不感動廵江西至今稱頌南畿河南提學切切感慕廣東尤切怙恃去之日庶道擁留相率立生祠及去思碑故公名滿天下無問識不識論一時正人必曰陳某云録曰夫所謂人不能以薄待之者陳公士賢之謂也公致位未極入朝無妬忌之行而四方有公是之心若張東白正直忠厚恬然退䖏垂三十年出而際遇孝皇所勸者正學所講者正傳祗因優寵眷注簡在帝帝心而人遂忌之然則康齋諸公誠不可無也以朋友切切愢愢義莫有難於此故終焉弘道録卷之二十七
