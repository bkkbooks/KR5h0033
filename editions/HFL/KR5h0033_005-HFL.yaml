front:
  text: 弘道録經五
  hash: sha256:742b90fab874642037a19b71208d6e51ec2c7ae7d0ed81627de12261ac5fe5da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_005-001a, image: hfl/1068/1068-046.png}
body:
  text: 仁父子之仁漢書文帝元年有司請蚤建太子上曰朕既不德縱不能愽求天下賢聖有德之人而禪天下焉而曰豫建太子是重吾不德也有司固請曰豫建太子所以重宗廟社稷不忘天下也古者殷周有國治安皆千餘歲用此道也立嗣必子所從來遠矣高帝平天下爲太祖子孫繼嗣世世不絶今釋宜建而更議不宜子啓最長純厚慈仁請建以爲太子乃許之録曰自秦廢扶蘇立胡亥天下紛紛大亂兵革不息生民塗炭未有甚扵此時者也易曰有父子然後有君臣父子之分可不預定乎漢高皇目睹其弊乃亦有營營之惑雖以期期之言未能遽止以是復召吕氏之亂卒致庶孽亂眞漢之不秦無幾哉迎代之謀一大幾也元年之詔又一幾也西漢二百年之垂統人心天命扵是乎在亦以見父子之分既絶而復續其道既墜而復振嗚呼可謂仁哉文帝居代邸薄后嘗病三年帝目不交睫衣不觧帶湯藥非口親嘗弗進故爰盎謂曾參以布衣猶難之今陛下以王者脩之過曾參遠矣録曰人之脩行扵親果殊貴賤乎分難易乎孝弟之道天性也自天子至扵布衣其分雖有異其性無以異也率其性則難者易耳背其性則易者難耳參乎帝乎其誰以是爲輕重乎齊太倉令淳于意有罪當刑詔獄逮繫長安其少女緹縈上書曰妾父爲吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道無繇也妾願没入爲官婢以贖父刑罪使得自新天子憐愍其意詔除肉刑録曰漢文帝不猶愈扵齊宣王乎以天地之貴重扵角者之牛而大賢之論多扵少女之說帝之屈法伸恩又非以小易大之可比也而紛紛以爲病何哉盍不曰是心足以王乎既非納交要譽惡其聲而然則不免過扵愛過扵厚矣衛太子之子史皇孫生子病已號皇曾孫生數月遭巫蠱事太子男女妻妾皆遇害獨皇曾孫在亦坐收繫獄丙吉受詔治獄心知大子無事重哀皇曾孫無辜擇謹厚女徒令乳養曾孫置間燥及昌邑王廢霍光與張安世諸大臣議所立未定丙吉奏記光曰武帝曾孫名病已者通經術有羙材行安而節和願將軍定大策光與丞相敞上奏曰武帝曾孫病已年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後皇太后詔曰可迎曾孫即皇帝位録曰傳有云人衆則能勝天天定亦能勝人信哉史稱戾太子仁恕温謹上嫌其才能少有類已又曰上用法嚴多任深刻吏太子寬厚多所平反太子誠無負扵漢也及上春秋既耄后寵益衰扵是巫蠱之禍紛然而起擾亂之害卒然而動盖人衆勝天是以若彼岌岌也至扵帝心既悟天下益悲扵是太山之石不扶而立上林之樹不召而起盖天定勝人是以若合符節也戾之身雖不有天下而其後亦必爲之扵此可見父祖子孫終無泯滅乏絶特人與天悖時與事違以致病已無親而弗陵無後也豈不哀哉東漢書世祖光武景帝子長沙定王發之後也發生舂陵節侯買買生戴侯熊渠熊渠生考侯仁仁以南方卑濕徒封南陽之白水鄉與宗族徃家焉仁卒子敞嗣值莽篡位國除節侯少子外爲鬱林太守外生鉅鹿都尉回回生南頓令欽欽娶湖陽樊重女生三男縯中秀秀隆準日角性勤稼穡秀姨元爲新野鄧晨妻秀嘗與晨俱過穰人蔡少公少公頗學圖讖言劉秀當爲天子後即位是爲世祖光武皇帝三國志蜀先主玄德亦景帝子中山靖王勝之後也勝子眞元狩六年封涿縣陸城亭侯坐酧金失侯因家焉祖雄父弘世仕州郡雄舉孝廉官至東郡范令先主少孤與母販履織蓆爲業舍東南角籬上有桑樹生高五丈餘遥望見童童如小車蓋徃來者皆恠此樹非凡或謂當出貴人先主少時與宗中諸小兒於樹下戲言吾必當乘此羽葆蓋車後累官至益州牧及曹丕簒即位于蜀曰昭烈皇帝録曰愚觀世祖昭烈之際未嘗不喟然而嘆也夫秦廢封建漢興懲其孤立大封同姓德藹然至矣不旋踵間誅夷殆盡非惟不足以爲藩屏之衛且并其血肉之軀而亡之此其故何耶上古開國以來惟漢起扵匹夫一時父兄子姪乘奮起之運無有毫髮功德扵民帝亦不過泗上一亭長耳其斷蛇之劒尚腥飛揚之勢猶在烏在其能澤而長乎逮至文景五六十載之間海内殷富興扵禮義至扵移風易俗黎民醇厚而漢之元氣已固命脉已全然後庶孽之萌頓然敺除忠厚之澤脩然遠引扵是發封扵長沙而後有世祖靖封扵中山而後有昭烈光啓扵式微之際承運扵既絶之餘而惠武昭宣之裔皆所不逮向使無文景之澤漢之天下未可必然故知父子之間與夫傳世之際仁暴頓殊而綿斬亦異君子其可忽哉其可忽哉東漢明德皇后馬氏伏波將軍之女幼時相者見之曰法當大貴然而少子若養他子者得力當踰扵所生及爲貴人時后前母娣女賈氏亦以選入生肅宗明帝以后無子命撫養之謂曰人未必當自生子但患愛養不至耳后扵是盡心撫育勞悴過扵所生肅宗亦孝心淳篤恩性天至母子慈愛始終無纖介之間后常以皇嗣未廣每懷憂嘆薦逹左右若恐不及後宫有進見者每加慰納若數所寵輙增隆遇録曰漢成帝時史曹宫嘗生子矣上與昭儀天怒以藥飲宫棄其兒許美人亦生子矣昭儀涕泣不肯食竟死兒篋中埋屏處及其他飲藥自傷堕者不可勝數史悉書之以貽千萬古之恨愚嘗反覆嘆曰是誠何心哉夫親生愛愛生恩帝雖至暗極愚獨不念恩自已流愛自已生安忍若是其悖戾耶意者天厭淫德至后與昭儀已極不如是則其嗣不絶他日必無以子殺父之理而福善禍淫之道竟不著矣故感焉后之事追論之以戒萬世肅宗孝章皇帝初承永平故事吏政尚嚴切决事率近於重尚書陳寵以帝新即位宜改前世苟俗乃上䟽曰臣聞先王之政賞不僣刑不濫與其不得已寧僣無濫徃者斷獄嚴明所以威懲姦慝姦慝既平必宜濟之以寬夫爲政猶張琴瑟大絃急者小絃絶陛下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟群生全廣至德以奉天心帝深納寵言每事務扵寬厚寵曾祖咸成哀間以律令爲尚書平帝時王莽輔政多改漢制咸心非之咸性仁恕常戒子孫曰爲人議法當依扵輕愼無與人重比祖欽皆在位父躬建武初爲廷尉左監家世法律寵明習家業性復周密常稱人臣之義苦不畏愼自在樞機謝遣門人知友唯在公家而已朝廷器之寵子忠能承父風益務寬詳損益有程爲决事比以省請讞之敝焉録曰寵之言固有所受之也夫漢之元氣至此將殊矣苟非上有章順之君下愼之臣承之以寬大濟之以慈仁天地生生之德子孫繩繩之美不其息乎厥後和帝寡嗣孫祐繼立孝冲夭亡玄曾叠運皆出章帝之裔寵亦數世相承不絶豈非長道智昆弟之智晋書謝玄者安弟子也安乃心王室戒約諸子嘗曰子弟何豫人事而正欲使其佳諸人莫有言玄答曰譬如芝蘭玉樹欲使其生於庭階耳安悅之時符堅强盛邊境數侵朝廷震動求文武良將可以鎮禦北方者安乃以玄應舉郄超聞而嘆曰安違衆舉親明也玄必不負所舉才也於是徵拜建武將軍監江北諸軍事玄自廣陵西討進據白馬與戰大破之堅自率兵次于項城衆號百萬先遣符融慕容暐等至頴口詔以玄爲前鋒都督率衆八萬距之玄使謂符融曰君遠涉吾境而臨水爲陣是不欲速戰何不稍却令將士得周旋僕與諸君緩轡而觀之不亦樂乎堅衆皆曰宜阻肥水令莫得上堅曰但却軍令得過而我以鐵騎逼而殺之蔑不勝矣融亦以爲然遂麾使却陣衆因亂不能止於是玄等以精銳八千渡肥水决戰堅衆奔潰自相蹈藉投水死者不可勝計風聲鶴淚皆爲王師草行露宿重以飢凍死者十七八既而安奏宜乘其釁略定舊都玄復率衆次于彭城三魏皆降以兖青豫徐冀幽并都督十州軍事封康樂縣公録曰或問曰謝安淝水之戰與周瑜赤壁之師何以能必勝耶先儒有言曰巧於取齊拙於取楚然則遲早工拙之間進退疾徐之際正君子好謀而成之時也夫以吴魏之不敵猶秦晋之相懸久矣故在當時一則以迎敵爲言一則以根本爲憂苟非計定於中能保其必勝乎是故曹操百萬之師符堅斷河之舉秦計之拙也周郎一葦之便謝公半渡之情齊計之巧也善乎爲敵謀者以爲臾出迭入誰能當之乎雖然六朝之不能混一者天也惟天故多效順而天風鳥聲山雲草木皆所不斯然而然者是雖謝昆之智而識者之鑒亦莫能迯矣南史謝瞻者晦之兄晦爲宋臺右衛權遇已重於彭城還都遇家賓客輻輳門巷填咽瞻驚駭謂晦曰汝名位未多而人歸趣乃爾吾家素以靖退不干豫時事交遊不過親朋而汝勢傾朝野豈門户之福即乃離隔門庭曰吾不忍見此及還彭城言於高祖曰臣本素士父祖位不過二千石弟年始三十志用凡近榮冠臺府位任顯密福過災生其應無遠時乞降默以保衰門及晦建佐命之功任寄隆重瞻愈憂懼在郡遇疾不肯自治幸於不永及臨終遺晦書曰吾得啓體幸全歸骨山録曰愚觀伯起前後之言足以破後世貪得之惑震可謂無負關西夫子之稱者矣夫莫見乎隱莫顯乎㣲與夫十目所視十手所指皆孔門之要㫖也其所謂清白吏亦豈尋常好名者比乎信乎清德相踵慶善遠流比之袁世尤爲過之後世鮮能及也史稱中常侍袁敞隗之宗也用事扵中以逢隗世相家推崇以之外援故袁氏貴寵數世富奢甚扵他公族亦不同當塗長荀淑有子八人儉緄靖燾汪爽肅專竝有名稱時人謂之八龍渤海苑康改其里曰高陽里以比上古爽字慈明幼好學十二能通春秋論語太尉杜喬見而稱之可爲人師耽思經書徵命不應頴川爲之語曰荀氏八龍慈明無雙靖字叔慈少有俊才動止以禮或問汝南許章爽與靖孰賢曰皆玉也慈明外朗叔慈内潤又太丘長陳寔有子六人紀字元方以至德稱諶字季方齊德同行故時稱元方難爲兄季方難爲弟兄弟孝養閨門雍和後進之士皆推慕其風父子並著高名時號三君或時詣荀淑雅無僕役乃陳紀御車陳諶從後陳群尚少載車中既至荀乃淑慈應門慈明行酒文若年幼坐着膝前諸子相與討論于時德星聚現太史奏曰五百里内有賢人相聚會也録曰愚觀東漢一代始也客星現而興終也德星現而哀然則懸象果不可信乎君者一時之表賢者衆人之心也天不以霧霧混茫而减德星之曜猶時不以慧孛徃亡而絶賢聖之生故誦神之聴之終和且平之詩則知姬德之所由昌觀掩涕反袂吾已矣夫之言則知周道之所以亡不獨漢之末世而已然也晋書嵇紹康之子也十歲而孤事母孝謹以父得罪靖居私門山濤啓武帝以紹賢侔卻缺宜加旌命乃徵之始入洛或謂王戎曰昨扵稠人中見嵇紹昻昻然如野鶴之在群戎曰君復未見其父耳僕射裴頠亦器之時侍中賈𧨨以外戚年少居位潘岳杜斌等皆附焉𧨨求友扵紹紹距而不答及𧨨誅詔以不阿封戈陽子遷散騎常侍初反正上䟽願陛下無忘金墉大司馬無忘頴上大將軍無忘黄橋則禍亂之萌無由兆矣及河間王顒成都王頴舉兵向京都以討長沙王乂大駕次扵城東乂宣言於衆曰今日西討誰爲都督六軍皆曰願嵇侍中紹以天子蒙塵承詔詣行在所值王師敗績扵蕩陰百官及侍衛莫不散潰唯紹儼然端冕以身捍衛兵交御輦飛箭雨集紹遂被害扵帝側血濺御服天子深衰嘆之及事定左右欲浣衣帝曰此嵇侍中血勿去初紹之行也侍中秦準謂曰今日向難有佳馬否紹正色曰若使王輿失守臣節有在駿馬何爲聞者莫不嘆息録曰按晉史侍中忠眞之首而録扵父子之仁何也易曰幹父之蠱厲終吉中散者萬世名教之罪人也侍中者一代忠貞之巨擘也昔之死不惟輕扵鴻毛而且穢扵青史今之死不惟重扵泰山而且光扵日月昔之稱揚不過曰賢侔郤缺今之褒顯將必曰世篤忠貞矧乃十歲而孤事母孝謹出扵天性乎放曰求忠臣扵孝子之門君臣父子同一道也卞壺勤扵吏事榦實當官欲執正督世不肯苟同明帝器之扵諸大臣而最任職阮孚每謂其恒無閑泰壺曰諸君以道德恢弘風流相尚執鄙吝者非壺而誰時貴逰子弟多慕王澄謝鯤爲達壺厲色曰悖禮傷教罪莫斯甚中朝傾覆實由扵此時庾亮將徵蘇峻壺固爭謂亮曰峻擁疆兵多藏無賴且逼京邑一旦有變易爲蹉跌宜深思遠慮未可倉卒亮不納峻果稱兵詔壺都督軍事與峻戰扵陵西力疾厲衆苦戰遂死二子眕盱相随赴賊同時見害峻平尚書弘訥議曰夫事親莫大扵孝事君莫尚扵忠唯孝也故能盡敬竭誠唯忠也故能見危授命此在三之大節臣子之極行也壺委質三朝盡規翼亮遭世儉難存亡以之賊峻造逆戮力致討身當矢澮再對賊鋒父子并命可謂破家爲國守死勤事上準許穆下同嵇紹扵是改贈侍中驃騎將軍開府儀同三司謚曰忠貞祠以太牢贈胗散騎侍郞盱奉車都尉妻裴氏撫尸哭曰父爲忠臣子爲孝子夫何恨乎徵士翟湯亦曰父死於君子死於父忠孝之道萃于一門録曰愚觀兩晋之間而有卞壺之父子可謂出乎其類拔乎其萃者也夫峻之亂亮召之亮死之可也壺的然知其不可而猶死之何耶蓋務名之與任眞二者去相懸絶王謝之踵尚名也望之之自負具也務名者矜其威儀脩其談論言合則蜉蝣焉事至則莫須焉以清虚爲高致人亦不異其常而已安扵其可也務實者執性堅剛持論篤實遇事而坐視有如讎臨難而苟免若將凂已以必蹈爲素志人以是推之而彼莫知其不可以故不至扵死亡不己也然能殺身成仁益彰完節子復求仁得仁忠孝全名將與天地同其久日月並其明其視風流人物何啻千百嗚呼可謂仁矣陶潜與儼等踈曰告儼俟份俟佟天地賦命生必有死自古賢聖誰能獨免子夏有言死生有命富貴在天四友之人親受音㫖𤼵斯談者將非窮達不可妄求壽天永無外請故耶吾年過五十少而窮苦每以家敝東西㳺走性剛才拙與物多忤自量爲己必貽俗患僶倖辭世使汝等幼而飢寒余嘗感孺仲賢妻之言敗絮自擁何慙兒子此既一事矣但恨憐靡二仲室無萊婦抱兹苦心良獨内愧少學琴書偶愛閑靜開卷有得便欣然忘食見樹木交陰時烏變聲亦復歡然有喜常言五六月中北窻下卧遇涼風暫至自謂是羲皇上人意淺識罕謂斯言可保日月暫徃機巧好踈緬求在昔眇然如何病患以來漸就衰損親舊不遺每以藥石見救自恐大分將有限也汝輩稚小家貧每役柴水之勞何時可免念之在心若何可言然汝等雖曰同生當思四海皆兄弟之義鮑叔管仲分財無猜歸生伍舉班荆道舊逐能以敗爲成因䘮立功他人尚爾况同父之人哉頴州韓元長漢末名士身處卿佐八十而終兄弟同居至于没齒濟北汜稚春晉時操行人也七世同財家人無怨色詩曰高山仰止景行行止雖不能爾至心尚之汝其愼哉吾復何言録曰夫人之道三綱爲首靖節一身舉無媿焉忘言扵眞意委運扵大化幾扵同道者矣或疑此老規規遺訓似過爲身後慮者是大不然父子之道天性也何可廢乎斯一自書契以來性衷眞切千古之下可以想見其慈愛周密仁道篤厚非但榮辱之遠苦樂之甘而已視彼素隱行怪徒潔身而亂大倫者可同日語哉哭隱之弱冠介立有清操年十餘父喪每號泣涕人爲之流涕事母孝謹及執喪哀毁過禮嘗之馘菹以其味㫖掇而棄之與太常韓康伯苦居康伯母殷浩之妹賢明婦人也每聞隱之哭聲輟飱投筯爲之悲泣既而謂康伯曰汝若居銓衡當舉如此輩人及康伯爲吏部尚書隱之遂階清級録曰夫所以酌貪泉而不易其心者固將立身行道揚名扵後世以顯父母而非謂一己之身也苟非自少介立哀慕其親安能卓然不變乎其毁傷過禮有由然也而康伯之秉鑑韓母之知人不寧同心且同里閈古人卜鄰之美有如是哉録之以貽後世之尚德也魏書光録大夫咸陽公高允歷事五帝出入三省五十餘年未嘗有譴仁恕簡靜處雖貴重情同寒素執書吟覽晝夜不去乎誨人以善恂恂不倦篤新念故無所遺棄任鎮東將將軍懷州刺史秋月巡境問民疾苦至召縣見召公廟廢毁不立曰召公之德闕而不禮爲善者何望乃表聞脩葺之扵時年將九十勸民學業風化頗行後正光中中書含人常景追思允帥郡中故老爲立祠扵野王之南樹碑記德焉顯祖平青齊徒其族望扵代時諸士人流移遠至率皆飢寒中多姻媾允散財竭産以相贍賑慰問周至無不感其仁厚允母高年謂人曰吾兒在中書時有陰德濟救民命若陽報不差吾壽應饗百年矣卒時果年九十八録曰死生亦大矣高伯恭以無貳無惑而母子卒獲壽考知命者奚必營營然哉雖然一命之士苟存心扵愛物扵人必有所濟矧中書之地乎其歷事五帝出入三省五十餘年又非長樂老之比君子所以不之拒也唐書貞觀二十年十二月上謂長孫無忌等曰今日吾生日世俗皆爲樂在勝數成傷感今君臨天下富有四海而承歡膝下永不可得此子路所以有負米之恨也詩云哀哀父母生我劬勞奈何以劬勞之日更爲宴樂乎因泣數行下左右皆悲録曰太宗斯言達者之見也夫萬壽無疆雖古今頌禱之詞然行之臣子自盡之情可也若以己處之豈以虚文之樂而且之情之悲乎此可見太宗天資之羙苟充之以聖賢之學何堯舜之不可及哉狄仁傑從容言于天后曰姑姪之與母子孰親陛下立子則千秋萬歲後配食太廟承繼無窮立姪則未聞姪爲天子而祔姑扵廟者也太后意稍寤召還廬陵王詣行在九月立廬陵王爲皇太子録曰梁公之倫肫肫乎天理人倫之極至又非但因其所明通其所蔽而已夫子之扵父天性之一本也姑之與姪異姓之懸絶也虎狼獰矣猶能知父子之親者淫未極也人惟縱慾之性而後本心閉塞本心閉塞而後異性乘之雖然后亦若人爾敦無利害之心哉此祔姑于廟之說眞有以感動其未厭之仁心而論事有回天之力其斯公之謂乎初梁公爲并州法曹叅軍時親在河陽梁公登太行山反顧見白雲孤飛謂左右曰吾親舍其下瞻悵久之雲移乃得去左右爲之感動録曰公之賢範人知之也而其賢孝人不知之也傳曰事親孝故忠可移扵君以是知人臣不患諫之不行惟患行之不立患事之難成惟患誠之未至李敬業乃以厥父撾殺之軀徒以一杯之土未乾六尺之孤安在爭之幾何其不遄亡已乎李晟數歲而孤事母孝謹雄烈有才每戰必衣錦裘繡帽前行指導以示異朱泚㩀京師李懷光圖爲反噬晟乃大陳三軍令之曰國家多難亂逆繼興車駕西幸關中無主子代受國恩見危死節臣子之分况當此時不能誅滅兇渠非人豪也渭橋横跨大川斷賊首尾吾與公等戮力擇利而進興復大業建不世之功何如三軍泣曰唯公所使及引軍抵通化門圖曰若先收坊市巷陌隘狹間以居人賊設伏格鬥百姓囂潰非計也且賊重兵皆在苑中若自苑繫其心腹彼將圖走不暇如此則宫闕保安市不易肆計之上也諸將曰善乃率騎步夜使人開苑墻二百餘步分道並入鼓譟雷動乘勝驅蹙至于白華朱泚姚令言相率遁走晟軍入京城屯扵含元殿前號令曰長安士庶久䧟賊庭若小有震驚則非伐罪吊民之義告喻百姓居人安堵秋毫無所犯士庶無不感悅遠方居人亦有經宿方知者露布至上曰古之樹勳力復都邑徃徃有之至扵不驚宗廟不易市肆長安人不識旗鼓三代以來未之有也天生李晟爲社稷兆人不爲朕也及子愬復爲帥嘗乘雪夜破吴元濟止其外宅蔡吏告城䧟矣元濟不信俄聞愬軍號令將士乃曰何常侍得至此遂驅率左右承子城拒捍元濟城上請罪梯而下之檻送京師其申光二州及諸鎮兵二萬餘人相次來降自元濟就擒不戮一人其執事帳不厨厩之間者皆復其職屯兵鞠場以待裴度與晟曩日同聲並美父子大勳無以比論録曰成湯之征葛以無敵之師行王者之政其民不知兵者順而易也晟父子之於唐以罅漏之功遏滔天之䧟其市不易肆者逆而難也使晟而聴諸將之議徒擾市里未必能成廓清之功愬復信軍吏之言徒殺李祐必無以效坎墉之績故曰惟西平有子惟我有臣父子之間其利溥哉史臣賛李光弼生戎虜之緒沈鷙有守遭世變㧞任兵柄策敵制勝賞信罰明士卒爭奮毅然有古良將風本夫終父䘮不入妻室事繼母至孝異夫庸人武夫者又世稱段太尉大抵以爲武人一時奮不慮死以取名非也秀實爲人姁姁常低頭拱手行步言氣卑弱未嘗以色待物人視之儒者也六歲母疾病不勺飲至七日病間乃肯食時號孝童又李遜弟建與兄俱客荆州母憐其孝每曰建子勸吾食吾輙飽進藥吾意其瘳鄉人化之有爭鬥不詣府而詣建德宗擢右拾遺翰林學士至澧州刺史召拜刑部侍郞贈工部尚書録曰薛放有言人能孝慈則氣感和樂故以外則戎虜之緒以末則武夫之品以賤則羈旅之裔而立功立節立名莫不根抵扵此何况貴如王公尊如中國賢如士大夫豈待論說而後知哉此作史有功世教不可以無録也弘道録終
