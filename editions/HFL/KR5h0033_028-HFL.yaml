front:
  text: 弘道録卷之三十五相四
  hash: sha256:060a2a53ba945c23f389341fee092915c61a79c66d0f6285590360f72824f53b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_028-001a, image: hfl/1075/1075-132.png}
body:
  text: 禮朋友之禮孟子舜尚見帝帝館甥於貳室亦饗舜迭爲賓主是爲天子而友匹夫也録曰天地之氣起于子交會于午帝王之運出乎震相見乎離而堯之興也以火德得天地之中數舜之興也以土德得天地之中氣是乃天數五地數五五位相得而各有含安在其論匹夫天子也蓋雖同德齊聖實天運氣數而然後世安敢希其萬一耶伯夷辟紂居北海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者太公辟紂居東海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者天下有善養老則仁人以爲己歸矣録曰按禮凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人備而兼用之五十養於郷六十養於國七十養於學逹於諸侯於是二老幡然來歸而文王之化已不啻蹶然興矣及武王伐紂而二老致用判然不同何也孔子曰君子或出或處或默或語二人同心其利斷金是故鷹揚之發援之以道也采薇之食存之以義也貳心之勉决之乎帝也叩馬之諌奉之乎天也蓋太公以天下爲己任伯夷以君臣爲己責然皆有以合乎天理之正而即乎人心之安則何必較其同與異乎然則二老跡雖迥異實則同歸不可能岐二分也禮記周武王踐祚三日召師尚父而問焉曰黄帝顓頊之道存乎師尚父曰在丹書王欲聞之則齋矣王齋三日端冕師尚父亦端冕奉書而入王東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶録曰周武王既尊太公爲師而又號曰尚父其事之也可謂至矣而其禮王東面而立師尚父西面宛然師友之義不獨堯與舜爲然也敬者聖學始終之要也敬勝怠則夙夜祗懼罔敢不迪故吉也怠者慢易放肆之萌也怠勝敬則狎侮五行厭棄三正故滅也義者裁度制事之本也義勝欲則不役耳目百度惟貞故從也慾者人心危殆之端也慾勝義則沉湎冐色力行無度故凶也此三皇五帝傳之乎上古載之乎丹書而止曰黃帝顓頊者乃錯舉以見義宜乎端冕致齋而後得聞也詩小雅燕朋友之樂歌伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聼之終和且平録曰詩云鳥鳴嚶嚶而又曰出自幽谷遷于喬木可見非困窮之比寂寞之倫猶其曰鳳凰鳴矣于彼高岡皆所以喻于朝廷之上者也然又安得而神聼之哉古人動必稱神明以見無人己私意於其間若所謂昊天曰明及爾出王昊天曰旦及爾㳺衍而此君子者仁義以爲儷道德以爲鄰心志之相許建諸天地也同心恊力以康王室夙夜匪懈以事一人肝膽之相照質諸鬼神也一言以出天下同其利一行以立萬民共其休而至和之澤傳於無窮太平之美垂於永久其不然者則殘民害物妬賢嫉能朝廷天下亦壊亂隨之矣此朋友之倫關乎世道最切非但爾汝之間聲諾相聞而已伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲酒掃陳饋八簋旣有肥牡以速諸舅寧適不來㣲我有咎伐木于阪釃酒有衍籩豆有踐兄弟無遠民之失德乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我迨我暇矣飲此湑矣録曰所求乎朋友先施之未能也古人敦篤之行毎如此安有人之不我顧者哉故又曰有酒湑我無酒酤我極盡在我無遺而已矣宣王命尹吉甫帥師北伐有功而歸詩人作歌美之曰吉甫燕喜既多受祉來歸自鎬我行永久飮御諸友炰鼈膾鯉侯誰在矣張仲孝友録曰吉甫尊爲元帥親爲世臣且懋建征伐之功以攄玁狁之難必有奇謀祕計之士人則叅謀出則副乘此將相之事也而乃歸之張仲何哉蓋孝友者六行之首八刑之先國之命官以此保民家之立法以此艾後故君牙之有政即張仲之令猷而吉甫之交懽乃詩人之樂道嗚呼以飲御而進賢則無驕恣放縱之意以炰鼈而爲禮安在窮奢極欲之非一燕而三美併焉謂之多祉不亦宜乎大雅賓之初筵左右秩秩籩豆有楚殽核維旅酒旣和㫖飲酒孔偕鍾鼓旣設舉醻逸逸大侯既抗弓矢斯張射夫旣同獻爾發功發彼有的以祈爾爵賓之初筵温温其恭其未醉止威儀反反曰旣醉止威儀幡幡舍其坐遷屢舞遷遷其未醉止感儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩賓旣醉止載號載呶亂我籩豆屢舞僛僛是曰旣醉不知其倕側弁之俄屢舞傞傞既醉而出並受其福醉而不出是謂伐德飮酒孔嘉維其令儀凡此飮酒或醉或否旣立之監或佐之史彼醉不滅不醉反耻式勿從謂舞俾太怠匪言勿言匪由勿語由醉之言俾岀童羖三爵不識矧敢多又録曰序以此爲飲酒悔過而作以愚觀街武公史之所載與詩之所陳截然不同豈其既失而後改者歟君子曰秦之穆公聖人所深許也然則歌賓筵之詩而不知自反者眞斯人之不若歟論語孔子曰晏平仲善與人交久而敬之録曰愚聞諸張子曰晏嬰智矣而不知仲尼然而反稱其善何耶夫子之交也道義而已矣故惟主久而能敬後世之交也勢利而己矣故一於趨以求知然則命也者夫子眞罕言也敦謂張子而不知耶𤩁伯玉使人於孔子孔子與之坐而問焉曰夫子何爲對曰夫子欲寡其過而未能也使者出孔子曰使乎使乎録曰按夫子之友衛有伯玉齊有晏嬰鄭有子産皆得位得國者也其使人於孔子不曰通交際達命令乃惟以寡過爲言可以見古人之道義切磋雖一价之使未嘗以富貴利達而動其心而伯玉之篤行愼德老而不倦人不間於其使者之言矣朋友之饋雖車馬非祭肉不拜録曰人須是此意存於其中不以此意存於其中則有饋爲厚無饋爲薄充此類雖舜受堯之天下亦上下相通之義茍非歸格于藝祖用特何所施其敬耶若以百官牛羊倉廪爲重使己僕僕爾丞拜也斯乃子思之所不悅而謂舜與夫子爲之乎孟子繆公亟見於子思曰古千乘之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云乎子思之不悅也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之右求與之友而不可得也而况可召乎録曰愚觀古之聖賢以道自重蓋不但子思爲然也曾子曰𣈆楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉孟子曰在彼者皆我所不爲也在我者皆古之制也吾何畏彼哉蓋聖人道大德宏無可不可若賢者道隆則從而隆道污則從而污不可以不愼者觀於此而可見矣孟獻于百乘之家也有友五人焉樂正裘牧仲其三人則予忘之矣獻子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣録曰一貴一賤交情乃見此資其勢者也一富一貧乃見交情此利其有者也故曰權交者不久貨交者不親夫是而可謂之友乎此義不明而後富者日驕貧者日謟勢利益盛道義益微孟子發爲是論所以立輔仁之範闢諛佞之門不可以不知也非惟百乘之家爲然也雖小國之君亦有之費惠公曰吾於子思則師之矣吾於顏班則友之矣王順長息則事我者也録曰惠公之事無可考然能辯大賢爲吾師次賢爲吾友則亦非常人矣抑周道衰伐木廢國君大夫尚能崇彼抑此師資友益以爲美談豈非孔門道德足以感人乎過此蓋寥寥矣非惟小國之君爲然也雖大國之君亦有之晋平公之於亥唐也入云則入坐云則坐食云則食雖蔬食菜羹未嘗不飽蓋不敢不飽也録曰晋平公之爲君也錮欒盈囚叔向耽淫蠱之疾作虒祈之官惑以喪志無能爲已特於賢者尚知禮貌恭遜之間進退疾徐之際周旋執禮儼然猶存故君子亦不以人而廢之也通鑑魏文侯以卜子夏田子方爲師每過段干木則廬必式四方賢士多歸之録曰古之王者尚必有師子夏聖門高第未足爲辱若田子方段干木則吾不知也雖然以一僣竊之後而能知此亦足多矣厥後魏侯罃卑禮厚幣以招賢者而孟軻亦至區區梁國之小而致大賢之再爲國者可不務作于前耶惜乎矯名干寵富貴驕人有禮賢之名而無用賢之實無惑乎終于僣竊而巳也孟子見梁惠王王曰叟不遠千里而來亦將有以利吾國乎孟子對曰王何必曰利亦有仁義而已矣未有仁而遺其親者也未有義而後其君者也王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乘之國弑其君者必千乘之家千乘之國弑其君者必百乘之家萬取千焉千取百焉不爲不多矣苟爲後義而先利不奪不饜史記燕昭王即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士與共思以雪先王之耻孤之願也先生視可者得身事之郭隗曰古之君有以千金使涓人求千里馬者馬已死買其骨五百金而返君大怒涓人曰馬死且買之况生者乎馬今至矣不期年而里之馬至者三今王必欲致士先從隗始况賢於隗者豈遠千里哉於是昭王爲隗改築宫而師事之由是士爭趨燕樂毅自魏徃劇辛自趙徃昭王以樂毅爲亞卿任以國政録曰孟子之時沈同嘗以其私問矣未聞樂毅之名也太史公又謂讀孟子書至梁惠王問何以利吾國未嘗不廢書而嘆也曰嗟乎夫子罕言利嘗防其源也自天子至於庶人好利之弊何以異哉然則涓人馬首之說果敦爲之是時仁義之禍棘矣利慾之害熾矣孟子以其命世之才而爲超卓之論若果二事並觀可以見賓師之重長老之稱不爲徒然至於燕昭樂毅孳孳爲利仁義罔聞其君臣之不終端可見矣其所謂不奪不饜尤足垂訓蓋其始也岀乎彼入乎此故其終也出乎爾反乎爾然則遺親後君摩不然矣此豈一隗一辛所能知乎嗚呼後世乃有自比之者則其所見亦小矣哉西漢書古之儒者愽學乎六藝之文以立五教之典則至治之成法周衰孔子之言不用而道不行於是應聘諸侯以苔禮行誼七十子之徒散遊四方大者爲師傅小者爲䧬友故子張居陳澹臺子羽居楚子夏居西河子貢終於齊及秦并天下燔詩書殺儒士六學於此缺矣陳涉之王也魯諸儒持孔氏禮噐徃歸之孔甲遂爲涉愽士卒與俱死夫涉起匹夫敺謫戌以立號不滿歲而亡然而搢紳先生徃焉何也以秦禁其業積怨發憤於陳王也漢高皇誅項籍引兵圍魯魯中諸儒尚講誦習禮弦歌之音不絶豈非聖人之遺化哉至孝武時公孫弘起徒步數年位宰相封侯於是即丞相府起賓館開東閣以延賢人其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼之自蔡至慶丞相府客館丘墟而已賀與屈氂壞以爲馬廐奴婢室焉録曰吾儒於天地間大之則繼徃聖開來學次之亦崇治化興太平此禮不可一日廢也區區陳涉亦能知之惜乎大漢之興不能崇重致使賈董之徒不能張施於其間而公孫弘掠美於其後史故歷數興慨太息於其間者豈盡無意歟其所感嘆深矣讀者詳之漢初有東園公綺里季夏黄公甪里先生此四人者當秦之世避而入商雒深山以待天下之定也高祖聞而召之不至後惠帝爲太子卑辭束帛致禮安車迎而致之四人旣至從太子見高祖客而敬焉其後谷口有鄭子眞蜀有嚴君平皆修身自保非其服弗服非其食弗食成帝時以禮聘子眞不詘而終君平卜筮於成都巿以爲卜筮賤業而可以患衆有邪惡非正之問則依筮龜爲言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣楊雄少從㳺學至仕宦數爲在位顯者稱道其德適杜陵李疆爲益州牧喜曰吾眞得嚴君平矣雄曰君備禮以待之彼人可見而不可得詘也及至蜀致禮與相見嘆曰楊子雲誠知人録曰漢承秦後始以焚書坑儒終以輕士謾罵幾於無士無友矣有太子者出一卑詞求之而峨冠愽帶彬彬都雅復見漢廷可見友道之不終絶與厥後子眞君平流風餘韻被于當時孟子不云其君用之則安富尊榮其子弟從之則孝弟忠信其諸若人之謂也歟曹參爲齊相時天下初定悼惠王富於春秋參盡召諸長老先生問所以安集百姓者膠西有蓋公使人厚幣請之旣見爲言治道貴清淨而民自定因推此類而具言之叅於是避正堂舍蓋公焉盡用其術故相齊九年齊國安集大稱賢相録曰參不但相齊以相天下亦此道也此可見漢代名臣尚然能自得師不皆好臣其所教也豈不賢於後世哉衛青爲大將軍諸侯皆屬焉尊寵於群臣無二公卿以下皆卑奉之獨汲黯與亢禮人或說黯曰大將軍尊重君不可以不拜黯曰以大將軍有揖客反不重耶大將軍聞愈賢黯數請問國家朝廷所疑遇黯加於平日録曰汲黯不拜衛青所恃者何耶蓋人有慾則無剛剛則不屈於慾凡所以卑奉之者慾也黯惟無慾故面折而不爲過犯義而不爲辱君且直之而况於臣乎或曰黯常願出入禁闥豈其無慾哉夫質直好義者逹也色取行違者聞也黯之行達矣其在内也奚以重其在外也奚以輕馬援與公孫述舊同里閈相交善後述稱帝成都隗囂使援徃觀以爲旣至當握手歡如平生而述盛陳陛衛以延援入交拜禮畢使出就館更爲制都布單衣交讓冠會百僚於宗廟中立舊交之位述鸞旗旄騎蹕警就車磬折而入禮饗官屬甚盛及援奉書雒陽初到光武在宣德殿南廡下但幘坐迎笑謂援曰卿遨遊二帝間今見卿使人大慚援謝曰當今之世非但君擇臣臣亦擇君耳臣與公孫述同縣少相善臣前至述陛戟而後進臣臣今遠來陛下何知非刺客奸人而簡易若是帝復笑曰卿非刺客顧說客爾援曰天下反覆盗名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有眞矣録曰帝之簡易不當如是耶夫王僚重鎧專諸刺行秦法斷兵荆軻匕見固不在於簡與不簡也然則帝豈故爲是哉聲音笑貌可施於庸品之人開心見誠自結于豪傑之士援之觀聼一見决矣惜乎說客之言非知援者蓋援之擇君出于本心專意東方乃其素願初非反覆傾詐之徒也使其君可事則雖堂陛介然不害其委質使其君不可事則雖握手歡然不見其可親卒之滅囂虜述不越範圍然則援非說客廼德客耳其於慙詔乎何有弘道録卷之三十五
