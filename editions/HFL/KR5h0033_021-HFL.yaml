front:
  text: 弘道録卷之二十八将五
  hash: sha256:8e7d5ebab9b8ef208c68683385a6e9c8c23c039d2f8929b213b85bbf4d32ffb3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_021-001a, image: hfl/1074/1074-004.png}
body:
  text: 禮君臣之禮堯典曰欽明文思安安允恭克讓録曰禮莫大于敬堯舜繼天立極史臣稽古正詞曰欽乃所以奉於天曰恭乃所以懋於己曰讓乃所以加於人其實不越乎敬之一字而已格汝舜詢事考言乃言底可績三載汝終陟帝位舜讓於德弗嗣録曰盛德大業其果興於讓乎觀諸堯舜之襌授天與人歸已有定命而猶讓之不置厥後舜命九官遂致濟濟相讓殿廷之間揖遜稽首若不遑舍盖上有好者下必有甚焉者矣然則舜避堯之子于南河之南果有之乎曰否當時祇以舜讓于德弗嗣之言好事者遂創爲之今觀典謨固自明白不足以傳疑也帝曰咨四岳有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝徃哉録曰舜之讓不名者天位不可名也禹之讓指名者臣列則可名也萬世之下可想見藹然之氣象非但以禮讓爲國而已帝曰咨四岳有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞徃欽哉録曰何以曰直哉惟清乎夫不邪之謂直不清之謂清天神地祗人鬼之祀皆一定而不可易秩然而不可亂也若宋眞宗謬爲天書以矯誣上帝至加玉帝尊號紛紛不一則回邪而不直矣漢武帝立五帝祠又立太乙祠又立后土祠雜然並興則瀆亂而不清矣此秩宗夙夜寅奉不敢違焉者也帝庸作歌曰勅天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首颺言曰念哉率作興事愼乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞徃欽哉録曰上古之時君勑而臣颺君庸而臣載君拜而臣稽首此何等氣象也易曰泰小徃大來吉亨則是天地交而萬物通也上下交而其志同也自秦以來惟取尊君卑臣爲務而後無帝拜之文焉無首起之風焉無欽哉之復焉易曰天地不交否其流遂不能革噫可慨哉小雅宴饗賓客之詩曰呦呦鹿鳴食野之苹我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行呦呦鹿鳴食野之蒿我有嘉賓德音孔昭視民不恌君子是則是傚我有㫖酒嘉賓式燕以敖呦呦鹿鳴食野之芩我有嘉賓鼓瑟鼓琴鼓瑟鼓琴和樂且躭我有㫖酒以燕樂嘉賓之心録曰頥之爲卦也聖人養賢以及萬民與之共天位使之食天禄需之爲卦也賢者懷其道德安以待時飲食以養其體宴樂以和其心此隆古盛時能養能舉悅賢之至古今相傳以爲賓興盛典而我明尤獨重焉凡天下豪傑之才命世之士胥此焉出然愚竊以爲此篇大指在於私惠不歸德和樂而不淫非止養其體娱其外而已故願爲之主司者能以是存於心以期望天下之士必如王曾司馬君實爲之士子者亦以是存於心以今日發軔之始他曰必如明道希文然後知朝廷作養眞德實意非惓惓取其私恩小惠以視人姑息而已也周王之勞使臣曰四牡騑騑周道倭遲豈不懷歸王事靡盬我心傷悲四牡騑騑嘽嘽駱馬豈不懷歸王事靡盬不遑啓䖏翩翩者鵻載飛載下集于苞栩王事靡盬不遑將父翩翩者鵻載飛載止集于苞杞王事靡盬不是將母駕彼四駱載駸駸豈不懷歸是用作歌將母來諗録曰愚於四牡且先王綱紀四方未暇矣夫王事靡盬所以覺天下之忠也不遑將父所以覺天下之孝也不遑啓處所以覺天下之節也豈不懷歸所以覺天下之義也將母來諗所以覺天下之慈也如是而燕饗以將之所以覺天下之禮也諷誦以發之所以覺天下之讓也以爲上下通用之樂天豈無意而然哉若以爲章使臣之勤而無關於綱紀之義則大學始教宵雅肄三何獨惓焉於是耶抑祗曼焉而已耶周王之遣使臣曰皇皇者華于彼原隰駪駪征夫每懷靡及我馬維駒六轡如濡載馳載驅周爰咨諏我馬維騏六轡如絲載馳載驅周爰咨謀我馬維駱六轡沃若載馳載驅周爰咨度我馬維駰六轡既均載馳載驅周爰咨詢録曰此章之㫖乃周家之法程臣道之矩範上下之通義古今之準的不但以遣使臣也夫堯思日孳孳舜日不遑暇區區爲臣之職而可以爲及乎是故不自滿假禹之懷靡及也望道而未之見文之懐靡及也仰而思之夜以繼日周公之懷靡及也靡及則虗虛則曰孜孜而周爰咨諏所由徧也夫訪善爲咨咨才爲諏咨事爲謀咨禮爲度咨親爲詢五者如不及也而猶恐失之故曰周曰爰將以廣詢愽訪也推其義嘉言罔攸伏咨也野無遣賢諏也亮采惠疇謀也群后德讓度也明明揚側陋詢也此豈可以易及哉以是爲訓而猶有謀臧不從不臧復用若小旻之所譏者有自有肺腸俾民卒狂若芮伯之所刺者嗚呼安得靡盬之臣而與之言靡及之義哉周王以鹿鳴五詩燕其臣臣受賜者歌此詩以答其君曰天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶天保定爾俾爾戬穀罄無不宜受天百禄降爾遐福維日不足天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增吉蠲爲饎是用孝饗禴祠烝嘗于公先王君曰卜爾萬壽無疆神之吊矣詒爾多福民之質矣曰用飮食群黎百姓徧爲爾德如月之恒如日之升如南山之壽不騫不崩如松栢之茂無不爾或承龜山楊氏曰天保以上治内采薇以下治外先王經綸之迹也其効愽矣然觀其作處豈嘗費力本之誠意而已今鹿鳴四牡諸詩皆在先王所歌以燕群臣勞使臣者也若徒取而歌之其有効爲然則先王之用心蓋有在矣録曰愚觀龜山本之誠意之論未嘗不正襟而嘆也夫能大道之行天下爲公而後示我周行不爲虛文以不忍人之心行不忍人之政而後將母來諗不爲浪說進賢如不及從善若轉圜而後周爰咨諏不爲徒勞因其心之自然不由勉强而後莫如兄弟不爲餙詞請恭爾位好是正直而後神之聼之不爲徒設然則臣之受賜者其圖報有不本之誠意者哉其曰單厚多益戬穀罄宜不爲蹈襲之詞日升日恒岡陵松栢不爲諛妄之語以安定爲天福天與君分相聯也以壽考爲神福神與君氣相屬也以質實爲民福民與君治相關也其禱頌有體其稱願有方萬古之下忠愛其君者無以踰此信非周公不能作也諸侯朝于天子天子與之宴以示慈惠故歌曰蓼彼蕭斯零露湑兮既見君子我心寫兮燕笑語兮是以有譽處兮録曰譽者上交不瀆下交不諂也䖏者安樂其心式燕以衎也慈者手足腹心相待一體也惠者既醉以酒既飽以德也後世若飲酒爭功拔劎擊柱是不譽矣金奏作于下驚而走出是不䖏矣王僚重鎧范增舉玦是不慈而惠矣此有周盛時明良相慶君臣同樂不於是詩見之乎天子燕諸侯之詩曰湛湛露斯匪陽不晞厭厭夜飲不醉無歸淇湛露斯在彼豊草厭厭夜飲在宗載考湛湛露斯在彼杞棘顯允君子莫不令德其桐其椅其實離離豈弟君子莫不令儀録曰蓼蕭之燕示慈惠也湛露之宴篤親親也所謂君之宗之故曰在宗載考考者燕義云臣竭力盡能以立功於國君必報之臣皆務竭力盡能以立功是以國安而君寧厥後若陳敬仲與桓公飲而曰臣卜其晝未卜其夜者上不明正道以道民而恒舞于宫酣歌于室豈惟君人之過歟其臣下方刑且墨矣其可與之同日語哉天子燕有功諸侯而錫以弓矢之樂歌曰彤弓弨兮受言藏之我有嘉賔中心貺之鐘皷既設一朝饗之彤弓弨兮受言載之我有嘉賓中心喜之鐘皷既設一朝右之彤兮弨兮受言櫜之我有嘉賔中心好之鐘皷即設一朝醻之録曰東萊吕氏曰受言藏之言其重也弓人所獻藏之王府以待有功不敢輕與人也中心貺之言其誠也中心實欲貺之非由外也一朝饗之言其速也以王府寳藏之弓一朝舉以昇人未嘗有遲留顧惜之意也後之視府藏爲己私分至有以武庫兵賜弄臣者則與受言藏之者異矣賞賜非出於利誘則迫於事勢至有朝賜鐵劵而暮屠戮者則與中心貺之者異矣屯膏吝賞功臣觧體至有印刓而不忍子者則與一朝饗之者異矣周王藥飮賔客曰菁菁者莪在彼中阿既見君子樂且有儀菁菁者莪在彼中址既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋汎汎揚舟載沉載浮既見君子我心則休録曰小雅之有菁莪猶大雅之有棫樸也夫鹿鳴之禮賓興盛典故有瑟笙筐篚之設此章之禮晉接交歡故多喜樂悅懌之情采叔之錫諸侯備物故極車馬衮衣之盛此章之錫仁賢爲寳故假貨貝重多之喻至於汎汎揚舟猶其曰寤寐反側也我心則休猶其曰文王以寧也此不可想見當時樂育人材之盛美歟小序之言亦或有所補也周王之燕諸侯曰交交桑扈有鶯其羽君子樂胥受天之祐交交桑扈有鶯其領君子樂胥萬邦之屛之屏之翰百辟爲憲不戢不難受福不那兕觥其觩㫖酒思柔彼交匪傲萬福來求録曰鄭註云胥皆也與天下皆樂樂之大者天子四海之内無違命則天下樂矣諸侯四封之内無違命内外無故則諸侯樂矣大夫官府之内無違命諮謀行於上則大夫樂矣士進以禮退以義則士樂矣庶人耕稼樹藝以養父母刑罰不加于身則庶民樂矣其於樂胥之義有所發明若但以爲語詞何不言樂只乎况詩中樂只甚多而樂胥獨此不可不致審也諸侯之答桑扈曰鴛鴦于飛畢之羅之君子萬年福禄宜之鴛鴦在梁戢其左翼君子萬年宜其遐福乘馬在廐摧之抹之君子萬年福禄艾之乘馬在廐摧之抹之君子萬年福禄綏之録曰關關雎鳩興之全取義也鴛鴦于飛何所取乎皎皎白駒賦之彰好德也乘馬在廐何所彰乎本之朱傳亦無所發參之小序未見其然必如序言思古明王交於萬物有道則當如鳶飛戾天乃物各率其性故云畢之羅之非爲待其長大能飛而後畢羅取之以爲交萬物有道也至云自奉有節顧乃以莝之抺之起興乎其不類亦甚矣故不可以强通也天子燕諸侯而諸侯美天子之詩曰魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈魚在在藻依于其蒲王在在鎬有那其居録曰此詩一則云王在在鎬豈樂飲酒二則曰王在在鎬有那其居觀其所言庶幾無爲而治之氣象與舜恭己南面之意正相同也不然君臣且以爲戒而反以爲頌乎或曰王能愛其民故民樂其樂而王亦得以饗其樂詩之言即此意也此又不可不知天子所以答魚藻曰采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乘馬又何予之玄衮及黼觱沸檻泉言采其芹君子來朝言觀其旂其旂淠淠鸞聲嘒嘒載驂載駟君子所届赤芾在股邪幅在下彼交匪紓天子所予樂只君子天子命之樂只君子福禄申之録曰此武王選鎬之際君臣慶會萬世可想見也何錫子之上之情何厚也彼交匪紓下之敬何嚴也若惠王以后之鞶鑑予鄭而反爲所惡則與何錫予之者異矣齊威獨朝于周而反爲所辱則與彼交匪紓者異矣宣王命召穆公平淮南之夷詩人羙之此序王策命之詞曰釐爾圭瓉秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年虎拜稽首對揚王休作召公考天子萬壽明明天子令聞不已矢其文德洽此四國録曰一則曰虎拜二則曰虎拜者周自厲王以後王室漸㣲宣王内修政事外攘夷狄王室蹶然復興聖人著之於經然則召虎者光於康公顯於燕土不可泯㓕者而史遷作燕世家叙召公而下九世至惠侯未見召虎之名焉宣三十六年釐侯卒亦未見疆理之事焉然猶未可㩀也至詩序列諸國世次反又蹈襲史遷考詩則存江漢之什𥟵序全無召虎之名謂之何哉安得夫子删後之意以正史遷之失不但一召虎之幸也論語子曰拜下禮也今拜乎上泰也雖違衆吾從下録曰此孔子事君之禮宛然虎拜之家法也夫自周衰覲禮不脩王反下堂而見諸侯至齊桓公霸天子使宰孔賜齊侯胙曰天子以伯舅耄老加勞賜一級無下拜此非小失也吾夫子建萬世君臣之極當與日月爭光其作春秋一字一義皆違衆之事雖以游夏大賢尚不能逹况衆人乎此履之上天下澤君子所以辨上下定民志非小小從違之間而已或曰然則桓辭宰孔而下拜矣兹録不及何也桓盖假之者也其假仁假義假信又假禮之名焉雖以宰孔尚不能欺而君子曾是惑之歟子曰能以禮讓爲國乎何有不能以禮讓爲國如禮何録曰夫子嘗哂子路曰爲國以禮其言不讓盖禮乃爲國之大綱領讓則吾心一念謙遜不遑的道理做出的觀吾夫子至於是邦必聞其政而曰温良恭儉讓以得之此何等氣象也若無謙遜不遑之眞心做來做去雖有許多設施措置不過如宰孔所譏當時豈不號爲有禮而大根本大節曰斯須亡矣此虞芮之君一造西伯之境見有許多謙讓如耕者讓畔行者讓路入其朝士讓于大夫大夫讓于卿此爲國以禮之實事當時二國之君安得不以小人自䖏自愧自慊感嘆不置而又何暇於爭耶遂至聞而歸者四十餘國則又不但何難之有而已子曰事君盡禮人以爲諂也録曰此事君非指魯國之君事魯君盡禮未嘗以爲諂乃是東周之君當時天下視爲泛常獨吾夫子違衆拜下故嘗嘆其不如諸夏之無至如欲存告朔之餼羊雖以子貢之徒且猶不然豈非人以爲諂者乎他日又曰如有用我者吾其爲東周乎此亦非爲魯也觀者詳之入公門鞠躬如也如不容立不中門行不履閾過位色勃如也足躩如也其言似不足者攝齊升堂鞠躬如也屛氣似不息者出降一等逞顏色怡怡如也末階趨翼如也復其位踧踖如也吉月必朝服而朝君賜食必正席先嘗之君賜腥必熟而薦之君賜生必畜之侍食於君君祭先飯疾君視之東首加朝服拖紳君命召不俟駕行矣録曰此孔子事魯君之禮也夫君臣之分以嚴爲主朝廷之禮以敬爲主録此章者如度之有程規之有範一毫不敢越一歩不敢違也豈非萬世之大閑乎家語定公與齊侯會于夾谷孔子攝相事至會所爲壇位土階三等以遇禮相見揖讓而登獻酢既畢齊使萊人以兵刼魯公孔子歷階而進以公退曰士兵之吾兩君爲好裔夷之俘敢以兵亂之非齊君所以命諸侯也夫裔不謀夏夷不亂華俘不干盟兵不偪好於神爲不祥於德爲愆義於人爲失禮君必不然齊侯心怍麾而避之有頃齊奏宫中之樂俳優侏儒戲於前孔子趨進曰匹夫而熒侮諸侯罪當誅請右司馬速加刑焉齊侯懼有慙色齊侯將設饗禮孔子以梁丘㩀曰齊魯之故向不聞焉事既成矣而又饗之是勤執事且犧象不出門嘉樂不野合響而既具是棄禮也若其不具是用粃粺君辱棄禮名惡子盍圖之乃不果饗齊侯歸責其群臣曰魯以君子之道輔其君而子獨以夷狄道教寡人使得罪於是乃歸所侵魯之四邑及汶陽之田録曰或問曰使孔子而當桓文之時則何如曰王與霸毫釐之差也故程子曰誠心而王則王矣假之而伯則伯矣二者其道不同在審其初而已矣自今觀之裔俘之郤聖人可能或人亦可能也侏儒之拒聖人可能或人亦可能也饗禮之罷聖人可能或人亦可能也至其誠於所事則必以君子之道輔弼其君誠於所謀則必具文武之備周旋其事以至盟會之詞眞心實事凛然可畏其始終施爲氣象無一不本於人情合於大道未嘗假託包茅不貢伐原示信之言其致人信服歸所侵邑亦皆誠意所感非若楚之面從𣈆之强入然則此豈他人之可能哉非聖人必不能故曰仲尼之徒無道桓文之事者弘道録卷之二十八
