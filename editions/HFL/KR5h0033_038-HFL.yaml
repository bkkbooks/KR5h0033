front:
  text: 弘道録卷之四十五路六
  hash: sha256:263fd64d4971da9de777c8a4c6f4a28b8367c14e130c0a7a4a8af9c589fbb403
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_038-001a, image: hfl/1078/1078-032.png}
body:
  text: 信君臣之信路史堯在位七十載民不作忒䲭鴞逃於絶域麒麟遊於藪澤則能信於人也録曰所以謂體信逹順蓋順者天之所助信者人之所助也堯之爲君以言天之所助則二儀效順羣生遂育氣無不和四靈畢至以言人之所助則𦖟明睿智足以有臨寬裕温柔足以有容是故以天地爲本故物可舉以陰陽爲端故情可緒以四時爲柄故勞可勸以日星爲紀故事可列而功有藝鬼神以爲徒故事可守而行有考人情以爲田是以民不作忒四靈以爲畜是以鴟鴞逃於野而麒麟在郊也中庸曰如此者不見而章不動而變無爲而成此上古聖神所以配天饗帝爲三才之主而萬世人君者所當取法也中庸王天下有三重焉其寡過矣乎上焉者雖善無徴垂徵不信不信民弗從下焉者雖善不尊不尊不信不信民弗從故君子之道本諸身徴諸庶民考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑是故君子動而世爲天下道行而世爲天下法言而世爲天下則逺之則有望所之則不厭詩云在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也録曰以三重言者舜脩五禮五玉三帛二生一死贄如五噐所以議禮也恊時月正日同律度量衡所以制度也敷奏以言明試以功所以考文也以仲尼祖述堯舜故有是懼而有德無位又以六事之言垂之萬世雖不能取信於一時而實有譽於天下至今動而萬世爲道言而萬世爲法行而萬世爲則又不但一世而已厥後若綿蕞之禮希闊之制武曌之字新經之文其與六事不相干攝一時雖能愚人耳目瞽人心志實未能譽於天下故不旋踵併與俱亡然則六事之言果可信乎不可信乎苟有制作之權則不得不任其責矣論語子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵子貢曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立録曰此論超出今古蓋兵與食古今論者多矣孰云敢去之乎至夫子與子貢直窮到底其爲是言也豈無㣲而不信哉觀於秦隋之世蓋可騐矣秦自商鞅以來㓕棄信義專務富强始皇更爲不㧞之基安所不得已而去哉然而匹夫一呼有死而已何能立也隋承六朝之後自誇强盛過於前代又安所不得已哉其貯洛口食聼民自取可謂足食亦徒然也直至三章約法民始獲其更生獄囚來𡚖民始不知迯死信之不可以已也如是雖然兵與食所共頼之生與死所共知也信則不相頼不相知故他日喫緊又曰人而無信不知其可也大車無輗小車無軏其何以行之哉嗚呼知夫人之不可以行則民之不可以立者在是矣外記禹出見罪人下車問而泣之左右曰罪人不暊道君王何爲痛之禹曰堯舜之民皆以堯舜之心爲心寡人爲君百姓各自以其而爲心是以泣之録曰此可見民無信不立也夫堯舜之民皆以堯舜之心爲心者上下一于信也寡人爲君百姓各自以其心爲心者不信民弗從也雖曰朝覲訟獄謳歌不𡚖舜之于而𡚖禹較之黎民於變四吉風動則有間矣此三代以後之主不可不推人置之心腹之中也孟子曰湯一征自葛載天下信之東面而征西夷怨南面而征北狄怨曰奚獨後予民望之若大旱之望雲霓也𡚖市者不止耕者不變誅其君而弔其民若時雨降民大悅録曰夫湯之於禹又有間矣其曰天與人歸要其終而言也茍征伐之始無以其信于民將何自解於天下後世乎書稱克寬克仁彰信兆民孟子之言張本於此其視戰國之君行所不義殺所不事無以取信於天下而徒棘一時之欲者可同日語哉太甲曰惟尹躬先見於西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉録曰孟子曰有伊尹之志則可釋之者曰伊尹之志公天下以爲心而無一毫之私者也愚以爲尹之始放太甲而人信其無一毫之私者自兹言始也夫爲相而竊主之權以擁蔽其君者豈特秦之斯高爲然哉羿與浞之事可鑒矣是時太甲以尹任天下之重自謂縱欲未必遽亡伊尹乃以相亦罔終之言戒之所以深拆其私而破其所恃設使莽操炎懿之徒處之將何如哉乃知聖賢之心眞能建天地質鬼神百世以俟聖人洞然昭著而無疑也豈不爲可信哉又曰君罔以辯言亂舊政臣罔以寵利居成功邦其永孚於休録曰此伊尹反政太甲而人信其無一毫之私者也夫作聦明亂舊章以寵利居成功豈特孝公商鞅之徒爲然哉矯誣上天與簡賢附勢桀之事可鑒也矧伊尹以阿衡之重而擅反正之問苟有一毫寵利之心則將何所不至哉而不如其囂囂自得之心與向之耕於野者何異也功甫成而身即退上無負於先王次無負於太甲而下亦無負於百姓是以青天白日昭其忠正天地鬼神攝其光明古今天下服其胸次夫以蔡澤之徒尚知四時之序何獨他人爲不然耶若商鞅不免於車裂五王不免於竄殛若此者尚多也豐非伊尹之罪人歟說命王寶憂亮陰三祀既免喪其惟弗言羣臣咸諫於王王庸作書以誥曰以合正於四方合恐德弗類兹故弗言恭默思道夢帝賫予良弼其代予言乃審厥象俾似形旁求於天下說築傅巖之野惟肖録曰高宗何以有是夢乎至誠之心與天合一而其精神之所感念慮之所孚有莫知其所以然而然者矣抑何以有是象乎實理之籍無乎不形而其朕兆之所發克肖之所由亦莫知其所以然而然者矣其道在於無思無爲寂然不動茍有一毫之機枯㣲示於外片言之先入纔動於中則人得以窺其釁而投之矣秦孝公志在變法更令而商鞅得以售其術宋神宗志在稽古有爲而王安石得以濟其奸二君之任相自以爲賢於夢卜而不知投之者神矣然後知恭默思道之心眞與天地參而鬼神通不然若鄧通之於文帝王梁之於光武而能取信於後世者幾希矣周書金滕秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡弁以啓金滕之書乃得周公所自以爲功代武王之說二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟予冲人弗及知今天動威以彰周公之德惟朕小子其親逆我國家禮亦宣之王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之歲大熟録曰張子有言志與氣天與人有交勝之理聖人在上而流言起氣一之動志也天心感應而雷風作志一之動氣也可以見三代盛時君臣胥契其孚心實意逹於上下譬則陰陽動靜互爲其根未逹者一間耳後世陰盛陽㣲天地不交上下暌離若漢之靈帝因黄巾之亂而赦黨人宋之徽宗以慧星之變而釋碑禁無亦後矣所謂蹶趨而動其心者又何惑乎視天而夢夢哉春秋魯隱公元年春三月公及邾儀父盟于蔑録曰孔子曰自古皆有死民無信不立釋之者曰寧死而不失信於民使民亦寧死而不失信於我夫寧死而不失信於民則人何待要質於我哉民寧死而不失信於我則我何待要質於人哉古之爲邦者如此世衰道降君不信其臣奚啻鄰國乎父不信其子奚啻他人乎於是要質會盟之事紛然見矣夫子作春秋以信爲人君之大寶故首書盟蔑將謂後之君臣執此之固堅如金石守此之確貞如四時於以嚴彼此之心齊上下之志全始終之道杜反覆之端其垂世立教之意至深切矣然則魯之隱公果能篤於信乎夫利害動於中則公私判於外偽心存於始則背意見於終隱方假讓以爲義故飾許以爲信觀其首爲于蔑之盟而後有伐邾之舉則其情可見矣詩曰君子屢盟亂是用長其此之謂歟左傳鄭武莊公爲平王卿士王貳於虢鄭伯怨王王曰無之故周鄭交質王子狐爲質於鄭鄭公子忽爲質於周王崩周人將卑虢公政四月鄭祭足帥師取温之麥秋又取成周之禾周鄭交惡君子曰信不由中質無益也明恕而行要之以禮雖無有質誰能間之苟有明信澗谿沼沚之毛蘋蘩蕰藻之菜筐錡釜之噐潢汙行潦之水可薦於鬼神可羞於王公而况君子結二國之信行之以禮又焉用質風有采繁采蘋雅有行葦泂酌昭忠信也録曰夫采蘩采蘋行葦泂酌皆周詩也及其末也子不信其父而小弁作焉婦不信其夫而白華作焉彼幽王宜白者肌體骨肉之親也而彼廢此弑安在其王子狐鄭子忽哉此所以紛紛交質而又翻覆交惡左氏之言亦以嘆傾否之異也孟子曰五霸桓公爲盛葵丘之會諸侯束性或書而不歃血一明天子之禁初命曰誅不孝無易樹子無以妾爲妻再命曰尊賢育才以彰有德三命曰敬老慈幼無忘賓旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人既盟之後言𡚖於好録曰以後命勞齊桓者宰孔也以先𡚖遇晋侯者亦幸孔也始也畏天子之威終也明天子之禁何乃以爲可無會也孟子曰恭者不侮人儉者不奪人侮奪人之君惟恐不順焉惡得爲恭儉恭儉豈可以聲音笑貌爲哉孔以王朝之臣雖不如仲之得政亦嘗究桓之用心是故實怒少姬北之南貴楚實伐山戎而乃北圖燕矧兹會也大足以厭人之耳目快人之心志而不知孔之視之如見其肺肝也是以古之聖人惟務脩德愼獨雖三分天下有其二而尚以服事殷嗚呼周之至德尚何有於人之後言也失莊十三年冬公會齊侯盟于柯公羊傳曰何以不日易也其易奈何桓之盟不日其會不致信之也其不日何以始乎此莊公將會乎桓曹子進曰君之意何如莊公曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾於是會乎桓莊公升壇曹子手劍而從之管子進曰君何求乎曹子曰城壞壓境君不圖與管子曰然則君將何求曹子曰願請汶陽之田管子顧曰君許諾桓公曰諾曹子請盟桓公下與之盟已盟曹子標劍而去之要盟可犯而桓公不欺曹子可售而桓公之信著乎天下自柯之盟始焉録曰此魯臣之㣲者霸主屈身殉之信歟曰非也管仲曰知與之爲取政之寳也夫自長勺之戰曹劇鄙肉食之謀齊幾不振及失北杏之會桓公及四國之㣲魯未可平管仲之見朱之伸也夫魯宗國也齊弑其君泆其夫人柯之會莊公以爲生不如死其羞惡之盟歟假魯以是討齊雖靦顔於諸侯之上將何以服天下之心哉甚矣劇謀之鄙也手劍者匹夫之勇也汶陽者蹴爾之食也舉國由其術中君臣莫知大計捐區區之小利竊赫赫之顯名故曰知與之爲取政之寳也豈非管子之術乎晋侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寳也民之所庇也得原失信何以庇之所亡滋多退一舍而原降録曰文公之功固大矣皆臣子職分之所當爲晋安得取王之四邑哉周之地不大於曹滕民不多於邾莒有人心者不若是恝何忍更分其所有哉原無背叛之罪其守者爲王守也上失其道而迫之叛王以從覆哀哉乎原伯歟使爲文公者正王畿之則反諸侯之侵如是伐而示之信貫日月矣不原人情而恣霸術所謂巧於用非明於約信也王子虎盟諸侯于王庭要言曰皆奬王宫無相害也有渝此盟明神殛之俾墜其師無克祚國及其玄孫無有老幼君子謂是盟也信謂晋於是役也能以德攻録曰葵丘之會諸侯求牲載書而不歃血者桓之威信服人不待其詞之畢也踐土之盟鄭衛交訟而不已者文之貪得無厭不頋其王之削也然則口血未乾之時人各以其心爲心矣安在其同奬王室乎又安在其施及玄孫乎合而觀之可以見一霸不如一霸矣晋悼公四年魏絳爲司馬無終子使其臣孟樂納虎豹之皮以請和諸戎公曰夷狄無親而貪不如伐之絳曰諸侯新服陳新來和將觀德於我我德則睦否則𢹂貳勞師於戎而楚伐陳必不能救是棄陳也諸華必叛戎禽獸也獲戎失華無乃不可乎公曰然則莫如和戎對曰和戎有五利焉戎狄荐居貴貨易土土可賈焉一也邊鄙不聳民狎其野穡人成功二也戎狄事晋四鄰振動諸侯懷威三也以德綏戎師徒不勤甲兵不動四也鑒於后羿而用德度逺至邇安五也公其圖之公說使絳盟諸戎録曰愚觀春秋之世魏絳以五利和諸戎狄何獨斯時之不然耶夫晋今山西之地也其國即承宣之司也當時號曰莫强於今一方之藩輔耳絳雖號曰善謀於今一介之陪臣耳然而邊郡之患大矣其貪非無終之倫禍非棄陳之比得失非獲戎棄華之儔也歳歳而擾之將何時而可已在在而驅之將何地而獲終其利與害又何可指而數哉故貴貨易土夷狄同情穡人成功邊鄙共頼豈特絳言爲然乎與其糜不貲之費以養徒守之兵曷若循先代之故而效和戎之績哉羊犬之羣必有所主爲今之計何不遣一介通事之臣於三盧統會之地約之以信懐之以恩啖之以利我仍舊邊以爲界使彼逺去以隨俗每年於某月日某邊交會至期嚴其守備謹其斥㬋示之以威不使有輕視中國之意其他月日不許輙近邉塞潜伏河套令被酋豪伸其號令使一帶沿邉之民俱得休息候我兵威全盛食足信孚徐議逺征若成祖之宣威沙漠可也大漢之勒功燕然亦可也豈非至要之策乎失此不務而乃因循卒歲度日爲功至於或輟兵或守備漫無足憑此乃不終日之計豈帝王不戰而屈人之兵乎腐朽餘年無由獻納故因魏絳之請録此以著意云趙孟患楚袁甲以告叔向叔向曰何害也匹夫一爲不信猶不可若合諸侯之卿以爲不信必不捷矣食言者不病非子之患也夫以信召人而以僣濟之必莫之與也安能害我及虢之會祁午謂趙文子曰宋之盟楚人得志於晋今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸徒猶諸晋而駕焉况不信之尤者乎文子曰武受賜矣然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晋也今武猶是心也楚又行僣非所害也我將信以爲本循而行之譬如農夫是穮是萒雖有饑饉必有豊年且吾聞之能信不爲人下吾未能也詩曰不僣不賊鮮不爲則信也録曰東萊吕氏稱趙文子談笑而當衷甲之變豈眞知文子哉而不知信以爲之主夫是而莫之懼也孟子曰我知言我善養吾浩然之氣子木之好利求逞死亡將至不寧同列知之武亦知之熟矣故曰單斃其死又曰食言者不病武雖退然如不勝衣呐然如不出口然而弭兵息民與楚氛甚惡何逺也得志棄信與犯而不較何先也武之内志定而建之志未定晋之信可憑而楚之駕難憑曾是而能動其心哉惜乎猶有未純又欲因宋以守病而致死以倍楚此所以雖獲一時之令名而乏千古之道義同𡚖於餒而已終不免於血氣之病也晋荀吴帥師圍鼓鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不爲穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而迩姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見猶有食色姑脩而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰夫以事君也獲一城而教民怠將焉用邑邑以賈怠不如完舊率義不爽城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡克鼓而反不戮一人録曰春秋無義戰圍鼓之役其義戰歟義人者人恒義之信人者人恒信之偽會齊師信於何有假道鮮虞義亦何居滅肥甚矣其可再耶逢君之惡而乃責人之叛喜人善言而乃自甘夷狄君子所不取也史記孫武子以兵法見於吴王王曰子之十三篇吾盡觀之矣可以勒兵小試乎對曰可於是出宫中美女得百八十人孫子分爲二隊以王之寵姬三人各爲隊長皆令持戟令之曰汝知而心與左右手背乎婦人曰知之孫子曰前則視心左視左手右視右手侈即視背婦人曰諾約束旣布乃設鈇鋮即三令五申之於是鼓之右婦人大笑孫子曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰約束不明申令不熟將之罪也旣已明而不如法者吏士之罪也乃欲斬左右隊長吴王從臺上觀見且斬愛姬大駭趣使使下令曰寡人已知將軍能用兵矣寡人非此二姬食不甘味願勿斬也孫子曰臣旣已受命爲將將在軍君命有所不受遂斬隊長二人以狥用其次爲隊長於是復鼔之婦人左右前後跪起皆中規矩繩墨無敢出聲孫子使使報王曰兵皆整齊王可試下觀之唯王所欲用之雖赴水火猶可也吴王曰將軍罷休就舍寡人不願下觀孫子曰王徒好其言不能用其實於是闔廬知孫子能用兵卒以爲將西破强楚入郢北威齊晋顯名諸侯孫子與有力焉録曰武之此舉愈於商君吴起蓋令可行民不可劫姬可斬妻不可殺也武之十三篇首曰智信仁勇嚴王已盡觀之矣盍不曰君令而臣共乎徒好其言而不能用其實是不智也以嫟寵廢軍令是無勇也試以婦人等於兒戲是不嚴也信爲君人之大寳小試且然况大事乎此而狥人不可以爲信也或曰禮不齒君之路馬寵姬非路馬比也而違令擅殺豈仁者之心乎孟子曰仁則榮不仁則辱武非惡夫笑而慢法特惡夫醉而强酒者也卒能破楚入郢威齊服晋顯名諸侯然則雖非貴德其能尊士也乎
