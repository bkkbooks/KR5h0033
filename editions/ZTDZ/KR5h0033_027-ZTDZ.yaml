front:
  text: 弘道録卷之三十四相三
  hash: sha256:18c6b3c009160247e99c7e560f94ec7041e9b4448e969184c8640c6594de9285
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_SJB_027-350232a, image: sjb/35/350232a.png}
body:
  text: 禮昆弟之禮孟子曰欲常常而見之故源源而來不及貢以政接于有庳録曰所以謂之常常者相繼之義也彼漢景之於梁王警蹕旂常縱不驕恣不可繼矣所以謂之源源者不竭之義也彼唐玄之於五王連枕共被縱使至親有時竭矣覲聘者朝廷之禮也接見者手足之親也不及貢則燕私之情洽不以政則非辟之干遠而後得以常常而見源源而來孟子其善探聖人者歟孟子曰徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉所不爲也堯舜之道孝弟而己矣録曰夫弟者第也出于天而自然有次叙是故兄之齒隨行弟之齒燕行一定而可紊乎彼有疾棄其長者或以權或以寵或以利大而有國之君小而有家之子一踰其分未有不滅亡者孟子以不能不爲發之與長者折枝同意皆所以開人心自然之天拯季世亂忘之弊不可以不察也小雅燕兄弟之樂歌曰棠棣之華鄂不韡韡凡今之人莫如兄弟死喪之威兄弟孔懷原隰裒矣兄弟求矣着令在原兄弟急難每有良朋况也永嘆兄弟䦧于墻外禦其侮每有良朋烝也無戎喪亂既平既安且寧雖有兄弟不如友生儐爾邉豆飮酒之飫兄弟既具和樂且孺妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻孥是究是圖亶其然乎録曰鹿鳴四牡皇華之後而繼以棠棣者以周召王室之所仰人心之所頼也聖人不以變廢常不以義勝恩不以一時之所遇而易萬世之所重其公而愛之心皎然青天白日不可掩也脩然雨露霜雪無非教也故曰其過也如日月之食焉人皆見之及其更也人皆仰之此之謂也是故和樂且孺者父母且不可間矧他人乎和樂且湛者妻孥尚不可先矧外物乎此所以雖遭流言之變管蔡之辜曾不若後世遂廢懿親之重不信兄弟之親也今去周公之世數千百年爲之歌棠棣莫不因心發見孰謂當其筵受之几有不能感動者哉盖不待垂涕淚而越人已無不化矣又燕兄弟親戚之詩曰有頍者弁實維伊何爾酒既㫖爾殽既嘉豈伊異人兄弟匪他蔦與女蘿施于松栢未見君子憂心奕奕既見君子庶幾說懌有頍者弁實彼何期爾酒既㫖爾殽既時豈伊異人兄弟俱來蔦與女蘿施于松上未見君子憂心怲怲既見君子庶幾有臧有頍者弁實維在首爾酒既㫖爾殽既皁豈伊異人兄弟甥舅如彼雨雪先集維霰死喪無日無幾相見樂酒今夕君子維宴録曰愚觀此詩一篇之中而三緯具備眞足以感人於舞窮也夫鶺鴿小物也而飛鳴行搖曾是親切而有味乎蔦蘿小草也而纒綿依附曾是固結而可觧乎盖由聖人因心體物遇兄弟之急難則不暇束髮彼有秦人視越人者則鶺鴒乎何有於兄弟之相依則心誠求之彼有教猱升木者則蔦蘿又何如哉此學詩之大義爲禮之大本不可以不察也又祭畢而燕父兄耆老之詩曰敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫遠具爾或肆之筵或授之几肆筵設席授几有緝御或獻或酢洗酌奠斝醓醢以薦或燔或炙嘉殽脾臄或歌或咢敦功既堅四鍭既鈞含矢既鈞序賔以賢敦兮既句既挾四鍭四鍭如樹序賓以不侮曾孫維主酒醴維醹酌以大斗以祈黄耈黄耈台背以引以翼壽考維祺以介景福録曰爲此詩者其知禮之至乎夫禮不妄說人不辭費不踰節不侵侮不好狎周家世德忠厚内親九族外事黃耈皆由於自然不事勉强豈妄說人乎筵几雖陳不爲過設侍御雖多不爲過勞飲食雖盛不爲過腆豈辭費乎獻酬而後禮交禮交而後樂備樂備而後射以觀德豈踰節乎揖讓而升下而飲以賢而序賓以爭而君子豈侵侮乎養耈老以相引翼介景福而饗壽祺邦家有光君臣有慶豈好狎乎有此數者故曰知禮之至也父兄之答行葦曰既醉以酒既飽以德君子萬年介爾景福既醉以酒爾殽既將君子萬年介爾昭明昭明有融高朗令終令終有俶公尸嘉告其告維何籩豆靜嘉朋友攸攝攝以威儀威儀孔時君子有孝子孝子不匱永錫爾類其類維何室家之壼君子萬年永錫祚胤其胤維何天被爾禄君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子録曰此其曰鳧翳既醉至今頌大平者必以首稱何也蓋曲禮曰道德仁義非禮不成道之所包者廣故曰昭明有融德之所具者身故曰威儀類善人之所聚者順故曰景命百禄義之所和者利故曰祚胤孫子是數者人情之至願君德之至純然必和氣周旋而人心歡悅故首曰既醉以酒既飽以德可以見王者之高致父兄之盛節萬世之下固不能外之以爲頌禱也嗚呼至是而周家八百年之基固矣祭之明日繹而賓尸之樂曰鳧鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飮福禄來成鳧鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飮福禄來爲鳧鷖在渚公尸來燕來處爾酒既湑爾殽伊脯公尸燕飲福禄來下鳧鷖在潨公尸來燕來宗既燕于宗福禄攸降公尸燕飮福禄來崇鳧鷖在亹公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱録曰鄭氏䟽云謂之公尸者天子以卿言諸侯也諸侯有功德者入爲天子卿祭則爲尸故云公尸然則非周召畢榮之徒不能任也此時上有守成之君下有弼直之臣以己則齊明盛服以人則肅雝秉德以儀則至治馨香以物則玉帛交錯公尸安則神明無不安公尸宜則神明無不宜是以洋洋然而愛樂熏熏然而和悅皆太平之効至治之休也不然酒清殽馨夫誰不有而何獨稱鳧鷖既醉乎公尸之答鳧鷖曰假樂君子顯顯令德宜民宜人受禄于天保佑命之自天申之干禄百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊意威儀抑抑德音秩秩無怨無惡率由群匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不觧于位民之攸塈東萊吕氏曰君燕其臣臣媚其君此上下交而爲泰之時也泰之時所憂者怠荒而巳此詩所以終于不觧于位民之攸塈也録曰泰之時所憂者不但怠荒而已其所最憂者作聦明而亂舊章以辯言而亂舊政咈其耈長而任新進棄其芻蕘而召寵利皆足以爲顯顯令德之累秩秩德音之蠹也是詩一則曰不愆不忘率由舊章二則曰無怨無惡率由群匹夫能由舊章則有典則之可依成憲之可度由群匹則有老成之可任孝德之可憑如是而民人不宜天禄不永紀綱不垂於當時令名不傳於後代吾未之信也抑公尸而爲此言信非周召畢榮之徒而能若是哉春秋文公二年八月丁卯有事於太廟躋僖公錄曰愚觀春秋之世其悖亂僣差各有所自其始也莊公可禘則哀姜亦可致也哀姜可致則僖公亦可躋也是以古先聖王愼而重之如不得已一失則入于夷狄再失則入於禽獸可不愼歟若夏公弗忌之論夷狄禽獸之道也故曰是可忍也孰不可忍也左傳晋侯使鞏朔獻齊捷于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命淫湎毁常王命伐之則有獻捷王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王畧王命伐之告事而已不獻其功所以敬親暱禁淫慝也今叔父克遂有功于齊而不使命卿所來撫余一人余雖欲於鞏伯未有職司於王又奸先王之禮其敢廢舊典以忝叔父士莊伯不能對王使委於三吏禮之如侯伯克敵使大夫告慶之禮降於卿一等録曰晋侯之使鞏朔鞏朔之爲齊捷獻利也王之使單襄單襄之爲晋侯命義也伐齊貪利故責晋以義王之不見莊伯有由然矣而又何以宴而私賄爲哉以爲若孩提焉本欲其正而投之乎梨栗棗柿是未可知也以爲若戲術焉本與之嬉而加以正顔作色亦未可知也何爲而有此哉是時單襄公在廷王孫滿在位定雖欲如兒戲其如二臣何哉雖然王孫蘇之復難劉康公之徼戎定之本心喪矣欲不如兒戲不可得也後漢書光武以東海王疆廢不以過去就有禮故優以大封兼食魯郡二十九縣賜虎賁旄頭宫殿設鐘虛之懸擬於乘輿疆臨之國數上書讓還東海又因皇太子固辭帝不許深嘉嘆之以疆章宣示公卿初魯恭王好宫室起靈光殿甚壯麗是時猶存故詔疆都魯宫室禮樂事事殊異至永平元年王病明帝遣中常侍將太醫視疾又詔沛濟南淮陽王詣魯絡繹不絶及薨上悲慟從太后出幸津門亭發哀使大司空持節護喪大鴻臚副宗正將作大匠視喪事贈以殊禮升龍旄頭鸞輅龍旂虎賁百人詔楚王英趙王栩北海王興館陶宫主及京師親戚四姓夫人小侯皆會葬帝追惟王深執謙儉不欲厚塟以違其意於是特詔中常侍杜岑及東海傅相曰王恭儉好禮以德自終遺送之物務從約省以彰王卓爾獨行之志録曰損之初九曰已事遄徃無咎六五曰或益之十朋之龜弗克違元吉王以冢器當陽帝以次嫡易位猶損頼初之益者也旣讓于尊尤能損己而不自以爲功帝復居尊得正追惟王執謙約務從儉損深得虚中善應與唐世稱讓皇帝者不可同曰語也此其大善之吉蔑以加矣及肅宗尊禮東平王踰於前世諸王亦莫與比建初七年來朝帝許之特賜裝錢千五百萬復以王冒涉寒露遣謁者賜貂裘及大官食物珍果使大鴻臚竇固持節郊迎帝乃親自循行邸第豫設帷床其錢帛器物無不充備下詔曰詩云叔父建爾元子敬之至也昔蕭相國加以不名優忠賢也况兼親尊者乎其沛濟南東平中山四王讚皆不名蒼既至升殿乃拜天子親答之其後諸王入宫之以輦迎至省閣乃下蒼以受恩過禮情不自寧上踈辭謝帝省覽愈褒貴焉及車駕祖送流涕而訣復賜乘輿服御珍寳輿馬錢帛以億萬計録曰范曄論曰孔子稱貧而樂富而好禮若東平憲王可謂好禮者也其辭至戚去母后豈欲苟立名行而忘親遺義哉盖眩疑則隙生累近則喪大斯蓋明哲之所爲嘆息嗚呼遠隙以全忠釋累以成孝固憲王之志哉録之魏書楊播家世純厚並敦義讓昆季相事有如父子椿津恭謙忠義坐於廳堂終日相對未嘗人内有一𦎟一飯而聚食廳堂間徃徃幃幔隔幛爲寢息之所各就休偃還共談笑年過六十並登台鼎嘗旦暮叅問椿他䖏醉歸津扶持還室假寢閣前承候安否子姪羅列階下不命之坐不敢坐也毎出或曰斜不至不敢先飯還然後共食則親授匙箸味皆先嘗津爲四州椿在京每四時嘉味輙因使附之若或未寄不先入口一家之内男女百口緦服同爨庭無間言録曰史稱楊播兄弟俱以忠毅謙謹荷内外之任公卿牧守榮赫累朝而言色恂恂出于至誠恭德愼行爲世師範後魏以來一門而已諸子秀立青紫盈庭積善之慶蓋有憑也及逆胡擅朝淫刑肆毒以斯族而遇斯禍何報施之反哉佘曰不然孔子曰邦有道貧且賤焉耻也邦無道福且貴焉耻也古之人所以不恃其遺慶而果於遺安者非無意也以播之家世當元魏盛時行義致身奉公結主夫誰曰不然至孝文以後君日以冲政日以廢女主擅權賊臣竊柄四海囂然魏已不國矣播於斯時脩然遠覽覺積慶之不足憑而遺危之有可痛並辭台鼎之貴若漢之廣受誰能奪之乎迨至尒朱氏興弑君沉母扇毒萬類蓋已不可免矣故椿津之禍不獨慘於世隆誣搆之時而大著於元顯入洛之日不獨危於節閔詔下之後而並肇於孝莊侍中之前然則恭德愼行徒貽楷範之名而席權世寵深爲明哲之戒乎愽陵崔挺三世同居門有禮讓與弟振推讓田宅怡然不釋子孝芬孝暐孝演孝直孝政兄弟孝義慈厚孝演孝政先亡孝芬等哭泣哀慟絶内蔬食容貌損瘠見者傷之孝暐等奉孝芬盡恭順之禮坐食進退孝芬不命則不敢也鷄鳴而起旦叅顔色一錢尺帛不入私房吉凶有須聚對分給諸婦亦相親愛有無共之叔振既亡奉承叔母李氏若事所生旦夕温清出入啓覲家事巨細一以諮决每兄弟出行有獲財物尺寸已上皆内李氏之庫四時分賚李自裁之如此者二十餘歲撫從弟宣伯子朗如同氣焉録曰楊播之敦讓然而不有其家者以其世席權寵也崔挺之慈厚然而率保其宗者以其世乏津要也故曰可畏不可恃也君子何幸而遇邦有道士大夫有禮則風操高亮重於朝野若能以士大夫之禮反正無道之邦又何忠諒弼直之不足賴哉觀者各適其當而已隋書王凝常居慄如也子弟非公服不見閨門之内若朝廷然通嘆曰賢哉凝也御家以四教文行忠信正家以四禮冠婚喪祭非禮不動殆終身焉聖人之書必備及公服禮噐不假垣屋什物必堅朴曰毋苟費也門巷果木必方列曰毋苟亂也與人不受遺非其力不食饗食之禮無加物焉曰及禮可矣唐貞觀初太宗精脩治具房杜魏王之徒播厥師施文中子之制作將以大行凝嘆曰大哉兄之述乎以言乎皇綱帝道則大明矣以言乎天地之間則無不至焉天下有道聖人推而行之天下無道聖人述而藏之所謂流之斯爲川焉塞之斯爲淵焉升則雲施則雨潜則潤何徃而不利焉録曰凝之所見其逹於通之所擬乎何以知其然也夫龍門顯矣太平十二策之獻未能盡如吾意則不若守禮終身之爲高續經賢矣致治不世出之主未能悉用吾言則不若述而藏之之爲得此其所以房杜諸公並尊而不足長孫一人尼之而有餘固不若升則雲施則雨潜則潤與無徃不利之爲逹也唐史玄宗開元二十九年太尉寧王憲薨上哀惋特甚曰天下兄之天下也固讓於我爲唐太伯常名不足以處之乃謚曰讓皇帝其子汝陽王璡表述先志固讓不許録曰陸贄有言道合天謂之皇德配地謂之帝皆至尊之殊號極大之美名不可以虚拘矧可以餙讓乎帝廣因心之愛禁中拜跪如家人禮此天叙天秩之不可亂由之可也至以遜位之私情而輕無上之大號受之者惶恐而不安加之者悖理而可笑非所以爲重實所以爲褻未可爲後世法也宋傳李柬之肅之承之及之皆丞相迪子承之生而孤肅之鞠育誨導至於成人遂相繼爲侍從及遷龍圖直學士懇辭乞以授兄曰臣少鞠於兄且其爲待制十稔矣帝曰卿兄弟禮愛足厲風俗肅之亦當遷也即並命焉及之吏事精明所居官稱職嘗撰次唐史有益治體者爲君臣龜鑑柬之自少受知於㓂凖英宗即位富弼薦其學行帝勞之曰卿通議耆儒方咨訪以輔不逮豈止經術而已兼東宫侍讀賜穎王生日禮物故事王拜賜即退英宗諭王令留柬之食冀其從容以禮開導甫神宗登祚柬之即日請老自工部尚書拜太子太保致仕舊無閤門謝辭式特賜對延和命之坐仍置宴資善堂令講讀官皆賦詩勸勞甚渥又勑王珪叙其事子孝基亦位宫僚以親須養求監崇福宫凡就閑十年與父同謝事纔年五十士大夫稱美以比漢廷二䟽弟孝達進對神宗問起居狀並嘆以爲度越常人遠矣録曰胡明仲以二䟽之去知太子之不足恃未可以爲然也至於柬之父子豈非誠然乎哉神宗殉意自好甫臨大政即納安石之說恣變亂之謀而通曉國典之君子寧無措意乎哉厥後孝壽孝稱同一昆季未免爲章惇起獄京卞任權有媿於禮愛多矣此帝所以嘆其度越常人也吕大防兄大忠弟大鈎大臨同居相切磋論道考禮一本於古關中言禮學者推之嘗爲鄕約曰德業相勸過失相規禮俗相交患難相恤謝良佐教授秦州大忠每過之聼講論語必正襟歛容曰聖人言行在焉吾不敢不肅大鈎居諫議憂自始喪至於襄事一倣古儀所得爲者而居喪之節鉅細䂓矩于禮又推之祭祀冠婚飮酒相見慶弔之事皆不混於習俗粲然有文以相接人咸安而習之大臨通六經尤邃於禮每欲掇習三代遺文舊制令可施行不爲空言以拂世駭俗富弼致政于家爲佛氏之學大臨與之書曰古者三公内則論道於朝外則主教于鄕豈以爵位進退體力盛衰爲之變哉今大道未明人趨異學疑聖人爲未盡善輕禮義爲不足學此老成大人惻隱存心之時振起頽俗在公之力若夫移精變氣務求長年此山谷避世獨善其身之所爲豈以望於公哉弼深謝之録曰中庸曰君子之道造端乎夫婦藍田之社約至今猶有耿光者以蕡爲之父也其曰德業相勸過失相規者莫過於戒淺薄也而禮俗相交患難相恤可以相因而舉苟於帷簿之間行有所虧則凡鄉閭之内言皆罔信雖欲正五尺之童且猶不得何况堂堂之元宰乎抑關中之俗自周以來號爲篴古而橫渠之教頗亦有聞吕氏數公殆門墻之巨擘也其於禮學乎何有此又不可不知天順日録景泰辛未值上皇回鑾廷議迎復之禮率以虜人變詐不測爲辭祗欲遣一車兩馬迎之時給事中林聦上言今者虜酋也先畏天悔過祗奉鑾輿迎復之禮當用鹵簿大駕會禮部尚書胡濙出一簡與侍郞葉盛言内閣高學士穀所示大率皆懇切而言皇上之於太上誼則君臣親則兄弟迎復皆宜從厚欲以簡進庶知人心崇重之意靡間朝野吏部尚書王直亦賛曰此禮失而求諸野者宜以上聞獨王文以爲此匿名文書類耳事將寢聰毅然上奏王直胡濙皆腹心大臣事關大體當公論不宜私言於是以其簡進而上皇迎復之禮率得如儀皆聦之力云録曰周子云天下勢而已此重則彼輕自然之理也聖人治天下必使彼此無偏重之勢人己無向背之情聰惟有此議而後儲議隨之向使在廷人人若此必不如南内之錮東駕之更於是正監國之權明攝位之誼既可免他日奪門之患亦可逭異時郕戾之辜矣其於君臣兄弟何待禮失而求諸野哉弘道録卷之三十四
