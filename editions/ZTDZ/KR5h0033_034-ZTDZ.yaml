body:
  text: 智父子之智堯典帝曰疇咨若時登庸放齊曰㣧子朱啓明帝曰吁嚚訟可乎録曰此大聖之獨見度越於千古其所以傳賢而不傳子者决於此矣夫危㣲之間所凈毫末乃聖愚之所由分也開明之性近於道心然不能純乎天理則其發之於言必不能已於辯訟也可見聖人折理欲於毫芒之間苟有毫釐之不至未有不以開明爲睿辯訟爲才者而况於苗之碩子之惡乎以是爲典後世猶有智足以拒諌言足以飾非以爲天下盡出於己之下者然則朱也其超乎萬人之上矣史記帝乙三子長徴子啓次中行季受辛受辛即紂也紂之母爲后賢時紂尚少帝乙及后欲立啓爲太子太史據法爭之曰有妻之子不可立妾之子於是乃立紂録曰帝乙之事商家之不幸抑天命之當終也夫太史之爭天下之正法也是時紂母賢而子尚少帝乙寧知其亡國而預易之耶後世若扶蘇楊勇之事實人謀之不臧也抑商以一㣲子不能立而棄之而周乃更泰伯伯邑考皆舍長而立其次豈非天命之有在耶周古公三子長太伯次虞仲次季歷季歷娶太任乃賢德婦人生昌有聖瑞古公曰我世當有興者其在昌乎於是太伯虞仲知古公欲立季歷以傳昌乃亡如荆蠻文身斷髪以示不可復用古公卒季歷立是爲公季公季脩古公遺道篤於行義諸侯順之公季卒子昌立是爲西伯録曰升之爲卦也巽而順剛中而應是以大亨也周自古公以來以允升居於上而太伯仲雍以孚誠應於下於是王季得升其虚邑無所疑阻以至於西伯王業之興豈偶然哉向使太王無信順之明太伯乏巽應之智昌雖龍德剛中無所用矣可以見文王作易得於家傳身體其曰王用饗於岐山蓋實事也豈無徵之空言哉孔叢子穆公問於子思曰立太子有常乎曰有之公曰昔文王舍適而立其次㣲子舍孫而立其弟是何法也曰殷人質而尊其尊故立弟周人文而親其親故立子亦各有其禮也文質不同其禮則異文王舍適立次權也公曰苟得行權豈唯聖人唯賢與愛立也曰聖人不以權教故立制垂法順之爲貴若必欲犯何有於異公曰舍賢立聖舍愚立賢何好子思曰唯聖立聖其文王乎不及文王者則各賢其所愛不殊於適何以限之必不能審賢愚之分請父兄羣臣卜於祖廟亦權之可也録曰此大賢之言切中夫人之病萬世不可易也夫堯子開明舜子讓德苟非至聖孰能舍此而立彼乎而况後世之溺愛者乎茍無一定之限而人焉是狥其禍有不可勝言者矣至於卜雖古人不廢無亦權之不得已耳非智之得也左傳晋侯賞從亡者介之推不言禄禄亦弗及推曰獻公之子九人唯君在矣惠懷無親内外棄之天未絶晋必將有主主晋祀者非君而誰天實置之而二三子以爲已力不亦誣乎竊人之財猶謂之盗况敢貪天之功乎下義其罪上賞其姦上下相蒙難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食母曰亦使知之若何對曰言身之文也身將隱焉用文之是求顯也母曰能如是乎與女偕隱遂隱而死晋侯求之不獲以綿上爲之田曰以志吾過且旌善人録曰介推之棄綿上也不智於晋之啓南陽歟夫温之難天未厭周子帶上悖不蒸亡將無日秦伯以爲功矣文乃攘爲己有異於乞醯一聞耳乃若崎嶇草昩一十九年之間初非一朝一夕之故介禄而弗及王章而可求哉雖然隱者其身也顯者其名也君子哉介子歟不然披以仇須以竊豈眞可無言歟言則寺而竪矣宜乎介子之不言也晋叔向之母妬叔虎之母美而不使其子皆諫母曰深山太澤實生蛟龍彼美懼其生龍蛇以禍汝也使徃視寖生叔虎美而有勇力樂懷子嬖之故反於難及叔向欲娶於申公巫臣其母曰子靈之妻役三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是將必以是大有也叔向懼不敢娶平公彊使娶之生伯石伯石始生子容之母走謁諸姑曰長叔姒生万姑視之及堂閩其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視録曰愚觀羊舌氏之母其智有足多未可以其姑而少之也夫上有聖世所以成之者逺内有賢妃所以助之者深有用世克明德端此乎係也而况殺天敗子曰國亡家之人乎禮世有刑人不娶盻可謂不能斷矣其愽識多聞乃其糠粃焉耳是以君子必務誠意正心脩身齊家一毫不可苟一事不可鈌嗣是而及於㣧毓未有不善者矣國語祁奚辭於軍尉公問焉曰孰可對曰臣之子午可人有言曰擇臣莫若君擇子莫若父午之少也婉以從令游有郷處有所好學而不戲其壯也强志而用命守業而不淫其冠也和安而好敬柔惠小物而鎭定大事有直質而無流心非義不變非上不舉若臨大事其可以賢於臣也臣請薦所能擇而君比義焉公使祁午爲軍尉没平公軍無秕政録曰愚觀祁奚之言與今寒士之教子何以異哉自少而壯而冠形容曲盡人之善爲嗣令一至此哉今人見一子弟若琬琰若瑚璉然夫誰不愛曰慕之而不知其優游涵養切磋琢磨乃心何如其惓惓也幸而如午至樂無紀又幸而如奚至公無嫌此父子之間恩如天地明如日月何但一軍尉哉抑觀晋之盛時若趙文子孤也而成物滋備范文子蒙也而敬讓聿崇及其衰也長如伯魯而一詞無措疆如智瑶而五賢凌人於此可驗匪特家運是關國祚實繇之矣矧今天下一統賢才大同而可不務預養乎通鑑趙簡子之子長伯魯次無恤將欲置後不知所立乃書訓戒之辭於二簡以授二子命之曰謹識之二年而問之伯魯不能舉一辭求其簡已亡之矣問無恤誦其辭甚習求其簡出諸袖中而奏之於是簡子以無恤爲賢立以爲後録曰趙簡子豈賢於智宣子乎宵之拾恤之置何其禍福之霄壞也彖曰需須也險在前也剛健而不陷其義不困窮矣夫以宵之狠在面瑶之狠在心豈不能須而得之歟三家分晋勢不並立乃剛愎自用陷於不義亡何日乎是故鞅之簡三年而後問所謂需於郊利用恒也恤之水三版而後决所謂需於血出自穴也古人之備難至矣禍福之自求審矣秦伐趙趙王求救於齊齊曰必以長安君爲質太后不可齊師不出大臣强諫太后怒曰復有言長安君爲質者必唾其面左師觸龍於是願見太后盛氣而需之入徐趨而謝曰老臣病足不得見久矣竊自恐太后體之有所苦也后曰老婦恃輦而行復曰食得母衰乎曰恃粥耳后不和之色稍解乃曰老臣賤息舒祺最少不肖而竊憐愛之願得補黑衣之缺以衛王宫后曰丈夫亦愛少子乎對曰甚於婦人后笑曰婦人共甚曰老臣竊以爲媪之愛燕后賢於長安君后曰君過矣不若長安君之甚左師曰父母愛其子則爲之計深逺常聞媪之送燕后也持其踵而位祭祀則祝之必勿使反豈非爲之計長久以爲子孫相繼爲主也耶太后曰然左師曰今三世以前至於趙王之子孫爲侯者其繼有在者乎曰無有曰此其近者禍及身逺者及其子孫豈人主之子侯則不善哉位尊而無功奉厚而無勞今媪尊長安君而封之以膏腴之地多與之重器而不及今令有功於國一旦有不諱長安君何以自託於趙哉太后曰諾恣君之所使之於是爲長安君約車百乘爲質於齊齊乃出師秦爲之退録曰左師之悟后與四皓之安劉伊川並載程傳果然乎曰不然也夫左師之諌從容不迫出於愛之間始終不外其良心此所謂納約自牖以通其一念之蔽者也吕后以澤而刼良故良以四皓而刼帝此所謂濡有衣袽以濟其一時之急者也嗚呼安有身居大位而使天下之人延頸願爲太子死者哉故帝之從善若轉圜天資之美也泛應多謬悞不學之過也列女傳楚令尹孫叔敖之母也叔敖爲兒時出遊見兩頭蛇殺而埋之歸見其母而泣焉母問其故對曰吾聞見兩頭蛇者死今兒出遊見之其母曰蛇今安在對曰吾恐他人復見殺而埋之矣母曰汝不死矣夫有陰德者有陽報德勝不祥仁除百禍天之處高而聼卑書不云乎皇天無親惟德是輔尔嘿矣必興於楚及長爲令尹君子謂叔敖之母知道德之次詩云母氏聖善此之謂也録曰甚矣叔敖之母之聼之𦖟也夫始見之詞未必其可喜也一變之間氣度自不俟矣其陰德之報未可必然而聖善之智古所未有益以信君子之立心不可殘民害物一蛇恐再况於恣人行暴乎趙將馬服君奢之妻括之母也秦攻趙孝成王使括爲將其母言於王曰括不可使王曰何以曰始妾事其父父時爲將身所奉飯者以十數所友者以百數大王及宗室所賜幣帛盡以與軍吏士大夫受命之日不問家事今括爲將東向而朝軍吏無敢仰視之者所賜金帛𡚖盡藏之乃日視便利田宅可買者王以爲若其父乎父子不同執心各異願勿遺王曰吾計已决矣母曰王終遣之即有不稱妾得無隨坐括旣行趙兵果敗括死軍覆以母先言故卒不加誅録曰括之不可使將也其父知之其母亦知之所不知者君耳是時六國以其游魂殘喘自取覆亡故先失其是非之本心且不勝欲速無暇反而顧之耳此孟子所以深嘆於天作孽猶可違自作孽不可活也漢書棠邑侯陳嬰之母始嬰爲東陽令史居縣素有恩人稱爲長者秦二世時東陽少年殺縣令相聚數千人欲立長帥乃請嬰嬰謝不能强立之欲以爲王其母曰我爲子家婦聞其先故不甚貴今暴得大名不祥不如以兵屬人事苟成猶得封侯敗則易以亡可無爲人所指名也嬰從其言以兵屬項梁梁以爲上柱國項氏敗嬰後𡚖漢果以功封棠邑侯丞相安國侯王陵之母陵始爲縣邑豪高祖微時凡事之及起沛陵亦聚黨數千逮封漢王遂以兵屬之時項羽與漢爲敵計得陵母輙置軍中陵使至則東嚮坐其母欲以招陵既而陵母私送使者泣曰爲妾語陵善事漢王漢王長者無以老妾故懷二心言畢伏劍而死陵後與高祖定天下位至丞相封侯傳爵五世録曰范增於是乎可愧矣夫項羽之不可輔婦人女子皆知之矣悲夫七十餘年之老其生也餒於陳母而亡也恧於王媍乎使增能勸羽踐入關之約存鴻溝之界則不絶項氏之祀明天亡之意迴舞劍之戈則亦不失項伯之封二者胥失之豈其智弗若歟雖然二母之見順而易范增之事逆而難君子丁艱難亢會之際其亦幸而爲二子用成賢母之名不幸而爲范增徒歸天下之惡哉史記鼂錯爲人陗直刻深文帝時以上便宜擢爲太子家令以其辨得幸太子號曰智囊數上書言削諸侯事及法令可更定者文帝不聽然奇其材遷中大夫太子善錯計策及既位以爲内史數請間言事輙聽寵幸傾九卿法令多所更定丞相申屠嘉不便常以計欲誅錯不遂以此愈益貴遷爲御史大夫悉求請諸侯之罪過收其支郡所更令三十章諸侯皆諠譁錯父聞之從潁川來謂曰上初即位爾爲疏用事侵削諸侯疏人骨肉人口議多怨何也錯曰固也不如此天子不尊宗廟不安父曰嗟乎劉氏安而鼂氏安矣遂飮藥死曰吾不忍見禍及其身死十餘日吴楚七國果反録曰愚觀史記所稱智囊有二然各有所蔽樗里子蔽於胡洐晁錯蔽於袁盎豈其好智不好學歟雖然錯之欲削諸侯庶幾國爾忘身之義翻身受戮爲天下笑疾之親重卒能全軀以歸於渭南章臺之中漢景帝反不及秦昭王亦明矣若乃錯父之見其將晩乎河南太守嚴延年之母生五男皆至二千石人曰萬石嚴嫗延年爲太守所在名爲嚴能冬月傳屬縣囚論府下流血數里號曰屠任其母常從東海來到洛陽適見大驚止都亭不肯入府因責數延年曰幸備郡守不聞仁義教化有以全安愚民顧乘刑罰多殺人欲以致威豈爲民父母之意哉天道神明人不可獨殺我不自意當見壯子被刑戮也行矣去汝東歸掃除墓地耳後歳餘太府丞所章結延年罪十餘事下御史案驗遂得棄市東海莫不賢智其母録曰嗟嘆嚴母之不古若也夫胎教之與三遷乃古之賢母所以預養是心而廣爲仁之術也顔母果能密察延年之所存養其不中抑其大過必使童而習之長者之風純如也壯而行之哀矜之情咸若也苟心之無忍雖賞之不殘爲有號稱屠伯而可全身者哉實受除墓之慘虚傳賢智之名顔母之不古若也悲夫京兆尹隻不疑之母慈明善教不疑爲京尹行縣録囚徒還其母輙問所平反活幾何人即不疑言多所平反母喜笑飮食言語異於他時或言無所出母怒爲之不食故不疑爲使嚴而不殘君子謂是母也可謂永錫尔類者矣録曰愚觀不疑之母異於延年之母也夫教貴乎豫也不疑不辯亡金固非屠伯之比母慈明善教亦無除墓之憂子善其名母貽其慶豈非既明且哲乎後漢書吴祐父恢爲南海太守祐年十二從父到官恢欲殺青簡以寫經書祐諫曰今大人踰越五嶺逺在海濱其俗誠陋然舊有珍恠上爲國家所疑下爲權戚所望此書若成載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間誠先賢所愼也恢乃止撫其首曰吴氏世不乏季子矣及長有知人之明舉孝廉爲膠東相以身率物吏不忍欺嗇夫孫性私賦民財市衣以進其父父得而怒促𡚖伏罪性慙懼詣閣持衣自首祐曰掾以親故受迂辱之名所謂觀過斯知仁矣使𡚖謝其父還以衣遺之録曰觀光則趙廣漢之鈎距與張敝之絮舜有所不由矣此天性之明智不待教者也録之晋書陶侃父丹母湛氏丹仕吴爲揚武將軍湛爲側室生侃而陶氏貧糼績以資使交結勝已鄱陽孝廉范達寓宿於侃時大雪乃截髪得雙髪以易酒肴樂飮極歡雖僕從亦過所望至徹所卧薪自剉給其馬甫侃監源梁於潯陽以一坩鮓遺母封還責之曰尔以官物遺非惟不能益反以增吾憂矣逵聞之歎息曰非此母不生此子薦於廬江太守張夔夔辟之後以軍功爲江夏太守加鷹揚將軍備威儀迎母郷里榮之周顗父浚母李氏字絡秀浚爲安東將軍有人倫鑒識嘗出獵遇雨止李氏家會其父兄他出絡秀聞貴人至與一婢於内宰猪羊具數十人之饌甚精辦而不聞人聲浚恠使覘之獨見一女子甚美因求爲側室其父兄不許絡秀曰門户殄瘁何惜一女若連姻貴族將來庶有大益遂許之生覬及嵩謨三子並列顯位嘗冬至置酒舉觴賜三子曰吾本渡江托足無所不謂推㣧華宗爾等並貴列吾目前吾復何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識闇如乘人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言録曰愚觀陶士行周伯仁之母可謂敏而逹矣且同出於㣲爲側室固不係於世類也特以剪髪與治具之事或頗疑之夫一髪之㣲寧值幾何而能樂飲極歡一女之弱倉卒無幾而兼屠宰畢備乎豈其賢聲素聞雖至剉髪無靳精辦素著雖兼數人不辭而後遂以爲實事乎若乃降精嵩獄著名屏翰雖乃人謀實天意存焉不可得而測度之也弘道碌卷之四十一
