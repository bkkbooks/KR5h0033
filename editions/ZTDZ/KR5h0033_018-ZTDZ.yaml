  text: 弘道録卷之二十五将二
  hash: sha256:5ec7cff52beb1b234a86d6b699046ae6202cd7f7c40e6b88e7b8bf7fd10286ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_SJB_018-350172b, image: sjb/35/350172b.png}
body:
  text: 義朋友之義孟子曰用下敬上謂之貴貴用上敬下謂之尊賢貴貴尊賢其義一也録曰夫所謂之泰者非堯舜之時乎何以爲上下交也夫爾我並立勢相等倫朋友之道狹矣充其道必若以天子友匹夫而不爲誳匹夫友天子而不爲僣然不詳扵天道祗見用下敬上者順而易用上敬下者逆而難孰肯輕身以先於匹夫哉然亦有下堂而見諸侯者此不得謂之尊賢而當時之所謂賢者舍孔孟均之諂與瀆也故孔子守拜下之禮孟子闈尊賢之義其意一而已矣說命台小子舊學于甘盤既乃遯于荒野入宅于河自河祖毫暨厥終罔顯爾惟訓于朕志若作酒醴爾惟麯糵若作和𦎟爾惟鹽梅爾交脩予罔予棄予惟克邁乃訓録曰兊之爲卦也兩澤相麗君臣胥悅也兩澤相麗者交相滋潤互有浸灌之益君臣胥悅者交相勸勉共饗太平之休故其象爲朋友講習其道爲學焉後臣然其始也以陽爻居體而最下故舊勞于外至于啇兊未寧故又遯于荒野入宅于河及其至也上感天象下順人心介然有喜而慶澤無不流矣此高宗之治所由成也若使牽於和兊之吉狃扵來兊之㓙及其至也引其邪兊之私則陰盛傷消小人衆而君子獨其禍有不可勝言者矣此九五之君不可不競競而儆懼也聖人著於詞曰孚于剥有厲吁不可爲殷鑒乎洪範惟十有三祀王訪于箕子曰嗚呼箕子惟天陰隲下民相恊厥居我不知其彜倫攸叙箕子乃言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彝倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彝倫攸叙初一曰五行次二曰敬用五事次三曰農用八政次四曰恊用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極一五行一曰水二曰火三曰木四曰金五曰土水潤下火炎上木曲直金從革上稼穡二五事一曰貌二曰言三曰視四曰聼五曰思三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司㓂七曰賓八曰師四五紀一曰歳二曰月三曰日四曰星辰五曰曆數五皇極皇建其有極歛時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直會其有極歸其有極六三德一曰正直二曰剛克三曰柔克七稽疑乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰晦凡七卜五占用二愆忒八庶徴曰雨曰暘曰燠曰寒曰風曰時五者來備各以其叙庶草蕃蕪一極備㓙九五福一曰壽二曰富三曰康寧四曰攸好德五曰考終命六極一曰㓙短折二曰疾三曰憂四曰貧五曰惡六曰弱録曰此皇極敷言之訓箕子以告武王得道統之傳者在是不可以泛然目之也彝者至常而不可易之謂也洪者至大而不可窮之謂也倫者殷因於夏周因於殷理之一定也範者禹以是傳之湯湯以是傳之文武周公法之大同也此非箕子莫之能得非武王莫之能聞而遂以傳之天下萬世爲人君者其可不知哉禮運昔者仲尼於蜡賓事畢出遊於觀之上喟然而嘆言偃在側曰君子何嘆孔子曰大道之行也與三代之英丘未之逮也而有志焉大道之行也天下爲公選賢與能講信修睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長矜寡孤獨廢疾者皆有所養男有分女有歸貨惡其棄於地也不必藏於己力惡其不出於身也不必爲己是故謀閉而不與盗竊亂賊而不作故外户而不閉是謂大同今大道既隱天下爲家各親其親各子其子貨力爲己大人世及以爲禮城郭溝池以爲固禮義以爲紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以立田里以賢勇智以功爲已故謀用是作而兵由此起禹湯文武成王周公由此而選也是謂小康録曰夫子何以有是嘆也中天下而立定四海之民君子欲之故有是嘆也何以必於偃也蓋偃以禮樂爲治者也禮樂之治大用之則爲大同小用之則爲小康大同者視天下爲一家中國爲一人千萬世爲一日小康者期月而已可也三年有成可也吾其爲東周亦可也非偃何足與有言哉或疑以爲非夫子之言則過矣顔淵問爲邦子曰行夏之時乘殷之輅服周之冕樂則韶舞放鄭聲遠佞人鄭聲淫佞人殆録曰孔子之嘆大道之行與三代之英者豈徒誦說向慕而已哉其所以斟酌於𦚾中反覆於念慮必有百王不易之大法千古常行之大道故他日又語淵曰用之則行舍之則藏惟我與爾有是夫夫用之者大則爲唐虞次則爲三代非小小措置而已此孔門切磋之義有關於天下國家最切萬世之下不可以虗文視之也故以繼四聖之後焉宣王命樊侯仲山南築城于齊而尹吉甫作詩送之曰天生蒸民有物有則民之彝倫好是懿德天監有周昭假于下保兹天子生仲山甫仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦王命仲山甫式是百辟纘戎祖考三躬是保出納王命王之喉舌賦政于外四方爰發肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪懈以事一人人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏强禦人亦有言德輶如毛民鮮克舉之我儀圖之雖仲山甫舉之愛莫𦔳之衮職有闕維仲山甫補之仲山甫出祖四牡業業征夫捷捷每懷靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懷以慰其心暴公爲卿士而譛蘇公故蘇公作詩以絶之曰彼何人斯其心孔難胡逝我梁不入我門伊誰云從惟暴之云二人從行誰爲此禍胡逰我梁不入唁我始者不如今云不我可彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天彼何人斯其爲飄風胡不自北胡不自南胡逝我梁秪覺我心爾之安行亦不遑舍爾之急行遑脂其車一者之來云何其旴爾還而入我心易也還而不入否難知也一者之來俾我祗也伯氏吹壎仲氏吹箎及爾如貫諒不我知出此三物以詛爾斯爲鬼爲蜮則不可得有靦面目視人罔極作此好歌以極反側王氏曰暴公不忠於君不義於友所謂大故也故蘇公絶之然其絶之也不斥暴公言其從行而已不著其譛示以所疑而已既絶之矣而猶告以一者之來俾我祗也盖君子之處己也忠其遇人也恕使其由此悔悟更以善意從我固所願也雖其不能如此我固不爲已甚豈若小文夫然哉一與人絶則醜詆固拒唯恐其復合也録曰樊與尹暴與蘇皆王朝卿士而義則朋友也其詩或如清風或如飄風盖天下有道人皆好德而夙夜匪懈譬則天高日朗自不覺其暢然也天下無道爲鬼爲蜮而讒口交張譬則波蕩風靡亦不覺其異態也二風作周道别矣所以謂能興觀者如此通鑑王將殺杜伯而非其罪伯之友左儒爭之九復之而不許王曰汝别君而異友也儒曰君道友逆則順君以誅友友道君逆則師友而違君王怒曰易而言則生不易則死儒曰士不枉義以從死不易言以求生臣能明君之過以正杜伯之無罪王殺杜伯左儒死之録曰杜伯之事不可考然以一死而爭之九復左儒可謂篤於義矣雖然别君而異友則廢友友道而君逆則違君無己歸過於己以代之乎將并死而無益乎左傳士伯士會荀林父皆晋卿也伯之使秦以召公子雍也荀林父止之曰夫人太子猶在而外求君此必不行盍以疾辭不然將及攝卿以徃可也何必子同官爲寮敢不盡心乎弗聼爲賦板之三章又弗聼及趙盾背士伯立靈公士伯亡荀伯盡送其帑及其噐用財賄於秦曰爲同寮故也録曰荀伯之論善矣何以不於公朝言之而私議於蔑歟衰與盾父子秉政乃心晋室立長之議既大頼秦之心方堅賈季一召公子樂使人殺之季之出奔正以此歟六年晋狐射姑殺陽處父出奔傅以爲侵官又以爲漏言皆非是嗚呼不聞蒭蕘之言卒起令狐之禍重釁疊難晋之喪亡亦幾矣所謂我即爾謀聼我囂囂正以爲盾也惜乎無以語之及先蔑奔秦士會從之在秦三年不見其人曰能亡人於國不能見於此焉用之士會曰吾與之同罪非義之也將何見焉及歸遂不見録曰此隨會所由返國而士伯所以無宗歟夫伯晋之正卿其徃秦也夫人太子猶在既不能直言匡諫以伸匪躬之義及荀伯之諌又不能見幾而作以盡寮友之情進退皆無所據矣使士會拘于小節不知自愛憧憧徃來朋從爾思則失其正固之道不能無成有終矣故易曰未感害也其用意深哉史記管夷吾鮑叔牙者友也夷吾少困時爲鮑叔賈分財多自與鮑叔不以爲貪知其貧也爲鮑叔謀事而大窮困鮑叔不以爲愚知時有利不利也三仕三見逐於君鮑叔不以爲不肖知不遭時也三戰三敗鮑叔不以爲怯知其有老母也所事公子糾敗幽囚受辱鮑叔不以爲無耻知其不羞小節而耻名不顯於天下也故夷吾嘗曰生我者父母知我者鮑叔也藺相如完璧歸趙王以爲上卿位在廉頗之右頗曰我見相如必辱之相如聞之每朝常稱病不出或望見輙引車避匿其舍人以爲耻相如曰子視廉將軍孰與秦王夫以秦王之威而相如廷叱之辱其群臣相如雖駑獨畏廉將軍哉顧吾念之彊秦之所以不敢加兵於趙者徒以吾兩人在也今兩虎共闘其勢不俱生吾所以爲此者先國家之急而後私讎也廉頗聞之肉袒負荆至門請罪遂爲刎頸之交録曰自管鮑廉藺之名著古今莫不以爲羙談也然觀其所論廼在血氣用事之間非有道德仁義之羙所謂王期於王霸期於霸大抵如此雖然世衰道㣲時則有若孫龐范魏蘇張之徒徃徃折脇刖足甘心盡命以圖報復時君不悟又爲之聚怨酬恩一毫不爽譬則閭閻之稚爾汝相戲而報施不稱不免鬨然而怒使其父母賢也爲之謝過不賢未有不爲里閈之羞者然則四子之事其賢矣乎魯仲連者好奇偉俶儻之策不肯仕宦任職以其高節遊於諸侯趙孝成王時秦兵圍邯鄲魏安釐王使將軍晋鄙救趙畏秦止於蕩陰不進使客新垣衍因平原君說趙欲共尊秦爲帝以却其兵仲連聞之徃見衍曰彼秦者棄禮義而上首功之國也彼即肆然而爲帝則連有蹈東海而死爾不願爲之垊也今秦萬乘之國也梁亦萬乘之國也從而帝之秦將行天子之事以號令天下變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛梁王安得晏然而已乎衍起再拜曰吾乃今知先生天下之士也不敢復言帝秦矣録曰魯連之不肯帝秦其志則大矣其號則不可也曷不曰天尊地卑乎周天子也秦諸侯也列國亦諸侯也以周在上而復帝秦是太陽之尊下同萬物蒼生何由仰照連有蹈東海而死爾豈不名正而言順哉或曰戰國所趨者利所避者害也苟不爲利秦之貪何由塞不有害諸侯之救何由至哉曰非然也蓋秦嘗帝矣稱而復否無所措手足也苟不畏天無二日民無二王之義何至却軍五十里乎或曰連之言前後不倫豈太史之迷作乎要之鄒魯守禮義之國孟氏醇乎醇者也連與兩生大醇而小疽趙良見商君商君問曰子觀我治秦孰與五羖大夫賢趙良曰千人之諾諾不如一士之諤諤僕請終日正言而無誅可乎商君曰諾趙良曰五羖大夫荆之鄙人也穆公舉之牛口之下加之百姓之上秦國莫敢望焉相秦六七年而東伐鄭三置晋君一救荆禍其爲相也勞不坐乘暑不張盖五羖大夫死秦國男女流涕童子不歌謡舂者不相杵今君之從政也陵轢公族殘傷百姓公子虔杜門不出已八年矣君又殺祝驩而黥公孫賈詩曰得人者興失人者崩此數者非所以得人也君之危若朝露而尚貪商於之富寵秦國之政畜百姓之怨秦王一旦捐賔客而不朝秦國之所以收君者豈其㣲哉商君弗從居五月而難作録曰以啇君之威而容趙良之說豈其未泯之良心與虎狼暴矣食人而號欲生之德無乎不有也特不勝其慾焉耳啇君之始也豈遽欲爲虐一至此乎亦不勝其慾之心不如是不足以動孝公而饗目前之大利至於身之大患亦較然明矣則雖正言而何誅哉惜乎良之說有未盡也夫鞅之廢井田開阡陌其罪上通于天先王之法至是而殆盡者果誰之尤乎雖擢髮不足以數之諤諤而可盡耶雖然良無足恠蘇氏號爲賢者以車裂爲足以報其亡秦之罰然則先王之法置而不問可乎東漢傳嚴光少有高名與光武同游學及即位乃變姓名隱身不見帝思其賢物色訪之齊國上言有一男子披羊衷釣澤中帝疑其光乃備安車玄纁遣使聘之三反而後至舍於北軍給牀縟大官朝夕進膳司徒侯霸與之素舊遣使奉書曰聞先生至欲即諧造迫於典司是以不獲願因日暮自誳語言光不答但投札與之曰君房足下位至鼎足甚善懷仁輔義天下悅阿諛順㫖要領絶霸得書奏之帝笑曰狂奴故態也車駕即日幸其館光卧不起帝即光卧所撫其腹曰咄咄子陵不可相𦔳爲理耶不應良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎帝曰子陵我竟不得不汝耶於是升輿嘆息而去復引入論道舊故相對累日帝從容問曰朕何如昔時對曰陛下差增於徃因共偃卧光以足加帝腹上明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共卧耳除爲諫議大夫不屈乃耕於富春山後人名其處爲嚴陵瀨焉録曰愚觀嚴光所以不可留者有五而三公不與焉夫不觀孔子無以見仁義之中正不參孟子無以達去就之權衡光雖不効已甚之行而有何至相迫之言此不見諸侯之義也矧乃變姓名漁澤中乎若是着羊裘誠有心矣一也及其至也以故人招之惟當以故人處之亦義也夫大夫之招招虞人虞人死不敢徃然則故人之招招諌議故人其可留乎二也魯繆公無人乎子思之側則不能安子思彼侯霸何爲者哉觀其曰阿諛順㫖要領絶與責子絶長者同義而謂可留乎三也貴易交富易妻帝尚不難於言而能久而敬者鮮矣四也愽士如范升客星如太史一薛居州獨能相助爲理乎五也向使尊以三公不過書名雲臺一世之士而釣臺崔巍萬世之士易不云乎君子幾不如舍其斯子陵之謂乎廉范與洛陽慶鴻初爲刎頸交人稱前有管鮑後有慶廉時隴西太守鄧融備禮謁范爲功曹後融爲州所舉案徴下獄范乃變姓名求代廷尉獄卒衛侍左右盡心勤勞後又辟公府會薛漢坐誅故人門生莫敢視范獨收歛其尸侯吏以聞顯宗大怒召見責曰薛漢與楚謀反范公府椽不與朝廷同心而反收歛罪人何也范叩頭曰臣無狀以爲漢等皆以伏誅不勝師資之情帝稍解曰卿廉頗後邪與右將軍裒大司馬丹有親屬乎對曰裒臣之曾祖丹臣之祖也帝曰恠卿志膽敢爾因貰之由是顯名世居邉郡廣田地積財粟悉散以賑宗族朋友值肅宗崩范奔赴敬陵適廬江椽嚴麟奉章弔國塗深馬死不能自進范見而愍之命從騎與之馬不告而去麟事畢不知所歸或謂曰故蜀郡太守廉叔度好周人急今奔國喪獨當是爾遂牽馬造門果然因謝而歸之録曰吏稱亷范以氣俠立名觀其賑危急赴險阸有足壯者亦足以信意而感物矣明帝加怒以發其志始以就戮更延其寵古今所罕聞也若乃五桍之事人或能之故不列云桓帝初爲蠡吾侯受學於甘陵周福及即位擢福爲尚書時同郡河南尹房植有名當朝鄉人爲之謡曰天下規矩房伯武因師獲印周仲進後汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊二郡謡曰汝南太守范孟愽南陽宗資主畫諾南陽太守岑公孝弘農成瑨但坐嘯因此流言傳入太學諸生三萬餘人郭林宗賈偉節爲其冠並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏彊禦陳伯舉天下俊秀王叔茂並危言深論不隱豪强自公卿以下莫不畏其貶議屣履到門録曰孟子稱伊尹管仲學焉後臣然則因師獲印何足異哉漢自桓榮稽古所謂學與師者不過專門章句卒無啓心沃心之益一旦規模楷範屬之他人而因師獲印無足多尚顧不知自反而乃互相譏揣各樹朋徒此何謂哉夫以帝王莫如學學莫如務求師至於同心同德信任不疑又君子之所深幸興學育才至於三萬亦後世之所罕逢不以成頌而反以成隙盖光武以詞說興故亦以言㫖衰而爲之謡者雖曰出於偶然其殆莫之爲而爲也歟時天下名士爲之稱號上曰三君次曰八俊次曰八顧次曰八及次曰八厨猶古之八元八凱也竇武劉淑陳蕃爲三君君者言一世之所宗也李膺荀昱杜密王暢劉佑魏朗趙典朱寓爲八俊俊者言人之英也郭林宗宗慈巴蕭夏馥范滂尹勳蔡衍羊陟爲八顧顧者言能以德行引人者也張儉岑晊劉表陳翔孔昱范康檀敷翟超爲八及及者言其能導人追宗者也度尚張邈王考劉儒胡母班秦周蕃嚮王章爲八厨厨者言能以財救人者也録曰八元八凱身尊道高顧厨俊及身誳道喪何懸絶之若此乎盖三代以上政出於一而賢能爲實用季世政岀於二而才藝爲忌端周禮冢宰以八柄詔王馭群臣奚容岐而二之哉若使彼子而此奪彼廢而此置彼生而此殺雖堯舜不可一日居况桓靈之世乎學校者禮義之所出非威辟之所關也孔門弟子記顔淵等十人而并目其所長分爲四科當時不以爲異後世不以爲嫌未聞其招禍也苟不在其位不謀其政惟以禮義廉耻互相維持則顧厨俊及之名豈可少哉豈可少哉李膺性簡亢無所交接唯以同郡荀淑陳寔爲師友荀爽嘗就謁膺因爲其御既還喜曰今日得御李君矣其見募如此時張讓弟朔爲野王令貪殘無道至乃殺孕婦聞膺厲威嚴懼罪逃還京師匿讓第藏於合柱中膺知其狀率吏卒破柱取朔付洛陽獄受辭畢即殺之讓訴冤於帝詔詰以不先請便加誅辟之意膺對曰昔仲尼爲魯司㓂七日而誅少正卯今臣到官己積一旬私懼以稽留爲愆不意獲速疾之罪帝顧謂讓曰此汝弟之罪司𨽻何愆乃遣出之自此諸黄門常侍皆鞠躬屏氣休沐不敢復出宫省帝恠問其故並叩頭泣曰畏李校尉是時朝廷日亂綱紀頽弛膺獨持風裁以聲名自高士有被其容接者名爲登龍門録曰愚觀膺之破柱成獄臨軒正詞至今凛凛猶有生氣矧一時閹堅寧不竦然屏氣乎然不知維辟作福維辟作威威福之柄自上而下吾從而執之所威者天下之威所福者天下之福由朝廷逹於天下夫誰曰不然時皇德不綱宦濁同軌而膺獨持風采其所子奪廢置與朝廷曾不相及則是威福之柄自我而將非自上而下也故小人得以指而爲辭謂更相㧞舉迭爲唇齒有不合者見則排斥嗚呼彼不合者正耶邪耶㧞舉者是耶非耶彼之非帝初不覺而我之是上莫與知於是正者反以爲邪而邪者得以害正矣然則坐視而不救可乎否之九四曰有命無咎疇離祉象曰有命無咎志行也故君子寧正辭直言以誅姦雄討亂賊無寧專殺擅誅以同儔殃善類歟范滂少厲清節爲州里所服舉孝廉光禄四行時冀州饑荒盗賊群起乃以滂爲清詔使案察之滂登車攬轡慨然有澄清天下之志及至州境守令自知臧汙望風觧印綬去其所舉奏莫不厭塞衆議及黨獄起桓帝使中常侍王甫辯詰以次及滂滂曰臣聞仲尼之言見善如不及見惡如探湯將欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以爲黨古之循善自求多福今之循善身蹈大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊甫愍然爲之改容録曰愚觀孟愽之對未嘗不潸然流涕也禹之言曰堯舜之民皆以堯舜之心爲心方是時也九官十二牧濟濟相讓充滿于廷天下未嘗不同以爲清也四㓙之罪投竄誅殛曾不少貸天下未嘗不同以爲汙也如使善而不清何貴於善惡而不汙何賤於惡以至於春秋之時雖曰人心不古然而三都之墮少正之戮不遺餘力故又曰見善如不及見不善如探湯斯民也三代之所以直道而行也嗚呼何不幸而生於孟愽之世耶不旋踵間外兵内亂重釁疊禍危亡無日此豈天之降喪哉人之貪亂寧爲荼毒其實盖不可逭也已弘道録卷之二十五大明萬曆三十五年二月十五日奉㫖續刊印施正一嗣教大眞人臣張國祥校
