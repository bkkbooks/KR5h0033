  text: 弘道録經二
  hash: sha256:7b6470c314d6955fd39931873284938d5f07c90a33cadddae4db3b9e6d5e33bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_SJB_002-350008b, image: sjb/35/350008b.png}
body:
  text: 仁君臣之仁漢記孝文皇帝元年春詔曰方春時和草木群生皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽扵危亡而莫之省憂爲民父母將何如其議所以賑貸之録曰以元年之詔繼月令者漢承秦後人君之恩希闊寥落譬則天地閉塞而成冬也讀是若枯者復生絶者復蘇此何等氣象也益可以見生生之恩必無泯滅窮盡其淵哉爲世慮乎又曰老者非帛不煖非肉不飽今歲首不時使人存問長老又無布帛酒肉之賜將何以佐天下子孫孝養其親哉具爲令有司請令縣道年八十以上賜米人月一石肉二十斤酒五斗其九十以上又賜帛人二疋絮三斤録曰老吾老以及人之老帝可謂能舉斯心矣雖然西伯善養老非家賜而人益之也導其妻子教之樹畜帝知賜民老而使長吏閱視丞若尉與嗇夫令史二千石各遣吏廵行不稱者督之嗚呼何不制五畆之宅百畆之田而使長吏各屬分任其責乎十二月詔曰法者治之正也今犯法已論而使無罪之父母妻子同産坐之及爲收拏朕甚不取其除收孥相坐律令録曰孟子之稱文王必曰罪人不孥帝雖未能究竟擴充然而漢之元氣勃勃然矣賈山所以謂山東布詔令民雖老嬴癃疾扶杖而徃聽之願少須臾毋死思見德化之成者如此二年秋九月詔曰農天下之大本也民之所恃以生也而民或不務本而事末故生不遂朕憂其然故今兹親率群臣耕以勸之其賜天下今年田租之半録曰此帝用賈誼之言也夫誼通達國體者也豈不知背本趨求之故歟任民所耕不限多寡遂致豪右兼並貧民逐末此探本之論也末技遊食之民非不欲歸耕也無立錐之地則何所措乎足耶有國者可不務變通乎誼嘗勸立漢制更秦法言而無益故就帝之所及語之而帝愛民之性出扵天也其親耕以率天下而賜民田租之半豈非千古之美談歟然不知自識者觀之祗以爲豪右勸耳而小民亦不過爲有力者所使非三代勸農之道也十二年春詔曰道民之路在扵務本朕親率天下農十年于今而野不加辟歲一不登民有饑色是從事焉尚寡而吏未加務也吾詔書數下歲勸民種樹而功未興是吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省憂將何以勸焉其賜農民今年田租之半録曰此帝用晁錯之言也夫錯刻薄寡恩之人也猶能知務家貴粟之道其募民入可支一歲遂再賜民田租之半後世募民入粟頻歲但行未能若是何也盡文帝之募民以爲恨也後世之募民以爲已也彼以無窮之財供有陰之用而此以有限之財恣無窮之用此其所以異也十三年六月詔曰農天下之本務莫大焉今塵身從事之賦是謂本末者無以異也其扵觀農之道未憊其除田之租稅賜天下孤寡布帛䋈各有數録曰自是年爲始不收民租者十有餘歲豈非千古之罕傳歟益上窮脩玄默而將相少文多質是以史安其官民樂其業畜積歲增戶口寝息然則帝之富庶皆自已損之扵民無所益也夫豪強占田踰多筭收本半官除田租不賦而私家必取贏焉雖堯舜不能有所益也故君恩重扵三代而民間酷扵亡秦皆當時君臣不能深本而祇以資富強也可惜哉十六年春三月詔曰間者數年比不登又月水旱疾疫之災朕甚優之愚而不明不逹其咎意者朕之政有所失而行有過與乃天道有不順地得或不得人事多失和鬼神發不饗與何以致此將百官之奉餋或發無用之事或多與何其民食之寡之也夫度田非益寡而計民未加益以口量地其扵古猶有餘事扵末以害農者蕃爲酒醪以磨榖者多六畜之食焉者農與細大之意吾未能得其中其與丞相列侯吏二千石愽士議之有可以佐百姓者率意遠無有所隱也録曰文帝之爲民無以加諸也何以曰愚而未明乎夫相人君所以備顧問指迷觧感也有如張蒼者水土之不辨何以責其率意遠思哉夫一言以蔽之曰不患寡而患不均苟有均民之心以度田則給以計口則益何患古有餘而今不足哉徒知反躬而不知所以及徒苜過咎而不知所以過徒與丞相列侯吏二千石愽士議而不知所以議孟子不云乎若夫澗澤之則在君與子謮是而後下詔必有達其咎者孝景皇帝元年五月復收民田租三十而稅一録曰責文帝者春秋之義也録景帝者善善之心也景之扵文不自慊矣而三年無改扵父之道不可謂孝乎東漢光武六年年之制也文景之澤其長矣乎後二年夏四月詔曰雕文刻鏤傷農事者也錦繍纂組害女紅者也農事傷則飢之本也女紅害則寒之源也夫飢寒并至而能亡爲非者寡矣朕親耕后親桑以奉宗廟樂盛祭服爲天下先不受獻減大官省繇賦欲天下務農𠓙素有畜積以備灾害疆母攘弱衆母恭寡老者以壽終幼孤得遂長今歲或不登民食頗寡其咎安在或詐僞爲吏吏以貨賂爲市漁奪百姓侵牟萬民縣丞長吏也奸法與盗盗甚無謂也其令二千石各脩其職録曰以文景之時而乃有詐僞之吏貨賂漁奪無以異扵爲盗者何不責之輔相而獨令二千石各脩其職乎蓋自簫曹畫一之後陳平問錢穀不對反加稱善丙吉不問道傍死人以爲知體王陵一以正對則謝罷之亞夫奉帝如約則又罷之而陶青劉舍衛綰皆碌碌庸人何以責其裁成輔相以左右民哉故終漢之世無一相業可稱爲君者恣己之所施如摘植冥行亦安敢望其縣丞長吏之皆得其人哉三年春正月詔曰農天下之本也黄金珠玉饑不可食寒不可衣以爲幣用不識其終始間歲或不登意爲末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸采黄金珠玉者坐𧷢爲盗録曰景帝不作雕文刻鏤錦繡纂組及禁採黄金珠玉與文帝之敦朴無以異也二帝之所以致殷富之本正在扵此夫弛于民者有限而費于上者無窮苟弛其一而用其二雖有弛之之名其獘正如景帝之所戒者故必有坐𧷢爲盗之令而後有帶牛佩犢之風爲人上者不可以不察也漢書食貨志漢興自天子不得具鈞駟而將相或乘牛車齊民無盖藏天下已平高祖令賈人不得衣絲乘車孝惠高后時量吏禄度官用以賦扵民而山川園地市井租稅之入自天子以至扵封君湯沐邑皆各爲私奉養焉不領扵天下之經費漕轉山東粟以給中都官歲不過數十萬石繼以孝文孝景清淨恭儉安養天下七十餘年之間國家無事非遇水旱之灾民則人給家足都鄙廪庾皆滿而府庫餘貨財京師之錢累巨萬貫朽而不可校太倉之粟陳陳相因充溢露積扵外至腐敗不可食衆庶街巷有馬而阡陌之間成群乘犢牝者𢷤而不可聚會守閭閻者食梁肉爲吏者長子孫居官者以爲姓號故人人也雖然有高明光大之董子無以易好大喜功之世宗而少年才美之賈生安能勝多質少文之絳灌乎此伊周遇主湯文共濟咸有一德之難再也西漢循吏傳景帝時文翁爲蜀郡太守仁愛好教化蜀地辟陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有材者張叔等千餘人親自飭厲遣詣京師受業愽士數歲蜀生皆成就還歸文翁以爲右職用次察舉官有至郡守刺史者又脩起學官扵成都市中招下縣子弟以爲子弟爲除更繇高者以補郡縣吏爲孝弟力田常選學官僮子使在便坐受事每出行縣益從學官諸生明經𩛙行者與倪使傳教令出入閨閤縣邑吏民見而榮之數年爭欲爲學官弟子富人至出錢以求之繇是大化比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁爲之始後終扵蜀吏民爲立祠堂歲時祭祀不絶至今巴蜀好文雅文翁之化也録曰翁之力行有由然哉有由然哉夫謹庠序之教申之以孝悌之義乃王政之本也文景之鴻業惜乎獨少此耳天廼篤生此翁雖不當路扵漢繼世因之郡國皆立學官以至于今不但爲王者師亦可爲後世法矣立祠而祀之非偶然也越尉佗自立爲帝召貴佗兄弟以德懷之佗遂稱臣與匈奴結和親後而背入盗命邊備備守不發兵深入恐煩百姓吴王詐病不智賜以几杖群臣袁盎等諫說雖切常假僣納用焉張武受賂金錢覺更加賞賜以媿其心專務以德化民是以海内殷富思扵禮義斷獄數百幾致刑措嗚呼仁哉又曰孔子稱斯民三代之所以直道而行也信哉周秦之敝罔密之悛而軓不勝漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六十載之間至于移風易俗黎民醇厚周云成康漢言文景羙矣録曰詳讀二賛未嘗不撫然嘆息見先王之遺恩焉故備録之或曰然則可比扵三代之君否易曰窮理盡性以至扵命中庸曰其次致曲性之不可以已也如此夫剛柔未發之謂中發而皆中節之謂和其次則必自其發見之偏者而克之以極于天命之本然洪範所謂建用皇極又用三德是已是以古之聖王撫世酬物因時制眞陽以舒之陰以歛之執其兩端用其中扵民故能納天下扵皇極帝之天資回進扵是乃不能窮致事物之理推極本體之性愽求元聖與之同内以朝夕納誨啓心天心故其功用止扵一待固無以進于三伐黄霸明察内敏温良有讓自武帝用法深昭帝遵之以刑罰痛繩群下俗吏上嚴酷而霸獨寬和爲名宣帝垂意恩澤詔數下吏不奉宣霸爲太守選擇良吏分部宣布詔令令民咸知上意使郵亭鄉官皆畜雞豚以贍鰥寡貧窮者然後爲條教置父老師帥伍長班行之扵民間勸以爲善防姦之意及務耕桑節用殖財種樹畜養去食榖馬米鹽靡密初若煩碎然霸精力能推行之吏民見者語次尋繹問它陰伏以相參考嘗欲有所司察擇長年廉吏遣行屬令周密吏出不敢舍郵亭食扵道傍以霸具知其起居所問毫厘不敢有所隱鰥寡孤獨有死無以葬者鄉部書言霸具爲區處某所大木可以爲棺某亭猪子可以祭吏徃皆如言其識事𦖟明如此吏民不知所出咸稱神明姦人去入宅郡盗賊日少刀行教化而後誅罰務在成就全安之以是得吏民心户口歲增治爲天下第一天子以其治行下詔曰頴川太守霸宣布詔令百姓鄉化孝子弟弟眞婦順孫日以衆多田者讓畔道不拾遺養視鰥寡贍助貧窮或八年亡重罪囚吏民鄉于教化興扵行誼可謂賢人君子矣録曰孔子告哀公以其人存則其政舉其人亡則其政息孟子告齊梁之君皆雞豚狗彘之畜鰥寡孤獨之養諸君皆莫能行至漢而後黄霸力能任之可見聖賢之言有同日月人心之天無間古今政本蒲盧之易民無秦越之分惜乎限扵頴川不能徧于天下矧獨長扵治民劣扵輔相此治非三代効非聖賢所由分也龔遂忠厚剛毅有大節宣帝在位久之渤海左右郡歲饑盜賊並起二千石不能制上選能治者丞相御史舉遂爲渤海太守時年七十餘宣帝謂曰渤海廢亂朕甚憂之君何以息其盗賊遂對曰海瀕遐遠不霑聖化其民困扵饑寒而吏不恤故使赤子弄兵扵潢池中耳今欲使臣勝之邪將安之也上聞遂對甚說因曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切使宜從事上許焉郡聞新守至發兵以迎遂皆遣還移書屬縣悉罷逐捕吏諸持鉏鉤田器者皆爲良民吏毋得問持兵者乃爲盗賊單車至府郡中翕然盗賊亦皆罷㴾海又多劫掠聞遂教令即時解散棄其兵弩而持欽鉏扵是悉平民安土樂業乃開倉廪假貧民選用良吏尉安牧養焉遂見齊俗奢侈好末技不田作躬率以儉約勸民務農桑令口種一樹榆百本五十本葱一畦韭家二母彘五雞民有帶持刀劒者使賣劒買牛賣刀買犢曰何爲帶牛佩犢春夏不得不趨田畆秋冬課收歛益畜果實菱蘆勞來循行郡中皆有畜積吏民富實獄訟止息録曰龔遂之對古今之名言也帝稱信賞必罰吏稱民安乃此之類矣有如一實百虚何以言中興侔德商周乎嗚呼龔遂徃矣鉤鉏刀劒彘牛雞犢不與俱徃惟吾善懷而已有如户雞家歲帶牛佩犢猶患不治而口刀舌劒揮戈露刃遂使良民胥爲㓂仇獨何心歟獨何心歟召信臣以明經甲科視民如子所居見稱遷南陽太守爲人勤力有方略好爲民興利務在富之躬勸耕農出入阡陌止舍鄉亭稀有安居時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣溉灌歲歲增加多至三萬頃民得其利畜積有餘信臣爲民作均水約束刻石扵田畔以防分爭禁止嫁娶送終奢靡務出扵儉約府縣吏家子弟好游敖不以田作爲事輙斥罷之甚者案其不法以視好惡其化大行郡中莫不耕稼力田百姓歸之户口增倍盜賊獄訟衰止吏民親愛號曰召父杜詩少有才能建武中爲侍御史安集洛陽復使之河束誅降逆賊拜成臯令視事三歲舉政尤異遷南陽太守性節儉而政治清平以誅暴立威善扵計略省愛民役造作水排鑄爲農器用力少見功多百姓便之又脩治陂池廣拓田土郡内比室殷足時人方扵召信臣故南陽爲之語曰前有召父後有杜母録曰詩云豈弟君子民之父母吾聞其語矣未見其人也至是而始見焉豈非千古之一快乎東漢張堪志美行厲年十六受業長安諸儒號曰聖童世祖時徵拜騎都尉後領票騎將軍杜茂營繫破匈奴扵高柳拜漁陽太守捕繫姦猾賞罰必信吏民皆樂爲用匈奴當以萬騎入漁陽堪率數千騎奔擊大破之郡界以靜乃扵狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君爲政樂不可支視事分年匈奴不敢犯塞帝聞召見諸郡計吏問其風土及前後守令能否蜀郡計椽樊顯進曰漁陽大守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寳山積而堪去職之日乘拆轅之車布波囊而已録曰漢文帝有言曰吾得廉頗李牧而以爲將吾豈憂匈奴哉古之漁陽今京兆近郊之地也嘉靖中數産瑞麥如堪之所歌已有之矣如堪之所志世豈無其人乎行子曰人有不爲也而後可以有爲然則金寳山積何如麥穗兩枝耶君子可以自朂矣卓茂寬仁恭愛鄉黨故舊雖行能不同而皆愛慕欣欣焉遷密令勞心諄諄視人如子舉善而教口無惡言吏人親愛不忍欺之人常有言部亭長受其米肉遺者茂問之曰亭長從汝求乎爲汝有事囑之而受乎將平居自以恩意遺之乎曰徃遺之耳茂曰遺之而受何故言邪曰竊聞賢朋之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰汝爲蔽人矣凡人所以貴扵禽獸者以有仁愛知相敬事也汝獨不欲脩之寍能高飛遠走不在人間耶亭長素善吏歲時遺之禮也且歸念之扵是人納其訓吏懷其恩教化大行道不拾遺光武初訪求茂詔曰前密令卓茂束身自脩執節淳固誠能爲人所不能爲夫名冠天下當受天下重賞今以茂爲太傅封褒德侯録曰曄論曰建武之初雄豪方擾斯固倥偬不暇給之日卓茂斷斷小宰無他庸能而首加聘命優辭重禮其與周武式閭表位何以異哉然則雖以茂之醇德實上之至仁光武於是乎不可及矣魯恭拜中牟令專以德化爲理不任刑罰訟人許伯等爭田累守令不能决恭爲平理曲直皆退而自責輟耕相讓扵是吏人信服建初七年郡國螟傷稼大牙縁界不入中牟河南尹袁安聞之疑其不實使椽肥親徃廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察君之政迹耳今蟲不犯境此一異也化及鳥獸此二異也堅子有仁心此三異也還府具以狀白安是歲嘉禾生恭便坐廷平安因上書言狀帝異之録曰自漢至今千五百有餘年龔黄早魯之名未常泯滅不但生榮死哀而實超今邁古也唐宋以後難乎選矣弘道録終
