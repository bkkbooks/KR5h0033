  text: 弘道録卷之十九羅四
  hash: sha256:ece4755a728ea3bcccf712341f8a5352879b662f6bca5b4561fe0e94d04526d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_SJB_012-350132b, image: sjb/35/350132b.png}
body:
  text: 義父子之義西漢書文帝時賈誼上疏夏殷周爲天子皆數十世秦爲天子二世而亡人性不甚相遠也何三代之君有道之長而秦無道之暴也占之王者太子乃生固舉以禮有司齊肅端冕見之南郊過闕則下過廟則趨故自爲赤子而教以行矣孩提有識三公三少固明孝仁義禮以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌愽文有道術者以衛翼之使與太子居處出入故太子乃生聞正言行正道左右前後皆正人也夫三代之所以長久者以其輔翼太子有此具也及秦則不然使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅豈惟胡亥性惡哉彼其所以道之者非其理故也録曰誼之疏可謂深明其未然矣夫古者天子之元子衆子以至公卿大夫元士之嫡子與凡民之俊秀皆入大學而教之以窮理正心脩己治人之道及周之衰教化陵夷道之廢也久矣不獨秦已然也以帝之賢而不能用誼之說君子之所深惜也故録以存之厥後景帝殺戮大臣變易太子廢置主后驕寵愛弟幾乎不蹈秦之故轍孰謂誼果少年之見乎哉萬石君石奮歸老於家過宫門闕必下車趨見路馬必軾焉子孫爲小吏來𡚖謁萬石君必朝服見之不名有過失不誚讓爲便坐對案不食然後諸子相責因長老肉袒固謝改之乃許子孫勝冠者在側雖燕必冠申申如也僮僕訢訢如也唯謹上時賜食於家必稽首俯伏而食如在上前其執䘮哀戚甚子孫遵教亦如之萬石君家以孝謹聞乎郡國雖齊魯諸儒質行皆自以爲不及也長子建爲郎中令少子慶爲内史建老白首萬石君尚無恙每五日洗沐歸謁親入子舍竊問侍者取親中裙厠牏身自浣滌復與侍者不敢令萬石君知之以爲常内史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒謝罪不許舉宗及兄建肉袒萬石君讓曰内使貴人入閭里里中長老皆走匿而内史坐車中自如固當乃謝罷慶及諸子入里門趍至家録曰愚觀秦漢之際刑家之梏而乃有石氏之禮法可以見人心之天矣使若人者以傳太子以訓諸侯王若伯禽抗世子之法則漢世之俗庶幾有瘳乎奈之何徒見躬行之不費而不知非由清靜玄妙之虚文徒厭儒術之紛華而不知本乃性分固有之實用乃以建爲郎中令慶爲内史則給事之官錢穀之職其於國家之益能幾何哉誼之痛哭良有以也録之金日磾本匈奴休屠王太子也母閼氏教誨其子甚有法度日磾奉母進孝道武帝聞而嘉之詔圖其像於甘泉宫日磾每過見畫像常拜泣然後去及日磾長子爲武帝弄兒其後壯大自殿下與宫人戯日磾適見遂殺之上怒日磾具言所以上爲之泣而心敬日磾録曰以愚觀於日磾之事乃知夷狄之有親不如諸夏之亡也夫成季之勲宣孟之忠而不祀者原同平括之淫乎莊姬也康叔之裔祀融之墟而盡滅者公子頑之通乎君母也矧於殿廷何地宫人何人可與之狎而若罔聞乎磾與光均之不學者也豈其光之無術而磾之有識哉斷與不斷忍與不忍而已矣故曰當斷不斷反受其亂又云小不忍則亂大謀斯言也可以不學而識韋賢與子玄成俱以明經歷位丞相故鄒魯之間曰遺子黄金不如一經賢爲人質朴少欲篤志於學號稱大儒徵爲博士詔授帝詩故宣帝之時甚見尊重本始三年爲丞相封扶陽侯在位五歲以老病乞骸骨𡚖丞相致仕自賢始玄成尤謙遜下士兄弘爲太常丞當嗣及賢病篤家以玄成上有詔引拜玄成辭避不得已受爵宣帝高其節以爲河南太守弘東海太守初帝寵姬張婕好男淮陽憲王好政事通法律上奇其才有意欲以爲嗣然因太子起於細㣲又早失母故不忍也久之上欲感風憲王輔以禮讓之臣乃拜玄成爲淮陽中尉及元帝即位十年之間遂繼父相位封侯故國榮當世焉録曰漢世以經術居相位自公孫而後韋氏父子而已賢耄老當柄居位五年得遂乞骸其時以爲美談况望有所建白耶玄成在位七年守正持重不及其父而文采過之夫以家相之任上位天地下育萬物如以文而已矣乃學士之選也此所以終漢之世相業無聞非逡巡自保則因循故事無惑乎治道之止於斯也史記太史公司馬談仕於建元元封之間愍學者之不逹而師悖乃論六家之要指曰陰陽儒墨名法道德太史公掌天官不治民有子曰遷生於龍門耕牧河山之陽十歲誦古文二十而南遊江淮上會稽探禹穴闚九疑浮於沅湘北涉汶泗講業齊魯之都觀孔子之遺風過梁楚以𡚖於是遷仕爲郎中奉使西征巴蜀以南還報命是歲天子始建漢家之封而太史公留滯周南不得與從事故發憤且卒而子遷適使反見父於河洛之間太史公遷手而泣曰余先周室之太史也自上世嘗顯功名於虞夏典天官事後世中衰今天子接千歲之統封泰山而予不得從行是命也夫予死汝必爲太史爲太史無忘吾所欲論著矣夫天下稱誦周公言其能論歌文武之德宣周邵之風達太王王季之思慮爰及公劉以尊后稷也幽厲之後王道闕禮樂衰孔子脩春秋學者至今則之自獲麟以來四百餘歲諸侯相兼史記放絶今漢興海内一統明主賢君忠臣死義之士予爲太史而弗論載廢天下之文予甚懼焉汝其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞弗敢闕卒三歲而遷爲太史令紬史記石室金匱之書不墮先人所言所謂述故事整齊其世傳非所謂作也於是論次其文七年而遭李陵之禍退而深惟詩書隱約欲遂其志思昔西伯拘羑里演周易孔子厄陳蔡作春秋屈原放逐著離騷左丘失明厥有國語孫子臏脚而論兵法不韋遷蜀世傳吕覽韓非囚秦說難孤憤詩三百篇大抵賢聖發憤之所爲作也故述徃事思來者卒術陶唐以來至於麟止自黄帝始著十二本紀十表八書三十世家七十列傳凡百三十篇藏之名山副在京師以俟後世聖人君子録曰按遷自叙曰漢繼五帝末流接三代統業秦滅古文明堂金匱石室玉板圖籍散亂漢興更萧何韓信張蒼叔孫通百年之間彬彬文學稍進詩書徃徃間出矣時天下遺文古事靡不畢集太史公太史公相續纂其職夫固有所受也然猶憤發於黨禍而成百三十篇之書矧於後學而敢面墻乎哉及班氏繼作盡用其文至後杜預通典鄭樵通志馬端臨通考詔許於三館惜書尚書給筆札繕寫而温公通鑑文公綱目胡安國春秋傳學徒暨乃子厥婿皆同纂校嗚呼何其盛哉今或志可勉而力之所建已不能勉才可强而書之所載己不可强己可信而人之所好已不可信則亦徒志而已君子不可徒羡古人之才美又不可甘蹈今人之自畫於可勉而勉之可備而備之可信而信之則亦庶幾乎一家之冗說矣劉向三子伋賜皆好學惟歆最知名父子俱好古受詔領校祕書講論六藝傳記諸子詩賦數術方技無所不究向卒歆復領五經終父前業始皆治易宣帝時詔受榖梁春秋見古文春秋左氏傳歆大好之初左傳多古字古言學者訓故而已至是歆引傳文以解經轉相發眀由是章句義理備焉復湛靖有謀博見疆志過絶於人嘗以左丘明好惡與聖人同親見夫子而公羊穀梁在七十子之列傳聞之與親見之其詳畧不同數以難向向不能非間也録曰班固賛曰仲尼稱材難自後綴文之士唯孟軻孫况董仲舒司馬遷劉向揚雄此數公者皆博物洽聞通達古今其言有補於世傳曰聖人不出其間必有命世者焉劉氏鴻範論發眀大傳著天人之應七略剖判藝文綜百家之緒三統歷譜考步日月五星之度有意其推本之也嗚呼向言山陵之戒於今察之哀哉指明梓柱以推廢興昭矣豈非直諒多聞之益與觀固所言與向前後所上封事忠精懇篤天胡不祐之乎而卒以空言殆天所廢非人所能也子駿改名應讖爲師市寵於愧云東漢書鄭玄戒子益恩曰吾家舊貧不爲父母群弟所容出爲厮役之吏游學周秦之都徃來幽并衮豫之域獲覲在位通人處逸大儒咸從捧手有所受焉遂博稽六藝粗覽傳記時睹秘書緯術之奥年過四十乃歸供養坐黨禁錮十有四年公車再召比牒併名早爲宰相彼數公懿德克堪王臣故宜式序吾自忖度無任於此但念述先聖之元意思整百家之不齊亦庶幾以竭吾才而黄巾爲害萍浮南北復歸鄉邦歲已七十宿素衰落案之禮典便合傳家今我告爾以老將隱居以安性覃思以終業咨爾煢煢一夫曾無同生相依其最求君子之道研鑚勿替敬愼威儀以近有德顯譽成僚友德行立於己志若致聲稱亦有榮於所生可不深念邪若忽忘不識亦已焉哉録曰愚觀康成生前所疏難不啻百餘萬言臨末憤憤徒以所好群書卒皆腐敗不得於禮堂寫定傳與其人且自嘆西方日暮祗以其意戒子未嘗求知於人也及益思赴北海之難身隕祚㣲益不足恃而所注十三經及諸論述後世卒無寸遺孔子不云不患莫己知求爲可知也其終身無紱冕之情有讓爵之高亦非溢㫖比之馬融羞曲士之節終以奢樂恣性黨附成譏不可同日語也班彪才高好述作專心史籍自司馬遷著史記大初以後闕而不録好事者頗或綴集時事然多鄙俗不足以踵繼其書彪乃繼採前史遺事傍貫異聞作後傳數十篇因斟酌前史譏正得失彪卒子固以彪所續前史未詳乃潜精研思欲就其業既而有上書告固私作國史詔下郡收固繫獄盡取其家書固弟超恐爲郡所覈考不能自明乃馳詣闕上書得召見具言固所著述意而郡亦上其書顯宗甚奇之召詣校書部蘭臺令史與前睢陽令陳宗長陵令尹敏司隸從事孟異共成世祖本紀遷爲郎典校秘書文撰列傳載記二十八篇奏之帝乃復使終成前所著書固以爲漢紹堯運以建帝業至於六世史臣乃追述功德私作本紀編于百王之末厠於秦項之列故探撰前記綴集所聞以爲漢書起高祖終於孝平十有二世二百三十年綜其行事傍貫五經通爲春秋考紀表志傳凡百篇自永平受詔積思二十餘年至建初中乃成當世甚重其書學者莫不諷誦焉録曰愚觀班馬之述作皆有所祖潜精研思無足多者獨以顯宗之峻刻不惟赦固及身之烖而反假以制作之柄此千古以來未之聞也抑孔子作春秋丘明述國語皆當時之事所當避諱矧所遭皆季世若必以爲罪當何如哉當何如哉故觀於壺遂難司馬遷之言君子盖不可以不愼也馬援兄子嚴敦並喜譏議通輕俠援書戒之曰吾欲汝曹聞人過失如聞父母之若耳可得聞口不可得言也好議論人長短妄是非政法此吾所大惡也寧死不願聞子孫有此行也龍伯高敦厚周愼口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂父喪致客數郡畢至吾愛之重之不願汝曹效也效伯高不得猶爲謹敕之士所謂刻鵠不成尚類鶩者也效季良不得䧟爲天下輕薄子所謂畫虎不成反類者也録曰以援之謹𩛙而不免身後之謗何耶夫援以壯時欲就邊郡田牧蓋未爲得志也故其舊志自謂窮當益堅老當益壯夫誰能奪之及其致身於人便爲分限雖欲馬革褁尸甘心瞑目豈能盡如所願耶既有請行之言又爲據鞍之態讒人從而媒孽之此其求全之毁尚類於刻鵠之事向非朱勃之論不幾於畫虎者耶將益信謹𩛙之尚有未盡而輕俠之安所爲可乎靈帝大誅黨人詔下急捕范滂等督郵吴導至縣抱詔書閉傳舍伏牀而泣滂聞之曰必爲我也即自詣獄縣令郭揖大驚出解印綬引與俱亡曰天子大矣子何爲在此滂曰滂死則禍塞何敢以罪累君又令老母流離乎其母就與之訣滂白母曰仲博孝敬不足以供養今從龍舒君𡚖黄泉存亡各得其所唯大人割不忍之恩勿增感戚母曰汝今得與李杜齊名死亦何恨既有令名復求壽考可兼得乎滂跪受教再拜而辭復顧其子曰吾欲使汝爲惡則惡不可爲使汝爲善則我不爲惡行路聞之莫不流涕録曰范滂之母人謂歡其義也愚以爲不得已而爲是言也苟使愛惜其死將何益哉盍若辭之曰人生脩短自有義命顔回爲善於爾何如有命自天不爲逭己豈不達哉至於李杜生與同難死何足方若乃名之一字始末禍端尤不當以爲言也所竊喜者仲博有子龍舒克男仁者有後不爲廢絶不然以未發白之齡而罹短命之苦豈惟行道出涕其萬世痛絶也乎晋書王裒父儀爲魏安東將軍司馬昭司馬東關之敗昭問於衆曰今日之事誰任其咎儀對曰責在元帥昭怒曰司馬欲委罪於孤邪遂引出斬之裒痛父非命於是隱居教授三徵七聘皆不就廬於墓側旦夕常至墓所拜跪攀栢悲號涕淚着樹樹爲之枯讀詩至哀哀父母生我劬勞未嘗不三復流涕門人受業者並廢蓼莪之篇家貧躬耕計口而田度身而蠶或有密助之者裒皆不聼及司馬氏篡魏裒終身未嘗西向而坐以示不臣於晋録曰王祥孝矣及其爲三公也魏置其君而視之如弁髦土然曾不若剖氷求鯉之堅且篤也孟宗賢矣及其爲大夫也吴孫綝廢亮反爲告於廟而行之曾不若泣竹感天之順且從也然則終身不西向者豈徒誦哀哀父母而能然哉兖州刺史王㫤爲人謹厚名其兄子曰默曰沈名其子曰渾曰深爲書戒之曰吾以四者爲名欲使汝曹顧名思義不敢違越也夫物速成則疾亡晚就則善終朝華之草夕而零落松栢之茂隆寒不衰是以君子戒於闕黨也夫能屈以爲伸讓以爲得弱以爲强鮮不遂矣夫毁譽者愛惡之原而禍福之機也孔子曰吾之於人誰毁誰譽以聖人之德猶尚如此况庸庸之徒哉人或毁己當退而求之於身若己有可毁之行則彼言當矣若己無可毁之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉諺曰救寒莫若重裘止謗莫如自脩斯言信矣録曰昶之命子若預爲渾設也夫沈默渾深四者皆謙厚不伐之㫖也是故願其如海焉納百川而未見其盈也願其如泂焉涉萬里而未見其止也以昶之謹厚而後有渾與濟之洪雅使能充之於功名之際則爲有道之士弘之於容人之量則成長者之風豈不益賢乎哉借其狥於流俗狃於愧恨既不免時人之譏及居台輔聲望日减則頓失命名之義矣嗟夫唐書貞觀二十二年上作帝範十二篇以賜太子曰君體建親求賢審官納諫去讒戒盈崇儉賞罰務農閱武崇文且曰脩身治國備在其中一旦不諱更無所言矣又曰汝當更求古之哲主以爲師如吾不足法也夫取法於上僅得其中取法於中不免爲下吾居位以來不善多矣錦繡珠玉不絶於前宫室臺榭屢有興作犬馬鷹隼無遠不致行遊四方供頓煩勞此皆吾之深過勿以爲是而法之顧我弘濟蒼生其益多肇造區夏其功大益多損少故人不怨功大過㣲故業不隳然比之盡善固多愧矣汝無我之功勤而承我之富貴竭力爲善則國家僅安驕惰奢縱則一身不保且成遲敗速者國也失易得難者位也可不惜哉可不愼哉録曰唐太宗之教太子可謂至矣惜其於君子之道槩乎其未之聞也夫君子之道造端乎夫婦及其至也察乎天地此上古聖人所以徹上徹下由内以及於外由家以至於朝廷然後爲無弊也今觀自君體建親以至閱武脩文莫不畢陳又自細㣲過失以及事功顯迹悉皆無隱可謂至再至三而未甞一及於刑家之道帝豈智不及此哉武曌之禍蓋反巢刺之刃家事之言速報脅父之謀耳豈惟訓誥而有遺兼通讖記而無奈是以古之君子必務正心誠意愼㣲謹獨未嘗一念之或苟然後及於治國平天下一以貫之而無遺此其帝之所獨闕而唐之所深禍歟鄭善果父誠母崔氏嚴明節操愽涉書史通曉治方誠爲周大將軍討尉遲迴戰死善果襲父爵及爲魯郡太守每出廳事母輒坐障後察之聞其剖斷合理𡚖則大悅若行事不允或妄嗔怒即還涕泣不食善果伏於床下曰汝先君在官清恪以身狥國汝自童子襲茅土至方伯案可妄加嗔怒墮於公政内墜家風外虧天子之法何面目見汝先君善果由是克己號爲清吏崔玄暐母盧氏嘗戒玄暐曰吾聞姨兄辛玄馭云子姓凡居仕宦人有言貧乏不能存此是好消息若聞財貨充積此惡消息吾甞以爲確論比見親表中務多財以奉親而其親不究所從來必出乎廪禄則善矣如其不然何異盗乎若汝爲吏不能忠清無以戴天履地宜識吾意故玄暐所至以清白名録曰鄭善果之母談虎而色變蓋有所傷之也故其詞也烈崔玄暐之母見賢而思齊夫有所受之也故其詞也温二子卒皆以清白聞信乎陰教之不虚也而玄暐遂能反正廢主有大功於唐較之善果晩節盖有間矣韓休子七人浩洽洪汯滉渾洄皆有學尚節義籍甚於時安禄山反皆䧟賊逼以官不受出奔行在爲賊所擒浩洪渾皆遇害肅宗以大臣子能死難詔贈浩吏部郎中洪太常卿渾太常少卿汯終諫議大夫洽終殿中侍御史洄終國子祭酒滉貞元元年加檢校左僕射同中書門下平章事滉性節儉居嘗陋薄取庇風雨門當列戟以父時第門不忍壞乃不敢請堂先無挾廡弟洄稍增補之輙除去曰先君容焉吾等奉之常恐失墜若摧圮繕之則已安敢改作以傷儉德居重位清潔疾惡不爲家人資産初判度支李晟以裨將白軍事滉待之加禮使其子拜之厚遺器幣鞍馬後晟終立大功幼時已有美名晚節益峻其家範訓餙子弟甚嚴故貞元間言家法者曰韓氏穆氏云穆寧子四人賛質貟賞世以儒聞而剛正氣節自任以明經調𥂁山尉過平原見顔眞卿及聞禄山反即遺眞卿書以其子屬其母弟曰苟不乏嗣足矣即馳謁眞卿曰先人有嗣我可以從公死也既而眞卿過河見肅宗問狀異之將以爲諫議大夫德宗在奉天奔詣行在擢秘書少監太子右庶子及寧之老賛爲御史中丞質右補闕員侍御史賞監察御史皆以守道行誼爲縉紳所仰賛最孝謹質强直員工文詞賞尚節義俱有令譽而和粹當時以珍味目之賛俗而有格爲酪質美而多入爲酥員爲醍醐賞爲乳腐寧平居嘗譔家令訓諸子人一通戒曰君子之事親養志爲大吾志直道而已苟枉而道三牲九𣇄非吾養也録曰休一代元臣其家法峻整有自來也寧儒而已何至與韓氏並稱耶蓋節義之在天地間匹夫之於王公一也是故有歲寒之澹蕩而後有春融之敷華休之許國以義寧之許友以死凛凛乎立身大節可以爲柯幹可以爲巖石他日和之爲羹𣇄調之爲𥂁梅無惑乎皆以珍味目之也然則當時之說豈無謂哉弘道録卷之十九
