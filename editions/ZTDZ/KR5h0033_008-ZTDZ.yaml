front:
  text: 弘道録卷之九府一
  hash: sha256:fa05d9054ad198dd759ba9497698c93a1606fc778b58b60f82a462a463224c01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_SJB_008-350053a, image: sjb/35/350053a.png}
body:
  text: 仁昆弟之仁左傳高陽氏有才子八人齊聖廣淵明允篤誠天下之民謂之八愷高辛氏有才子八人忠肅共懿宣慈惠和天下之民謂之八元此十六族世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟恭子孝内平外成故虞書數舜之功曰慎徽五典五典克從無違教也納于百揆百揆時叙無廢事也録曰通鑑前編云謂之氏者猶言朝代也謂此二朝有此十六人又謂之十六族而非一母四乳如周有八士之類也或者不知以爲二帝之子則高陽八子何其壽而高辛之八子豈皆堯之庶弟與觀者詳之萬章問曰象日以殺舜爲事立爲天子則放之何也孟子曰封之也或曰放焉仁人之於弟也不藏怒焉不宿怨焉親愛之而已矣親之欲其貴也愛之欲其富也封之有庳富貴之也身爲天子弟爲匹夫可謂親愛之乎録曰鄭莊之扵叔段所謂藏怒者也晋獻之扵桓莊所謂宿怨者也不惟藏怒也而且誓母于城頴焉不惟宿怨也而且詛無畜群公子焉中庸曰兄弟既翕和樂且耽又曰父母其順矣乎然則不能親扵傲弟必不能格于頑嚚之心矣詩大雅帝作邦作對自大伯王季維此王季因心則友則友其兄則篤其慶載錫之光受禄無喪奄有四方録曰孔子曰太伯其可謂至德也矣三以天下讓民無得而稱焉釋之者曰無得而稱其遜隱㣲無迹可見也今觀詩人之詞曰王季之所以友其兄者乃因其心之自然而不由扵勉强然則太伯之所以讓其弟者又非因其心之自然而有待扵勉强乎如此人何得而見亦何得而稱無俟隱㣲之一言而自明也小雅蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟合德壽豈秩秩斯干幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣録曰二詩措詞切中漢七國之弊觀扵淮南好客楚元設醴何莫非孔燕也然無豈弟之德故終鮮樂壽之休厥後鑄山煑海招亡納叛所謀紛紜疊出衹以速其亂亡而已又豈但繼世而立猜忌之間而已哉史記伯夷叔齊孤竹君之二子也父欲立叔齊父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子子貢問曰伯夷叔齊何人也孔子曰古之賢人也曰怨乎曰求仁而得仁又何怨録曰或問曰夷齊之讓國後世何以皆不及乎愚應之曰事之無始扵前者理則從天而出從地而生未有不善也有始扵前者後必以人間之以心圖之萬有不齊也是故夷齊之扵父命因事以制義而無心以收後世之効後人之扵兄弟假義以興事而有意以取古人之名此其所以異而召亂亦在乎其中矣周書既克商二年武王有疾弗豫太公召公曰我其爲王穆卜周公曰未可以戚我先王公乃自以爲功爲三壇同墠爲壇扵南方北面周公立焉植璧秉珪乃告太王王季文王史乃祝册曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責子天以旦代某之身乃卜三龜一習吉啓籥見書乃并是吉公曰體王其罔害公乃納册于金縢之匱中王翼日乃廖武王既喪管叔得其群弟流言扵國曰公將不利扵孺子周公乃告二公曰我之弗避我無以告我先王周公居東二年則罪人斯得公乃爲詩以貽王曰鴟鴞鴟鴞既取我子無毁我室恩斯勤斯鬻子之閔斯迨天之未陰雨徹彼桑土綢繆牖户今女下民或敢侮予予手拮据予所將荼予所蓄租予口卒瘏曰予未有室家予羽譙譙予尾翛翛予室翹翹風雨所漂摇予維音嘵嘵録曰王與叔雖有君臣之分公以手足視之則皆同也王死則代叔誅則忍有以異乎曰無以異也夫瞑眩之與悖亂雖有親踈遠近之殊其動摇王室則一也是故丕子豫則民罔不衹鬻子逋則民罔不侮然則植璧秉珪與破斧缺戕聖人寧有異心哉其哀我人斯易地則皆然也又曰貽者流傳致達之稱流言之起茫昩無根夫苟默而不言王室忽然有難誰其知之又誰其使之仁者固如是乎若但苟且而言懿親𢘰然無愁是可忍也熟不可忍仁者不如是也今觀其詞不迫切而意已獨至設使五尺之童聽之豈不知鴟鴞之惡不可逭而拮据之苦爲可信哉此其感人之切奚翅忠誠懇至其扵屬詞比事之間眞如風之動物然則天之雷電以風豈無由而致之乎左傳晋以驪姬之難詛無畜群公子自是晋無公族及成公立乃宦鄉之適而爲之田以爲公族又宦其餘子亦爲餘子其庶子爲公行晋於是有公族餘子公行至是趙宣子請以括爲公族曰君姬氏之愛子也㣲君姬氏則臣狄人也公許之以宣子爲旄車之族使屏季以其故族爲公族大夫録曰趙宣子之請族其感於姬之請嫡乎雖然宣嫡而趙族世括族而趙嫡亡然則旄車安在哉公族安在哉是以君子貴於有子韓獻子告老將立公族穆子穆子有廢疾辭曰詩云弗躬弗親庶民弗信無忌不才請立起也起與田蘇㳺而稱好仁詩云靖共爾位好是正直神之聴之介爾景福恤民爲德正直爲正參和爲仁如是則神聴之介福降之立之不亦可乎使宣子朝遂老晋侯謂韓無忌仁使掌公族爲公族大夫録曰韓與趙三晋之巨臂也故獻子不背趙孟以爲知義起與盾巨室之大木也故無忌不先韓起以爲伏仁雖然義立而後仁顯嫡宣孟所以化穆子也族屏季所以感悼公也詩曰世之不顯厥猷翼翼其斯三晋之所由盛而曲沃之所由分歟宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以没先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰群臣願奉馮也公曰不可先君以寡人爲賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居扵鄭八月庚辰宋穆公卒殤公即位君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫録曰宋宣之致國扵穆公左氏以爲知人公羊以爲首禍將何所拆衷乎夫堯薦舜舜薦禹既聴命扵天矣而朝覲訟獄謳歌未嘗不取信扵民以至益之與啓則又不然朝覲訟獄謳歌者不之益而之啓曰吾君之子也盖堯舜禹益之事由扵自然之命天理之公耳此所以萬世而無弊穆宣夷馮之事出扵好樂之情爾我之私耳此所以再傳而不終雖然孔父之受命賢扵趙普之再悮而子馮之居鄭愈扵德芳之負約穆公可謂不負其初心矣宋桓公疾太子兹父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順遂走而退宋襄公即位以公子目夷爲仁使爲左師以聴政扵是宋治故魚氏世爲左師録曰穆公舍馮而立與夷父子之分紊矣所以卒致篡弑之禍目夷固請以立玆父兄弟之倫正矣所以獲成宋治之羙然則何必餙讓以爲義好名以相高乎要之父死子繼者萬世之常也兄終弟及者一時之變也非常非變亂而已矣公孫敖娶于莒曰戴己生文伯其姊聲己生惠叔戴己卒又聘于莒莒人以聲己辭則爲襄仲聘焉登城見之美自爲娶之盡室奔莒以從己氏也魯人立其長子糓是爲文伯文伯疾而請曰糓之子弱請立難也許之文伯卒立惠叔録曰魯文之世殺嫡立庶而乃有糓與難之讓君子可以愧襄仲矣而卒不免扵廐埋之難者傳曰君以此始亦以此終慶父之殺般及閔襄仲之殺惡及視一也然則雖欲不死烏得而不死漢書河間王德武帝兄也脩學好古實事求是從民得善書爲好寫與之留其眞加以金帛繇是四方道術之人不遠千里或有先世舊藏多奉以奏故得書多與漢朝等悉皆先秦古文若周官尚書禮禮記孟子老子之屬皆經傳說記七十子之徒所論其學舉六藝立毛氏詩左氏春秋博士脩禮樂被服儒術造次必扵儒者山東諸儒多從而逰武帝時來朝獻雅樂對三雍宫及詔策所問三十餘事其對推道術而言得事之中文約指明立二十六年薨中尉常麗以聞曰王身端行治温仁恭儉篤敬愛下明知深察惠于鰥寡大行奏謚法曰聰明睿知曰獻宜謚獻王録曰自西漢溺冠駡儒之俗興世傳諸侯王或數百率多驕淫失道悖亂㓙慝無所不至豈天之降才爾殊哉其所以䧟溺其心者然也彼儒者誠何負扵天下乎二帝三王所爲以標準後世者具載于書此其身端行治温仁恭儉視彼安扵鴆毒利扵危亡者何其懸絶哉史稱大雅卓爾不群河間近之嗚呼可謂仁矣後漢書東海恭王疆郭后子明帝兄也建武二年立爲皇太子十七年而郭后廢疆常慼慼不自安數因左右及諸王陳其懇誠願備藩國以奉養母氏光武不忍遲回者數歲至十九年六月詔以皇太子疆崇執謙退父子之情重違久之其以疆爲東海王立陽爲皇太子袁宏論曰東海稱藩謙恭之心彌亮明帝承統友于之情愈篤雖興廢不同父子兄弟至性無間然也録曰愚觀承運迭興之主每事鑒于已然其易太子正以推時之艱也有如明帝之賢而不預定扵先漢將復不震乎厥後永平元年疆果以病薨帝已覩扵將然矣而能卒全因心友于之愛殆詩所謂篤慶者歟東平憲王蒼明帝弟也明帝甚親愛之永平十一年來朝月餘還國帝臨送歸宫悽然懷思乃遣使手詔賜東平國中傳曰辭别之後獨坐不樂因就車伏軾而吟瞻望永懷實勞我心日者問王處家何等最樂王言爲善最樂其言甚大副是要腹矣今送列侯印十九枚諸子年五歲已上能趍拜者皆令帶之録曰東平之樂善千古之羙談也夫諸侯皇皇皇皇者羙也美者善信充實之謂也彼以招致游士聲名聞望昭著顯明者皆非善信充實之謂也矧作金龜玉鶴刻符造瑞者乎帝之大其言良有以也或曰爲善最樂者盖無所爲而爲無所爲而爲則亦何用而不得哉姜肮伯淮與弟仲海季江家世名族俱以孝行著聞其友愛天至常共卧起及各娶妻兄弟相戀不能别寑以係嗣當立乃逓徃就室肱愽通五經兼明星緯士之遠來就學者甚衆諸加辟命皆不就二弟名聲相次亦不應徵聘侍人慕之桓帝乃下彭城使盡工圖其形貌以聞肱匿扵幽闇䖏以被韜面言感眩疾不欲出風工竟不得見之録曰肱之篤行而若是哉詩曰有子七人莫慰母心肱可謂能慰母心者矣夫聖善令人者廢之乎辭也祥撻覧代者徵之乎色也隰裒原急者釁之乎招也瓶罄疊耻者痛之乎徃也是故母子異室兄弟同寑不廢辭矣母慈弟愛因心著聞不徵色矣徵聘無聞黨禍無與不釁招矣色養而終全體浩然不痛徃矣質諸孔門豈非所稱貧而樂者哉按謝承書肱繼母年少性嚴肱感凱風之誼兄弟同寑不入房室以慰母心也晋書王祥弟覽母朱氏遇祥無道覽年數歲見祥被楚撻輒涕泣抱持至扵成童每諫其母其母少止㓙虐朱屢以非理使祥覽輙與俱又虐使祥妻覽妻亦趍而共之祥喪父之後漸有時𣁎朱深疾之密使酖祥覽知之徑起取酒祥疑而不與朱遽奪反之自後賜祥饌覽輙先嘗朱懼遂止覽孝友恭恪名亞扵祥及祥仕進覽亦應本郡之召先是吕虔有佩刀工相之以爲必登三公可服此刀苟非其人刀或爲害虔謂祥有公輔之量特以與之祥臨薨以授覽曰汝後必興足稱此刀後果奕世多賢興扵江左覽六子裁字士初撫軍長史基字士先治書侍御史會字士和侍御史正字士則尚書郞彦字士治中謢軍琛字士瑋國子祭酒裁子導爲名宰相録曰祥之事親無所迯覽之事兄有可委父之失愛有所爲母之殘虐無所因卒能使孝子悌弟萃扵一門禎祥和氣興扵後世此乃天假之以成二子之名且以延東晋數葉之祚也特以吕虔之事未能盡信然亦豈非牛金之祥乎元雖膺命導實啓之其兆已先見矣豈非順德之所感哉舊唐書宋王成器申王成義玄宗兄也岐王範薛王業弟也幽王守禮從兄也上素友愛近古無比聖曆初出閤列第扵東都積善坊五人分院同居大足元年從幸西京賜宅扵興慶坊及先天之後興慶是龍潜舊邸因以爲宫西南置樓西面題曰花萼相輝之樓南面題曰勤政務本之樓上時聞諸王音樂之聲咸召登樓同榻宴謔或便幸其第賜金分帛厚其歡賞宋王尤恭謹畏愼未曾干議時政及與人交結故上尤愛重之嘗與書曰魏文帝有詩云西山一向高高處常無極上有兩仙童不飲亦不食賜我一丸藥光耀有五色服藥四五日身輕生羽翼朕每思服藥而生羽翼何如骨肉兄弟天生之羽翼乎昔陳思有起代之才堪經綸之務文帝乃絶其朝謁卒令憂死魏祚未終遭司馬宣王之奪豈神丸之効耶虞舜至聖舍象傲之愆此爲帝王之軌則朕未嘗不廢寑忘食欽歎者也頃因餘暇得此神方今分此藥願與兄弟等同保長齡永無限極録曰益之九五曰有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也玄宗功大德尊而五王虚中順應合乎天理之正即乎人心之安手足相孚心氣相應友于之意油然而生當是之時社稷永安蒼生悅豫大善而吉不問可知矣夫既至誠懷吾之德是以展布謀猷恢張治道大君之志暢然得伸此開元之政並美扵貞觀也夫何間然之有哉唐書張公藝九世同居比齊隋唐以來皆旌表其門閭麟德中高宗封泰山幸其宅召見公藝問所以能睦族之道公藝請紙筆以對乃書忍字百餘以進其意以爲宗族所以不恊由尊長衣食或有不均卑幼禮節或有不行更相責望遂爲乖爭苟能相與忍之則家道雍睦矣録曰忍者其不忍之心乎不忍之心天心也九世之族天性也以不忍之心加扵不可易之姓其視九族猶一人九世猶一日也何不可共之有哉若徒以强制爲義而無測怛慈愛施行扵其間則斯忍也其刃心之刃乎張公之意殆不如是也元德秀字紫芝爲人質厚少縁餙以不及親在而娶遂不肯好人謂不可絶嗣答曰兄有子先人得祀吾何娶爲及兄子長將爲娶家苦貧乃求爲魯山令玄宗在東都酺五鳳樓下命三百里縣令刺史各以聲樂會集德秀遣樂工數十人連袂歌于蔿帝聞而異之歎曰賢人之言哉所得俸禄悉衣食人之孤遺者歲滿去愛陸渾佳山水乃居之不爲墻垣扃鑰家無僕妾歲飢日或不爨陶然彈琴以自娱尤善文辭房琯每歎息曰見紫芝眉宇使人名利之心都盡蘇源明語人曰吾不幸生衰俗所不耻者識元紫芝也及卒弟結哭之慟或曰子哭過哀禮歟結曰若知禮之過而不知情之至大夫弱無固性無專老無在死無餘人情所躭溺喜愛大夫皆無之生六十年不識女色未嘗有十畆之地十尺之舍十歲之僮未嘗完布帛而衣具五味而食吾哀之以戒荒深貪佞綺紈梁肉之徒耳録曰愚觀魯山之爲人攸然若太虚無一塵之翳浩然若澄淵無一沙之滓其躬自乳其兄之子尤曠古罕所聞見要不可繼故亦不録然晋史稱弟子綏服攸喪三年而唐史不著魯山兄子之名亦無制服之義乃特述次山之慟要之慟者情也服者義也以慈養兼無後二義律之其當制服明矣史果闕文也哉宋史太祖皇帝性仁孝質任自然弟晋王光義嘗病亟親徃視之自爲灼艾晋王覺痛帝亦取艾自灸以分其痛每對近臣言晋王龍行虎步他日必爲太平天子福德非吾所能及也録曰陳橋之變晋王與諸將先發後聞所謂實始剪啇也然則龍行虎步已著于日光相盪之日而灼艾分痛又驗其太平福德之語至扵斧聲燭影僧文瑩輕信以悮李壽李壽傳疑以悮胡陳二子故丘瓊山特據正史以明其誣愚以爲後世所以證成太宗之惡者衹以後日處弟之薄故先疑其待兄之心斃姪之情故傳致其弑君之罪其實太祖仁孝自然縱有不肖何忍遽至此乎此録據理爲正故因爲之辯范文正公告諸子曰吾貧時與汝母養吾親汝母躬執㸑而吾親其㫖未嘗充也今而得厚禄欲以養親親不在矣汝母亦已早世吾所最恨者忍令若曹饗富貴之樂也吾吴中宗族甚衆於吾固有親踈然吾祖宗視之則均是子孫固無親踈也苟祖宗之意無親踈則饑寒者吾安得而不恤也且自祖宗來積德百餘年而始發扵吾得至大官若獨饗富貴而不恤宗族異日何以見祖宗扵地下今何顔入家廟乎扵是恩例俸賜常均扵族人盡以餘俸置附郭嘗稔之田千畆號曰義田云録曰此文正未逹之所志與已逹之所施自書契以來惟此公能擅其羙愚嘗推其所以然者其說有四一曰存心之公二曰奕世之賢三曰風俗之厚四曰君德之隆盖自其爲秀才時先天下之憂而憂後天下之樂而樂有此識見而後能有此度量此其存心之公一也以純仁等爲之子其繼志述事有不能以公之心爲心者乎此其奕世之賢二也今置附郭嘗稔之田千畆不惟忌毁日招且恐多事未免指以勢豪混以債負限以徭役擾以逋負何所不有豈能安枕高卧而饗高義乎此其風俗之厚三也况公之立朝剛毅正直旅進旅退未嘗依阿取容若非遭遇至聖之主安能始終自保以瞻族人乎此其君德之隆四也後世不幸或宗族爭長競短或甲是乙非或逄時縮首浩嘆或遭變甘陸沉區區企仰古人安能及哉此其存心公私之所攸分子孫賢愚之所攸别風俗美惡之所攸殊世道升降之所攸係不但周急之一端而已也司馬旦弟光友愛篤至旦年將八十光奉之如嚴父保之如嬰兒每食少頃則問曰得無饑乎天少泠則撫其背曰衣得無薄乎光後居洛旦居夏縣有園沼勝槩光歲一徃省旦亦間至洛視光凡光平時所與論天下事旦有助焉及光被門下侍郞召固辭不拜旦引大義語之曰生平誦堯舜之道思致其君今時可而違非進退之正也光乃幡然就道六是時天下懼光之終不出及聞此言皆欣然稱旦曰長者之言也録曰同人之卦二以得位得中而上應九五其光之謂乎五以剛徤中正而下應六二其旦之謂乎故一則離明致主爲天下之快覩一則中誠格物伸天下之大誼百世之下可以觀矣伊川序明道先生行實曰先生資禀既異而充養有道純粹如精金温潤如良玉寬而有制和而不流忠誠貫扵金石孝弟通扵神明視其色其接物也如春陽之温聴其言其入人也如時雨之潤胸懷洞然徹視無間測其藴浩乎若滄溟之無際極其德美言盖不足以形容其行已内主扵敬而行之以恕見善若出諸已不欲弗施扵人居廣居而行大道言有物而動有常明扵庶物察扵人倫知盡性至命必本扵孝弟窮神知化由通扵禮樂辯異端似是之非開百代未明之惑秦漢以來未有臻斯理也録曰大畜之爲卦也剛徤篤實光輝宣著故以伯淳之至德不爲徒說以正叔之至文不爲溢美譬如慶日祥雲瞻之則見其光被四表和風甘雨沐之亦可以澤潤四方立德立言無以踰此四明誌國朝楊文懿公兄弟由六父棲芸生三子自懲自悆自忞自懲號梅讀子即守陳官至吏部侍郞守阯官至南京吏部尚書自悆號見素子守隨官至工部尚書自忞號韋庵子守隅官至廣西右布政孫茂元刑部侍郞茂仁四川按察使又皆文懿公子也棲芸通易書詩二經力希濂洛關閩之學德性剛方踐履誠確晩年進德彌篤更號思誠文懿號鏡川弟號碧川天性孝友待諸弟怡怡相師友遠有以紹儒先之緒近有以領家學之傳四明自楊慈湖師象山黄東發師考亭皆卓然知體立用行顯㣲不二之義學者尊之而栖芸實嗣其傳至文懿益充大之其始則抱遺經以求聖人扵言表而不以訓詁詞章爲能故其持己律家居官接物視老壯如一日而不少肆其子弟皆謹守禮法不屈子不義而以古人爲必可期也公嘗力辭部事曰吏部進退百官衆怨所集聞望如王恕尚招人言况臣迂踈豈勝此任又言君可變史不可滅前時史臣不記建文君事遂使革除數年朝廷一切政事及忠扵所事者皆湮没無聞及今來輯尚可補國史之缺景泰已復位號實録猶書郕戾王是宜改正反舊例群臣章䟽留中者皆不得書乞悉付史館皆名言也録曰宋潜溪之不肯任輔相楊鏡川之不肯任吏部皆吾浙道學之儒庶幾克己自盡者于今罕見其儔矣録之弘道録卷之八弘道録府二仁朋友之仁通書周子曰道高德厚教化無窮實與天地參而四時同其惟孔子乎道高如天者陽也德厚如地者陰也教化無窮如四時者五行也孔子其太極乎録曰此萬世賔師之分與堯舜同其尊榮故宰我曰夫子賢扵堯舜子貢曰自生民以來未有孔子未嘗直擬之以太極也果有說乎夫易更三聖圖始濂溪發先天後天之藴奥者孔子也發孔子太極之藴奥者周子也是故太極之未判也混扵不識不知之中而極乎無聲無臭之妙而其已判也立乎形氣未具之先而行乎形氣已具之内實造化之樞紐品彙之根抵也孔子何以爲太極乎方其未發也仁義禮智之性混然在中無所不有及其已發也中正和樂之德隨感而應無乎不宜實一誠之權輿萬化之橐鑰也就其光輝發越而言天以陽生萬物其道顯矣而聖人仰之彌高鑚之彌堅何有所窮盡乎自其靜深有本而言地以陰成萬物其德㣲矣而聖人肫肫其仁淵淵其淵何有所止極乎四時行焉者春夏秋冬也于以四教者文行忠信也其所以因材而篤物各付物五行之生各一其性也是故合而言之全具乎夫子之身萬物統體一太極也分而言之曲成扵物物之由一物各具一太極也而所以賢扵堯舜者正以其教化之無窮也所以自生民來未有者亦以其道德之高厚也言雖殊而理合轍三子者一而已矣顔淵問仁子曰克己復禮爲仁一日克己復禮天下歸仁焉爲仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣録曰此孔門言仁之始所謂徹上徹下故也夫天下歸仁堯舜之事業也無一人不得其所無一物不在性分之内所謂放之則彌六合也克己復禮者聖賢之全功也無一念不合于天無一事不中乎禮所謂卷之則退蔵于密也此仁道之極致心學之淵微人所不知而已獨知之人所不能而己獨能之何有待扵外哉夫子之告顔淵無復有餘藴矣苟使好高者遑遑扵四靈九有卑近者規規扵未純未盡哲哉顔氏之子乎而能請問其目焉夫允恭者堯允塞者舜克其類自視聴言動始也故先明四目達四聰而後能動而世爲天下道言而世爲天下法行而世爲天下則夫子之答有自來矣不徒問仁而必請其目不徒請目而能事斯語顔氏之子其以上聖爲己任乎不然何以曰舜何人也予何人也有爲者亦若是子曰回也其心三月不違仁其餘則日月至焉而已矣録曰愚觀孔門勸勵之實萬世敦篤之誨今去聖人千八百年猶可以自最也夫三月不違者非以天道小變之節過此而不由也日月至焉者亦非今日進而至明日退而不及也蓋以顔子之深潜純粹終日不違既竭吾才卓爾所立至扵三月之久純乎天理之全如之何其可及也其餘或頴悟幾于顔子而擇善未精德行同扵一科而美大未至或一日之間清明純粹天聖昭融或一月之間不遠而復無所祗悔雖未能中心安仁决非君子而不仁者矣此聖人之深意非有所貶損扵其間也子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也録曰此可見三月不違仁也夫簞食非旦夕之移陋巷匪一時之事人維不堪其憂故不能久而安焉回也天理昭融私欲靜盡方且心廣體胖而忘其貧見大心泰而無不足故曰不改其樂也此與未若貧而樂之樂字同意善學者合而觀之可也子曰飯䟽食飲水曲肱而枕之樂亦在其中矣不義而富且貴扵我如浮雲録曰此孔顔之分别未達一間者也夫所謂不改其樂有時或未然矣樂亦在其中則混然天理不可爲窮盡不可爲方體其實無太相懸也孔子曰自吾有回門人日益親録曰所謂日益親者非相觀而善相率景從之謂也盖語之不惰則罄咳不爲費辭無所不悅則切愢不爲虚語吾見其進未見其止安得不爲之暢然退而省其私亦足以發安得不爲之豫悅所謂不亦樂乎者如此此循循善誘不得不爲之曲盡而視予猶父亦有所不能目己者矣豈不日益親乎顔淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之爲慟而誰爲録曰顔淵死天不愛道也魯西狩獲麟地不愛寳也皆足以致夫子之慟也顔淵死子曰噫天喪予天喪予録曰聖人之身斯道之所係也道在不言身身在不言道今道無傳是已無予也然則聖人亦豈遽然自謂萬世必尊從之哉天喪予者愛道之至也萬世尊崇者慕道之眞也道在於萬世聖人猶不死也此可見顔子繫道之重師友關仁之切以爲五倫之末蓋不究乎此也曾子曰士不可以不弘毅任重而道遠仁以爲己任不亦重乎死而後已不亦遠乎録曰此可見曾子之確也夫請事斯語優爲之者也仁以爲己任固執之者也上智之資故曰明睿學智之資故曰弘毅其致一而已矣仲兮問仁子曰出門如見大賓使民如承大祭己所不欲勿施於人在邦無怨在家無怨仲兮曰雍雖不敏請事斯語矣録曰夫子常稱雍也可使南面故告以出門使民皆南面之事也今因此言以想仲兮之形容尚可見其爲人之楷範况親炙其寬洪簡重之度者乎聖門若回若雍皆居德行之科者以此言始聞而心解力可到而踐行雖欲不請事不可得也或曰雍也仁而不佞子曰焉用佞禦人以口給屢憎於人不知其仁焉用佞録曰夫仁者佞之反佞者仁之病以雍之敬以持己恕以及物内外以無怨矣故或人之言如此盖當時之人亦知仁是好事若兼有口才便不可及非是惜之也又世俗以佞爲才而不知其不可若如有德者必有言則非佞矣故夫子再言焉用佞以深曉或人其曰不知其仁即如孟武伯問由求所對之語亦非不許其仁也讀者其致思焉司馬牛問仁子曰仁者其言也認其言也認斯謂之仁矣乎曰爲之難言之得無認乎録曰牛之再問非無爲也彼方見顔冉所告皆切己敦篤之論而己之所告乃言語辭氣之間然不知非禮勿言克復之條目爲仁之切要乎非但爲多言而躁故發此也苟能謹扵言而不放以達扵耳目周身之間念念不已克己復禮端在是矣惜乎不聞請事之言不達爲難之㫖徒以多憂多懼未知爲仁由已此顔冉之學所以爲難也歟樊遲問仁子曰居處恭執專敬與人忠雖之夷狄不可棄也録曰此扵學者最爲切近蓋未能如見大賔必先自處以恭未能如承大祭必先執事以敬未能不欲勿施必先與人以忠而夷狄者深言之也以遲之粗鄙扵門墻或可勉扵夷狄不可勉也此夫子深箴其病與在邦無怨在家無怨者異矣樊遲問仁子曰仁者先難而後獲可謂仁矣録曰愚觀孔門問仁之屢者莫如樊遲而卒未能傳道何也盖聖門之學無所爲而爲之也聞謀道不謀食矣未聞請學稼也聞耕也餒在其中矣未聞請學爲圃也以親㳺聖門猶尚如此而漢儒董子廼能知正誼不謀利明道不計功然則可以尋常視之歟學者詳之遲問仁子曰愛人問知子曰知人樊遲未子曰舉直錯諸枉能使枉者直樊遲退見夏曰鄉也吾見扵夫子而問知子曰舉直諸枉能使枉者直何謂也子夏曰富哉言舜有天下選扵衆舉臯陶不仁者遠矣湯天下選扵衆舉伊尹不仁者遠矣録曰愚觀子夏之言非但發夫子所未發千古之下眞不能違也夫有天下者所以必扵舉直錯枉何哉盖是非邪正每每相反邪者進則正者變而爲邪正者進則邪者化而爲正其幾不容髮也唐有天下舉魏徵而隋俗盡革宋有天下舉司馬光而熙豐頓改及其後也用一林甫而立仗斥遠用一章惇而狎小充廷夫子之言其傷魯之無錯乎不然何惓惓復以告哀公也但其㫖意宏深而不露含畜而不盡而門墻之英交相論難卒以發明厥後啇也日益遲也無聞然則達與未達之間可以决進與不進之幾歟貢曰如有愽施扵民而能濟衆何如可謂乎子曰何事扵仁必也聖乎堯舜其猶病夫仁者己欲立而立人己欲達而逹人能取譬可謂仁之方也已録曰子貢之質幾扵上智而不能優入聖域者從事高遠也曾子之資限扵才魯而能卒傳道繞者能近取譬也當時問者多矣舉其事設其詞似扵中有所得也而不知文可愽施不可愽愛可汎仁不可汎子貢之學盖有得扵愽而無及扵約宜乎泛而不切也夫欲立者卓爾之謂也欲逹者躍如之謂也二者皆所以約之扵禮也以是爲防後世猶有愽愛言仁者然則非原道之失也因文見道之失也因文見道謂之不能約禮也亦宜貢問爲仁子曰工欲善其事必先利其器是邦也事其大夫之賢者友其士之仁者録曰賜扵是時盖已覺今是而昨非矣故又問爲仁若所謂請事語也夫己欲立而立人己欲達而達人非率爾之謂也有大夫之賢誘掖奬勸之扵其上有士之仁薰陶漸染之扵其下則不覺卓然而立豁然而達矣不然獨立無助焉能率人孤陃寡聞何以表物此余小子今日之深懼求其事與友而不得者也孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使爲之宰也不知其仁也赤也何如子曰赤也束帶立於朝可使與賔客言也不知其仁也録曰武伯懿子之子魯大夫之從政者也其所謂仁必已有所見如愽施苟難之類當時子路冉有公西赤仕扵其家觀其氣相皆足與有爲故以仁爲問亦知夫子之門以仁爲首稱也夫子據實而言可使治賦可使爲宰可使儐相而不可謂仁盖仁者本心之全德聖門不易言也才者三家之所需諸子不易得也既不損三子之眞亦不輕爲仁之體聖人之問對端可爲萬世法哉子路曰願車馬衣輕裘與朋友共敝之而無憾録曰子路之衣敝緼袍與車馬輕裘有以異乎曰無以異也彼之不耻者廼克己之志此之無憾者爲弘物之仁人必先存不耻之志而後能措無憾之心故夫揚揚過閭里有識者之所共鄙而楚楚若蜉蝣有志者之所不爲曾足爲由也多乎此其所以敝之而無憾也子曰若聖與仁則吾豈敢抑爲之不厭誨人不倦則可謂云爾已矣公西華曰正唯弟子不能學也録曰此仁字是渾然全體乃天道之本然也與平日門人問答一言一事者不同夫子不敢當亦是不自滿之意非但因人之稱亦非特謙己之詞也爲之不厭誨人不倦則駸駸乎純亦不已之天矣若遽以爲己聖與仁不惟滋學者之惑其實一息尚存此志不容少懈此惟全體不息者能之豈門人弟子之所可學哉子張問仁扵孔子孔子曰能行五者扵天下爲仁矣請問之曰恭寬信敏惠恭則不侮寬則得衆信則人任焉敏則有功惠則足以使人録曰張之請問非淵之請目也故以所不足而言夫恭與泰反寬與虐反信與違反敏與怠反惠與賊反以張之務外好高未必不以堂堂爲恭以無拒爲寬以色取爲信以卒遽爲敏以慢令爲惠則五者之効茫茫然矣此造就之深意因病之良藥與他章五美四惡同是一意也曾子曰堂堂乎張也難與並爲仁矣子㳺曰吾友張也爲難能也然而未仁録曰聖門之教以求仁爲的而七十子之所學必以仁道爲歸以曾子之吾日三省與子㳺之學道愛人其視子張不啻陪屣之相去矣若以後世交友観之不非毁則忮尅孰肯箴其病而藥之哉此可見以友輔仁之實不虚美不隱惡責其所難救其所失其爲道至重而爲人至親故終焉西漢書董仲舒少修奮志勤學下帷講誦弟子傳道者以久次相授業或莫見其面盖三年不窺園其精如此進退容止非禮不行學士皆師尊之景帝時爲愽士後爲江都相事易正王帝兄素驕好勇仲舒以誼匡正王敬重焉久之王問粤王勾踐與大夫泄浦㮔蠡謀伐吴滅之寡人亦以爲粤有三仁何如仲舒對曰昔者魯君問柳下惠吾欲伐齊何如下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何爲至扵此哉徒見問耳且猶羞之况設詐以伐吴虖繇此言之奥本無一仁夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯爲其先詐力而後仁誼也録曰先儒謂仲舒有儒者氣象愚竊謂升堂矣未入扵室也何也樊遲聖門高第尚麄鄙近利夫子告以先難後獲終未能達如伸舒三策明君兩相驕主難不如獲未嘗有愠見之色設以賈誼比之便見有海吝之意此正其誼不謀其利明其道不討其功非無當之虚言乃踐履之實事管晏羞與爲伍矣其下帷講讀庶幾時習之悅學士師尊無忝朋來之樂然則豈非人不知而不愠之君子乎雖坐杏墻之側與諸子並驅亦無愧矣東漢書黄憲年十四荀叔遇扵逆旅竦然異之揖與語移日不能去謂憲曰子吾之師表也既而至袁閎所曰子國有顔子寍識之乎閎曰見吾叔度邪同郡戴良才高倨慠而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度自以爲不及覠其人則瞻之在前忽然在後因難得而測矣陳蕃周舉常相謂曰時月之間不見黄生則鄙吝之萌很存乎心郭林宗少㳺汝南先過袁閎不宿而退進徃從憲累日方還或以問林宗林宗曰奉高之器譬諸汎濫雖清而易挹叔度汪汪若千頃波澄之不清淆之不濁不可量也憲初舉孝廉又辟公府友人勸其仕憲亦不拒之暫到京師而還竟無所就天下號曰徵君録曰范𦗉論曰黄憲言論風㫖無所傳間然士君子見之者靡不服深遠去玭吝將以道周性全無得而稱乎余曾祖穆侯以爲憲隤然其處順淵乎其似道淺深莫臻其分清濁未議其方若及扵孔門其殆庶幾此愚扵東京之士獨扵憲之乎取之也弘道終弘道録府三仁朋友之仁宋濂溪先生周敦頥聞道甚早人品甚高胸中灑落如光風霽月雅意林壑初不爲人窘束短扵取名而惠扵求志薄扵徼福而厚扵得民菲扵奉身而燕及𡞦𡟋陋扵希世而尚友千古嘗曰士希賢賢希聖聖希天伊尹顔淵大賢也志伊尹之所志學顔子之所學過則聖及則賢不及則亦不失扵令名見窓前草不除問之云與自家意思一般胸中生意勃勃如也作太極圖易通諸書妙契千百年以來不傳之遺㫖以上接堯舜禹湯文武周孔道統之緒河南程珦使其二子顥頥徃受學焉每令尋仲尼顔子樂處所樂何事二程之學源流于此故顥之言曰自吾見周茂叔吟風弄月以歸有吾與㸃也之意侯師聖字扵伊川未悟訪濂溪留對榻夜談三日乃還伊川驚異之曰非從周茂叔來取其善開發人類如此録曰孔顔之所樂龍德而正中也大人與天地合德其胸次悠然直與萬物上下同流可得而測度之乎茂叔之所希龍德而隱者也君子以成德爲行藹然如和風皓然如皎月可得而矯揉之乎是殆天之所授以開萬世道學之傳其所得扵觀感者不但吟風弄月他日傍花隨柳均是一道此聖人所賛同聲相應同氣相求之妙非泛然言語文字比也明道先生程顥自十五六時厭科舉之習慨然有求道之志反求六經而自得之謂孟子没而聖學不傳以興起斯文爲己任進將覺斯人退將明之書不幸早世其言平易易知賢愚皆獲其益如群飲扵河各充其量曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乘其迷暗今之入人也因其高明自謂之窮神知化而不足以開物成務言爲無不周徧實則外扵倫理窮深極㣲而不可入堯舜之道天下之學非淺陋固滯則必入扵此自道之不明也邪誕妖異之說競起塗生民之耳目溺天下扵污濁雖有高才明智膠扵見聞醉生夢死不自覺也是皆正路之蓁蕪聖門之蔽塞闢之而後可以入道録曰孔門之徒顔子居四科之首當時稱爲好學曰不遷怒不貳過也曰非禮勿視非禮勿聴非禮勿言非禮勿動也曰有若無實若虚犯而不較也是數者非伯淳之優爲也歟觀其終日端坐如泥塑人及至接人一團和氣固未嘗遷怒貳過也充養有道見扵聲容望之崇深弗敢慢也遇事優爲從容不迫測之誠欵弗敢措也何嘗妄言妄動乎寧學聖人而未至不欲以一善成名寧以一物不被爲己病不欲以一時之利爲己功又豈非若無若虚耶此其扵諸儒之中獨得其粹而無以異也伊川先生程頥年十八上書闕下欲天子黜世俗之論以王道爲心游太學見安定先生問以顔子所好何學著論曰學以至聖人之道也學之道奈何天地儲精得五行之秀者爲人其本也眞而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動扵中矣其中動而七情出焉曰喜怒哀懼愛惡欲情既熾而益蕩其性鑿矣故覺者約其情使合扵中正其心養其性愚者則不知制之縱其情而至扵桎亡然學者必先明諸心知所性然後力行以求至仁義忠信不離乎心造次顛沛久而弗失則居之安動容周旋中禮而邪僻之心無自生矣安定得其文大驚處以學職吕希哲師事之力行好古安貧守節此書無所不讀其學必本扵誠動止語默一以聖人爲師不至扵聖人不止也故卒得孔孟不傳之學以爲諸儒倡嘗言爲士者無功澤及人而浪度歲月宴然爲天地間一蠹惟綴緝聖人遺書庶幾有補爾扵是著易春秋傳以傳扵世録曰濂溪之所尋者仲尼顔子所樂何事也安定之所問者顔子所好何學也可見師之所以教弟子之所以學一以道德性命大聖大賢爲之依歸此有宋一代道學之傳度越前古而世道之隆風俗之美所由關也横渠先生張載學有本原好古力行爲關中學者宗師作西銘曰乾稱父坤稱母子兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同飽物吾與也大君者吾父母宗子其大臣宗子之家相也尊高年所以長其長慈孤弱所以幼其幼聖其合德賢其秀也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟顛連而無告者也于時保之子之翼也樂且不憂純乎孝者也違曰悖德害仁曰賊濟惡者不才其踐形惟肖者也知化則善述其事窮神則善繼其志不愧屋漏爲無黍存心養性爲匪懈惡㫖酒崇伯子之顧養育英材頴封人之錫類不施勞而底豫舜其功也無所迯而待烹申生其恭也體其受而歸全者參乎勇扵從而順命者伯奇也富貴福澤將厚吾之生也貧賤憂戚庸玉汝于成也存吾順事殁吾寧也伊川嘗言西銘明理一而分殊擴前聖所未發與孟子性善養氣之論同功自孟子後一人而已録曰二程天資明備故一見濂溪安定聞孔顔樂處如目斯睹如手斯指無伺念慮思索此其明睿所照渾然而無迹也撗渠大槩有苦心極力之効無優游不迫之意命意措詞不能渾然無迹故觀其言者如若未能暢然見後方始無惑此二程張子所由分也觀諸龜山反覆辯難扵前朱子又爲委曲著論扵後西銘至今盛行可見當時豈惟以文會友而以友輔仁扵此益可見矣康節先生邵雍少時自雄其才慷慨欲樹功名堅若刻厲寒不爐暑不扇夜不就席者數年北海李之才聞其好學謂曰子亦聞物理性命之學乎雍乃事之才受河圖洛書宓義八卦六十四卦圖像之才之傳遠有端緒而雍探頥索隱妙悟神契洞徹藴奥汪洋浩愽多所自得及其學益老德益邵玩心高明以觀天地之運化陰陽之消長遠而古今世變㣲而走飛草木之性情深造曲暢遂衍宓羲先天之㫖著書十餘萬言富弼司馬光吕公著諸賢退居洛中雅敬康節爲市園宅名其居曰安樂窩因號安樂先生光兄事雍而二人純德尤鄉里所嚮慕每相飭曰母爲不善恐司馬端明邵堯夫人之德氣粹然望之知其賢然不事表襮不設防畛群然燕笑終日不爲甚異與人言樂道共善而隱其惡有就問學則答之未嘗强以語人人無貴賤少長一接以誠故賢者悅其德不賢者服其化一時洛中人才特盛而忠厚之風聞于天下録曰愚觀古人德器成就或得之扵天資之純或充之扵學力之富或𣶬之扵風俗之羙先生三者具備此所以挺然間出千載之下一人而已龜山先生楊時天資夷曠造詣深遠自幼頴異德器夙成積扵中者純粹而淵宏見扵外者簡易而平淡閒居和樂色笑可親臨事裁䖏不動聲氣與之逰者雖群居終日嗒然不語飲人以和而鄙薄之態自不形也寬大能容物初不見其涯涘又不爲崖異絶俗之行𣶬蓄益廣不敢輕自肆也行年八十志氣未衰精力少年殆不能及至如裁决危疑經理世務若燭照數計而龜卜也豫章先生羅從彦性明而脩行完而潔充之以廣大體之以仁恕精深微妙多詣其極漢唐諸儒無近似者至扵不言而飲人以和與人並立而使人化如春風發物盖亦莫知其所以然也聞龜山得程氏學慨然慕之徒步徃學焉曰不至是幾虚過一生潜思力行以身任重在羅浮山靜坐三年所以窮天地萬物之理充然自得嘗曰祖宗法度不可廢德澤不可恃又曰士之立朝要以正直忠厚爲本正直則朝廷無過失忠厚則天下無嗟怨一扵正直而不忠厚則漸入扵刻一扵忠厚而不正直則流入扵懦其議論醇正皆此類也延平先生李侗姿禀勁特氣象豪邁而充養完粹無復圭角精純之氣逹于面目色温言厲神定氣和語默動靜端詳閑泰自然之中若有成法平居恂恂扵事若無甚可否及其酬酢事變斷以義理則有截然不可犯者講誦之餘危坐終日以驗夫喜怒哀樂未發之前而求所謂中者以爲天下之理無不由是而出既得其本則凡出扵此者雖品節萬殊曲折千變莫不該攝洞貫以次融釋而各有條理如川流脉絡之不可亂大而天地之所以高厚細而品彙之所以化育以至扵經訓之微言日用之小物折之扵此無一不得其衷焉由是操存益固涵養益熟精明純一觸處洞然泛應曲酬發心中節當時學者亟稱之曰愿中如氷壺秋月瑩徹無瑕非吾曹所及也録曰三先生者程朱之正傳後學之矜式其言論氣象表表師法不獨當時爲然百世之下同此良心則同此至德是宜拳拳服膺而弗失也晦庵先生朱熹自少厲志聖賢之學父韋齋得中原文獻之傳推明聖賢遺意以用力扵致知誠意之地先生早歲已知其說而心好之延平扵韋齋爲同門友不遠數百里從之延平稱之曰樂善好義鮮與倫比又曰頴悟絶人力行可畏其爲學也窮理以致其知反躬以踐其實居敬者所以成始成終也謂致知不以敬則昏惑紛擾無以察義理之歸躬行不以敬則怠惰放肆無以致義理之實持敬之方莫先主一終日儼然端坐討論典則自吾一心一身以至萬事萬物莫不有理存此心扵齋莊靜一之中窮此理扵學問思辯之際然充其知而見扵行者未嘗不反之扵身也不睹不聞之前所以戒懼者愈嚴愈敬隱微幽獨之際所以省察者愈精愈密思慮未萌而知覺不昧事物既接而品節不差無所容乎人欲之私而有以全乎天理之正道之正統在扵是矣録曰此文公學問之淵源也以韋齋爲之父所以成之者遠籍溪白水屏山延平爲之師所以助之者深若乃居敬以立其本窮理以致其知反躬以踐其實三言者先生之所自得始終造道不越乎此自秦漢以來千數百餘年所僅見也其得扵己而爲德也以一心而窮造化之原盡性情之妙達聖賢之藴以一身而體天地之道備事物之理任綱常之責其存之也虚而誠其發之也果而確其用之也應事接物而有方其守之也歷變履險而不易至其養深而沈潜者純熟嚴厲者和平心不待操而存學不待講而精猶以爲義理無窮歲月有限常慊然有不足之意録曰此文公道德之成就也觀其自賛曰從容乎禮法之場沈潜乎仁義之府惟闇然而日章或庶幾乎斯語而孟子自得之則居之安居之安則資之深而取之左右逢其源大哉先生斯其至矣謂聖賢道統之傳散在方册聖賢之㫖不明則道統之傳始晦扵是竭其精力以研窮聖賢之經訓扵大學中庸則補其闕遺别其次第綱領條目粲然復明於語孟則深原當時答問之意使讀而味者如親見聖賢而面命之扵易與詩則求其本義攻其末失深得古人遺意扵數千載之上扵書則疑今文之艱澁反不若古文之平易扵春秋則疑聖心之正大决不類傳註之穿鑿扵禮則病王安石廢罷儀禮而傳記獨存扵樂則憫後世律尺既亡而清濁無據若歷代史記則又考論西周以來至扵五代取統系編年之書緝以春秋紀事之法綱舉而不繁張而不紊録曰此文公有功扵繼徃聖也盖自漢以來儒者穿鑿附會支離彷彿未有眞知的見若易傳詩序無慮數千百家而註䟽專門又皆浩愽無要求其確然關扵天命之㣲人心之奥入德之門無以踰扵今之傳註且一字一義莫不理明詞順百千萬世學者指南與天地同其悠久者也周程張邵之書所以繼孔孟道統之傳歷時未久㣲言大義不章先生爲之裒集發明而後得以盛行扵世太極先天圖精微廣愽不可涯涘爲之解剥條畫而後天地本原聖賢藴奥不至扵泯没南軒張公東萊吕公同出其時先生以其志同道合樂與之友或識見少異亦必講磨辯難以一其歸至有病傳註誦習之煩以爲不立文字可以識心見性學者利其簡便側僻固陋自以爲悟其立論愈下者則又崇奬漢唐比附三代以便其功利之私先生力排之教人以大學語孟中庸爲入道之序而後及諸經以爲不先乎大學則無以提綱挈領而盡語孟之精㣲不參之論孟則無以融會貫通而極中庸之㫖趣然不會其極扵中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉是殆天所以相斯文焉篤生哲人以大斯道之傳也由孔子而後曾子子思繼其㣲至孟子而始著由孟子而後周程張子繼其絶至先生而始著録曰此文公有功扵開來學也自夫子集群聖之大成以爲賢扵堯舜朱子集諸儒之大成其功豈下孟子乎萬世學者玩其辭求其義終身受用無有窮已而不知當時極深研幾沈潜反覆或逹旦不寐或累月不息惟日孳孳而不已者當何如也此其至仁盛德無間賢愚大小少長貴賤周徧懇至而莫與之爲伍也南軒先生張栻生有異質頴悟夙成父忠獻公教以忠孝仁義之實既長命逰胡仁仲之門一見知其大器即以所聞孔門論仁深切之㫖告之退而思之若有得也以書質焉胡公報之曰聖門有人吾道幸矣以是益自奮勵直以古聖賢自期作希顔録以自警策所造既深猶未敢自足取友四方益務求其所未至蓋玩索講評踐行體驗然後昔之所造愈精遠而反以得乎簡易平實之地其扵天下之理皆瞭然心目之間而實有以見其不能已者是以决之勇行之力而守之固凡所以篤扵君親一扵道義而没世不忘者初非有所勉慕而强爲之也其教人必使之先有以察乎義利之間而後明理居敬以造其極其剖析開明傾倒切至必竭兩端而後已常曰學莫先扵義利之辯而義也者本心之所當爲而不能自己非有所爲而爲之者也一有所爲而爲之則皆人欲之私而非天理之所存矣至哉言也可謂擴前聖所未發而同扵性善養氣之功者歟録曰自義利之說不明而人心之害孔棘其禍至扵夷狄其人丘陵其墟係縲其君臣蕩覆其社稷不但戰國其時而已也至其末也以便安爲上策和議爲得計甘心事仇降志左衽又不但管啇其君而已也當時朝庭之上君臣之間豈皆喪心病狂之徒而敬夫父子爭之益力爲之愈奮苟非眞有見扵天理之當然而非人欲之私僞安在其勇徃而不顧哉此其義利之辯身體而力察之初非托諸空言以欺扵世而已矣眞西山先生德秀時學禁益嚴慨然以斯文自任講習而服行之修讀書記以性命者義理之源故以爲首性之發爲情而心則統乎性情三者一編之綱領也其目則仁義禮智信者天命之性也父子君臣夫婦長幼朋友者率性之道也人所共由之謂道得之扵己之謂德其實非有二也故繼之曰中曰一曰極曰誠皆道也而異其名故又繼之士之求道將何所始敬者學之本根故列于首次曰師道曰教法曰聖人而辯君子小人之分與吾道異端之别皆大學之事故又次之陰陽造化之理其略已見性命篇未備者復以終焉其衍義一書以爲人君而不知大學無以清出治之源人臣而不知大學無以盡君臣之法此書所陳實百世傳心之要典而非孔氏之私言也近世大儒嘗爲章句或問以折其義竊思所以羽翼是書者本諸聖賢之學以明帝王之治據已徃之迹以待方來之事斷然以爲君天下之律令格例也故以明道術辯人才審治體察民情爲格物致知之要崇敬畏戒逸欲爲誠意正心之要謹言行正威儀爲修身之要重配匹嚴内治定國本教戚屬爲齊家之要四者之道得則治國平天下在其中矣録曰愚觀二書之義而私竊比之以著斯録也其引用先聖先賢迄扵當今作者嘉言善行一准大學衍義而以録曰起例參之已見至不主故常不膠訓詁此又不韙之愚意也夫當道學大明之時家誦人習而主扵故常不如無録乎矧義理無窮人心有感千變萬化皆從此出而膠扵訓詁自畫其進乎孔子曰人能弘道非道弘人後生敢不黽俛思以企及乎哉就有道而正竊於眞文公三嘆鶴山先生魏了翁自少英悟絶出人稱神童時方諱言道學既登進士值韓优胄史彌遠相繼柄用遂力辭詔命築室白鶴山以所聞扵輔廉李燔者開門授徒由是蜀人盡知義理之學其爲學也即物以明義反身以求仁審夫小學術藝之細以推乎興禮會通之大本乎平居至漏之隱而充極扵天地鬼神之著以爲聖賢之書由漢以來諸儒誦而傳之得至扵今其師弟子顓門相尚雖卒莫得其要然而古人之遺制前哲之緒言存乎其間盖有不可廢者自濂洛之說行朱子祖述發明學者知趨乎道德性命之本廓如也而從事扵斯者誦習成語惟日不足所以愽文多識之事若將略焉矧近世之弊好爲鹵莽其求扵此者或未切於身心而放諸彼者曾弗及扵詳愽扵是傳註之所存者其舛僞牴牾之相承既無以明辯其是非而名物度數之幸在者又不察其本原誠使有爲扵世何以徵聖人制作之意而爲因革損益之器哉先生盖有憂之故加意扵儀禮周官大小載之記及取九經洼䟽正意之文據事别類而録之謂之九經要義其志將以見夫道器之不離而正其臆說聚訟之惑世此正張氏以禮爲教而程氏徹上徹下之語者也録曰愚觀鶴山之論而嘆今之學者盖尤不忍言焉攻口耳之筌蹄則傳註有所弗視取仕進之捷徑則名物若罔聞知其失不知抵於何所而後已也前此尚有存心講學一時聚而非之迄今廖廖無聞卒莫之恠而惟日趨扵淺近卑陋其䧟溺人心虧損治道非淺淺也魏氏之憂孰能惕然悚懼乎此録之所以孳孳而不息也元許魯齋先生衡弘毅出扵天性自得河洛之學扵雪齋姚樞之門所在林立盛德之聲昭聞時南北未一世祖得聞帝王之道實先生啓之儒道賴以不墜故世祖不愛名爵以起天下之士力辭執政任胄監其教也始扵小學以及四書而後進于易詩書春秋耳提面命莫不以孝弟忠信爲本人皆化之父以是訓其子兄以是朂其弟且不止各因其材又隨其所至而漸進之因其所明開其所蔽而納諸善時其動息而施張之愼其萌蘖而防範之日漸月漬不自知其變化也以是凡及門者恩同父子能自立爲世用矣又言爲學治生爲先苟生理不足則扵爲學之道有所防彼旁求妄進及作官嗜利者殆亦窘扵生理之所致也士君子當以農務爲主啇賈雖爲逐末亦有可爲者果處之不失義理姑濟一時亦無不可若以教學與作官規圖生計恐非古人之意也録曰普人有比仲平於子雲介甫者豈其然哉彼時與事皆非若二人者何也子雲之時天無二日而莽之匿情可測也如是而爲逄萌譙玄亦云可矣神宗之世民無二王而安石之私意可略也如是而曰内華外夷斯其嚴矣衡生四海分裂之時目擊奸邪誤國之事正所謂夷秋之有君不如諸夏之無而可責以悖春秋之義蹈劇秦之轍乎觀其自建元以來十被召㫖卒不肯枉尺直尋力辭中書以就大學未嘗干以僣王猾夏之議而惟孳孳與人爲善之心盖可識矣若衡者其亦辛中之不幸而非行險以僥倖之謂也國朝薛文清公瑄自幼講明周程張朱之學嘆曰此道學正脉也專心扵是至忘寑食及長剛方正大處己接物不詭隨屈撓嘗曰讀書窮理須實見得然後驗扵身心體而行之不然無異扵買櫃而還珠也拳拳以復性爲教曰此程朱喫緊爲人處六經四書性之一字括盡孟子之後道不成只是性不明故其學心印濂洛神會洙泗自一心一身推之萬事萬物然後約之以歸扵一常瞑目端坐思索有得欣然見扵顔面盖已至扵樂之之境矣若夫風靈之樂鳶魚之詠獨知自詣舉目可見眞可與㸃爾同逰吟弄同適也及乎辭受取與仕止久速光明峻潔魯齋之後未見其倫其飄然脫灑無所顧慮雖劉靜脩鳳凰翔于千仞之氣象又何尚焉録曰國朝理學之儒自汪環谷趙考古宋潜溪方正學而後有薛文清吴康齋楊文懿丘文莊至成化間彬彬輩出若羅一峯章楓山黄未軒莊定山賀醫閭又有胡敬齋鄒立齋陳白沙陳布衣周翠渠張東白其時可謂盛矣然皆未有以見其淵源所自道統所歸其没也亦未見其傳授所指派業所分若周程張朱何王金許意者道學大明人自分朱陸家自爲游楊抑滅以其天資近似者爲功不由師傳默契道體乎今觀敬軒惓惓以復性爲要自一心一身推之萬事萬物而復約之以歸扵一可謂得聖學之本矣故特録之俾有志者循是而入不惟程朱之事業易見而孔顔之傳授亦不外是矣弘道録府四義君臣之義堯曰咨爾舜天之曆數在爾躬允執其中四海困窮天禄永終録曰中之一字自堯始發廼道統之淵源也盖君臣之義匪但尊卑相屬各分相臨而已天之所不能清地之所不能寧鬼神所不能信日月所不能明莫匪賴之故必有叅乎三極之道以作配乾坤而通貫會同充塞洋溢乎其間然非私智穿鑿而爲之也自吾决之乎性善而有不偏不倚無過不及之理廼天命所當然精㣲之極致惟至聖斯允執之如天運扵上而天之曆數無能外矣苟無是則與天地之廣兆民之衆漠然不相干攝安保四海之不困窮天禄之不永終此其提綱挈領繼天立極而開萬古君臣第一義也舜命禹曰人心惟危道心惟㣲惟精惟一允執厥中録曰此中之一義折之愈精而不亂探之愈深而不窮求之愈親而不費參之愈約而不繁者與夫堯之一言至矣盡矣而舜復益之以三言者非有所加也未至扵欽明文思與濬哲文明未免天理人欲混爲一塗相去之間所爭毫末而毫釐之差千里之謬此其憂道之主用功之切後世明君賢臣所當熟察也大禹謨曰后克艱厥后臣克艱厥臣録曰此陳謨第一言舜禹身有之故言之親切而有味也舜自側微至扵徵庸歷試至扵居攝歸格至扵陟方其間若七政之齊百揆之緫九官之命四凶之誅何自而易易乎至禹尤有甚焉水土之勤痛扵匪父胼胝之勞成扵弗子八年之鰥扵靡室四乘之苦甚扵匪躬苟以易心乘之何救扵覆轍耶是故㫖酒之惡慾克也分陰之惜時克也聲律身度己克也左繩右矩治克也一饋十起勤克也一沐三握愼克也自勞心焦恩以至扵吾無間然者何莫非難事耶嗚呼艱則治不艱則亂艱則安不艱則危他日夫子喫緊而言曰一言興邦一言喪邦吁可不慮哉臯陶曰無教逸欲有邦競競業業一日二日萬幾無曠庶官天工人其代之録曰臯陶之意盡其愈勤而愈密耶未克艱者心也而所以盡之其萬幾乎今夫天一晝夜之間周天三百六十五度四分度之一其日月之旋轉星辰之運動陰陽之交錯五行之聚散何啻其萬分耶猶之扵君也一日二日之間由寑興灑掃以至車馬戎兵由常伯褻御以至夷狄蠻貊其朝廷之治亂生民之休戚社稷之安危天下之盛衰何啻其萬殊耶然皆係于一念心思之㣲動扵善則無有不善而萬緒皆理矣動扵不善則無有扵善而萬事皆非矣是故競競以守之業業以持之必使幾之在我者無一髮之私無毫釐之差是雖紛紜轇轕萬有不齊一以貫之而無遺矣此天工人代之意合内外而一之也益稷曰臣哉鄰哉鄰哉臣哉録曰有天則有地地附乎天者也有君則有臣臣依乎君者也天一氣而已至扵生生之所以著物物之所以繁天者喬者飛者潜者峙而載者振而流者周徧廣闊磅礴深厚無乎不至皆地之功也君一人而已至扵朝廷之所以正萬國之所以匡用人行政安上治民上而三光下而群生外而四夷遠而八荒莫不咸宜皆臣之功也此君臣之義無所迯扵天地之間而虞廷陳謨首發臣哉鄰哉之㫖且反覆申重極其咏嘆爲人上者所當㴠泳而弗失也帝曰臣作朕股肱耳目予欲左右有民汝翼予欲宣力四方汝爲予欲觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡以五采彰施于五色作服汝明予欲聞六律五聲八音在治忽以出納五言汝聴録曰自股肱耳目之義著而後元首腹心益見其可親非但理之當然亦勢之必然也今夫手足痿痺謂之不仁其目不明則不成人人之一身可缺一乎必若身之使臂臂之使指外有耳目之德内有聦明之實而後能戴天履地而爲人苟無是則一物無所見一步不可行矣惟君也亦然是故有股肱然後能翼然後能爲有耳目然後能明然後能聴而周身之用全故治天下可運之掌也然其義在扵自明其德詩不云乎不明爾德時無背無側爾德不明以無倍無卿嗚呼其知愼哉予違汝弼汝無面從退有後言欽四鄰録曰面從豈爲臣之得已哉設若刀鋸在前𣇄鑊在後猶之可也然且决術扵立談之頃逢君扵指顧之間惟知其言而莫予違而不顧理之可否事之得失吁一至此也後言豈人君之樂從哉或者因人轉移隨事納約猶之可也然且要結扵私交之際指釁扵庭論之間甚者拾己徃之緒餘證在已之曲說吁一至此也盖由爲君者不尊弼直之義爲臣者不敬臣鄰之職而爾汝之間偏聽獨任豈知朝廷者衆人之朝廷天下者天下之天下奚以一人之向背而决萬事之是非乎益曰吁戒哉儆戒無虞罔失法度罔逰于逸罔淫于樂任賢勿貳去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王録曰爾無面從退有後言者大廷之上百官之前批逆鱗犯忌諱所以遏人欲扵將萌存天理扵既滅也戒哉儆戒無虞者廣厦之下細旃之上明君在前拂士在後所以致治扵未亂保邦扵未危也四夷之來王不曰兵堅甲利而曰任賢去邪一志齊慮益之志可以見矣其來有苗之格而動天心之届豈偶然之故哉盂子曰湯執中立賢無方録曰堯舜禹但言執中而不言立賢盖唐虞之際有八元八愷九官十二牧濟濟相讓克滿于廷湯之時聿求元聖而且五就湯五就桀苟非三使徃聘烏能幡然而起此推位讓國與推亡固存之所由異而反之以至扵聖與精一以致其中者同是一軌也歟湯誥曰聿求元聖與之同力又曰眷求一德俾作神主録曰此可見相道之隆重而湯之自任亦不可誣也不徒曰聖而曰元聖不徒曰德而曰一德盖與天地立心生民立命先天而天弗違後天而奉天時故曰與之同力俾作神主豈若後世好臣其所教而不好臣其所受教則扵君道亦尋常卑近而已無恠乎其自聖也萬章問曰伊尹以割烹要湯有之乎孟子曰伊尹耕扵有莘之野而樂堯舜之道焉非其義也非其道也禄之以天下弗顧也繫馬千駟弗視也非其義也非其道也一介不以與人一介不以取諸人湯使人以幣聘之囂囂然曰我何以湯之聘幣爲哉我豈若處𤱶畆之中由是以樂堯舜之道哉湯三使徃聘之既而幡然改曰與我處𤱶畆之中由是以樂堯舜之道吾豈若使是君爲堯舜之君哉吾豈若使是民爲堯舜之民哉吾豈若扵吾身親見之哉天之生此民也使先知覺後知使先覺覺後覺也予天民之先覺者也予將以斯道覺斯民也非予覺之而誰也思天下之民匹夫匹婦有不被堯舜之澤者若已推而内之溝中其自任以天下之重如此故就湯而說之以伐夏救民録曰四岳之舉而猶歷試諸艱者堯非得已也家難而天下易家親而天下踈舜可禪乎吾兹試矣三聘之及而猶嚚嚚自得者尹非不恭也故將大有爲之君必有所不召之臣其尊德樂道不如是不足與有爲也此三聘之禮誠哉人主之高致帝王之盛節如是而猶有割烹要湯之譏出處之際可不愼哉又曰尹何以樂堯舜之道耶堯舜之道性分所固有奚吾而存奚人而亡人惟不自重也扵貧賤戚戚焉貧賤而已耳飯糗茹草何物乎扵富貴汲汲焉富貴而已耳木石鹿豕何事乎是故莫大扵精一執中而非義非道辦之何精莫難扵有天下而不與而一介千駟守之何固莫急扵存心天下而先知覺後知先覺覺後覺視之何親莫先扵加志窮民而天下之民匹夫匹婦任之何切是豈虚談假設以欺世盗名哉厥後孟夫子庶幾任之其曰人知之亦囂囂人不知亦嚚嚚即三辭徃聘之心也曰窮不失義達不離道即天下弗視之心也曰中天下而立定四海之民即非予而誰之心也曰得志澤加于民逹則兼善天下即自任之重之心也奈何戰國之不三代惠宣之不成湯衹見三宿出晝而未聞三聘入疆也可慨夫說命曰朝夕納誨以輔合德若金用汝作礪若濟巨川用汝作舟楫若歲大旱用汝作霖雨録曰礪者他山之石可以攻玉也舟者濟險舉難利涉大川也霖者諫行言聽膏澤下扵民也是三者相之道也然亦有若金而變革者有若丹而胥溺者有若旱而共焚者故人君苟得其相則何事不濟苟不得其相則豈惟瞑眩厥疾終膏盲吾憂矣豈惟自傷厥足終袒裼吾懼矣此録之深意也說復于王曰惟木從繩則正后從諫則聖録曰木從繩者規矩方圓之至也后從諫者聖人人倫之至也三代守成之主克即負荷不墜厥緒端賴扵此唐之太宗嘗舉以訓太子庶幾可與言者他日又曰木心不正脉理皆邪嗚呼斯木也其諸異乎從繩之木也歟孔子曰三分天下有其二以服事殷周之德其可謂至德也已矣録曰孔子之稱文王蓋有見扵賛易也乾爲天爲君爲上爲冠爲首坤爲地爲臣爲下爲履爲足臣之不可加扵君猶地之不可加扵天下之不可加扵上履之不可加于冠足之不可加扵首皆聖人賛易之義也雖曰天與之人歸之吾寧含章焉吾寧履霜焉此其立心之含弘處己之光大御物之貞順德福之無疆果何所紀極何所限量乎故不惟曰德而曰至德史稱西伯陰行善者可不待難而自釋矣史記武王伐紂伯夷叔齊叩馬而諫左右欲兵之太公曰此義人也扶而去之録曰愚觀夷齊之諫至今凛凛猶有生氣然卒不能已扵伐紂之師則義士之言果安用乎曰非也天理之所以常存而人心之所以不死皆以人之一言立扵天地之間也夫苟興周矣苟勝殷矣不期而會矣上帝臨汝矣然而天尊地卑之誼實在也扵此而無片言及之乾之策不幾扵息君之分不幾扵亡乎故不得已而爭之爭非能止殷之亡所以存殷之心亦非能遏周之興所以扶周之理也豈非天地間不可泯没不可澌盡之元氣歟或以爲匹夫不可奪志其君之所許夷齊之所不許則其道狹矣武成天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志録曰泰誓既以作民父母陣扵前武成復以作之君師陳扵後言何復歟曰非也天以仁育萬物以義正萬民由前之言仁則能盡夫義由後之言義所以行夫仁也是故非天子不敦典庸禮不命德討罪受既爲天子矣乃反而力行無度昏棄厥祀則典禮何在罪人以族官人以世則命討何在扵此而不得克相者以寵綏之則天地之聰息而萬物之靈蔑矣此天地之大義待君師而後行世㣲武王則一日不可治一事不可理一步不可安一夫不可能苟有一毫利天下之心則厥罪惟均又安能保其無越志乎乃反啇政政由舊釋箕子之囚封比干之墓式商容之閭散鹿臺之財發鉅橋之粟大賫于四海而萬姓悅服録曰此勝殷之始其施爲氣象扵湯而有光也夫啇政之舊即周政之新者也箕子傳道所在不可一日無啇容禮法所存不可一日廢比干直道所係不可一日誳百姓天心所向不可一日踈散財非私恩也所以富天下也大賫非愽施也所以富善人也此所以萬姓而悅服也列爵惟五分士惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇德報功垂拱而天下治録曰此造周之終其施爲氣象視古爲無忝也夫皇極之敷言即此篇之本末也既富方穀則爵土不可玩近天子之光則賢能不可虚錫厥庶民則五教不可輕入政厚生則民食不可後敦明信義王道蕩蕩也崇德報功王道平平也此所以垂拱而天下治也周官王曰若昔大猷制治于未亂保邦于未危唐虞稽古建官惟百内有百揆四岳外有州牧侯伯庶政惟和萬國咸寧夏啇官倍亦克用又明王立政不惟其官惟其人令予小子祗勤于德夙夜不逮仰惟前代時若訓廸厥官立太師太傅太保兹惟三公論道經邦燮理陰陽官不必備惟其人少師少傅少保曰三孤二公弘化寅亮天地弼予一人冢宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司㓂掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利六卿分職各率其屬以倡九牧阜成兆民録曰此成王所得扵周公之論道而爲萬世不刊之令典也夫周官之書三公六卿而一言蔽之曰官不必備惟其人周禮之建各屬三百有六十而一言蔽之曰不惟其官惟其人公之意可以見矣而何以學周禮者之紛紜而不一也夫公之所建者制也所周者意也玩其制師其意斯可矣按其駿索其斑非善學者之意此録止及扵周官也學古入官議事以制政乃不迷其爾典常佐之師無以利口亂厥官蓄疑敗謀怠忽荒政不學墻面蒞事惟煩戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱位不期驕禄不期侈恭儉惟德無載爾僞作德心逸日休作僞心勞日拙居寵思危罔不惟畏弗畏入畏推賢讓能庶官乃和不和政龐舉能其官惟爾之能稱匪其人惟爾不任録曰此所謂不惟其官惟其人也夫官虚器也人實用也所謂惟其人者則必幼而學之壯而行之此造士之標凖也其進于是則必功崇業廣不驕不侈作德日休居寵思危此大臣之體叚也至扵推賢讓能舉能其官則是官之職治永永而無斁矣是道也惟周公信能任之惟成王信能行之後世有作不可尚矣周禮冢宰以八柄詔王馭群臣一曰爵以馭其貴二曰禄以馭其富三曰廢以馭其罪四曰置以馭其行五曰誅以馭其過六曰生以馭其福七曰予以馭其幸八曰奪以馭其貧録曰謂之柄者所秉執以起事王者御九有而齊之扵手也謂之馭者所操縱以致遠王者驅一世而内之扵善也天無福善禍淫不能使人畏君無賞善罰惡不能使人服其畏者非其所愛者也其報者非其所私者也王天王也官天官也天無私覆聖人豈有私好哉無私好亦無私惡是故爵必稱其德禄必稱其功置必當其賢生必當其勞隨物付之非我所由也予必當其善奪必當其罪廢必稱其辜誅必切其過人自求之非已所千也故能不勞餘力而振起九有不廢精神而馳驅一世若乃爵之禄之隨其所好當廢當奪私其所憎則是亂本而非操柄也朽索而非六馱也本以詔王而反以速禍將安所用扵天官乎此宰天下之第一義不可以不知也大司徒以鄉八刑紏萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑録曰八刑而必及扵造言亂民者夫言必及義非所謂之造也惟夫讒佞邪慝之徒人所公是也而非之人所公非也而是之而人之好爲不義者入之而難解則天下被其害矣詩所謂無縱詭隨以謹無良者也行而有常非所謂亂也惟夫行險僥倖之輩蔑棄綱常以圖非望之及悖亂物則以速稱心之謀而民之善爲虺蜴者從之而莫痊則率土罹其禍矣詩所謂民今方殆視天夢夢者也此上世之所必誅也檀兮事君有犯而無隱左右就養有方服勤至死方喪三年録曰君何以必有犯乎蓋君之一心萬幾攸萃恩可以造人之命威可以制人之生進可以措天下扵安退可以置天下扵危不得已而有言乃死生安危所係故謂之犯也臣何以必有方乎蓋臣之從君死生所以心雖無窮而分則有限事雖至廣而力則難干故大不可以侵小下不可以侵上不得已各司其事乃吉凶榮辱所關故謂之方也夫左右者職也無隱者必也以有方對無隱職雖各異而犯則相同然則自諉無官守無言責與繩人以出位皆非也豈服勤之道哉無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民衹懼不敢荒寍肆中宗之饗國五十有五年其在高宗時舊勞于外爰暨小人作其即位不敢荒寍嘉靖殷邦至于小大無時或怨肆高宗之饗國五十有九年其在祖甲爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之饗國三十有三年自時厥後立王生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克壽或十年或七八年或五六年或三四年周公曰嗚呼厥亦惟我周太王王季克自抑畏文王卑服即康功田功自朝至于日中昃不遑暇食文王受命惟中身厥饗國五十年周公曰嗚呼繼自今嗣王則其無淫于觀于逸于逰于田以萬民惟正之供無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒德哉周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張爲幻否則厥心違怨否則厥口詛祝周公曰嗚呼自殷王中宗及我周文王兹四人迪哲厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒周公曰嗚呼嗣王其監于兹録曰此周公告成王第一義也夫天下至鄙者莫如稼穡至勞亦莫如之而至益于民亦莫如之及其至也躬稼而有天下則至仁亦莫如之此天命去留之本人心向背之源壽命脩短之根德福廣狹之驗自祖宗來積功累仁千有餘年未始一日忽忘之也然或不知小民之情則亦非迪哲之道盖好逸者民之常情也又必胥訓告胥教誨略其怨詈詛祝之愚而惟反己自責則無逸之德通乎上下豈惟成王所當監哉後賢後王莫不然也豈惟後賢後王萬世君臣亦莫不然故各以嗚呼發之所以深致其嘆息興起之意云周公以成王未知稼穡之艱難故陳后稷公劉風化之所由使瞽曚朝夕諷詠以教之其詩曰七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歲三之日于耜四之日舉趾同我歸子饁彼南畆田畯至喜七月流火九月授衣春日載陽有嗚倉庚女執懿筐遵彼㣲行爰求柔桑春日遲遲采蘻祁祁女心傷悲殆及公子同歸七月流火八月萑葦蠶月條桑取彼斧斨以伐遠楊猗彼女桑七月鳴鵙八月載績載玄載黄我朱孔陽爲公子裳四月秀葽五月鳴𧍯八月其穫十月隕蘀一之日于貉取彼狐狸爲公子裘二之日其同載纉武功言私其豵獻豜于公五月斯螽動股六月莎鷄振羽七月在野八月在宇九月在户十月蟋蟀入我牀下窒熏鼠塞向墐户嗟我歸子曰爲改歲入此室處六月食欝及薁七月亨癸及菽八月剥棗十月穫稻爲此春酒以介眉壽七月食瓜八月斷壺九月菽苴采茶薪樗食我農夫九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乘屋其始播百穀二之日鑿氷冲冲三之日納于凌陰四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯響曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆録曰此詩與無逸相表裏觀其一字一義小民知之君子亦知之及其至也聖人有所未盡眞經天緯地之文徹上徹下之語且不以直陳於前而使人諷詠扵其側賢扵法語之言矣夫歌詠所以養其性情以王之幼冲血氣尚未定也而瞽矇奉之則宫人私侍遠矣古人之詩如今之歌曲而朝夕陳之則盤樂怠傲蔑矣此古之詔王者不必遠其聲色而聲色自遠不必絶其逰畋而逰畋自絶不必輟洗止輦而自不覺其入之深不必犯顔諫諍而自不覺其聴之熟三伐守成之令主豈易得哉召康公從成王逰歌扵卷阿之上因王之歌而作此以爲戒曰有卷者阿飄風自南豈弟君子來㳺來歌以矢其音伴奂爾游矣優㳺爾休矣豈弟君子俾爾彌爾性似先公酋矣爾土宇皈章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣爾受命長矣茀禄爾康矣豈弟君子俾爾彌爾性純嘏爾常矣有馮有翼有孝有德以引以翼豈弟君子四方爲則顒顒卬卬如圭如璋令聞令望豈弟君子四方爲網鳳凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子鳳凰于飛翽翽其羽亦傳于天藹藹王多吉人維君子命媚于庶人鳳凰鳴矣于彼高岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈君子之車既庶且多君子之馬既閑且馳矢詩不多維以遂歌録曰尚論古人惓惓忠愛其君至于周成蔑以加矣然觀其所以爲戒者一則卷阿可樂之地飄風可樂之景二則因歌爲戒非有𦀕切之意矢詩不多非有急迫之言先之以歆動之私終之以太平之瑞此古之聖賢言不廢而道相成使其君聴之自然優㳺厭飫而不覺其心契之深者嗚呼心契而言可忘矣其扵儼戒乎何有弘道終弘道録府五義君臣之義康王之誥王出在應門之内太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黄朱賓稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣德答拜太保暨芮伯咸進曰敢敬告天子皇天改大邦殷之命惟周文武誕受姜若克恤西土惟新陟王畢恊賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我高祖寡命王若曰庶邦侯甸男衛惟予一人釗報誥昔君文武丕平富不務咎底至齊信用昭命于天下則亦有熊羆之士不二心之臣保乂王家今予一二伯父尚胥既顧綏爾先公之臣服于先三雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞録曰先儒以張皇六師似導王尚武者又曰守成之世多溺宴安而無立志皆非也國之大事在祀與戎康王受顧命之時太保奉同三祭三咤此時出厥門以俟非有異日也而首及扵張皇六師正以見國之大事此今文合扵顧命良以此也其答拜稱名皆是未踰年之事故曰義嗣德非謂預見先憂扵未然說之過矣君臣王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉昔周公師保萬民民懷其德徃愼乃司兹率厥常𢡟昭周公之訓惟民其乂我聞曰至治馨香感于神明黍稷非馨明德惟馨爾尚式時周公猷訓惟日孜孜無敢逸豫凡人未見聖恭不克見既見聖亦不克由聖爾其戒哉録曰愚觀周公居東三年非親自監殷也其東人懷之也則曰我覯之子衮衣繡裳又曰無以我公歸兮無使我心悲兮商民扵此盖已知明德惟馨親見聖哲之人不啻其感興也正以君陳孝友恭敬能法聖人故命以從政而啓其見賢思齊之心成王所以侍君陳至矣非謂王化頑民不求威猛剛克之夫而屢之孝友之君陳審如是君臣之道狹矣爾有嘉謨嘉猷則入告爾后于内爾乃順之于外斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉無依勢作威無倚法以削寬而有制從容以和殷民在辟予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中有弗若于汝政弗化于汝訓辟以止辟乃辟紐于姦究敗常亂俗三細不宥爾無忍疾于頑無求備扵一夫必有忍其乃有濟有容德乃大簡厥修亦簡其或不修進厥良以率其或不良允升于大猷惟予一人膺受多禍録曰愚觀成王之詔君陳而實以詔萬世也夫明德孝友爲治之本也忠順寬和效治之用也苟扵威福刑辟之間舉措忿疾之際或失則迎合或失則偏倚責人以所不能率人以所不由取人以所不備凡此皆非盡善之道故悉舉而歷陳之而終歸扵容忍大德焉是時成王春秋鼎盛所患不能忍不能容耳而能舉以詔人則必能自勉矣不然予曰辟奚伺爾勿辟子曰宥奚伺爾勿宥而反以止辟耶畢命惟十有二年六月庚午朏越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命惟周公左右先王緌定厥家毖殷頑民遷于洛邑密邇王室式化厥訓既歷三紀世變風移四方無虞予一人以寧道有升降政由俗革不臧厥臧民罔攸勤惟公𢡟德克勤小物弼亮四世正色率下罔不抵師言嘉績多于先王予小子垂拱仰成今予抵命公以周公之事徃哉旌别淑慝表厥宅里彰善癉惡樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻愼固封守以康四海政貴有恒辭尚體要不惟好異啇俗靡靡利口惟賢餘風未殄公其念哉惟周公克愼厥始惟君陳克和厥中惟公克成厥終三后恊心同底于道道洽政治澤潤生民四夷左衽罔不咸賴扵小子永膺多福録曰愚觀保釐之命非止爲殷之頑民也盖成王之制中分天下主以二伯自陜以東周公主之代之者君陳也又代之者畢公也故即位之時常率東方諸侯入應門若矣其命之者非始徃也王新即位必有告命之詞而召公爲西伯獨無者豈以留相天子或史闕之歟未可知也其曰毖殷頑民者原其始也曰商俗殷士者周人每事監殷豈但告命之詞哉其作詩皆曰殷士膚敏有啇孫子是也其曰旌别淑慝彰善癉惡乃爲國本務非孜孜扵殷亦非謂周公毖殷爲謹厥始君陳有容而和厥中至是始可以旌别淑慝皆註者不達經文大㫖徒以毖殷頑民洛邑一方爲主意遂使保釐之大意皆爲化殷之偏詞非康王垂拱仰成之遺則也惟泥扵一偏故凡註四方無虞以康四海澤潤生民四夷咸賴處殊增窒碍讀者所當致思也我聞曰世禄之家鮮克由禮以蕩陵德實悖天道敝化奢麗萬世同流兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜侉將由惡終雖收放心閑之惟艱資富能訓惟以永年惟義時乃大訓不由古訓干何其訓録曰愚觀成王之戒殷士何其切切哉夫令聞廣譽施于身所以不願人之文繡也鄭子臧之冠楚得臣之纓玉皆以惡終也不特此爾甘食之性妖艷之風沉湎之慾黷貨之情勢所必至弟以詞命之重不得以狎妮叅之故衹以服羙爲言耳嗚呼三代且然况後世乎此不忮不求所以難乎其選也君牙王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常惟予小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方心之憂危若蹈虎尾涉于春氷今命爾予翼作股肱心膂纉乃舊服無忝祖考弘敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧嗚呼丕顯哉文王謨丕承哉武王烈佑啓我後人咸以正罔缺録曰此穆王也夫子豈與之歟曰非也臣觀先朝之時非無車轍馬跡也而公私之途嘗分爲二道是故綱紀法度刑政禮樂大公之選也盤樂逰觀聲色貨利己私之奉也公固不得以廢私私亦不得以害公二者常並行而不悖故不至扵亂也夫子不云乎仲步圉治賓客王孫賈治軍旅夫如是奚其喪向使穆王逞其私智不以君牙爲司徒而以造父爲心膂五教五典混爲一途君子小人並扵樞要則小民之怨咨孰與之圖文武之謨訓孰與之紹哉聖人列之扵經正以見典常之不可紊綱紀之不可缺其㫖深矣冏命王若曰伯冏惟予弗克于德嗣先人宅丕后怵惕惟厲中夜以興思免厥愆昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民抵若萬邦咸休惟予一人無良實賴左右前後有位之士匡其不及繩愆糾謬格其非心俾克紹先烈今予命汝作大正正于羣僕侍御之臣懋乃后德交修不逮愼簡乃僚無以巧言令色便辟側媚其惟吉士僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣爾無昵于憸人充耳目之官迪上以非先王之典非人其吉惟貨其吉若時瘝厥官惟爾大弗克祗厥辟惟予汝辜録曰此僕正也見扵周禮皆士人之職王所與朝夕逰宴左右進退之不離也其屬有祭僕所與供祀隸僕所與寢興戎僕所與御戎齊僕所與掌輅得其人則薰陶漸染納扵善而不知不得其人則邪媚瞽惑入扵惡而罔覺自後世專用宦寺溺近親幸而無官守言責故惟務巧言令色便辟側媚獻諛啓寵崇貨納賂此扵三代之時史臣逆知其端雖以命伯冏實以訓萬世也豈待亂本已成而後其弊方彰乎又曰二篇之書先儒謂當時仁人君子修詞立誠以勸勵其臣正所以感動王也今觀一則曰厥后自聖二則曰惟貨其吉兹二言者受病之根也夫穆王豈瞶聵扵人下者哉其馳騁放肆必以堯舜陟方自居拒諫飾非必以禹湯賢聖自任不遑寢處必以文武憂勤自解然後悉意行之而無所忌憚矣侈心既生國誰與足此吕刑一書始終以贖罪爲言當時之重貨可知矣而惓惓以繩愆糾繆望其僕臣便辟側媚戒其耳目可謂善諷其君者矣不知伯問聴之可以爲解乎其將自任乎吾不得而知則亦無得而辜矣國語穆王將征大戎祭公謀父諫曰不可先王耀德不觀兵夫兵戢而時動動則威觀則玩玩則無震先王之扵民也茂正其德而厚其性阜其財求而利其器用明利害之鄉以文修之使務利而避害懷德而畏威故能保世以滋大夫先王之制邦内甸服邦外侯服侯衛賓服蠻夷要服戎翟荒服甸服者祭侯服者祀賓服者饗要服者貢荒服者王日祭月祀時饗歲貢終王先之訓也有不祭則修意有不祀則修言有不饗則修文有不貢則修名有不王則修德序成而有不至則修刑扵是乎有刑不祭伐不祀征不饗讓不貢告不王扵是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又不至則又增修扵德無勤民扵遠以是近無不聴遠無不服今自大畢伯仕之終也大戎氏以其職來王天子曰予必以不饗征之且觀之兵其無乃廢先王之訓而王幾頓乎吾聞夫大戎樹惇能師舊德而守終純固其有以禦我矣王不聴遂征之得四白狼四白鹿以歸自是荒服者不至録曰此幽王與弑之漸也夫履霜堅氷由非一日穆之扵康一再世耳文武之澤方隆太平之基不墜蕞爾大戎何足畏哉而不知蜂之毒釀成滔天之禍宗周淪䧟實肇扵此國語之托始亦猶夫子之意也以是爲防猶有無故而主圖燕之議遂致靖康之禍者有漫然而興北伐之師率貽厓山之憂者孟子不云乎國必自伐而後人伐之其諸耀德不觀兵之謂歟厲王說榮夷公芮良夫曰王室其將卑乎夫榮公好專利而不知大難夫利百物之所生也天地之所載也而或專之其害多矣天地百物皆將取焉胡可專也所怒甚多而不備大難以是教王其能久乎夫王人者將導利而布之上下者也使神人百物無不得其極猶日怵惕懼怨之來今王學專利其可乎匹夫專利猶謂之盜王而行之其歸鮮矣榮公若用周必敗既榮公爲卿士諸侯不饗王流于彘録曰夫利何以能畢王室乎周之興也一則曰散鹿臺之財二則曰發鉅橋之粟而海内向風幾致刑措民到于今稱之及其衰也曰惟貨其吉曰惟訖于富而王人漸㣲幾扵列國至此下堂見諸侯矣芮伯之言切近之殷鑒歟雖然後之大聖大賢若子罕言利曾子以義爲利孟子何必曰利其意合其㫖同以世降道陵人懷私欲乃有良夫其人信哉文武之道未墜于地所以雖有夷厲幽平之難未若頭會箕歛之竟亡也詩凡伯刺厲王曰上帝板板下民卒癉出話不然爲猶不遠靡聖管管不實扵亶猶之未遠是用大諫天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣我雖異事及爾同僚我即爾謀聴我囂囂我言維服勿以爲笑先民有言詢于芻芫天之方虐無然謔謔老夫灌灌小子蹻蹻匪我言耄爾用憂謔多將熇熇不可救藥天之方儕無爲夸毗威儀卒迷善人載尸民之方殿屎則莫我敢葵喪亂蔑資曾莫惠我師天之牖民如壎如箎如璋如圭如取如𢹂𢹂無曰益牖民孔易民之多辟無自立辟价人維藩大師維垣大邦維屏大宗維翰懷德維寧宗子維城無俾城壞無獨斯畏敬天之怒無敢戲豫敬天之淪無敢馳驅昊天曰明及爾出王昊天曰旦及爾㳺衍録曰夫所謂之反者盖明明在下赫赫在上者常也上帝板板下民卒癉者反也方難也方蹶也方虐也方懠也天之怒未久也憲憲也泄泄也謔謔也蹻蹻也始之意怠玩悅從也盖人之常情無深長之見遠大之謀其心自以無復聖人未見可畏方且安扵苟且而不自知使能輔之以嚴憚匡之以正直則必有以格其妄誕之心輕躁之習辭輯而懌庶幾有瘳爾惟夫小人不以大言欺之則以諛言毗之夫是其心始放欺天罔人無所不至然後詭随無良之人入而㓂虐無畏之行作善人不得有所爲而民之愁苦極矣此原其始而言也蕩蕩上帝下民之辟疾威上帝其命多辟天生烝民其命匪諶靡不有初鮮克有終文王曰咨咨女殷商曾是疆禦曾是棓克曾是在位曾是在服天降䧟德女興是力文王曰咨咨女殷商而秉義類疆禦多懟流言以對㓂攘式内侯作侯祝靡届靡究文王曰咨咨女殷商女炰烋于中國歛怨以爲德不明爾德時無背無側爾德不明以無陪無卿文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜文王曰咨咨女殷商如蜩如螗如沸如美小大近䘮人尚乎由行内奰于中國覃及鬼方文王曰咨咨女商匪上帝不時殷不用舊雖無老成人尚有典刑曾是莫聴大命以傾文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本寬先撥殷鑒不遠在夏后之世録曰此要其終而言也夫仁暴之相去遠矣然非天之降才爾殊也其所以䧟溺其心者然也而末流遂至扵炰烋内奰蜩螗沸羙孔子不云乎紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉是時法度世臣自周召而下茅與凡芮與祭皆與國同休戚者也其號不得不深痛不得不切故曰疾風知勁草板蕩識忠臣千古之下寍不再三嗟嘆周宣王内有撥亂之志過灾而懼側身修行欲消去之天下喜扵王化復行百姓見憂仍叔作詩美之曰倬彼雲漢昭回于天王曰扵乎何辜今之人天降喪亂饑饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聴早既太甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬旱既大甚則不可推競競業業如霆如雷周餘黎民靡有子遺昊天上帝則不我遺胡不相畏先祖于摧旱既大甚則不可汨赫赫炎炎云我無所大命近止靡瞻靡顧群公先正則不我𦔳父母先祖胡寧忍予旱既大甚滌滌山川旱寇爲虐如惔如焚我心憚暑憂心如熏群公先正則不我聞昊天上帝寧俾我遯旱既大甚黽勉畏去胡寧瘨我以旱憯不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒旱既大甚散無友紀鞠哉庶正疚哉家宰趣馬師氏膳夫左右靡人不周無不能止瞻仰昊天云如何里瞻仰昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求爲我以戾庶正瞻仰昊天曷惠其寍録曰此宣王中興之本也夫視民如傷文祖之實心也大司徒以荒政十有二聚萬民周禮之實事也以實心求實事安得不競競業業如惔如焚乎此見先王不以常數爲解不以冥漠爲辭而必以身當之然後鞠哉庶正疚哉冢宰靡人不周無不能止一有懈怠之心吾見三事大夫莫肯夙夜邦君諸侯莫肯朝夕又安能以定衆正乎然則漢武帝水旱常數之言宋神宗天變不足畏之說皆其自悮非人悮之也嗚呼執熱而不濯者無已時也遇灾而知懼者不旋踵也此蹶然顛撥與勃然中興不可同語也矣周室中衰萬民離散而宣王能勞來還定安集之流民喜之而作詩曰鴻鴈于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡鴻雁于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅鴻雁于飛哀鳴嗷嗷維此哲人謂我劬勞維彼愚人謂我宣驕録曰此宣王中興之政也夫有憂勤惕厲之心而後有勞來安集之政小雅之先六月功之首也斯録之及鴻鴈義之最也與民亦勞止蜩螗沸美者異矣大夫刺幽王曰王月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京哀我小心癙憂以痒父母生我胡俾我瘉不自我先不自我後好言自口莠言自口憂心愈愈是以有侮憂心惸惸念我無禄民之無辜並其臣僕哀我人斯于何從禄瞻烏爰止于誰之屋瞻彼中林侯薪侯蒸民今方殆視天夢夢既克有定靡人弗勝有皇上帝伊誰云憎謂山蓋卑爲罔爲陵民之訛言寧莫之懲召彼故老訊之占夢具曰予聖誰知烏之雌雄謂天盖高不敢不局謂地盖厚不敢不蹐誰號斯言有倫有眷哀今之人胡爲虺蝪瞻彼阪田有莞其特天之杌我如不我克被求我則如不我得執我仇仇亦不我力心之憂矣如或結之今兹之正胡爲厲矣燎之方揚寍或滅之赫赫宗周褒姒滅之終其永懷又窘陰兩其車既載乃棄爾輔載輸爾載將伯助予無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意魚在于沼亦匪克樂潜雖伏矣亦孔之昭憂心慘慘念國之爲虐彼有㫖酒以有嘉殽洽比其鄰昏姻孔云念我獨兮憂心慇慇佌佌彼有屋䔩䔩方有穀民今之無禄天天是椓哿矣富人哀此惸獨録曰板蕩之所謂憂譴告之時也此詩之所謂憂忘予之時也桑柔之所謂㓕亂生之日也此詩之所謂滅傾城之日也盖厲惟貪暴至幽復以淫德極之此所以局天蹐地而若無所容乎抑此詩既以褒姒犯其人又以臣僕犯其諱尚不以誹謗妖言罪之使無骨肉之變犬戎之禍未可必也奈何輻敗輪折竟莫之止天之仁愛卒無以勝人之昏惑也豈不哀哉十月之交朔日辛卯日有食之亦孔之醜彼月而㣲此日而㣲今此下民亦孔之衰日月告㓙不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧爗爗震電不寧不令百川沸騰山家崒崩高岸爲谷深谷爲陵衰今之人胡憯莫懲皇父卿士番維司徒家伯爲宰仲允膳夫聚子内史蹶維趣馬楀維師氏艷妻煽方䖏抑此皇父豈曰不時胡爲我作不即我謀徹我墻屋田卒汙菜曰予不戕禮則然矣皇父孔聖作都于向擇三有事亶侯多藏不愸遺一老俾守我王擇有車馬以居徂向黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂沓背憎職競由人悠悠我里亦孔之痗四方有羨我獨居憂民莫不逸我獨不敢休天命不徹我不敢傚我友自逸録曰按周禮三公論道六卿分職未有所謂相臣也幽王扵六卿之外更爲都官以總六官之事非相臣而何以皇父一人而變亂成法遂致日食之變且扵純陽之月焉盖幽王昏德不振加灾扵小民致土木私興而不息羣臣朋比以相從國之危亡能幾何哉嗚呼厲王之時典刑未廢幽王之世一老不遺厲王之時專利在己幽王之世封殖自人此王身致亂雖同而王室存亡各異歟周室東遷大夫行役過故宗廟宫室盡爲禾黍憫宗社之傾覆徬徨不忍去作詩曰彼黍離離彼稷之苗行邁靡靡中心摇摇知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉録曰夫子扵春秋曰知我者其惟春秋乎罪我者其惟春秋乎與詩知我者謂我心憂不知我者謂我何求有以異乎曰無以異也夫東遷之變非小變也以天王則被弑以臣子則被辱以社稷則被殘以宗廟則被毁自開闢以來未始有之大變也而當時付之不問君安扵事仇臣安扵忍耻天地閉而不知闢人心亡而不知啓彼豈不覩黍之離離而謂我何求哉盖以傷王政之不綱懼天討之遂廢是以欲進而不能前也其知我者謂我見黍離而感嘆覩宫廟而興悲不知我者謂我以一大夫而冒膺存亡之運過計宗社之規思欲爲其所難爲効其所難効故曰謂我何求然其實不可頃刻而忘扵懷也故復呼天而嘆其其嘆非爲己求非出位吾夫子删詩之時深契其意故亦云然以見春秋之不可已亦大夫行邁之不可遏也其㫖深哉春秋魯隱公元年春王正月録曰詩亡然後春秋作作春秋所以教天下萬世之義也而義何自而托始乎是時王者不作諸侯放恣政教號令不及扵天下是故諸侯各紀其年不奉天子之正朔矣列國各書其事不遵王者之無外矣此何等時也邵子曰五霸之時如冬如冬者地氣不升天氣不降閉塞而成抑何以望其復春耶雖以子貢之賢智尚欲去告朔之餼羊夫子告之曰爾愛其羊我愛其禮是禮也中國所以不類扵夷秋不道所以不同扵禽獸何也夷狄不知有君禽獸不知有春可以人而不如之哉正次王王次春凛乎大一統之㫖犯之者不赦之誅也僣之者不韙之罪也綱常正而體統尊人紀立而禮義出君臣大義與天地並存而不失矣弘道録弘道録府六義君臣之義史記漢王南渡平陰津至洛陽新城三老董公遮說王曰臣聞順德者昌逆德者亡兵出無名事故不成故曰明其爲賊敵乃可服項羽爲無道放殺其主天下之賊也夫仁不以勇義不以力大王宜率三軍之衆爲之素服以告諸侯而伐之扵是王爲義帝發䘮告諸侯曰天下共立義帝今項羽放殺之寡人親爲發喪兵皆縞素悉發関中兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者録曰此有漢四百二十年之天下其宏綱大義昭如日星者端在此舉惜乎元功之次不及録之遂使新城之名泯泯以至扵今也惜哉又曰漢昭烈之不能混一也宜哉夫兵出無名事故不成名其爲賊敵乃可服比萬世之大計天下之大幾也項之與曹聲勢後先相望邦之與備當時俱爲不敵也邦能名羽爲賊而備不能聲操之罪何耶夫君與后義相等倫方操弑伏后之時備果能倡明大義傳檄天下發喪制服正其大逆之罪明其無赦之誅然後興兵討伐天下之不響應曹氏之不歛手者幾希矣此祖孫之一轍也不知出此而董承者區區以帝衣帶中密詔與備謀誅曹操爲言嗚呼密之云然豈爲人上之語哉然則三國之董異扵新城之董明矣雖然承無足責當時法正號爲能正諫孔明號爲知大體顧乃昩扵機會徒以漢賊之言表扵散關之䟽亦無益矣至朱子之修綱目明書殺后其義始明豈非千古之遺恨哉漢書高祖不修文學而性明達好謀能聴自監門戌卒見之如舊初順民心作三章之約天下既定命蕭何次律令韓信申軍法張倉定章程叔孫通制禮儀又與功臣剖符作誓丹書鐵券金匱石室藏之宗廟雖日不暇給規摹弘遠矣録曰夫所謂規摹弘遠者蓋鑒于秦與新之失得也夫寬扵簡天之道也秦之興禁密若不容新之興更制若不及至扵衡石程書不遑暇寐此扵天下之事無復漏網之虞矣而不知天之道不若是之鎖鎖也今夫天洪者纖者高者下者無乎不容然而未嘗爽其則也人君法天以爲道操者縱者予者奪者亦無乎不有然而未嘗枉其度也秦罷封建新限王田計較扵錙銖毫釐之間而不知土崩瓦裂無伺寸寸而解也太史公亦以承敝易變使人不倦善觀人者矣文帝二年詔曰人主不德天示之灾以戒不治朕下不能治育群生上以累三光之明不德大矣令至其悉思朕之過失及知見之所不及匄以啓告朕及舉賢良方正能直言極諫者以匡朕之不逮録曰此直言極諫之始扵是賈山上䟽名曰至言然而不録者山之言謂之直可也謂之至則未也其借秦爲喻彼以爲殷鑒而不知帝之敬天勤民愛人惜費廣言路崇譙讓杜興作却貢獻其本心也即位未幾已可槩見山之所喻皆非帝之所短也何必孳孳以人主之威非特雷霆勢重非特萬鈞爲言哉又何必以周養千八背國之民秦受千八百國之養爲言哉當時廷臣溺扵秦之忌諱一旦覩此遂爲之瞽名曰至言以愚觀之帝之所短在扵不能止至善乃安扵卑近忽扵賢聖此非小失也傳曰扵止知其所止可以人而不如鳥乎所以興起天下萬世至深切矣惑扵黄老清淨而不知君子無所不用其極何恠乎馳騁射獵以爲娱擊兔伐孤以爲樂哉苟得伊傳問召之徒與之坐而論道吾見敬之如神明信之如筮龜安在修之于家而壞扵天子之廷乎凡所以爲此者皆鄙夫之事而非聖賢之也雖然上之所求者賢也下之所應者騎也山不能爲醇儒而欲其知王道哉賈誼上䟽曰臣竊惟今之事執可爲痛哭者一可爲流涕者二可爲長太息者六若其他背理而傷道者難徧以䟽舉進言者皆曰天下以安已治矣臣獨以爲未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及然因謂之安方今之勢何以異此録曰文帝一時而有二賈洛陽之賈非頴川之賈比也不惟其言皆當時之切要其摭摘秦事中漢之膏育故詳録之雖然爲國以禮其言不讓夫子猶且哂之大廷甫臨遽爲痛哭流涕長太息未免動之不以禮未善也夫樹國固必相疑之執下數被其殃上數爽其憂甚非所以安上而全下也欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心今海内之執如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻輳並進而歸命天子割地定制令齊趙楚各爲若干國使其子孫以次受之分地衆而子孫少者建以爲國空而置之須其子孫生者舉使君之一寸之地一人之衆天子亡所利焉誠以定治而已録曰厥後晁錯主父偃之議皆本扵此特以景帝不善而致亂武帝善用而致效其實生之論也夫文帝可爲之時也去分封未遠大國之王老者已耄弱者未壯漢之所置傳相方握其事誠以此時潜分七國之勢默奪諸侯之權此不勞餘力也失此不爲卒致破斧缺折之勞然則芒刀髖髀之踰豈年少而迂哉大抵漢之草創未有若封建之倉卒者周禮有大小宗之議有祖禰廟之别本宗百世爲天子支庶百世爲諸侯别子百世爲大夫然則衆建諸侯斯其常分也安有身爲王者支庶爲匹夫富者五十城或七十城貧者無立錐之地此非但勢不通亦理之所必無也以帝之明孝愽愛不能講求其故幸而生者開其端不竟其說絳灌又從而非之然則士之不遇豈非天哉豈非天哉問君遺禮義棄仁恩並心扵進取行之二歲秦而日敗故家富子壯則出分家貧子壯則出贅借父耰鉏慮有德色母取箕箒立而誶語抱哺其子與公併倨婦姑不相說則反唇而相稽其慈子耆利不同禽獸者亡幾爾今而遺風餘俗猶尚未改棄禮義相廉耻日甚月異而歲不同矣今其甚者殺父兄矣而大臣特以簿書不報期會之間以爲大故至扵俗流失世敗壞因恬而不知恠以爲是適然爾夫移風易俗使天下回心而鄉道類非俗吏之所能爲也俗吏之所務在扵刀筆筐篋而不知大體陛下又不自憂竊爲陛下惜之録曰此愚所謂中漢膏育之病不可救藥者也夫以古之人所以必旌别淑慝表厥宅里必彰善癉惡樹之風聲必殊厥井疆俾克畏慕者豈好爲是紛紜哉誠以商俗靡靡餘風未殄雖當重熙累洽之後不忘敝化奢麗之非一則曰邦之安危惟玆殷士二則曰驕淫矜侉將由惡終而周公克愼厥始君陳克和厥中畢公克成厥終更三聖賢保釐一方然後知移風易俗使天下回心而向道之難也漢之興也始以馬上得終以力筆治襲秦雜霸無乎不有甚者牽扵黄老安得不動生之痛又哉苟有成康之心求懋德克勤之老以資其垂拱仰成之功猶恐夜以繼日坐而待二之無及而紛紛以年少初學目之幾行而不長太息乎筦子曰禮義廉耻是謂曰維四維不張國乃滅亡使筦子愚人也則可子而少知治體則豈可不爲寒心哉奏滅四維而不張故君臣乖亂六親戮姦人並起萬民離叛凡十三歲而社稷爲虚今四維猶未備也故姦人幾幸而衆心疑惑豈如今定經制使君君臣臣上下有差父子六親各得其宜姦人亡所幾幸而群臣衆信上不疑惑若夫經制不定是猶渡江河亡維楫中流而遇風波船必覆矣可爲長太息者此也録曰此爲國之切務萬制之下所當深思也夫筦子吾徒所羞稱也尚知禮義廉耻國之四維何以堂堂聖人之徒反不知國乃滅亡之道乎夫姦人之幾幸自古而已然也寵利之所在威權之所歸若蠅之無釁而趨蟻之不約而赴而况人君號招附翼之乎由是蕩然無復界限羞惡之心而萬物之靈反蚊蚋之不若矣其所以必至扵滅亡者盖以國之所以爲國者人而其兩以爲人者心古之聖人所以必扵政貴有恒辭尚體要正欲人心截然歸之乎正曉然齊之乎一而後道洽政治膏潤生民四夷左衽罔不咸賴苟使無執守維持之道天下貿貿焉莫知所從人欲肆而天理滅國之喪亡無日矣此西都經制不立必致王莽之禍而後誼之言始驗然則管子豈眞愚人也哉夫禮者禁扵將然之前而法者禁扵已然之後是故法之所爲用易見而禮之所爲用難知也若夫慶賞以勸善刑罰以懲惡先王豈故不用哉然而曰禮云者貴絶惡扵未萌而起教扵㣲𦕈使民日遷善而不自知也爲人主計者莫如先審取舍取舍之極定扵内而安危之萌應扵外矣湯武廣大其德行六七百歲而弗失秦王治天下十餘歲則大敗此亡他故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也置諸安處則安置諸危處則危湯武置天下於仁義禮樂秦王置天下扵法令刑罰此天下之所共見也是非其明效大騐耶録曰孟子曰矢人豈不仁扵亟人哉矢人惟恐不傷人亟人惟恐傷人巫匠亦然故術不可不愼也此所謂術即取舍之謂也湯武置天下扵仁義禮樂者惟恐傷人也秦王置天下扵法令刑罰者惟恐不傷人也原其初豈誠性惡哉差之毫釐而謬以千里此爲治者汲汲扵審所尚也夫以好惡形於中而後取舍定扵内聖人所以心溥萬物而無心情順萬物而無情者誠以好惡之不可殉也所好或私于一天下靡然趨之所惡或䧟扵偏天下忽然向之帝非不知仁義法令之美惡特以惑扵他岐無自固之志誼非無見而云然也使帝誠有所釋以更制則善以立法則順亦何所憚而不爲哉雖然讓者其事也老者其心也心不在扵作爲則衹見吾之多事矣武帝元年詔舉賢良方正直言極諫之士上親策問以古今治道廣川董仲舒對曰臣觀天人相與之際甚可畏也自非大亡道之世天盡欲扶持全安之事在勉疆而已疆勉學問則聞見博而知益明疆勉行道則德日起而大有功道者所繇適扵治之路也仁義禮樂皆其具也故聖王已没而子孫長久安寍數百歲此皆禮樂教化之功也夫周道衰扵幽厲非道亡也幽厲不繇也至扵宣王思昔先王之德興滯補敝明文武之功業周道粲然復興此夙夜不懈行善之所致也録曰此天人首策也其曰勉疆去者即中庸其次致曲通大賢以下而言也自漢以來學者鮮能知之以舒之下帷發憤潜心大業所得扵勉疆者甚多也故大廷之際首以爲對非若後世摭拾陳言不切扵實學者比也而帝方且天縱椎畧思欲爲誇古邁今之務區區勉疆行道彼豈甘心效之哉抑以賈董而遇漢之文武董之勉强可行扵柔克之君而生之通達宜施扵大略之主奈何天不曲成投非所入徒使百世之下誦其言思其人論其世惜其主吁嗟慨乎爲人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫敢不一於正而亡有邪氣奸其間者是以陰陽調而風雨時群生和而萬民殖諸福之物可致之祥莫不畢至而王道終矣今陛下貴爲天子富有四海居得致之位操可致之勢又有能致之資行高而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之趨利也如水之走下不以教化隄防之能止也古之王者明扵此故南面而治天下莫不以教化爲大務立太學以教於國設庠序以化扵邑漸民以仁摩民以義節民以禮故其刑罰輕而禁不祀者教化行而習俗美也録曰自秦而後心學澌㓕殆盡仲舒舉以爲言誠漢庭之指南也惜乎君以多慾臣以正心投之猶轅之北而望其車之南夫是而莫之省也有宋隆興藝祖方知此論曰古之爲君鮮能正心自致無過之地朕夙夜畏懼防非窒慾庶幾以德化人之義斯人也可與之論正心以正朝廷也而有宋一代之治陰陽調風雨時群生和萬物殖仲舒之言孰謂果無驗耶臣聞聖王之治天下也爵禄以養其德刑罰以威其惡故民曉扵禮義而耻犯其上武王行大誼平殘賊周公作禮樂以文之至扵成康之隆囹圄空虚四十餘年此亦教化之漸而仁義之流也今陛下并有天下而功不加扵百姓者殆王心未加焉曾子曰尊其所聞則高明矣行其所知則光大矣高明光大不在乎他在乎加之意而已願陛下設誠扵内而致行之則三王何異哉録曰此二策也夫以人主之尊至厪再問則其意可知矣舒不能變易其說益以尊所聞行所知爲言白黑薰猶何相若哉此其所以悠然可想非若杜欽谷永之徒挾其私智遲其詐說然則一言而可知何待再厪而後變耶道者萬世亡敝敝者道之失也夏尚忠殷尚質周尚文者所繼之捄當用此也道之大原出扵天天不變道亦不變是以禹繼舜舜繼堯三聖授而守一道亡捄敝之政故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文政用夏之忠春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上無以持一統臣愚以爲諸不在六藝之科孔子之術者皆絶其道勿使並進然後統紀可一而法度可明民知所從矣録曰此三策也夫舒之所陳堯舜三代相傳之道也帝之所好權術功利文辭之言也而丞相所奏罷則又申啇韓非蘇張之說也斯三者豈啻風馬牛之不相及哉必欲棄百家尊孔氏盍不用仲舒之策乎勉强學問行其所知則異端邪辟之害日遠而高眀光大之效日臻矣舍眞儒而遠之而莊助司馬相如東方朔枚臯之徒並居左右安在其崇此抑彼耶然則帝之所謂儒可知矣時帝方招致大學儒者常曰吾欲云云而汲黯爲人性倨少禮面折不能容人之過對曰陛下内多慾而外施仁義奈何欲效唐虞之治乎上默然怒變色而罷朝謂左右曰甚矣汲黯之戇也時公卿皆爲黯懼至有數黯者黯曰天子置公卿輔弼之臣寧令從諱承意䧟主於不義乎且已在其位縱愛身奈辱朝廷何録曰武帝能容黯而不能容顔異者以名利之交勝也夫嘉唐虞樂殷周者豈正言之可諱哉非樂而取之不得已也穹奢侈極嗜慾者豈交征之可辭哉非刑而威之不可得也是故多慾之言雖存于其心而反唇之譏實害于其政此或誅或否之所以異也征和四皇帝下詔深陳既徃之悔曰有日奏請遠田輪臺欲起亭隧是擾勞天下非所以安民也朕不忍聞當令務在禁苛暴止擅賦力本農修馬復令以補缺毋乏武備而已由是不復出軍而封田千秋爲富民侯以明休息富民也録曰輸臺罪己之詔與奉天罪已之詔同乎曰不同也武帝之悔發于本心所謂鳥之將死其鳴也哀人之將死其言也善故能一洗舊染之汙以就維新之化也德宗之悟賴於陸贄所謂君子之德風小人之德草草上之風必偃故亦能反亂而爲治易危而爲安也自古言之動物聲之感人未有若斯之速者信乎風雲霜露變化莫測日月交蝕光輝難掩後之王者其可忽哉宣帝興扵閭閻知民事之艱難霍光既薨始親政事勵精爲治五日一聴事自丞相以下各奉職奏事敷奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜至于子孫終不改易樞機周密品式備具上下相安莫有苟且之意録曰有啇賢聖之君所以六七作者以其舊勞于外也有周盈成之主所以善繼述者亦以所其無逸也蓋中人之情不見可欲則不能動所好不見可憎則不能逗所惡帝雖高材好學使不興扵閭閻安能知民事艱難吏治得失而中興侔德啇周乎此非但生扵憂患而玉汝于成天心益可見矣時丙吉魏相並爲丞相相好觀故事數條漢興以來國家便宜行事及賢臣賈誼晁錯董仲舒等所言奏請施行之敕椽吏按事郡國及休告從家還至府輙白四方異聞或有逆賊風雨災變郡未上輙奏言之與丙吉同心輔政吉尚寬大好禮讓不親小事時人以爲知大體爲之語曰高祖開基蕭曹爲冠孝宣中興丙魏有聲後之相者莫能及焉録曰漢自蕭曹以後所置丞相多舊故功臣及材官武夫目不及文藝口不談詩書而去孫弘之徒又反曲學阿世獨魏相起自賢良高弟以嚴毅稱遭際孝宣遂能白去副封諫止征伐收霍氏之權遏淫天之勢向使賈董之徒遭際如此豈負扵漢哉惜乎我躬不閱我後反行其儀是以君子恒患言之不立不患德之無鄰非特丙魏之有聲抑亦賈董之吐氣乎上以戎狄賓服思股肱之美乃圖書其人扵麒麟閣法其形貌署其官爵姓名唯霍光不名曰大司馬大將軍愽陵侯姓霍氏其次安世韓增趙充國魏相丙吉杜延年劉德梁丘賀蕭望之蘇武凡十一人皆以功德知名當世是以表而揚之明著中興輔佐列扵方叔召虎仲山甫焉録曰麒麟閣之次盖以擁立之功爲最而所以圖繪之意則以四夷賓服而思股肱之美初不以蘇武之節操爲之優劣也若以爲誇示中國人才之盛則武帝之時殫心竭慮徃徃求泛駕之馬𧿧𧿶之士其所以爲使絶域之計至矣而李陵衛律紛紛降虜求其一九年而不變節者獨一子卿而已固足以嘆中國人才之衰也使武生遺扵世宗之朝必特以不次之位奈何白鴈書遲黑頭變早此武之戹會非漢之得策矧又呼韓邪之方難耶經生舉業之論類非聞道之言不可以爲訓成帝爲太子幸酒樂燕樂中山哀王薨太子前吊不哀元帝大恨附馬都尉史丹免冠謝上意乃解及帝寢疾數問尚書以景帝時立膠東王故事史丹以親密臣得侍疾侯上間獨寢時直入卧内頓首伏青蒲上涕泣言曰皇太子以適長立積十餘年名號繫扵百姓天下莫不歸心臣子今者道路流言以爲太子有動摇之議審若此公卿以下必以死爭不奉詔臣願先賜死以示群臣上意感悟因謂丹曰吾病浸加不能自還善輔道太子毋違我意丹嘘唏而起太子由是遂定及即位元延中故槐里令未雲上書求見公卿在前雲曰今朝廷大臣皆尸位素餐臣願賜尚方斬馬劒斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傳死罪不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干逰扵地下足矣御史遂將雲去扵是左將軍辛慶忌免冠叩頭殿下曰此臣素著狂直使其言是不可誅其言非故當容之上意解及後當治檻上曰勿易因而輯之以旌直臣録曰史丹之青蒲朱雲之折檻皆一時盛事而不知果孰爲得失也夫漢世之禍始于成帝王氏之簒成于張禹苟無史丹之諫必將易無斷之君漢之爲漢未可知也果行朱雲之言必將斬佞人之首王之爲王亦未可知也惜乎丹也諫行雲也折檻其行者可與立未可與權也其折者說而不繹從而不改也此則得失之所以分也東漢書南陽鄧禹杖策追光武及扵鄴光武曰我得專封拜生遠來寍欲仕乎禹曰不願也但願明公威德加扵四海禹得效其尺寸垂功名扵竹帛爾光武笑因留宿禹進說曰今山東未安赤眉青犢之屬動以萬數更姑既是常才而不自聽斷諸將皆庸人屈起志在財幣爭用威力朝夕自快而已非有忠良明智深慮遠圖欲尊主安民也明公素有盛德大功爲天下所嚮服軍政齋肅賞罰明信爲今之計莫如延欖英雄務悅民心立高完之業救萬民之命以公而慮天下不足定也光武大悅録曰夫人誰不願垂功名扵竹帛哉亢旱爲災則神龍困涪網罟不除則瑞麟罹殃文叔不舉則南陽草莽爾何以能效其尺寸耶今觀鄧禹之齡甫踰弱冠乃能洞曉大計直欲立高祖之業救萬民之命非草草一介之夫可比至扵在德厚薄之言又默契仁者無敵之㫖然則生之遠來豈眞欲仕乎將益信龍興而雲從麟至而瑞應矣其爲元功不亦宜乎赤眉暴亂三輔郡縣大姓各雍兵衆光武乃遣偏將軍今異討之車駕送至河南敕異曰三輔遭王莽更始之亂重以赤眉岑彭之酷元元塗炭無所依訴將軍今奉辭討諸不轨營堡降者遣其渠帥詣京師散其小民令就農桑壞其營壁無使復聚征伐非必略地屠城要在平定安集之耳諸將非不徤闘然好功掠鄉本能御吏士念自修敕無爲郡縣所異頓首受命引而西所至布威信群盗多降録曰帝之敕馮異也不曰戒鄧禹之大而一意平定安集此可見爲民父母之心也夫以仁暴之不敵而馮鄧之一體禹之不㣲之運其矯枉盖有時而當然且能不失其眞正是可爲人主之嘉尚矣若北宋本以安石童惇蔡卞之徒而致亂高宗中興復任黄潜善汪伯彦秦檜之徒不以爲過此則飛鳥以凶不可如何也如是而不足責矣明帝永平三年帝思中興功臣乃圖盡二十八將扵南官雲臺以鄧禹爲首次馬成吴漢王梁賈復陳俊耿弇杜茂㓂恂傳俊岑彭堅鐔馮異王霸朱祐任光祭遵李忠景丹萬修蓋延邳彤姚期劉植耿純臧宫馬武劉隆又蓋以王常李通竇融卓茂合三十二人焉以椒房之親獨不與焉録曰愚觀雲臺諸將其謀謨氣象似不及西京元功而能成蓋世之名何也盖高帝善將將光武善將兵豁逹大用者將將之術也才明勇略者將兵之本也是故背水之陣雖高帝不能知而昆陽之戰光武所由取勝借著之謀非張良不能决而聚米之畫光武見於目中使高帝而逢㓂鄧未必遽收桑榆之功光武而御韓彭未必能成垓下之績此兩漢之將逢時遇主各有不同而其成功則一者也弘道録弘道録府七義君臣之義諸葛亮出師表曰先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈扵内忠志之士忘身扵外者蓋追先帝之遇欲報之扵陛下也誠宜開張聖聽以光先帝遺德恢弘志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱爲一體陟罰臧否不宜異同若有作姦犯科及爲忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使内外異法也侍中郭攸之費禕董允等此皆良實志慮忠純先帝簡㧞以遺陛下愚以爲宫中之事悉以諮之必能裨哺闕漏有所廣益將軍向寵性行淑均曉暢軍事先帝稱之曰能衆議舉寵以爲督愚以爲營中之事悉以諮之必能使行陣和穆優劣得所親賢臣遠小人此先漢所以興隆也親小遠賢士此後漢所以傾頽也臣本布衣躬耕南陽苟全性命扵亂世不求聞達扵諸侯先帝不以臣卑鄙猥自枉屈三顧臣扵草廬之中諮臣以當世之事由是感激許先帝以驅馳復值傾覆受任扵敗軍之際奉命扵危難之間爾來二十有一年矣先帝知臣謹愼故臨崩寄臣以右仕也受命以來夙夜憂勤恐託付不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當奬帥三軍北定中原此臣所以報先帝而忠陛下之職分也至扵斟酌損益進忠盡言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔今當遠離臨表涕泣不知所云録曰亮之忠貞而可少哉夫可輔則輔之不可輔則自取此昭烈臨終之命未免殉之扵時也追先帝之殊遇欲報之陛下此武侯卓絶之見斷然殉之以義也以董袁曹馬之徒接跡於前而有二表之自誓譬則妖搶枉矢之交流而景星瞠乎其貫出也頑冥淫毒之騰作而日月焕然其大明也其曰宫中府中俱爲一體不但家人骨肉之相語而實後主存亡之所關也曰親賢臣遠小人亦不但切近殷鑒之當慮而實萬世治亂之所由也曰陛下亦宜自謀以咨諏善道察納雅言又不但生前至計之所望而實死後漢業之所終也故曰孔明三代人物管仲樂毅不足論矣後出師表曰先帝深慮以漢賊不兩立王業不偏安故託臣以討賊以先帝之明量臣之才固知臣伐賊才弱敵疆然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寑不安席食不甘味臣非不自惜也顧王業不可偏安扵蜀都故冒危難以奉先帝之遺意也而議者謂爲非計今賊適疲扵西又務扵東兵法乘勞此進趨之時也高帝明並日月謀臣淵深然陟險被創危然後安今陛下未及高帝謀臣不如良平而欲以長計取勝坐定天下此臣之所未解也自臣到漢中中間期年耳然䘮趙雲陽群等皆數十年之内所紏合四方之精銳非一州之所有若復數年當何以圖敵今民窮兵疲而事不可息事不可息則住與行勞費正等而不及虚圖之乎夫難平者事也昔先帝敗軍扵楚當此時曹操拊手謂天下已定然後先帝東連吴越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吴更違盟關羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至扵成敗利鈍非臣之明所能逆覩也録曰亮以操之用兵髣髴孫吴而二表所陳無一奇謀秘策獨以兵法乘勞爲今之計亮豈未之思耶夫有不自滿假之成湯而後鳴條之師可措有無貳爾心之武王而後膺揚之勇可施以禪爲君而亮爲輔以叡爲敵而懿爲臣譬則而引之者堯也羊而牧之者狼也豈可以爲理哉然而漢賊不兩立王業不偏安堂堂大義不可不聞扵天下也故一則曰奬帥三軍北定中原興復漢室還于舊都二則曰寑不安席食不甘味鞠躬盡力死而後已亮之心已知其無能爲矣此其堂堂侃侃又非狐媚狗趨僥倖成功者比也唐張藴古上大寳箴曰今來古徃俯察仰觀惟辟作福爲君實難主普天之下處王公之上任土貢其所求具寮陳其所倡是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄固以聖人受命拯溺亨屯歸罪扵己因心扵民大明無私照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚勿謂無知居高聴卑勿謂何害積小就大樂不可極樂極生哀欲不可縱縱欲成災壯九重扵内所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍扵前所食不過適口惟狂罔念丘其糟而池其酒勿内荒扵色勿外荒扵禽勿貴難得貨勿聽亡國音衆棄而後如刑衆悅而後行賞弱其强而治其亂伸其屈而卄其枉故曰如衡如石不定物以情物之懸者輕重自見如水如鏡不示物以情物之鑒者奸蚩自生勿渾渾而濁勿皎皎而清勿汶汶而闇勿察察而明雖冕施蔽目而視扵無形雖黈纊塞耳而聴扵無聲縱心乎湛然之域逰神扵至道之精知之者應洪纖而效響酌之者隨淺深而皆盈故曰天之經地之寧王之貞四時不言而代序萬物無言而化成豈知帝力而天下和平吾王撥亂戡以智力民懼其威未懷其德我皇撫運扇以淳風民懷其始未保其終爰述金鏡窮神盡聖使人以心應言以行包括治體抑揚詞令天下爲公一人有慶開羅起祝援琴命詩一日二日念兹在兹惟人所召自天祐之諍臣司直敢告前疑録曰自漢以後中更六朝南北又歷兩晋而隋君臣大義視之如繫匏濩落而諍臣司直杜口削迹久矣有唐龍興闢乾揭日始知爲君不易而大寳一箴復見敷陳亦可謂難得矣雖然偃與藴古同時事主謝以頌諛張以諷切雖一時賞賫相同而他日威刑竟異此大明無私天下爲公之難而使人以應言以行之不可得歟通鑑太宗益親魏徵徵自以爲不世遇乃展盡底藴凡二百餘奏無不剴切當帝心者或告徵私其親戚上使温彦愽按之無肰彦愽言扵上曰徵不存形迹遠避嫌疑心雖無私亦有可責上令讓徵且曰自今宜存形迹他日徵入見言曰臣聞君臣同心是謂一體宜相與盡誠若上下但存形迹則國之興衰尚未可知臣不敢奉詔上矍然曰吾已悔之徵再拜曰臣幸得奉事陛下願使臣爲良臣勿爲忠臣上曰忠良有異乎對曰稷契臯陶君臣恊心俱饗尊榮所謂良臣龍逄比千面折廷爭身誅國亡所謂忠臣上說録曰魏公之學出于河汾者也而其言無一扵身心何歟稷契臯陶豈徒君臣恊心俱饗尊榮而已哉上而父父子子下而兄兄弟弟内而夫夫婦婦無不各得其所故能安饗榮名萬古不替太宗之世父子易常兄弟違序夫婦亂倫衹扵賞罰進退之間科條號令之設天資英敏偶不能紊故徵得而叙論之此正張藴古所謂民畏其威未懷其德者也何足以語唐虞三代乎其所謂忠良之道亦君臣徒取羙名觀者當辨其眞可也魏徵上䟽以爲人主善始者多克終者寡豈取之易而守之難乎蓋以殷憂則竭誠以盡下安逸則驕恣而輕物盡下則胡越同心輕物則六親離德雖震之以威怒亦皆貌從而心不服也今主誠能見可欲則思知足將興繕則思知止處高危則思謙降臨滿盈則思抑損遇逸樂則思樽節在宴安則思後患防壅蔽則思延納疾讒邪則思正己行賞爵則則思因喜而僣施刑罰則思因怒而濫兼是十思而選賢任能固可以無爲而治又何必勞神苦體以代百姓之任哉録曰徵之說善矣惜乎無以及扵聖功之本也心之官則思心何啻十思耶矧乎一日二日萬幾而可以數限之哉惟扵不覩不聞之前幽獨隱微之際一以守之靜以持之蓋一則無始無始則物不能間靜則無擾無擾則心恒有主雖千慮必得而又何暇扵十耶夫見可欲者耳目之官也思知足者心之官也既見可欲則已交扵物矣物交物而後措之扵思能不爲所引者幾何哉此古人格心之業易而徵十思之效難徵曰臣奉侍帷幄陛下許臣以仁義之道守而勿失儉約朴素終始弗渝頃年以來䆮不克終貞觀初清靜寡欲化被方外今萬里遣使市索駿馬並訪珎怪此一漸也貞觀初護民之勞呴之如子不輕營爲頃既奢肆思用人力二漸也貞觀初役己以利物比來縱欲以勞人雖憂人之言不絶扵口而樂身之事實切諸心三漸也貞觀初親君子斥小人比此君子恭而遠之小人狎而近之四漸也貞觀初不貴異物不作無益而今難得之貨雜然並進玩好之作無時而息五漸也貞觀初求士如渴取其所長常恐不及比來由心好惡以衆賢舉而用以一人毁而而棄六漸也貞觀初高居深拱無田獵畢弋之好數年之後志不克固鷹大之貢遠及四夷晨出夕返馳騁爲樂七漸也貞觀初遇下有禮群情上逹今外官奏事顔色不接間因所短詰其細過雖有忠欵而不得伸八漸也貞觀初孜孜治道常若不足比恃功業之大負聖智之明長傲縱欲無事興兵遠裔九漸也貞觀初頻年霜旱畿内户口並就關外擕老扶幼卒無亡去比者疲扵徭役關中之人勞弊尤甚十漸也夫禍福無門惟人所召千載休期時難再得明主可爲而不爲臣所以欝結長歎者也䟽奏帝曰朕聞過矣以所上䟽列爲屏幛兼録付史官使萬世知君臣之義録曰何謂始敬勝怠也義勝慾也何謂漸怠勝敬也慾勝義也夫周武唐宗其初何以異耶而卒不同者漸也雖然徵之說切中萬世君人之病帝既録付史館以彰君臣大義而旋復違之屏幛几席不殊扵昔時黄金廐馬失笑扵他日然則不但漸不克終亦已頓忘其初矣上思佐命功乃命工圖畫趙公長孫無忌趙郡元王孝恭萊成公杜如晦鄭文貞公魏徵梁公房玄齡申公高士廉鄂公尉遲敬德衛公李靖宋公蕭瑀褒忠勝公段志玄夔公劉弘基蔣忠公屈突通鄖節公殷開山譙襄公柴紹邳襄公長孫順德鄖公張亮陳公侯君集郯襄公張公謹盧公程知節永興文懿公虞世南譙襄公劉政會莒公唐儉英公李世勣胡壯公秦叔寳等扵凌煙閣凡二十四人録曰凌煙之圖繪而不及裴寂劉文靖何也季布漢之仇也而反赦之丁公漢之恩也而反誅之英主之所見夫豈珠哉是故王魏仇也忠扵主則雲龍並美裴劉恩也背扵義則圖繪爲羞觀此寧不知所向乎玄宗初年姚元之爲兵部尚書同中書門下三品元之知帝大度銳扵爲治乃先設事以堅帝意奏曰垂拱以來以峻法繩下臣願政先仁恕可乎朝廷覆師青海未有牽復之悔臣願不倖邉功可乎比來壬佞冐觸憲綱皆得以寵自解臣願法行自近可乎后氏臨朝喉舌之任出閹人之口臣願宦堅不與政可乎戚里貢獻以自媚扵上公卿方鎮漸亦爲之臣願租賦外罷絶之可乎外戚貴主更相用事班序荒雜臣願戚屬不任臺省可乎先朝褻狎大臣虧君臣之嚴臣願陛下接之以禮可乎燕欽融韋月將以忠得罪自是諍臣沮折臣願群臣皆得批逆鱗犯忌諱可乎武后造福山寺上皇造金仙玉眞二觀費鉅百萬臣願絶道佛營造可乎漢以禄莽閻梁亂天下國家爲甚臣願推此監戒爲伐法可乎帝曰朕能行之録曰孟子曰人不足與適也政不足與間也惟大人爲能格君心之非玄宗初政之時其鋒銳矣其心未可知也崇能先事以格其心使不正者率由于正庶幾無鮮終之悔今觀其十事如政先仁恕不倖邉功法行自近宦戚與政等皆一時用人行政之失而格心之要曾無片言及之且要說者約其必可施行而後言之亦異乎責難扵君者矣厥後尊倖邉臣專寵女艷恣權宦戚縱意奢侈至扵亡國鮮不蹈崇之言果何益哉以是知大賢一言似迂其實切崇進十事似切而實迂刑部尚書宋璟同平章事璟爲相務在擇人隨材授任使百官各稱其職刑賞無私敢犯顔正諫上甚敬憚之雖不合意亦曲從之突厥默啜世爲中國患朝廷旴食傾天下之力不能克郝靈筌得其首自謂不世之功璟以天子好武功恐好事者競生心僥倖痛抑其賞逾年始授郎將靈筌痛哭而死時姚宋相繼爲相崇善應變時務璟善守法持正二人志操不同然恊心輔佐使賦役寬平刑罰清省百姓富庶唐世賢相前稱房杜後稱姚宋他人莫得此焉録曰愚觀宋廣平可謂大臣也已矣敬憚扵二張降心扵思最痛哭扵靈筌難致扵毛仲數者皆大臣之事也使其遇三代之主其得爲伊周之匹乎曰未也伊尹曰咸有一德周公曰思兼三王其所期何如也璟之設施止扵復貞觀之舊而已是故立仗之馬未幾復斥而優人之譛旋踵輙行功業不終其以比與若乃擇人任官犯顔正諫皆彼相之可爲以是槩璟淺乎末矣韓休爲黄門侍郎同平章事休爲人峭直不干榮利及爲相甚允時望守正不阿上或宫中宴樂及後苑遊獵小有過差輙謂左右韓休知否言未終諫䟽已至上嘗臨鏡默然不樂左右曰韓休爲相陛下殊瘦扵舊何不逐之上曰吾貌雖瘦天下必肥蕭嵩奏事嘗順㫖既退吾寢不安韓休嘗力爭既退吾寢乃安吾用韓休以爲社稷耳非爲身也録曰玄宗左右以相韓休爲瘦則必以相林甫爲肥可知矣夫帝之瘦非以天下也以艷色不足視于目聲音不足聴于耳便佞不足使令于前也一旦而得太眞之豐艷禄山之傾巧霓裳羽衣之妖淫則悠然適意能不心廣體胖乎卒之流蕩忘返刼遷播越當不减而自瘁矣然則臨鏡之嘆所以兆聞鈴之悲乎故君子曰貌瘦天下肥者虚名也與貌肥天下瘦者實禍也帝千秋節君臣皆獻寳鏡張九齡曰先帝有言以銅爲鑑可正衣冠以古爲鑑可見興替以人爲鑑可知得失乃述前世興廢之源爲書五卷興邦建業第一選文備武第二報國復興第三盡命報國第四去古樸進新美第五以此五卷備患名爲千秋金鑑録願陛下莫以色姿爲樂後當亡國䘮邦可宜正已而治思古證今可也録上賜書褒美録曰按金鑑録九齡就中書焚藁不傳于世付于韓宋二婿之後此録一千年之外方布人間今得而讀之淵哉斯言皎如日月蓋不但識一禄山而當時共禍之人齡皆識之豈徒鑒扵興亡而實精扵物理所謂别物如鑑者眞如是非泛然謂之録也其曰安禄山者野猪之精腹垂過膝史思明者鷊鳥之精脇生兩羽楊貴妃者白鷴之精指爪純赤復有木子雙木木易行金又曰匪兕匪虎東傾西舉妖舞精語宫室禾黍又曰陛下治國日久仁心漸希忠諫爲仇謟佞相守羊鯉浮游羊謂國忠鯉謂林甫椰榆並進國破家亡悔當思舊又曰主上淚灑巴山艱行蜀道恩已變仇方慕愚直時開元極盛天寳未終齡何以預知蜀道之難靈武之易耶乃不特照人之形而實照人之心不但一時得失而實兩世興亡乎雖然以齡而觀後世所謂妖舞精語亦屢矣安得齡之先見而與之論興亡乎哉平原太守顔眞卿知安禄山反因霖雨完城浚濠料丁壯實倉廪禄山以其書生易之及反牒以平原愽平兵七千人防河津眞卿拒之乃遣平原司兵李平間道聞奏朝廷知禄山反惟聞河北郡縣皆望風而靡上囂然歎息曰二十四郡曾無一人義士耶及平至上大喜曰朕不識顔眞卿作何狀乃能如是眞卿使親客密懷購賊牒詣諸郡由是諸郡多嚮應者録曰孔子曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情聖人之爲此言以風示天下恒恐其随風而靡也明皇之世好諛悅色禮義信掃地盡矣如是而嘆無一人義士豈不謬哉以是知三綱之大四維之重不可一日無之而唐虞之風動豈無當之臆談哉顔杲卿起兵纔八日守備未完史思明蔡希德引兵至城下杲卿告扵王承業承業欲竊其功擁兵不救杲卿晝夜拒戰粮盡矢竭城䧟賊縱兵執杲卿及袁履謙等送洛陽禄山數之曰汝自范户曹我奏汝爲判官不數年超至太守何負於汝而反耶杲卿瞑目駡曰汝本營州牧羊羯奴天子擢汝爲三道節度使恩幸無比何負扵汝而反我世爲唐臣禄位皆唐有雖爲汝所奏豈從汝反耶我爲國討賊恨不斬汝何爲反也禄山大怒並履謙咼之比死駡不虚口録曰愚觀顔氏二公夫豈但决死生于危迫之際哉蓋以立有唐三百年君臣之綱也夫自晋陽啓釁劉裴反隋天授興周唐臣從諛有國百餘年來曾不知伏節死義爲何物也聞二公之舉事若從天降若從地出故曰吾不知顔眞卿作何狀乃能如此雖以身銼舌誅而芬芳暢逹光輝宣著跨敝隋而挽虐周也豈不盛哉張廵起兵拒禄山令狐潮圍之扵雍丘四十餘日時聞玄宗已幸蜀有大將六人白廵以兵勢不敵且上存亡不可知不如降賊廵陽許諾明日堂上設天子畫像帥將士朝之引六將扵前責以大義斬之士心益勵乃以死士五百斫潮營潮漸益兵圍之廵使郎將雷萬春扵城上與潮相聞語未絶賊弩射之面中六矢而不動潮疑其木人使諜問之乃大驚遥謂廵曰向見雷將軍方知足下軍令矣然其如天道何廵謂之曰君未識人倫焉知天道録曰廵之舍生取義而豈徒哉夫識見定而後中有主中有主而後事可濟功可成人倫盡時天理自見是故聞大唐之光復未聞賊運之克昌聞張許之若生未聞令狐之不死孰謂倉卒造次之際而非從容中道之時乎尹子奇久圍睢陽城中食盡議棄城東走張廵許遠謀以爲睢陽江淮之保障若棄之去賊必乘勝長驅是無江淮也不如堅守以待之始與士卒同食茶紙既盡遂食馬馬盡羅雀掘鼠雀鼠既盡廵出愛妾殺以食士遠亦殺其奴然後括城中婦人食之既盡繼以男子老弱人知必死莫有叛者所餘纔四百人癸丑賊登城將士病不能戰廵西向拜曰臣力竭矣不能全城生既無以報陛下死當爲厲鬼以殺賊録曰愚觀厲鬼之言果可信乎夫彭生伯有一人之辜也睢陽完節萬世之事也其力可屈其志不可屈其身可隕其氣不可隕忠魂義魄雖不可以視聴而猪兒之反刃朝義之操戈若鬼神使之者安知其非厲耶唐能復其故物耳固不能加戮扵安史之軀也然則厲鬼之言果不可信耶德宗建申二年汾陽忠武王郭子儀薨子儀爲上將擁兵程元振魚朝恩讒謗百端詔書一紙徵之無不即日就道由是讒謗不行嘗遣使至田承嗣所承嗣四望拜之曰此膝不屈扵人若干年矣李靈曜據汴州公私物過汴者皆留之惟子儀物不敢近遣兵衛送出境校中書令考凡二十四月入俸錢二萬緡私産不在焉府庫珍貨山積家人三千人八子七婿皆爲顯官諸孫數十人每問安不能盡辯頷之而已僕固懷恩李懷光渾瑊輩皆出麾下雖貴爲王公常頤指役使趍走扵前天下以其身爲安危者殆三十年功盖天下而主不疑位極人臣而衆不疾窮奢極欲而人不非之年八十五而終其將佐至大官爲名臣者甚衆録曰夫汾陽之岀處將以係天下之安危也胡爲乎不以𡝭嫉則以讒間朝恩牽之扵前元振引之扵後而子儀曾無芥蒂何耶易曰否之匪人不利君子貞小徃大來吉亨夫以肅代之世君子所不利也尚頼一人之命兼萬方之威得以成其濟否之志小徃大來也出則有命無咎不出則包畜承順是以欲閑則閑俾散則散安徃而不自得哉是故安史之亂則一岀也吐蕃之㓂則再岀也懷恩之難則又再出回紇之危則又再岀向使忽扵苞桑之戒牽扵邪濫之羞知安而不知危知利而不知害則身殆而國隨以亡豈大人之吉亨乎興元元年改元赦令既具帝以藁付陸贄使啇討贄知帝執德不固乃上䟽以爲動人以言所感已淺言又不切人誰肯懷今兹德音悔過不得不深引咎不得不盡使天下聞之廓然一變若披重昏而覩朗曜廼下制曰朕長于深宫之中暗扵經國之務積習易溺居安忘危不知稼穡之艱難不恤征戍之勞苦澤靡下究情未土通事既壅隔人懷疑阻猶昧省己遂用興戎徵師四方轉餉千里賦車籍馬遠近騷然行齎居送衆庶勞止天譴扵上而朕不寤人怒扵下而朕不知馴致亂階變興都邑萬品失叙九廟震驚上累扵祖宗下負扵烝庶痛心靦貌罪實在予永言愧悼若墜泉谷自今中外書奏不得更言聖神文武之號赦下人心大悅明年李抱眞入朝爲上言山東宣布赦書士卒皆感泣臣見人情如此知賊不足平也録曰涣之六四曰涣有丘匪夷所思九五曰涣汙其大號誠以履非常之危者不可以常道安解非嘗之紛者不可以常語喻誠不至則物不感損不極則益不臻信乎德之流行速扵置郵而傳命也德宗徒知天生李晟以爲社稷而不知人心感動賊不足平危難則思進忠言禍平則追仇讜論此所以雖能奔其机而得所願終不能涣其群而就光大也惜哉陸贄極論裴延齡奸詐數其罪惡其略曰延齡以聚歛爲長策以詭忘爲嘉謀以掊克歛怨爲匪躬以靖譛服讒爲盡節可謂堯代之共工魯邦之少卯也書奏上不悅贄每以上知待之厚事有不可嘗力爭之所親或規其大銳答曰吾上不負天子下不負所學他無所恤録曰夫人豈忍負天子哉上驕則下謟君忌則臣佞斯天子之自負也亦豈願負所學哉以剖尅爲上策以聚歛爲得計斯所學之自悮也若夫君子則不然君子之所學所以學爲聖與賢也是故堯舜禹湯文武之爲君其所責難也臯陶伊傳周召之爲臣其所期待也君苛刻而己以忠愛君猜忌而己以欵誠豈故爲是枘鑿耶在我者誠如是也孟子不云乎吾君不能謂之賊然則負所學者眞穿窬之不若矣而爲天子者亦豈可誨人以負之耶李晟家百口及神策軍士家屬皆在長安軍中有言及家者晟泣曰天子何在敢言家乎及朱泚使親近以家書遺晟曰公家無恙晟怒曰爾敢爲賊問立斬之録曰爲天下者不顧家雖顧之何益哉易曰坎有孚維心亨行有尚時朱泚盗京師懷光反咸陽險而又儉苟不堅一其心則方寸亂矣安能徃有功乎非惟不能顧家併與其國亡之矣厥後賜第供帳迎導列懸何啻疇昔之家乎哉矧有若憲若愬者在賊雖欲不善遇之曷得而傾之哉憲宗元和三年裴垍爲中書侍郎同平章事初德宗不任宰相細務皆自决之上在藩邸心知其非及即位選擢宰相推心委之垍亦竭誠輔佐嘗問垍爲理之要何先對曰先正其心穆宗即位嘗見愛州觀察判官柳公權書跡愛之以爲右拾遺上問公權卿書何能如是之善對曰用筆在心心正則筆正上默然爲之改容盖知其以筆諫也録曰唐自太宗以來諫者多矣未有深探其本若裴垍之先正其心公權之心正筆正者然而憲宗卒不能正其終穆宗亦不能正其始何也曰心者理而已矣噐雖具于人而理實出于天非學無以明之也是以大學之道始扵格物致知及扵意誠心正其序不可亂其功不可闕裴柳能開其端而不能竟其說憲穆徒聞其論而莫能覺其非無惑乎仙而不人荒而不蠱心何爲哉長太息而已自元和末宦官益横建置天子在其掌握威權出人主之右人莫敢言文宗太和二年昌平劉蕡對策極言其禍其畧曰陛下其先憂者宫闈將變社稷將危天下將傾海内將亂又曰陛下將社篡弑之漸則君正位而近正人遠刀鋸之賤親骨鯁之直輔相得以專其任庶職得以守其官奈何以褻狎五六人總天下大政禍稔簫墻姦生帷幄臣恐曹節侯覽復生扵今日又曰忠賢無腹心之寄閽寺恃廢立之權䧟先君不能正其終致陛下莫得正其始又曰陛下何不塞陰邪之路屏褻狎之臣制侵陵迫脇之心復門户掃除之役戒其所宜戒憂其所宜憂考官馮宿等皆歎服而畏宦官不敢取録曰以文宗之世而有蕡之直言譬如日食而皷而馳而走雖與天懸絶亦見其不能已而已焉故録之以志唐祚之告終也弘道録終弘道録府八義君臣之義宋史太祖即位之初交廣劒南太原荆湖江表遼夏皆敵國因注意將帥命李漢超屯關南馬仁瑀守瀛州韓令坤鎮常州賀惟忠守易州何繼筠領棣州郭進控西山武守琪成晋州李謙溥守隰州李繼勳鎮昭義以禦太原趙賛屯延州姚内斌守慶州董遵誨屯環州王彦昇守原州馮繼業鎮靈武以備西夏其族屬在汴京者撫之甚厚郡中筦榷之利悉以與之恣其貿易復免所過征稅許令召募亡命以爲牙爪凡軍中事皆得便宜每來朝必召對命坐厚爲錫賫以遣之由是邉臣富資能養死士使爲間諜洞知敵情及其入㓂設伏掩繫多致克捷二十年間無西北之憂以至平蜀楚拓吴越所向遂志盖能推赤心以馭群下之所致也録曰愚觀宋祖之大略有五知人一也善任二也推誠三也厚撫四也至扵筦榷之利悉委諸將恣其貿易皆得便宜五也今北有韃虜之擾南有交趾之通諸司筦榷之利入經制者非所當論而東南番舶所計不貲特議國者以爲導利而不言明法者以爲開邊而不講殊不知人情利一而害十尚猶不顧今海不揚波不但已三年矣一徃一來如趨熟路故閩諺以爲海熟此非虚語也番夷資其貨利中國反無所處愚竊以爲未之思也夫利盡東海者盬也盬之外復有千章之木萬斛之辛兩廣軍門見資其用具有舊規盍不量移閩浙之間置封椿之庫以易安南之首可也收羡餘之利以攄西北之憂亦可也何獨以爲忌諱而不言哉舍此不務而區區扵告奸抑奪之間以增攘臂穿窬之餌非所謂之大計也太宗謂宋琪等曰世之治亂在賞當其功罰當其罪即無不治謂爲飾嘉怒之具即無不亂卿等愼之又謂吕蒙正凡士未逹見當世之務戾于理者則怏怏于心及列于位得以獻可替否當盡其所藴言雖未必盡亦當簽議而更之俾恊于道朕固不以崇高自恃使人不敢言也録曰人王之用在扵賞罰人臣之用在扵獻替太宗可謂達扵治矣然以所行之事觀之豈盡然耶夫多遜之扵趙普不並立者也帝苟愛普則先去多遜縱使貪戀賞罰一出扵已夫誰曰不然乃使交搆以傾廷美由帝之心在扵廷美也然則不但餙喜怒之具無乃决得失之幾乎自柴禹湯告變之後今日賞告隸之功明日議堂吏之獄大小臣工豈無達當世之務者而太師王溥等七十四人阿諛曲從䧟君不義曾是以爲恊扵道乎又不但以崇高自恃而已也李沆爲人自少器度宏遠父丙嘗語人曰此兒異日必至公輔嘗侍曲宴太宗日送之曰李沆風度端凝眞貴人也眞宗問治道所宜先沆曰不用浮薄新進喜事之人此最爲先一夕遣使持手詔欲以劉氏爲貴妃沆對使者引燭焚詔附奏曰但道臣沆以爲不可其議遂寢録曰愚觀引燭焚詔之事未嘗不嘆文靖之風烈也夫封還猶羙事補綴亦盛典而况扵焚之乎非其存心之廓然太公所見之確然不易未有不以利害動于中者也且劉氏何爲者以其族則至㣲也以其藝則至卑也以其姓則至遠也扁扁之石履之卑兮帝寍不思耶而賦性警敏通曉書翰于政之漸肇基于此沆之先見豈惟陰却履霜之㣲而且明拒如綸之㫖他日李迪之不肯從諛楊億之不從草制是皆聞風而起者熟謂一時之舉措不足以關一伐之得失耶帝以沆無密奏謂之曰人皆有密啓卿獨無何也對曰臣待罪宰相公事則公言之何用密啓人臣有密啓者非讒即佞臣常惡之豈可效尤録曰自萋斐之風熾而交亂之禍成更未有如密啓之爲害也夫善欺者莫如指鹿爲馬善佞者莫如指鳥爲鸞然尚有鹿之可指鳥之可稽情雖罔上理或可通至扵密封之進其始也潜蹤秘跡既無人知其竟也出此入彼慿何執証奚翅以薰爲猶變白爲黑乎矧乎眞宗之世王欽若丁謂之徒接踵于朝其所以論沆者正以謂若待之爾不知由君子觀之所處者光天化日之下猶恐一毫之暗昩肯自居扵阿私之地耶惟夫小人之心則不然其處已非便則利其待人非怨則尅利非佞莫進忌非讒莫入讒與佞人之所深惡也扵是假托隱密之名以售其奸深之術然必脅人主有不可辨之㣲怒而窺其心有不可白之隱情君臣之間自謂投膠扵漆無踰此者至乃加之以封識表之以函章蝮腸虎翼隨其所指而欺天罔人無乎不至復何所忌憚乎由是聽不得不偏信不得不獨豈惟人暗罹其禍而朝廷明被其撓矣此李沆之論萬代所瞻仰也張齊賢慷慨有大略每以致君爲志嘗從容爲眞宗言皇王之道而推本其所以然帝曰朕以爲皇王之道非有跡但庶事適治道則近之矣録曰大雅稱無然畔援眞宗殆未之思乎夫皇王者堯舜禹湯文武之謂也其道允執厥中惟精惟一之傳也是故存于心而爲天德達于政而爲王道若書傳所陳敬天勤民與夫治人事神皆其實事何得爲無跡歟其曰非有跡者廼茫昩無根之言荒唐不經之語惜乎齊賢開端不竟徒以爲非常之報而不知典謨訓誥萬世經常之理非有索隱行恠希世絶儉祗在日用常行之間而已厥後神道設教之言果符此論遂至矯誣飾詐無所不至而道之津岸邈乎遠矣韓琦蚤有盛名識量英偉臨事喜愠不見扵色居相位再决大策以安社稷時朝廷多故琦處危疑之際知無不爲或曰公所爲誠善萬一蹉跌豈惟身不自保恐家無處所矣琦嘆曰是何言耶人臣當盡力事君死生以之至扵成敗天也豈可豫憂其不濟遂輟不爲哉聞者愧服其所建請唯顧義之所在無適莫心與富弼並著勳業故時稻賢相者必曰富韓録曰琦之知無不爲孟子曰先得之其曰有安社稷臣者以安社稷爲悅者也釋一者曰大臣之計安社稷亦如小臣之務悅其君眷眷扵此而不忘豈以安危利害動其心哉若以安危利害動其心則不足與有爲矣包拯性峭直剛毅惡吏苛刻爲政務敦厚雖嫉惡如仇而未嘗不推以忠恕與人不苟合不僞辭色以悅人平生無私書及知開封貴戚宦官爲之歛手吏民不敢欺童稚婦女亦知其名呼曰包待制京師爲之語曰關節不到有閻羅包老以其笑比黄河清焉録曰愚觀閻羅包老之諭由古及今未之有見亦未之前聞也然必本扵人心合乎天理枉者吾所必錯直者猶能伸之實者吾所必究誣者猶能訐之未有不論是非罔分曲直任意肆志而爲逋迯之淵藪也設若陰府果有閻羅見存必使善者超昇惡者墜墮不然天亦得而罪之况人乎哉近世有以風力自居廼悍然不顧冥然罔覺傍視己側若皆無人不旋踵隨亦云亡然則不但上帝之譴實難避閻羅之誅耳其扵關節不到何盡之有趙抃爲侍御史彈劾不避權倖聲稱凛然京師目爲鐵面其言務欲朝廷别白君子小人以謂小人雖小過當力遏而絶之君子不幸詿誤當保全愛惜以成就其德一時名臣賴以安焉移梓州路轉運使尋改益州西蜀地遠民弱吏肆爲不法州郡公相餽餉抃身先帥之匹馬入蜀一琴一鶴以自隨爲政簡易稱是長厚清修人不見其喜愠日所爲事夜必衣冠露香以告于天不可告者則不敢爲也其政善因俗施設猛寬不同在成都尤爲世所稱道神宗每詔郡守必以抃爲言要之以惠利爲本晚學道有得將終與子㞦訣詞氣不亂安坐而没韓琦嘗稱抃眞世人標表蓋以爲不可及云録曰趙清獻之得道也豈刀圭鉛汞之力哉乃寡慾養心之助清操絶俗之徵夫人不可以不知也今夫煉形如稿木脫屣若飄風孰不曰得道也而不知無益於人倫世教徒取偷生苟免故君子不由也曷若遺恩在人蓄德在物朝野同聲内外無間若清獻者天地有盡而英爽無窮宜乎以爲不可及也魯宗道爲右正言論列無所畏避眞宗嘗書殿壁曰魯直蓋思念之及入中書屢有獻替時明肅太后臨朝嘗問唐武后何如主對曰唐之罪人也幾危社稷后默然有小臣方仲兮請立劉氏七廟后以問輔臣不敢對宗道獨進曰若立劉氏七廟如嗣君伺乃止后甞與帝同幸慈孝寺欲乘輩先乘輿宗道曰夫死從子婦人之道后遞命輦後輔政七年剛正疾惡貴戚用事者皆憚之目爲魚頭參政因其姓且言骨鯁也及薛奎繼參政事性亦剛介不苟合遇事敢言后謁太廟欲被服衮冕奎曰必御此若何爲拜及臨崩帝見群臣泣曰太后疾不能言猶數引其衣若有所屬何也奎曰其在衮冕乎服之豈可見先帝扵地下帝悟卒以后服歛録曰史魚之秉直既殁而後聞宗道之骨鯁生前而顯著矧執政之與諫官不相爲謀孰有稱魚頭參政者耶然則明肅之過武曌蓋萬萬矣雖然二公之諫不費辭說而引義切當幽冥死生實共頼之豈本朝之家法有以開之乎不然何以言行之俱危也傳堯俞十歲能文石介晏硃皆奇之曰子精識雅度文約而理盡卿相材也王安石復與之善甫新法不便皆極論之及蔡確之貶宰執侍從以下罷者七八人臺府爲之一空堯俞曰確之黨其尤者固宜逐其餘可以一切置之願陛下扵此聴之如蚊䖟過耳無使纖㣲之忤以奸太和之氣此聖人所以養至誠而御遐福也後由諫官補郡法令有未安者一切遵之曰君子素其位而行諫官有言責郡之守法而已復拜中書侍郎神宗與太皇太后曰傅侍郎清直一節終始不變金玉君子也司馬光謂邵雍曰清直勇之德人所難兼吾扵欽之見焉雍曰欽之清而不耀直而不激勇而能温是爲難爾録曰夫所謂金玉君子者蓋本衛風淇澳如金如錫如圭如璧釋之者曰金錫言其鍜鍊之精純圭璧言其生質之温潤衛武公不得專美扵前矣自是而後矜而或爭群而或黨豹虎荆棘之場魑魅蠻髦之俗君子祗爲之砥礪錯石又安能追琢其童金玉其相乎哉蓋不但可觀成德其扵世之升降道之汙隆槩乎盡矣司馬光知諫院以三劄子上殿其一論君德有三曰仁曰明曰武仁者非嫗煦姑息之謂也興教化脩政治養百姓利萬物此人君之仁也明者非煩苛伺察之謂也知道誼識安危别賢愚辨是非此人君之明也武者非强亢暴戾之謂也唯道所在斷之不疑奸不能惑佞不能移此人君之武也臣切見陛下推心御物端拱淵默群臣各以其意有所敷奏不復詢訪利害盡察得失一皆可之望陛下以天性之至仁廓日月之融光奮乾剛之威斷則唐虞三代之隆何遠之有其二論致治之道在三曰任官曰信賞曰必罰國家采名不采實誅文不誅意夫以名行賞則天下餙名以求功以文行罰則天下巧文以迯罪其三論揀軍言養兵之術務精不務多上以其一留中其二送中書其三送樞密院又進五規一曰保業二曰惜時三曰遠謀四曰謹㣲五曰務寬帝深納之録曰先正朱熹曰温公可謂智仁勇他那活國處是甚次弟其規模稍大又有學問其人嚴而正嗚呼觀熹所言則諫院所陳乃其自得之歟夫三達德聖人入道之門也至扵不憂不惑不懼未嘗不惓惓焉光之所得扵天可以爲不厚乎哉肆力扵學可以爲不篤乎哉若夫三事五規施行之次第耳而君德爲之根本中庸不云所以行之者一也然則光之存誠有自也已及哲宗立以光爲尚書左僕射時已得疾而青苗免役將宗之法猶在西夏未降光歎曰四害未除吾死不瞑目折簡與吕公著曰光以身付醫以家事付愚子惟國事未有所托今以屬公既而詔免朝覲許乘肩輿三日一入省光不敢當曰不見君不可以視事詔令子康扶入對遼人聞之敕其邊吏曰中國相司馬公矣愼無生事開邉隙時兩官虚己以德光亦自見言行計從欲以身狥社稷躬親無務不舍晝夜賓客見其體舉諸葛食少事多爲戒光曰死生命也爲之益力病革不復自覺諄諄如夢中語然皆朝廷天下事也録曰吕獻可之將卒也手書屬司馬公曰天下事尚可爲君實勉之司馬公之將卒也折簡與吕公著曰國事未有所托今以屬公二公之正終略相同者由其所存之合一也易曰王臣蹇蹇匪躬之故至是鞠躬盡瘁而後已矣一息尚存殉國之心不容少懈安得不諄諄如夢中語耶熙寧時帝以災變避正殿减膳徹樂王安石言于帝曰災異皆天數非關人事得失所致富弼在道聞之嘆曰人君所畏者天耳若不畏天何事不可爲者此必姦人欲進邪說以摇上心使輔弼諫諍之臣無所施其力是治亂之機不可以不速救即上書數千言雜引春秋洪範及古今傳記人情物理以明其决不然者及入對又言君子小人之進退係王道之消長願深加辯察勿以同異爲喜怒喜怒爲用舍陛下好使人伺察外事故奸憸得志又今中外之務漸有更張此必小人獻說扵陛下也大抵小人性喜動作生事其間有所希覬若朝廷守靜則事有常法小人何所望哉録曰以帝之摇奪而有弼之正言譬則聾者而尚提其耳瞽者而尚責其明然猶不廢録者時有不同理無竟息天不足畏而天之理可畏人不足恤而人之心當恤一人之喜怒不可憑而百官萬民之喜怒可憑一時之用舍不可信而天下後世之用舍可信若以爲無益而遂棄之則萬古如長夜矣王安石執政皆以爲得人吕誨獨言其不通時事大用之則非所宜將内適司馬光亦詣經筵密問今日所言何事誨曰袖中彈文乃新參也光愕然曰衆喜得人奈何論之誨曰君實亦爲是言耶此人雖有時名然好執偏見輕信姦回喜人佞己聴其言則美施扵用則踈置諸宰輔天下必受其禍廼上䟽曰大姦似忠大詐似信安石外示朴野中藏巧詐驕蹇慢上陰賊害物今畧數十餘事誠恐陛下悅其才辯久而倚毗情僞不得知邪正無復辯大姦得路辟陰彙進賢者盡去則亂由是生臣竊憂之悮天下蒼生者必斯人也録曰君子之立言也而可忽哉外示朴野中藏巧詐驕蹇慢上陰賊害物斯四言者曲盡安石之底藴天下萬世莫能掩矣然則安計其聴與不聼行與不行哉若祗稱其先見則李師中亦預識之不但獻可而已然也師中始仕州縣邸狀報包拯參知政事或云朝廷自此多事師中曰包公何能爲今鄞縣令王安石眼多白甚似王孰他日亂天下必斯人也後二十年言乃信蓋又先於吕誨矣范純仁奏安石掊克財利民心不寧書曰怨豈在明不見是圖帝曰何謂不見之怨對曰杜牧所謂不敢言而敢怒者是也帝曰卿善論事宜爲朕條陳古今治亂可爲監戒者遂作尚書解以進其言皆堯舜禹湯文武周公之事治天下無以易此願深究而力行之及行均稅法於六路復言臣嘗親奉德音欲脩先王補助之政今乃效桑羊均輸之法而使小人爲之掊克生靈歛怨生禍安石以富國强兵之術啓迪上心欲求近功忘其舊學上法令則稱商鞅言財利則背孟軻鄙老成爲因循棄公論爲流俗異己者爲不肖合意者爲賢人不聼純仁每上䟽激切帝悉不付外至是盡録申中書安石大怒乞加重貶帝曰彼無罪姑與一善地命知河中府録曰新法言多矣未有若純仁之親切也且以牧之之言何爲而發乎盖秦之用鞅即帝之用石也石之致用即鞅之學術也其曰論至德者不同扵俗成大功者不謀扵衆即石之執拗不通也又曰常人安扵故俗學者溺扵見聞即石之違衆自異也孳孳爲利至扵剥民之膏盡民之力民之怨之奚啻若自其口出乎故以牧之之論秦者而論石卒以蠹國叛道民不樂生而夷狄之禍亦不旋踵其與亡秦之轍相去無幾噫可恨哉時久旱歲饑征歛苛急東北流民扶携塞道疾愁苦每風沙霾曀身無完衣並城民買麻籸麥麩合米爲糜加木實草根至身被鎖械而負瓦揭木賣以償官累累不絶值光州司法參軍鄭俠監安上門乃繪爲圖奏言陛下南征北伐皆有勝捷之勢作圖來上料無以天下憂苦父母妻子不相保遷移困頓遑遑不給之狀爲圖而獻者臣謹按安上門逐曰所見繪成一圖百不及一但經聖眼亦可流涕况扵千里之外哉陛下觀臣之圖以行臣之言一日不兩乞斬臣以正欺君之罪䟽奏帝反覆觀圖長吁數四袖以入内是久寢不能寐翌日命開封體放免行錢三司察市易司農發常平倉三衛具熙河所用兵諸路上民物流散之故青苗免役權息追呼方田保甲並罷凡十八事民聞之讙呼相賀俠仍取唐魏徵姚崇宋璟李林甫盧𣏌傳爲兩軸題曰正直君子邪曲小人事業圖迹在位之臣暗合林甫革而反扵崇璟者各以其類爲書獻之臺史楊忠信謁俠曰御史緘默不言而君上書不已是言責在監門而臺中無人也取懷中名臣諫䟽二帙授俠曰以此爲正人助録曰君子思不出其位俠可謂出位矣夫言有好惡之異圖據見聞之眞俠也其人寧辭檢討之任而就監門之官其志蓋可知而言非孟浪也死者在扵斯須故不吝百方以助效焚者在扵目睫又何惜一死以就安帝已寢不能寐猶迷而不復何耶卒使英州之芳流扵後世汴州之禍慘扵當時君子要不可以㣲職拒之也徽宗時陳禾爲右正言童貫與黄經臣盧航表裏爲姦禾曰此國家安危之本吾任言責不言可乎遂上䟽劾貫怙寵弄權之罪論表未終帝拂衣起禾引帝請畢其說衣裾落帝曰正言碎朕衣矣禾言陛下不惜碎衣臣豈惜碎首此曹今日受富貴之利陛下他日受危亡之禍言愈切帝變色曰卿能如此朕復何憂内侍請帝易衣帝却之曰留以旌直臣録曰聞補衮闕矣未聞落帝裾也落帝裾可録歟宋之禍始扵安石惠卿終扵童貫王黼衮職至是㓕裂破碎雖有仲山甫之臣莫之能措矣李若水爲吏部侍郎欽宗再如金師逼帝易服若水抱持而哭詆其人爲狗葷金人曳出繫之仆于地粘没喝令曰必使李侍郎無恙若水絶不食或勉之曰事無可爲今日順從明日富貴矣嘆曰天無二日吾寧有二主哉其僕亦慰解之曰公父母春秋高若少屈冀得一歸覲若水叱之曰吾不顧家矣忠臣事君有死無二但親老恐驚徐言之可也及議立張邦昌復召若水計事因歷數駡之監軍撾破其唇至裂頸斷舌而死時年三十五金人相與言曰遼國之亡死義者十數南朝惟李侍郎一人而已劉韐爲資政殿學士金之入眞定也父老號呼曰使劉資政在鎮豈有此禍金人益知其名必欲之及京師䧟韐至金營金以其國僕射韓正館韐于城南壽聖院謂之曰國相知君今用君矣韐曰偷生以事二姓死不爲也正曰軍中議立異姓欲以君爲尚書僕射得以家屬行與其徒死不若北去取富貴韐仰天大呼曰有是乎乃歸書片紙言其事使親信持歸報其子子羽等即沐浴更衣酌巵酒而縊金人嘆其忠瘞之寺南岡上凡八十日乃就歛顔色如生録曰南朝李侍郎眞定劉資政民到于今稱之下視邦昌劉豫不啻唾去之矣何足言幾
