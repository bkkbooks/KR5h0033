body:
  text: 禮夫婦之禮禮記昏禮者將合二姓之好上以祀宗廟而下以繼後世也故君子重之是以昏禮納采問名納吉納徴請期皆主人筵几於廟而拜迎於門外入揖讓而升聽命于廟所以敬愼重正昏禮也共牢而食含卺而酳所以合體同尊卑以親之也敬愼重正而后親之禮之大體而所以成男女之别立夫婦之義也夙興婦沐浴以俟質明贊見婦於舅姑婦執笄棗段修以見贊醴婦婦祭脯醢祭醴成婦禮也舅姑入室婦以特豚饋明婦順也厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也成婦禮婦順又申之以著代所以重責婦順焉也婦順者順於舅姑和於室人而後當於夫以成絲麻布帛之事以審守委積蓋藏是故婦順備而后內和理內和理而後家可長久也故聖王重之録曰以昏義先之者有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子君臣上下禮義有所措夫婦之道莫有先焉故既曰君子重之又曰聖王重之然其微詞奧義惓惓於一鴈凡納采問名納吉納徴請期親迎俱有鴈贄所以敬愼重正不一而止而後世忽之一奠鴈親迎尚不能及則是未配而輕祖未交而薄婦于知時倡和忽於再偶重匹甚不可也故録以存其義焉堯典釐降二女于媯汭嬪于虞録曰夫震一索離再索皆以一陽處二陰之間堯將使舜出震繼離故以二女並妻而後世天子之禮定於九女者九陽數也如其義則堯之使女亦必有義矣易歸妹帝乙歸妹其君之袂不如其娣之袂良録曰帝乙正婚姻之禮明男女之別宜莫先於嫡妾之分也而其君之袂不如其娣之袂良者蓋禮以質為本婦以德為重惟不德則徒以瑳玭展翟誇耀於人而淫慝妬忌曾莫之耻也故觀其君之袂不如娣之袂則知啇道之所以興觀席寵佑侈服美于人則知殷俗之所以亡不特是也宋太祖戒永寧公主勿衣貼繡鋪翠襦而趙飛燕至以金飾其履幾何其克終也哉詩大明大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光録曰堯之釐降舜之懲庸也文之嘉止天之受命也於是為之造舟為之輿梁焉此可見其威儀氣象卓乎一代之制而遂秉天子之禮矣厥後魯秉周禮哀公以一冕為重而不知造舟之為光以千乘為尊而不知俔天之難得此所以勤夫子愀然之對而卒無不顯之光也歟周南葛之覃兮施于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁言告師氏言告言歸薄汙我私薄浣我衣害浣居歸寧父母録曰夫所謂之天妹者非以其崇高富貴而不可踰也正以其己富而能勤已貴而能儉以長而敬不弛於師傳己嫁而孝不衰於父母後世若婦無公事休其蠶織則與葛之覃兮者異矣若鼎鐺玉石珠塊金鑠則與服之無斁者異矣若大夫跋踄我心則憂則與言告師氏者異矣若齊子歸止其從如雲則與歸寧父母者異矣王姬下嫁於諸侯車服之盛如此而不敢挾貴以驕其夫家故詩人美之曰何彼穠矣唐棣之華曷不肅雍王姬之車何彼穠矣華如桃李平王之孫齊侯之子録曰諸侯之女而曰百兩將之非誇也所以著文王身修家齊之效也王姬之車而曰曷不肅雍非譽也所以見文王太姒內治之化也夫冕而親迎反不能敬以將之者挾也祚以著代反不能和以承之者戾也婚姻之道莫不善於有所挾莫不祥於有所戾泰以陰順之德席崇高之勢而能卑以自牧所謂肅也歸妹以少艾之資屈於長男之下而能動以相說所謂雍也此平王之孫齊侯之子所以至今嘆美而無斁也歟南國諸侯被文王之化能正心修身以齊其家其女子亦被后妃之化而有專靜純一之德故嫁於諸侯而其家人美之曰維鵲有巢維鳩居之之子于歸百兩御之維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鳩盈之之子于歸百兩成之録曰諸侯之女嫁於諸侯送迓皆百兩者蓋內子之職小君之分以上則嗣續妣祖以貴則敵體諸侯婚姻之禮備然後貞女至而內治成召南之詩以鵲巢為首言君夫人者民所瞻仰不可不謹以是為防猶有翟茀以朝如衛莊姜而不見答者有大車檻檻如王大夫而不敢奔者其去鵲巢之風亦何遠哉韓侯既覲而還遂以親迎詩曰韓侯娶妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門録曰愚觀親迎之禮乃齊魯之自壞非天下之不由也夫韓亦諸侯也而執禮周旋若是君子曰猶夫古也此外則俟我于著矣充耳以素矣凡以齊俗霸政之餘習也魯守禮義之國而容履緰之來逆其逆與否在紀不可以責在我有可以辭也以周公之裔而不若蹶父之子此夫子之所深嘆也故曰詩亡然後春秋作小雅間關車之牽兮思變季女逝兮匪飢匪渴德音來括雖無好友式燕且喜依彼平林有集維鷮辰彼碩女令德來教式燕且譽好爾無射雖無㫖酒式飮庶幾雖無嘉殽式食庶幾雖無德與女式歌且舞陟彼高岡析其柞薪析其柞薪其葉湑兮鮮我覯爾我心寫兮高山仰止景行行止四牡騑騑六轡如琴覯爾新昏以慰我心録曰咸之象曰山上有澤咸君子以虗受人聖人所以貴於男女之感者本以令德來教也世恣於趨色恣於長顔如舜華則思之㫖蓄御冬則棄之是故德音莫違曾幾何哉緑兮絲兮則治之威儀棣棣則忽之是故我思古人曾若是哉聖人以關睢行於一家桃天施於一國車牽達於天下使知以義合者惟以德成而高山景行又足以徹乎上下凡為國者未有不求賢以自輔為道者未有不求友以輔仁也此山澤之至益咸亨之孔道虗受之微意景行之良心也孰謂燕爾新昏而徒為歌舞笑傲乎郊特牲男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執贄以相見敬章别也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道也壻親御授綏親之也出乎大門而先男帥女女從男夫婦之義由此始也婦人從人者也幼從父兄嫁從夫夫死從子夫也者以知帥人者也故婦人無爵從夫之爵坐以夫之齒器用陶匏尚禮然也厥明婦盥饋舅姑卒食婦餕餘私之也舅姑降自西階婦降自阼階受之室也昏禮不用樂幽陰之義也樂陽氣也昏禮不賀人之序也録曰以特牲終之者天地别剛柔錯男女猾禽獸作於是有女惑男若鄭國之詩者於是有無章别若聚麀之風者於是有不親御若終風之行者於是有不從男若雄狐之綏者於是有私出疆若樊苟之刺者於是有智不帥若車中之斃者於是有自尊大若稱制之為者於是有不親饋若西內之遷者皆禮之大悖也左傳隱公五年九月考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也録曰東萊吕氏云成王以天子禮樂賜周公至隱公獨能疑數百載之非為衆仲者盍甲告之使天下再見周公之禮樂是魯有二周公也果然歟曰非也夫禮不妄說人不辭費是故天冠地履之分禮先樂後之文斷斷乎不可以易也隱以庶長而奉宗廟考惠公配孟子者禮也乃狥人之好考妾之宫冠履置矣所謂妄說人者也為衆伸者宜申告以妾庶長幼之序二本耦嫡之非先名正言順而後禮樂可興也乃狥公之見陳羽之數先後紊矣所謂辭費者也雖以是羽獻於群廟已紊周公之制而無救於亂亡之原况責其末流之弊乎察緦功而問齒决君臣上下舉不知務宜乎有讒而不見有亂而不知也季文子如宋致女復命公饗之賦韓奕之五章穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤又賦緑衣之卒章而入胡氏傳曰伯姬賢孝著于家故致女使卿特厚其嫁遣之禮賢名聞于遠故諸國爭媵信其無妬忌之行程氏傳曰一女子賢尚聞於諸侯况君子哉二傳皆非經義録曰穆姜致女於宋入而賦緑衣何其德也及其淫於宣伯占而遇隨筮又何慝也詩云無非無議以而勤大夫之辱有非議矣書曰惟家之索以君饗臣而母出于房牝雞晨矣而壞隤之逼東宫之禍胥此焉肇然則非以賢伯姬以謹魯亂也聖人之意深哉列女傳伯姬嫁于恭公公卒伯姬寡至景公時伯姬之宫夜火左右曰夫人少避火伯姬曰婦人之禮保傅不俱夜不下堂待保傅來也保母至矣傳母未至也左右又曰夫人少避火伯姬曰婦人之禮傅母不至夜不可下堂越義求生不如守禮而死遂逮於火而死録曰夫人之辭傅母也其然豈其然乎恭公死夫人未亡人爾斷鼻既非正中自經恐汙溝瀆傅母不至可辭以禮矣死復何恨哉復何恨哉孟姬者華氏之長女齊孝公之夫人也好禮貞一公遊於琅琊孟姬從焉馬奔車碎孝公使駟馬立車載之姬使御者舒帷以自障蔽而使傅母應曰妾聞妃后踰閾必乘安車輜軿下堂必從傅母阿保進退則鳴王環珮內飾且結組綢繆野處則帷裳擁蔽所以正心一意自斂制也今立車無軿非所敢受命也野處無衛非所敢久居也二者失禮多矣夫無禮而生不若早死使者馳以告公更取安車然後乘而歸録曰孟姬可謂知禮矣夫禮不可斯須去身也故女子出門必擁蔽其面而可受立車之載耶雖然孝公琅琊之行夫人從之其春而省耕乎夏而省斂乎抑從獸而荒樂酒而亡乎姬如審此必不待馬奔車碎野處倉卒而優游於門內之職矣齊杞梁殖之妻莊公襲莒殖戰而死莊公歸過其妻使使者吊之於路妻曰今殖有罪君何辱命焉若令殖免於罪則賤妾有先人之敉廬在下妾不得與郊吊於是莊公乃還車詣其室成禮然後去其妻無子內外皆無五屬之親乃枕其夫之尸於城下而哭內誠動人道路過者莫不為其揮涕十曰而城為之崩既葬曰吾何歸矣夫父在則倚父夫在則倚夫子在則倚子今吾上則無父中則無夫下則無子吾何依哉遂赴淄水而死君子謂杞梁殖之妻貞而知禮録曰杞梁妻非華孟姬比也夫往役義也遊觀非義也故伯兮之執旻與雄雉之貽阻皆非婦人之所得為也其崩城不為異變俗不為多者以皆內誠之所感也嗚呼從容執禮無敢自遂謂之貞而有禮信乎其然歟國語公父文伯之母欲室文伯饗其宗老而為賦緑衣之三章老請守龜卜室之俗師亥聞之曰善哉男女之饗不及宗臣宗室之謀不過宗人謀而不犯微而昭矣詩所以合意歌所以詠詩今詩以合室歌以詠之度於法矣録曰敬姜之饗與穆姜之饗可同日語哉匹配生民之始重宗廟而謀於宗老所以合二姓之好也易曰間有家悔亡其敬姜之謂夫是故言不及外朝智也室必及守龜信也饗不及宗臣禮也勞不忘所事義也言不忘舅姑仁也其曰謀而不犯曰度於法君子之深許哉儀禮經傳魯師春姜曰婦人以順從為務貞慤為首故事夫有五平旦纚笄而朝則有君臣之嚴沃盥饋食則有父子之敬報反而行則有兄弟之道受期必誠則有朋友之信寢席之交而後有夫婦之際宋女宗者鮑蘇之妻也蘇仕衛三年而娶外妻其姒謂曰可以去矣女宗曰何故姒曰夫人既有所好子何留乎女宗曰婦人以專一為貞以善從為順豈以專夫室之愛為善哉夫禮天子十二諸侯九卿大夫三士二今吾夫士也二室不亦宜乎且婦有七去妬正為首吾姒不教吾以居室之禮而反使吾為則棄之行可乎遂不聼宋公聞之為表其廬號曰禮宗録曰魯與宋禮義之國也故若師若宗真可為閨門之範宫閫之式後世禮教所由取則也録之小學曰委使過冀見冀缺耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之臣聞出門如賓承事如祭仁之則也文公以為下軍大夫龐公未嘗入城府夫妻相敬如賓劉表候之龐公釋耕於壟上而妻子耘於前表指而問曰先生苦居𤱶畝而不肯官祿異日何以遺子孫乎龐公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表嘆息而去録曰冀缺之耨與龐公之耕有以異乎夫冀缺以名屈者也龐公以身屈者也以身屈者退而無止以名屈者進而可伸此其所以異也夫吕甥之難誰則不聞然而未廣也射鈎之事可以法矣季一言而受上賞缺三晋而正卿位文公之權審乎漢書文帝所幸愼夫人在禁中嘗與皇后同席坐及帝幸上林后與夫人從郎署長布席袁益引却夫人坐夫人怒不肯坐上亦怒而起盎因前進說曰臣聞尊卑有序則上下和今既立后夫人乃妾爾孰可與同坐階下獨不見人彘乎上說乃召語夫人賜盎金五十斤録曰愚觀漢之草創不獨朝廷之上君臣之間其宫闈之內多有粗率此類可見後代亦無此矣東漢和熹鄧皇后入庭為貴人時年十六恭肅小心動有法度承事陰后夙夜戰競接撫同列常克己以下之雖宫人𨽻役皆加恩惜每有會諸姬貴人相競飾麗簪珥光采袿裳鮮明后獨尚素質裝服無飾深自抑損其衣色有與陰后同者即時解易若並時進見不敢正坐離立行則僂身自卑帝每有所問常逡巡後對不敢先陰后言帝知后勞心曲體嘆曰修德之勞乃如是乎録曰觀此則非但無愼夫人之事而馬后大練之風將行於上下矣録之班昭為曹世叔妻號大家博學高才動止有禮節行法度全備作女訓七篇卑弱第一夫婦第二敬愼第三婦行第四專心第五典從第六和叔娣第七其略曰古者生女三日卧之牀下弄之瓦磚而齊告焉卧之床下明其卑弱主下人也弄之瓦磚明其習勞主執勤也齊告先君明當主其祭祀也三者蓋女人之常道禮法之典教謙讓恭敬先人後己有善莫名有惡莫辭忍辱含垢常若畏懼晚寢早作勿憚夙夜執務私事不辭劇易所作必成手迹整理正色端操以事夫主若此苟備而患名稱之不聞黜辱之在身未之有也夫婦之道參配陰陽通達神明信天地之弘義人倫之大節夫不賢則無以御婦婦不賢則無以事夫陰陽殊性男女異行陽以剛為德陰以柔為用男以疆為貴女以弱為美修身莫若敬避疆莫若順故曰敬順之道婦之大禮也侮夫不節譴呵從之忿怒不止楚撻從之夫為夫婦者義以和親恩以好合楚撻既行何義之存譴呵既宣何恩之有恩義俱廢夫婦離矣女有四行婦德婦言婦容婦功婦德不必才明絶異也婦言不必辨口利辭也婦容不必顔色美麗也婦功不必工巧過人也清間貞靜守節整齊行己有耻動靜有法是謂婦德擇辭而說不道惡語時然後言不厭於人是謂婦言盥浣塵穢服飾鮮潔沐浴以時身不垢辱是為婦容專心紡績不好戲笑潔齊酒食以奉祭祀供賔客是謂婦功此四者女之大德而不可乏者也然為之甚易唯在存心耳行違神祗天則罰之禮義有愆夫則薄之故女憲曰得意一人是謂永畢失意一人是謂永訖由斯言之夫不可不求其心然所求者亦非謂伎媚苟親也固莫若專心正色禮義居潔耳無塗聼目無邪視出無冶容入無廢飾無聚會群輩無看視門户此則謂專心正色矣若夫動靜輕脫視聽俠偷入則亂髮壞形出刖窈窕作態說所不當道觀所不當視此謂不能專心正色也録曰記禮之言陰陽剛柔之大義也女訓之言內外周旋之曲折也故詳録其詞以為門內之知禮者告焉或曰昭之時權歸女主女訓之言不能格正而尚與外事豈敬愼之道婦順之德乎蓋常觀之易矣小過亨利貞可小事不可大事不宜上宜下大吉此之謂也是故兄王臣也反詿誤而被刑剛失位而不中也妹妾婦也反得時而褒顯柔而得中也以先幽困而後道顯揚小過亨也踵兄之成書利貞也作訓七篇禆諸女朂勉不宜上宜下也然而后方以六五稱制在上乃能大善相遇豈非所謂大吉者哉彖傳之言若有為而發也觀者詳之梁鴻宇伯鸞家貧尚節介博賢無不通鄉里慕其高多欲女之鴻絶不娶同縣孟氏有女狀肥醜而檡對不嫁父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求作布衣麻履織作筐緝之具及嫁以裝飾入門七日而始行婦禮録曰圭嘗為魏王泰師矣帝曰事圭如事我泰可拜主獨可挾乎圭不能正泰之失而能成主之美異乎房杜之壺則矣德宗建中六年始定公主見舅姑禮先是主下嫁者舅姑拜之婦不答上命禮定公主拜見舅姑之儀舅姑坐受於中堂諸父兄娣立受於東序如家人禮録曰自南平下嫁之後公主已異前代之法然其意久而復失矧世俗承襲未易遽改今始定之可謂善矣唐室世席女寵善媒奇禍太平安樂紛紛覆轍至是多不以時嫁有華髮者則雖欲不執禮胡可得哉抑德宗始却有司曰爾愛其費我愛其禮及唐安之逝又罪公輔以其費甚微過朕求名何其先後之不倫耶豈其定禮之時國家多故造塔之日侈心復萌乎好禮不終良有以也宋史哲宗孟皇后眉州防禦使贈太尉元之孫閣門祗候在之女元祐七年宣仁太后諭宰執曰孟氏子年十六教以女儀能執婦禮宜正位中宫又以近世禮儀簡略詔翰林臺諫給舍與禮官議册后六禮以進至是命尚書左僕射吕大防攝太尉充奉迎使同知樞密院韓世彥攝司徒副之尚書左丞蘇頌攝太尉充發策使僉書樞密院事王巖叟攝司徒副之尚書右丞蘇轍攝太尉充告期使皇叔祖同知大宗正事宗景攝宗正卿副之皇伯祖判大宗正事高密郡王宗晟攝太尉充納成使翰林學士范伯祿攝宗正卿副之吏部尚書王存攝太尉充納吉使權户部尚書劉奉世攝宗正卿副之翰林學士梁燾攝太尉充納采問名使御史中丞鄭雍攝宗正卿副之帝親御文德殿册為皇后太后復語帝曰得賢內助非細事也進后父為崇儀使榮州刺史母王氏華原郡君録曰此有宋一代典禮冠於百王超於唐漢以淑女之好逑為朝廷之正嫡且上有至仁之母主之下命衆大之臣相之肆今六禮之行何其鄭重耶曾未踰時一介小臣得以讒間至章敦主計於前郝隨釀禍于後帝雖知其壞德行而猶惑之豈真前日之重內助今日之崇外奸每與后相反耶抑將有夷禍故顛倒錯亂而不自知耶幽王廢申后而戎伐于周襄王黜翟后而敗亡于鄭自古殷鑒如此君子盍觀其始之備禮則知其中之寡恩中之寡恩又安知末之免禍乎哉成敗真不可以論人也荆國大長公主幼不好弄太宗嘗發寶藏令諸女擇取之欲以觀其志主獨無所取真宗即位下嫁附馬都尉李遵朂舊制選尚者降其父為兄弟行時遵勗父繼昌亡恙主因繼昌生日以舅禮謁之帝聞密以兼衣寶帶器幣助其為壽遵朂每燕賓客皆一時賢士主必親視饔膳及遵朂出守許州暴得疾主亟欲馳視之左右白須奏報乃可主不待報而往從者裁五六人帝聞遽命內侍督諸縣邏兵以衛後居其夫之喪衰麻未嘗去身服除不御華麗嘗燕禁中帝親為簪花辭曰自誓不復為此久矣録曰按宋朝家法仁宗以姪事姑主獨不能以婦事舅乎然則荆國之守禮帝固有以先之也以舅姑降為兄弟行者三代以上未之前聞惟夫人所行何如耳觀者不可不知伊川文集二程先公珦母夫人侯氏事舅姑孝謹與公相待如賓公賴其內助禮敬尤至而夫人謙順自牧雖小事未嘗專制必禀而後行撫愛諸庶不異己出從叔幼姑存視常均治家有法不嚴而整不喜笞朴凡公有所怒必為之解惟諸子有過則不掩曰子之所以不肖由母蔽其過而不知也其教之不少假借如此才數歲行而或踣未嘗不呵責曰汝若安徐而行寧至踣乎飲食置之坐側常食絮𦎟即叱止之曰幼求稱欲長當何如與人爭雖直不右曰患其不能屈不患其不能伸故二程平生於飲食衣服無所擇不能惡言詈人教使然也夫人七八歲時誦詩女子不夜出自是不出房閣既長好文而不為詞章見有以文章筆札傳於人者則深以為非録曰伊川傳家人曰人之處家在骨肉父子之間大率以情勝禮以恩奪義惟能不以私愛失其正理故家人之卦大要以威如為吉又歸妹九二守其幽貞未失常正之道世人以媟狎為常故以貞靜為變斯言皆為夫人設也故由前而觀則哲婦賢母之令著由後而觀則壷範女則之懿彰不可以無録也名臣録辛次膺清修介持不邇聲色與夫人敬待如賓雖燕適容必莊坐必正語必誠慕朝友元司馬文正為人以禮自防善剔嫌疑僕妾以下不冠不見鄱陽守程邁遺果置白金却之崎嶇亂離貧不自聊一豆𦎟不妄受上面諭卿廉聲著聞皆言閩中不受俸祿次膺奏臣為貪而仕豈有辭祿之理但不當受者不敢受耳太上曰使人人如卿何患不太平耶録曰文官不愛錢武官不怕死夭下太平矣此語嶽飛嘗言太上亦既知之特不能用若乃簡穆之起本自書生其動必以大明萬曆三十五年歲次丁未上元吉日正一嗣教凝誠志道闡玄弘教大真人掌天下道教事張國祥奉㫖校梓弘道録
