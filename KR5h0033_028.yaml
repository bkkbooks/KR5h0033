front:
  text: 弘道録卷之三十五相四
  hash: sha256:060a2a53ba945c23f389341fee092915c61a79c66d0f6285590360f72824f53b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_028-001a, image: hfl/1075/1075-132.png}
body:
  text: 禮朋友之禮孟子舜尚見帝帝館甥於二室亦饗舜迭為賓主是為天子而友匹夫也録曰天地之氣起于子交會于午帝王之運出乎震相見乎離而堯之興也以火德得天地之中數舜之興也以土德得天地之中氣是乃天數五地數五五位相得而各有含安在其論匹夫天子也蓋雖同德齊聖實天運氣數而然後世安敢希其萬一耶伯夷辟紂居北海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者太公辟紂居東海之濱聞文王作興曰盍歸乎來吾聞西伯善養老者天下有善養老則仁人以為己歸矣録曰按禮凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人備而兼用之五十養於鄉六十養於國七十養於學逹於諸侯於是二老幡然來歸而文王之化已不啻蹶然興矣及武王伐紂而二老致用判然不同何也孔子曰君子或出或處或默或語二人同心其利斷金是故鷹揚之發援之以道也采薇之食存之以義也二心之勉決之乎帝也叩馬之諌奉之乎天也蓋太公以天下為己任伯夷以君臣為己責然皆有以合乎天理之正而即乎人心之安則何必較其同與異乎然則二老迹雖迥異實則同歸不可能岐二分也禮記周武王踐祚三日召師尚父而問焉曰黃帝顓頊之道存乎師尚父曰在丹書王欲聞之則齋矣王齋三日端冕師尚父亦端冕奉書而入王東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶録曰周武王既尊太公為師而又號曰尚父其事之也可謂至矣而其禮王東面而立師尚父西面宛然師友之義不獨堯與舜為然也敬者聖學始終之要也敬勝怠則夙夜祗懼罔敢不迪故吉也怠者慢易放肆之萌也怠勝敬則狎侮五行厭棄三正故滅也義者裁度制事之本也義勝欲則不役耳目百度惟貞故從也欲者人心危殆之端也欲勝義則沉湎冒色力行無度故凶也此三皇五帝傳之乎上古載之乎丹書而止曰黃帝顓頊者乃錯舉以見義宜乎端冕致齋而後得聞也詩小雅燕朋友之樂歌伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聼之終和且平録曰詩云鳥鳴嚶嚶而又曰出自幽谷遷于喬木可見非困窮之比寂寞之倫猶其曰鳳凰鳴矣于彼高岡皆所以喻于朝廷之上者也然又安得而神聼之哉古人動必稱神明以見無人己私意於其間若所謂昊天曰明及爾出王昊天曰旦及爾遊衍而此君子者仁義以為儷道德以為鄰心志之相許建諸天地也同心協力以康王室夙夜匪懈以事一人肝膽之相照質諸鬼神也一言以出天下同其利一行以立萬民共其休而至和之澤傳於無窮太平之美垂於永久其不然者則殘民害物妬賢嫉能朝廷天下亦壞亂隨之矣此朋友之倫關乎世道最切非但爾汝之間聲諾相聞而已伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲酒掃陳饋八簋既有肥牡以速諸舅寧適不來微我有咎伐木于阪釃酒有衍籩豆有踐兄弟無遠民之失德乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我逮我暇矣飲此湑矣録曰所求乎朋友先施之未能也古人敦篤之行每如此安有人之不我顧者哉故又曰有酒湑我無酒酤我極盡在我無遺而已矣宣王命尹吉甫帥師北伐有功而歸詩人作歌美之曰吉甫燕喜既多受祉來歸自鎬我行永久飮御諸友炮鱉膾鯉侯誰在矣張仲孝友録曰吉甫尊為元帥親為世臣且懋建征伐之功以攄玁狁之難必有奇謀祕計之士人則參謀出則副乘此將相之事也而乃歸之張仲何哉蓋孝友者六行之首八刑之先國之命官以此保民家之立法以此艾後故君牙之有政即張仲之令猷而吉甫之交歡乃詩人之樂道嗚呼以飲御而進賢則無驕恣放縱之意以炮鱉而為禮安在窮奢極欲之非一燕而三美併焉謂之多祉不亦宜乎大雅賓之初筵左右秩秩籩豆有楚殽核維旅酒既和旨飲酒孔偕鍾鼓既設舉酬逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵賓之初筵溫溫其恭其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞遷遷其未醉止感儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩賓既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其倕側辨之俄屢舞傞傞既醉而出並受其福醉而不出是謂伐德飮酒孔嘉維其令儀凡此飮酒或醉或否既立之監或佐之史彼醉不滅不醉反耻式勿從謂舞俾太怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又録曰序以此為飲酒悔過而作以愚觀街武公史之所載與詩之所陳截然不同豈其既失而後改者歟君子曰秦之穆公聖人所深許也然則歌賓筵之詩而不知自反者真斯人之不若歟論語孔子曰晏平仲善與人交久而敬之録曰愚聞諸張子曰晏嬰智矣而不知仲尼然而反稱其善何耶夫子之交也道義而已矣故惟主久而能敬後世之交也勢利而己矣故一於趨以求知然則命也者夫子真罕言也敦謂張子而不知耶璩伯玉使人於孔子孔子與之坐而問焉曰夫子何為對曰夫子欲寡其過而未能也使者出孔子曰使乎使乎録曰按夫子之友衛有伯玉齊有晏嬰鄭有子産皆得位得國者也其使人於孔子不曰通交際達命令乃惟以寡過為言可以見古人之道義切磋雖一價之使未嘗以富貴利達而動其心而伯玉之篤行愼德老而不倦人不間於其使者之言矣朋友之饋雖車馬非祭肉不拜録曰人須是此意存於其中不以此意存於其中則有饋為厚無饋為薄充此類雖舜受堯之天下亦上下相通之義茍非歸格于藝祖用特何所施其敬耶若以百官牛羊倉廪為重使己僕僕爾丞拜也斯乃子思之所不悅而謂舜與夫子為之乎孟子繆公亟見於子思曰古千乘之國以友士何如子思不悅曰古之人有言曰事之云乎豈曰友之云乎子思之不悅也豈不曰以位則子君也我臣也何敢與君友也以德則子事我者也奚可以與我友千乘之右求與之友而不可得也而况可召乎録曰愚觀古之聖賢以道自重蓋不但子思為然也曾子曰𣈆楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉孟子曰在彼者皆我所不為也在我者皆古之制也吾何畏彼哉蓋聖人道大德宏無可不可若賢者道隆則從而隆道污則從而污不可以不愼者觀於此而可見矣孟獻于百乘之家也有友五人焉樂正裘牧仲其三人則豫忘之矣獻子之與此五人者友也無獻子之家者也此五人者亦有獻子之家則不與之友矣録曰一貴一賤交情乃見此資其勢者也一富一貧乃見交情此利其有者也故曰權交者不久貨交者不親夫是而可謂之友乎此義不明而後富者日驕貧者日諂勢利益盛道義益微孟子發為是論所以立輔仁之範闢諛佞之門不可以不知也非惟百乘之家為然也雖小國之君亦有之費惠公曰吾於子思則師之矣吾於顏班則友之矣王順長息則事我者也録曰惠公之事無可考然能辨大賢為吾師次賢為吾友則亦非常人矣抑周道衰伐木廢國君大夫尚能崇彼抑此師資友益以為美談豈非孔門道德足以感人乎過此蓋寥寥矣非惟小國之君為然也雖大國之君亦有之晉平公之於亥唐也入云則入坐云則坐食云則食雖蔬食菜羹未嘗不飽蓋不敢不飽也録曰晉平公之為君也錮欒盈囚叔向耽淫蠱之疾作虒祈之官惑以喪志無能為已特於賢者尚知禮貌恭遜之間進退疾徐之際周旋執禮儼然猶存故君子亦不以人而廢之也通鑑魏文侯以卜子夏田子方為師每過段干木則廬必式四方賢士多歸之録曰古之王者尚必有師子夏聖門高第未足為辱若田子方段干木則吾不知也雖然以一僣竊之後而能知此亦足多矣厥後魏侯罃卑禮厚幣以招賢者而孟軻亦至區區梁國之小而致大賢之再為國者可不務作于前耶惜乎矯名干寵富貴驕人有禮賢之名而無用賢之實無惑乎終于僣竊而巳也孟子見梁惠王王曰叟不遠千里而來亦將有以利吾國乎孟子對曰王何必曰利亦有仁義而已矣未有仁而遺其親者也未有義而後其君者也王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家萬取千焉千取百焉不為不多矣苟為後義而先利不奪不饜史記燕昭王即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士與共思以雪先王之耻孤之願也先生視可者得身事之郭隗曰古之君有以千金使涓人求千里馬者馬已死買其骨五百金而返君大怒涓人曰馬死且買之况生者乎馬今至矣不期年而里之馬至者三今王必欲致士先從隗始况賢於隗者豈遠千里哉於是昭王為隗改築宫而師事之由是士爭趨燕樂毅自魏往劇辛自趙往昭王以樂毅為亞卿任以國政録曰孟子之時沈同嘗以其私問矣未聞樂毅之名也太史公又謂讀孟子書至梁惠王問何以利吾國未嘗不廢書而嘆也曰嗟乎夫子罕言利嘗防其源也自天子至於庶人好利之弊何以異哉然則涓人馬首之説果敦為之是時仁義之禍棘矣利欲之害熾矣孟子以其命世之才而為超卓之論若果二事並觀可以見賓師之重長老之稱不為徒然至於燕昭樂毅孳孳為利仁義罔聞其君臣之不終端可見矣其所謂不奪不饜尤足垂訓蓋其始也出乎彼入乎此故其終也出乎爾反乎爾然則遺親後君摩不然矣此豈一隗一辛所能知乎嗚呼後世乃有自比之者則其所見亦小矣哉西漢書古之儒者博學乎六藝之文以立五教之典則至治之成法周衰孔子之言不用而道不行於是應聘諸侯以苔禮行誼七十子之徒散遊四方大者為師傅小者為瀕友故子張居陳淡臺子羽居楚子夏居西河子貢終於齊及秦并天下燔詩書殺儒士六學於此缺矣陳涉之王也魯諸儒持孔氏禮器往歸之孔甲遂為涉博士卒與俱死夫涉起匹夫驅謫戌以立號不滿歲而亡然而搢紳先生往焉何也以秦禁其業積怨發憤於陳王也漢高皇誅項籍引兵圍魯魯中諸儒尚講誦習禮弦歌之音不絶豈非聖人之遺化哉至孝武時公孫弘起徒步數年位宰相封侯於是即丞相府起賓館開東閣以延賢人其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼之自蔡至慶丞相府客館丘墟而已賀與屈氂壞以為馬廄奴婢室焉録曰吾儒於天地間大之則繼往聖開來學次之亦崇治化興太平此禮不可一日廢也區區陳涉亦能知之惜乎大漢之興不能崇重致使賈董之徒不能張施於其間而公孫弘掠美於其後史故歷數興慨太息於其間者豈盡無意歟其所感嘆深矣讀者詳之漢初有東園公綺里季夏黃公甪里先生此四人者當秦之世避而入商雒深山以待天下之定也高祖聞而召之不至後惠帝為太子卑辭束帛致禮安車迎而致之四人既至從太子見高祖客而敬焉其後谷口有鄭子真蜀有嚴君平皆修身自保非其服弗服非其食弗食成帝時以禮聘子真不詘而終君平卜筮於成都巿以為卜筮賤業而可以患衆有邪惡非正之問則依筮龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣楊雄少從遊學至仕宦數為在位顯者稱道其德適杜陵李疆為益州牧喜曰吾真得嚴君平矣雄曰君備禮以待之彼人可見而不可得詘也及至蜀致禮與相見嘆曰楊子雲誠知人録曰漢承秦後始以焚書坑儒終以輕士謾罵幾於無士無友矣有太子者出一卑詞求之而峨冠博帶彬彬都雅復見漢廷可見友道之不終絶與厥後子真君平流風餘韻被于當時孟子不云其君用之則安富尊榮其子弟從之則孝弟忠信其諸若人之謂也歟曹參為齊相時天下初定悼惠王富於春秋參盡召諸長老先生問所以安集百姓者膠西有蓋公使人厚幣請之既見為言治道貴清淨而民自定因推此類而具言之參於是避正堂舍蓋公焉盡用其術故相齊九年齊國安集大稱賢相録曰參不但相齊以相天下亦此道也此可見漢代名臣尚然能自得師不皆好臣其所教也豈不賢於後世哉衛青為大將軍諸侯皆屬焉尊寵於群臣無二公卿以下皆卑奉之獨汲黯與亢禮人或説黯曰大將軍尊重君不可以不拜黯曰以大將軍有揖客反不重耶大將軍聞愈賢黯數請問國家朝廷所疑遇黯加於平日録曰汲黯不拜衛青所恃者何耶蓋人有欲則無剛剛則不屈於欲凡所以卑奉之者欲也黯惟無欲故面折而不為過犯義而不為辱君且直之而况於臣乎或曰黯常願出入禁闥豈其無欲哉夫質直好義者逹也色取行違者聞也黯之行達矣其在內也奚以重其在外也奚以輕馬援與公孫述舊同里閈相交善後述稱帝成都隗囂使援往觀以為既至當握手歡如平生而述盛陳陛衛以延援入交拜禮畢使出就館更為制都布單衣交讓冠會百僚於宗廟中立舊交之位述鸞旗旄騎蹕警就車磬折而入禮饗官屬甚盛及援奉書雒陽初到光武在宣德殿南廡下但幘坐迎笑謂援曰卿遨遊二帝間今見卿使人大慚援謝曰當今之世非但君擇臣臣亦擇君耳臣與公孫述同縣少相善臣前至述陛戟而後進臣臣今遠來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客爾援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符高祖乃知帝王自有真矣録曰帝之簡易不當如是耶夫王僚重鎧專諸刺行秦法斷兵荆軻匕見固不在於簡與不簡也然則帝豈故為是哉聲音笑貌可施於庸品之人開心見誠自結于豪傑之士援之觀聼一見決矣惜乎説客之言非知援者蓋援之擇君出于本心專意東方乃其素願初非反覆傾詐之徒也使其君可事則雖堂陛介然不害其委質使其君不可事則雖握手歡然不見其可親卒之滅囂虜述不越範圍然則援非説客乃德客耳其於慙詔乎何有弘道録卷之三十五
