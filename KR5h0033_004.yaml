  text: 弘道録經四
  hash: sha256:9019a77ccff5a23cae9ce05a2cac2238ecb5d1a966bdb7b24b508e4acb7c6b73
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_004-001a, image: hfl/1068/1068-004.png}
body:
  text: 仁父子之仁堯典曰虞舜父頑母嚚象傲克諧以孝録曰此稽古史臣弟一義也夫孝為萬善之原仁之本務也以堯舜之大聖行禪授之大事不過曰克諧以孝而已然則聖人之德又何以加于孝乎孟子曰帝使其子九男二女百官牛羊倉廪備以事舜于畝畝之中天下之士多就之者帝將胥天下而遷之焉為不順于父母如窮人無所歸天下之士悅之人之所欲也而不足以解憂好色人之所欲妻帝之二女而不足以解憂富人之所欲富有天下而不足以解憂貴人之所欲貴為天子而不足以解憂人悅之好色富貴無足以解憂者惟順于父母可以解憂人少則慕父母知好色則慕少艾有妻子則慕妻子仕則慕君不得于君則熱中大孝終身慕父母五十而慕者子于大舜見之矣録曰豈惟舜哉今我皇上之孝真有如大舜者觀其屢所諭輔臣不以身為天子當有四海為樂至咨嗟涕泣若有不能一日安于其上者其詞具見眀倫大典亦可謂終身慕者矣萬章問曰人有言至于禹而德衰不傳于賢而傳于子有諸孟子曰否不然也天與賢則與賢天與子則與子昔者禹薦益于天七年禹崩三年之喪畢益避禹之子于箕山之陰朝覲訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也丹朱之不肖舜之子亦不肖舜之相堯禹之相舜也歷年多施澤于民久啓賢能敬承繼禹之道益之相禹也歷年少施澤于民未久舜禹益相去久遠其子之賢不肖皆天也非人之所能為也莫之為而為者天也莫之致而至者命也録曰此家天下之始萬世共由而莫之變易者也蓋盡心知性而後可以言天窮理盡性而後可以言命斯二者苟一毫之未盡未有不為子之趙普者彼子之趙普曷常不言天與命哉其所建非天下之至公則無以易天性之至愛所授非祖宗之至意則無以見統承之至恩是故朱與均堯舜曷嘗不愛之哉為天下得人難故不為強避也至于益又曷常不薦之于天暴之于人哉不之益而之啓故不為強奪也此豈人之所能與哉孟子發明為相久遠之故其了賢不肖之殊于天命益為詳盡録者不可不察太甲曰王徂桐宫居憂克終允德録曰惻隱之心仁之端也斯言何為而發哉豈非以中人之性不見所可憂而憂心不生不見所可懼而懼心不生于是乎浸淫于風愆而不自知也拂戾于訓誨而不自覺也寧不思所以警動之者平夫桐宫窀穸之所在也衣冠之所藏也雖以常人視之亦莫不望松揪而興慨至是而太甲之心油油如矣勃勃如矣其密邇先王之訓賢于師保之訓遠矣是故不邇聲色常接乎目也不吝改過每警乎心也此其所以顛覆之迹變而為克終之德豈非惻隱使之然哉無逸曰其在高宗時舊勞于外爰暨小人作其即位乃或諒陰三年不言其惟不言言乃雍録曰商之尚質猶夫太古之風也太子天下之本不以卑踰尊也而乃使久居民間與小民共事乎可以見小乙之愛其子非若後世姑息之態而有真實無妄之誠朝廷萬幾之本不以恩掩義也而乃或亮陰三年不言乎可以見高宗之愛其父非若後世虛禮之文而有天性自然之愛此三代人主高致盛節非但以崇高富貴言也大雅云綿綿瓜瓞民之初生自土沮漆古公亶父陶復陶冗未有家室録曰夫詩稱綿綿瓜瓞何也蓋太王肇基王迹迹者軌之轍也邠人曰仁人也不可失也從之者如歸市豈非王者之軌轍歟厥後武王纘太王之緒即綿綿之緒耳不然以陶復陶冗之風而圖王剪啇之志何由起耶善觀者必能辨之又云乃及王季維德之行太妊有身生此文王録曰愚觀成周之際父祖子孫若是其盛而堯時反不能及何也意者天地初闢氣未全純至周真元會合匪但家之積慶而天下積誠亦非一朝一夕之故也不然以洽陽渭涘與釐降媯汭何以不相若乎列女傳曰太妊之性端一誠莊及其有娠目不視惡色耳不聽惡聲口不出傲言生文王而明聖太妊教之以一而識百率為周宗君子謂太妊為能胎教録曰愚觀胎教之言未嘗不嘆其至理之所寓也夫天命之性無形者也男女之感有氣者也無形者不可以善惡言性善故也有感者則其邪正善惡自此分矣匪但是也而貴賤壽夭無不兹焉是判所謂氣質之稟與生俱生一定而不可易者其卒為周宗不亦宜乎中庸曰無憂者其惟文王乎以王季為父以武王為子父作之子述之録曰孔子曰仁者不憂釋之者曰理足以勝私故不憂文王以王季為父苟若私欲勝則必逞其欲速之心而陷父于不義有之矣以武王為子若苟私欲勝則必預為不拔之業而陷子于不臣有之矣以是為訓後世尚有欲為周文王者嗚呼是何文王之多乎后妃不妬忌而子孫衆多故衆妾以螽斯之群處和集而子孫衆多比之曰螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖兮宜爾蟄蟄兮録曰何以謂有是德而宜有是福也蓋前乎此者多及王世不可宗矧可繼乎後乎此者多陰禍燎不可遏矧可長乎夫人不間于其父母昆弟之言可以觀孝矣言不離于其衆妾內子之口可以觀德矣和非婦子嘻嘻也貫魚以宫人寵無不利其周之世恩乎進非枯楊生梯也王假有家交相愛也其文之家法乎此而論德則德廣此而言福則福大文王后妃德修于身而子孫皆化于善故詩人美之曰麟之趾振振公子吁嗟麟兮若録曰愚觀王者之端未有若是之真實而無偽而頌美之詞亦未有若此之親切而有味也是故麟有在郊藪矣然而未見也矧四靈之物無形而群公之子有象固不若振振者之克肖也此聖人之徒深有得于觀感興起非但誦説向慕而已也抑啇有外丙何壬之夭漢有隱王少帝之辜死有建成光吉之難宋有光美德昭之議更孰有如周之文武成康繼體者哉以為王者之瑞誠非誣矣矧記文王有疾武王不説冠帶而養文王一飯亦一飯文王再飯亦再飯旬有二日乃間文王謂武王曰女何夢矣對曰夢帝與我九齡文王曰女以為何也曰西方有九國君王其終撫諸文王曰非也古者謂齒為齡我百爾九十吾與爾三焉文王九十七乃終武王九十三而終録曰武何有以是夢也愛親之心篤所謂先天而天弗違也文何以有是應也愛子之心篤所謂後天而奉天時也天且弗違而人何疑議之哉文之與武體雖有二而誠之所通初無間然也其一飯再飯以至旬有二日之間純乎為親之意舉天下物物何以加之乎木石豚魚尚云可格矧神明之至理耶其曰九十七九十三者乃實理之應適會其數雖不益以文王之三齡安知武王之有縮乎要之人生以百歲為期初不屑屑拘之觀者不以詞害意可也周頌閔豫小子遭家不造嬛嬛在疚于乎皇考永世克孝念兹皇祖陟降庭止維豫小子夙夜敬止于乎皇王繼序思不忘録曰所以謂就文武之業崇大化之本者蓋天地之大化曰仁聖人之至德曰孝几所以媚茲一人而應侯順德者莫非以是為之張本也是故太甲之徂桐居憂高宗之宅憂亮陰成王之煢煢在疚三王所以底于嗣守之賢者同一道也皇王之孝非有他求也其端出于天乃良心之真切也其思閟于祖乃憂劬之通微也其質要于鬼神乃百順之遊衍也此所以思繼其序而不忘者也厥後大漢之興其審尚不異乎此元成以後此道微矣無怪乎經生之切切也顧命惟四月哉生愧王不懌甲子王乃洮類水相被冕服憑玉几乃召太保爽芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克逹殷集大命在後之侗敬迓天威嗣守文武大訓無敢昏逾今天降疾殆弗興弗悟爾尚眀時朕言用敬保元子釗弘濟于艱難録曰此成王之所以正其終與康王之所以正其始可以為萬世之法也夫托孤寄命夫有若周之得人者也以王室之懿親當太保之重任雖曰有君臣之分而其休戚之所關若同舟而揚于中流並轡而馳于康莊亦安得而不業業哉彼成王者始也豫其懲而毖後患苟非周公何以能保明其身乎終也宣重光而達大命苟非召公何以能敬保元子乎此艱難之意成王身有之故言之親切而有味非若安劉必勃之徒取僥幸也又曰柔遠能邇安勸小大庶邦思夫人自亂豫威儀爾無以釗冒貢于非幾録曰成王至是無以異于古之聖賢矣蓋幾者虞廷之要訣也非至明疇能察之非至健疇能決之此其所得于緝熙仔肩之所致而非泛泛然之臆説也夫動而泛應則紹庭上下陟降厥家可須臾忽忘乎靜而愼獨則一日二日萬幾可瞬息不善乎然而嗣君尤切焉者以其心之未純守之未固一旦出居人表易致驕泰之失入邇近習冒進不善之幾則所以柔遠能邇安勸小大庶邦皆失其具矣此瞑眩之深慮死生之永訣盈成之至計保傅之全功彼佳兒佳婦之言徒見其所為親而不詳于理道者非同日語也周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備于一人録曰此周公之家法夫子所謂魯一變至于道是也厥後魯公之為治先內而後外先仁而後義所得于訓戒者至切也故曰魯之澤及十世魯有王者之迹者仁厚也齊之所以不如魯也然愚嘗過曲阜而觀周公之廟乃無一人配饗之者愚意大聖人之德生能配天死無以配食且以魯公之賢無忝周公之教以之配饗夫豈不宜他日或能舉錯執此以往可也檀兮晉獻公之喪秦穆公使人吊公子重耳曰寡人聞之亡國恆于斯得國恆于斯雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圖之以告舅犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利而天下其執能説之孺子其辭焉公子重耳對曰君惠吊亡臣重耳身喪父死不得與于哭泣之哀以為君憂父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私子顯以致命于穆公穆公曰仁矣公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則遠利也録曰立庶以是不以愛愛既斃矣重耳之長無能易也彼惠公者上不顧兄下不顧弟外賂內求僥幸苟得重耳方且煢煢在疚稽顙哭泣其氣象判然不侔故春秋惠公不書入里克不書罪而大學亦引舅犯之言皆與人為善之心也孰謂穆公之主納不定于子顯之致命乎使文公者每事如此又何以久假而不歸哉惜乎心之不純巧于用詭雖皆不學之過而子犯之致君無術亦不得而辭其責也左傳酆舒問於賈季子犯之子曰趙衰之與趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也録曰冬日之日可愛者也夏日之日可畏者也衰以壺漿從經餒而弗食其愛至矣至盾始為國政制事典正法罪辟刑獄董逋逃由質要畏而愛矣此季所以亟稱也家語孔子之先宋之後也微子啓殷帝乙之元子入為王卿士微國名子爵周公相成王命微子為殷後與國于宋弟號微仲仲生宋公稽稽生丁公申申生湣公熙熙生弗父何何當嗣而讓其弟厲公焉何生宋父周周生世父勝世為宋鄉勝生正考甫生孔父嘉其後以孔為氏焉嘉生木金父木金父生臯夷父其子為防叔辟華氏之禍而奔魯故孔子為魯人防叔生伯夏伯夏生叔梁紇禱于尼丘之山生孔子録曰遷知世孔子矣而顧遺其先系何耶微子統承先王孔子實紹商後三代更起迭運可謂至仁矣夫契敷五教明人倫萬世仁義禮樂之宗也湯繼夏后以有天下其立本發源實肇于此以至于微子又生有聖德后與帝乙皆欲立之則微子固當命世為天子矣及其抱祭器奔周天心棄紂而實未厭商也周亦不敢臣之而使修其禮物作賓於王家數世而後周德亦衰天乃篤生元聖為萬代仁義禮樂之宗主雖不繼周而王實以代商為治觀夫子嘗曰吾學殷禮有宋存焉其隱然自任之心可見是可遺而弗論乎通志救馬遷之失亦略而不書非其至矣此録之不可無也孔子年十九娶于宋之開官氏一歲而生伯魚魯昭公使人遺之鯉魚孔子榮君之貺故名曰鯉而字伯魚伯魚生伋字子思作中庸録曰商自契以來而至于湯又自湯以降而封于宋歷千有餘年而後孔氏興又自正考父佐戴武宣歷數世而後孔子出孔子復娶于宋之開官氏而生伯魚伯魚復生伋而後道統之傳得其宗天為萬世之計將以繼往開來非但光前裕後其所關係非小補也乃可略而不書乎録之以補史記古史通志諸書之缺孝經仲尼居曾子侍子曰先王有至德要道以順天下民用和睦上下無怨汝知之乎曾子避席曰參不敏何足以知之子曰夫孝德之本也教之所由生也復坐吾語汝身體髮膚受之父母不敢毁傷孝之始也立身行道揚名于後世以顯父母孝之終也夫孝始于事親忠于事君終于立身大雅云無念爾祖聿修厥德録曰夫所謂至德要道何也曰心也心何以至而要也此對天下與民與上下言故為至而要也何以天下與民與上下之非至而要也天下至廣也聖人以為病焉博施是也兆民至煩也聖人以為病焉濟衆是也上下至不齊也聖人以為病焉潔矩是也豈其遂已哉天下雖廣親則一也兆民雖煩愛則一也上下雖舛順則一也親也愛也順也先王之心休休乎以為美也綽綽乎以為裕也視之弗可見而能加于百姓聽之弗可聞而能刑于四海故曰德之本也教之所由生也此通一經之本始明五孝之發端非止始于事親忠于事君終于立身而已有子曰其為人也孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也君子務本本立而道生孝弟也者其為仁之本與録曰孝弟為仁之本本猶根也物之有根便有許多柯幹枝葉所以務培其根者以生意在此而不在彼也設有人焉接人一團和氣而家庭有未善焉可謂仁乎又有人焉惟孝友于兄弟乃加人以橫逆焉有是理乎故曰孝弟而好犯上者鮮矣不好犯上而好作亂者未之有也然此乃日用常行之道無甚高難行之事君子何乃專用力于此乎正以本立而道生則將推之天地萬物無不各得其所矣豈非仁之本乎門人以有子言行氣象似聖人故並記于開卷之首然則務本者豈非時習之第一義歟孟子曰未有仁而遺其親者也録曰夫所謂遺親者即如世俗不孝有五之類惟不仁則徇于人欲之私而有此等事仁則一舉足一出言不敢忘乎父母故嘗聽于無聲視于無形豈有惰其四肢乎居則致其敬養則致其樂豈有博奕好飲酒乎父母之所愛者子亦愛之豈有好貨財私妻子乎色不忘乎目聲不絶乎耳豈有從耳目之欲乎居上不驕為下不亂在醜不爭豈有好勇鬥狠乎凡此皆人倫莫大之幸家道無窮之益三書開卷之首不可以不察也又曰仁之實事親是也録曰此實字非對華而言亦非如果核之實乃是本然歸宿處故謂之實也蓋仁之所以為仁非泛然之謂也乃天生父子其性之至愛本然歸宿之處在于事親故謂之仁也下面義智禮樂莫不皆然至于樂則生矣生則烏可已也則仁之全體逞露大用顯行極至則手舞足蹈然皆出于五者本然歸宿之處非有所外求非有所假借乃直示人以喫緊活潑之道大抵聖賢之言譬之化工生意俱包在內人視之有層層葉葉只是一箇骨朵內發出來的便是仁之實也讀者其致思乎小雅蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁鉼之罄矣維壘之耻鮮民之生不如死之久矣無父何怙無母何恃出則御恤入則靡至父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極南山烈烈飄風發發民莫不穀我獨何害南山律律飄風弗弗民莫不穀我獨不卒録曰治世之言宣以達其詞平季世之言矯以激其詞切故將母來讅者非不知劬勞顧復也君探其情而伐之言則必無私憾恨矣陟岵陟屹者亦非不知瓶聲壘耻也而能尚愼旃哉猶可以盡其情矣今既不得終養以盡人子之情又無所勞憫以見君父之義無所歸咎而歸之于己曰匪莪伊蒿也曰旻天罔極也其呼天怨慕之情豈得己哉至于南山烈烈飄風發發則所謂不盡繼之以血極其哀怨而不自知者孟子曰舜其大孝矣五十而慕若此詩者其曲盡愛慕者歟禮記曰孝子之有深愛者必有和氣有和氣者必有愈色有愈色者必有婉容孝子之執玉如奉盈洞洞屬屬然如弗勝如將失之嚴威儼恪非所以事親也録曰子夏曰事父母能竭其力而孔子教之曰色難其義何居舜號泣于旻天曰我竭力耕田供為子職而已矣則色之與力自當有辨也蓋父子主恩者也親非親也所以為我者也我非我也所以為親者也色發氣之所動也不可以矯揉而為勉強而致其心和則氣和氣和則發氣滿容有莫知其所以然而然者矣子夏非直義者也但以謹守之故恐其以竭力為足以盡仁故夫子啓而發之不然以商之長于文學記禮者多出其門豈不知嚴威儼恪之非所以事親哉曾子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之是故父母之所愛亦愛之父母之所敬亦敬之至于犬馬盡然而况于人乎録曰夫所謂忠養者盡己之心為忠則與能竭其力異矣孟子曰曾子養曾晢必有酒肉將徹必請所與問有餘必曰有然豈特此哉曾晢嗜羊棗而曾子不忍食羊棗何莫而非盡吾之心哉此事親若曾子者庶幾盡仁矣子路曰傷哉貧也生無以為養死無以為葬子曰啜菽飲水盡其歡斯之謂孝録曰所謂盡其歡者責人以三牲五𣇄則儒者無善養勉人以虀醢桓楹則貧者無善葬啜菽非旨也靡靡者為之砥也飲水非甘也皆醉者為之醒也孰謂一言之間而非至教哉南陔孝子相戒以養也循彼南陔言采其蘭眷戀庭闈心不遑安彼居之子罔或遊盤馨爾多膳潔爾晨餐循彼南陔厥草油油彼居之子色思其柔眷戀庭闈心不遑留馨爾夕膳潔爾晨羞有獺有獺在河之涘淩波赴汩筮魴捕鯉嗷嗷林鳥受哺于子養隆敬薄惟禽之似朂增爾虔以介丕祉録曰以補詩終焉者周道衰仁孝薄于是有不父其父者矣有證父攘羊者矣甚者母喪而歌以薄為道曾不知報本之義反哺之恩焉哀哉乎夫物之不若歟此詩雖無詞而著于鄉飲酒合樂之用君子因聲以遙義得義以綴恩庶幾仁孝之不廢也
