body:
  text: 智君臣之智通鑑魏文侯謂李克曰先生嘗有言曰家貧思賢妻國亂思良相今所置非成則璜二子何如對曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者以定之矣文侯曰先生就舍吾之相定矣録曰五者果足以定相乎夫乾稱父坤稱母大君者宗子也大臣者家相也故天地之廣兆民之衆親之為同胞視之為吾與皆相之職也若但居視其所親所不親者尚多也富視其所與所不與者尚多也以論三晉之相則可論天下之相則不可天下之相必如秦晉斷斷兮無他技其心休休焉其如有容焉如此方可以保子孫黎民視彼五有之氣象萬萬不侔矣後之欲論相者盍舉以為法韓昭侯有弊袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞明言愛一嚬一笑今袴豈嚬笑哉吾必待有功者録曰昭侯於是乎失言矣夫彤弓弨弓受言藏之先王所以待有功也袴雖鮮不以加諸人况於其弊者哉若夫一嚬一笑所關至重怒而故嚬喜而故笑人主之喜怒將國關馬而豈弊袴之比乎徒知舉措之不費不察身心之逺圖偶存愛利之私情而競左右之臆説未足以語智也史記沛公入咸陽諸將皆爭取金帛財物蕭何獨先入收丞相府圖籍藏之以此得具知天下厄塞户口多寡強弱之處反漢王入榮陽命蕭何守關中計關中户口轉漕調兵以給軍未嘗乏絶録曰此蕭何之功所以第一漢之天下根扺於是乎定矣彼責其不收博士掌故之書無案之詞也初項羽與諸將約曰先入關中者王之至是與范增疑沛公而業已請解乃陰謀曰巴蜀道險秦之遷人皆居之然巴蜀亦關中地也故立沛公為漢王沛公怒欲攻羽蕭何諫曰誳於一人之下而信於萬乘之上者湯武是也臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也漢王曰善乃遂就國以何為丞相録曰此簫何所以必用韓信不在於追亡之日而在於王漢之始破秦滅項立漢定楚胸中已有成算何其無忝於相國哉漢王問韓信曰丞相數言將軍將軍何以教寡人計策信辭謝因曰今東卿故天下豈非項羽乎曰然曰大王自料勇悍仁強孰與項三曰不如也信曰項王之為人也喑啞叱吒千人自廢然不能有任賢將此特匹夫之勇耳項王見人恭敬慈愛言語嘔嘔人有疾病涕泣分食飲至使人有功當封爵者印刓敝忍不能豫此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城放逐義帝所過無不殘滅名雖為霸實失天下心故其強易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思歸東之士何所不散且三秦王為將將秦子弟數歲矣斯其衆降諸侯至新安項王詐坑秦降卒三十餘萬唯蜀邯欣翳得脫秦父兄怨此三人痛入骨髓今楚強以威王此三人秦民莫愛也大王入關秋毫無所害除秦苛法秦民無不欲得大王王秦者今大王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聼信計録曰愚觀韓信之所養乃知赴赴武夫公侯服心信不誣也夫玉汝於成在天不可得而知也以信之窮困受辱體膚之餓拂亂之為亦已多矣焉能不動其心哉是故惟不甘匹夫之勇而後知三秦可破惟不屑婦人之仁而後知項羽可敵惟不沒養民致賢之言而後知丞相可事惟不棄設壇拜將之禮而後知漢王可臣如是而不聼信計則吾不知也張良為韓報仇乃徂擊始皇始皇大怒大索天下十日不能得良乃更名姓亡匿下邳嘗從容步圯上有一老父至良所直墮其履圯下顧謂良曰孺子下取履良強忍下取之父又曰履我良因長跪父以足受履笑曰孺子可教與之期後五曰平明會此良往父已先在怒曰與老人期後何也去再後五日早平雞鳴良往父又先在復怒曰何後也去再後五日復早來良夜未半往有頃父來喜授以編書曰讀此為王者師後十年見我濟比穀城山下黃石即我矣遂去無他言旦日觀其書乃太公兵法也良因異常習讀誦之録曰張良之於豫讓其始豈相逺哉世殄暴興畫剽巷奪專諸曹沫之戈聶政荆軻之七藉聞於時以相如之賢猶欲五步之內血濺秦王其風聲氣息所由來逺矣天厭人夷圯上者出以為漢驅除然後子房能知沉計忍辱善藏其用卒以智稱是故由前而觀子房如未煆之鋼未操之毋豈能免於徒割由後而觀子房如處女之軀脫免之矩不可胃於羈靮矣良素多病相從沛公入關嘗導引不食穀及天下已定封為留侯乃辭去漢曰家世相韓及韓滅不愛萬金之資為韓報仇今以三寸舌為帝者師封萬户侯此布衣之極於良足矣願棄人間事欲從赤松子遊耳録曰自聖賢之世逺而後君子進退出處之間廢情而任術也嗚呼可以慨諸可以慨諸夫伊之訓曰臣罔以寵利居成功周公之爻曰亢龍有悔此聖賢之學也退而囂囂自得與赤舄几几此聖賢之道也自三顧至於反政自居攝至於告老何莫非斯道也三代往矣權謀功利之學所志者何事往往知進而不知退知存而不知亡故創見子房之事以為希曠超絶真若脫履邁世者而不知其用智任術亦已多矣何者蓋黃石之説曰安莫安於忍辱吉莫吉於知足嗚呼斯言也雖不全合聖人之旨要亦不可以無道拒之視彼韓彭周勃大有間乎設使不遇其人吾見博浪之謀迂於謝病之策其去殂臨將不逺矣帝置酒洛陽南宫謂羣臣曰徹侯諸將毋敢隱朕所以有天下者何項氏之所以失天下者何王陵對曰陛下慢而侮人項羽仁而愛人然陛下使人攻城略地因以與之與天下同其利項羽妬賢嫉能有功者害之賢者疑之此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中決勝千里之外吾不如子房墳國家撫百姓給餉餽不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此所以取天下也項羽有一范增而不能用此所以為我禽也録曰程子曰天地之常以其心普萬物而無心聖人之常以其情順萬物而無情然則非無心也以一人之心為千萬人之心何人不可有哉亦非無情也以一人之情為千萬人之情何物不可用哉漢高雖不幾於聖人而一時之功用天為之以清地為之以寧苟非豁達大度從善如流吻合於廓然太公物來順應安能事事而周之人人而察之乎若乃自賊以為智而不合衆心自用以為善而不通衆志此乃夭之所棄非但人之所禽也高后崩吕祿吕産欲為亂而憚絳侯朱虛等猶豫未決絳侯使酈寄紿説吕祿以兵屬太尉太尉入軍門令曰為吕氏右祖為劉氏左祖軍中皆左袒太尉遂將北軍分部悉捕諸吕男女無少長皆斬之録曰人皆謂太尉之問非是或為之危或為之幸但據紙上之陳言尉必先為之所而後問也曰以酈寄之紿説即此而知其然也夫陳涉一匹夫耳其將起也猶預使人叢祠中呼曰陳涉王然後人皆從之矧平勃之智也所恃者六軍而已况又未敢訟言誅之則人安知順逆之所向哉一左祖之問而逆順判然其可見矣然後人皆知吕氏之當誅劉氏之當正前後左右紛紛乎其解體矣豈非交歡相結之深計歟文帝即位益明習國家事朝而問右丞相勃曰天下一歲決獄幾何勃謝不知又問一歲錢穀出入幾何勃又謝不知汗出沾背上問左丞相平平曰有主者陛下即問決獄責廷尉問錢穀責治粟內史上曰君所王者何事也平謝曰宰相上佐天子理陰陽順四時下遂萬物之宜外鎮撫四夷諸侯內親附百姓使卿大夫各得任其職焉帝稱善於是絳侯自知其智能不如平乃謝病請歸相印上許之平專為丞相録曰平之言真宰相職也帝已知之矣獨不能責其實乎責其實獨不思得其人乎惜乎帝之眀智無以及此也嘗求其故矣高宗恭默思道所務者學也學故知之非艱行之惟艱謂求有益於得也文帝玄默化民所慕者老也老故知雄守雌知白守黑謂求無益於得也是故武夫捍將材官蹶張之徒而臨以質美之主其施為氣象反拜下風而仰餘光何以責其坐而論道乎然則咸有一德與夫思兼三王非故為是表異也不如是不足以佐天子正中國而撫四夷也陳平嘗從征伐凡六出奇計請捐金行反間一也以惡章具進楚使二也夜出女子二千人解衆陽圍三也攝足請封齊王信四也請偽遊雲夢縳信五也解白登之圍六也録曰臨危制勝料敵設奇者一時之事也所謂一將之智則有餘也代天弘仁燮理陰陽者不世之事也所謂萬乘之才則不足也此帝之論相徒有其名而無實者也上輦過郎署問馮唐曰父家安在對曰臣大父趙人上曰昔有為我言趙將李齊之賢戰於巨鹿下今吾每飰意未嘗不在巨鹿也唐曰尚不知亷頗李牧之為將也上拊髀曰嗟夫吾獨不得廉頗李牧為將吾豈憂胸奴哉唐曰陛下雖得頗牧弗能用也上怒讓唐唐曰上古王者之遣將也跪而推轂曰閫以內寡人制之閫以外將軍制之軍功爵賞皆決於外牧故能逐北單于破東胡滅儋林西抑強秦南支韓魏今魏尚為雲中守其軍市租盡以饗士胸奴逺避不敢近塞虜曾一入尚率車騎擊之所殺甚衆上功幕府一言不相應文史以法繩之陛下賞太輕罰太重尚坐首虜差六級下之吏削其爵由此言之雖得頗牧弗能用也上説令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉録曰帝之思頗牧而以為將也獨不思周召而以為相乎頗牧之為將逐單于破東胡滅儋林胸奴不敢近塞而已周召之為相也越裳氏重譯而獻曰夭無烈風淫雨海不揚波已三年矣意者中國有聖人乎盍往朝之然則將相之功果孰愈乎夫股肱惟臣良臣惟聖三代之所以賓服四夷用此道也文帝不思聿求元聖與之戮力顧區區於趙代之所聞雖日拊髀果何益哉此所以雖聞陳平之言無異馮唐之論未足為大智也武帝時汲黯多病莊助為請告上曰汲黯何如人哉助曰使黯任職居官無以踰人至其輔少主守成深堅招之不來麾之不去雖自謂賁育不能奪之矣上曰然古有社稷之臣至如汲黯近之矣録曰此武帝異日托孤所以獨得其人也夫知之真而後任之篤寧愈之愚王陵之戇苟非真知孰能有濟乎不愚不戇見害則避見利則趨而又何待於招之使來麾之使去耶唐太宗惟不知蕭瑀李績之真故寄命之際取其才智而略其節行然則弘式倪寬之流莊助已易而畜之矣其於社稷乎何有鉤弋夫人之子弗陵年數歲形體壯大多智上奇愛之察群臣惟奉車都尉霍光忠厚可任大事乃使黃門盡周公輔成王朝諸侯圖以賜光及上病篤霍光涕泣問曰如有不諱誰當嗣者上曰君未諭前盡意耶立少子君行周公之事乙丑詔立弗陵為皇太子以光為大司馬大將軍光出入禁闥二十餘年小心謹愼未嘗有過為人沉靜詳審每出入下殿門進止有當處郎僕射竊識視之不失尺寸録曰帝之任光蓋得於助之論黯可以見知人之明矣夫托六尺之孤者光之忠厚小心刀能辨之矣苟無廢昌之變立宣之權光不為全人乎設使汲黯而當其時遭其事吾知尚不能客人之過其能容己之過乎碏與磾之事其所優為之者矣矧於淮南寢謀而妻子獨不能窒其欲耶帝有以知光而光不能副帝此又黯之罪人也上官桀之子安之女即霍光外孫安因光欲內為后光以其幼不聼安遂因帝姊蓋長公主內入宫立為皇后年甫六歲於是桀安深怨光知燕王旦以帝兄不得立怨望乃令人詐為王上書欲共執退光書奏光聞之不入上問大將軍安在桀對以王告其罪不敢入有詔召大將軍光入免冠頓首上曰將軍冠朕知是書詐也將軍調校尉未十日王何以知之是時帝年十四尚書左右皆驚而上書者果亡後桀黨與有譛光者上輒怒曰大將軍忠臣先帝所屬以輔朕身有毁者坐之自是桀等不敢言録曰人皆謂慧者不壽豈壽者不慧乎其所得於天有厚而清者有清而薄者自明誠謂之性自誠明謂之教誠則明矣明則誠矣此得其厚而清者故悠久無疆也琉璃之為寶非不瑩然白也氷玉之為器非不皎然明也然得其清而薄者故觸之即碎也是其明雖同而誠則異此漢昭之所以止於是乎自武帝置左馮翊右扶風京兆尹以來吏民獨推趙廣漢天性聰明精於吏職尤善為鈎距以得事情鈎距者設欲知馬賈則先問狗已問羊又問牛然後及馬參伍其賈以類相凖則知馬之貴賤不失實矣唯廣漢至精能行之他人效者莫能及也郡中盜賊閭里輕俠其根株窟穴所在及吏受取請求鐵兩之姦皆知之長安少年數人會窮里空舍謀共劫人坐語未訖廣漢使吏捕治具服富人蘇回為郎二人劫之有頃廣漢將吏到家自立庭下使長安丞龔奢叩堂户曉賊曰京兆尹趙君謝兩卿無得殺質此宿衛臣也二人驚愕又嘗召湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君亭長既至廣漢與語問事畢謂曰界上亭長寄聲謝我何以不為致問亭長叩頭服實有之廣漢因曰還為吾謝界上亭長勉思職事有以自效京兆不忘卿厚恩其發姦擲伏如神皆此類也録曰愚聞諸先正仁可過智不可過告訐之俗鈎距之情智之過也智之過不得謂之好問用中隱惡而揚善矣况加以專厲強壯蜂氣見事風生乎此正自取殺身之道非其智如神之謂也東漢書竇融聞光武威德心欲東向以河西隔逺未能自通隗囂使辨士張玄説融曰更始事已成尋復亡滅此一姓不再興之效當各據土宇與隴蜀合縱高可為六國下不失尉他融召豪傑議其中識者皆曰今皇帝名姓見於圖書漢有再受命之符融遂決策東向而遺長史劉絢奉書詣雒陽帝賜融書曰今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉欲遂立桓文輔微國當勉卒功業欲三分鼎足連衡合從亦宜以時定天下未并吾與爾絶域非相吞之國今之議者必有任囂教尉他制七郡之計王者有分土無分民自適己事而已因授融為涼州牧璽晝至河西河西皆驚以為天子明見萬里之外録曰融之歸向去幽就明也帝之明見料事多中也有融之明而後有帝之見屯之初九曰盤桓利居貞竇融以之彖曰天造草昧宜建侯而不寧光武以之此所以終漢之世令名無窮彼隗囂者所謂乘馬班如泣血漣如不旋踵而亡滅也然則不但帝之明見萬里而聖人已明告萬世矣光武以天下墾田多不實自占又户口年紀互有增減乃詔下州郡檢核於是刺史太守多為語巧苟以度田為名聚民田中並度廬屋里落民遮道啼呼或優饒豪右侵刻羸弱時諸郡各遺使奏事帝見陳留吏殰上有書視之云潁川弘農可問河南南陽不可問帝詰吏由不肯服抵言於長壽街上得之帝怒時皇子東海公陽年十二在幄後言曰吏受郡敕當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖帝令虎賁將詰問吏吏乃首服如東海公對上由是益奇愛陽録曰眀非人主聖德耶然有斤斤之明有察察之明斤斤者明之盛也是故大明當空萬方普照而隙光之小覆盆之末曾未嘗屑屑也察察者明之苛也是故燃犀照渚情狀必露而淵魚之細潛伏之微或不能舍之也雖然犀有物也明無物也以照渚則或明以映曰則無光矣此漢明之所以辨於吏殰之情而昧於楚獄之濫也夫初光武在薊屬王郎起移檄搆之乃令王霸募人於市將以擊郎遂趣駕出時天寒冽南馳至下曲陽傳聞王郎兵在後從者皆恐及至滹沱河候吏還白河水流澌無船不可濟官屬大懼光武使霸往視霸恐驚衆欲且前阻水還即跪曰氷堅可渡官屬皆喜光武笑曰候吏果妄語也遂前北至河河氷亦合乃令霸謢度未畢數騎而氷解因謂曰安吾衆得濟者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此後謂官屬曰霸權以濟變殆天瑞也録曰此當與白蛇同應不當以白魚為比則神靈之祐庶幾稱矣又曰所謂權以濟變者非詭道也事已屆於危迫其幾間不容髮正豪傑用智之時設使踵候吏之言將不前阻水乎前乎李陵虜不敢逼後乎趙雲一身俱膽皆以此也若謂預知氷合以決天瑞則霸非所及也弘道録卷之三十八
