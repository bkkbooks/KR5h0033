front:
  text: 弘道録卷之十六羅一
  hash: sha256:8ff548ac503389315ebde3eda88e73420520267466f09aa63cea19d6332bd01e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_009-001a, image: hfl/1071/1071-004.png}
body:
  text: 義君臣之義高宗紹興元年召李綱爲尚書右僕射上䟽曰興衰撥亂之主非英哲不足以當之惟其英故用心剛足以蒞大事而不爲小故之所摇惟其哲故見善明足以任君子而不爲小人之所間在昔人君體此道者惟漢之高光唐之太宗本朝之藝祖太宗願陛下以爲法録曰綱之言英哲也豈無所見哉就帝之初服觀之㓂戎方將奮然請徃可以爲英矣决機倉卒定𣇄式㣲可以爲哲矣惜乎中人之性溺於宴安逢君之徒志於苟且有綱之賢而不能竟其用有張韓劉岳之將而莫能畢其功以至於汪黄秦檜小人之徒匿意恣情無所不至而不知高光數主椰榆於地下久矣孰謂綱非先見乎哉及綱至行在奏曰金人不道專以詐謀取勝中國不悟一切墮其計中賴天命未改陛下緫師於外爲天下臣民之所推戴内修外攘還二聖而撫萬邦責在陛下與宰相臣自視缺然不足以副委任之意乞追寢成命帝曰朕知卿忠義智略久矣其勿辭綱頓首泣謝且言唐明皇欲相姚崇崇以十事要說皆中一時之病今臣亦以十事仰干天聼陛下度其可行者賜之施行臣乃敢受命一曰議國是二曰議巡幸三曰議赦令四曰議僣逆五曰議僞命六曰議戰七曰議守八曰議本政九曰議久任十曰議脩德翌日班議於朝惟僣逆僞命二事留中録曰宋高宗之不足與有爲也夫明其爲賊敵乃可服固漢高之大略而誅韋斬關以謀匡復亦唐玄之英武也宋室之仇一時縱未可復盍不曰邦昌机上肉乎夫邦昌之罪上通於天其汙衊我斧扆腥穢我朝寧跡其惡逆犬彘且猶不堪何吝吾之一刃耶十事之中此爲最要乃上下名分所關生民綱紀所頼帝秘而不發將何待耶可以見畏懦不君之甚雖以綱之爭執亦不過止於投篡固未能聲其罪於天下也不旋踵間劉豫蹈其故轍偃然南面坐命其子以伐宋國異於誅韋滅項者矣此南宋之所以終於無震也李綱又言曰今國勢不違靖康間然而可爲者陛下英斷於上羣臣輯睦於下庶幾靖康之弊可革而中興可圖然非有規模而知先後緩急之序則不能以成功夫外禦强敵内銷賊盗修軍政變士風裕邦財寬民力改弊法省冗官誠號令以感人心信賞罰以作士氣擇帥臣以任方面選監司郡守以奉行新政俟吾所以自治者政事已脩然後可以問罪金人迎還二帝此謂規模也至於所當急而先者則在於料理河北河東蓋河北河東者國之屏蔽也料理稍就然後中原可保東南可安今河東失者恒代太原澤潞汾晋餘郡猶存河北所失者不過眞定懷衛濬四州其餘二十餘郡皆爲朝廷守兩路士民兵將所以戴宋者其心甚堅皆推豪傑以爲首領多者數萬少者亦不下萬人朝廷不因此時置司譴使以恩慰撫之分兵以援其危急臣恐糧盡力疲坐受金人之困雖懷忠義之心援兵不至危迫無告必且憤怨朝廷金人因得撫而用之皆精兵也莫若於河北置朝撫司河東置經制司擇有才略者爲之使宣諭天子恩德所以不忍棄兩河於敵國之意有能全一州復一郡者以爲節度防禦團練使如唐方鎮之制使以自守非惟絶其從敵之心又可資其禦敵之力最今日之先務也帝善其言問誰可任者綱以張所及傅亮薦焉録曰愚觀兩河之議而經制招討之建宋之興復在於目中矣以綱南人而堂堂大義出於風氣之外豈非一大機會乎曾未幾何黄潜善汪伯彦力排綱去而招撫經制司遂廢車駕益東幸而兩河郡縣相繼淪没凡綱所規畫軍民之政一切廢格金兵益盛關輔殘毁中原盗賊蜂起而國始不可爲矣宗澤上疏曰天下者太祖之天下陛下競競業業思傳之萬世奈何遽議割河之東西又議以之蒲解乎自金人再至朝廷未嘗命一將出一師但聞姧邪之臣朝進一言以告和暮入一說以乞盟終至二聖北遷宗社蒙耻臣意陛下赫然震怒大明黜陟以再造王室今即位未聞有大號令但見刑部指揮不得明播赦文於河之東西陜之蒲觧者是褫天下忠議之氣而自絶其民也臣雖駑怯當躬冒矢石爲諸將先得捐軀報國足矣帝覽其言而壯之是時開封尹闕李綱言綏復舊邦非澤不可乃以爲東京留守知開封府澤又上䟽言開封物價市肆漸同平時將士農民商旅士大夫之懷忠義者莫不願陛下亟𡚖京師以慰人心其倡爲異議者非爲陛下忠謀不過於張邦昌輩陰與金人爲地耳時眞定懷衛間敵兵甚盛方密脩戰具爲入攻之計澤乃渡河約諸將共議事宜以圖收復而於京城四壁各置使以領招集之兵造戰車千二百乘又據形勢立堅壁二十四所於城外駐兵數萬澤徃來按試之又並河鱗次爲連珠砦連結河東河北山水砦忠義民兵於是陜西京東西諸路人馬咸願得澤節制澤累表請帝還京而帝用黄潜善計决意幸東南録曰澤之二䟽大意與綱同蓋天下之勢不進則退進則不惟故疆可全而讐亦可復耻亦可雪退則不惟河北河東不可保而河南終非我有不惟河南終非我有而淮甸亦復騷然退而渡江退而航海所必至矣此澤之憂憤不至於死不已也嗚呼汪黄之罪可勝誅乎此高宗之始悮一也建炎四年冬十月詔韓世忠進次楊州世忠得命感泣曰主憂如此臣子何以生爲親提騎兵以當敵伐木爲栅自斷歸路正行間會朝廷遣魏良臣使金軍世忠給良臣云詔乃移屯守江良臣去世忠即上馬令軍中曰抵吾鞭所嚮於是移軍向大儀勒五陳設伏二十餘所良臣至金師金人問宋師動息則具以移屯對聶兒孛堇聞之大喜起兵至江口距大儀五里别將撻不野擁鐵騎過五陣東世忠傳小麾鳴皷伏兵四𧺫旗色與金人旗雜出金軍亂宋師迭進世忠令背嵬軍各持長斧上揕人胸下斫馬足敵被甲䧟泥淖世忠麾勁騎四面蹂躪人馬俱斃遂擒撻不野等二百餘人而世忠所遣董旼亦擊敗金人于天長之鵶口橋解元至高郵北門遇敵設伏水軍夾河陣一日合戰十三相距未决世忠遣成閔將騎士徃援復大戰俘獲甚多世忠復親追至淮金人驚潰相蹈藉溺死者甚衆捷聞羣臣入賀帝曰世忠忠勇朕知其必能成功沈與求曰自建炎以來將士未嘗與金人迎敵一戰今世忠連捷厥功不細論者以此舉爲中舉武功第一及帝自將禦金師次於平江府金齊之師日迫羣臣勸帝他幸以避之張俊曰避將安之惟進禦乃可免耳趙鼎曰戰而不捷去未晩也帝因曰朕爲二聖在遠屈已請和而彼復肆暴侵凌朕當親總六師臨江决戰沈與求復力賛之鼎喜曰累年退怯敵志益驕今聖斷親征將士必奮成功可必臣願效區區以謀報國及張浚視師鎮江見趙鼎執其手曰此行舉措皆合人心鼎笑曰喻子才之功也詔拜浚知樞密院事浚受命即日赴江上視師時撻懶兀术擁兵十萬約日渡江决戰浚長驅臨江召劉光世韓世忠張俊議事將士見浚勇氣十倍浚既部分諸將身留鎮江以節度之岳飛留建康見帝數論恢復之略且言金人所以立劉豫於河南蓋欲荼毒中原以中國攻中國彼得以休兵觀釁臣欲陛下假臣月日便則提兵趨京洛據河陽陜府潼關以號召五路叛將叛將既還遣王師前進彼必棄汴而走河北京畿陜右可以盡復然後分兵濬滑經略兩河如此則劉豫可擒金人可滅社稷長久之計實在此舉帝曰有臣如此顧復何憂進止之機朕不中制復召至寢閣命之曰中興之事一以委卿飛遂圖大舉録曰愚觀岳飛之言乃其效用之實初非大言以欺人也其破楊么以水㓂攻水㓂既以成功之速則今之以叛將攻叛臣寧不易爲力耶苟使如帝之言中興之事一以委之其燭計見効必不遠矣乃阻於奸檜請詣都督檜豈不知浚之忌乎而卒以忤間亦以憂沮是後復請則無及矣雖則媢嫉之可厭抑豈天敗之無成與此高宗之再悮一也時梁興會太行忠義社及兩河豪傑等帥衆歸岳飛由是金人動息山川險要飛皆得其實中原盡磁相澤潞晋汾隰衛之境皆期日興兵與官軍會其所揭旗以岳爲號父老百姓爭挽車牽牛載糗糧以饋義軍頂盆焚香迎候者充滿道路自燕以南金人號令不行兀术欲僉軍以抗飛河北無一人應者乃嘆曰自我起北方以來未有如今日之挫衂金將王鎮崔慶李覬崔虎華旺等皆率所部降飛龍虎大王之將忔查等亦密受飛旗榜自其國來降韓常亦欲以衆五萬内附飛大喜語其下曰直抵黄龍府與諸軍痛飲爾因上奏興等過河人心願歸朝廷金兵累敗兀术等皆令老少北去正中興之機而秦檜方欲畫淮以北與金爲和諷臺臣請諸將班師且知飛志銳不可回上言飛孤軍不可久留乞速召還於是飛一日奉十二金牌飛憤惋泣下東面再拜曰十年之力廢於一旦録曰愚觀高宗之世可與有爲之時三建炎之初河朔未叛人心未離李綱在内宗澤在外當是時也以守則可固以攻則可取可以光復舊物也甫其中也諸將立功帝親視師江上趙鼎張浚爲政政事先後及人才所當召用者次第奏行之故列要津多一時人望號爲小元祐及其末也金人敗郾城敗朱仙敗順昌自燕以南號令不行兀术乃嘆曰自我起兵未有如今日者飛亦大喜曰直抵黄龍府與諸君痛飲此何等氣象也奈何帝之本心不欲二帝之還恐奸大位託爲權姧之誤於是不待狡兎高鳥之盡而先爲烹狗藏弓之謀天下之大事從此去矣愚故備録諸將於前緫而論之於後以爲萬世之犬戒云岳飛立志慷慨以必取中原擒滅讐虜爲念自奉甚薄少時飲酒能至數斗帝戒之曰卿異時到河朔方可飲酒遂絶口不飲家無姬侍吴玠願與交驩乃飾名姝遺之飛曰主上宵旰豈大將安樂時耶𨚫不受玠益敬服帝欲爲營第辭曰金虜未滅何以家爲或問天下何時太平飛曰文臣不愛錢武臣不惜死天下太平矣卒有取民一縷束芻者立斬以狥夜宿民間開門願納無敢入者號凍不拆屋餓死不鹵掠卒有疾躬爲調藥諸將遠戍遣妻問勞其家死事者哭之而育其孤或以子婿其女凡有頒犒均給軍吏秋毫不私善以少擊衆欲有所舉盡召諸統制與謀謀定而後戰故有勝無敗猝遇敵不動敵人爲之語曰撼山易撼岳家軍難張俊嘗問用兵之要曰仁信智勇嚴闕一不可好賢禮士覽經史雅歌投壺恂恂如書生每辭官必曰將士效力飛何功之有其忠憤激烈議論持正不挫於人卒以此得禍蓋飛與檜勢不並存者也録曰愚觀岳武穆以爲罕見其儔何也蓋古之名將自孫吴韓彭英衛李郭而下可數也然孫乃賣友吴乃殺妻韓乃假王英乃背主儀乃窮奢他無足論近代若張魏公有富平之敗韓郡王有江上之奔張伯英心術全殊劉平叔馭軍無法惟武穆不忘周同張所是爲信友却吴玠之姝是爲遠色母有痼疾藥餌必躬是爲悅親旗賜精忠膚存報國是爲獲上大倫根於天性每事不忘忠孝是爲誠身其馭軍也五事克全百戰無敵而且於民力無秋毫之犯方之於古殆方叔吉甫之儔而未能舉宣王之功者天不祚宋無徒多怨於時君季輔也胡銓上䟽曰臣按王倫本一押邪小人市井無賴縁宰相無識舉以使虜專務詐誕欺罔天聽今者無故誘致虜使以詔諭江南爲名是欲臣妾我也是欲劉豫我也夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下爲犬戎之天下以祖宗之位爲犬戎之位陛下一屈膝則祖宗廟社之靈盡污夷狄赤子盡爲左衽朝廷宰執盡爲陪臣天下士大夫皆當裂冠毁冕變爲胡服就今虜决可和天下後世將謂陛下何如主也况醜虜變詐百出而倫又以姧邪濟之梓宫决不可還太后决不可復淵聖决不可歸中原决不可得而此膝一屈不可復伸可爲痛哭流涕長太息者矣向者陛下間關海道危如累卵尚不肯北面臣虜况今國勢稍張只如頃者敗之於襄陽敗之於淮上敗之於渦口較之前日萬萬不侔今無故而反臣之欲屈萬乘之尊下穹盧之拜此魯連所以義不帝秦非惜天下之虚名誠以天下大勢有所不可也今内而百官外而軍民萬口一辭皆欲食倫之肉臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦爲之陛下有堯舜之資檜不能致君如唐虞而欲導君爲石晋孫近傅會檜議遂得叅政几檜曰可和近亦曰可和檜曰當拜近亦曰當拜臣切謂檜與近並可斬也臣備員樞屬義不與此曹共戴天區區之心願斷三人頭竿之稿街然後羈留虜使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有蹈東海而死爾安能處小朝廷求活耶録曰此踈如嚴霜烈日乃天地之正氣百世之下時誦一翻凛然猶澹菴之在目况當其時奸邪醜虜寧不奪其氣而折其心然後知立言君子與日月同光乾坤同久其功豈小補哉却金人百萬之師增中國有人之嘆雖百挫辱之而至大至剛塞乎天地之間者不可泯滅也豈非南朝二百年一大快耶理宗隆興七年起復劉珙宣撫荆襄不拜䟽曰荆襄四肢也朝廷腹心元氣也元氣强則四肢壯朝廷施設得宜根本全盛則荆襄利害可以漸圖請先論國家大計而後及根本之實何謂大計恢復是也臣謂今日有其形而未盡其實大抵有實無形則計定事成而敵人不覺有形無實則速禍致㓂而無以待之燕昭王漢諸葛此有實無形者也夫虜之不能忘我猶我不能忘敵所以數年之間邉警不聞彼亦懲逆亮之輕舉而思萬全之議今兵未動而聲先聞實未至而形先見使虜人謀我日深備我日嚴是誨之也臣竊痛之何謂實脩己也求賢也卹民也用將也養兵也周宣王任賢使能哀矜鰥寡采芑之任將車攻之簡徒政事之大無過四者夫治平之本不在於慶賞號令之間而在於人君一身身之善惡在於一念一念之積湛然於方寸之中則見善必明是非判然於前陛下即位于今九年事有昔是而今非人有始賢而後否願舍一己之見而以天下之見爲見去一己之智而以衆人之智爲智如欲來一世之眞賢當先蒙正臣之直氣若邪佞不盡去直道不可行彼將長徃山林不得而用之矣至於士風澆薄尤可嘆息誕謾大言迎合主意大者蒙非常之眷小者亦復竊寵甚至倚托幽陰排斥異己使忠直氣阻利害罔聞此求賢之實未盡也今日雖有字民之官而不得舉字民之職財賦之所驅上司之所迫苟迯譴罰不過巧名色以科歛給文引以追呼至於勞來還定安集劬勞未見其人此卹民之實未盡也將有掊克豊己朘下媚上者逐之當矣而新所揀擢多膏粱子弟平生不經戰陣緩急恐難應敵此用將之實未盡也古之養士有推車釃酒之樂有投石超距之氣故勇於公戰聞敵則奮其主將有投醪之惠吮疽之恩愛之如子弟扞之如手足今則不然刻剥之勞役之故傾來招兵無一應募近聞馬軍移屯建康道路愁嘆語流四方生亡卒怨讟之心沮三軍勇說之氣此養兵之實未盡也如此民窮財乏兵怨將驕必有盗賊將竊發於邦域之中而欲鳴劍於伊吾之北此臣之所未諭也録曰愚觀忠肅之言乃季宋之通患中主之頽風六陵之積弊匪直以警孝宗也異時元氣不固四肢隨没大命亦旋以去矣至於金革之例徃徃師相大臣假託以奸大位戀大權自非伏義之臣神明之胄孰能七詔七辭者哉故録以終覆讐之義討賊之心外此皆浩嘆之日矣哀哉文天祥自爲童子時見學宫所祠鄉先生歐陽脩楊邦乂胡銓皆謚忠節欣然慕之曰没不俎豆其間非夫也年二十舉進士對策時理宗在位久政理浸怠天祥以法天不息爲對其言萬餘一揮而成帝㧞爲第一考官王應麟奏曰古誼若龜鑑忠肝如鐵石臣敢爲得人賀咸淳九年起爲湖南提刑見故相江萬里萬里素奇天祥志節語及國事愀然曰吾老矣世道之責其在君乎德祐初詔天下勤王天祥捧詔涕泣使陳繼周發郡中豪傑并結溪峒諸蠻有衆萬人其友止之天祥曰吾亦知其然第國家養育臣庶二百餘年一旦有急徵天下兵無一人一騎入關者吾深恨於此故不自量力而以身狥之庶天下忠臣義士將有聞風而起者義勝者謀立人衆者功濟如此則社稷猶可保也益王以觀文殿學士召至福拜右丞相衛王繼立加少保信國公厓山破天祥至京時世祖多求才南官王績翁言南人無如天祥者遂遣績翁諭㫖天祥曰國亡吾分一死矣召入諭之曰汝何願對曰天祥受宋恩爲宰相安事二姓願賜之死足矣臨刑從容曰吾事畢矣其妻歐陽氏收其屍衣帶中有賛曰孔曰成仁孟云取義惟其義盡所以仁至讀聖賢書所學何事而今而後庶幾無愧宋史筆斷曰宋亡節義之臣自文天祥而下若湖南安撫李芾池州通判趙昂發揚州都統姜才眞州太守苗再成常州統制王安節湖北提刑張起巖安吉太守趙良淳無爲守趙淮淮東制置李庭芝刺史趙孟常州太守姚訔察訪趙與睪興化守陳瓉通判張日中潮州守馬發江東制置謝枋得信州守唐震與張世傑陸秀夫陳文龍皆其章著者其餘尚多有之録曰豫章有言周孔之心使人明道學者果能明道則周孔之心深自得之三代人才得周孔之心故視死生去就如寒暑晝夜之移而忠義行之者易至漢唐以經術古文相尚而失周孔之心故經術自晁董公孫弘倡之古文自韓愈柳宗元啓之於是明道者寡故視死生去就如萬鈞九𣇄之重而忠義行之者難今觀有宋王安石决壞六經廉耻道喪而北宋之亡伏節者鮮周程張朱講明道學義理而南宋之滅死義者多明效彰然著矣然則愚之立志孳孳不息者豈眞好辯哉不得已也觀者詳之張世傑少由小校累功至黄州武定諸軍都統制時方危急徵勤王多不赴獨世傑提所部兵入衛上下嘆異自和州防禦使不數月累加至保康軍承宣使總都督府兵大軍迫臨安世傑請移三宫入海而與天祥合兵背城一戰陳宜中方遣人請和不許宋既納款世傑痛忿率所部兵去臨安次於定海元使都統卞彪說降世傑斷彪舌磔之以死自誓遂從二王入福州端宗立以爲樞密副使帝昺立復拜少傅封越國公以碙州不可居徙居新會之厓山張弘範襲厓山或謂世傑曰元兵以舟師塞海口則我不能進退盍先據海口幸而勝國之福也不勝猶可西走世傑恐有離心動則必散乃曰頻年航海何時已乎今須與决勝負乃悉焚行朝草市結大舶千餘作水砦爲死守計弘範得世傑甥韓命以官使三至招之世傑歷數古忠臣曰吾知降生且富貴但爲主死不移耳俄而颶風大作舟人欲艤向岸世傑曰無以爲也爲我取瓣香來仰天呼曰我爲趙氏亦己至矣一君亡復立一君今又亡我未死者庶幾敵兵退别立趙氏以存宗祀耳今若此豈天意耶若天不欲復存趙祀則大風覆我舟舟覆遂溺死焉陸秀夫三歲從其鄉人孟先生學獨指以爲非凡兒長登進士李庭芝鎮淮南辟至幕中擢叅議官時邉事急諸多亡者惟秀夫不去庭芝上其名除司農丞累擢至宗正少卿元入宋二王走温州秀夫追從之使人召陳宜中張世傑等遂相與立益王宜中以秀夫久在兵間知軍務每事咨訪始行秀夫悉心賛之無不曲盡時君臣播越庶事踈畧每朝會儼然正笏如治朝儀或時在行中淒然泣下以朝衣拭淚盡浥左右無不悲動端宗崩群臣皆欲散去秀夫曰度宗一子尚在將焉置之古人有以一旅一成中興者今百有司皆具士卒數萬天若未欲絶宋豈不可以爲國耶乃與衆復立衛王以秀夫爲左丞相秉政時世傑駐兵厓山秀夫外籌軍旅内調工役凡所興作盡出其手雖勿遽流離中猶日書大學章句以勸講不輟厓山破秀夫走衛王舟王舟大且諸舟環結度不得出走乃仗劒驅妻子入海遂以身負王赴海死録曰愚觀世傑之自溺與秀夫之負帝俱溺未嘗不浩然而嘆也嗟乎乘桴之嘆傷時之悲也而今果見其人乎哉時全蜀破壞刑襄失守四海無措躬之地獨仗區區二三君子懷忠負義不至於此不已也卒斃而得其正其亦異乎汨羅鴟革者歟陳文龍俊卿後也能文章負氣節咸淳五年廷對第一由鎮束軍節度判官拜監察御史襄陽被圍似道日恣淫樂陽請督師而陰使留己竟失襄陽文龍上䟽極諫時王爚與陳宜中不能畫一策而日坐朝堂爭私意文龍復䟽書言三后恊心同底於道北兵今日取某城築某堡而我以文相遜以迹相疑譬猶拯溺捄焚而爲安步徐行之儀也請召大臣同心圖治無滋虚議其後二人終不相能而去至十月始來事已不可爲矣是冬累遷至叅知政事益王立爲閩廣宣撫使已而降將王世强復導大軍入廣建寧泉福皆降知福州王剛中遣使狥興化文龍斬之賫書責世强剛中負國遂發民兵自守城中兵不滿千大兵來攻使其姻家持書招降之文龍焚書斬其使曰諸君特畏死且未知此生能不死乎乃使其將林華偵伺境上華即迎降且導兵至城下通判曹澄孫開門納欵執文龍至軍中欲降之不屈指其腹曰此皆節義文章也可相逼耶乃械送杭州文龍去興化即不食餓至杭而死録曰天祥文龍皆廷對第一者也豈其節義之獨聞歟是時執政者有生之樂無死之心幸而一二君子乃心許國文章氣節表率一世當是時也内則有死之心外亦無生之樂此其所以殺身成仁而不悔也矧夫少成天性壯學自然故一則自少時志於俎豆未至者非夫一則笑諸君畏而欲生未知生能不死二者同是一道則同是一命矣弘道録卷之十六
