  text: 弘道録经三
  hash: sha256:e5b9d6af369cc26449f180a2503fd3ce7b991344f18b1661ad605243cc7fd475
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_003-001a, image: hfl/1067/1067-082.png}
body:
  text: 仁君臣之仁唐書食貨志曰唐之始時授人以口分世業田而取之以租庸調之法其用之也有節盖其畜兵以府衛之制故兵雖多而無所損設官有常員之數故官不濫而易禄雖不及三代之盛時然亦可以爲經常之法也録曰唐之太宗未可班於古之帝王也而録之以賢者不能無遺憾也董仲舒常建議曰秦用商鞅之法除井田民得買賣富者田連阡陌貧者無立錐之地小民安得不困苦井田之法雖難卒行宜少近古限民名田以贍不足塞并兼之路時武帝方興功利竟不能用哀帝時師丹復言累世承平豪富吏民訾數鉅萬而貧弱愈困宜畧爲限時貴近未便亦不行也乃俾王莽假王田之名增亂長禍則何益哉普武平吴之後雖有占田七十畆之制未幾五胡之亂至魏孝文始納李安世之言行均田之法齊周隋因之嗚呼敦憶大漢四百餘年之間大賢建議屢言而不足而區區六朝之際李安世一言而有餘逮扵有唐毅然行之愚安能已扵躍然之喜耶唐制度田以步其闊一步其長二百四十步爲畆百畆爲頃凡民始生爲黄四歲爲小下六爲中一十一爲丁六十爲老授田之制丁及男年十八以上者人一頃其八十畆爲口分二十畆爲永業老及篤疾廢疾者人四十畆寡妻妾三十畆當户者增二十畆皆以二十畆爲永業其餘爲口分永業之田樹榆棗桑及所宜之木皆有數田多可以足其人者爲寬鄉少者爲狹鄉狹鄉授田减寬鄉之半其地有薄厚歲一易者倍授之寬鄉三易者不倍授工商者寬鄉减半狹鄉不給凡庶人徙鄉及貧無以葬者得賣世業田自狹鄉而徙寬鄉者得并賣口分田已賣者不復授死者收之以授無田者凡收授皆以歲十月授田先貧及有課役者凡鄉田有以給比鄉縣有餘以給比縣州有餘以給近州録曰此唐授田之法也蓋自五胡雲擾之後民之耕農者無幾後魏因之各以露田授民露田者荒田無主不栽樹者也諸桑田不在所授之限桑田者民之永業所常治者也唐世因之遂有世業口分之分意者其初亦非公收在官而授無田之民祗因桑田不在所授之限者而名爲世業因露田原授扵民者而限爲口分不然若世業既官爲樹以桑棗所宜之木何以仍得買賣口分既随其老幼之差殊口力之衆寡鄉田之寬狹而官爲收授之然則但令食其所出不令擅其所有何以又得並賣之乎古之立法最禁徙鬻王制曰井里不鬻孟子曰死徒無出鄉今令庶人各地遷移自狹鄉徒寬鄉又得並賣其口分田惟死者收之以授無田者如此則民安得不徒之又安得不亡之又安得所收之田而以授人乎此皆施行矛盾不知作史者之悮耶抑爲政之悮耶夫自秦而下千四百有餘年之間而能行授田之法者自唐伊始固足以見其難矣而其制不能無可疑至永徽以後始禁民不得買賣買者還地而罰之抑後矣無惑乎魚并之如故也凡授田者丁歲輸䌚二斛稻三斛謂之租丁随鄉所出歲輸絹二匹綾絁二丈布加五之一綿三兩麻三斤非蠶鄉則輸銀十四兩謂之調用人之力歲二十日閏加二日不役者日爲絹三尺謂之庸有事而加役二十五日者免調三十日者租調皆免通正役不過五十日録曰此唐徵科之數也所以謂租庸調者以人丁爲本而調之云者猶其曰調停之調盖以土産各有所宜如絹綾絁隨宜賦其一丈非謂各二丈爲六丈也布麻亦然今志歲輸絹二疋綾䊶各二丈布加五之一綿三兩麻三斤非桑鄉則輸銀十四兩疑此反重扵常筭矣觀者要當以通典及會要所載爲正會要丁隨鄉所出歲輸絹綾綾各二丈布加五之一綿二兩輸市者麻三斤以爲調自王公以下皆有永業田太皇太后皇太后皇后緦麻以上親内命婦一品以上親郡王及五品以上祖父兄弟職事勳官三品以上有封者若縣男父子國子太學四門學生愽士孝子順孫義夫節婦同籍者皆免稅課役凡主户内有課口者爲課户若老及男廢疾篤疾寡妻妾部曲客女奴婢及視九品以上官不課凡里有手實歲終具民之年與地闊爲鄉帳鄉成扵縣縣成扵州州成扵户部又有計帳具來歲課役以報度支國有所須先奏而歛之數書于縣門村坊與衆知之水旱霜蝗耗十四者免其租桑麻盡者免其調田耗十之六者免租調耗亡者諸役皆免録曰此唐蠲復之政也自王公以至扵庶人皆有品節限量使其子孫能世守之何以不能久致太平乎奈何不旋踵而失之也故愚嘗謂漢子孫能守三十稅一之法而其祖宗不能創什一中正之規唐祖宗能設科條禁令之目而其子孫不能存節用愛民之心均之無能及扵三代也太宗方銳意扵治官吏考課以鰥寡少者進考如增户法失勸道者以减户論配録曰此唐殿最之法也使京官五品以上各舉守令一人是重之扵始也考課以鰥寡少者進失勸導者退是重之扵終也究其着實舉行莫者諸州刺史奈何自貞觀以來重内官而輕州縣刺史多用武臣或京官不稱職始補外任帝雖銳意扵治其能身率天下乎此唐之良吏所以不若漢世之多也租以歛獲早晩險易遠近爲差用調輸以八月發以九月同時輸者先遠民皆自槩量州府歲市土所出爲貢其價視絹之上下無過五十疋異物滋味狗馬鷹犬非有詔不獻有加配則以代租賦録曰此唐轉輸之政也至兩稅而後夏輸六月秋輸十一月此政廢矣是時太宗方銳意扵民絶嗜禁慾黜所玩好且未舉封禪征伐之事故州府歲市所貢視絹之上下無過五十疋有加配則以代租賦此何等氣象也貞觀以後漸不如矣其凶荒則有社倉賑給不足則徒民就食諸州尚書左丞戴胄建議自王公以下計墾田秋熟所在爲義倉歲凶以給民太宗善之乃詔畆稅二升粟麥秔稻隨土地所宜寬鄉歛以所種狹鄉㩀青苗薄而督之田耗十四者免其半耗十七者皆免之商賈無田者以其户爲九等出粟自五石至扵五斗爲差下下户及夷獠不取焉歲不登則以賑民或貨爲種子則至秋而償其後洛相幽徐齊并秦蒲州又置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年皆著于令録曰此唐救荒之政也太宗方重守令之選刺史縣令皆得其人故以社倉則足以賑以義倉則足以給以常平倉則足以儲無守令之賢欲自王公以下計墾田而歛之則增一禁厲矣此又爲上者所當知也貞觀初户不及三百萬絹一疋易米一斗至四年米斗四五錢外户不閉者歲月馬牛被野人行數千里不賫粮民物蕃息四夷降附者百二十萬人是歲天下斷獄死罪者二十九人號稱太平上之即位也常與群臣語及教化曰今承大亂之後恐斯民未易化也魏徵對曰不然久安之民驕佚驕佚則難教經亂之民愁苦愁苦則易化譬猶飢者易爲食渴者易爲飲也上深然之封德彜不以爲然上卒從徵言是歲天下大稔流散者咸歸鄉里斗米不過三四錢東至于海南至五嶺皆外户不閉行旅不賫粮取給于道路焉帝謂君臣曰此魏徵勸我行仁義既效矣惜不令封德彜見之録曰易之大過曰揀撓利有攸徃亨九二曰枯楊生梯老夫得其女妻無不利夫太宗眞有大過人之資而鮮天德王道以爲之本棟之撓也楊之枯也幸而貞觀之治又得房杜王魏諸賢以爲之輔老夫得其女妻也故雖有楝撓枯楊之象而亦有亨道焉有利道焉君子故不之拒也宋紀仁宗體天法道極功全德神文聖武睿哲明孝皇帝天性仁孝寬裕喜愠不形扵色初封壽春郡王講學于資善堂天禧元年兼中書令明年進封昇王九月丁卯册爲皇太子録曰自史册以來數千百年未有直謚爲仁者帝可謂僅見矣故以徽號存其大畧將以爲君人者致意焉夫蒙以養正聖功也方是時帝之至性渾然正人皆可以爲堯舜之時開資善堂以講學養之扵正不以私冒干之乃作聖之功用而宋朝家法過漢唐者也以參知政事李迪爲太子賔客遵堯録曰李迪等常侍燕東宫見帝容止端莊雖優戲在前亦不甚顧他日因奏事言之眞宗曰平時居内中亦未嘗妄言笑也録曰迪之風烈頗聞而辭太傅不已過乎夫公孤以輔佐天子師保以儲養東宫亘古以來之成法初不因太宗之時立而有不立而無也自宋專任宰相天子無公孤以詔左右則太子無師保以相前後矣此其立法不如成周者也四年詔太傅監國五日一開資善堂太子秉笏南面立輔臣叅决諸司事聴其議論謂之曰但盡公道則善矣録曰帝之扵己也不妄言笑扵人也務盡公道此何等粹白也蒙之九五曰童蒙吉其斯帝之謂乎乾興元年二月戊午遺詔太子即皇帝位録曰是時帝年十三如龍之方蛻未就雲雨也如麟之方趾未就踐履也故易曰山下出泉蒙君子以果行育德豈非以其施之未達性之未固哉苟有如伊尹周公以輔之扵外太姒邑姜以成之扵内則太甲成王尚有慙德不足媲矣惜乎劉后專制于内丁謂之徒交結于外苟不得王曾正色立朝倚以爲重烏能成九二志應之功哉觀聖人作易之意則知仁宗初政之所以分矣明道元年詔曰朕猥以眇躬纂扵洪緒既絶畋遊之好又無臺榭之營十載于兹未嘗暇敢不意掖庭之内火禁非嚴一夕延燔徧於八殿緬思降儆逸怠省循其今内外臣僚直言朝廷闕失毋有所隱副朕意焉録曰帝時春秋𣇄盛未有失德而所稱絶遊畋之好乏臺榭之營又非空言則天灾何由致乎夫掖庭房闥之地八殿老陰之數章獻之稱制將謝矣此其除舊布新之先見者歟一年三月帝始親政罷脩創寺觀裁抑僥倖召宋綬范仲淹而黜内侍羅崇勳等中外大悅録曰仁之親政與哲之親政大不倖也仁之親政罷脩寺觀哲之親政創脩新法仁之親政裁抑僥倖哲之親政召用凶邪故一則中外大悅一則忠良䘮氣得失之分較然見矣先是皇太后劉氏稱制晚年任宦者羅崇勳江德明等訪外事崇勳由此勢傾中外録曰以母后臨朝而宦官竊勢此何等時也范祖禹所謂宋室隆替之本社稷安危之機生民休戚之端君子小人進退消長之際天命人心去就離合之時帝之盛德可少訾哉鳴呼一黜羅崇勳而中外拭目咸瞻盛德一召劉瑗等而人情汹汹已蹈覆亡萬世之下初政之君不可以不察也帝見章聖東封西祀及脩玉清昭應景靈土木之役極天下之巧過爲奢侈謂輔臣曰此雖太平盛事然亦過度當時執政大臣不得不任其責吕夷簡曰府庫一空至今不充實者職此之由帝曰如此之事朕當戒之録曰此帝之所以罷脩建也孔子曰三年無改扵父之道釋之者曰三年無改亦謂在扵當改而可以未改者耳先儒恐其失㫖而以有過之舉既徃之愆爲咎故剖折而言夫東封西祀土木興作不過廢天下之財若乃青苗免役剖尅歛怨將以失天下之心諉扵安石猶可言也篤扵君親不可言也其知者以爲繼還不知者以爲擅改然不知衹皆彰親之過而與克盖前愆者大不侔矣嗚呼此宣仁祀飯之頃異扵章獻撤簾之日也歟初太平日久仕進者皆依托權要以希進用奔競成風仁宗嘗謂輔臣曰比來臣寮請對其欲進者多求退者少何也王曾曰七人食兼繫時之用舍惟朝廷抑奔競崇靜退則庶幾有難進之風帝然之録曰此帝之所以抑僥倖也夫僥倖之人行險者也其始也依阿取容讒謟面諛無所不爲其終也吮癰舐痔逢君之惡同所不至故人君必深惡而痛絶之然非至公以存心至明以燭物未有不以小廉信其大節而假以欲退之意遂其躁進之心故曰清心知人又曰知人則哲闕一不可景祐二年王曾同平章事曾性資端厚在朝廷進止皆有常䖏平居寡言笑人不敢干以私進退十人莫有知者范仲淹常問曰明揚士類宰相之任公之盛德獨少此耳徐應之曰夫執政而欲使恩歸己怨將誰歸仲淹服其言帝之初即位也太后將有專制之患曾正色危言以立于朝由是宦官近習不敢窺覦而帝德日就太后亦全令名録曰自此以後可以見當時君臣之氣象矣夫曾褒然稱許爲大臣者也則其扵士不猶造化之扵物乎其心必欲人人而盡其才然亦有或不能盡者惟反之至公至誠在我無愧而已若孜孜以效用爲恩舍置爲怨則大臣者日益不足哉故曰斷斷兮無他技若吕許公未免有慊扵此此其收恩避怨與危言正色之所以不同也慶曆元年冬十一月有事扵南郊大赦自西方用師帝爲肝食知諫院張方平言曰陛下猶天地父母也豈與大豕豺狼較乎願因郊赦引咎示信開其自新之路帝喜曰是吾心也命方平以䟽付中書吕夷簡讀之拱手曰公言及此社稷之福也録曰蒙正亟稱夷簡有宰相之材其此之謂乎夫仁者必有勇此西事之當競也然而君子不之競者豈徒廣人自新之路哉出則無敵國外患國恒亡其諸引咎示信之微意歟時章得象晏殊賈昌朝韓琦范仲淹富弼杜衍同時執政歐陽脩余靖王素蔡襄並爲諫官夏竦既罷石介喜曰此盛德事也歌頌吾職其可已乎作慶曆聖德詩曰扵惟慶曆三年三月皇帝龍興徐出門闥大聲渢渢震摇六合如乾之動如雷之發初聞皇帝蹙然言曰子祖予父付予大業子恐失墜實賴輔弼汝得象殊重愼㣲密君相予久予嘉君伐昌朝儒者學問該洽與予論政傳以經術惟汝仲淹汝誠予察爲予司諫正予門闑爲予京兆堲予纔說賊叛予夏徃予式遏六月酷日大冬積雪汝寒汝暑汝不告乏予晚得弼予心弼悅以道輔予弼言深切予不堯舜弼自笞罰諫官一年踈奏滿篋契丹忘義敢侮大國弼將予命不畏不怯沙磧萬里死生一節視弼之膚霜剥風裂觀弼之心鍊金鍜鐵惟仲淹弼一夔一契曰衍汝來汝予黄髮事予二紀毛秃齒豁心如一兮率履弗越遂長樞府兵政無蹶予不識琦琦有奇骨其噐魁落其人渾樸可屬大事敦厚如鼓以汝副衍知人予哲惟脩惟靖立朝䡾䡾言論磥砢忠誠特達萬里歸來剛氣不折素相之後含忠履潔昔爲御史幾叩予榻襄雖小官名聞予徹亦嘗獻言箴予之失剛守粹慤與脩儔疋皇帝聖明忠邪辨别舉擢俊良掃除妖魅衆賢之進如茅斯㧞大姦之去如距斯脫録曰當時有傳慶曆盛德詩扵蜀中者其人欲識之雖然豈惟當時今人誰不欲識之哉執政諫官國之元氣朝之命脉也帝有包荒之德而諸賢又能奮其剛斷之勇此正泰之天地交而萬物通上下交而其志同者宜乎衆賢之進如茅斯㧞大姦之去如距斯脫矣然所謂朋亡者何也夫君子之同道美矣小人豈能忘情既已交章論罷而又形之詩章亦已甚矣故有石介之頌而必有女奴之書有如茅之作而必有似葉之嘆此介禍之所由始亦黨論之所由興也聖人之垂戒深哉五月戊子兩輔臣稱賀帝曰天久不雨將害民田朕每焚香上禱扵天昨夕寢殿中忽聞㣲雷遽起冠帶露立殿下須臾雨至衣皆沾濕移刻兩霽再拜以謝方敢升階自此尚冀稿苗可救也比欲下詔罪己徹樂减膳又恐近扵崇餙虚文不若夙夜精心密禱爲佳爾録曰夫祈禱古人之所不廢至有以身代犠牲者以蝗吞口中者何以槩乎未之録也曰此崇飾虚文之謂也古者一德格天而後有六事自責苟無其實而下詔罪己徹樂减膳則亦徒然而已此帝所以不若精心密禱之爲佳也范仲淹參知政事帝方銳意太平數問當世事又爲之開天章閤引輔臣入對給以筆禮俾條陳其所欲爲者仲淹惶恐退而上十事曰明黜陟抑僥倖精貢舉擇長官均公田厚農桑脩武備推恩信重命令减徭役天子方信向仲淹悉用之録曰文正之立心以老成忠厚爲主先憂後樂爲事此其人品之高如青天白日不可掩也仁宗之銳意以得賢安民爲寳禎祥朕兆爲末此其治化之盛如日升月恒不可量也夫漢文一問天下錢穀决獄幾何平勃不能答而遂已而况開天章閤以延之入給筆劄以誘之言乎如此而不皇恐者鮮矣然而不如古者臯陶曰允迪厥德謨明弼諧帝之延問有餘而言蹈不足是以謨雖訏而命未定意雖銳而功未成比後世之恒患而堯舜終不可及也時二府合班奏事韓琦爲樞密副使雖事屬中書亦必盡言或指其過失同列不悅帝獨識之曰韓琦性直琦條所宜先行者七事曰清政本念邊計擢材賢備河北固河東收民心營洛邑繼又陳救弊八事曰選將帥明按察豊財利遏僥倖進能吏退不才謹入官去宄食帝嘉納之又陳四策以爲今當以和好爲權宜戰守爲實務請繕甲厲兵營修洛都蜜定討伐之計録曰傳稱惟仁者能受盡言琦不遇帝安能獨識之哉是故治平之末琦嘗盡言矣神宗漫然不應熙寧之初亦嘗盡言矣非惟終以爲疑至條折其不然刋石訟之天下嗚呼同是一琦也前無侵官賣直之名後有彰播流傳之責豈其陳力之不同哉受與不受之間而已矣故觀神宗之過可以知仁宗之仁也皇祐二年夏六月詔州郡自今勿得獻瑞物知無爲軍茹孝標獻芝草三百五十本帝曰朕以豐年爲瑞賢臣爲寳至於草木蟲魚之異保足尚哉免孝標罪戒天下勿獻録曰漢文帝宋仁宗未可以優劣也何以進坦平免孝標之不同也孔子謂善人雖不必踐舊迹而自不爲惡然皆未能入聖人之室者是故漢文帝却之却之留扵他岐然而不爲也非不能也宋仁宗思之思之殆于不勉然而不能也非不爲也此君之所以分也三司使王拱辰請榷河北鹽既立法矣猶未下翰林學士張方平言扵帝曰河北再榷𥂭何也帝驚曰始立法非再也方平曰周世宗榷河北𥂁犯輙䖏死世宗北伐父老遮道泣訴願以𥂁課均之兩稅鹽錢是也豈非再榷乎帝大悟曰卿語宰相立罷之方平曰詔雖未下民已知之當直以手詔罷不可自有司出也帝大喜命方平密撰手詔罷之河朔父老相率拜逆於澶州爲佛老會者七日以報上恩且刻詔書北京過其下者稽首流涕録曰仁宗之世所以事必可稱者以德意存乎其間也故一聞人之議始而驚中而悟終乃立罷而後已焉視彼說而不繹從不改者相去何天淵乎此其德足以感動人心而報之者無所不用其極也王拱辰言扵上曰富弼亦何功之有但能添金帛之數厚夷狄而弊中國爾仁宗曰不然朕所愛者土宇人民財非所惜也拱辰曰財非出扵民邪仁宗曰國家經費取之非一日之積歲出以賜夷狄亦未至困民若兵興調發歲出不貲非若今之緩取也拱辰曰犬戎無厭好窺中國之隙且陛下只有一女萬一欲求和親則如何仁宗憫然色動曰苟利社稷朕亦何愛一女邪拱辰言塞遽曰臣不知陛下屈己愛民如此堯舜之主也灑泣再拜而去録曰愚觀王拱辰之言即欽若孤注之說也非惟漫潤之不行且雖屈己而無憾帝至是眞如天之無不覆也地之無不載也以爲堯舜之主誠哉是言矣文彦博富弼同平章事帝嘗問置相扵王素素曰惟宦官宫妾不知姓名者可克其選帝曰如是則富弼爾至是與彦愽同召至郊詔百官迎之范鎮曰隆之以虚禮不若推之以至誠陛下用兩人爲相舉朝皆謂得人然近制兩制不得詣宰相居弟百官不得聞見是不推之以誠也願罷郊迎而除謁禁則扵御臣之術爲兩得矣及宣制士大夫相慶扵朝帝遣小黄門覘知之語翰林學士歐陽脩曰古之命相或得諸夢卜今朕用相人情如此豈不賢扵夢卜哉録曰本朝置相豈盡殉扵宦官宫妾哉然而仁宗之世紛紛皆君子而李迪王曾范仲淹文彦愽富弼韓琦尤所著聞推原其故正以公天下之情而非出于一己之私也豈惟賢扵夢卜實可傳扵後世故録漢文之仁者存其言録宋帝之仁者存其相嗚呼相道得而萬國理矣初河北京東大水民流就食青州富弼勸所部民出粟益以官廪得公私廬舍十餘萬嘔散䖏其人以便薪水官吏自前資待缺寄居者皆賦以禄使即民所聚選老弱病瘠者廪之仍書其勞約他日爲奏請受賞每五日趣遣人持酒肉飯𩝠慰藉出扵至誠人人爲盡力山林川澤之利可資以生者聴民擅取及麥大熟民各以遠近受粮而歸凡活五千餘萬人募爲兵者萬計前此救灾者皆聚民城郭中爲粥食之蒸爲疾疫及相蹈藉或待哺數日不得粥而仆名爲救之而實殺之自弼立法簡便周盡天下傳以爲式帝聞遣使褒勞加禮部侍郞又益利路飢韓琦爲體量安撫使蠲减稅以募人入粟招募壯者刺以爲厢禁軍一人充軍數口之家得以全活檄劎門關民流移而欲東者勿禁簡州艱食爲甚明道中以灾傷嘗勸誘納粟後糶錢十六萬餘歸扵常平琦曰是錢乃賑濟之餘非官緡也發庫盡以給四等以下户逐貪殘不職吏能冗役七百六十人爲饘粥活飢人一百九十餘萬復知楊州徒定州兼安撫使賑活飢民數百萬璽書褒激粼道視以爲準録曰以帝之憂民而弼與琦盡心荒政譬則萬華之國而值製錦者體裁之工也良玉之肆而遇善冶者追琢之美也天非不欲常煦也流行之度難保其無寒恃吾有以禦之則恒温矣民非不欲常飽也適逢之數未必其無飢賴吾有以䖏之則無患矣雖然弼所活五千餘萬人而琦所活亦數百萬苟非眞心實意視民之溺猶己溺之視民之飢猶己飢之至誠感動扵上下公私之間焉能人人盡如己哉嗚呼法可傳而心不可傳能盡心扵無我則能盡心扵二公之政矣嘉祐八年春三月辛未帝崩遺制下日雖深山窮谷莫不奔走悲號而不能止録曰中庸曰故大德必德其位必德其禄必得其名必德其壽帝眞難得者矣盖位人可得也必若幼冲踐祚𣇄盛當乾以至扵四十二年之久此不可必也禄人可得也必若泮涣爾游優爾游休以至扵歌舞太平之盛此不可必也名人可得也必若君子道長小人道消以至扵康定慶曆之際此不可必也壽人可得也必若深山窮谷如喪考妣以至扵奔走悲號之極此不可必也斯帝之所以爲仁宗也史臣賛曰仁宗恭儉仁恕出扵天性一遇水旱或密禱禁廷或跣立殿下有司請以玉清舊地爲御苑帝曰吾奉先帝苑囿猶以爲廣何以是爲燕私常服澣濯惟帟衾裯多用繪絁宫中夜飢思膳燒羊戒勿宣索恐膳夫自此𢦤賊物命以備不時之須大辟疑者皆令上讞歲嘗活千餘人吏部選人一坐失入死罪皆終身不遷每諭輔曰朕未嘗人以死况敢濫用辟乎至扵夏人犯邉禦之出境契丹渝盟增以歲幣在位四十二年之間吏治若媮惰而任事蔑殘刻之人刑法似縱馳而决獄多平允之士國未嘗無嬖倖而不足以以累治世之體朝未嘗無小人而不足以勝善類之氣君臣上下惻怛之心忠厚之政有以培壅宋三百餘年之基子孫一矯其所爲馴致扵亂傳曰爲人君止于仁帝誠無愧焉新安胡氏曰當仁宗時或有獻蛤蜊二十八枚枚千錢帝曰一下筋費千錢吾不堪也北使言高麗職貢竦欲加兵帝曰此只王子罪今加兵且屠戮百姓卒寑兵京師疫出通天犀療治或請留供服御曰朕豈貴異物而賤百姓哉蘇轍對策言過直或請黜之曰求直言而以直棄之天下謂何又好學崇儒扶值斯道尤爲盛矣經筵謂侍臣曰朕盛暑未嘗少倦但恐卿等勞耳噫若帝者存心致治粹乎無以議矣録曰或問曰帝誠無愧扵爲君矣然扵古之帝王可以匹休乎曰未也獨不觀孔子之告哀公乎曰果能此道矣雖愚必明雖柔必强帝之天資粹矣而郭后之慙德實聖學之不純雖以諸賢在朝無能改扵其德則以仁柔有餘剛斷不足未免趙宋之主而已故曰惟精惟一又曰惟幾惟康此從古辟王之要法五倫書仁宗昭皇帝天禀純明孝友之行出扵天性在儲位二十年深明人君之道暨嗣位勵精圖治推誠任人每曰爲人君止扵仁耳故弘施霈澤悉罷科買己逋責詢民隱急農事褒舊勞舉墜典屢𩛙法司崇寬厚戒深刻惟日以恤人爲務録曰自宋至今又五百餘年之間直謚仁宗者一再見焉鴻名懿號由百世之後孝子神孫視之豈不美哉皇明名臣言行録孝宗敬皇帝登大寳一十八載每存心扵天下嘗召問尚書劉大夏曰天下何時太平朕幾時做得如古之帝王大夏曰求治不宜太急但凡用人行政有疑者即召内閣并執政大臣面議停當行去自然順理便是太平都御史戴珊懇辭老病今諭㫖曰說與戴珊朕以天下事推誠付托猶家人父子也太平未兆何忍捨朕而先歸乎録曰周詩曰昊天有成命二后受之成王不敢康夙夜基命宥密嗚緝熙單厥心肆其靖之斯言若爲我孝皇頌也明興百五十餘年天之成命列聖既受之矣孝皇繼之實能不敢康寧至扵基命宥密緝熙單心尤爲親切盖孝皇之德深沉而不露淵靜而有本夙夜積累以承籍天命而身望太平是眞能繼續光明二祖四宗之鴻業而盡其心故至今天下安靖而保億萬年之休也使天假之以年何古之帝王不可及哉時户部郞中李夢陽嘗建言以指斥政事之非孝皇怒下之獄比具詞以讞有㫖令復職他日劉大夏奏事畢上曰近日外事若何大夏頓首曰近有㫖釋李夢陽中外懽呼聖德如天地之大上曰李夢陽語言狂妄朕不得已而下之獄鎮撫司本上朕試問左右作何批行一人曰此人狂妄宜付錦衣衛撻以釋之朕揣知此輩意欲得㫖下便令重責致其死以快宫中之怒使朕受殺直臣之名左右不忠如此朕所以即釋復職更不令法司擬罪也大夏復頓首曰陛下行此一事堯舜之仁也嘗因遼東都指揮張天祥襲殺虜㓂爲功大理少卿吴一貫當其罪死會天祥斃于獄孝皇大怒親鞠于廷欲置一貫重辟時刑部尚書閔珪與都御史戴珊進曰一貫推案不實罪當徒既忤㫖猶力諍曰法如是足也遂問劉大夏曰且道自古何君何大臣亦嘗如此對曰臣幼讀孟子見云舜爲天子臯陶爲士瞽䏂殺人惟執之而已今之法司恐亦如是上頷之明日㫖下一貫罪止免官又一日召劉大夏論時政且及當時人才孝皇曰如山西副使王鴻儒他日可大用對曰誠如聖諭後大夏以告鄉人胥員外文相曰朝廷用此等人方擔當得大事予老不及見子其識之録曰凡比皆我孝皇誠心密意迥出近代帝王萬萬者恨㣲臣跼蹐海隅無由愽觀國史盡天高地厚之仁而區區見于諸臣言行録者如此故並録以終焉弘道録終
