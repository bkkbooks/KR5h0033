body:
  text: 智夫婦之智家語叔梁紇娶於魯之施氏生女九人無男其妾生孟皮病足叔梁紇曰雖有九女而無適是無子也乃求婚於顔氏顔氏有三女小曰徴在顏父問三女曰陬大夫雖父祖為卿士然先聖之裔也今其人身長九尺武力絶倫吾甚貪之雖年長性嚴不足為疑三子孰能為之妻二女莫對徴在進曰從父所制將何問焉父曰即爾能矣遂以妻之録曰司馬遷是非頗謬於聖人豈惟繆哉其誕也甚矣夫論語而後家語亦可徵矣何為狎侮若是哉徵在之賢聖自任上古未之聞也乃謂之野合而生至云疑其父墓處母諱之豈其然哉豈其然哉或曰遷之時家語未嘗出然則鄭氏通志家語出矣雖知司馬遷之失而未能及徵在之事則猶夫故也録之論語子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之録曰愚觀孔門女女何惓惓於縲絏刑戮乎蓋婦道從人者也其吉凶榮辱終身以之所仰望於良人至切也故惟願執手階老而深懼中道有乖雖聖人不得不為之動慮也以是為訓魯猶有殺妻求將者有戲婦受金者敦謂二子之事不可為後世之法哉列女傳魯大夫柳下惠之妻也惠處魯三黜而不去憂民救亂妻曰無乃瀆乎君子有二耻國無道而貴耻也國有道而賤耻也今當亂世三黜而不去何與惠曰滔滔之民將陷於害吾安能已乎且彼為彼我為我雖祖禓裸程安能汙我故油油然與之處惠既死門人將誄之妻曰二三子不如妾知之也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從俗不強察兮蒙耻救民德彌大兮雖遇能黜終不蔽兮豈弟君子永能厲兮諡宜為惠門人從之莫能竄一字魯黔婁先生之妻也先生死曾子與門人往弔之其妻出户曾子上堂見先生之尸在牖下枕塹席橐緼袍不表覆以布被手足不盡斂覆頭則足見覆足則頭見曾子曰斜引其被則斂矣妻曰斜而有餘不如正而不足也先生以不斜之故能至於此生時不邪死而邪之非先生意也曾子不能應遂哭之曰嗟乎先生之終也何以為諡其妻曰以康為諡曾子曰先生在時食不克口衣不蓋形死則手足不斂旁無酒肉生不得其義死不得其榮何樂於此而諡為康乎其妻曰昔魯君嘗欲授先生政以為相國辭而不為是有餘貴也君賞賜之粟三十鍾先生辭而不受是有餘富也彼先生者甘天下之淡味安天下之卑位不戚威於貧賤不欣欣於富貴求仁而得仁求義而得義其諡曰康不亦宜乎曾子曰唯斯人也而有斯婦録曰愚觀刑於之化不獨文王已然大夫之家亦然也柳下之諡雖門人莫能移黔婁之樂雖曾子有未達彼博學大儒曾不如匹夫匹婦之見乎其所觀感者深矣智乎哉二婦乎其令德求教者乎雖有富貴不足多也陶大夫答子妻也答子治陶三年名譽不興家富三陪其妻敬諫不用居五年從車百乘歸休宗人擊牛而賀之其妻獨抱兒而泣姑怒曰何其不祥也婦曰夫子能薄而官大是為嬰害無功而家昌是謂積殃共楚令尹子文之治國也家貧國富君敬民戴故福結於子孫名垂於後世今夫子貪富務大不顧後害妾聞南山有玄豹霧雨七日而不下食欲以澤其毛而成文章也故藏而逺害大彘不擇食以肥其身坐而須死耳今夫子治陶家富國貧軍不敬民不戴敗亡之徴見矣願與少子俱脫姑怒遂棄之處期年答子之家果以盜誅唯其母老以免婦乃與少子歸養姑卒終天年録曰愚觀答子之妻其有道者乎夫唯聖人而後能知盜非聖人則雖有天下國家之責者尚不能知而况於匹夫匹婦乎夫盜非必人伐之也夫人而自伐也今天下能薄而官大無功而家富者幾何人哉竊恐齊人猶尚羞之何况答子乎故君子不可以不之戒也樂羊子之妻者羊子逺尋師學一年來歸妻跪問其故羊子曰久行懷思無他異也妻乃引刀趨機而言曰此織生自𧖟繭成於機杼一絲而纍以至於寸纍寸不已遂成丈匹今若斷斯織也則損失成功稽廢時月夫子積學當日知其所亡以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返録曰樂羊子之學不見經傳若以為聖賢之學必造誠篤之地若以為世俗之學必成精確之風古人孳孳不息其勤勵有如此然則今人玩棄日月自甘面墻者真匹婦之不若歟左傳楚屈瑕伐羅鬬伯比送之曰莫敖必敗舉敗高心不固矣遂見楚子曰必濟師楚子辭焉入告夫子鄧曼鄧曼曰大夫其非衆之謂其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎夫固謂君訓衆而好鎮撫之召諸司而勸之以令莫敖不然夫豈不知楚師之盡行也楚子使賴人追之不及莫敖徇于楚曰諫者有刑及塢亂次以濟遂無次且不設備及羅羅與盧戎大敗之莫敖縊於荒谷楚武王荆尸授師子焉以伐隨將齊入告夫人鄧曼曰余心蕩鄧曼嘆曰王祿盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉若師徒無𧇊王薨於行國之福也王遂行卒於木之下録曰愚觀鄧曼之言蓋不以私廢公不以恩掩義且能知社稷為重君為輕夫是而言必有中也夫禎祥妖孽動乎四體善必先知不善必先知莫敖之舉趾楚武之心蕩其禍必矣奈何楚子之弗察也羅之伐隨之盟祇以自速其亡耳善乎宋光獻太后曰得之則南面受賀不諧則萬里生靈所係嗚呼茍有先事之諫或將緩於滅鄧之禍矣曾謂鄧曼之智而弗及乎此晉文公出亡過曹曹共公不禮焉僖負羈之妻謂其夫曰君無禮於晉公子吾觀其從者皆賢人也若以相公子反晉國必得志於諸侯而誅無禮曹其首也子盍早自二焉乃饋公子壺餮而加璧焉文公受飱返璧三年晉師伐曹克之三月丙午入數之以其不用僖負羈而乘軒者三百人也且日獻狀令無入僖負覆之宫而免其族報施也録曰愚觀蜉蝣之詠而知曹國之亡豈非以其玩細娛而忘逺慮乎饋餮置璧所謂逺慮也薄觀駢脅所謂細娛也時小人道長氣焰繁盛而君子道消夫婦食貧外之威儀服美雖楚楚而可愛而內之羞惡是非實則亡之已久此其匹夫匹婦殷勤繾而不舍也後之鑒焉者愼無以國之大計而為人私報焉則得矣漢書高祖有疾吕后問曰陛下百歲後蕭相國既死誰令代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平智餘餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉吕氏復問其次上曰此後亦非乃所知也録曰帝之興劉悉資于羣策之力而其安劉乃出於獨見之明帝豈不能預科而先事圖之歟惠帝之懦弱而吳楚之衆大韓彭之捐謝而大漢之孤煢不有雋后其何能淑所謂將欲取之必固與之者也乃若北軍之典不難于子弟之親平勃之智多見於股肱之曰后亦豈不能曲防而每事從之歟國難之方張而王室之新定嬃噲之解禍而産祿之盛強若匪元功必生他變所謂將欲取之必固與之者也皆帝后之智也昌邑王賀即位淫亂大將軍霍光與車騎將軍張世安謀欲廢賀議已定使大司農田延年報丞相楊敞敞驚懼不知所言汗出浹背徒曰唯唯而已延年出更衣夫人遽從東廂謂敞曰此國之大事今大將軍議已定使九卿來報君侯君侯不疾應與大將軍同心猶與無決先事誅矣延年更衣還敞夫人與延年參語許諾請奉大將軍教令録曰愚觀敞妻之言而嘆昌邑狂悖無謀之甚也夫廢立何事也丞相何官也大將軍可使人傳道其言敞夫人可與人參互其語且當國助危疑之際敞身居相位不居政府而居相家設有如宋昌張武者在昌邑之側則光之計必不得行光之計不行敞延年無譙類矣然則敞夫人幸而中夏侯勝不幸而不中耳其於智也何有馮昭儀者右將軍奉世之女也建昭中上幸虎圈鬥獸後宫皆從熊逸出圈攀檻欲上殿左右貴人昭儀皆驚走而馮婕妤直當熊而立左右格殺熊天子問婕妤人情皆驚懼何故獨當熊而立對曰妾聞猛獸得人而止妾恐至御坐故以身當之帝大嗟嘆以此益重重焉録曰此炎祚當微之兆漢嗣將絶之徴不足為昭儀重實可為當時惜也夫垂堂之訓千金之子尚然夢熊之祥斯干之詩可驗未聞狎猛獸以為樂當熊立而無懼者也夫熊可夢也不可見也無故而逸出枉其兆矣不旋踵間趙昭儀者出雖育育不殊而禎祥屢閼豈非熊逸之明驗歟東漢書明帝建初元年欲封爵諸舅因大旱言者歸咎寡恩之故有司復奏宜依舊典太后不許詎曰凡言事者皆欲取媚以要福耳昔王氏五侯同日俱封其時黃霧四塞不聞澍雨之應又田蚡竇嬰寵貴橫恣傾覆之禍為世所傳故先帝防愼舅氏不令在樞機之位吾豈可上負先帝之旨下𧇊先人之德重襲西京敗亡之禍哉固不許帝省詎嘆息曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎報曰吾反覆念之恩令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉常觀富貴之家祿位重疊猶再實之木其根必傷夫至孝之行安親為上今數遭變異穀價數倍憂惶晝夜不安坐卧而欲先管外封違慈母之拳拳乎吾素剛急有胸中氣毋違逆也帝乃止録曰愚觀明德之固遜蓋以深懲既往之事也夫明珠薏苡虛名之纍耳先帝豈真不明耶懲於匿情求名故不得以疑似忘之襲爵列王實事之驗耳當時豈誠不思耶戒於黃霧四塞故不得以常事忽之厥後明帝守此遂於雲臺之繪亦省椒房之親夫婦母子之間一體而無違矣和熹鄧皇后年五歲祖母太夫人愛之親為剪髮年高目瞑誤傷其額流血不言左右怪之曰非不痛也難傷老人之意故忍之耳十二通論語諸書志在典籍不問居家之事家人號曰諸生及長選入宫姿顔姝麗絶異於衆嘗有疾帝令母兄入親醫藥后言宫禁至重不願帝曰人皆以數入為榮汝反以為憂乎是時方國貢獻兢求珍異之物自后正位中宫悉令禁絶帝每欲官爵鄧氏后輒哀請故兄隲終帝世不過虎賁中郎及為大后有幸人吉成枉以巫蠱事下掖庭考訊后以先帝待之有恩呼見核實果御者所為莫不嘆服以為聖明常以鬼神難徴淫祀無福悉罷諸祠官又微和帝弟濟北河間王子男四十餘人鄧氏近親子孫三十餘人並為開邸教學經書躬自監詆如永平故事以先公既以武功書之竹帛兼以文德教化子孫故能備束修不觸憲綱也録曰人謂鄧后稱制終身號令自出至使嗣主側目斂袵直士懷悶逢戮然而班母一説闔門辭事愛姪微愆髠剔謝罪亦可謂明矣至建光之後王柄有歸遂乃名賢戮辱便佞黨進故知持權引謗所幸者非已焦心恤患自強者惟國君子固不可一眚而絶天下之母也録之三國志破虜將軍吳氏孫堅妻也堅少輕吳氏親威將拒焉夫人曰何愛一女而以取禍乎遂許為婚生男即策與權也策嘗以功曹魏謄忤意將殺之夫人倚大井謂曰汝新造江南方當優禮賢士拾過録功魏功曹在公盡規汝今日殺之則明日人皆叛汝吾不忍見禍之及當先投此井策大驚遽釋謄及權少年統業夫人助治軍國甚有禆益曹操下書責權任子權將遣之周瑜詣夫人曰今吳承父兄之資統六郡之衆兵精糧多將士用命鑄山煮海境內富饒有何逼迫而欲送質子乎夫人曰公瑾議是遂不敢乎尊稱太后薨復引見張昭等屬以後事從此處驍悍果烈有兄策風妻徐氏明慧兼曉卜筮時權殺吳郡太守盛憲憲故吏媯覽欲為報讐翊左右亦欲為逆適諸縣令長會遇翊將為東道生語徐氏卜之徐言卦不能嘉可須異日翊不聼乃大會賓客因被酒遂為左右逆者所殺覽入居府中悉取嬪妾復欲逼徐徐恐逆之見害乃紿之曰須晦日設祭除服覽許之潛使親信語舊將孫高傅嬰復密呼侍養二十餘人潛伏併謀至期祭畢除服薰衣别施帷帳以伺覽遣人請之無復疑慮遂盛飾而入徐出迎覽才下拜即呼高嬰等出執殺覽徐返縗絰奉覽首以祭翊墓舉軍驚駭以為神異録曰策之欲殺魏謄即權之忌殺盛憲也徐之卜止其夫即吳之苦諌其男也策幸而聼於未禍之先翊不幸而忽於將傾之際致使母之智略獲伸哀榮終始而妻之明慧徒切卒以喪亡悲夫雖然以一女流而機變權譎不屈不撓非惟報夫之讐且能全婦之節正易所謂恆其德貞婦人告夫子凶者也徐氏之筮蓋明乎此晉書華耽妻辛氏字憲英魏侍中毗之女也聰朗有才鑒初魏文帝與陳思王不協及立為太子抱毗頭曰辛君知我喜否毗以告英英曰太子代君主宗廟社稷禮宜憂戚今反喜何以能久及弟敞為大將軍曹爽參軍宣帝將誅爽因其從魏帝出而閉城門敞懼問英曰天子在外太傅閉城門人云將不利國英曰以吾度之太傅殆不爾此舉不過以誅爽耳然則敞無出乎英曰安可以不出職守人之大義也凡人在難猶或恤之汝從衆而已敞遂出宣帝果誅爽事定後敞嘆曰吾不謀於姊幾不獲於義其後鍾會為鎮西將軍英謂從子祐曰鍾士季何故西出祐曰將為滅蜀也英曰會在事縱恣非持久處下之道吾畏其有他志也會將行請其子琇為參軍英憂曰難至吾家矣琇固請於文帝不許英謂琇曰行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不遺父母憂患而已軍旅之間可以濟者其惟仁乎會至蜀果反琇竟以全歸其明智如此録曰愚觀辛氏之婦非但料事多中而已其所言魏立之立得失之大權也曹爽之誅襌代之大幾也鍾會之亂治忽之大務也君臣上下內外親踈之間若燭照而分其黑白權衡而察其輕重當世之所謂大人君子反有所不逮焉嗚呼是可以閨門之彥求之乎王渾妻鍾氏字琰魏太傅繇曾孫也父徽黃門郎琰數歲能屬文及長聰慧弘雅博覽記籍美容止善嘯咏禮儀法度為中表所則既適渾生濟嘗夫婦並坐濟趨庭而過渾欣然曰生子如此足慰人心渾弟淪女亦才淑為求賢夫時有兵家子甚俊濟欲妻之白琰琰曰要令我見之濟令此兵與羣小雜處琰自幃中察之謂濟曰緋衣者非汝所拔乎濟曰是也琰曰此人才足拔萃然地寒壽促不足展其器用不可與婚遂止其人數年果亡琰明鑒逺識皆此類也録曰以昶之淵識而有渾以琰之鑒裁而有濟一家之中父父子子夫夫婦婦可謂盛矣王氏之興不亦宜乎渾弟妻郝氏亦有德行琰雖貴門與郝雅相親重郝不以賤下琰琰不以貴陵郝時人稱鍾夫人之禮郝夫人之法云杜有道妻嚴氏字憲貞淑有識量夫早亡一子植女韡並孤藐憲雖少誓不改節撫育子女教以禮度植遂顯名韡亦淑德傅玄求為繼室憲便許之時玄與何晏鄧揚不睦晏等每欲害之故人莫肯與婚及憲許玄內外以為憂曰何鄧執權必為玄害亦猶排山壓卵以湯沃雪耳憲曰爾知其一未知其二晏等驕侈必當自敗吾恐卵破雪銷行自有在後果為宣帝所誅桓任至南安太守從兄預為秦州刺史被誣徴還憲寓書戒之俾含垢忍辱當至三公預果為儀同三司玄前妻子咸年六歲隨其繼母省憲憲謂咸曰汝千里駒也必當逺至以其妹之女妻之後亦有名海內其人知之鑒如此録曰愚觀嚴氏之母其德慧術智豈尋常所可及哉其料何鄧之敗匪但專門管輅常言鄧之筋不束骨此為鬼躁何之血不華色此為鬼幽是也而器長虞之才豈伊文士頴川庚純常嘆傳咸之文近乎詩人之作是已一則斷之以理一則察之以行然果何以得此哉正以在己者存之乎疢疾故在天者玉之乎成人蓋不但孤臣孽子而寡妻貞婦亦莫不然矣劉殷妻張氏殷博通經史倜儻有濟持之志儉而不陋淸而不介鄉黨親族莫不稱之司空齊王攸僻為椽征南將軍羊祜召參軍事皆以疾辭時同郡張宣子識逹之士也勸殷就徴殷曰當今二公有晉之棟楹吾方希逹如榱椽耳不憑之豈能立耶殷有王母在堂既應他命無容不竭臣禮便不得就養此子輿所以辭齊大夫也宣子曰如子所言豈庸人所識哉遂以女妻之始宣子並州豪族家富於財其妻怒曰我女年南十四姿識如此何慮不得為公侯妃而遽以妻殷乎宣子曰非爾所及也誡其女曰殷至孝冥感兼才識超世此人終當逺達為世名公汝其謹事之張氏性亦婉順事王母以孝聞奉殷如君父焉生七子五子各授一經一子授太史公一子授漢書一門之內十業俱興北州之學殷門為盛録曰古以孝廉舉人故感堇錫粟之事見本傳今不録紛紛簡册不足勤也而宣子之逹識至正婚姻於交談之間此真聼言觀行之美愛女者取以為法可也至五子各授一經一子授太史公一子授漢書一門之內七業俱興此尤所當法云宋史章獻明肅劉皇后性警悟曉書史聞朝廷事能記其本末真宗退朝閲天下封奏多至中夜后皆預聞宫闈事有問輒傳引故實以對帝深重之天僖四年帝久疾居宫中事多決於后真宗崩為皇太后軍國重事權取處分帝與太后同御承明殿稱制十一年雖政出宫闈而號令嚴明恩威加天下左右近習少所假借未嘗妄有改作內外賜與有節舊賜大臣荼有龍鳳飾太后曰豈此人臣可得命有司别製賜族人御食必易以扣器曰尚方器勿使入吾家也録曰宋母后臨朝稱制始此而録之何也易之家人曰富家大吉順在位也是時以帝則疢矣以太子則沖矣茍無后之明智天下孰從而理乎帝之深重良有以也始出臨朝向無故事苟效漢唐覆轍宋室何由而政乎后之所為不可誣也今居正而不失為下之體承天而不違時行之道方仲弓請立劉氏廟則拒之程琳獻武后臨朝圖則絶之他如𨚫漕臣之羡餘易上方之器用從宰執之深慮加宫殯之恩禮皆國家大事故亦不得而外之也仁宗曹皇后性明智頗涉經史善飛白書慶曆八年閏正月帝時以望夕再張燈后諫止後三日衛卒數人作亂夜越屋叩寢殿后方侍帝聞變遽起帝欲出后閉閣擁特趣呼都知王守忠使引兵入后度賊必從火陰遣人挈水踵後果舉炬焚簾水隨滅之是夕所遣官侍后皆親剪其髮諭之曰明日行賞用是為驗故爭盡死力賊即擒滅閣內妾與卒亂當誅祈哀幸姬帝貸其死后請論如法曰不如是無以肅清禁掖英宗方四歲后拊鞠周盡逮立為嗣贊策居多帝夜暴崩后悉斂諸門鑰置於前召太子入及明宰臣韓琦等至奉英宗即位帝感疾請權同處分軍國事御內東門小殿聽政大臣奏事有疑未決者則曰公輩更議未嘗出己意中外章奏日數十一一能紀綱要檢柅曹氏及左右臣僕毫分不以假借宫省肅然録曰明肅之臨朝有意於干政也故內有周懷政楊崇勳楊懷告之亂外有丁請錢惟演曹利用之謀茍無王曾之正色未見其善始令終也光憲之臨朝無意於攬權也故大臣日奏事有疑未決者則曰公輩更議之未嘗出以己意雖無韓琦之危言未見其貪戀權勢也以是相傳為法英宗高皇后仁明有智神宗纍欲為高氏營大第后不許久之斥望春門外隙地以賜凡營繕百役悉出太后不調大農一錢帝不豫宰執王圭等入問疾后泣撫哲宗曰兒孝順自官家服藥未嘗去左右喜學書誦論語乃令見圭等是日策為皇太子及蔡確貶后謂大臣曰元豐末吾以今皇帝所書出示王圭圭奏賀遂定儲極且以子繼父有何間言而確自謂有定策功妄扇事端規為異時眩惑地吾逐之此宗社大計姦邪怨謗所不暇恤也從父遵裕坐失律抵罪蔡確獻諛乞復其官后曰遵裕靈武之役塗炭百萬先帝中業得報驚悸徹旦不能寐馴致大故禍由遵裕得免刑誅幸矣吾何敢顧私恩而忘大義宋用臣既斥朴乳媪入言冀得復用后見其來曰汝來何為得非為用臣等遊説乎且汝尚欲如曩日求內降干撓國政耶若復爾吾當斬汝自是內降遂絶及不豫吕大防范純仁等問疾后曰試言九年間會施恩高氏否只為至公一男一女病且死皆不得見言訖淚下曰日前往事先帝追悔每每至於泣下此事官家宜深知之又曰正欲對官家説破老身沒後必多有調戲官家者宜勿聼之公等亦宜早退令官家别用一番人乃呼左右問曾賜出社飯否公各去喫一匙社飯明年社飯時思量老身也録曰愚觀宋宣仁太后臨沒格言可為三復流涕也因考北魏馮太后俱以祖母臨朝而宣仁有十善馮后有十罪何謂十善仁明一也慈烈二也任賢三也敬故四也除苛政五也罷新法六也安內境七也戢邉地八也不受正衙朝賀九也絶外家私恩十也是孰非可思者乎何謂十罪擅權一也稱制二也失行三也私寵四也鵷君五也專殺六也忌主英敏七也盛寒閉主不食八也聼宦官譛九也杖主數十十也是孰非可恨者乎然而一下社飯未寒力排旁午一則金册告蠲哀毀不息者良由魏用夏變夷故抑切蒸蒸之懷宋將變于夷故不啻擾擾之惑雖則人事之失亦天運使之然也不然祖孫一體后以言之諄諄而帝聼之藐藐其智者之謂夫調戲之謂失宋名臣録富鄭公韓國夫人晏氏元獻公女也弼初遊場屋穆修謂之曰進士不足以盡子才當以大科名世適有旨以大科取士時弼父言官耀州將西歸范文正遣人追之可亟還至京師見文正辭以未嘗為此學文正曰已聞諸公薦君矣久為君闢一室皆大科文字可往就館時元獻為相求婚於文正文正曰公女若嫁官人仲淹不敢知必欲國士無如富弼者元獻一見大愛重之即議婚弼遂以賢良方正登第初言為吕文穆公門客一日白文穆曰兒子十許歲欲令入書院事廷評太祝文穆許之及見驚曰此兒他日名位與吾相似而勳業逺過於吾令與諸子何學供給甚厚後弼果至宰相時稱三公知人無黍於晏氏云録曰愚觀塵埃物色之設雖曰難希而蛟龍騏驥之需自當有辨特以三公一則不因門客之微而私其子一則不以宰相之貴而吝其女一則不避嫌疑之迹而薄其徒卒之鸞凰並耀氷玉交輝棟梁美家國天下坸有所賴若此等事卓然罕矣録之弘道録卷之四十三
