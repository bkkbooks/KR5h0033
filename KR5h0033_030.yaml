front:
  text: 弘道録卷之三十七相六
  hash: sha256:73c7f4f78345354d8c9fd9a8b8715cacaafdbe348e55b609cb717af0b0901c33
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_030-001a, image: hfl/1076/1076-036.png}
body:
  text: 智君臣之智家語孔子稱堯曰其智如神録曰繫辭曰神而明之夫萬事也萬物也出於天也夫茍出於天也視之而弗見聼之而弗聞理無形也未可以為神也貝衆理宰萬事係於人也夫苟係於人也疑之而可言擬之而可動心有覺也此所以為神也非所以疑擬於杳冥之鬼神也中庸子曰舜其大智也歟舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎録曰堯之智曰如神言其用之所及不可測度也舜之智曰用中言其心之所存無過不及也若乃曲徇己見必人以難從則不可謂之用傾駭聽聞示人以難及則不可謂之邇拒諌飾非以察為明則不可謂之好優柔不斷讒佞不分則不可謂之執忠諌者謂之誹謗深計者謂之妖言又安在隱惡而揚善乎斯皆智之賊也過與不及之故也故聖人不由焉孟子曰智者無不知也當務之為急堯舜之智而不遍物急先務也不能三年而緦小功之察放飯流而問無齒決此之謂不知務録曰夫所惡不知務者若唐德宗猜忌刻剝以剛明自任而忘受欺於廬杞趙贊之謂也然則何如而後能察之哉夫虞庭之法具在也其所以教之者直而溫寬而栗剛而無虐簡而無傲其所以察之者𡩖而栗柔而立願而恭亂而敬擾而毅直而溫簡而亷剛而塞強而義而尤致愼於巧言令色則雖有祀贊百輩何所容哉此四凶不能危舜而一祀足以亂唐孟子之言吃緊而不可忽也又曰所惡於智者為其鑿也如智者若禹之行水也則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣録曰禹之智鯀之所謂不智也夫父子之道天性也一以率性而利一以穿鑿而害未至於聖者可不勉哉今天下之鑿者非獨於鯀也或苛察自在或壅閼自賢或躁急自用或刻薄自恣或僥幸自多奚啻其一端乎孟子發為行所無事之説於世道極有益未可以行水小事言也成湯放傑於南巢惟有慙德曰豫恐來世以台為口實仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昏德民墜塗炭天乃錫王勇智表正萬邦録曰湯何以謂之勇智乎夫禪受以文革命以武然非內秉剛明之德何以知一日之間天命已絶果能上應天心下順民心乎而猶曰已日乃孚者湯恐後世以台為口實也然其實人心喜悅未占有孚而猶曰革言三就者仲虺作誥以解湯之惑也不然雖以咨嗟涕滂如莽之金縢自陳千鬲如操之下令而不知人之視己如見其肺肝然果何益哉果何益哉萬章問曰百里奚自鬻於秦養牲者五羊之皮食牛以要秦穆公信乎孟子曰否不然好事者為之也百里奚虞人也晉人以垂棘之璧與屈産之乘假道於虞以伐虢宫之奇諫百里奚不諫知虞公之不可諫而去之秦年已七十矣曾不知食牛於秦繆公之為汙也可謂智乎不可諫而不諫可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知繆公之可與有行也而相之可謂不智乎相秦而顯其君於天下可傳於後世不賢而能之乎自鬻以成其君鄉黨自好者不為而謂賢者為之乎録曰夫所謂之智者乃達於事理而周流無滯之謂也然仁可勉強智不可勉強此三代以下論人物者不能純乎天理而百里奚管仲晏子之徒亦在所録也故觀於四智二賢之論則知當時所以為之惓惓焉者亦必有其道矣觀者詳之國語桓公使鮑叔為宰辭曰君加惠於臣使不凍餒君之賜也若必治國家則非臣之所能也其唯管夷吾乎臣之所不若夷吾者五寬惠柔民弗若也治國家不失其柄弗若也忠信可結於百姓弗若也制禮義可法於四方弗若也執抱鼓立於軍門使百姓加勇焉弗若也桓公曰夫管仲射寡人中金是以濱於死鮑叔曰夫為其君勤也君若宥而反之夫猶是也桓公使人請諸魯比至三釁三浴之桓公親逆之於郊而授之以政録曰序卦曰物不可以終否故受之以同人傳曰天地不交為否上下相同則為同人世之方否必與人同力乃能濟也桓當否極之後蹶然興起思以智力服天下茍非得先幾之士同心之言何由聽信之乎牙之推賢讓能無昵比之私桓之諌行言聼有剛明之德齊國之亨夫是之由也桓公與管仲坐而問曰昔吾先君築室以為高位田狩畢弋不聼國政卑聖侮士而唯女是崇戎士凍餒戒車待優遊笑在前賢才在後是以國家不曰引不月長為此若何對曰吾昔先王昭王穆王世法文武遠績以成名合羣叟比校民之有道者設象以為民紀式權以相應比綴以度縛本肇末勸之以賞罰糾之以刑罰班序顛毛以為民紀統公曰為之若何對曰昔者聖王之治天下也參其國而伍其鄙定民之居成民之事而愼用其六柄焉録曰序卦與人同者物必歸焉故受之以大有為卦火在天上其明及遠萬物之衆無不照見此桓公管仲坐而論道之時也公曰成民之事若何對曰四民者勿使雜處昔聖王之處士也使就間燕則父與父言義子與子言孝其事君者言敬其幼者言悌少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能今夫工使處就官府審其四時辨其攻苦權節其用論比協材日暮從事施於四方以飭其子弟相語以事相示以巧相陳以功今夫商使處就市井察其四時而監其鄉之資以知其巿之賈負任儋荷服牛軺馬以周四方以其所有易其所無市賤鬻貴旦暮從事於此以𩛙其子弟相語以利相示以賴相陳以知今夫農使處就田野察其四時權節其用及寒繫莫除田以待時耕及耕深耕而疾病之以待時雨時雨既至挾其槍刈耨鎛以旦暮從事於田野是三者少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能其秀民之能為士者必足賴也桓公曰善録曰此不易之定論豈惟一國為然一人一家莫不然也上失其道民失其義士甘於遊衍農奪於末技朝不信道工不信度君子犯義小人犯刑國之不亡幸矣此仲所以深慮也公曰定民之居若何對曰制國以為二十一鄉工商之鄉六士鄉十五公帥五鄉焉國子帥五鄉焉高子帥五鄉焉參國起案以為三官臣立三宰公立三族巿立三鄉澤立三虞山立三衡録曰此魯作三軍所由起也智者在於善觀而已矣公曰吾欲從事於諸侯可乎對曰未可國未安修舊法擇其善者而業用之遂滋民與無財而敬百姓則國安矣公曰諾國安矣其可乎對曰未可君若正卒伍修甲兵則大國亦將正卒伍修甲兵君有攻伐之器小國諸侯有守禦之備難以速得志矣君若欲速得志於諸侯則事可以隱作內政而寄軍令焉公曰善於是制國五家為軌軌為之長十軌有里里有司四里為連連為之長十連為鄉鄉有良人以為軍令五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎里有司帥之四里為連故二百人為卒連長帥之十連為鄉故二千為旅鄉為人帥之五鄉為帥故萬人為一軍五鄉之人帥之春以猥振旅秋以獮治兵是故卒伍整於里軍旅整於郊內教既成勿使遷徙伍之人祭祀同福死喪同恤禍災共之人與人相疇世同居少同遊故夜戰聲相聞足以不乖晝戰目相視足以相識其歡欣足以相死是故守則同固戰則同強君有此士也三萬人以方行於天下以誅無道以屏周室天下大國之君莫之能禦也録曰此內政而寓軍令徒以仲之設心外則一以欺人內則急以強己惓惓焉惟以得志為事夫是而君子不由也若乃先王聯屬其民寓兵於農之法大率類此嗚呼齊一國也仲一人也以三萬人橫行天下誅無道屏王室莫之能禦何况堂堂之天下乎夫是而不可不措之思也公曰吾欲從事於諸侯可乎曰未可鄰國未吾親也君欲從事於諸侯則親鄰國審吾疆場而反其侵地無受其資而重為之幣俯於諸侯則曰鄰親我矣四鄰大親正封強地南至於陶陰西至於濟西北至於河東至於紀酅有革車八百乘擇天下之淫亂者而先征之即位數年遂征萊莒徐夷吳越一戰帥服三十一國録曰孟子曰以力服人者非心服也力不贍也是故就其開悅君心織微畢照則可見其眀智而有餘究其反覆傾險立心措志則又見其光大之不足君子可不務帝王之大智以正己而格物乎左傳齊景公田於沛既還晏子侍於遄臺梁丘據馳而造焉公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羹焉齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣替其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故曰亦有和羹既戒既平奏假無言時靡有爭今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之同之不可也如是録曰孔子曰君子和而不同小人同而不和和與同正相反而公私義利之所由分也蓋同之言利害不分是非莫辨惟上之言而莫豫違是故言之可聼聼之可入和之言祗求無背於理不求無背於言誰能無叛於道不能無叛於迹必不肯阿諛曲從陷君不義是故言之未必聼聼之未必入要之進無面從退無後言者和也以利害為從違得失為進退者同也易曰差之毫釐謬以千里為人上者可不察哉景公欲更晏子之宅曰子之宅近巿湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近巿朝夕得所求小人之利也敢煩里旅公笑曰二近巿識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踴貴履賤景公於是省於刑及晏子在晉公臾其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且曰非宅是卜惟鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮吾敢違乎卒復其舊宅公弗許因陳桓子以請乃許之録曰智哉晏子仲乎郤慶氏殿鄙六十弗受一也與季札言納邑與政二也辭宅卒復其舊三也彼不知自保者今雖眩美輪奂以姦私寵焉知他日不變革改毁以盡公論乎故曰非惡富也恐失富也以齊之多難崔慶亂於前樂飽踵於後晏獨端委植立而不可變者讓為之懿也故利不可強思義為愈藴利生孽君子其戒之哉魯飢臧文仲言於桓公曰國病矣君盍以名器請糴於齊公曰誰使對曰國有飢饉卿出告糴古之制也辰也備卿請如齊公使往從者曰君不命而請之其為選事乎文仲曰賢者急病而讓夷居官當事不避難我不如齊非心病也在上不恤下居官而惰非事君也遂以鬯圭與玉磬如齊齊人歸其玉而與之糴録曰葵丘之會曰毋遏糴遏糴者五霸之所戒也於是有文仲之請齊人之與焉何以今之世反不然乎彼胡越尚猶一家以秦人而視楚人之肥瘠且不敢若是恝而况溥天之下莫非王土率土之濱莫非王臣胡為乎閉之糴乎夫常平社倉其制遠矣三年耕九年積亦云邈矣而預備倉今之要務募民既曰無策和糴亦朱盡善勸借者不得已而一行贓罰紙劄未能盡知無已俾其有無自相兼濟何得以當官威令參預乎其間耶且如一府一郡所産幾何出自本土非由外來猶之可也四通八達之道豐年尚且資之才一壅閼四路風聞市井又從而關之小民又從而訛之來者阻絶居者騰湧安得而不坐索高價耶惟其無阻人各趨利不分遠邇不伺號招自然遠來民心至愚而神索價高下不約而同又况我之可得而止者皆出於其塗之人而未出於塗者尚多也民之所仰而糴者多未出於塗之家而已出於𡍼者尚少也曾是而不反思之乎此移民移果所以有限而自謂盡心者亦未嘗得也臧武仲多智時號為聖人邾庶其以漆閭來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜武子謂紇曰子盍詰盜武子曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子招外盜而大禮焉何以止吾盜子為正卿而來外盜使紇去之將何以能庶其竊邑以來子以姬氏妻之而與之邑其從者皆有賜也是賞盜焉賞而去之其或難焉紇也聞之在上位者灑濯其心一以待人軌度其信而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎録曰夫子嘗告季孫曰茍子之不欲雖賞之不竊其言與紇正相合孰謂武子之智而可少哉夫有宣公之命莒僕而後有季孫之賞庶其有桓公之納郜鼎而後有陽虎之竊寶玉誨盜之驗如影隨響人可不務洗濯其心乎以紇之智足以服季孫外盜之言孰不敬信而內寵之私孰可殉之雖然以甲從已則讚犯門斬關則誣紇以正論而宿以憾施言之禍人一至此夫奉穆公納晉公子及河舅犯以璧授公子曰師負羈紲從君巡於天下臣罪多矣請由此辭公子曰所不與舅氏同心者有如此水投其璧於河遂入於曲沃是為文公文公元年王室有亂襄王出居於鄭秦穆公師於河上將以納王勇犯言於文公曰永諸侯莫如勤王諸侯信之且大義也公以為然故辭秦師而下次於陽樊右師圍溫左師逆王入襄王於周取王弟叔帶於溫殺之録曰蠱序卦曰以喜隨人者必有事故受之以蠱夫喜悅以隨於人者必有事也無事則何喜何隨然則授璧請亡豈得已哉介子推之事可以鑒矣彖又曰蠱元亨而天下治也治蠱之初茍能使尊卑上下止齊安定何事不可治何功不可成然則求諸侯莫如勤王豈無徵哉文侯仇之事可以法矣故又曰利涉大川往有事也其諸亡人子犯之謂乎楚子及諸侯圍宋公孫固如晉告急先軫曰報施救患取威定霸於是乎在狐偃曰楚始得曹而新昏於衛若伐曹魏楚必救之則齊宋免矣於是乎搜於被廬作三軍謀元帥晉侯始入而教其民二年欲用之子犯曰民未知義未安其居於是乎出定襄王入務利民民懷生矣將用之子犯曰民未知信未宣其用於是乎伐原以示之信民易資者不求豐焉明徴其詞公曰可矣乎民未知禮未生其共於是乎大嵬以示之禮作執秩以正其官民聼不惑而後用之出穀戍釋宋圍一戰而霸文之教也録曰孔子曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情晉雖伯國天意興之而猶藉以先焉其是之謂夫文公問元帥於趙衰對曰邵穀可行年五十矣守學彌篤夫先王之法志德義之府也德義生民之本也能惇篤者不忘百姓公從之使趙衰為卿辭曰欒枝貞愼先軫有謀胥臣多聞皆可以為輔臣弗若也又使辭曰夫三德者偃之出也以德紀民其章大矣不可廢也使狐偃為卿辭曰毛之智賢於臣其齒又長也不在位不敢聞命乃使狐毛將上軍狐偃佐之毛卒使衰代之辭曰城濮之戰先且居之佐軍也善軍伐有賞善君有賞能其官有賞且居有三賞不可廢也公曰趙衰三讓其所讓皆社稷之衛也廢讓是廢德也録曰愚觀成子志而有文豈不信哉夫以人事君曰忠三讓三獲曰文有天下者可不務哉徒以其霸而廢其文乃攘取高位以叨異寵今之視之習不若腐鼠其視衰也為何如哉成子卒宣子將中軍始為國政制事典正法罪辟刑獄董逋逃由質要治舊汙本秩禮續常職出滯淹既成以授太傅陽處父太師賈他使行諸晉國以為常法録曰蠱之六五曰幹父之蠱用譽晉侯本以陰柔之質詭而不正而能任剛陽之臣觀其立政制治豈非大有為之才乎故曰成季之勳宣孟之忠君臣父子之間令聞長世所謂承以德者也鄭子皮授子産政辭曰國小而倡族大寵多不可為也子皮曰虎帥以聼誰敢犯乎子善相之國無小小能事大國乃寬子産為政使都鄙有章上下有服田有封洫廬井有伍大人之忠儉者從而與之泰侈者因而弊之從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殞之子産而死誰其嗣之録曰愚觀子産之治鄭國乃知井田學校當時皆可復也夫鄭與魯與滕等也其自稱國小而逼族大寵多初非臆説也一旦取我田疇而伍之使都鄙有章上下有服田有封洫廬井有伍而非鹵莽也又取我衣冠而褚之使大人之忠儉者從而與之泰侈者因而弊之而非姑息也斯二者先王井田教化之遺風也其始欲殺之者習寵枯勢之為也其終欲嗣之者心悅誠服之公也然則田疇之殖者誰耶子弟之誨者誰耶蓋已寖寖乎回心向道之俗矣此有子孟子未為空言而子産能見之行事人豈可以弱小而自畫耶觀者詳之子皮欲使尹何為邑子産曰少子皮曰使夫往而學焉子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使之割也其傷實多子於鄭國棟也棟折榱崩僑將厭焉敢不盡言乎子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉僑聞學而後入政未聞以政學也子皮曰善吾聞君子務知大者遠者小人務知小者近者我小人也衣服附在吾身我知而愼之大官大邑所以庇身也我遠而慢之微子之言吾不知也今而後請聼子而行録曰尹何之不可使即子羔之不可仕可見當時議論之合也而操刃製錦之説至今十古膾炙人口人可不務學乎録之子産之從政也擇能而使之馮簡子能斷大事子大叔美秀而文公孫揮能知四國之為而辨於其大夫之族姓班位貴賤能否而又善為辭令禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子産乃問四國之為於子羽且多為辭令與禆諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賓客是以鮮有敗事録曰愚觀鄭之詞命其膾炙人口者若晉徵朝論幣獻捷晉讓壞垣辭楚公子以至爭承讓陴立駟對苑獻子對士景伯其詞具在也至今讀之者使人耳目爽快心悲開明而况親聆謦咳者乎信乎言之無文行之不遠詞可不待潤色耶禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斚玉瓚鄭必不火子産弗與夏五月火始昏見丙子風梓愼曰是謂融風火之始也七曰其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火禆竈曰不用吾言鄭又將火鄭人請用之子産不可子太叔曰寶以保民若有火國幾亡可以救亡子何愛焉子産曰天道遠人道邇非所及也何以知之竈焉知天道是亦多言矣豈或不信遂不與亦不復火録曰校人之譏曰孰謂子産智然則其郤禆竈獨非智與智故以祝吏為末自強為本茍國無政令安能消變於未然乎有國有家者可不致愼耶是知吉凶禍福固有可移之理古人所以必先人事而後言數與命也弘道録卷之三十七
