  text: 弘道録卷之四十七路八
  hash: sha256:020e94a58cddb9de4551c29d38648bd6430a80dccff621e29ce7a6242d5f0b3c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_040-001a, image: hfl/1078/1078-100.png}
body:
  text: 智朋友之智後漢書鍾皓以篤行稱與荀淑並為士大夫所𡚖慕李膺常嘆曰荀君清識難尚鍾君至德可師同郡陳實年不及皓引與為友皓為郡功曹會辟司徒府臨辭太守問誰可代卿者對曰明府必欲得人西門亭長陳實可也實聞之曰鍾君似不察人不知何獨識我兄子瑾亦好學慕古有退讓風與膺同年俱有聲名膺祖太尉修言瑾似我家性邦有道不廢邦無道免於刑戮遂以膺妹妻之皓常語瑾以昔國武子好昭人過以致怨本卒保身全家爾道為貴後終於家諸儒為之頌曰林慮懿德非禮不處悅此詩書弦琴樂古五就州招九膺台輔逡巡王命卒歲容與録曰愚勸膺祖之言似與膺大不相若何也漢自中世以下閹堅擅恣故俗遂以危身矯潔放言為高士有不然者則藝夫牧竪已叫呼之矣是以聖人導民理性裁抑宕佚愼其所與節其所偏若林慮者智能自全道無絶物凶邪不能以權奪王公不能以貴驕真可謂自拔於流欲者矣録之徐稚家貧躬耕非其力不食然為人恭儉義讓所居服其德太守陳蕃在郡不接賓客唯稚來特設一榻去則懸之延熹二年上書桓帝薦稚乃以安車玄纁備禮徴之不至又常為太尉黃瓊所辟不就及瓊卒徒步到於江夏赴之設雞酒薄祭哭畢而去不告姓名時會者皆四方名士郭林宗等數十人聞之疑其稚也使茅容輕騎驕之及於塗為設飯共言稼穡之事臨去謂容曰為我謝郭林宗大樹將顚非一繩所維何為栖栖不惶寧處乎録曰遁之上九曰肥遁無不利釋之者云肥者寬裕自得之意遁者唯飄然逺逝無所係滯乃為善也上九以剛陽居卦外下無係應遁之逺而處之裕者也何往而不利哉斯言為稚設也彼諸人者既知玩世簡傲不就徵辟乃不能飄然逺引入山之深入林之密自取黨禍甘心戮辱則所謂係遁有疾厲者也曾是而得為智乎郭太博通墳藉善談論美音制始見河南尹李膺大奇之與相友善於是名震京師後𡚖鄉里諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賓望之以為神仙焉或勸之仕對曰吾夜觀乾象晝察人事天之所廢不可支也性明知人好奬訓士類身長八尺容貌魁偉褒衣博帶周遊郡國嘗於陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕如此或問汝南范滂郭林宗何如人滂曰隱不違親真不絶俗天子不得臣諸侯不得友吾不知其他為人雖善人倫而不為危言核論故宦官擅政而不能傷也及黨事起知名之士多被其害唯林宗及汝南袁閎得免焉録曰范曄論曰莊周有言人情險於山川以其動靜可識而沈阻難徵故親厚之性詭於情貌則哲之鑒惟帝所難而林宗雅俗無所失將其明性特有王乎然而遜言危行終亨時晦恂恂善導使士慕成名雖墨孟之徒不能絶也孟敏客居太原荷甑墯地不顧而去林宗見而問其意對曰甑以破矣視之何益林宗以此異之勸令遊學十年知名録曰愚觀孟敏蓋質美未學者也由質美故無牽滯之悔而遇事能决由未學故有不虞之失而意見殊分勸令就學則彬彬矣此君子成人之美而誘掖奬勸之不可無也申屠蟠禀氣玄妙性敏心通喪親盡禮幾於毁滅至行美義人所鮮能安貧樂潜味道守真不為燥濕輕重不為窮達易節蔡雍自擬以齒則長以德則賢後郡召為主薄不行隱居精學博貫五經兼明圖緯郭林宗見而奇之先是范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用蟠獨嘆曰昔戰國之世處士橫議列國之王至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹梁碭之間因樹為屋自同庸人家貧傭為漆工居二年果罹黨錮或死或刑者數百人蟠確然免於疑論中平五年與荀爽橋玄韓融陳紀等十四人共公車徴幡獨不赴人咸勸之笑而不應居無幾爽等為卓所脅及大駕西遷京師擾亂公卿多遇兵飢室家流散唯蟠終全高志年七十四終于家録曰史稱申屠蟠見幾豈惟幾哉其見道也審矣夫以非訐朝政而致公卿之折節以污穢朝廷而成一己之高尚此何等事哉中庸曰人皆曰豫智驅而納諸罟獲陷穽之中而莫之知正此謂也以蟠之禀氣玄妙性敏心通故能始則確然免於疑論繼則悠然成其逺圖正易所謂嘉遁貞吉者也終全高志不亦宜乎許劭少峻名節好人倫多所賞識若樊子昭和陽士者並顯名於世故天下言拔士者咸稱許劭常到頴川多長者之遊唯不候陳實又陳蕃喪妻還葬鄉人畢至而劭獨不往或問其故劭曰太丘道廣廣則難周仲舉性峻峻則少通故不造也其多所裁量若此曹操微時常卑辭厚禮求為己目劭鄙其人而不肯對操乃伺隙脅劭劭不得已曰君淸平之姦賊亂世之英雄操大悅而去與從兄靖俱有高明好共核論鄉黨人物每月輒更其品題故汝南俗有月旦評焉録曰愚觀許劭月旦之評與季野春秋之鑒何其不相及哉子曰賜也賢乎哉夫我則不暇聖人之酬世御物蓋如此彼既以太丘為難周仲舉為少通裁量審矣而何已之不暇顧也以操之狡猾多智尚未逢時及其末也一雞肋而不相容其能免禍幸矣非明哲保身之道也晋書皇甫謐沈靜寡欲勤力不怠博綜典籍百家之言以著述為務自號玄晏先生著經樂聖真之論或勸以修名廣交謐謂人非聖人孰能兼存出處居田里之中安貧躬稼亦可以樂堯舜之道何必崇接世利事官鞅掌然後為名乎作玄守論曰人之所至惜者命也道之所必全者形也性形所不可犯疾病也若擾全道以損性命安得去貧賤存所欲哉夫一人死而號者以為損也一人生而笑者以為益也然則號笑非益死損生也是以至道不損至德不益何哉體足也如回天下之念以追損生之禍運四海之心以廣非益之病豈道德之至乎夫惟無損則至堅矣夫唯無益則至厚矣堅故終不損厚故終不薄苟能體堅厚之實居不薄之真立乎損益之外遊乎形骸之表則我道全矣遂不仕武帝下詔敦逼謐上疏自稱草莽臣就弟借書帝送一車書與之録曰哲哉玄晏子乎蓋不唯得以行乎貧賤且能周於疢疾免於亂世其學起於清虛志存於禮法既非流俗可方而視富貴如浮雲亦非若人可比玄守之論逹於死生有足觀者録之韋忠慷慨好學閉門修己不交當世裴顧數言之於張華華辟之辭疾不起人問其故忠曰吾茨簷賤士本無宦情且茂先華而不實裴頠欲而無厭棄典禮而附賊后豈大丈夫之所宜行耶裴常有心託我常恐洪濤蕩嶽餘波見漂况可臨尾閭而窺沃焦哉張翰有清才善屬文會稽賀循赴命入洛經吳閶門於船中彈琴翰初不相識就循言談大相欽悅且問知其入洛曰吾亦有事北京便同載而去不告家人齊王冏辟為東曹椽冏時執權翰謂同郡顧榮曰天下紛紛禍難未已夫有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後榮執其手愴然曰吾亦與子採南山蕨飲三江水耳翰因見秋風起乃思吳中菰萊蓴美鱸魚膾曰人生貴得適志何能䩻宦數千里以要名爵乎遂命駕而歸人謂之見幾録曰韋子節之辭張茂先也見幾於未動之先所謂果行育德者也是故山下之泉出而遇險未有所之若山之未雲水之未波不可及也張季鷹之辭顧彥先也懼禍於既見之後所謂險德避難者也是故天地不交小人道長君子道消若水之沉溺火之焚灼不可緩也孟子不云或逺或近或去或不去𡚖潔其身而已矣豈非明智之士歟顔含裁智為衆所推與鄧攸深交嘗曰周伯仁之正鄧伯道之清卞望之之節餘則吾不知太常馮懷以王導時為帝師名位隆重百僚宣降禮問於含含曰王公雖重理無偏敬降禮之言或是諸君事宜鄙人老矣不識時務既而告人曰吾聞伐國不問仁人向馮祖思問佞於我我有雅德乎其邪重行實抑絶浮僞類如此嘗論少正卯盜跖其惡孰甚或曰正卯雖姦不至剖人充膳盜跖為甚含曰為惡彰露人思加戮隱伏之姦非聖不誅由此言之少正為甚衆咸服焉郭璞遇含欲為之筮辭白年在天位在人修已而天不與者命也守道而人不知者性也自有性命無勞蓍龜桓溫常求婚以其盛滿不許後年老遜位帝美其素行就加右光祿大夫賜床帳被褥大官致膳悉固辭一無所受録曰愚觀世之虛望隆而實德病與夫諂諛集而降禮尊者豈獨一馬祖思哉故如含者勤兄於既沒之餘未足為的而議導於方柄之日確然可凖含乎吾知免矣非所稱豪傑乎哉唐書婁師德嘗薦狄仁傑而仁傑不知意頗輕師德數擠之於外天后覺之因問仁傑曰師德知人乎對曰臣嘗同僚未聞其知人也后曰朕之知卿乃帥德所薦亦可謂知人矣仁傑既出嘆曰婁公盛德我為其所包容久矣吾不得窺其際也是時罷織紛紜師德久為將相獨能以功名終人以是智之録曰仁傑能知五王而不能知一師德何也易稱或默或語而又曰二人同心夫婁狄乃心王室本無異也然而一則好面折廷爭知無不言一則以哩面不拭始終自負其語默各有異也以外之不同若相矛盾而中之所存實同金石此仁傑之於師德始雖泛而終乃服也亦何害其為同哉裴行儉有知人之何前進士王勮咸陽尉蘇味道皆未知名一見謂之曰二君後當相次掌銓衡僕有弱息願以為托是時其弟勃與華陰楊炯范陽盧照鄰義烏珞賓王皆以文章有盛名李敬玄尤重之以為必顯逹行儉曰士之致逺當先器識而後才藝勃等雖有文華而浮躁淺露豈饗爵祿之器楊子稍沈靜應至令長餘得令終幸矣既而勃溺南海照鄰赴頴水賓王反誅炯終盈川令勮味道皆典選悉如行儉之言録曰孔子以瑚璉許子貢若所謂器識是已文王以棫朴譽髦士若所謂才藝是已然必金玉其相而後追琢其章若彼瓦缶雖有絢然之飾豈廟堂之器哉以賈誼之雋類君子猶病其志大量小才有餘而識不足况四傑乎故君子益自貴重無徒斐然成章而已也宋史張詠與青州傅霖少同學霖隱不仕詠既顯求霖者三十年不可得一旦來謁閽吏白傅霖請見詠責之曰傅先生天下士吾尚不得為友汝何人敢名之乎霖笑曰别子一世尚爾耶是豈知世間有傅霖者乎詠問昔何隱今何出曰子將去矣來報子爾詠曰亦自知之霖曰知復何言翌日别玄後一月而詠卒録曰此與元伯巨卿相似乃誠之相感無乎不至故心之相照無乎或違雖然蜀山人不起念十年便能前知矧如霖之靜處三十年乎其不為物誘而能脫屣富貴又可見矣畢仲游受知於司馬光吕公著范純仁最深時蘇軾在館閣頗以言語文章規切時政仲游憂其及禍貽書戒之曰孟軻不得已而後辨孔子欲無言古人所以精謀極慮固功業而養壽命者未嘗不出乎此君自立朝以來禍福利害繫身者未嘗顧惜乎言語之纍不特出口者為言其形於詩歌贊於賦頌託於碑銘序記者皆是也今知畏於口而未畏於文是其所是則見是者喜非其所非則蒙非者怨喜者未能濟君之謀而怨者或已敗君之事矣天下論君之文固所指名者矣雖無是非之言猶有是非之疑又况其有耶官非諫官職非御史危身觸忌以游其間殆猶轉石而救溺也録曰史傳巢谷與三蘇同鄉素與之遊甫昆弟同朝顯貴未嘗一來會及相繼謫嶺海平生親舊無相聞者谷有眉山獨步訪兩蘇於是相驚喜曰此非今之人古之人也愚竊謂古之人所以異於今者責善為重而責善之道明哲為先苟使二公早因仲游之言資其直諒之益未必天之涯海之角而巢谷之名儋耳之跡不見於史册矣不思忠告之可嘉輒誇卓行之尤異此録舍元修而叙公叔亦保身愼言之意也邵伯溫雍之子也雍名重一時與司馬光二程諸名公交以是入聞父教出事諸公所聞日博而尤孰當口之務神宗崩晢宗立蔡確方在相位刑恕自襄州移河陽詣確謀造定策事時光已卒子康當詣闕恕召詣河陽伯溫謂公休除喪未見君不宜枉道先見朋友康曰已諾之伯溫曰恕傾巧或以事要若從之必為異日之悔康竟往恕果勸作書稱確康與恕同年又出光門下逐作書如恕言蓋以康為光子言確有定策功世必見信以為他日全身保家計既而梁燾以諫議召恕亦要至河陽連日夜論確且以康書為證燾不悅會吳處厚奏確詩謗朝政燾與劉安世共請誅確且論恕罪朝廷命康分折康始悔之康卒子植幼宣仁后𠎓之吕太防謂康素以伯溫可托請以為西京教授以教植伯溫既至誨曰溫公之孫大諫之子賢愚在天下可畏也植聞之力學不懈卒有立紹聖初章惇為相惇常事康節欲用伯溫伯溫不往會法當赴吏部銓程頤謂曰吾危子之行也伯溫曰豈不欲見先公於地下耶至則先就部擬官而後見宰相惇遂論及康節之學曰嗟乎吾於先生不能卒業也伯溫曰先君先天之學論天地萬物未有不盡者其信也則人之仇怨反覆者可忘矣時惇方興黨獄故以是動之惇悚然猶薦之於朝而伯溫願補郡縣惇不悅遂得監永興軍鑄錢監適元祜諸賢方南遷士鮮訪之者伯溫見范祖禹於咸平見范純仁於頴昌或為之恐不顧也初雍嘗曰世將亂惟蜀安可避及宣和末伯溫載家使蜀故免於難趙鼎少從伯溫游嘗表其墓曰以學行起元祐以名節居紹聖以言廢於崇寧世以此三語盡伯溫出處云録曰愚觀康節不但知興衰於既往實能驗理亂於將來其子伯溫不但無黍於其父實欲兼善於其友自今觀之元祐重臣胼首就戮全身者何人也二程高第闔門遇害保家者何人也動而有悔而名亦隳出而殉人而己先喪陷仇怨則人情可惜甘淟認則物理全乖盍若奮身於治朝免禍於亂世耶進於聖門可謂先覺是賢智者不惑不得以氣數之學者纍之也近思録張橫渠問於程明道曰定性未能不動猶纍於外物何如明道曰所謂定者動亦定靜亦定無將迎無內外苟以外物為外牽己而從之是以己性為有內外也且以性為隨物於外則當其在外時何者為在內是有意於絶外誘而不知性之無內外也既以內外為二本則又烏可遽語定哉夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而太公物來而順應易曰貞吉悔亡憧憧往來朋從爾思苟規規於外誘之除將見滅於東而生於西非惟日之不足顧其端無窮不可得而除也人之情各有所蔽故不能適道太率患在於自私而用智自私則不能以有為為應迹用智則不能以明覺為自然今以惡外物之心而求照無物之地是反鑑而索照也易曰艮其背不獲其身行其庭不見其人與其非外而是內不若內外之兩忘也兩忘則澄然無事矣無事則定定則明明則尚何應物之為纍哉聖人之喜以物之當喜聖人之怒以物之當怒是聖人之喜怒不繫於心而繫於物也是則聖人豈不應於物哉烏得以從外者為非而更求在內者為是也今以自私用智之喜怒而視聖人喜怒之正為何如哉夫人之情易發而難制者惟怒為甚第能於怒時遽忘其怒而觀理之是非亦可見外誘之不足惡而於道亦思過半矣録曰愚觀定性一書乃知先生深造獨得而非諸子之所能及也夫以人之纍於外物乃不能收其放心至於定性則無將迎無內外合動靜而如一矣其所至妙至妙者莫如廓然而太公物來而順應反覆辨證不越乎此然可指而易老者莫如其情故又以喜怒言若乃直指所由進之路則自忘怒觀理始也一篇之中大要在於明覺自然大戒在於自私用智與顏子之明睿所照曾子之定靜安慮子思之誠明謂性孟子之以利為本周子之明通公溥無乎不盡此其所以超出千古又何待於著述而後為成書也哉陸九淵生三四歲問其父曰天地何所窮際父笑而不答遂深思至志寢室及𦁕角與止異凡兒見者敬之謂人曰聞人誦伊川語奚為與孔子孟子之言不類初讀論語即疑有子之言他日讀書至宇宙二字解者曰四方上下曰宇往古來今曰宙忽大省曰宇宙內事乃已分內事已分內事乃宇宙內事又嘗曰東海有聖人出焉此心同也此理同也至西海南海北海有聖人出亦莫不然千百世之上有聖人出焉此心同也此理同也至於千百世之下有聖人出此心此理亦無不同也後登進士至行在士爭從之游言論感發聞而興起者甚衆教人不用學規有小過言中其情或至流汗有懷於中而不能自曉者為之條析其故悉知其心亦有相去千里聞其大槩而得其為人嘗曰念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即為不正謂學者曰汝耳自𦖟目自明事父自能孝事兄自能弟本無缺闕不必他求又曰此道與溺於利欲之人言猶易與溺於意見之人言却難或勸其著書曰六經注我我注六經學苟知道六經皆我注腳嘗與朱熹會於鵝湖論辨所學多不合及熹守南康九淵訪之熹與至白鹿洞九淵為講君子喻于義小人喻于利一章熹以為切中學者隱微深痼之病至聼之有泣下者録曰愚觀朱陸之學所以異者良由資禀之不同也九淵自三四歲時已窮究天地之所際則其長也安得不主於性朱子則銖銖而纍之寸寸而積之及其至也安得不主於學然則二夫子之所長各有所究本不相悖不相害也譬之聖門曾子之才魯子貢之質敏然同𡚖于一貫者有夫子為之㸃化也時聖人不作諸子各立門墻而無統會依歸之所是以紛紛異同矧及門者從而咻之不知尊德性道問學子思傳于仲尼未嘗偏廢初不可岐而二也曷若大道為公智慮其不切於己也不必異己學慮其無補於人也不必為人使當時莫得而議後世無得而非兹非所謂大同者哉愚恐後之議者愈繁愈逺斯録所以弘道故不可不著水東曰記明吳思庵先生訥常言世俗淺學談及後進輒曰此韻府羣玉秀才好趂航船耳蓋言其破碎摘裂祇如往來羣坐偶語無有一高智識關鍵也先生嘗熟世家自少警敏絶人於書無所不讀嘗從其先君子遊宦四方閲歷既廣退而况潜含養三四十年所以其學博而核其氣剛而大其識卓而明所著性理羣書補注小學集解有功於儒先其立論於性理之奧尤多所闡明録曰公蓋起於薦舉不由科目而其言乃切中當今學士大夫之病視昔張程朱陸大不侔矣然則學者其可不猛省乎此録之所以終也弘道録卷之四十七
