front:
  text: 弘道録卷之四十四路五
  hash: sha256:83292fc9ca8971a56a15f89a3564f62100c7371c558227c3122e55f9304049bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_037-001a, image: hfl/1078/1078-004.png}
body:
  text: 智昆弟之智孟子萬章問曰象曰鬱陶思君爾忸怩舜曰惟兹臣庶汝其於豫治不識舜不知象之將殺己與曰奚而不知也象憂亦憂象喜亦喜陳賈曰周公使管叔監殷管叔以殷畔也有諸孟子曰然曰周公知其將畔而使之與曰不知也然則聖人且有過與曰周公弟也管叔兄也周公之過不亦宜乎録曰權者聖人之大用而智乃行權之大本權非大聖人有所不用智非大聖人有所不由各要其至而已矣象之時舜非不能行權也而九男二女百官牛羊其心方且如窮人無所歸故象憂亦憂象喜亦喜非真智不足也為是以順乎親耳管蔡之時周公非不能用智也而王室初定頑民尚多其心詎忍薄其親耶故始以監殷終以討畔非真仁不足也為是以安王室耳後世若不行太原之賞當豫而不豫以致癡兒之慚忿信虛讓之詞當決而不決以致喋血之大變者其仁與智胥失之矣易明夷利艱貞晦其明也內難而能正其志箕子以之録曰書云我其發出狂吾家耄遜于荒所謂外晦其明也自靖人自獻於先生所謂內守其正也此古之聖人既明且哲以保其身與人之眩其智識而中實不足者不可同日語矣左傳惠公元妃孟子孟子卒繼室以聲子生隱公宋武公生仲子叫子生而有文在其手曰為魯夫人故仲子歸於我生桓公而惠公薨是以隱公立而奉之録曰愚觀隱匱之事譬之嬰兒嬉戲投之果而三與之三取之可為千古之一笑也夫大義之不明與幾事之不密均之為不智也惠公元妃卒則聲與仲皆妾也而掌上之文所當略矧公薨又無治命則隱與桓皆庶也而慕義之名所當逺此義也既不能然則不免小人之窺伺尤當倡明大義追改前失使名正言順本拔源塞則羽父之惡不敢肆而桓亦或安於其分矣此幾也二者皆失而猶怡然不見其禍吾不知隱公之為心也孔子曰人無逺慮必有近憂胡傳亦曰猶辨之弗早辨也其何能淑也夫蔡桓侯卒蔡人召察季于陳季字也蔡侯之弟秋蔡季自陳歸于蔡蔡人嘉之也按何氏蔡封人無子季次當立封人欲立獻舞而疾季季辟之陳封人卒乃歸奔喪無怨心以賢而字之録曰可以止而不止可以速而不速者隱公也豫如無豫奪如無奪者穆公也可以去則去可以止則止可以取則取可以舍則舍者蔡季也夫是而莫不賢智之也莊十一年秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也悖焉桀紂罪人其亡也忽焉且列國有凶稱於禮也言懼而名禮其庶乎既而聞之曰公子御説之亂也臧孫達曰是宜為君有恤民之心録曰臧文仲以宋罪己而興其然乎夫大水之徴君弒之象也與其罪己而獲虛名敦若反躬而逭實禍乎夫通而無禮亂之首也虜而諱惡忌之媒也閔之自侮自伐故天降之辜如影之從響非有心恤民之謂也楚子伐陸渾之戎遂至於雒觀兵於周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎昔夏之有德也逺方圖物貢金九牧鑄鼎象物而為之備使民知神姦故民入川澤山林魑魅罔兩莫能逢之用能協於上下以承天休桀有昏德鼎遷於商載紀六百商紂暴虐鼎遷於周德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎於郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也録曰愚觀王孫滿之智足以有為然而不為者不自強也孟子曰國家間暇及是時明其政刑雖大國必畏之矣詩云逮天之未陰雨徹彼桑土綢繆牖户今此下民或敢侮子楚為無道僭替諸華蛇豕之心虎狼之威夫豈不聞之茍周之君臣誠能貴德尊士而使賢者在位能者在職楚方心服之不暇奈何札子矯命毛蘇亂邦僣殺姦戮辱孔甚矣雖能獲自外之口無以奮自強之謀卒至子朝之奔楚鼎之不鼎亦可見矣伍尚弟員奢之子也楚平王執奢費無極曰奢之子材若在必憂楚國盍以免其父召之必來王使召之尚謂員曰爾適吾我將歸死吾智不逮爾聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也擇任而往智也爾其勉之奢聞員不來曰楚君大夫其旰食乎録曰員之倒行而逆施固未嘗無憾也至於無極吾不知其所責何也夫新臺之玷青蠅之汙小辨之怨殄瘁之憂稔惡至此亦云極矣胡為乎又以其子才而督之報乎欲絶禍本而祇以長之費之亡無日矣知其有吳而為之鼓其興知其有禍而為之扇其瀾員之不奔安在其不奔乎是故無免父之召或可緩伐楚之謀無棠君之奔未必速子胥之去天之好遺理之從響莫可以知其然也通鑑田單者齊宗人子也為臨淄市掾燕人攻安平單使其宗人皆以鐵籠傅車轊及城潰人爭門而出皆以軸折車敗為燕所擒獨單以鐵籠得免遂奔即墨時齊地皆屬燕獨莒即墨未下樂毅乃并右軍前軍以圍莒左軍後軍圍即墨即墨人曰安平之戰田單宗人以鐵籠得全是多智習兵因共立為將以拒燕録曰毅之尅破七十餘城而兩城不能拔其故何歟曰此孟子一言已決何侯諸説之紛紛也夫燕齊之禍久矣其始也罪止一子之耳固無所與於其宗廟社稷也其終也罪止一泯王耳亦無所與於其宗廟社稷也使誅一子之求其所以代子之者固不為齊有也戮一泯王求其所以代泯王者亦不為燕有也奈之何二國之不然也其伐之也不以置君為重而以至燕為利故其報之也亦不以好還為念而以必得為功使如孟子之言則且無樂毅之事而何莒即墨之云哉譬之鄉鄰有訟者舍其心之所冤而持其陰之所重則經歲纍年而不決必待劫而反之而後可理也厥後田單復齊之所有而不鶩燕之所入而後燕齊之禍息是可以為智初不在於鐵籠之計也智果者宣子之弟也初宣子之子瑶將立以為後果曰不如宵也瑶之賢於人者五其不逮者一也美鬚長大則賢射御足力則賢伎藝畢給則賢巧文辨惠則賢疆毅果敢則賢如是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之若果立瑶也智宗必滅弗聼智果乃别其族於太史自為輔氏録曰哲哉智果乎其論瑶也若決蓍龜奈何宣子之不察也夫仁道不明久矣以盧之令令而謂之美且仁則瑶之賢不可謂仁乎然而不察乎其心也則桀非不巧文辨慧紂非不強毅果敢狄非不美鬚長大假非不射御足力而南宫長萬非不技藝畢給也是以仲尼之門無道五賢之事者而惟仁以為之本不仁則百姓不足續為是故歟以三家分晉之時人心亡矣又可居下流哉果之别族為輔氏惡天下之惡歸之也漢書劉德者休侯富之子也少有智略數言事召見甘泉官武帝名之曰千里駒昭帝初為宗正丞遷大中大夫復為宗正雜案上官蓋主事德常持老子知足之計妻死大將軍光欲以女妻之謝不敢娶畏盛滿也常責蓋長公主起居無狀恨之公主孫談遮德自言侍御以為光望不受女承指劾德誹謗詔獄免為庶人光聞而恨之復白召德守青州刺史復為宗正宣帝立以定策功賜爵關內侯又以親親行謹厚封為陽城侯為人性寬厚好施生每行京兆尹事多所平反家産過百萬則以振昆弟賓客食飲曰富民之怨也録曰大學傳曰言悖而出者亦悖而入貨悖而入者亦悖而出戊固悖矣禮亦未為得也不旋踵而延壽遂亡此悖入之患也富之自歸京師不兢闢國可謂愼德矣故其子亦知止足是知吉凶禍福之端乃忠信驕泰之别從古聖賢決之已熟不但老氏而然也漢宣帝元康五年元帝為太子疏廣為太傳受為少傅從昆弟子也太子年十二通論語孝經廣一日謂受曰吾聞知足不辱知止不殆今吾官至二千石宦成名立如此而不去懼有後悔即日俱移病上疏乞骸骨土皆許之加賜黃金二十斤皇太子贈五十斤公卿故人設祖道供張東都門外送者車數百兩道路觀者皆曰賢哉二大夫或嘆息為之下泣歸鄉里賣金置酒請族人故舊賓客相與娛樂或勸廣以其金為子孫頗立産業者廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以供衣食與凡人齊今復增益之以為羸餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且富者衆之怨也吾既無以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎録曰二疏之翻然辭位蓋懲霍光之事其不治産業亦以顯禹雲山之覆轍也是故前乎此者有張安世後乎此者有王吉皆以知足不辱知止不殆以為預知太子之不足恃則二子無是心也又曰簫望之豈可與疏比哉望之以韓延壽代己為馮翊有能名以為出己之上故忌害之欲陷以罪法而二人者方且以子孫之益過生怨為慮又肯與人相訐哉其恭顯陷之亦與延壽一聞耳非帝得而為之也馮野王父奉世為有將軍光祿勳野王復為左馮翊父子並居朝廷議者以為器能宜於其位非因女寵故也及遷大鴻臚出為上郡太守治行稱第一弟立亦為平原太守又代為上郡在職公廉治行略與野王相似而多智有恩貸好為條教吏人嘉美歌曰大馮君小馮君兄弟繼踵相因循𦖟明賢智恩惠民玫如魯衛德化均周公康叔猶二君與弟逡參皆知名當世更治五部所居輒二最迹録曰愚觀君卿兄弟人皆謂賢於泊郡愚尚謂拙於謀身何耶其曰人皆以寵貴我獨以賤者以兄弟皆王舅不得備樞機也嗚呼斯言也未免殉於時乎殆於時不為五侯則為丁傅何可以智稱耶時王綱紊矣逢萌梅福猶懼凂已矧可以濡滯乎此唐之武攸緒所以卓乎其不可及也馬援少時以家用不足辭其兄况欲就邉郡田牧况曰汝大材當晚成良王不示人以朴且從所好遂之北地田牧嘗謂賓客曰文夫立志窮當益堅老當益壯後有畜數千頭穀數萬斛即而嘆曰凡殖則産責其能賑施也否則守錢虜耳乃盡散於親舊聞隗囂好士往從之囂甚敬重與決籌策録曰愚觀馬况之論而嘆大材欲遇良工之難也蓋援生於新莽之時天下無所往矣是故出則為紀唐處則為龔鮑自分其老且窮也豈惟援知之况亦知之向非南陽龍興不終於邊郡田牧乎嗟呼鄧林之産撲不徒生藍田之實價充增重卒之身為將相名垂竹帛女為元妃德冠後宫其成就之晚豈尋常乎哉故士不可以遲速觀之而甘心固守乃丈夫之烈不可以不自重也後漢書東平王少好經書雅有智恩為人美須髯腰帶八圍顯宗甚重之拜驃䮰將軍位在三公上是時中興三十餘年四方無虞王以天下化平宜修禮樂乃與公卿共議定南北郊冠冕車服制度乃光武廟登歌八佾舞數帝每巡侍常留鎮侍衛皇太后在朝數載多所隆益而自以至親輔政聲望日重意不自安上疏歸職乞上印綬退就藩國優詔不許復辭懇切五年許還國而不聼上將軍印綬以驃騎長史為東平术傅掾為中大夫令史為王家郎加賜錢二十萬布十萬匹録曰夫自周室既往姬召亦衰漢興以來宗室子弟無得在公卿位者顧乃率任外戚然則母之親屬俞於久之同氣乎凡此皆之其所親愛好樂而辟焉者由是身不修而家不齊國不可得而治天下不可得而平而禍亂交作矣聖人戒之於前西漢蹈之於後僅而改弦易轍章和以後漸如昔矣李固之女文姬同郡趙伯英妻也賢而有智固既策罷文姬知不免禍悲曰李氏滅矣直太公已來積德纍仁何以遇此固有少子燮乃密謀藏之頃之難作二兄受害文姬告父門生王成曰先公有古人之節因君執義今委以六尺之孤李氏存滅其在君矣成感其義遂將燮乘江東下入徐州界燮姓名為酒家傭而成賣卜於市各為異人陰相往來燮從受學酒家異之以女妻燮專精經學十餘年間梁冀既誅災青屢見史官上言宜有赦令當存録大臣冤死者子孫於是大赦天下並求固後燮乃以本末告酒家得還鄉里姊弟相見悲感傍人既而戒燮曰先公正直為漢忠臣而今朝廷傾亂梁冀肆虐令吾祖宗血食將絶今弟幸而得濟豈非天邪宜杜絶衆人勿妄往來愼無一言加於梁氏唯引咎而已燮謹從其誨録曰愚觀李文姬之智與蔡文姬之慧可同日語哉哲以自固曰智𦖟以悅人曰慧二姬之頓異人已之攸分也雖然固之質禍不為不深姬之慮禍不為不切卒奈何父既不肯立帝子復不肯立王何物不懲乃至於此若燮者豈惟世載弦直可謂載錫之光者乎弘道録卷之四十四
