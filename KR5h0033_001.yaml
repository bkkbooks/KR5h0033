  text: 弘道録經一
  hash: sha256:ba7044e3290ffd39cf4a0574d1684186138d28a3d27375c7de8e30e534136e58
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_001-001a, image: hfl/1067/1067-004.png}
body:
  text: 仁君臣之仁孔子曰大哉堯之為君也巍魏乎惟天為大惟堯則之蕩蕩乎民無能名焉録曰堯之為君千古綱常之主夫子之論萬世稱述之宗也大哉者至極而無以加之名也亦至變而不可窮之㫖也天者仁覆憫下之謂也王者體仁長人之謂也仁道至大與天同體而聖人以天為體夫苟以天為體乃人人而悅之物物而周之是或可以言語形容也或可以言語形容則必有所止息必有所窒礙非所謂之大也是故天惟大則全體不息而所以位乎上者人莫得以知其高深蓋曰天之所以為天也堯惟大則德合無疆而所以配乎天者人莫得以窺其限量蓋曰堯之所以為堯也夫子峻發其言以見君人者必有包含廣覆無不周遍之心而後有博厚高明悠久無疆之業斯無負于天無愧于堯且無忝于夫子之論矣故録首發明之外記堯存心於天下加志于窮民一民饑曰我饑之也一民寒曰我寒之也一民有罪曰我陷之也百姓戴之如日月親之如父母仁昭而義立德博而化廣故不賞而民勸不罰而民治録曰此所謂堯仁如天也今夫天斯巍巍乎耳苟求其故而一物罔于真大空而已天烏用哉今夫堯斯蕩蕩乎耳苟求其故而一夫不被亦虛名而已堯烏用哉録恐忽于實務徒事高遠而曰堯在是焉嗚呼邈矣堯典曰克明峻德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民于變時雍録曰夫子之贊堯曰巍巍史臣之贊堯曰峻德皆至極而無以加者也然不越以親九族平章百姓非有神運于上甚高難行之事而所以謂之放勳者正此之謂也觀者詳之列子堯治天下五十年乃游于康衢聞童兒歌曰立我蒸民莫匪爾極不識不知順帝之則又有老人含哺鼓腹擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝力于我何有哉録曰此可見黎民于變時雍也夫童子無知老人耄矣安知所謂帝則耶蓋上古盛時雖愚夫愚婦不啻家人父子其德漸于飢膚淪于骨髓不自知其言之若是乎三代由此遂採里巷歌謡之詞著為定制列于樂官被于管弦觀于風化周詩曰民之質矣日用飲食群𥠖百姓遍為爾德正此意也至秦而後槩以黔首為愚于是杆格以至于今也可恨哉孔子曰無為而治者其舜也歟夫何為哉恭己正南面而已矣録曰孔子以大哉贊堯以無為稱舜其意何居天一而已以其全體無疆而言謂之大以其無聲無臭而言謂之無人但見日而為晝月而為夜寒而為冬燠而為春何莫非天之運動也而安能窺其形乎舒而為恩而為威賞而為豫刑而為奪何莫非君之設施也而安能見其跡乎堯與舜名雖有二實則一也夫苟紛紛然曰堯之成功巍然如是堯之文章焕然如是我何為而不可則見其勞而不見其逸見其大而不見其泰烏能恭己南面耶而不知舜之時未能外堯以為治未能外堯以為治亦未能外堯以為心矣心豈可一物加之哉惟不能以一物加之于心故不見其一毫措之于外此所謂篤恭而天下平之盛非若聲色之于以化民末也故再言夫何為哉所以深致其贊美也歟臯陶曰帝德罔愆臨下以簡御衆以寬罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心録曰舜之為舜始終本末具見于此蓋居上以寬為本待人以厚為本臨民以恩為本矜死以哀為本苟無其本則以何者而恭己南面乎後世惟漢之文帝宋之仁宗庶幾近之然而功效未臻于唐虞者無臯陶之邁種與之共理何以責其身修思永庶明勵翼哉此又不可不知家語舜之為君也其政好生而惡殺其任授賢而退不肖德若天地而靜虛化若四時而布物也是以四海承風暢于庶類鳳翔麟至鳥獸馴德無他也好生故也録曰夫子之贊舜至矣又曰無他也好生故也其意何居蓋王者廣昊昊之德篤生生之思者也天有四時主于生物而不主于戕物所以肅殺于秋閉塞于冬者正欲以翕聚發散于無窮也君有八柄主于養民而不主于殘民所以除惡務嚴禁暴務威者正欲以保全愛謢于無已也是故常誅四凶矣雖天下咸服其辜而舜之心油然如不得已也臯陶執之士師讞之雖未嘗不出于舜而實非其本心也故曰天下殺之也非舜得而殺之也如此則何害于好生之德哉設使舜之心或主于一臯陶曰可殺吾乃生之生之似仁已如民害何害民非天也士師曰不可殺吾乃殺之殺之似威己如心害何害心非德也故曰與其殺不辜寧失不經好生之德洽于民心舜彈五弦之琴歌南風之詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮録曰堯之時浩蕩渾涵譬如天地之無不持載無不覆幬故帝力何由而知舜之時薰蒸洋溢若風之鼓物吹噓橐籥無不周遍故亦知有愠可解有財可阜然皆得之于心而應之于手有不期然而然者以是播于韶樂夫安得而不盡善盡美耶夏后氏敏給克齊其德不爽其仁可親録曰堯舜禹皆大聖人也家語稱各不同蓋堯素履君位萬古特尊舜禹嘗起側微親民之事不可與如天等也吾夫子立言之意固自有在虞書德惟善政政在養民水火金木土穀惟修正德利用厚生惟和録曰禹何以敏給克齊哉夫洪水滔天下民塗炭正由五行不能相克水火不能既濟天乃錫禹洪範九疇使禹不能敏以從事損其有餘益其不及務俾齊給則彝倫何由叙哉所謂六府三事即洪範皇極而其仁可親莫過于此周頌思文后稷克配彼天粒我蒸民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏録曰此所謂極即大學之至善也蓋天以生物為心其陰陽二氣乾道坤道何所不用其極乎苟有一毫之未至一息之未仁則不足以生物而不得謂之天矣聖人以養民為心其亘之秬秠亘之糜芑何所不要其至乎苟有一物之不遍一土之不宜則不足以養民而不得謂之稷矣此仁之至極非周公莫能知之而尊祖配天之祭所由以義而興起也孟子曰人之有道也飽食暖衣逸居而無教則近于禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之録曰夫魚鱉不可以為命木石不能以厚生禽獸不足以興治胥於陷溺者也故民不食則飢營窟則勞然而良心之天固自若也苟無教則人心貿貿焉人欲肆而天理窒舉天下含齒戴髮之流而反不如角者鬛者瓜而牙者之無以難也何也彼角者止于觸而已鬛者止于逸而已爪而牙者止于噬而已若人而無天理以為之制人欲以為之防則其反覆狙詐殘民害物有不可勝言者矣然後知玄王為法于天下可傳于後世非但曰小補云爾其祀殷配天不亦宜乎虞書曰臯陶邁種德德乃降黎民懷之録曰夫臯陶之德何以謂之邁種耶蓋刑者民之心也大則軀命關焉小則廉耻係焉其加于民至切而入人至深民之畏之甚于水火也夫苟雖知其重而或攝嫌避疑逡巡畏縮則不可謂之邁亦有雖得其情不能哀矜勿喜期于無刑則不可謂之種一毫無所壅之謂邁一毫無所拔之謂種此民協于中無以異于三聖為粵若稽古不嫌同辭也歟益贊于禹曰惟德動天無遠弗届滿招損謙受益時乃天道至誠感神矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格録曰禹何以有是征乎地平天成遐邇一體不可使一夫不被堯舜之澤也益何以有是贊乎成允成功不日滿假不可以一事而存矜伐之心也此至仁之澤垂之萬世尚有餘馥焉今之君子不可不知啇書曰克寬克仁録曰寬者以言乎其量也寬可以加于仁乎邵子曰三王之世如秋如秋凄如也不免于肅殺之威矣故以二字贊湯所謂代虐者歟史記湯出見人張網四面而祝之曰從天墜者從地出者從四方來者皆罹吾網湯解其三面止置一面更祝曰欲左者左欲右者右欲高者高欲下者下不用命者乃人吾網漢南諸侯聞之曰湯仁至矣及禽獸歸之者四十餘國録曰此可見其克寬也夫湯伐夏救民者也今觀其言曰欲左者左欲右者右不用命者乃入吾網嗚呼於物且然矧行一不義殺一不辜而得天下為之乎後世亦有禁捕鳥雀立放生之碑者何以不能服人耶孟子曰親親而仁民仁民而愛物湯以懋昭大德建中于民故因其及物之仁遂致人歸之衆倘為仁之功未至偶有一念之施而遽期其效甚者役心于慈悲殉志於清淨專以不殺為德好道為仁則亦徒然而已此録之意也大學曰穆穆文王于緝熙敬止為人君止于仁録曰上天之載無聲無臭仁至難言可以淺近求之乎肇端于念慮之𥯋至微而不可見也及其至也天下莫能載焉至遍而不可窮也智周乎萬物而不出于本心之中道濟乎天下而不外于一腔之內此為人君者止于仁也抑詩以穆穆稱文王也章又表而出之曰天子穆穆其與諸侯皇皇何不侔也天子者如天運于上天惟深遠而不可測故能神其鼓舞有不疾而速不行而至之機君惟深遠而不可測故能極其慘舒有不大聲色不長夏革之妙設使一鼓而雷一潤而雨皆能知之則人將不貴之矣一指而怒一激而喜皆能識之人亦何畏之有哉此詩人之深意不可以不知也孟子曰文王視民如傷録曰此止于仁之心也孟子曰人皆有不忍人之心是心也其視民如傷之心乎哉曰文王之時未有瘡痍者也亦未有呻吟者也矧惠鮮懷保不啻其至何至如傷乎而不知大聖人未嘗自以為然也夏暑雨小民惟曰怨咨春祈寒小民亦惟曰怨咨不特此耳天地之大也人猶有所憾然則文王之心安得而不切切哉此漸民以仁至于淪肌浹髓非可以一朝一夕求之也昔者文王之治岐也耕者九一仕者世祿關市譏而不征澤梁無禁罪人不孥老而無妻曰鰥老而無夫曰寡老而無子曰獨幼而無父曰孤此四者天下之窮民而無告者也文王發政施仁必先斯四者詩云哿以富人哀此煢獨録曰此止于仁之事也所以謂文王以百里非必為天子也方百里之岐而八百年之施為氣象舉在其中此非為政于天下乎乾稱父坤稱母民則吾同胞也雖有煢獨鰥寡之殊而聖人視之若身之有癢痾焉已之有疾痛焉雖欲釋之誰得而釋之雖欲後之誰得而後之人惟不能肖天地之德帥天地之性是以賊虐無辜播棄黎老以自絶于天而不自知也豈不哀哉周南魴魚頳尾王室如燬雖則如燬父母孔邇録曰此止于仁之效也紂居天位為天子天子作民父母勢可以生殺權可以廢置而其向背之情乃如此苟求其故所欲與之聚之所惡勿施爾也故曰桀紂之失天下也失其心也然則文王豈能招而來之推而去之哉觀乎人心則見天心觀乎民命則見天命而已矣周頌綏萬邦屢豐年録曰此聖人以仁事天之實天心感應之至非或者文飾之辭也然則周饑克殷而年豐果何所由乎紂為天下逋逃主所任用非剖尅聚斂則疆禦暴虐天心之厭惡不啻雷電之威豈必擇人而施其擊搏乎是故周之饑商之烈也及夫婦馬華山之陽放牛桃林之野黎民復業良善得生以稷之耕稼教商之遺民是故殷之安周之福也此録外意也通鑑交趾南有越裳氏重譯而獻曰道路遙遠山川阻深恐一使不通故重三譯而來朝周公曰德澤不加君子不饗其質政令不施君子不臣其人譯曰吾受命國之黃耇曰天之無烈風淫雨海不揚波已三年矣意者中國有聖人乎盍往朝之周公歸之于王稱先王靈神致薦于郊廟録曰此書契以來所僅見者不知當時何以致此乎中庸曰是以聲名洋溢于中國施及蠻貊丹車所至人力所通天之所覆地之所載日月所照霜露所墜凡有血氣者莫不尊親故曰配天聖神功化之極故有此應也夫周家積功纍仁干有餘年以至文武成康之際真元會合天地于此而交萬物于此而泰上而三光日月明風雨時下而九州山不童川不竭進而在疆嘉禾生岐麥至退而在郊鳳凰鳴麒麟出則遠而八荒寧無重譯來王之事乎此聖人至德淵微自然之應不然白狼白雉何益於浸衰稽首呼韓何補於不振至莽加之以褒頌祗為篡竊之媒爾可同日語哉召伯巡行南國以布文王之政或舍甘棠之下其後人思其德故愛其樹而不忍傷曰蔽芾甘棠勿剪勿伐召伯所茇蔽芾甘棠勿剪勿敗召伯所憩蔽芾甘棠勿剪勿拜召伯所說録曰愚觀甘棠之詠而知政教之入人與夫恩澤之及物譬之和風焉播于春煦之時而人不以隆冬之閉塞少之也譬之甘雨焉沛于長養之日而人不以大旱之枯稿忘之也今去召公之時不知其幾何而誦其書讀其詩宛然遺恩之在曰不知生於其世者又將何如此君子所以油然于不忍人之政歟南國諸侯遵召伯之教服文王之化能修身齊家以治其國而其仁民之餘恩又有以及於庶類故詩人美之曰彼茁者葭一發五豝于嗟乎騶虞彼茁者蓬一發五豵于嗟乎騶虞録曰以愚觀于二南之世其君則麟也臣則騶虞也士則羔羊也民則公侯也胡其和氣之充塞乎夫和者天地之心而神明之德也人主和德於上百僚和集于下則萬物之和有不期然而然者故君暴虐則臣梟獍矣君枳棘則臣鷹鸇矣而國有蠻髦野有兕虎安在其草木之茂禽獸之多乎明永樂二年周王獻騶虞儒臣作頌亦如此繫辭天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財録曰從古以來言仁者多矣吾夫子始密察之乾稱父坤稱母非有聖人成位乎中則天地何由而位萬物何由而育故德不可以徒而視也必能體仁然後足以長人故位不可以虛而拘也財者民之心得其民斯得天下故仁不可以泛而施也蓋潔矩則曰仁放利則曰怨一言以蔽之只在公私之間而已矣哀公問政子曰文武之政布在方策其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也故為政在人取人以身修身以道修道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也智仁勇三者天下之達德也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也哀公曰夫子之言美矣至矣寡人實固不足以成之也子曰好學近乎知力行近乎仁知耻近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體群臣也子庶民也來百功也柔遠人也懷諸侯也修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體群臣則士之報禮重子庶民則百姓勸來百工則財用足柔遠人則四方歸之懷諸侯則天下畏之齊明盛服非禮不動所以修身也去讒遠色賤貨而貴德所以勸賢也尊其位重其祿同其好惡所以勸親親也官盛任使所以勸大臣也忠信重祿所以士也時使薄斂所以勸百姓也日省月試既禀稱事所以勸百工也送往迎來嘉善而矜不能所以柔遠人也繼絶世舉廢國治亂持危朝聘以時厚往而薄來所以懷諸侯也凡為天下國家有九經所以行之者一也凡事豫則立不豫則廢言前定則不跲事前定則不困行前定則不疚道前定則不窮在下位不獲乎上民不可得而治矣獲乎上有道不信乎朋友不獲乎上矣信乎朋友有道不順乎親不信乎朋矣順乎親有道反諸身不誠不順乎親矣誠身有道不明乎善不誠乎身矣誠者天之道誠之者人之道也誠者不勉而中不思而得從容中道聖人也誠之者擇善而固執之者也博學之審問之愼思之明辨之篤行之有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗惜也有弗行行之弗篤弗措也人一能之己百之人十能之己千之果能此道矣雖愚必明雖柔必强録曰為政在人而不由于學問可乎此其所以首出百王卓冠群倫者抑吾夫子之論政達道達德九經也後世之論政約法律令條章也以為論語四字終身未盡亦有貞觀一編千古冠越者于此可以鑒矣孟子曰人皆有不忍人之心先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上所以謂人皆有不忍人之心者今人乍見孺子將入于井皆有怵惕惻隱之心非所以內交于孺子之父母也非所以要譽于鄉黨朋友也非惡其聲而然也録曰夫所謂之忍者以刃加于心而曰忍心非可刃也有形之鋒可避無形之鍔難當也是故齊宣王不忍一牛之死至毁人宗廟遷人重器繫人旄倪孰可忍哉梁惠王不忍其民之饑至東敗于齊西喪于秦南辱于楚又可忍哉蓋孟子之時去古又遠天下紛紛大亂其于怵惕惻隱之心蕩然鮮矣雖爭以千言萬語皆為是心所奪若非吃緊以其良心真切之處人人可得而驗者觀之則亦何益之有哉此赤子入井之論發前聖所未發不可以不録也滕文公問為國孟子對曰民事不可緩也詩云晝爾于茅宵爾索綯亟其乘屋其始播百榖民之為道也有恆産者有恆心無恆産者無恆心苟無恆心放辟邪侈無不為已及陷于罪然後從而刑之是罔民也焉有仁人在位罔民而可為也是故賢君必恭儉禮下取于民有制夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者籍也夫世祿滕固行之矣詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人倫明于上小民親于下有王者起必來取法是為王者師也詩云周雖舊邦其命維新文王之謂也豫力行之亦以新子之國使畢戰問井地孟子曰子之君將行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均榖祿不平是故暴君污吏必慢其經界經界既正分田制祿可坐而定也夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子請野九一而助國中什一使自賦卿以下必有圭田圭田五十畝餘夫二十五畝死徒無公鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦方里而井井九百畝其中為公田八家皆私百畝同泰公田公事畢然後敢治私事所以别野人也此其大略也若夫潤澤之則在君與子矣録曰孟子告文公以仁一之法猶有子告哀公以盍徹也而文公遂能使畢戰問井地則其天資之美較之哀公可謂天淵矣自書契以來論仁政者莫詳于此然而君子未嘗不憮然嘆惜者嗟乎非言之艱行之惟艱三代之于後世何以異哉聖賢之法言猶匠氏之繩墨醫師之方術也不欲為方圓則亦已矣如貝欲為方圓也而曰我般輸其可哉不欲為針砭則亦已矣如其欲為針砭也而曰我盧如其可哉故曰有王者起必來取法是為王者師也聖賢之究心如是而已豈若後世刻意于成功期效于旦暮者同日語哉禮記月令立春之日天子親帥三公九卿諸侯大夫以迎春于東郊還反賞公卿大夫于朝命相布德和令行慶施惠下及兆民是月也天氣下降地氣上騰天地和同草木萌動王命布農事以教道民乃修祭典犧牲毋用牝禁止伐木恐覆巢毋殺孩蟲胎夭飛鳥毋麝母卯毋聚大衆毋置藏槨掩骼埋胔是月也不可以稱兵稱兵必有天殃兵戎不起不可從我始無變天之道毋絶地之理毋亂人之紀録曰以月令終焉者世降凌夷仁道荒蕪君德頽敗惟聖人上奉天道下盡人事而在我亦以預養是心而廣為仁之術也
