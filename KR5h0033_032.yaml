body:
  text: 智君臣之智三國志琅琊諸葛亮寓居襄陽隆中躬耕畎畆好爲梁父吟每自比管仲樂毅時人莫之許也司馬徽清雅有知人之鑑同郡龐德公素有重名德公常謂孔明爲卧龍德操爲氷鑑故劉備在荆州訪士於司馬徽徽曰儒生俗士豈識時務識時務者在乎俊傑此間自有伏龍鳳雛備問爲誰曰諸葛孔明也録曰愚觀諸葛孔明乃知東京所養不可以易而得也人徒見黨人戮辱以爲仁賢之禍而不知顧厨俊及乃長清德之風至孔眀能知靜以脩身儉以養德非淡泊無以明志非寧靜無以致逺斯非龍德而隱者乎又曰學須靜也才須學也非學無以廣才非靜無以成學非終日乾乾者乎又曰慆慢則不能研精險躁則不能理往年與時馳意與歲去又非夕惕若厲者乎當時謂之卧龍良有以也然則三顧之勤乃作新久錮之氣而時務之識其好遺標榜之稱也歟備詣亮因屛人曰漢室傾頽姧臣竊命主土蒙塵孤不度德量力欲信大義於天下而智術淺短遂用猖獗至于今日然志猶未已君謂計將安出亮答曰自董卓以來豪傑並起跨州連郡者不可勝數曹操比於袁紹則若㣲而衆寡然操遂能克紹以弱爲强者非惟天時抑亦人謀也今操已擁百萬之衆挾天子以令諸侯此誠不可與爭鋒孫權據有江東已經三世國險而民附賢能爲之用此可與爲援而不可圖也荆州北據漢沔利盡南海東連吴會西通巴屬此用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之土高祖因之以成帝業劉璋闇弱張魯在北民殷國富而不知存恤智能之士思得明君將軍既帝室之冑信義著剠四海縂攬英雄思賢如渴若跨有荆益保其巖阻西和諸戎南撫夷越外結好孫權内脩政理天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆以出秦川孰不簟食壺漿以迎將軍者乎誠如是霸業可成漢室可興矣先主曰善録曰愚觀孔明之告玄德與收用巴蜀還定三秦天下可圖同一見也而不能恢復帝業何耶蓋高祖之時三傑並用其禽魏取代仆趙脇燕東擊齊南㓕楚皆信之功也觀其言曰多多益善則與刺顏良誅文醜者大有間矣今發蹤指示固斯人也擊兔伐狐亦斯人也世豈能並濟哉加以操之用兵彷彿孫吴而區區之蜀終老雲喪誰能爲之巨臂甫孔明能走仲達或亦晚矣此高祖所以嘆公知其一未知其二也孫權謂吕蒙曰卿今當塗掌事不可以不學蒙辭以軍中多務權曰孤豈欲卿治經爲博士耶但當涉獵見往事耳卿言多務孰若孤孤嘗讀書自以爲大有所益蒙乃始就學及魯肅過潯陽與蒙論議大驚曰卿今者才略非復吴下阿蒙蒙曰士别三日即更刮目相待大兄何見事之晚乎録曰古之學何爲乎美質易得至道難聞學之所以爲誠也爲信也今之學何爲乎事欲求可功欲求成學之所以爲欺也爲詐也是故孫權未勸之前良心未鑿天理尚存何能見其刮目吕蒙既學之後役智任數呈功計能非復吴下阿蒙矣然則非子明之受益乃雲長之當損乎孫權與陸遜論周瑜魯肅及蒙曰公瑾雄烈膽略兼人遂破孟德開拓荆州邈焉寡儔子敬因公瑾致達於孤孤與宴語便及大略帝王之業此一快也後孟德因獲劉琮之勢張言率數十萬衆水步俱下孤請諸將咨問所宜無適先對至張子布言宜遣使迎之子敬勸孤急呼公瑾付任以衆逆而擊之此一快也後雖勸我借玄德地是其一短不足以損智量淺狹是以不能知之也夫平吴之役其造謀定議發跡指示者預也諸將徒能得走獸耳故嘗身不跨馬射不穿札非其驕貴之靡乃由博學多通耽思經籍所造益深故有善不伐有勞不施耳而安不忘危之一言足以超于衆見豈徒濬與渾之不如華與詭亦莫能及矣安能終損立功立言之本歟嗚呼可以法矣唐書太宗謂蕭瑀曰朕少好弓矢得良弓千數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脉理皆邪弓雖勁而發失不直朕始悟曏者辨之未精也朕以弓矢定四方識之猶未能盡况天下之務其能偏知乎乃命京官五品以上更宿中書内省數延見問以民間疾苦及政事得失録曰古者工執藝事以諌其此之謂與弓工輪扁至今猶且稱之以其言之曲盡而且逹於事理不可以不察也是故木心不正則脉理皆邪君心不正則治道皆茍弓工之所見殆王魏之不若歟太宗徒得其言而不得其所以言但能延問疾苦得失之所由而不能加愼於寡妻兄弟之所獨非好問用中之比也上問魏徴曰人主何爲而明何爲而暗對曰兼聼則明偏信則暗堯清問下民故有苗之其二長故孤常以比方鄧禹也子明少時孤謂不辭劇易果敢有膽而已及身長大學問開益籌略奇至可以次於公瑾圖取関羽勝於子敬録曰愚觀破虜之言何其不情哉公瑾之成功一葦蜀君臣有以激之也不以爲思而反以爲誚如是尚可釋琮而不擊乎來而不取反爲人借以借者爲短則借之者何如也甚矣權之爲漢賊也至其巧於用詭以襲関羽不啻掩人之盗以爲勝於子敬克其類於穿窬之事猶可爲之何恠乎稱說天命媚於瞞賊乎晋書杜預以天下雖安忘戰必危勤於講武脩立泮宫江漢懷德化被萬里攻破山夷錯置屯營分據要害之地以固維持之勢又修召信臣遺跡激用滍淯諸水以浸原田萬餘頃分疆刊石使有定分公私同利衆庶賴之號曰杜父舊水道唯沔漢達江陵千數百里北無通路又巴丘湖沅湘之會表裏山川實爲險固荆蠻之所恃也預乃開楊口起夏水達巴陵千餘里内瀉長江之餘外通零桂之漕南土歌之曰後世無叛由杜翁孰識智名與勇功録曰夫智名勇功人誰不慕而欲識之哉書曰有其善喪厥善矜其名喪厥功人惟惡得以上聞舜明四日達四聰故共鯀驩兜不能蔽也二臣偏信趙高以成望夷之禍梁武偏信朱异以取臺城之辱煬帝偏信虞世基以致彭城閣之變是故人君兼聼廣納則貴臣不得壅蔽而下情得以上通也上曰善録曰離之爲卦也明兩作故爲文明之象明夷之卦也明入地中故爲幽暗之象此兼聼偏信之所由分也以是爲訓猶有信楊國忠以成天寳之難信盧𣏌以啓建中之亂信李訓鄭注以致甘露之變者上問房玄齡蕭瑀曰隋文帝何如主也對曰文帝勤於爲治每臨朝或至日昃五品以上引坐論事衛士傳餐而食雖性非仁厚亦勵精之主也上曰公得其一未知其二文帝不明而喜察不明則照有不通喜察則多疑於物事皆自决不任羣臣天下之廣一日萬幾雖後勞神苦形豈能一一中理羣臣既知上意唯物取决受成雖有愆違莫敢諫爭此所以二世而亡也朕則不然擇天下賢才寘之百官使思天下之事關由宰相審熟便安然後奏聞有功則賞有罪則刑誰敢不竭心力以脩職業何憂天下之不治乎因敕百司自今詔敕行下有未便者皆應執奏毋得阿從不盡己意録曰帝之言其君人之規鑒歟夫不明而喜察後世之通弊也是非不可以一人掩而惟憑己之可否則是非亂矣善惡不可以一人决而惟恣己之好惡則善惡惑矣功罪不可以一人斷而惟私己之與奪則功罪淆矣是故以不明自諉而責成於人猶可言也以苛細自任而動疑於物不可言也天下至大而心思之所量者小兆民無窮而耳目之所及有限也故己有不便而令百司執奏則己無偏重之患矣人有未知而能選賢任能則人無廢事之憂矣此貞觀之治庶幾可稱後之人君其諸念之哉房玄齡明達吏事濟以文學夙夜盡心惟恐一物失所用法寬平聞人有善若己有之不以求備取人不以己長格物與如晦引拔士類常如不及至於臺閣規模皆二人所定上每與玄齡謀事必曰非如晦不能决及如晦至卒用玄齡之策蓋玄齡善謀如晦能斷二人深相得同心狥國故世稱賢相者推房杜焉録曰愚觀唐之房杜與漢之良平不同足未見其躡耳未見其附而史稱善謀何也曰此善藏其用者也夫以唐之太宗視漢之高祖其豁逹大度有不同也是故以帝之神采英發舉世皆拜下風使爲房杜者畫一策則挾爲己長運一籌則伐爲己有如良平之自見豈能始終其業哉今上與玄齡謀事必曰非如晦不能斷及如晦至卒用玄齡之策君臣朋友之間豈非善藏其用者哉上謂長孫無忌等曰人苦不自知其過卿可爲朕明言之對曰陛下武功文德臣等將順之不暇又何過之可言上曰朕問公以己過公等乃曲相諛說朕欲面舉公等得失以相戒而改之何如皆拜謝上曰長孫無忌善避嫌疑應物敏捷决斷事理古人不過而緫兵攻戰非其所長高士廉涉獵古今心稍明逺臨難不改節當官無朋黨所乏者骨鯁規諫耳唐儉言辭辨捷善和解人事朕三十年遂無言及於獻替揚師道性行純和自無愆違而情實怯懦緩急不可得力岑文本性質敦厚文章華贍而持論恒據經逺自當不負於物劉泪性最堅貞有利益然其意尚然諾私於朋友馬周見事敏速性甚貞正論量人物直道而言朕比任使多能稱意褚遂良學問稍長性亦堅正毎瀉忠誠親附於朕譬如飛鳥依人人自憐之録曰帝之始也欲聞已過而及群臣其終也遍舉群臣而忘己過至他日之評魏武乃曰臨危制勝料敵設奇一將之智有餘萬乘之才不足嗚呼合而觀之可以見帝之失得矣又何必曲相諛說哉德宗詔郭子儀還以李光弼代之士卒涕泣遮中使請留子儀子儀紿之曰我賤中使耳未行也因躍馬而去光弼以騎五百馳赴東都夜入其卑兵馬使張用濟與諸將謀以精銳突入東京逐光弼請子儀命其士皆被甲上馬以待康元寳難曰君以兵請令公朝廷必疑此令公諷君爲之是破其家也郭氏百口何負於君而爲此乎用濟乃止録曰宋岳飛之班師與郭令公之躍馬其意正同而老儒經生或責以將在軍君令有所不受宜待中原克復而後聼命其歟用濟之謀何以異哉宋史太祖皇帝未嘗爲學晩好讀書然性豁逹不事矯餙京城新宫成御正殿坐令洞開諸門皆端直軒豁無有壅蔽因謂左右曰此正如我心少有邪曲人皆見之矣又嘗謂宰相薛居正等曰古之爲君鮮能正心自致無過之地朕嘗夙夜畏懼防非窒慾庶幾以德化人之義如唐太宗受人諫疏直詆其失曾不愧耻豈如不爲之而使臣下無間言哉録曰虞書之人心惟危非與慾也中庸之不覩不聞戒與愼也帝之胸次可與玩於千仞高明之上夫何間然之有哉以唐太宗能受書言尚爲憎耻矧於餙非文過者乎後世無能及矣太宗勤於爲學每臨朝後觀書自己自申然後釋卷詔史館脩太平御覽一千卷日進三卷宋琪等以勞瘁爲諫帝曰開卷有益不爲勞也朕欲周歲讀徧是書耳録曰帝王之學與經生異竊以爲絰生亦當體認性情傳求理趣至於誇多鬥靡徒勞而無益也若太祖之於二與不惟能讀而又能行繼世之後所當取法乃脩太平御覽之書支離破碎無禆實用雖日進三卷果何益哉宜乎田錫之不取也田錫耿介寡合多智好禮嘗奏舊有御覽但分門事類無益聖心臣請别爲御覽又集經史切要之言爲御屛風置扆座之側庶治亂興亡之鑒常在目矣其御覽序曰聖人之道布在方册六經則言高指逺非講求討論不可測其淵深諸史則迹異事殊非參會異同豈易記其繁雜子書則異端之說勝文集則宗絰之詞寡非獵精義以爲鑒戒舉綱要以觀會通爲日覽之書資日新之德則雖白首未能窮也御屏風序曰古之帝王盤盂有銘几杖有戒蓋起居必覩而夙夜不忘也臣毎覽經史子集取其語要輙用進獻日夕觀省則聖德日新與湯武比隆矣録曰愚觀漢宋二祖皆未嘗爲學而能不失帝王之範團唐宋二宗皆攻苦博學而反不免後世之譏議何也豈非所務於博聞强記而不切近於格物致知故其所就亦止於文詞字畫而不關於誠意正心乎眞宗徒能嘆美田錫以爲天奪之速不能盡力章疏以收直諌之功何况一屏風之置哉雖别爲御覽亦從然矣趙普少習吏事寡學術太祖勸其讀書遂手不釋卷每歸私第圍户啓篋取書誦之竟日及次日臨政處决如流既卒家人發篋取書視之則論語二十篇也常謂帝曰臣有論語一部以半部佐太祖定天下以半部佐陛下致太平李沆嘗讀論語或問之沆曰沆爲宰相如論論中節用而愛人使民以時尚未能行聖人之言終身誦之可也録曰趙忠獻之讀論語可謂侈然自負矣然不知虎兕出柙玉毀櫝中是誰之過所以舍曰欲之而必爲之辭也李文靖之讀論語可謂歉然自損矣然實能居之無倦行之以忠所以夫人不言言必有中也嗚呼若人也其所先見謂之智其所不欺謂之仁兼以終身誦之謂之勇觀於聖言豈非不憂不惑不懼者歟及沆爲相王旦乃𠫵政事以西北用兵或至旰食嘆曰安能坐致太平優游無事耶沆曰少有憂勤足爲警戒他日四方寧謚朝廷未必無事旦不以爲然沆又日取四方水旱盗賊奏之旦以爲細事不足煩上聼沆曰人主少年當使知四方艱難不然血氣方剛不留意聲色犬馬則土木甲兵禱祠之事作矣吾老不及見此叅政他曰之憂也沆没後眞宗以契丹旣和西夏納款遂封岱祠汾大營宫觀蒐講墜典靡有暇日旦親見王欽若丁謂等所爲欲諫則業已同之欲去則上遇之厚乃以沆先識之逺嘆曰李文靖眞聖人也當時遂謂之聖相録曰自商書聿求元聖之後孰有稱聖相者哉沆之先智洞若筮龜終宋之世一人而已沆應接賓客常寡言外議以爲無口匏弟維乘間爲言沆曰吾非不知也然今朝廷大小之臣皆得言事上封論奏了無壅蔽及下有司皆得見之若邦國大事如李宗諤趙安仁皆時之英秀與之談論猶不能啓發吾意自餘通籍之子坐起拜揖尚周章失措即席必自論功勗以希寵奬此有何策而與之接語哉苟屈意妄言即世所謂籠簟籠罩之事僕未能也録曰愚觀沆之所言莫不曲盡後生之情狀其稱籠簟乃外示虚文中無實意果於世俗之態極爲親切乃知聖相之智無不知也然則人豈可僥倖於市童之憐而甘心於識者之鄙耶陳恕久領三司眞宗初即位常命條具中外錢穀之數以聞恕久不進屢詔趣之對曰陛下富於春秋若使知府庫充實恐生侈心故不敢以告帝嘉之録曰恕以心計任職本無足列然帝之侈心彼窺之已熟使恕而在天書之詳必不肯爲且不足以望之矣録之曹彬克江南歸蕭然行李惟圖籍衣衾而已閣門進榜子云奉勸差往江南勾當公事回還時人嘉其不伐初彬之伐唐也帝謂曰俟克李煜當以卿爲使相潘美預賀彬曰不然是行也仗天威遵廟謨吾何功哉况使相極品乎美曰何謂也彬曰太原未平耳及還獻俘帝曰本授卿使相然劉繼恩未下姑少待之美視彬㣲笑帝誥之美以實對帝亦大笑乃賜彬錢五十萬彬退曰人生何必使相好官不過多得錢耳至是乃拜樞密使録曰彬之智識而可少哉以馬援而有梁松之謗以王濬而有周浚之書君子居功之際不可以不愼也雖然彼拔劍撃柱攘臂奮拳尚不能止區區使相曽無足介詩不云乎不忮不求何用不臧彬之與美可謂交相得矣張詠知益州時民訛言有白頭老翁午後食人一郡囂然公訪於市肆乃𡚖明人言之遂詠其人即日帖然諭人曰妖訛之興沴氣乘之妖則有形訛則有聲止訛之術在乎識斷不在獻勝又方兵火之餘人懷反側一日合軍大閱衆始出忽嵩呼者三公亦下馬東望呼萬歲復攬轡行衆不敢讙或以告韓琦琦曰當是時某亦莫能措也其智略大率類此常謂李畋曰大小之事皆須用智智猶水也不流則腐若凡百不用智則臨大事之際寧有智來又曰臨事有三難能見一也見而能行二也當行必果决三也録曰自孟子言穿鑿之後忠定之言吃緊已乎夫智不可鑿亦不可窮不順則鑿不流則窮循理爲順不竭爲流是故止訛之術斷之聚也攬轡之呼敏之輿也不斷不敏智之賊也失此三者一人不可治一歩不可行矧天下大事乎故曰忠定之言可謂吃緊矣契丹㓂澶州帝大駭以問㓂凖凖對曰陛下欲了此不過五日耳願帝幸澶州同列聞之懼有欲退者準止之令候駕起帝亦難之將還内凖懇留曰陛下入則臣不得見大事去矣畢士安力勸帝如凖所請帝乃議親征召群臣問方略王欽若臨江人請幸金陵陳堯叟閬州人請幸成都帝復問凖凖心知二人之謀若揚爲不知者乃曰誰爲陛下畫此策罪可誅也今陛下神武將臣恊和若大駕親征敵當自遁不然出奇以撓其謀堅守以老其師勞佚之勢我得勝筭矣奈何棄廟社欲幸楚蜀逺地所在人心崩潰敵勝勢深入天下可復保耶帝乃决計澶州録曰我明己巳之變徐有貞倡議南遷賴子肅愍之言而止二事孰爲難易耶以愚觀之澶淵之寇宋之衮職無闕廟社奠安正統之變乘輿越在草莽朝野震動從違之間危亡反掌然當其時王欽若徐有貞固自在也以二公之智何不亟去之而使皆得以媒孽其後何耶夫智臨之君黑白易分甘臨之主邪正難辨一旦狃於安富則驕侈生忘其禍亂則釁孽萌此景德正統之時誳於二公之正議其事獲伸於前而譴禍亦隨於後也聖人係之曰至于八月有凶君子其可忽哉其可避哉帝至澶州南城望見契丹軍勢甚盛衆請駐蹕㓂準固請曰陛下不過河則人心益危敵氣未攝非所以取威决勝也衆議皆懼凖力爭之不决出遇殿前都指揮高瓊曰大尉受國恩今日有以報乎對曰瓊武人願效死凖乃復入瓊隨立廷下準厲聲曰陛下不以臣言爲然盍試問瓊等瓊即仰奏曰㓂凖言是麾衛士進輦帝遂渡河御北城門樓逺近望見御蓋諸軍皆踊躍呼萬歲聲聞數十里契丹氣奪帝悉以軍事付準準承制專决號令明肅士卒畏悅凖不欲賂之以貨財欲邀其稱臣及獻幽薊之地因畫策以進曰如此則可保百年無事不然數十年後戎亦生心矣凖蓋欲擊之使隻輪不返也時帝方厭兵乃曰吾不忍生靈重困姑聼其和可也録曰宋之澶州即今之大明也宋之都汴與今之都燕南北相距未爲遼逺至契丹之侵定州攻保州又攻順安軍又攻北平砦與今之入寇亦略相當宋既有魏能石普敗其前又有田敏王超拒其後故每與宋師戰小却即引去倘徉無闘志而澶淵之役又有寇凖獨當其前欲邀而擊之使隻輪不返而眞宗一則曰許和二則曰厭兵至議歲幣帝曰必不得已雖百萬亦可班之史册豈皆溢說哉况漢唐和親惟守一策宋之誓書兼用二議盍不悉聞于朝俾君相擇之乎今年復河套明年易緫治終歲不得寧居而惟幸其不來聼其自去又有一等之說以爲志在虜掠無防大事嗚呼此正吾之五餌何不一試而使生民肝腦𡍼地耶愚故因澶淵之事而進當路之人以爲智者先務葉急於此弘道録卷之三十九
