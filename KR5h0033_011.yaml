front:
  text: 弘道録卷之十八
  hash: sha256:17580d587c84619bed9be17ee5cea687848b27693c7d81ea023c283bc943a697
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0033_HFL_011-001a, image: hfl/1071/1071-096.png}
body:
  text: 義父子之義孟子曰舜盡事親之道而瞽䏂底豫而天下化瞽䏂底豫而天下之為父子者定録曰夫所謂之定者孝經云一人有慶兆民賴之蓋以父子之間思嘗掩義人但知有愛而不知有敬至是始知主敬之道而父子之分截然矣此秦俗慈子嗜利不同禽獸無幾者真後世大亂之道也史記堯時洪水滔天四嶽舉鯀治水無功鯀乃殛死舜既即位舉禹使續父業録曰唐虞盛時非特禪授出於至公至於功過亦不相掩也夫鯀罪人也罪人之裔同朝且不可矧代父乎禹孝子也痛父之心委質且不堪况纘業乎蓋舜之殛鯀與鯀之被殛出於天下之至公施者不以為怨受者不以為仇也及其舉禹使續父業亦合於人心之至順舉者不以為嫌代者不以為歉也設有一毫之私心則君臣父子之間皆有所窒礙矣又豈得為義乎禹娶塗山氏女生子啓辛壬癸甲啓呱呱而泣禹弗子惟荒度土功録曰鯀之廢以方命圯族禹之興以敏給克勤然則旨酒可惡人道亦可捐乎寸陰可惜辛壬亦可吝乎此公爾忘私國爾忘家至此而無以復加也禮檀弓事親有隱而無犯左右就養無方服勤至死致喪三年録曰親何必以有隱乎蓋父子之道天性也易曰幹父之蠱有子考無咎親雖有過子能幹之親之失即子之得也是故舜之父本頑也能左右之而頑化為慈何必犯哉禹之父本凶也能左右之而功掩其過何必直哉若徒事掩藏其惡以至於亡國敗家非左右就養無方之義也文王世子成王幼不能蒞阼周公相踐阼而治抗世子法於伯禽欲令成王之知父子君臣長幼之道也録曰愚觀抗世子法於伯禽乃千古之至妙也世子之立雖幼君也師保傅之設雖尊臣也臣可以責君乎將徒嚴坐揖之禮而實無嚴憚之義若乃伯禽之於魯亦世子也師保傅所得專也故成王不可撻伯禽則無嫌矣豈惟伯禽無嫌雖成王亦莫得而嫌之也受撻雖禽而所撻則王將不猛省而奮發耶吾而不改其過則人不已其撻其過有限其撻無窮必寡之又寡以至於無矣及其久也撻者免而過者化人但知終為令主而不知所入之深豈非至妙至妙乎故仲尼曰周公優為之所以深許之也歟凡三王教世子必以禮樂樂所以修內也禮所以修外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文録曰三代以上禮樂為實行三代以下禮樂為虛文太子天下之本禮樂太子之本也太子而恭敬溫文則君人無怠惰刻矣君人無怠惰刻則朝廷無乖張拂戾矣朝廷無乖張拂戾則天下無涣散危亡矣其豫養而夙儲之端乃在于是所以優入治安之域而不覺也立太傅少傅以養之欲其知父子君臣之道也太傅審父子君臣之道以示之少傅奉世子以觀太傅之德行而審喻之太傅在前少傅在後入則有保出則有師是以教喻而德成也師也者教之以事而喻諸德者也保也者愼其身以輔翼之而歸諸道者也記曰虞夏商周有師保有疑丞設四輔及三公不必備唯其人語使能也録曰師保傅之設其重如此後世乃以為兼官或虛隆其禮或徒存其名或任匪其人或職非其事皆非周公之本意也又安所望於教世子之法哉君之於世子也親則父也尊則君也有父之親有君之尊然後賦天下而有之是故養世子不可不愼也行一物而三善皆得者唯世子而已其齒於學之謂也故世子齒於學國人視之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆著於君臣之義矣其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節矣故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治語曰樂正司業父師司成一人良元萬國以貞世子之謂也録曰愚觀成周立法之善未有若世子之詳著審辨讀者可為之踴躍也以世子生於深宫之中出於萬人之上敦敢與之齒亦孰從而齒之然而生必有所自統必有所承出必有所先世子與人同也雖世子與人同孰能使知其所同哉若夫衆人徒知己之有父而不知父之道雖尊不易徒知己之有君而不知君之道雖貴不移徒知已之有長而不知長之道雖崇高不變一齒讓之間而纖悉必盡天下其猶指諸掌乎故曰一人元良萬邦以貞極其歸美而無外也説苑伯禽與康叔封朝於成王見周公三見三答之康叔有駭色謂伯禽曰有商子者賢人也與子見之康叔與伯禽見商子而問焉商子曰南山之陽有木曰橋盍往觀之二子往見橋竦焉實而仰以告商子商子曰橋者父道也南山之陰有木曰梓盍往觀之二子往見梓勃焉實而俯以告商子商子曰梓者子道也二子明日見周公入門而趨登堂而跪周公拂其首勞而食之曰安見君子對曰見商子周公曰君子哉商子也録曰此伯禽之撻不但訓成王亦以訓康叔也夫家人有嚴君者嚴主敬君主義敬義立而親親之道不孤矣家人嗃嗃悔厲吉者易子而教之也易子而教所以全其父子之恩也此君子哉商子不傷恩不失義而能澤及十世豈非威如終吉之明驗歟彼秦俗之誶語漢法之傷恩婦子嘻嘻失家之節何怪乎覆亂之相尋也國語周恭王遊於涇上密康公從有三女奔其母曰必致之王夫獸三為羣人三為衆女三為粲粲美之物也衆以美物歸女何德以堪之康公弗獻一年王滅密録曰密康公之母何其篤於愛子而昧於事君乎夫堂上之與膝下雖親踈不同至於心之無二則一也果若人言以謀子則善矣以謀王則吾不知也姦國之大惡人之大戾也如其義則雖祁祁如雲不以為瀆如其非義一褒姒足以滅宗周安在其為三女乎顧以為粲而效之王王之美密之惡乎左傳桓公二年取郜𣇄於宋納於太廟臧哀伯諫曰君人者將昭德塞違以臨昭百官猶懼或失之故昭令德以示子孫是以清廟茅屋大路越席大羹不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紌紘綖昭其度也藻率鞞鞛鞶厲遊纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鸞和鈴昭其聲也三辰旗旗昭其明也夫德儉而有度登降有數文物以紀之聲明以發之以臨照百官於是乎戒懼不敢易紀律今滅德立違而置其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉公不聽周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德録曰臧哀伯之有後其諸臧僖伯之勸乎夫觀魚以崇靡其過小章賂以誨亂其過大羽父之視華督一間耳宋之亂既成魯之賊安討乎正其詞以歸獄桓罪蓋為之魁而車中之禍特反乎爾已遂致子牙慶父仲遂意如之徒紛紛無所底止豈非作法於貪乎嗚呼臧氏之子可謂無負於魯矣厥後諸臧之孫有急病讓夷者有逐去東門者有號為聖人者內史之談豈虛語哉然後知尚德立言雖不見用亦不可廢也州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石蠟告於陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之陳人執之而請蒞於衛九月衛使右宰醜蒞殺州吁於濮石蠟使其宰羊肩蒞殺石厚於陳君子曰石蠟純臣也惡州吁而厚與焉大義滅親其是之謂乎録曰蠟庶幾可與亂矣夫僻與溺均之為戮也公既僻矣碏或溺焉有王者起其何能淑則向之正諫果何益哉桓立而蠟老厚死而石安蠟庶幾可與亂矣使漢之霍光知此明告於帝曰顯實與聞乎弒然後正淳于之罪停少女之婚霍之宗未滅也而卒以胥溺豈非不學之故與故曰為人臣而不通春秋之義必陷篡弒之罪此之謂也晉獻公將殺其世子申生公子重耳謂曰子盍言子之志於公乎世子曰不可君安驪姬是我傷公之心也然則盍行乎曰不可君謂我欲弒君也天下豈有無父之國哉使人辭於狐突曰申生有罪不念伯氏之言以至於死申生不敢愛其死雖然吾君老矣子少國家多難伯氏不出而圖吾君伯氏苟出而圖吾君申生受賜而死再拜稽首乃卒是以為恭世子也録曰獻公之不慈夫人得而誅之也而獻公之不孝人莫得而誅之也父子相繼以為世者也故天之所與必先定其配偶正其嗣續所謂其類維何室家之壺何也而顧可瀆乎哉甚哉恭世子之不幸也蒸者禽獸之道也天諉之聚塵焉所以資人之庖割也矧為萬物之靈而又賢其秀者乎天下固鮮無父之國而亦其有無母之人歟惑於驪姬猶可言也蒸於齊薑不可言也世子蓋籌之矣天所以誅不孝者以懲不祿則我何敢愛其死哉此無所逃而待烹申生乃所為恭而自言己志其在所後也夫公使寺人披伐濔重耳曰君父之命不校乃徇曰校者吾讐也踰垣而走披斬其祛遂出奔翟録曰重耳庶幾可與難矣夫君父之命不校校者吾讐也衛太子之傳石德乃教以矯節收充等繫獄豈非讐乎小杖則受大杖則走人子之道當如是也雖踰垣而奔翟何害其行乎患難哉晉襄公卒穆日抱太子以啼於朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉置此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆且畏逼乃背先蔑而立靈公録曰靈公之謀趙盾蓋不待驟諫之日而在於頓首之聞乎夫君而頓首其臣臲卼甚矣為盾者盍不思所以自反乎損私家之權歸公室之政昧於進退存亡之道是以動而有悔也或曰晉靈公之無道也宣子苟退不幾於喪乎諸葛武侯云臣鞠躬盡瘁死而後已若夫成敗利鈍非臣之明所能逆料此義不明顧乃紛紛藉藉若鉏麑之觸槐提彌明之死大桑間靈輒之倒戟其迹似吝其咎又安可逃乎周內史叔服至魯公孫敖聞其善相人也見其二子叔服曰穀也食子難也收子穀也豐下必有後於魯國穀生蔑蔑生速速生羯羯生貜是為僖子僖子將死召其大夫曰孔丘聖人之後也莊孫紇有言曰聖人有明德者若不當世其後必有達人今其將在孔丘乎我若獲沒必屬説與何忌於夫子使事之學禮焉以定其位故孟懿子與南宫敬叔師事仲尼仲尼曰能補過者君子也録曰此公子慶父之後也而曰能補過以著教也夫仁者必有後世之道也有子考無咎蠱之道也周公命蔡仲曰爾尚蓋前人之愆正此意歟合而觀之可見聖人公天下之善季文子相魯無衣帛之妾食粟之馬仲孫它諫曰子為魯上卿相二君矣妾不衣帛馬不食粟人其以為愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食粗而衣惡者猶多矣吾是不敢美妾與馬且吾聞以德榮為國華不聞以妾與馬文子以告孟獻子獻子囚之七日自是子服之妾衣不過七升之布馬餼不過稂莠文子聞之曰過而能改者民之上也使為上大夫子服它之字蔑之子也録曰劉康公聘於魯發幣於大夫季文子孟獻子皆儉歸語王曰季孟其嘗處魯乎敬恪恭儉臣也以敬承命則不違以恪守業則不懈以恭給事則寬於死以儉足用則遠於憂其上下無隙何任弗堪所以為令聞長世也其言正與此合公父文伯退朝朝其母其母方績文伯曰以歜之家而主猶績乎其母嘆曰魯其亡乎使僮子備官而未之聞耶居吾語女民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也是故王后親織玄紞公侯之夫人加以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事蒸而獻功男女效績愆則有辟古之制也吾冀其朝夕修我曰必無廢先人爾今曰胡不自安以是承君之官豫懼穆伯之絶嗣也録曰觀儀休之罷紝與敬薑之效績有以異乎曰無以異也夫男女之别在內與外而興亡之戒在淫與貪在位以不貪為寶居家以不淫為寶以儀之相不可有爭利之嫌以母之守不可懷宴安之毒若文伯者外無奉公之節內有多欲之愆亡無日矣母不惟可聽而又可信家人之表表乎諡為敬薑有由然矣范武子將老召其子燮曰燮乎吾聞之喜怒以類者鮮易者實多君子之喜怒以己亂也弗己必益之郤子其或者欲己亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎爾從二三子惟敬乃請老郤獻子為政文子退朝而暮武子曰何暮也對曰有秦客庾辭於朝大夫莫之對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子而三掩衆於朝吾不在晉國亡無日矣擊之以杖及郤子伐齊師勝而返文子後入武子曰無為吾望爾也乎對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣故文子為政有令名晉國賴之録曰愚觀會之訓燮乃知諸宗之存亡有以哉夫狐趙冀郤欒范晉所謂大宗也族大則盈生盈生則驕至驕至則怨集所謂可畏不可恃者矧又益之以喜怒哉是故穿之弒君不在於桃林之攻而在於河曲之戰郤之亡身不在於胥童之謀而在於夫人之辱武子見之熟矣使為盾者不徇輕肆之謀以遏其驕寵之性下官之難未可知也為獻者不崇怨欲之心以抑其克伐之意三郤之辜亦未可知也智哉隨武子乎訓其子必以敬讓敬德之聚也讓禮之崇也能敬則必不肆能讓則必不伐他日鄢陵之反從容順正而丐鞅之嗣令名周全其視狐趙欒郤又何如哉魏獻子謂成鱄曰吾與戊也縣人其以我為黨乎對曰戊之為人遠不忘君近不逼同居利思義在約思純有守心而無淫行雖與之縣不亦可乎及梗陽人有獄其宗賂以女樂魏子將受之魏戊謂閻沒女寬曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆諾退朝待於庭饋入召之比置三嘆既入使坐魏子曰吾聞諸惟食忘憂吾子置食之間三嘆何也對曰或賜二小人酒不夕食饋之始至恐其不足是以嘆中置自咎曰豈將軍食之而有不足是以再嘆及饋之畢願以小人之腹為君子之心屬厭而已獻子辭之録曰父子之間不責善魏戊可謂能用諫矣知臣莫若君知子莫若父獻子可謂能用人矣微辭詭説使言者無忌聼者易入二子可謂能用言矣然則何嫌之可避而惓惓於成鱄之問耶善乎程子曰凡人避嫌者皆內不足也內既足何假於賄乎此其作法於貪無怪乎從獸無厭以取柏槨之貶不得謂之忠也論語陳亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮聞斯二者陳亢退而喜曰問一得三聞詩聞禮又聞君子之遠其子也録曰伯魚之對有五善而遠其子不與存焉嘗獨立者其時間而適仰不愧俯不怍也趨者其禮矜而莊無狎恩無恃愛也詩禮公物也未者知而不欺無怠隋無傲慢也無以者寬而有容無責善無賊恩也至於退而學則彬彬矣即其無以異之問而大有異者存乎其中惜乎陳亢之見無以及此也始以私意窺終以寸益喜使千載之下不能不遺恨於魚得非亢之過歟大全以伯魚之質稟少劣故聖人止以是教若使天質穎悟則顔曾所至伯魚亦可至此語似非然也家語曾子寢疾樂正子春坐於牀下曾元曾申坐於足童子隅而坐執燭曰華而晥大夫之簀與子春曰止曾子聞之瞿然而呼曰華而晥大夫之簀與曾子曰然斯季孫之賜也我未之能易也元起易簀曾元也夫子之病革矣不可以變幸而至於旦請敬易之曾子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒録曰夫所謂父母全而生子全而歸者蓋以言乎生理之本全也則何但啓豫足啓豫手而已哉自三省以至於寢疾自傳習以至於一貫自避席以至於執燭而待苟有一毫不得其正不可為之全歸也不然則上帝所降之衷顧輕於父母所遺之體乎是故必易簀而後吾知免夫也若徒使弟子開衾而視抑末矣小學孟軻之母其舍近墓孟子之少也嬉戲為墓間之事踴躍築埋孟母曰此非所以居子也乃去舍市其嬉戲賈衒孟母曰此非所以居子也乃徙舍學宫之旁其嬉戲乃設俎豆揖讓進退孟母曰此真可以居子矣遂居之録曰孔子之嬉戲也常陳俎豆設禮容本於生知孟子之嬉戲也亦設俎豆揖讓進退本於學知此大聖大賢之分定於為兒之時者然也通鑑安陵人縮高之子仕於秦秦使之守管信陵君攻之不下使人謂安陵君曰君其遣縮高吾將仕之以五大夫使為執節尉安陵君致信陵君之命縮高曰君之幸高也將使高攻管也夫父攻子守人之笑也見臣而下是倍主也父教子倍亦非君之所喜敢再拜辭使者以報信陵君信陵君大怒遣使之安陵君所曰安陵之地亦猶魏也今吾攻管而不下則秦兵及我社稷必危矣願君生束縮高而致之若君弗致無忌將發十萬之師以造安陵城之下安陵君曰吾先君成侯受詔襄王以守此城也手授太府之憲曰國雖大赦降城亡子不得與焉今縮高辭大位以全父子之義而君曰必生致之是使我負襄王之詔而廢大府之憲也雖死終不敢行縮高聞之曰信陵君為人猛悍而自用此辭反必為國禍吾已全己無違義矣豈可使吾君有魏患乎乃刎頸而死録曰安陵之辭縮高不愈於侯之教信陵乎夫幸其父從君之令以取大位匹夫猶尚羞之矧教其臣叛君之命以求勝名侯生甘為之哉王之為俑姬之為憝亥之為剽鄙之為豚無忌之為懟皆羸之賊有以啓之也假令無忌遂以篡逆羸可從諛亥可加功姬可兒戲鄙可袖手乎以是知王者不作其亂有如此者而必誅無赦之刑豈聖人之過計哉齊淖齒之亂湣王出奔王孫賈從之已而失王之處其母曰汝朝出而晚來則吾倚門而望汝暮出而不還則吾倚閭而望汝今事王王出走汝不知其處汝尚何歸焉王孫賈乃攻淖齒殺之於是齊亡臣相與求湣王子法章立以為齊王保莒城以拒燕録曰王孫賈之母何如孟嘗君乎平時盜一國之名寵安危闔闢惟己所制矧於國破君亡曾是而不加之意哉而卒殺淖齒立襄王保莒城以拒燕者皆母之義有以激之也然則為文者可以愧死矣或曰湣欲去文文奔魏故無及也愚曰夫湣而有是哉上不見天下不見地中不見人而乃見文夫湣而有是哉則母之言若固有以啓之也弘道録卷之十八
